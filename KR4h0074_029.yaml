body:
  text: 瀛奎律髓巻二十九元方回編旅况類易旅卦曰旅瑣瑣斯其所取災男子生而有四方之志寧終老守鄉井乎一有所役而不能遽歸則有旅𤨏𤨏之憂雖富貴得志猶不無鞅掌之歎而况於貧賤不得志之人此旅况詩所以作也五言五十七首晚次樂鄉縣陳子昂故鄉杳無際日暮且孤征川原迷舊國道路入邊城野戍荒煙斷深山古木平如何此時恨噭噭夜猿鳴起兩句言題中四句言景末兩句擺開言意盛唐詩多如此全篇渾雄齊整有古味初發道中寄逺張九齡日夜鄉山逺秋風復此時舊聞胡馬思今聽楚猿悲念别朝昏苦懷歸嵗月遲壯圖空不息常恐鬢如絲雅淡有味初入湘中有喜征鞍窮郢路歸棹入湘流望鳥惟貪疾聞猿亦罷愁兩邊楓作岸數處橘為洲卻計從來憶翻疑夢裏遊此以還鄉漸近為喜張丞相曲江人也初發曲江溪中溪流清且深松石復登臨正爾可嘉處胡為無賞心我猶不忍别物亦有縁侵自匪常行邁誰能知此音後六句無一字粘帶景物謂之似韋蘇州非頂門鉅眼不識也江漢杜甫江漢思歸客乾坤一腐儒片雲天共逺永夜月同孤落日心猶壯秋風病欲蘇古來存老馬不必取長途此詩余幼而學書有此古印本為式云杜牧之書也味之久矣愈老而愈見其工中四句用雲天夜月落日秋風皆景也以情貫之共逺同孤猶壯欲蘇八字絶妙世之能詩者不復有出其右矣公之意自比於老馬雖不能取長途而猶可以知道釋惑也嵗暮嵗暮逺為客邊隅還用兵煙塵犯雪嶺鼔角動江城天地日流血朝廷誰請纓濟時敢愛死寂寞壯心驚明皇妃子之酣淫林甫國忠之狡賊養成漁陽之變史思明繼之回紇掎之吐蕃踵之四方藩鎮不臣盜賊蠭起老杜卒於大厯五年庚戌自天寳十四年乙未始亂流離凡十六年唐中葉衰矣卻只成就得老杜一部詩也不知終始不亂老杜得時行道如姚宋此一部杜詩不過如其祖審言能雅歌詠治象耳不過皆何將軍山林李監宅等詩耳寧有如今一部詩乎然則亦可發一慨也久客覊旅知交態淹留見俗情衰顔聊自哂小吏最相輕去國哀王粲傷時哭賈生狐狸何足道豺虎正縱横前四句似是為小人所忽而有此歎後四句乃謂吾之客况如王粲之哀賈生之哭為天下事不能平也豺虎未盡豈與鼠子較分寸乎山館南國晝多霧北風天正寒路危行木杪身逺宿林一作雲端山鬼吹燈滅厨人語夜闌雞鳴問前館世亂敢求安此廣徳元年癸卯老杜以嚴武再鎮西川卻領妻子自梓州趨成都時詩也前有三詩亦云不成向南國復作遊西川又云棧懸斜避石橋斷卻尋溪何日干戈盡飄飄愧老妻辛苦之態備焉時年五十二嵗去蜀五載客蜀郡一年居一作歸梓州如何關塞阻轉作瀟湘遊世一作萬事已黄髪殘生隨白鷗安危大臣在不必淚長流公以乾元二年己亥棄官之秦州冬自同谷入蜀上元元年庚子二年辛丑皆在成都時則嚴武帥蜀依之寳應元年壬寅自綿州至梓州則嚴武去蜀矣晚秋既迎家至梓廣徳元年癸卯亦在梓州嚴武再鎮成都辟入幕府廣徳二年甲辰在成都永泰元年乙巳嚴武卒乃再遊東川除京兆功曹不赴大厯六年丙午移居䕫州起句所以云五載客蜀郡一年居梓州也世事已黄髪此句哀甚尾句則為大臣者賢否亦可見矣宿關西客舍寄山東嚴許二山人時天寳髙道舉徴岑參雲送關西雨風傳渭北秋孤燈燃客夢寒杵搗鄉愁灘上思嚴子山中憶許由蒼生今有望飛詔下林丘本集題字頗繁以半山唐選正之燃搗二字眼突秋館雨後得兄弟書即事戎昱弟兄書忽到一夜喜兼愁空館忽聞雨貧家怯到秋坐中孤燭暗窗外數螢流試以他鄉事明朝問子由第四句佳甚長安逢故人郎士元數年音信斷不意在長安馬上相逢久人中欲認難一官今懶道雙鬢竟羞㸔莫問生涯事只應持釣竿三四絶妙酧程近秋夜即事見贈長簟迎風早空城淡月華星河秋一鴈砧杵夜千家節候㸔應晚心期卧巳賖向來吟秀句不覺已鳴鴉砧杵夜千家必旅中旅遊傷春李昌符酒醒鄉關逺迢迢聽漏終曙分林影外春盡雨聲中鳥倦江村路花殘野㟁風十年成底事羸馬厭西東第四句最佳洛陽早春顧况何地避春愁終年憶舊遊一家千里外百舌五更頭客路偏逢雨鄉山不入樓故園桃李月伊水向東流三四粧砌甚佳不覺為俳第五句尤可喜客中于武陵楚人歌竹枝遊子淚沾衣異國久為客寒宵頻夢歸一封書未返千樹葉皆飛南過洞庭水更應消息稀久客而夢歸家人之常愈逺則愈難得家書尾句意似又髙也友人南遊不囘相思春樹繚千里各依依鄠杜月頻滿瀟湘人未歸桂花風半落煙草蝶雙飛一别無消息水南蹤跡稀鄠音户京兆府有鄠縣秦原早望李頻一沗鄉書薦長安未得回年光逐渭水春色上秦臺燕掠平蕪去人衝細雨來東風生故里又過幾花開其思優游而不深怨可取歸渡洛水皇甫冉暝色赴春愁歸人南渡頭渚煙空翠合灘月碎江流澧浦饒芳草滄波有釣舟誰知放歌客此意正悠悠詩第一句難得好如此詩赴字已見詩話所評與酒渴愛江清四更山吐月並是起句便絶佳者泛舟劉方平林塘夜發舟蟲響荻颼颼萬影皆因月千聲各為秋嵗華空復晚鄉思不堪愁西北浮雲外伊川何處流中四句皆好各字尤妙江上逢司空曙李端共有髫年故相逢萬里餘新春兩行淚故國一封書夏口㠶初落潯陽鴈正疎唯應執杯酒暫食漢江魚詩律明瑩秋日陜州道中顧非熊孤客秋風裏驅車入陜西關河午時路村落一聲雞樹勢飄秦逺天形到岳低誰知我名姓來徃自凄凄父顧况詩入選此其子詩又入選亦可嘉也起句悲壯中四句稱之末句酸楚乃旅中真味不容掩也薊北旅思張籍日日望鄉國空歌白苧詞長因送人處憶得别家時失意還獨語多愁只自知客亭門外柳折盡向南枝此張司業集中第一首詩三四真佳句司業姑蘇人故云空歌白苧詞夜到漁家漁家在江口潮水入柴扉行客欲投宿主人猶未歸竹深村路逺月出釣船稀遥見尋沙岸秋風動草衣宿臨江驛楚驛南渡口夜深來客稀月明見潮上江靜覺鷗飛旅宿今已逺此行猶未歸離家久無信又聽搗征衣此二首規格相似劉長卿有一首亦然舟行寄李湖州客愁無次第川路重辛勤藻密行舟澁灣多轉楫頻薄遊空感惠失計自憐貧煩誦汀洲句時時慰逺征三四切於湖州水路五六旅况可憐江樓望歸時避賊在越中白居易滿眼江雲色月明樓上人旅愁春入越鄉思夜歸秦道路通荒服田園隔賊塵悠悠滄海畔十載避黄巾此少年作已自成就如此暮過山村賈島數里聞寒水山家少四鄰怪禽啼曠野落日恐行人初月未終夕邊烽不過秦蕭條桑柘外煙火漸相親怪禽落日一聨善言覊旅之味詩無以復加初月未終夕則村落之黒尤早邊烽不過秦似是西邊冦事始息初有人煙處旅遊此心非一事書札若為傳舊國别多日故人無少年空巢霜葉落疎牖水螢穿留得林僧宿中宵坐黙然起句十字謂心緒甚多鄉書難冩頷聨十字謂别鄉之久故人皆老成真竒語也景聨言蕭索之味結句謂之有僧為伴深夜無言其酸苦至矣詩法卻自整峭如第五句空巢霜葉落乃謂鳥巢既空葉落於巢之中其深僻如此寄韓湘過嶺行多少潮州瘴滿川花開南去後水凍北歸前望鷺吟登閣聽猿淚滿船相思堪靣話不着尺書傳昌黎寄韓湘云知汝逺來應有意好收吾骨瘴江邊然昌黎終得生還湘亦重骨肉之義可敬也宿孤館落日投村戍愁生為客途寒山晴後綠秋月夜來孤橘樹千株在漁家一半無自知風水靜舟繫岸邊蘆三四自然浪仙詩似此平易者少五六似是産橘之地曽經兵火矣泥陽館客愁何併起暮送故人囘廢館秋螢出空城寒雨來夕陽飄白露樹影掃青苔獨坐離懐慘孤燈照不開此三詩亦能道旅中事浪仙愛説樹影掃地詩思甚幽客遊旅懷姚合客行無定止終日路岐間馬為賖來貴僮因借得頑詩書愁觸雨店舍喜逢山舊業嵩陽下三年未得還三四道理是如此但晚唐詩句法字面多一同即太爛行來坐得沽來買得可厭也曉泊江戍楊憑放棹依遥戍清湘急晚流若為南浦宿逢此北風秋雲月孤鴻晚關山幾路愁年年不得意零露濕芳洲味此詩意元題中曉泊當作晚泊落日悵望馬戴孤雲與歸鳥千里片時間念我一何滯辭家久未還㣲陽下喬木逺色隱秋山臨水不敢照恐驚平昔顔詩話謂㣲陽下喬木逺燒入秋山為一實一虛似體貼句今攷戴集乃不然只如此十字自好向隅韓偓守道得途遲中兼遇亂離剛腸成繞指𤣥鬢轉垂絲客路少安處病床無穩時弟兄消息絶獨斂向隅眉致光遇朱全忠之亂始謫濮州尋客湖南又入閩依王審知而卒其情懷可憐也秋夜晚泊杜荀鶴一望一愴然蕭然起暮天逺山横落日歸鳥度平川家是去秋别月當今夜圓漁翁似相伴徹曉葦叢邊三四極宏濶荀鶴詩所少也送客江蒍明月孤舟逺吟髭鑷更華天形圍澤國秋色露人家水館螢交影霜洲橘委花何當尋舊隱泉石好生涯鑷一作摘江蒍處士江南人楊徽元㣲之有弔江蒍詩題曰送客而其意似是旅中三四眼工露字尤妙久客俞汝尚久客西城裏人家似舊鄰衆知趨事嬾僧厭打門頻倦枕費牕燭閒書破硯塵隂晴消白日門巷忽青春閒一作開俞公汝南辭王安石御史不拜致仕其節髙於人多矣詩句遒美久客無憾二十三日立秋夜行泊林里港張耒淅淅曉風起孤舟愁思生蓬窗一螢過葦㟁數蛩鳴老大畏為客風波難計程家人夜深語應念客猶征宛丘詩大抵不事雕琢自然有味發長平歸舟川上渡去翼望中迷野水侵官道春蕪沒斷堤川平雙槳上天濶一㠶西無酒消覊恨詩成獨自題雖自然無不工處正月二十日夢在京師客睡何輾轉青燈暗又明春雲藏澤國夜雨嘯山城許國有寸鐵耕田無一成朦朧五更夢俄頃踏如京三四字眼工五六又出竒不拘常調晚泊襄邑月暗風林靜斗垂霜夜清疎燈隔樹小暗水厯船鳴學字聲形苦紬書卜築輕此身南北慣隨處有平生柘城道中元註陳宋大水之後欲雪日易晚不風寒更清崩橋斷官道積水入空城屏翳野初燒降丘民始耕冬暉疾於鳥汲汲暝途征赴宣城守吳興道中秋野連雲靜三吳稻熟時風江客帆疾晴野鴈行遲草木霜天曉山川澤國卑宣城不負汝好繼謝公詩白羊道中日出客心喜路平人足輕風髙不成冷雨過有餘清水落溪魚出村深田鸛鳴勝遊須秀句多愧謝宣城凡道中詩皆可入覊旅但欣戚㣲不同耳宛丘詩無不自然於自然之中卻必有一聨二聨工當細觀之山口陳師道重霧真成雨疎簾不隔風青林擁紅樹家鶩雜賓鴻漁屋渾環水晴湖半落東徃來成一老猶在半途中三四句中有對五六渾字半字有眼邯鄲道中夜行阻風鄧忠臣欲㵼懸河雨先號㧞木風問津尨吠處覔路電光中徒御憂羣盜兒童笑拙翁當知步兵哭初不為途窮鄧忠臣長沙人有玉池集予讀張宛丘同文唱和見其詩甚佳後買其集于杭詩多有可人語此首三四最佳而新艤船當和江口待風賀鑄一葉寄津口怒濤安可乘朝風占酒斾夜㸑乞漁燈牛渚逢新月秦淮想結冰故人他夕夢歌吹滿金陵元註庚午十二月厯陽賦乃元祐五年三四一聨盡江河阻風之態秦淮夜泊元註辛未正月晦賦乃元祐六年宫栁動春條秦淮生暮潮樓臺見新月燈火上雙橋隔岸開朱箔臨風弄紫簫誰憐逺遊子心斾正揺揺想見太平時節近元宵處必有此景惟賀公樂府老手尤能言其情簡同行翁靈舒趙師秀久晴灘磧衆舟楫後先行終日不相見與君如各程水禽多雪色野笛忽秋聲若有新成句溪流合讓清五六伶俐然猶不甚髙逺徳安道中飡餘行數步稍覺一身和蠶月人家閉春山瀑布多鶯啼聲出樹花落片隨波前路東林近慚因捧檄過此乃江州徳安縣所以云前路東林近尾句妥婉宿鄔子寨下翁巻已謁龍君廟明朝早過湖傍沙船盡泊經火地多枯秋至昏星易空長楚月孤蕭條村戍闊更㸃有如無第五句新泊舟龍游未得橋開鎻去船難自由渚禽飛入竹山葉下随流忽見秋風喜還成嵗旱愁卧聞篙子説明日到衢州三四乃一句法閩中秋思客愁無定跡幾處冐風埃逢得家鄉便憑將信息回海煙蠻樹濕秋雨瘴花開舊日越王國吾今身再來五六似張司業旅泊幾日溪蓬下低垂困水程喜因山縣泊畧向岸汀行聞笛生覊思㸔松減宦情遥知此夜月必照故山明第六句新美客中劉克莊漂泊何須逺離鄉即旅人炊薪嘗海品書刺謁田鄰家寄寒衣少山來曉夢頻小兒仍病瘧詩句竟無神第四句近乎謁客丐索之徒恐後村戲言不應少年為客乃至如此茍賤也七言二十二首長安春望盧綸東風吹雨過青山卻望千門草色閒家在夢中何日到春來江上幾人還川原繚繞浮雲外宫闕參差落照間誰念為儒逢世難獨將衰鬢客秦關能言久客都城之意南海旅次曹松憶歸休上越王臺歸思臨髙不易裁為客正當無鴈處故園誰道有書來城頭早角吹霜盡郭裏殘潮蕩月囘心似百花開未得年年爭向被春催後四句平正巴興作賈島三年未省聞鴻呌九月何曽見草枮寒暑氣均思白社星辰位正憶皇都蘇卿持節終還漢葛相行師自渡瀘鄉味朔山林果别北歸期掛海㠶孤此蜀中思北歸而作也可入旅思類旅次洋州寓居郝氏園林方干舉目縦然非我有思量似在故山時鶴盤逺勢投孤嶼蟬曵殘聲過别枝凉月照窗敧枕倦澄泉遶石泛觴遲青雲未得平行去夢到江南身旅覊三四絶佳𤣥英一集詩此聨為冠訪同年虞部李郎中韓偓䇿蹇相尋犯雪泥厨煙未動日平西門庭野水䙰褷鷺鄰里頹墻吚喔雞未入慶霄君擇肉畏逢華轂我吹虀地爐貰酒成狂醉更覺襟懷得䘮齊春陰獨酌寄同年李郎中春陰漠漠土膏潤春雪㣲㣲風意和閒嗤入甲奔競熊醉唱落調漁樵歌詩道揣量疑可進宦情刓缺轉無多酒酣狂興依然在其奈千莖鬢雪何昇平之旅猶或以窮而悲亂離之旅窮且特甚烏得不深悲乎致光此二詩尚能自擇江邊有寄羅隱江邊舊業半凋殘每軫歸心即萬端狂折野梅山店暖醉聽村笛酒樓寒只言聖代謀身易爭奈貧儒得路難同病同憂更何事為君提筆畫漁竿五六淺近昭諌詩愛如此亦一時直道心事者秋宿臨江驛杜荀鶴南來北去二三年年去年來兩鬢斑舉世盡從愁裏老誰人肯向死前閒漁舟火影寒歸浦驛路鈴聲夜過山身事未成歸未得聽猿鞭馬入長關三四世俗所傳殘冬客次資陽江王巖淡雲殘雪簇江天䇿蹇遲囘客興䦨持鉢老僧來呪水倚船商女待搬灘沙翹白鷺非眞靜竹映繁梅奈苦寒阮籍莫嗟岐路異舊山溪畔有漁竿王巖宋初人隱居蜀川此詩第四句新第五句雖破壞白鷺亦良是次御河寄城北㑹上諸友王安石客路花時秪攪心行逢御水半晴陰背城野色雲邊盡隔屋春聲樹外深香草已堪囘歩履午風聊復散衣襟憶君載酒相追處紅蕚青跗定滿林細潤之中於五六下慢字眼度麾嶺寄莘老區區隨傳換冬春夜半懸崖托此身豈慕王尊能許國直縁毛義欲私親施為已壞平生學夢想猶歸寂寞濱風月一歌勞者事能明吾意可無人麾嶺在績溪入歙縣之界公又有詩云曉渡藤溪霜落後夜過翬嶺月明中麾又作此翬字葛溪驛缺月昏昏漏未央一燈明滅照秋牀病身最覺風霜早歸夢不知山水長坐感嵗時歌慷慨起㸔天地色凄凉鳴蟬更亂行人耳正抱踈桐葉半黄半山詩如此慷慨者少卻似江西人詩二十三日即事張耒已逢嫵媚散花峽不怕艱危道士磯啼鳥似逢人勸酒好山如為我開眉風標公子鷺得意䟦扈將軍風斂威到舍將何作歸遺江山收得一囊詩此離黄州貶所作頗似去險即夷為喜耳自海至楚途寄馬全玉蕭蕭晚雨向風斜村逺荒凉三四家野色連雲迷稼穡秋聲催曉起蒹葭愁如夜月長隨客身似飛鴻不記家極目相望何處是海天無際落殘霞文潛詩大抵圓熟自然宿泗州戒壇院元註天然丹霞也樓上鳴鐘門夜扄風簷送雨入疎櫺老僧坐睡依深壁童子持經守暗燈千里塵埃長旅泊五年憂患困侵陵誰知避世天然子一見禪翁便服膺登城樓沙雨初乾布褐輕獨披衰蔓步髙城天晴海上峰巒出野暗人家燈火明歸鳥各尋芳樹去夕陽㣲照逺村耕登樓已恨荆州逺况復安仁白髪生此二詩皆自然雋永人所難能者獨以易言之宿柴城陳師道卧埋塵葉走風煙齒豁頭童不記年起倒不供聊應俗髙低莫可只随緣鼕鼕逺鼓三行夜隱隱平湖四接天枕底波濤篷上雨故將覊思到愁邊此后山赴棣教時詩第七句尤竒愚按范石湖尾句有云灘聲悲壯夜蟬咽併入小窗供不眠與后山此詩尾句拍調意味俱相似舟行遣興陳與義㑹稽尚隔三千里臨賀初盤一百灘殊俗問津言語異長年為客路岐難背人山嶺重重去照鷁梅花樹樹殘酌酒柂樓今日意題詩船壁後來㸔度嶺年律將窮天地温兩州風氣此横分已吟子美湖南句更擬東坡嶺外文隔水叢梅疑是雪近人孤嶂欲生雲不愁去路三千里少住林間㸔夕曛欲生雲用老杜假山詩也次韻謝吕居仁居仁寓賀州别君不覺嵗時荒豈意相逢魑魅鄉篋裏詩書總零落天涯形貌各昻藏江南今嵗無烽火嶺表窮冬有雪霜倘可卜鄰吾欲往草茅為蓋竹為梁讀諸家詩忽到后山簡齋猶捨培塿而瞻太華不勝髙聳自是一種風調離建鞏仲至旅中多得早朝晴野潤衣襟苦未清時時數㸃雨猶落隱隱一聲雷不驚山入夏來差覺老花從春去久無情長汀又涉來時路麥隴桑村小問程中四句皆佳仲至詩每每新異新則不陳異則不俗十里趙師秀烏紗巾上是黄塵落日荒原更恐人竹裏怪禽啼似鬼道傍枯木祭為神亦知逺役能添老無奈髙眠不救貧此地到城惟十里明朝難得自由身此乃赴髙安推官時詩未至郡十里所作中四句皆可喜瀛奎律髓巻二十九

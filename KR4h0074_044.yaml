body:
  text: 瀛奎律髓卷四十四元方回編疾病類疾病呻吟人之所必有也白樂天有云劉公幹卧病瘴浦謝康樂卧病臨川咸有篇章蓋娛憂紓怨尤足以見士君子之操焉五言二十五首耳聾杜甫生年鶡冠子歎世鹿皮翁眼復幾時暗耳從前月聾猿鳴秋淚缺雀噪晚愁空黃落驚山樹呼兒問朔風此詩足見游戲翰墨後四句俱謂耳全無聞猿鳴雀噪既不聞矣而朔風吹落木葉亦不之聞至呼兒以問之豫謂果真聾矣兒所答又何聞乎史記謂豫讓吞炭為啞然請趙襄子之衣三斬之未嘗啞也老病老病巫山裏稽留楚客中藥殘他日裹花發去年叢夜足霑沙雨春多逆水風合分雙賜筆猶作一飄蓬老杜詩一句說病者極多兩三句說病者如髙秋蘇肺氣白髮自能梳藥餌增加減門庭問掃除第二句最妙昔者之病頭亦不自能梳今始自能梳頭也杖藜還客拜又以見病愈愈已能答拜但仍須倚杖耳所以老杜詩虛實字皆當細細審看今所取一首尤見圓活而峭拔初病風白居易六十八衰翁乘衰百藥攻朽株難免蠧空穴易來風肘痺宜生栁頭旋劇轉蓬恬然不動處虛白在胸中開成四年己未十月樂天得風痺疾時年六十八蓋以代宗大厯八年生也是年壬子有病中詩十五首自序云爾此詩長慶集三十五卷多為病而作賣駱馬别栁枝皆在是年病入新正枕上驚新歲花前念舊歡是身老所逼非意病相干風月情猶在杯觴興又闌便休心未伏更試一春看病入新正則開成庚申年六十九也卧病來早晚卧病來早晚懸懸將十旬婢能尋藥草犬不吠醫人酒甕全生醭歌筵半委塵風光還欲好爭向枕前春樂天病將十旬此乃真患風痺與蘇州移疾告病百日而罷不同也婢能尋藥草犬不吠醫人此聯絶妙病瘡門有醫來往庭無客送迎病銷談笑興老足歎嗟聲鶴伴臨池立人扶下砌行腳瘡春斷酒那得有心情平正無疵但頗未易及也墜馬强出贈同座足傷遭馬墜腰重倩人擡祗合窗間卧何因花下來坐依桃葉妓行呷地黃杯强出非他意乘風落盡梅傷足而猶勉强看梅可知是詩人多魔病中一二禪客見問因以謝之劉禹錫勞動諸禪客同來問病夫添罏搗雞舌灑水淨龍鬚身是芭蕉喻行須笻杖扶醫工有妙藥能乞一丸無雞舌香龍鬚席各去一字便佳聞董評事病因以書贈董生奉內典繁露傳家學青蓮譯梵書火風乖四大文字廢三餘欹枕晝眠晚折巾秋鬢疏武皇恩視草誰許茂陵居末句謂相如病渴似亦戲之卧病走筆酬韓愈書問賈島一卧三四旬數書惟獨君願為出海月不作歸山雲身上衣䝉與甌中物亦分欲知强健否病鶴未離羣五六可憐其所以感昌黎者至矣起句尤見退之髙誼賢哉賓主間也春日卧疾書情劉商楚客經年病孤舟人事稀晚晴江栁變春暮塞鴻歸今日方知命前年自覺非不能憂歲計無限故山薇知命覺非四字細潤尾句脫灑嶺下卧疾寄劉長卿員外包佶唯有貧兼病能令親愛疏歲時供放逐身世付空虛脛弱秋添絮頭風曉廢梳波瀾喧衆口藜藿靜吾廬喪馬思開卦占梟懶發書十年江海客離恨子知豫佶又有風痺寄懷詩甚哀首云病夫將老矣無可答君恩衾枕同羇客圖書委外孫中云無醫能却老有變是游魂前用喪馬開卦事此又用游魂變卦事必頗精於易劉長卿答和此詩又云落日棲梟鳥行人達鯉魚稱為包諫議未審坐何事貶嶺下秋晚卧疾寄司空拾遺盧少府耿湋寒几坐空堂疏髯似積霜老醫迷舊疾朽藥誤新方晚果紅低樹秋苔緑遍牆慚非蔣生徑不敢望求羊藥方自佳但藥既陳朽則不效非方之罪也上一句亦稱病中感懷李後主憔悴年來甚蕭條益自傷風威侵病骨雨氣咽愁腸夜鼎唯煎藥朝髭半染霜前緣竟何似誰與問空王李後主號能詩詞偶承先業據有江南亦僣稱帝數十州之主也集中多有病詩先有五言律云病態如衰颯厭厭已五年看此詩真所謂衰颯憔悴豈大風橫汾之比乎宜其亡也或謂此乃已至大興之後即不然矣七言有云衰顔一病難牽復曉殿君臨頗自羞又云泠笑秦皇經逺略靜憐周穆苦時巡蓋君臨之時也病起陳師道今日秋風裏何鄉一病翁力微雖枝起心在與誰同災疾資千悟寃親併一空百年先得老三敗未為窮后山詩似老杜只此詩亦合細味病中六首舊歲連新歲涼牀又暖牀山川屏裏畫時刻篆中香畏壘安吾土支離飽太倉若教身再健鶴背入維揚謂間居自奉且有祠祿樂矣若更不病即揚州鶴也甚佳元題十二首示藻姪可率昆季𢋫和今取六首日暖衣猶襲宵長被有稜朝晡三楪飯昏曉一缸燈伴坐跧如几扶行瘦比藤生緣堪入畫寂寞憩松僧軟熟羞盤饌芳辛實枕幃候晴先晒席占濕預烘衣易粟雞皮皺難培鶴骨肥頭顱雖若此虛白日生輝歎息憎晨清伸眉愜晚晴隙虛浮日影窗穴嘯風聲捫蝨天機動驅蚊我相生偶然成一笑栩栩暫身輕日眚浮珠珮聲塵籟玉簫晚秋潘鬢秃午夢楚魂消注水瓶花醒吹薪藥鼎潮南柯何處是斜日上廊腰靜裏秋光到閒中晝自長閉門宜泄栁尸祝謾庚桑腹已枵經笥身猶試藥方强名今日愈勃窣負東牆六詩每首有一二聯工而雅正其病也非貧者之病蓋猶有貴人之風焉病中作陸游破裘縫更暖糲食美無餘摩詰病說法虞卿窮著書身羸支枕久足蹇下堂疏今日晴窗好幽懷得細攄三四渾成卧病雜題終日常辭客經年半在牀愛窮留作伴諳病與相忘竈婢工烹粥園丁習寫方今朝有竒事久雨得窗光元注久病家人作粥遂佳蓋朝夕常為之也又有山僕本不識字因久合藥遂能寫藥方類大編豫謂白樂天婢能尋藥草犬不吠醫人放翁此聯亦近之久雨得窗光尤為佳句經年亦作經秋人間跛男子物外病維摩元注病中遂牽病右足可但妨趍拜何因廢嘯歌菜羮醯醬薄村巷棘茨多舉手謝鄰父非君誰肯過五六古淡有味此放翁八十六歲時詩病中示兒輩去去生方逺𡨕𡨕死即休狂思攘鬼手危至服丹頭有劍知誰與無香可得留惟應勤孝謹事事鑑恬侯此放翁易簀前倒數第三詩也其臨終之詩曰死去元知萬事空但悲不見九州同王師北定中原日家祭無忘告乃翁嘉定二年己巳冬也先是臘月五日脫去左車第二牙亦有詩其卒之日候考蓋年八十有六生於宣和七年乙巳後生讀此選詩不可以病為忌死為諱書之洪範曰考終命禮之善頌曰哭於斯乃人生之終事也得如放翁八十有六者世有幾人哉七言二十八首春盡日宴罷感事獨吟元注云開成五年三月三十日作白居易五年三月今朝盡客散筵空獨掩扉病與樂天相伴住春同樊子一時歸閒聽鶯語移時立思逐楊花觸處飛金帶縋腰衫委地年年衰瘦不勝衣櫻桃樊素口楊栁小蠻腰長慶集中無此詩别栁枝詩云兩枝楊栁小樓中嫋娜多年伴醉翁明日放歸歸去後世間應不要春風為病風痺遣二妾故有是作觴詠罷來賓閣閉笙歌散後妓房空亦病中所賦又明年有詩云去歲樓中别栁枝自注云樊蠻也二妓者皆以栁枝目之云改業先生老去飲無興居士病來閒有餘猶覺醉吟多放逸不如禪坐更清虛柘枝紅袖教丸藥羯鼓蒼頭遣種蔬却被山僧相戲問一時改業意何如第三句元注子先有醉吟先生傳故云尾句此亦戲笑近人情眼病二首散亂空中千片雪䝉籠物上一重紗縱逢晴景如看霧不是春天亦見花僧說客塵來眼界醫言風眩在肝家兩頭治療何曽差藥力微茫佛力賒眼藏損傷來已久病根牢固去應難醫師盡勸先停酒道侣多教早罷官案上謾鋪龍樹論合中虛撚決明丸人間方藥應無益爭得金箆試刮看白體詩不可以陳簡齊目疾詩律律之然此亦善形容不取其格而取其味病眼花頭風目眩乘衰老祗有增加豈有瘳花發眼中猶足怪栁生肘上亦須休大窠羅綺看終辨小字文書見便愁必若不能分黑白却應無悔復無尤詩律圓熟山谷云閲人朦朧自有味看字昏澀尤宜懶是也答竇拾遺卧病見寄包佶今春扶病移滄海幾度承恩對白花送客屢聞簷外鵲消愁已辨酒中蛇瓶收枸杞懸泉水鼎鍊芙蓉伏火砂誤入塵埃牽吏役羞將簿領到君家詩欲新而不陳已辨酒中蛇則無疑矣已辨二字佳事故而意新枸杞懸泉水芙蓉伏火砂亦新秋居病中幽居悄悄何人到落日清涼滿樹梢新句有時愁裏得古方無效病來拋荒簷數蝶懸蛛網空屋孤螢入燕巢獨卧南窗秋色晚一庭紅葉掩衡茅病中書事李後主病身堅固道情深宴室清香思自任月照靜居惟搗藥門扃幽院只來禽庸醫懶聽詞何取小婢將行力未禁賴問空門知氣味不然煩惱萬塗侵此詩八句俱有味然不似人主之作只似貧士大夫詩也移病還臺凡閲半歲乃愈始到家園視園夫治畦植花因成自歎宋祁卧治無功賜告回驟叨鳴履上中臺病中改八座壺丘天壤非真死蒙叟軒裳是儻來經灌旱蔬扶隴出失刋園蘂犯簷開此身疏拙真丘壑不是當年王佐才病起思歸王禹稱年來多病轉思山終日呻吟簿籍間叔夜養生休著論陶潜雖死只應閒又移郡印三年調才報君恩兩鬢斑安得便歸田里去松篁泉石掩柴關四十為郎非不偶况曽題筆直瀛洲明時遇主誰甘退白髮侵人自合休夢得蹉跎因出郡劉夢得貶謫為郎四十餘年薛能詩什恥監州薛許昌詩云監州是戲儒春來病起思歸甚未敢飛章達冕旒元之謫商州團練副使時詩蓋白樂天體也卧病月餘呈子由二首張耒蔀室悠悠昏復朝强披莊子說逍遙四禪未到風猶梗九轉無功火不燒學道若為調鹿馬是身不實似芭蕉丹砂赤箭功何有卧聽清言意自消風葉鳴窗已復朝喚回歸夢故人遙酒壺暗淡浮塵集藥鼎青熒敗葉燒閉户獨依寒蟋蟀移牀更就雨芭蕉雪深更請安心術長日如年未易消四禪九轉句佳次篇兩更字刋本如此恐元藁必不然病肺對雪擁庭晴雪照髙堂卧病悠悠廢舉觴肺疾僅同園令渴齒傷不為幼輿狂交飛翠斚知誰醉獨嗅烏巾認舊香元注漉酒淵明名也唯有烹茶心未厭故知淡薄味能長三四絶佳不為幼輿狂尤新異五六應二句謂不能飲觴斚二字犯重晝卧懷陳三時陳三卧疾睡如飲蜜入蜂房懶似游絲百尺長陋巷誰過居士疾春風正作國人狂吟詩得瘦由無性辟穀身輕合有方欲餉子桑歸問婦一瓢過午尚懸牆此以問陳后山疾也后山答昔聞杜氏婦剪髻事賓客君婦定不然三梳奉巾櫛是也喜七兄疾愈淨名居士本非病五禽先生能養身家人但訝少陵觀鄉里不知顔子貧身內故知閒是藥人間誰有道通神喜聞漸離烏皮兒花氣晴來欲逼人此等詩豈補綴鬭合者能之只如信口說話而他人不能如此信口說也和黃預病起陳師道似聞藥病已投機牛鬬蛇妖頓覺非李賀固知當得疾沈侯可更不勝衣驚逢白璧山千仞㑹見黃金帶十圍只信詩書端作祟孰知糠籺亦能肥后山詩句句有關鎖字有眼意有脈當細觀之眼疾陳與義天公嗔我眼常白故著昏花阿堵中不怪參軍騎瞎馬但妨中散送飛鴻著籬令惡誰能對損讀方竒定有功九惱從來是佛種㑹知那律證圓通此詩八句而用七事謂詩不在用事者殆胸中無書耳盲人騎瞎馬夜半臨深池此世說殷仲堪參軍所作危語仲堪眇一目適忤之只見門外著籬未見眼中安障此方干令以嘲李主簿范寧武子患目痛求方於張湛湛戲謂此方用損讀書一減思慮二專內視三簡外觀四早晚起五夜早眠六凡六物熬以神灰下以氣篩今刋本多誤作損續非也白眼阿堵送飛鴻三事非僻那律事出楞嚴經無目可以證道其要妙在用虛字以斡實事不可不細味也次韻王元勃問豫齒脫曽幾齒危但以粥充虛辜負公家夏屋渠元注舊說夏屋大具渠勤也言說大具其意勤勤然政恐麴生真作祟可憐髯簿頓成疏元注炙轂子謂羊為髯鬚主簿動搖不減韓吏部蹴踏非勤焦校書落勢今年殊未已祗應從此併無餘此當與陳簡齊目疾范石湖耳鳴詩參綜以觀格律相似善用事亦相似但貯胸無竒書落筆無活法則不能耳誰謂江西詩可輕視乎次韻朱德裕見贈豫病初起周孚蓋世功名黍一炊驚心歲月轂雙馳五漿先饋那須爾二豎相陵少避之種種鬢毛吾欲老翩翩書劄子能竒黃花無語秋將暮莫惜𤣥談與解頤周孚字信道濟南人乾道二年進士為儀曺在官卒詩本黃太史辛稼軒刋其集曰槖齊集丘詳之惜其年不老蓋尚進而未艾耳鳴范成大東極空歌下始青西方寶網奏韶英不須路入兜元國自有音聞空筏城牛蟻誰知牀下鬭雞蠅任向夢中鳴如今却笑難陀種無耳何勞强聽聲二首選一前篇有云夢中鼓響生千偈覺後舂聲失百非又云寄語爵隂吞賊道玉牀安穩坐朱衣皆竒博已甚謂能詩者不必讀書不在用事可乎病足纍日不能出掩門折花自娛陸游頻報園花照眼明蹣跚正廢下堂行擁衾又聽五更雨屈指都無三日晴不奈病何拋酒盞粗知春在賴鶯聲一枝自浸銅瓶水喜與年光未隔生此慶元四年戉午詩放翁年七十四第六句絶妙病愈倦榻呻吟每自哀占蓍來吉出餘災自能洗硯拂書几時亦折花尋酒杯久類寒蛟潛岫穴忽如老馬噴風埃霜晴爛熳東窗日一笑山坡訪早梅此亦慶元四年戉午時詩五月初病體覺愈輕偶書世事紛紛了不知又逢乳燕麥秋時經年謝客常因醉三日無詩自怪衰乘雨旋移西崦藥留燈自覆北窗棋但將生死俱拈起造物從來是小兒此慶元五年己未詩放翁時年七十五小疾兩日而愈病骨羸然山澤臞故應行路笑形模記書身大似椰子忍事癭生如瓠壺美酒得錢猶可致髙人折簡孰能呼不如淨掃茅齊地臨看微香起瓦爐不著行路笑形模一句則引椰子瓠壺兩句不來此足見詩家手段放翁是年八十二開禧二年丙寅也明年而托胄敗放翁猶健也病起趙師秀身如瘦鶴已伶俜一卧兼旬更有零朝客偶知親送藥野僧相保密持經力微尚覺衣裳重才退難徼筆硯靈惟有巖花心未已遍分黃菊插空瓶此詩三四先云朝士偶知來送藥野僧相保為持經後乃改下親字密字亦詩法所當然也但更有零三字不佳四靈學姚合賈島詩而不至七言律大率皆弱格不髙致也髮脫劉克莊髮脫紛紛不待爬天將醜怪變妍華論為城旦寧非怒度作沙彌亦自佳稚子笑翁簮柏葉侍人諱老匣菱花霜寒尤要泥丸暖慚愧烏巾著意遮白樂天陳簡齊之目張文潛曾茶山之齒范石湖之耳加以後村髮秃詩可發一笑然後村詩不及諸公問友人病病來清瘦欲通仙深炷篝香拂地眠野客勸尋廉藥買外人偷出近詩傳術庸難靠醫求效俗陋多依鬼乞憐鷗鷺如欺行跡少分明溪上占漁船詩意自足但是格卑瀛奎律髓卷四十四

body:
  text: 瀛奎律髓巻十四元方回編晨朝類聞雞而起戴星而行以勤學以綜務有不同惟賢者乃云髙卧晚起亦各有其志也五言三十二首早渡蒲關唐明皇鐘鼓嚴更曙山河野一作四望通鳴鑾下蒲坂飛蓋入秦中地險一作峻關逾壯天平鎮尚雄春來津樹合月落戍樓空馬色分朝景雞聲逐曉風所希常道泰非復候繻同半山唐選此第一首𤣥宗大有好詩而半山不及取殆是未見其集然則開元天寳盛時當陳宋杜沈律詩王楊盧駱諸文人之後有王摩詰孟浩然李太白杜子美及岑參髙適之徒並鳴於時韋應物劉長卿嚴維秦系亦並世而不見與李杜相倡和詩人至此可謂盛矣為之君如明皇者高才能詩亦不下其臣豈非盛之又盛哉曉望杜甫白帝更聲盡陽臺曉色分高峰寒上日叠嶺宿霾雲地坼江帆隠天清木葉聞荆扉對麋鹿應共爾為羣五六以坼字隠字清字聞字為眼此詩之最𦂳處將曉二首石城除擊柝鐵鎻欲開闗皷角悲荒塞星河落曉山巴人常小梗蜀使動無還垂老孤帆色飄飄犯百蠻軍吏回官燭舟人自楚歌寒沙䝉薄霧落月去清波壯惜身名晚衰慚應接多歸朝日簪笏筋力定如何前一詩中四句兩言曉景兩言時事後一詩中四句兩言曉景兩言身事拘者欲句句言曉即不通矣客亭秋窗猶曙色木落更天風日出寒山外江流宿霧中聖朝無棄物老病已成翁多少殘生事飄零任轉蓬王右丞詩云江流天地外山色有無中此詩三四以冩秋曉亦足以敵右丞之壯然其佳處乃在五六有感慨兩句言景兩句言情詩必如此則淨潔而頓挫也早起春來常早起幽事頗相闗帖石防頺岸開林出逺山一丘藏曲折緩步有躋攀僮僕來城市瓶中得酒還此乃老杜集之晚唐詩也起句平入晚唐也三四着上帖防開出字為眼則不特晚也五六意足不必拘對而有味則不止晚唐矣尾句别用一意亦晚唐所必然也趨府堂候曉呈兩縣僚友韋應物趨府不遑安中宵出戸看滿天星尚在近壁燭仍一作猶殘立馬頻驚曙垂簾却避寒可憐同宦者應悟下流難仕宦而居下流所以趨府候曉不得已之役應當作始旦攜謝山人至愚池栁宗元新沐換輕幘曉池風露清自諧塵外意况與幽人行霞散衆山逈天高數雁鳴機心付當路聊適羲皇情詩不純於律然起句與五六乃律詩也幽而光不見其工而不能忘其味與韋應物同調韋達故淡而無味商山早行温庭筠晨起動征鐸客行悲故鄉雞聲茅店月人迹板橋霜槲葉落山路枳花明驛墻因思杜陵夢鳬雁滿迴塘温善賦號為八义手而八韻成以此知名於世三四極佳曉寢白居易轉枕重安寢迴頭一欠伸紙窗明覺曉布被暖知春莫強疎慵性須安老大身雞鳴一覺睡不博早朝人三四好快活自在人尾句尤爽途中早發劉禹錫中途望啓明促促事晨征寒樹鳥初動霜橋人未行水流白烟起日上彩霞生隠士應高枕無人問姓名劉賔客詩中精也自頷聨以下無一句不佳且是尾句不放過晨起曉色教不睡巻簾清氣中林殘數枝月髮冷一梳風並鳥含鐘語攲河隔霧空莫疑營白日道路本無窮三四世所稱名句曉發唐求旅館候天曙整車趨逺程幾處曉鐘斷半橋殘月明沙上鳥猶睡渡頭人未行去去古時道馬嘶三兩聲此所謂詩瓢唐山人者四聨皆側入自是一體詩亦清潤早行郭良早行星尚在數里未天明不辨雲林色空聞風水聲月從山上落河入斗間横漸至重門外依稀見洛城第六句新早春寄朱放山曉旅人去天高秋氣悲明河川上沒芳草露中衰此别又千里少年能幾時心知剡溪路聊且寄前期曉發鄞江北渡寄崔韓二先輩許渾南北信多岐生涯半别離地窮山盡處江泛水寒時露曉蒹葭重霜晴橘柚垂無勞促回檝千里有心期許用晦丁卯集者京口之南可十里有丁卯橋乃其故居以名集也其詩出於元白之後體格太卑對偶太切陳后山次韻東坡有云後世無高學舉俗愛許渾以此之故予心甚不喜丁卯詩然初年誦半山唐選亦愛其懷古數篇今老而精選罕當予意早行晨起難得佳者獨丁卯為多五言如素壁寒燈暗紅爐夜火深廚開山䑕散鐘盡野猿吟露重螢依草風高蝶委蘭晨雞鳴逺戍宿雁起寒塘雲捲四山雪風凝千樹霜皆近乎属對未工而所對之句意若牽強又如簷楹銜落月幃幌耿殘燈上四字全不佳又如水蟲鳴曲檻山鳥下空階十字全然無味七言如一聲山鳥曙雲外萬野水螢秋草中星河半落巖前寺雲霧初開嶺上闗殆不成詩而近世晚進爭由此入所以卑之又卑也短中求長唯七言懷古詩五言峽山寺詩早梅詩為優自見别評早發洛中許棠半夜發清洛不知過石橋雲增中岳大樹隠上陽遥塹黑初沉月河明欲認潮孤邨人尚夢無處暫停橈此一早發詩不知二字便佳葢曙中舩過橋下也中岳上陽以雲増而大以樹隠而遥極有味第六句亦佳末句則予嘗夜航浙河熟諳此况也與許渾全不同曉發姚鵠旅行宜早發况復是南歸月影縁山盡鐘聲隔浦微殘星螢共失落葉鳥和飛去去渡南浦邨中人出稀第四句可取第五句妙餘未稱也晨起韓偓曉景山河爽閒居巷陌清已能消滯念兼得散餘酲汲水人初起迴燈燕暫驚放懷殊不足圓隙已塵生清爽一聨好亦多能述晨興之味曉發山居僧宇昭蓐食小人家寒燈碎落花雞鳴牕半曉路暗月西斜世故欺懷抱風霜近嵗華劇憐詩思苦悽惻向長沙三四平平以早行詩少收之早行晁端友馬上雞初唱天涯星未稀驚風時墜笠零露暗沾衣山下疎鐘發林梢獨鳥飛逺峰煙靄淡迤邐見朝暉此無咎之父㫖味平雅有唐風曉梅堯臣烏蟾不出海天地無明時萬國睡未覺一聲雞已知樹頭星漸沒枝上露應垂人世紛紛事勞勞只自為聖俞詩淡而有味此亦信手拈來自然圓熟起句似孟郊夢後寄歐陽永叔不趂常參久向安眠舊溪五更千里夢殘月一城雞適往言猶是浮生理可齊山王今已貴肯聽竹禽啼此乃曉寐方覺之詩三四佳末句言永叔已貴無高眠之適矣和外舅夙興三首取二元註寓大雲寺作黄庭堅𤓰蔓已除壟苔痕獨上牆蓬蒿含雨露松竹見冰霜巻幔天垂斗披衣日在房無詩歎不遇千古一潛郎風烈僧魚響霜嚴郡角悲短童疲灑掃落葉故紛披水凍食鮭少甕寒浮蟻遲朝陽烏鳥樂安穏托禪枝見山谷外集如蓬蒿之人含雨露不如松竹之足以見氷霜也意當如此兩句元只一意如短童疲灑掃落葉故紛披亦可見詩格無窮先言掃次言葉十字一句法如披衣日在房當是指氐房之房則竒外舅者謝師厚晨起張耒曉色淡朦朧園林白露濃寒叢蛩響畔秋屋葉聲中更老心猶在雖貧樽不空浮生仗天理不擬哭途窮第五句最古淡嵗暮呈真翰林戴復古嵗事朝朝廹家書字字愁頻沽邨巷酒獨倚異鄉樓詩骨梅花瘦歸心江水流狂謀𣺌無際忍看大刀頭此下四首當入冬日類石屏此詩前六句儘佳尾句不稱乃止於訴窮乞憐而已求尺書干錢物謁客聲氣江湖間人皆學此等衰意思所以令人厭之夜訪侃直翁劉瀾疎瓴亂見星危坐冷無燈索句髭先白湌蔬貌欲青棲禽翻麓雪墮栗破溪冰昨夜中峰頂同看海日升江邨劉瀾字養原天台人嘗為道士還俗學唐詩亦有所悟然干謁無成丙子年卒予熟識之此詩合属夜類以冰雪一聨乃冬也附諸此次韻方萬里雨夜雪意趙與東芋火房隂處翛然類嬾殘雨欺梅影瘦風助竹聲寒擁袂衣全薄哦詩字欲安兒童疑有雪頻起穴牕看予丁丑之冬在桐江賦雨夜雪意詩云洶湧風如戰蕭騷雨欲殘遥峰應有雪半夜不勝寒吾道孤燈在人寰幾枕安何當眩銀海清曉倚樓看魯齋趙君與東字賓暘和予此詩哦詩字欲安佳句也尾句亦活動勝予所倡賔暘嘉定十五年壬午生今年六十有二宗學上舍改官次韻方萬里寒甚送酒連日寒殊甚衰年無一能硯呵磨墨凍瓶曬插花冰浮世無根絮餘生有髮僧蘇門如可即端合事孫登戊寅十一月十九日寒予賦詩送賔暘酒併懷南山僧川老此和篇三四亦工曉起甘蔗洲鞏仲至曉起東風惡晴嵐忽變昏船隨山共走霧與水相呑鉦皷遥知寨桑麻畧辨邨雨來無準則容易濕蓬門鞏栗齋仲至其先東平府人南渡寓居婺州父嶸大監廣帥淳熙甲辰上舍甲科東平集四十巻其詩甚新嘗學於東萊之門早行劉克莊店嫗明燈送前邨認未真山頭雲似雪陌上樹如人漸覺高星少纔分逺燒新何煩看堠子來往暗知津南岳一藁第七詩三四可觀葢少作也七言十三首曉上天津橋閒望偶逢盧郎中張員外擕酒同傾白居易上陽宮裏曉鐘後天津橋頭殘月前空濶境疑非下界飄遥身似在寒天星河隠約初生日樓閣葱籠半出烟此處相逢傾一盞始知地上有神仙詩律不必高但亦自然早發羅鄴一㸃殘燈魯酒醒已擕孤劍事離程愁看飛雪聞雞唱獨向長空背雁行白草近闗微有露濁河連底凍無聲此中來往本迢遞况是軀羸客塞城第六句好第五句露字疑當作路先已言雪故也早發天台中巖寺度闗嶺次天姥岑許渾來往天台天姥間欲求真訣駐衰顔星河半落巖前寺雲霧初開嶺上闗丹壑樹高風浩浩碧溪苔淺水潺潺可知劉阮逢人處行盡深山又是山愛而知其惡憎而知其善君子於待人宜然予之評詩亦皆然也予遍讀唐人詩早行晨起之作絶少如早朝夜直已入朝省類矣於此外求平淡蕭閒之趣咸無焉此詩三四於早行自工但苦對偶太甚所謂方得一句便拏捉一句為聨而無自然真味又且涉乎淺近則老筆耻之五六尤為平平惟尾句却佳可知者不可知也甚處可覓劉阮行盡山又是山也早發藍闗韓偓閉門愁立待雞鳴搜景馳魂入杳㝠雲外日隨千里雁山根霜共一潭星路盤偶見樵人火棧轉時聞驛使鈴自問辛勤縁底事半生驅馬望長亭早起魏野夜長久待得晨興耽睡童猶喚不譍燒葉爐中無宿火讀書窗下有殘燈臨堦短髪梳和月傍岸衰容洗帶氷應被巢禽相怪訝尋常日午起慵能燒葉一作燒藥今從詩話以葉字為定尤有味朝梅堯臣木鏁初開水上城竹籬深閉日光生青苔井畔雀兒鬬烏臼樹頭雅舅鳴世事但知開口笑俗情休要着心行是非不道任挑撻唯憶當時阮步兵中四句好新城道中蘇軾東風知我欲山行吹斷簷間積雨聲嶺上晴雲披絮帽樹頭初日掛銅鉦野桃含笑竹籬短溪栁自揺沙水清西崦人家應最樂煮芹燒笋餉春耕東坡為杭倅時詩熙寧六年癸丑二月循行属縣由富陽至新城有此作三四乃是早行詩也起句十四字妙五六亦佳但三四頗拙耳所謂武庫森然不無利鈍學者當自細叅而黙㑹雖山谷少年詩亦有不甚佳者不可為前輩隠諱也坡是年三十八嵗晁無咎之父端友令新城故和篇有云小雨足時茶户喜亂山深處長官清此乃佳句早起陳師道隣雞接響作三鳴殘㸃連聲殺五更寒氣挾霜侵敗絮賔鴻將了度微明有家無食違高枕百巧千窮只短檠翰墨日疎身日逺世間安得尚虚名有家無食百巧千窮各自為對乃變格要見字字鍛鍊不遺餘力西歸舟中懷通泰諸君呂本中一雙一隻路傍堠乍有乍無天際星亂葉入船侵破衲疾風吹水擁枯萍山林何謝難方駕詩語曹劉可乞靈酒盌茶甌俱不厭為公醉倒為公醒起句十四字乃早行詩次一聨言景物而工又一聨言情况而不勝其高矣詩格崢嶸非晚學所可及也東流道中王質山高樹多日出遲食時霧露且雰霏馬蹄已踏兩郵舍人家漸開雙竹扉冬青匝地野蜂亂蕎麥滿園山雀飛明朝大江載吾去萬里天風吹客衣雪山王質字景文東魯人過江寓居興國紹興庚辰進士此詩乃吳體而遒美六月歸途徐機星明殘㸃數峰晴夜靜微聞水有聲六月行人須早起一天凉露濕衣輕宦情每向途中薄詩句多於馬上成故里諸公應念我稻花香裏計歸程第四句良是第六句亦佳夜雨曉起方覺鞏仲至夜雨鳴簷送五更不驚高卧最多情窗間細視花無一作無花影牆外隨聽屐有一作有屐聲數把柔絲堤柳嫩一奩方鏡閘波清出門眼界殊明潔但覺春寒處處生此詩夜雨細而不知曉起方覺以附之曉詩類晨征靜觀羣物亦勞哉豈獨吾為旅食催雞唱未圓天已曉蛙鳴方聚雨還來清和入序殊無暑小滿先時政有雷酒賤茶饒新麵熟不妨乘興且徘徊第六句最新瀛奎律髓巻十四

body:
  text: 瀛奎律髓巻三十七元方回編技藝類書畫琴棋巫醫卜筮百工技巧史為立傳以藝之難臻也唐宋以來挾一藝游公卿之門因詩以得名者不少焉豈可以小技易視之哉五言二首詠郡齋壁畫片雲得歸字岑參雲片何人畫塵侵粉色微未曾行雨去不見逐風歸只怪偏凝壁囘看欲染衣丹青欲借便移向帝鄉飛草書屏風韓偓何處一屏風分明懐逺蹤雖多塵色染猶見墨痕濃怪石奔秋澗寒藤掛古松若教臨水畔字字恐成龍七言十一首畫真來嵩梅堯臣廣陵太守歐陽公令爾畫我憔悴容便傳髣髴在縑素又欠勁直藏心胸與以貨布不肯受比之毉卜曽非庸公今許爾此一節爾只丹青期亦逢次韻呉仲庶省中畫壁王安石畫虎雖非顧虎頭還能滿壁畫滄洲九衢京洛風沙地一片江湖草樹秋行數魚鰕賓共樂卧看鷗鳥吏方休知君定有扁舟意却為丹青肯少留和仲庶池州齊山圖省中何忽有崔嵬六幅生綃坐上開指㸃便知巖穴處登臨新作使君來雅懐重向丹青得勝勢兼隨翰墨囘更想杜郎詩在眼一江春雪下離堆次韻平甫贈三靈程惟象家山松菊半荒蕪杖䇿窮年信所如占見地靈非卜筮算知人貴自陶漁久諳郭璞言多騐老比顔含意更疎祗欲勒成方士傳偕君名姓在新書贈李士寧道人季主逡巡居卜肆彌明解后作詩翁曽令宋賈伏車上更使劉侯驚坐中杳杳人傳多異事冥冥誰識此髙風行歌過我非無謂惟恨貧家酒盞空贈三靈程道人王安國三靈山下新安水瀟灑人間畫不如收得市朝忙日月歸來田里老樵漁君能知命忘機久我愧干時觸事疎從此卜隣同笑傲何須强著解嘲書贈善相程傑蘇軾心傳異學不謀身自要清時閱縉紳火色上騰雖有數急流勇退豈無人書中苦覔元非訣醉裏㣲言却近真我似樂天君記取華顛賞徧洛陽春贈䖍州術士謝晉臣屬國今從海外歸君平且莫下簾帷前生恐是盧行者後學過呼韓退之死後人傳戒定慧生時宿直斗牛箕慿君為算行年看便數生時到死時贈童道人蓋與予同甲子陸游吾儕之生乙巳年達者寥寥同比肩退士一生藜藿食散人萬里江湖天忍貧不變我自許挾術自營君豈然一事尚須煩布䇿幾時能具釣魚船元註方謀買一小舟未得也贈徐相師許負遺書果是非子慿何處說精㣲使君豈必如椰大丞相元來要瓠肥袖濶日常籠短刺肩寒春未換單衣半頭布袋挑詩巻也道遊京賣術歸後四句曲盡近時術士窮態三四亦好贈傳神水鑑寫照今誰下筆親喜君分得卧雲身口中無齒難藏老頰上加毛自有神誤遣汗青成國史未妨着句號山人他時更欲求竒迹畫我溪頭把釣緡元註水鑑寫予真作幅巾白道衣中四句皆佳時在史局瀛奎律髓巻三十七
  hash: sha256:b0cfa6bf733bd31cd3ad04daaf1cdf892256e0b397c7a7fa3531dcb4f194ea83

body:
  text: 瀛奎律髓巻三十九元方回編消遣類莊子曰令人之意也消有所不平焉而不能消則褊狹矣衛玠曰非意相干可以理遣有所不堪焉而不能遣則怨怒矣詩人多有所謂消愁遣興之作必深達物理世故人情天道者乃能為真消遣之言否則非由衷也五言四首可惜杜甫花飛有底急老去願春遲可惜歡娯地都非少壯時寛心應是酒遣興莫過詩此意陶潛解吾生後汝期看嵩洛有歎白居易今日看嵩洛囘頭歎世間榮華急如水憂患大於山見苦方知善經忙始變閒未聞籠裏鳥飛去肯飛還變一作戀夜飲李商隱卜夜容衰鬢開筵屬異方燭分歌扇淚雨送酒船香江海三年客乾坤百戰塲誰能辭酩酊淹卧劇清漳孤學陸游孤學雖遺俗猶為一腐儒家貧占力量夜夢驗工夫正欲安三徑寧忘奏六符殘年知有幾自怪尚區區七言三十八首感興白居易吉㓙禍福有來由但要深知不要憂只見火光燒潤屋不聞風浪覆虚舟名為公器無多取利是身災合少求雖異匏𤓰難不食大都足食早宜休魚能深入無憂釣鳥解髙飛豈觸羅爇處先爭炙手去悔時其奈噬臍何樽前誘得猩猩血幕上偷安燕燕窠我有一言君記取世間唯有苦人多閒卧有所思向夕褰簾卧枕琴㣲涼入戸起開襟偶因明月清風夜忽想遷臣逐客心何待投荒初恐懼誰人遶澤正悲吟始知洛下分司坐一日安閒直萬金權門要路足身災散地閒居少禍胎今日憐君嶺南去當時笑我洛中來蟲全性命縁無毒木盡天年為不才大抵吉㓙多自致李斯一去二疏囘九年十一月二十一日感事而作禍福茫茫不可期大都早退似先知當君白首同歸日是我青山獨徃時願索素琴應不敢憶牽黄犬定難追麒麟作脯龍為醢何似泥中曳尾龜元註其日獨遊香山寺放言朝真暮偽何人辨古徃今來底事無但識臧生能詐聖可知寗子解佯愚草螢有耀終非火荷露雖圓豈是珠不取燔柴兼照乗可怜光彩亦何殊世途倚伏都無定塵網牽纒卒未休禍福迴環車轉轂榮枯反覆手藏鈎龜靈未免刳腸患馬失應無折足憂不信君看奕棋者輸贏須待局終頭贈君一法決狐疑不用鑽龜與祝蓍試玉要燒三日滿辨材須待七年期周公恐懼流言後王莽謙恭下士時向使當時身便死一生真偽復誰知誰家第宅成還破何處親賓哭復歌昨日屋頭堪炙手今朝門外好張羅北邙未審留閒地東海何曽有定波莫笑賤貧誇富貴共成枯骨兩如何泰山不要欺毫末顔子無心羨老彭松樹千年終是朽槿花一夕自為榮何須戀世常憂死亦莫嫌身漫厭生生去死來都是幻幻人哀樂係何情即目韓偓動非求進靜非禪咋口呑聲過十年溪漲浪花如積石雨晴雲葉似連錢干戈歲久諳戎事枕簟秋深減夜眠攻苦慣來無不可寸心如水但澄鮮惜春願言未偶非髙卧多病無心選勝遊一夜雨聲三月盡萬般人事五更頭年踰弱冠即為老節過清明却似秋應是西園花已落滿溪紅片向東流殘春旅舎旅舎殘春宿雨晴恍然心地憶咸京樹頭蜂抱花鬚落池面魚吹栁絮行禪伏詩魔歸淨域酒衝愁陣出竒兵兩梁免被塵埃汙拂拭朝簪待眼明春中湘中題岳麓寺僧舎羅隱蟾宫虎穴兩皆休來凭危欄送逺遊多事林鶯還謾語薄情邊雁不囘頭春融只待乾坤醉水濶深知世界浮欲共髙僧話心跡野花芳草奈相尤羅昭諫生當亂離多不得志哀怨之言下第羅鄴謾把青春酒一杯愁襟未信酒能開江邊依舊空歸去帝里還如不到來門掩殘陽鳴鳥雀花飛何處好池臺此時惆悵便堪老何用人間歲月催唐人下第情懐有如此者一名一第役天下士亦可憐矣安定城樓李商隱迢遞高城百尺樓緑楊枝外盡汀洲賈生年少虚垂涕王粲春來更逺遊永憶江湖歸白髮欲囘天地入扁舟不知腐鼠成滋味猜意鵷雛竟未休十二月十七日移病家居三首張耒老去塵懐痛洗前虚舟不繫任洄㳂寸心若變有如日萬事不憂終在天莫為饑寒棄南畆須知穮蓘有豐年桃符侲子喧門巷又向江城一歲捐慿髙游目快遐瞻落日孤雲與水兼萬頃澤空供雪意一枝梅笑破冬嚴擎蒼未減飛揚興引滿何辭斗石添楊栁催春兼警客荒溝照影弄纎纎從今羞復立功名鹵莽因循已半生心遣我愚應有謂眼看人智亦何成夢為蝴蝶因觀化目送飛鴻謾寄情堪笑妻兒懐土甚謫期未滿巳留行此三詩謫黄州時作消愁遣興順時達理引物觸類前輩多有之和堯夫打乖吟程顥打乖非是要安身道大方能混世塵陋巷一生顔氏樂清風千古伯夷貧客求易妙多攜巻天為詩豪剰借春儘把笑談親俗子徳容猶足畏鄉人聖賢事業本經綸肯與巢由繼後塵三幣未囘伊尹志萬鍾難換子輿貧且因經世藏千古已占西軒度十春時止時行皆有命先生不是打乖人邵堯夫一世豪傑而安於閒退理數之學胸中浩然時適有生如明道者知之伊尹伯夷顔子孟軻其志也非大說話寓歎陸游俗心浪自作棼絲世事元知似奕棋舊業蕭然歸亦樂餘生至此死何悲古人可作將誰慕造物無心豈自私已決殘春故流一作溪去短蓑垂釣月明時後寓歎貂蟬未必出兠鍪要是蒼鷹已下韝彭澤竟歸端為酒輕車已老豈須侯千年精衛心平海三日於菟氣食牛㑹與髙人期物外摩挲銅狄㶚陵秋前詩三四佳後詩六句豪俊嘉泰二年癸亥放翁年七十九在朝初歸雜詠雪滿漁蓑雨墊巾超然無處不清真胸中那可有一事天下故應無兩人騎馬每行秋棧路唤船還渡暮江津酒樓僧壁留詩遍八十年來自在身齒豁頭童儘耐嘲即今爛飯用匙抄朱門漫設千杯酒青壁寧無一把茅偶爾作官羞問馬頽然對客但稱猫此時定向山中死不用磨錢擲卦爻元註磨錢擲卦爻蜀龍昌期語也此翁七十九歸老詩龜堂獨坐遣悶放逐還山八見春枯顱槁頂雪霜新大床不解除豪氣凡眼安能識貴人食有淖糜猶足飽衣存短褐未全貧北窻坐卧君無笑拈起烏藤捷有神遣興莫笑龜堂磊磈胸此中元可貯虚空尚饒靈運先成佛那計辛毘不作公採藥偶逢丹井客買蓑因過玉霄翁不須更問歸何許散髮飄然萬里風書興占得溪山卜數椽飽經世故氣猶全入門明月真堪友滿榻清風不用錢便死也勝千百輩少留更望二三年湖橋酒美能來醉一棹何妨作水仙翁是年有詩云老出鄉閭右貧過仕宦初亦佳句蓋已八十四矣遣興幾看人間歲月新釣船猶繫鏡湖濱曽穿髙帝朝元仗却作山隂版籍民留病三分嫌太健忍饑半日未全貧早知晝錦能為祟翁子終身合負薪書齋壁平生憂患苦縈纒菱刺磨成芡實圓天下不知誰竟是古來唯有醉差賢過堂未悟鐘將釁睨柱誰知壁偶全自笑為農行没世尚如驚雁落空絃遣興侯印從來非所圖赤丁子亦不容呼着低怯對新棋敵量減愁添舊酒徒生世豈能常役役酣歌且復和嗚嗚扁舟到處皆吾境莫問桐江與鏡湖家住城南剡曲傍門前山色蘸湖光三朝執㦸悲年壯二頃扶犁樂歲穰名姓已隨身共隱文辭終與道相忘子孫勉守東臯業小甑呉粳底樣香五六好議論雜興散髮林間萬事輕夢魂安穩氣和平只知秋菊有佳色那問荒雞非惡聲達士招呼同嘯傲福人分付與功名一篇說盡逍遙理始信䝉莊是達生信筆范成大天地同浮水上萍羲娥迭耀案頭螢山中名器兩芒屨花下友朋雙玉缾童子昔曽誇了了主翁今但諾惺惺歸田贏得都無事輸與諸公汗簡青尾句是出處之間有感云云請息齋書事覆雨翻雲轉手成紛紛輕薄可憐生天無寒暑無時令人不炎涼不世情相栩筭來俱蝶夢喈喈能有幾雞鳴冰山側畔紅塵漲不隔瑤臺月露清刻木牽絲罷戱場祭終雨後兩相忘門雖有雀尚廷尉食已無魚休孟嘗蝨裏趨時真是賊虎中宣力任為倀籬東舎北誰情話雞語鷗盟意却長聚蚋醯邊鬧似雷乞兒爭肯向寒灰長平失勢見何晚栗里息交歸去來休問江湖魚有沬但期雲水鶴無媒巖扉岫幌牢扃鎖不是漁樵不與開今詳石湖此四詩乃淳熙十二年乙巳正月作時年六十歲也孤山寒食趙師秀三月芳菲在水邊旅人消困亦隨縁晴舒蝶羽初勻粉雨壓楊花未放綿有句自題閒處壁無錢難上貴時船最憐隱者髙眠地日日春風是管絃趙紫芝之戀戀西湖以終其生錢塘詩人大率如此當時昇平看人富貴以一身混其中亦不為大無聊也瀛奎律髓巻三十九

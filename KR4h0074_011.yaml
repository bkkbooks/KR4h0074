body:
  text: 瀛奎律髓卷十一元方回編夏日類南風之薰以解民愠以阜民財舜之詠也人皆畏炎熱我愛夏日長唐太宗之詠也所處之時同而所感之懷不同故宋玉有雌雄風之對焉五言二十九首陪諸貴公子丈八溝攜妓納涼晚際遇雨二首杜甫落日放船好輕風生浪遲竹深留客處荷淨納涼時公子調氷水佳人雪藕絲片雲頭上黑應是雨催詩以雨催詩自老杜作古前六句亦人之所不及雨來沾席上風急一作惡打船頭越女紅裙濕燕姬翠黛愁纜侵堤柳繫幔卷一作宛浪花浮歸路翻蕭颯陂塘五月秋兩詩皆尾句超脫此詩前四句有輕重謂船中有越之婦人焉亦有燕之婦人焉即富貴之家也南婦不怯風船則濕紅裙而已北婦不慣乘船而遇風故愁也未為茍且下語此當選宴集類中以主意納凉故入夏類熱雷霆空霹靂雲雨竟虛無炎赫衣流汗低垂氣不蘇乞為寒水玉願作冷秋菰何似兒童嵗風凉出舞雩起句十字凡上之人有驕聲而無實惠下之人名乍驚人而澤不及物者可以愧焉亦所以諷時事也本三首今取其一第二首云閉户人髙卧第三首云將衰骨盡痛皆不明言熱而熱已可見十年不解甲為爾一沾巾即老杜本色語也陪鄭廣文遊何將軍山林剩水滄江破殘山碣石開緑垂風折筍紅綻雨肥梅銀甲彈箏用金魚換酒來興移無灑掃隨意坐莓苔本十首選其一第二首云百頃風潭上千章夏木清此十首皆夏日詩也第六首云風磴吹隂雪雲門吼瀑泉酒醒思卧簟衣冷欲裝綿野老來看客河魚不取錢只疑淳朴處自有一山川尤佳今以切於夏日特取此第五首又重遊五首有云春風啜茗時當作薰風蓋皆夏日所作詩安得總云春風乎天寶未亂之前老杜在長安猶是中年其詩大槩富麗至晚年則尤髙古竒瘦也老杜又有仲夏流多水清晨向小園碧溪搖艇濶朱果爛枝繁之句亦夏日所當取者夏日即事裴說僻居門巷靜竟日坐階墀鵲喜雖傳信蛬吟不見詩筍抽過舊竹梅落立閒枝此際無塵撓僧來趂所宜集本與英華兩三字不同大率相似第五句尤好取之林館避暑羊士諤池島清隂裏無人泛酒船山蜩金奏響花露水晶圓靜勝朝還暮幽觀白已𤣥家林正如此何不賦歸田三四佳下句尤佳勝上句夏日登信州北樓李郢髙樓上長望百里見靈山雨歇河珠定雲開谷鳥還田苗映林合牛犢傍村閒始得銷憂處蟬聲催入關中四句尤佳却是第七句一斡有力謂髙樓之望政足銷憂而蟬已迫人入城矣始見無窮之味猶后山云登臨興不盡稚子故須還也游興未已而小兒童輩隨行但云欲歸非細味不見此二詩之妙夏晚劉得仁日夕得西風流光半已空山色漸凝碧樹葉即翻紅學淺慚多士秋成羡老農誰憐信公道不泣路途中有春晚詩矣未見夏晚詩也蓋言秋近而已三四佳第六句妙奉酬侍中夏中雨遊城南莊見示八韻白居易島樹間林巒雲收雨氣殘四山嵐色重五月水聲寒老鶴兩三隻新篁千萬竿化成天竺寺移得子陵灘心覺閒彌貴身緣健更歡帝將風后待人作謝公看甪里年雖老髙陽興未闌佳辰不見召爭免趂杯盤此乃和裴晉公詩甚工仲夏齊居偶題八詠寄微之及崔湖州腥血與葷蔬停來一月餘肌膚雖瘦損方寸任清虛體適通宵坐頭慵隔日梳眼前無俗物身外即僧居水榭風來逺松廊雨過初褰簾放巢燕投食施池魚久别閒游伴頻勞問疾書不知胡與越吏隱興何如有閒散之味苦熱頭痛汗盈巾連宵復達晨不堪逢苦熱猶賴是閒人朝客應煩倦農夫更苦辛始慚當此日得作自由身何以消煩暑端居一院中眼前無長物窗下有清風熱散由心靜凉生為室空此時身自得難更與人同閒可減暑靜足支暑兩詩能道此意可喜夏夜賈島原寺偏憐近開門景物澄磬通多葉罅月離片雲稜寄宿山中鳥相尋海畔僧唯愁秋色至乍可在炎蒸此詩前二韻特用生字而竒澀工緻五六亦故為此等句法末句亦好竒之所為也閒居晚夏姚合閒居無事擾舊病亦多痊選字詩中老看山屋外眠片雲侵落日繁葉咽鳴蟬對此心還樂誰知乏酒錢姚合學賈島為詩雖賈之終窮不及姚之終達然姚之詩小巧而近乎弱不能如賈之瘦徑髙古也當以此二公之詩細味觀之又於其集中深考斯可矣三四疑頗偏枯選字者殆於揀擇詩眼耳下句未稱夏日即事陳師道花絮隨風盡歡娛過眼空窮多詩有債愁極酒無功家在斜陽下人歸滿月中肝腸渾欲破魂夢更無窮以花絮對歡娛此等句法本老杜而簡齊尤深得之三四絶唱次韻夏日江村漏屋簷生菌臨江樹作門卷簾通燕子織竹護雞孫向夕微凉進相逢故意存何當加我嵗從子問乾坤三四句中有眼姜特立有云掃梁迎燕子插竹護龍孫四靈有云開門迎燕子汲水得魚兒皆落此後和應之盛夏張耒驅馬畏炎暑杜門常鮮歡吳綃朝扇薄越布夜衾單飲沼山禽渴沾泥雨果殘二年薇與蕨實厭野人餐夏日細徑依原僻茅簷四五家山田來雉溪雨熟桑麻竹籠晨收果茅菴夜守瓜頗知農事樂從子問生涯兩詩中四句皆景而不覺其冗夏日蚓壤排晴圃蝸涎印雨階花鬚嬌帶粉樹角老封苔問字病多忘過鄰慵却回晚凉還盥櫛對竹引清杯前四句皆景後乃言情唐人多此體北齊書志示兒輩陸游初夏佳風日頽然坐北齊百年從落魄萬事忌安排鄉俗能尊老君恩許賜骸饑寒雖未免何足繫吾懷律熟安排字好徐仲車聞安定先生莫安排之教所以學益進五月初作鄰舍舂新麥家人拾晚蠶推移逢夏五賦與歎朝三遣日須棋局忘饑賴酒甔幽居有髙致多取未為貪三四好五月十日韓琥片月生林白㳂流澗亦明幽人方獨夜山寺有微行野處偏宜夏貧家不厭晴薰風吹老鬢腐草見飛螢五六新美然三四亦幽淡郊原避暑葛天民有暑猶當避無憂可得忘竹疏身共瘦湖近意先凉靜勝寧須奕幽期不待觴還同殘夢樂炙背負朝陽僧義銛字朴翁以事還俗葛其姓無懷號也詩可及四靈恐尾句以負暄如避暑耳夏日曉荷承墜露晚岫障斜陽樹下地常䕃水邊風最凉蟬移驚鵲近鷺起得魚忙獨坐觀羣動閒消夏日長三四自然夏日懷友徐機流水階除靜孤眠得自由月生林欲曉雨過夜如秋逺憶荷花浦誰憐杜若洲良宵恐無夢有夢即俱游第四句好蓋是夏夜詩細味之十字皆好夏夜同靈暉有作奉寄趙二丈齊居惟少睡露坐得論文凉夜如清水明河似白雲宿禽翻樹覺幽磬渡溪聞欲識他鄉思斯時共憶君五六工夏初游謝公巖又取紗衣換天時起細風清隂花落後長日鳥啼中水國乘舟樂巗扉有路通州民多到此猶自憶髯公徐靈囦一作中名璣字致中豫許其詩在四靈中當居丁位學者細考之則信豫言夏日湖上訪隱士煩暑何能避孤舟訪隱人水鄉菱藕熟晴野稻苗新為學師前輩談空悟宿身鏡湖三百頃不似此湖濱第三句新又寄庭深自無暑苔徑復縈紆賓客不長到兒童自可娛荷花晴帶粉蒲葉晚凝珠與爾城闉隔兹歡想不殊第六句稍生七言二十首多病執熱懷李尚書之芳杜甫衰年正苦病侵凌首夏何須氣鬱蒸大水渺茫炎海接竒峰硉兀火雲升思霑道暍黃梅雨敢望宫恩玉井氷不是尚書期不顧山隂野雪興難乘末句即今人所謂打諢也夏日詩最難得好句若老杜長夏江村事事幽已選入郊野類惟此一首云途中盛夏丁謂山木無隂驛路長海風吹熱透蕉裳渴思西漢金莖露困憶南朝石步廊江上綸竿輸散誕林間冠褐負清凉下程欲選披襟處滿眼赬桐與佛桑此福建道中事崑體三四工苦熱錢惟演赫日烘霞鬭曉光雙紋枕簟碧牙牀頻傾蜜勺寧蠲渴久捧氷壺未覺凉雪嶺却思隨博望風窗猶欲傲羲皇更憐乳燕翻飛處深入盧家白玉堂亦崑體惟演公有擁旄等諸集夏日即事林逋石枕凉生菌閣虛已應梅潤入圖書不辭齒髮多衰疾所喜林泉有隱居粉竹亞梢垂宿露翠荷差影聚游魚北窗人在羲皇上時為淵明一起豫隱君子之詩其味自然不同五六下兩隻詩眼太工苦熱王安國出門無路避飛沙長夏那堪旱氣加永晝火雲空爍石華堂氷水未沈瓜月明葱嶺千秋雪風靜天河八月槎終借羽翰乘興往煩寃誰此戀生涯乞為寒水玉願作冷秋菰即此五六句也似有厭棄世緣之態中夏朝晡廣厦坐欹斜稍覺炎天氣象加紫玉簫攢湘竹笋赤霜袍爛海一作石榴花悠悠物外身無事擾擾人間智有涯五鼎一瓢何必問且憑詩句度年華三四乃倒裝句法夏詩之富艷者次韻夏日陳師道江上雙峰一草堂門閒心靜自清凉詩書發冢功名舊麋鹿同羣嵗月長句裏江山隨指顧舌端幽眇致張皇莫欺九尺鬚睂白解醉佳人錦瑟傍看格律又與宛丘同夏日雜興張耒牆下溪流清且長夾流喬木兩蒼蒼裊風翠果擎枝重照水圓荷舞葉凉蝸角已枯黏粉壁燕泥時落汚書牀南山野客閒相過贈我能攜藥滿筐夏日三首長夏村墟風日清簷牙燕雀已生成蝶衣晒粉花枝午蛛網添絲屋角晴落落疏簾邀月影嘈嘈虛枕納溪聲久判兩鬢如霜雪直欲樵漁過此生黃簾緑幕斷飛蠅午影當軒睡未興枕穩海魚鐫紫石扇凉山雪畫青繒廊隂日轉雕欄樹坐冷風生玉碗氷滿案詩書塵蠧甚故應疏懶過炎蒸棗徑瓜畦過雨香白衫烏帽野人裝幽花避日房房斂翠樹含風葉葉凉養拙久判藏姓字致身安事巧文章漢庭卿相皆豪傑不遇何妨白髮郎和朝應之大暑書事蓬門久閉謝來車畏暑尤便小閣虛青引嫩苔留鳥篆緑垂殘葉帶蟲書寒泉出井功何有白羽邀凉計巳疏忍待西風一蕭颯碧鱸青鱠意何如文潛此五首中三首入東萊文鑒每詩三四絶佳能言長夏景致精美夏日雜興蔬圃茅齊三畝餘溪光山影動浮虛病妻老去惟尋藥稚子年來解愛書中散無堪心放蕩馮唐已老興蕭疏全真養素安吾分敢謂軒裳不我如亦自然有味幽居初夏雨霽陸游楸花棟花照眼明幽人浴罷葛衣輕燕低去地不盈尺鵲喜傍簷時數聲對奕軒窗消永晝晒絲院落喜新晴忽驚重五無多日綵縷纏筒弔屈平熟之又熟初夏幽居虛堂一幅接䍦巾竹樹森疏夏令新瓶竭重招麯道士牀空新聘竹夫人寒龜不食猶能壽敝帚何施亦自珍枕簟北窗寧有厭小山終日尚嶙峋中四句游戲三昧麥熟市米價減鄰里病者亦皆愈欣然有賦凶年已度麥方秋學道從來幸寡求荷鍤自隨身若寄漉籬可賣飯何憂鄰翁瀕死復相見村市小涼時獨游不怕歸時又侵夜新添略彴跨清溝三四善用事五有感六自然幽居初夏藤冠草履病支離門外紛紛百不知解籜有聲驚倦枕飛花無力㸃清池閒思舊事唯求醉老感流年只自悲緑樹隂中紅練起一團零亂濕胭脂第四句絶妙五月初夏病體輕偶書世事紛紛了不知又逢燕乳麥秋時經年謝客常因醉三日無詩自怪衰乘雨細移西崦藥留燈重覆北窗棋但將生死俱拈起造物從來是小兒第四句可見此翁無日無詩所以熟所以進所以不可及夏日二首吳中五月暑猶微竟日南堂坐掩扉緑樹露香鶯獨語畫廊風惡燕雙歸三千界內人人錯七十年來念念非投老萬緣俱掃盡從今僧亦不須依梅雨初收景氣新太平阡陌樂閒身陂塘漫漫行秧馬門巷隂隂掛艾人白葛烏紗稱時節黃雞緑酒聚比鄰掀髯一笑吾真足不為無錐更歎貧真詩人難得如此格律信手圓成不喫一絲毫力也瀛奎律髓卷十一

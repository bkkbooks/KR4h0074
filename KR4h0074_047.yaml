body:
  text: 瀛奎律髓卷四十七元方回編釋梵類經來白馬寺僧到赤烏年釋氏之熾於中國久矣士大夫靡然從之適其居友其徒或樂其説且深好之而研其所謂學此一流也至唐韓昌黎始辭而闢之其送文暢澄觀靈師惠師雖皆有詩未嘗漸染其教也而詩家者流又能精述其趣味之奧使人玩之而不能釋亦豈可謂無補於身心者哉凡寺院菴寮題詠皆附於此五言二百四首酬暉上人獨坐山亭有贈陳子昻鐘梵經行處香牀坐入禪巖亭交雜樹石瀨瀉鳴泉水月心方寂雲霞思獨玄寧知人代裏疲病得攀援盛唐人詩多以起句十字為題目中二聨寫景詠物結句十字撇開却説别意此一大機括也靈隱寺駱賓王鷲嶺鬱岧嶤龍宫隱寂寥樓觀滄海日門聽浙江潮桂子月中落天香雲外飄捫蘿登塔遠刳木引泉遙霜薄花更發冰輕葉互雕夙齡尚遐異搜對滌煩囂會入天台裏看豫渡石橋唐史言宋之問詩比於沈庾精密又加靡麗蓋律體之祖也或者謂此詩之問首吟二句而禪榻老僧遽續數聯實駱賓王逃難削髮在寺為之豫著名僧詩話已詳著其説兩存之可也稱心寺宋之問征帆恣遠尋逶迤過稱心凝滯蘅茝岸沿洄樝柚林穿溆不厭曲艤潭惟愛深為樂凡幾許聽取舟中琴此猶未盡脫齊梁陳隋體也庾信詩多如此登總持寺浮圖梵宇出三天登兹望八川開襟俯城闕揮手拍雲煙函谷春山外昆池落日邊東京楊栁陌少别遂經年此即自成唐律詩擺脫陳隋矣陪潤州薛司空丹徒桂明府遊招隱寺共尋招隱寺初識戴顒家還依舊泉壑應改昔雲霞緑竹寒天笋紅蕉臘月花金繩倘留客為繫日光斜五六富艷遊法華寺十韻髙岫擬耆闍真乘引妙車空中結樓殿意表出雲霞後果傳三足前因感六牙宴林薰寶樹水溜滴金沙寒谷梅猶淺溫庭橘半華臺香紅藥亂塔影緑篁遮果漸輪王族緣超梵帝家晨行踏忍草夜誦得靈花江郡將何匹天都亦未加朝來泛舟所應是逐仙槎此詩工甚青鳥三足白象六牙工之至矣遊少林寺沈佺期長歌遊寶地徙倚對珠林雁塔風霜古龍池歲月深紺園澄夕霽碧殿下秋隂歸路煙霞晚山蟬處處吟唐律詩初盛少變梁陳而富麗之中稍加徑健如此者是也遊梵宇三覺寺王勃杏閣披青磴雕臺控紫岑葉齊山路狹花積野壇深蘿幌栖禪影松門聽梵音遽欣陪妙躅延賞滌煩襟四十字無一字不工豈減沈佺期宋之問哉裴行儉以器識一語少王楊盧駱彼專以富貴骨相取人而文之以器識之説吾未見裴之合於四子也賓王檄武氏一抔之土未乾六尺之孤安在氣蓋萬古雖敗而死何傷或謂亡命為僧亦未必然唐律詩之初前六句敘景物末後二句以情致繳之周伯弜四實四虛之説遂窮焉酬思玄上人林泉四首取二駱賓王聞君招隱地髣佛武陵春緝芰知遠楚披蓁似避秦崩查年祀積幽草歲時新一謝滄浪水安知有逸人芳晨臨上月幽賞狎中園有蝶堪成夢無羊可觸藩忘懷南澗藻蠲忿北堂萱坐歎華滋歇思君誰為言後兩首有云客有遷鶯處人無結駟來又云芳杜湘君曲幽蘭楚客詞山中有春草長似寄相思皆才髙思爽豫選此詩信手看其前後甚多佳句北眺云既出封泥谷還過避雨陵淮口云從帝留餘地封王表舊城岸昏函蜃氣潮滿應雞聲守歲云夜將寒色去年共曉光新如荷香銷晚夏菊氣入新秋橘氣行應化蓬心去不安皆可書但情味寥落多不得志之辭云春日上方即事王維好讀髙僧傳時看辟穀方鳩形將刻杖龜殼用支牀栁色春山映花明夕鳥藏北窗桃李下間步但焚香三四新異登辨覺寺竹徑連初地蓮峯出化城窗中三楚盡林外九江平軟草承趺坐長松響梵聲空居法雲外觀世得無生此似是廬山僧寺三四形容廣大其語即無雕刻而窗中林外四字一了數千里佳甚題融公蘭若孟浩然精舍買金開流泉繞砌回芰荷薰講席松柏映香臺法雨晴飛去天花書下來談玄殊未已歸騎夕陽催陪姚使君題惠上人房帶雪梅初暖含煙栁尚青來窺童子偈得聽法王經會裏知無我觀空厭有形迷心應覺悟客思未遑寧浩然于佛法亦深有所得此篇五六語意明白無礙張丞相經玉泉長韻云聞鐘鹿門近照膽玉泉清尤佳春日歸山寄孟浩然李白朱紱遺塵境青山謁梵筵金繩開覺路寶筏渡迷川嶺樹攢飛栱嵒花覆谷泉塔形標海月樓勢出江煙香氣三天下鐘聲萬壑連荷秋珠已滴松密蓋初圓鳥聚疑聞法龍參若護禪愧非流水韻叨入伯牙絃太白負不羈之才樂府大篇翕忽變化而此一律詩乃工夫縝密如此杜審言宋之問相伯仲别有贈浩然詩曰醉月頻中聖迷花不事君雖飄逸不如此詩之端整以其多禪語也以入釋梵類宿贊公房杜甫杖鍚何來此秋風已颯然雨荒深院菊霜倒半池蓮放逐寧違性虛空不離禪相逢成夜宿隴月向人圓贊公謫居秦州即在長安賊中時大雲寺長老也嘗有四詩宿其房今又於隴郡相逢也乾元二年己亥年四十八矣謁真諦寺禪師蘭若山髙處煙霞障幾重凍泉依細石晴雪落長松問法看詩妄觀身向酒慵未能割妻子卜宅近前峯凡詩只如此作自伶俐前四句景而起句為題目後四句情而結句有合殺和裴迪登新澤寺寄王侍郎王時牧蜀何限倚山木吟詩秋葉黃蟬聲集古寺鳥影度寒塘風物悲遊子登臨憶侍郎老夫貪佛日隨意宿僧房老杜詩警句無不以為著題詩矣其不甚緊切之句如有客傳河尹如他鄉推表弟如君王問長卿如登臨憶侍郎亦人所膾炙復引用之即自典雅何也學詩者而不熟老杜可乎題玄武師屋壁何年顧虎頭滿壁畫瀛洲赤日石林氣青天江水流錫飛常近鶴杯渡不驚鷗似得廬山路真隨惠遠遊此是題詩於所畫之壁皆指畫而賦之曰錫飛曰杯渡皆畫中事也似得廬山路而真隨惠遠遊言畫也秦州雜詩秦州山北寺勝迹隗囂宫苔蘚山門古丹青野殿空月明垂葉露雲逐度溪風清渭無情極愁時獨向東此詩晚唐人聲調一同五六極天下之工第七句天生此語山寺野寺殘僧少山園細路髙麝香眠石竹鸚鵡啄金桃亂水通人過懸崖置屋牢上方重閣晚百里見纎毫五六新異末句開濶上牛頭寺青山意不盡衮衮上牛頭無復能拘礙真成浪出遊花濃春寺靜竹細野池幽何處啼鶯切移時獨未休後四句工麗清婉上兜率寺兜率知名寺真如會法堂江山有巴蜀棟宇自齊梁庾信哀雖久何顒好不忘白牛車遠近且欲上慈航韓魏公謂人才須入粗入細老杜詩不有前詩何以入細此一詩三四忽又如此廣遠五六古淡有意遊修覺寺野寺江天豁山扉花竹幽詩應有神助吾得及春遊徑石相縈帶川雲自去留禪枝宿衆鳥漂轉暮歸愁讀老杜詩首首不同此又是一格己上人茅齋已公茅屋下可以賦新詩枕簟入林僻茶瓜留客遲江蓮搖白羽天棘蔓青絲空忝許詢輩難酬支遁辭天棘或云麥門冬也蔓或作夢非此乃老杜中年前詩題遠公經臺祖詠蘭若無人到真僧出復稀苔侵行道席雲濕坐禪衣澗鼠緣香案山蟬噪竹扉世間長不見寧止暫忘歸第四句濕字好澗一作溪晚過磐石寺禮鄭和尚岑參暫詣髙僧話來尋野寺孤岸花藏水碓溪竹映風爐頂上巢新鶴衣中得舊珠談禪未得去輟棹且踟蹰水碓風爐自然成對同崔三十侍御灌口夜宿報恩寺同君尋野寺夜一作便宿支公房溪月冷深殿江雲擁回廊燃燈松林靜煮茗柴門香勝事不可接相思幽興長律詩中之拗字者庾信詩愛如此五六眼前事但安排得雅淨題少室山寺褚朝陽飛閣青霞裏先秋獨早涼天花映窗近月桂拂簷香華嶽三峯小黃河一帶長空間指歸路煙際有垂楊第二句好第四句亦佳經廢寺顧况不知何世界有似處南朝石路無人掃松門被火燒斷幡猶挂剎故板尚搘橋數卷殘經在多年字欲銷五六猶字尚字稍相犯起度律師同居東齋院韋應物釋子喜相偶幽林俱避喧安居同僧夏清夜諷道言對閣景恆宴步庭隂始繁逍遙無一事松風入南軒淡而有味秋日過鴻舉法師寺院劉禹錫看畫長廊遍尋僧一徑幽小池兼鶴淨古木帶蟬秋客至茶煙起禽歸講席收浮杯明日去相望水悠悠題招隱寺隱士遺塵在髙僧精舍開地形臨渚斷江勢觸山回楚野花多思南禽聲例哀殷勤最髙頂間即望鄉來劉夢得詩老辣不可以粧點並觀宿誠禪師山房題贈不出孤峯上人間四十秋視身如傳舍閲世甚東流法為因緣立心從次第修中宵問真偈有住是吾憂第四句甚字下得妙送文暢上人東遊得道即無著隨緣西復東貌依年臘老心到夜禪空山宿馴溪虎江行濾水蟲悠悠塵客思春滿碧雲中旅次景空寺宿幽上人院不與人境接寺門開向山暮鐘鳴鳥聚秋雨病僧間月隱雲樹外螢飛廊宇間幸投花界宿暫得靜心顔晚春登天雲寺南樓贈常禪師花盡頭新白登樓意若何歲時春日少世界苦人多愁醉非因酒悲吟不是歌求師治此病唯聽讀楞伽龍化寺主家小尼郭代公愛姬薛氏幼嘗為尼小名仙人子頭青眉眼細十四女沙彌夜靜雙林怕春深一食飢步慵行道困起晚誦經遲應似仙人子花宫未嫁時題報恩寺好是清涼地都無繫絆身晚晴宜野寺秋景屬間人淨石堪敷坐寒泉可濯巾自慚衰鬢上猶帶郡庭塵三四雅淡武丘寺路元注去年重開寺路桃李蓮荷約種數千株自開山寺路水陸往來頻銀勒牽驕馬花船載麗人芰荷生欲遍桃李種仍新好在湖堤上長留一道春第四句詩興俱麗春日與劉評事過故證一作澄上人院楊巨源曾共劉咨議同時事道林與君方掩淚來客是知心階雪凌春積鐘煙向夕深依然舊童子相送出花隂五六細潤送僧歸太白山賈島堅冰連夏處太白接青天雲塞石房路峯明雨外巔夜禪臨虎穴寒潄撇龍泉後會不期日相逢應信緣宿山寺衆岫聳寒色精廬向此分流星透疏木走月逆行雲絶頂人來少髙松鶴不羣一僧年八十世事未曾聞贈無懷禪師身從歷劫修果以此生周禪定石牀暖月移山樹秋捧盂觀宿飯敲磬過清流不掩玄關路教人問到頭第五句何其窮之極也三四佳送去華法師在越居何寺東南水路歸秋江洗一鉢寒日晒三衣默聽鴻聲盡行看蝶影飛囊中無寶貨船戶夜扄稀後六句皆好送無可上人圭峯霽色新送此草堂人塵尾同離寺蛩鳴暫别親獨行潭底影數息樹邊身終有煙霞約天台作近鄰五六絶唱送賀蘭上人野僧來别我略坐傍泉沙遠道擎空鉢深山踏落花無師禪自解有格句堪誇此去非緣事孤雲不定家靈凖上人院掩扉當太白臘數等松椿禁漏來遙夜山泉落近鄰經聲終卷曉草色幾芽春海內知名士交遊凖上人末句直道其事亦是一法題青龍寺鏡公房一夕曾留宿終南搖落時孤燈岡舍掩殘磬雪風吹樹老因寒折泉深出井遲疏慵豈有事多失上方期中四句已佳尾句謂疏慵之人有何事乎而多失上方之約亦竒也就可公宿十里尋幽寺寒流數𣲖分僧同雪夜坐雁向草堂聞靜語終燈熖餘生許嶠雲猶來多抱疾聲不達明君哭宗密禪師鳥道雪岑巔師亡誰去禪几塵增滅後樹色改生前層塔當松吹殘蹤傍野泉唯嗟聽經虎時到壞菴邊哭柏巖禪師苔覆石牀新師曾占幾春寫留行道影焚却坐禪身塔院關松雪經房鎖隙塵自嫌雙淚下不是解空人歐公謂第四句似燒殺活和尚誠亦可議然詩格自好律僧張籍苦行長不出清羸最少年持齋唯一食講律豈曾眠避草每移徑濾蟲還入泉從來天竺法到此幾人傳山中贈日南僧獨向雙峯老松門閉兩涯翻經上蕉葉挂衲落藤花甃石新開井穿林自種茶時逢海南客蠻語問誰家遊襄陽山寺秋色江邊路煙霞若有期寺貧無施利僧老足慈悲薜荔侵禪窟蝦蟇占浴池間遊殊未遍即是下山時司業三詩皆平易惟蝦蟇占浴池一句怪異貽小尼師王建新剃青頭髮生來未掃眉身輕禮拜穩心慢記經遲喚起猶侵曉催齋已過時春晴階下立私地弄花枝褻侮已甚人家好兒女何為落於尼寺過無何上人院姚合寥寥聽不盡孤磬與疏鐘煩惱師長别清涼我暫逢蟻行經古蘚鶴毳落深松自想歸時路塵埃復幾重五六參入賈浪仙也寄紫閣無名頭陀自新羅來峭行得如如誰分聖與愚不眠知夢妄無號免人呼山海禪一作法皆遍華夷佛豈殊何因接師話清淨在斯須佛本生於西夷而染於中華今曰華夷佛豈殊是妄生分别相也第新羅之人亦有佛性以此推之即通寄無可上人十二門中寺詩僧寺獨幽多年松色别後夜磬聲秋見世慮皆盡來生事更修終須執瓶鉢相逐入牛頭見世慮皆盡固人之所難來生事更修此理恐不然也此詩却自可觀寄石橋僧項斯逢師入山日道在石橋邊别後何一作無人見秋來幾處蟬溪中雲隔寺夜半雪一作雨添泉生有天台約知無却出緣五六佳寄坐夏僧坐夏日偏長知師在律堂多因束帶熱更憶剃頭涼苔色侵經架松隂到簟牀還應煉詩句借卧石池傍送僧歸南嶽心知衡嶽路不怕去人稀船裏誰鳴磬沙頭自曝衣有家從小别是寺即言歸料得逢春住當禪雲滿扉五六瘦淡贈海明上人耿湋來自西天竺持經奉紫微年深梵語變行苦俗流歸月上安禪久苔生出院稀梁間有馴鴿不去為忘一作無機中兩聯皆下句勝上句寄太白無能禪師顧非熊太白山中寺師居最上方獵人偷佛火櫟鼠戲禪牀定久衣塵積行稀徑草長有誰來問法林杪過殘陽中四句俱工歲莫自廣江至新興往復中題峽山寺許渾夜醉晨方醒孤吟恐失羣海鰌潮上見江鵠霧中聞未臘梅先實經一作終冬草自薰樹隨山崦合泉到石稜分虎迹空林雨猿聲絶嶺雲蕭蕭異鄉鬢明日共絲棼許丁卯此四首詩題峽山寺其實廣東風土也詩句句工但太工則形勝於神耳薄暮緣西峽停橈一訪僧鷺巢橫卧栁猿飲倒垂藤水曲巖千疊雲重樹百層山風寒殿磬溪雨夜船燈灘漲危槎沒泉衝怪石崩中臺一襟淚歲杪别良朋密樹分蒼壁長溪抱碧岑海風聞鶴遠潭日見魚深松蓋環清韻榕根架緑隂南方大葉榕樹枝危者輒生根垂入地如柱大洞丁多斫石蠻女半淘金端州斫石塗涯縣淘金為業南浦驚春至西樓送月沉江流不過嶺何處寄歸心月在行人起千峯復萬峯海虛爭翡翠溪邏鬬芙蓉南方呼市為虛呼戍為邏新州有翡翠虛芙蓉邏也古木髙生斛隂池滿種松木斛花生於他樹槎枿池沼多松謂之水松也火探深洞燕香送遠潭龍南方持火於乳泂中取燕而食廣州悅城縣有溫媪龍即蛇也隨水往舟船至人家或千里外皆以香酒果送之藍塢寒先燒禾堂晚併舂種藍多在塢中先燒其地人以木槽為舂禾謂之舂堂更投何處宿西峽隔雲鐘下第寓居崇聖寺感事懷玉泣京華舊山歸路賒靜依禪客院幽學野人家林晚鳥爭樹園春蜂護花東門有間地惟種邵平瓜洛東蘭若夜歸一衲老襌床吾生半異鄉管絃愁裏老書劍夢中忙鳥急山初暝蟬稀樹正涼又歸何處去塵路月蒼蒼丁卯詩格頗卑句太偶此二詩各有一聯佳亦不可廢孤山寺張祜樓臺聳碧岑一徑入湖心不雨山常潤無雲水自隂斷橋荒蘚合空院落花深猶憶西窗夜鐘聲出北林此詩可謂細潤然太工太偶合一本作澀惠山寺舊宅人何在空門客自過泉聲到池盡山色上樓多小洞穿斜竹重階夾細莎殷勤望城市雲外暮鐘和此詩同前三四尤工五六則工而窘於冗矣以前聯不可廢也故取之題虎丘東寺雲樹擁崔嵬深行異俗埃寺門山外入石壁地中開俯砌池光動登樓海氣來傷心萬年意金玉葬寒灰杜牧謂誰人得似張公子千首詩輕萬戶侯今傳者五言律三卷絶句二卷無七言律與古詩也所逸多矣僧寺詩二十四首金山寺詩第一亦當為集中第一孤山寺惠山寺詩次之此詩非親到虎丘寺不知第四句之工髙堂之後俯視石澗兩壁相去數尺而深乃數十丈其長蜿蜒曼衍而坼裂到底泉滴滴然真是竒觀故其詩曰石壁地中開非虛也故選此詩以廣見聞登樓海氣來此一句亦佳他如地僻泉長冷亭香草不凡題道光上人院亦佳至如上坡松徑澀深坐石池清之類則非人可到矣題金山寺許棠四面波濤匝中流日月鄰上窮如出世下瞰忽驚神剎一作塔礙長空鳥船通外國人房房皆疊石風掃永無塵五六亦竒絶誰言張處士詩後更無人亦可著此語也長安逢江南僧崔塗孤雲無定蹤忽到又相逢説盡天涯事聽殘上國鐘問人尋寺僻乞食過街慵憶到曾栖處開門對數峯本色當行詩贈休糧僧聞鐘獨不齋何事更關懷靜少人過院間從草上階生臺無鳥下石路有雲埋為隱禪中舊時猶夢百崖第四句絶妙寄貫休吳融休公何處在知我宦情無巳似馮唐老方知武子愚一身仍更病雙闕又須趨若得重相見冥心學半銖向承阮梅峯秀實惠書言詩不可多用古人名謂之點鬼簿晚唐人皆不敢下惟老杜最多吳融韓偓在晚唐之晚乃頗參老杜如此一聯豈不佳寄尚顔師僧中難得靜靜得是吾師到闕不求紫歸山祗愛詩臨風翹雪足向日剃霜髭自歎眠漳久雙林動所思題破山寺常建清晨入古寺初日照髙林竹徑通幽處禪房花木深山光悅鳥性潭影空人心萬籟此俱寂惟聞鐘磬音歐公喜此詩三四不必偶乃自是一體蓋亦古詩律詩之間全篇自然經廢寶慶寺司空曙黃葉前朝寺無僧寒殿開池晴龜出曝松暝鶴飛回古砌碑橫草隂廊畫雜苔禪宫亦銷歇塵世轉堪哀此必武宗廢寺之後有此詩句句工尾句尤不露冬日題邵公院劉得仁無事關多掩隂階竹拂苔徑風吹雪聚渴鳥啄冰開樹向寒山得人從瀑布來終期天目老擎錫逐雲回三四用工至矣唐人作詩不緊要處模寫得直是精神秋夜宿僧院禪寂無塵地焚香話所歸樹搖幽鳥夢螢入定僧衣破月斜天半髙河下露微翻令嫌白日動即與心違螢入定僧衣此一句古今無之他有坐學白塔骨坐石鳥疑死刻苦太甚不如此之間雅尾句尤髙題薦福寺衡嶽禪師房韓翃春城乞食還髙論此中間僧臘階前樹禪心江上山疏簾看雪捲深戶映花關晚送門人去鐘聲杳靄間第三句最佳五六近套尾句乃有味也題龍興寺淡師房雙林彼上人詩興轉相親竹裏經聲晚門南山色春卷簾苔色淨下筯藥苗新記取無生理歸來問此身五六眼前事耳但一味此句便不可捨喜鮑禪師自龍山至劉長卿故居何日下春草欲芊芊猶對山中月誰聽石上泉猿聲知後夜花發見流年杖錫間來往無心到處禪五六佳寄靈一上人髙僧本姓竺開士舊名林一去春山裏千峯不可尋新年芳草遍終日白雲深欲徇微官去懸知訝此心劉長卿號五言長城細味其詩思致幽緩不及賈島之深峭又不似張籍之明白蓋頗欠骨力而有委曲之意耳郎士元集亦有此詩題云赴無錫别雲一上人終作度徇作問酬普選二上人嚴維本意宿東林因聽子賤琴遙知大小朗已斷去來心夜靜溪聲近庭寒月色深寧知塵外意定後更成吟五六似淺近細味之亦不可棄别至𢎞上人最稱𢎞偃少早歲草茅居年老從師律生知解佛書衲衣求壞帛野飯拾春蔬章句無求斷詩中學有餘五六可觀三四亦不草草華下送文涓司空圖郊居謝名利何事最相親漸與論詩久皆知得句新川明虹照雨樹密鳥衝人應念從今去還來嶽下頻一鳴集嘗自誇數聯五六其一也其實工密三四亦自然近中有遠遊歙州興唐寺張喬山橋通絶境到此憶天台竹裏尋幽徑雲邊上古臺鳥歸殘照出鐘斷細泉來為愛澄溪月因成隔宿回此吾州水西太平寺也在唐時謂之興唐寺五六佳末句謂溪清而月可愛因留至隔宿亦善於立論以歙溪極天下之清者甘露寺東軒周繇每日憐晴眺間吟只自娛山從平地有水到遠天無老樹多封楚輕煙暗染吳雖居此廊下入戶亦踟蹰京口甘露寺俯瞰大江遠眺溟海委的是此山從平地突起水與天接其言無一字虛也宿山寺張蠙中峯半夜起忽覺在青冥下界自生雨上方猶有星樓髙鐘獨遠殿古像多靈好是潺湲水房房伴誦經三四已佳五六尤佳第六句無人曾道末句亦可佳也逢播公周賀帶病稀相見西城早晚來山衣風壞帛香印雨沾灰坐久鐘聲遠禪餘嶽影回却思同宿夜髙枕説天台第六句絶好賀乃清塞上人還俗故於僧詩尤熟宿杼山晝公禪堂從作西河客别離經半年却來峯頂宿知廢井南禪積靄沉斜月孤燈照落泉何當間事盡相伴老溪邊試於山寺夜宿崖有落泉壁有孤燈而思此句則見其有味矣贈胡僧瘦形無血色草屨著行穿間話似持咒不眠同坐禪背經來漢地袒膊過冬天情性人難會遊方應信緣此詩似覺粗率然今西域僧有此輩乃相率為丐之徒間話似持咒本是戲言其語言之不可通至如袒膊過冬天蓋所啖有麻藥一食之不飢亦不寒亦能耐大暑愚俗不悟耳至解藥飱肉酒不可以數計云休糧僧一齋難過日况是更休糧養力時行道聞鐘不上堂唯留溫藥火未寫化金方舊有山厨在從僧請作房怪人也不食而私於食者溫藥化金又似是道流事柏巖禪師野寺絶依念靈山曽遍行老來披衲重病後讀經生乞食嫌村遠尋溪愛路平多年柏巖住不記柏巖名即賈島所哭者三四及尾句俱佳入靜隱寺途中作亂雲迷遠寺入路認青松鳥道緣巢影僧鞋印雪蹤草煙連野燒溪霧隔霜鐘更遇樵人問猶言過數峯賀與賈島本皆僧也故於僧寺詩為善能著題鳥道之行不曰緣樹影而曰緣巢影所以為佳五六微冗尾句則又妙矣他如送禪僧云坐禪山店暝補衲夜燈微又如夏髙移坐次齋身疾色濃講次樹生枝皆是僧家滋味俗人所難道者故書之哭間宵上人林徑西風急松枝講鈔餘凍髭亡夜剃遺偈病時書地燥焚身後堂空著影初吊來頻落淚曾憶到吾廬哭僧詩賈島於柏巖宗密二人至矣此詩三四亦可佳第五句頗險夫然後知詩之難也空寂寺悼元上人錢起凄然雙樹下垂淚遠公房燈續生前火爐添殁後香隂階明片雪寒竹響空廊寂滅應為樂塵心徒自傷尾句即賈島不是解空人西郊蘭若羊士諤雲天宜北戶塔廟似西方林下僧無事江清日正長石泉盈掬冷山實滿枝香寂寞傳心印無言亦已忘五六有夏間山居之景眼前事只他人自難道也遊東林寺黃滔平生愛山水下馬虎溪時已到終嫌晚重遊預作期寺寒三伏雨松偃數朝枝翻譯如曾見白蓮開滿池黃滔何人此詩三四舉唐人無此淡而有味之作五六佳瀑布寺真上人院鄭巢林疏多暮蟬師去宿山煙古壁燈熏畫秋琴雨慢絃竹間窺遠鶴巖上取新泉西嶽莎房在歸期更幾年司空圖有山雨慢琴弦之句此亦暗合其聯甚佳題任處士創資福寺魚玄機幽人創竒境遊客駐行程粉壁空留寺蓮宫未有名鑿池泉自出開徑草重生百尺金輪閣當川豁眼明魚乃女道士之類題初創寺故云蓮宫未有名五六雖淺近亦不為無味甘露寺孫魴寒暄皆有景孤絶畫難形地拱千尋險天垂四面青晝燈籠雁塔夜磬徹漁汀更愛僧房外波光滿戶庭魴有金山詩驚濤濺佛身之句有病不如過櫓妨僧定上句佳如天多剩得月地少不生塵亦不逮張祜而云誰言張處士詩後更無人涉乎誇誕此詩第四句最好尾句亦佳五六則套話也題雲際寺上方廬綸松髙蘿蔓輕中有石牀平下界水長急上方燈自明空門不易啓初地本無程回步忽山盡萬緣從此生五六善於言禪用啓字程字貼門與地而不見其迹同徐城李明府遊重光寺題晃師房劉商野寺僧房遠陶潛引客來鳥喧殘果落蘭敗幾花開真性知無住微言欲望回竹風清磬晚歸策步蒼苔蘭敗之後有幾種花開此意甚深月中宿雲巖寺上方溫庭筠虛閣披衣坐寒階踏葉行衆星中夜少圓月上方明靄盡無林色喧餘有澗聲祗應愁恨事還逐曉光生衆星至中夜而少以圓月之明在上方也乃一句法五六尤得月夜清寂之味題中南佛塔院鳴泉隔翠微千里到柴扉地勝人無欲林昏虎有威澗苔侵客履山雪入禪衣桂樹芳隂在還期歲晏歸三四新異登蔣山開善寺崔洞山殿秋雲裏香煙出翠微客尋朝磬食一作室僧背夕陽歸下界千門見前朝萬事非看心兼送目葭菼暮依依三四已佳五六尤佳以第六句出於不測也題宇文裔山寺讀書院于鵠讀書林下寺不出動經年草閣連僧院山厨共石泉雪庭無履迹龕壁有燈煙年少今頭白刪詩到幾篇遊雲際寺喻鳬澗壑吼風雷香門集作禪關絶頂開閣寒僧不下鐘定虎常一作長來鳥啄林梢果鼯跳竹裏苔心源暫無一作無一事塵界擬休回三四佳題維摩暢上人房朽枿集作寒櫟李洞諸方遊幾臘五夏五峯銷越講迎騎象一作馬蕃齋懴射雕冷笻書雪倚寒櫟話雲燒從此棲林老瞥然三萬朝李洞學賈浪仙詩至鑄其像而事之此詩工甚三四怪異五六亦佳宿鳳翔天柱寺窮易玄上人房天柱暮相逢吟思天柱峯墨研清露月茶吸白雲鐘卧語身黏蘚行禪頂拂松探一作深玄為一訣一作決明日去臨卭五六眼前事但善於措置則工拙在絲髮之間耳遊西霞寺皮日休不見明居士空山但寂寥白蓮吟次缺青靄坐來銷泉泠無三伏松枯有六朝何時石上月相對論逍遙三四細看有味五六忽然出竒宿澄泉蘭若鄭谷山半古招提空林雪月迷亂流分石上斜漢在松西雲集寒菴宿猿先曉磬啼此心如了了祗此是曹溪末句好谷詩多用僧字凡四十餘處題江島僧居在江之心杜荀鶴師愛無塵地江心島上居接船求化慣登陸赴齋疏載土春栽樹拋生日飫魚入雲蕭帝寺畢竟欲何如以所居在江水中故五六佳封禪寺居羅隱盛禮何由覩嘉名偶寄居周南太史淚蠻徼長卿書砌竹搖風直庭花泣露疏誰能賦秋興千里隔吾廬題是封禪寺昭諫身居亂世故起句曰盛禮何由覩竒哉句也三四好豈可全不用事善用事者不冗題嶽州僧舍裴説喜到重湖地孤洲橫晚煙鷺銜魚入寺鴉接飯隨船松檜君山逈菰蒲夢澤連與師吟論處秋水浸遙天洲一作舟三四極其新異五六亦狀嶽州僧舍可謂切題豫嘗登嶽陽樓乃知此詩之佳靜林寺僧靈一靜林溪路遠蕭帝有遺蹤水擊羅浮磬山鳴于闐鐘燈傳三世火樹老五株松無數煙霞色空聞昔卧龍第五句最竒下句亦稱懷舊僧皎然一坐西林寺從來未下山不因尋長者無事到人間宿雨愁為客寒花笑未還空懷舊山月童子念經間杼山皎然詩意句律平淡及識顔真卿交韋應物天寶大歷間人皎然字清晝謝靈運十世孫居杼山湖州人真卿為湖州刺史皎然為其著論宿吳匡山破寺雙峯百戰後真界滿塵埃蔓草緣空壁悲風起故臺野花寒更發山月暝還來何事池中水東流獨不回廢寺詩司空曙為冠此亦可觀宿西嶽白石院僧無可白石上嵌崆寒雲西復東瀑流懸往處雛鶴失禪中嶽壁松多古壇基雪不通未能親近去擁褐愧相同第四句竒廢山寺千峯盤磴盡林寺昔年名步步入山影房房聞水聲多年人迹絶殘日石隂清便可求居止安間過此生無可稱賈島為從兄詩遠不及之而世人多稱為島可何耶可之詩惟髙杉殘子落深井凍痕生及聽雨寒更盡開門落葉深為最已别收矣送僧四海無拘繫行心興自濃百年三事衲萬事一枝笻夜減當晴影春消過雪蹤白雲深處去知宿在何峯第五句最髙絶日晴有影為伴至夜則又減去言其孤之極也為僧不孤又惡乎可送贊律師歸嵩山禪意歸心急山深定易安清貧修道苦孝友别家難雪路尋溪轉花宫映嶽看到時孤塔暮松月向人寒為僧以清苦為事是也然孝友之天猶在則别家亦難所謂出家者何其忍然棄骨肉耶存此詩以見豫志駕幸天長寺應制僧廣宣天界宜春賞禪門不掩關宸遊雙闕外僧引百花間車馬喧長路煙雲淨遠山觀空復觀俗皇鑒此中間唐中貴人多引僧為內供奉寫字吟詩俾之應制廣宣者憲宗以來居紅樓院其詩曰紅樓集昌黎集有廣宣上人頻見訪詩豈惡其數耶紅樓院處所酉陽雜俎可閲此詩只僧引百花間一句好觀空復觀俗亦頗通别有七言詩一首佳懷智體道人僧貫休把筆懷吾友庭鶯百囀時惟應一處住方得不相思雪水淹門閫春雷折樹枝平生無限事不獨白雲知貫休詩無奈忽有一兩句粗俗然其竒亦天出三四近乎俗而理到五六所謂竒也人所罕道而新休糧僧不食更何求自由終自由身輕嫌衲重天旱為民愁應器誰將去生臺蟻不遊會須傳此術歸共老林丘第二句好但近粗俗第三句工第四句忽然不測所謂竒也術字有妙理夏日草堂作僧齊己沙泉帶草堂紙帳捲空牀靜是真消息吟非俗肺腸園林坐清影梅杏嚼紅香誰住原西寺鐘聲送夕陽此齊已自賦草堂中事也洪覺範取此八句賦為八詩以其句句有味故耶此詩為僧徒所重其來久矣實亦清麗題真州精舍波心精舍好那岸是繁華礙目無髙樹當門即遠沙晨齋來海客夜磬到漁家石鼎秋濤靜禪回有嶽茶第二句那岸二字有深意五六精神而淨潔宿嶽陽開元寺僧修睦竟日憑虛檻何當興歎頻往來人自老今古月長新風逆沉漁唱松疏露鶴身無眠鐘又動幾客在迷津第六句亦眼前事但下得著自然好老僧僧景雲日照西山雪老僧門始開凍瓶黏柱礎宿火陷爐灰童子病歸去鹿麋寒入來齋鐘知漸近枝鳥下生臺三四已新五六亦新童子以病而歸其家故曰歸去麋以寒而入其室故曰入來良佳華巖寺望樊川僧子蘭萬木葉初紅人家樹色中疏鐘搖雨腳積水浸雲容雪磧回寒雁村燈促夜舂舊山歸未得生計欲何從子蘭飲馬長城窟一詩傳世此詩五六通亦可取夷陵即事僧尚顔不難饒白髮相續是灘波避世嫌身晚思家乞夢多暑衣經雪著凍硯向陽呵豈欲臨岐路還聞聖主過尚顔詩唐之季也此恐是僖宗幸蜀時詩第五句其窮已甚然今之窮者何但此事尚顔又有句云合國諸卿相皆曾著布衣贈栖禪上人僧虛中巖房髙且靜住此幾寒暄鹿嗅安禪石猿啼乞食村朝陽生樹罅古路透雲根獨步間相覔凄涼碧洞門僧家寂靜欲得如羚羊挂角更無氣息蓋此物閉氣而眠虎狼不能知其為羊也此以譬心而入定之迹乃餘事耳禪於石上而鹿來嗅不知石之上有僧此乃佳句餘亦稱贈樊川長老僧清尚瘦顔諸骨現滿面雪毫垂坐石鳥疑死出門人謂癡照身潭入楚浸影檜生隋太白曾經夏清風涼四肢坐石鳥疑死即與鹿嗅安禪石同意皆不如劉得仁螢入定僧衣為妙然用工刻苦不可不選以備旁考題山寺寇準寺在猿啼外門開古澗涯山深微有徑樹老半無枝望遠雲長暝談空日易移恐朝金馬去還失白蓮期冦公學晚唐詩尾句忽又似老杜遊湖上昭慶寺陳堯佐湖邊山影裏靜景與僧分一榻坐臨水片心間對雲樹寒時落葉鷗散忽成羣莫間紅塵事林間肯暫聞此錢唐門外昭慶寺今猶無恙而南渡事業又巳澌盡讀此寧無感乎第五句最幽美再遊海雲寺作宋祁十里雲邊寺重驅千騎來天形欹野盡江勢釀山回園奈濃成幄樓鐘近殷雷斜陽歸鞅促飛蓋冒輕埃三四唐人詩所必有宋人詩罕有然作家固無不有宋公不甚喜僧此成都詩懷寄披雲峯誠上人曹汝弼院髙窮木盛野極靜無言險路通巖頂香泉出石根微風飄磬韻幽鳥啄苔痕常記相留夜秋堂共聽猿景德祥符間詩人有晚唐之風曹以處士與种放魏野林逋相往來故其詩亦似之第六句幽而有味披雲峯者古歙水西太平寺之别峯下瞰郡城北望黃山至今有菴宇存焉再寄江城從别後聞説在松間度日長扄戶終年不下山靜為詩所役間免事相關應喜雲邊客冥搜鬢未斑第五句靜為詩所役能言吟者之狀凡吾曹能詩者皆然贈披雲峯嶽長老禪外掩松扄間眠度歲隂雨侵香篆澀苔長屐痕深水在銅瓶冷雲歸玉磬沉前山有靈藥時䇿杖藜尋此詩亦有唐味贈僧一從叨命服乘興入天台院接石橋住門臨瀑布開松間應獨坐雪裏更誰來時復携藜杖看雲上古臺宋詩之有唐味者皆在真廟以前三朝此其一也五六淡而有味贈水墨巒上人趙湘講餘題小筆深院竹修修試墨應磨歲思山忽寫秋靜曾窮鶴趣髙亦近詩流更擬緣清思和雲狀沃州趙湘字叔靈清獻公抃之祖也淳化三年孫何榜進士清獻漕益路時宋景文序叔靈集歐陽公跋亦稱之照上人山房庭樹惹雲非手植自與薜蘿交雨過苔侵影秋來月照巢錫寒枝上挂偈好葉中抄誰見僧行繞溪涼夜磬敲僧庭樹著題詩也中四句俱工細趙清獻之杜審言也與正仲屯田遊廣教寺梅堯臣春灘尚可涉不惜濺衣裾古寺入深樹野泉鳴暗渠酒杯參茗具山蕨間盤蔬落日還城郭人方帶月鋤五六錯綜自相為對此一體題松林院靜邃無塵地青熒續熖燈木魚傳飯鼓山衲見歸僧野色寒多霧溪痕夜閣冰吾非謝康樂獨往亦何能三四眼前事自然覺好五六亦佳過永慶院荒涼舊蘭若古木兩三重林下已無柏澗邊唯有松石階生薜荔香座缺芙蓉化俗似禪衲破來縫不縫前四句平常五六忽能以故為新緣下一句出於不測併上一句可觀尾句縫不縫之説怪而有味過山陽水陸院智洪上人房有蘇子美墨迹十載七來此每嗟多異今池灰休辨劫川月解明心遺墨悲蘇倩髙情想道林能間常似舊翹立水邊禽夏日宿西禪潘閬此地絶炎蒸深疑到不能夜涼如有雨院靜若無僧枕潤連雲石窗明照佛燈浮生多賤骨時日恐難勝東坡少年見傳舍壁間題此句而喜之則知逍遙之詩行于世已久東坡眼髙亦所謂異世而知心者也秋日題琅琊寺巖下多幽景且無塵事喧鐘聲晴徹郭山色曉當門深洞通泉脈懸崖露樹根更期來此宿絶頂聽寒猿送皎師歸越林逋林間久離索忽忽望西陵靜戶初聞叩歸舟又説登野煙含樹色春浪疊沙稜幸謝雲門路同尋苦未能送思齊上人之宣城林嶺藹春輝程程入翠微泉聲落坐石花氣上行衣詩正情懷淡禪髙語論稀蕭間水西寺駐錫莫忘歸和靖於僧徒交遊良多如送機素云錫潤飛晴靄羅寒濾曉澌下一句新竒寄清曉云樹叢歸夕鳥湖影浸寒城尤妙不可言宜其隱於湖山而名聞天下徹九重垂百世也胸次筆端兩相扶竪如此次韻定慧欽長老見寄蘇軾左角看破楚南柯聞長滕鈎簾歸乳燕穴紙出癡蠅為鼠常留飯憐蛾不點燈﨑嶇真可笑我是小乘僧左角以言爭故以破楚繫之南柯以言榮故以長滕繫之此本山谷句法亦老杜句法厲階董狐筆禍首燧人氏是也至山谷演而為管城子無食肉相孔方兄有絶交書則其工極矣此只論句法中四句燕蠅鼠蛾皆憫世之迷為作方便之意然區區如此亦小乘所為非上乘也守欽自蘇州遣其徒卓契順如惠州寄擬寒山八詩坡公和之第一首似律故取諸此坡材大於小詩餘事耳贈惠洪黃庭堅數面欣羊胛論詩喜雉膏眼橫湘水暮雲獻楚山髙墮我玉麈尾乞君宫錦袍月時放舟舫萬里渺雲濤山谷謫宜州洪覺範在長沙嶽麓寺曾見山谷於是偽作山谷七言贈詩所謂氣爽絶類徐師川者豫於名僧詩話已詳辨其事此詩亦恐非山谷作山谷乙酉年死於宜州覺範始年三十五歲撰此詩以惑衆而山谷甥洪氏誤信為然故收之云五六雖壯麗恐非山谷語意淺别寶講主陳師道此處相逢晚他鄉有勝緣咒功先服猛戒力得扶顛暫息三支論重參二祖禪元注趙州臨濟皆曹人也夜牀鞋腳别何日著行纒讀后山詩語簡而意博咒功戒力四字已深入於細服猛扶顛一出禮記一出論語抉剔為用愈細而竒與晚唐人專泥景物而求工者不同也天下博知無過三支今后山欲其捨博而就約棄講而悟禪故曰暫息三支論重參二老禪也夜牀鞋腳别此本俗語腳不可以無鞋而夜寐之際腳亦無用於鞋此又以其膠戀執著為戒也故后山詩愈玩愈有味遊鵲山寺積石橫成嶺行楊密映門人聲隱林杪僧舍繞雲根頓攝塵緣盡方知象教尊只應羊叔子名字與山存羊叔子謂南豐題子曕揚州借山寺劉季孫給事風流在虛亭景越間全臨故宫水盡致别州山峯勢晴相向嵐光夜不還無時供勝賞歷歷白雲間劉季孫最為東坡所知卒於隰州三四佳第五句亦好題江心寺徐照兩寺今為一僧多外國人流來天際水截斷世間塵鴉宿腥林徑龍歸損塔輪却宜成片石曾坐謝心身豫甲寅乙卯間至永嘉遊江心寺見此詩刋楣間良佳今三十年矣登橫碧軒繼趙昌甫作徐機步陟高髙寺徐行不用扶青天晴又雨山色有還無句向間中覔茶因醉後呼所懷論未足何乃又征途第四句佳但亦本於歐公雁蕩寶冠寺趙師秀行向石欄立清寒不可云流來橋下水疑是洞中雲欲住逢年盡因吟過夜分蕩隂當絶頂一雁未曾聞杜荀鶴袛應松上鶴便是洞中人此三四亦相犯五六有味巖居僧開扉坐石層盡日少人登一鳥過寒木數花搖翠藤茗煎冰下水香炷佛前燈吾亦逃名者何因似此僧桃花寺舊有桃花樹人呼寺故云石幽秋鷺上灘遠夜僧聞汲井連黃葉登臺散白雲燒丹勾漏令無處不逢君四靈詩趙紫芝為冠大抵中四句鍛鍊磨瑩為工以題考之首尾略如題意而中四句者亦可他入不必切於題也寄從善上人翁卷數載不相見師應長掩關香煙前代寺秋色五峯山棊進僧誰敵琴餘鶴共間幾時重過我吟話此林間同孫季蕃遊淨居諸庵劉克莊滿院靜沉沉微聞有梵音不來陪客語應恐壞禪心母處歸全少師邊悟巳深戒衣皆自衲因講始停針為人之女離其母不顧而屈從老尼果何所悟耶不來陪客恐壞禪心如此則見所欲而此心亂耶讀此詩為婦人出家者之戒後村殆弄筆頭學晚唐詩詩似唐人而語意鑿脫豫故備論之書惠崇師房僧希晝詩名在四方獨此寄間房故域寒濤濶春城夜夢長禽聲沉遠木花影動回廊幾為分題客殷勤掃石牀希晝九僧之一於僧詩類選五首每首必有一聯佳不特希晝九僧皆然寄懷古見説雕隂僻人煙半雜羌秋深邊日短風動曉笳長樹勢分孤壘河流出遠荒遙知林下客吟苦夜禪忘送嗣端東歸遠念生泉石人中事欲銷卷衣城木落尋寺海山遙帆影迷寒雁經聲隱暮潮後期俱未定况我鬢先凋送可倫赴廣南轉運凌使君見招别語畏殘漏心懸瘴海邊回期無定日去路極遙天苦霧沉山郭寒沙漲隰田幾宵尋使府清話廢間眠早春闕下寄觀公客心長念隱早晚得書招看月前期阻論山靜會遙微陽生遠道殘雪下中宵坐看青門栁依依又結條宿宇昭師房僧保暹與我難忘舊多期宿此房卧雲歸未得靜夜話空長草際沉螢影杉西露月光天明共無寐南去水茫茫保暹九僧之二第六句於工之中不弱而新送簡長上人之洛陽間身無所滯獨去背春城望越鄉心斷迎嵩隱思生野禪依樹遠中飯傍泉清相府如投刺分題有竺卿早秋間寄宇昭窗虛枕簟明微覺早涼生深院無人語長松滴雨聲詩來禪外得愁入靜中平遠念西林下相思合慰情宿西山精舍僧文兆西山乘興宿靜稱寂寥心一徑杉松老三更雨雪深草堂僧語息雲閣磬聲沉未遂長棲此雙峯曉待尋文兆九僧之三有宋國初未遠唐也凡此九人詩皆學賈島周賀清苦工密所謂景聯人人著意但不及賈之髙周之富耳送簡長師之洛動靜非常態超然西去心水期經洛聽雲約到嵩吟齋訪煙村遠禪依竹寺深祗應風雅道相府是知音郊居吟僧行肇靜室簾孤捲幽光墜露多徑寒杉影轉窗晚雪聲過茗味沙泉合罏香竹靄和遙懷起深一作風雨夕舊寺隔滄波行肇九僧之四此首中四句工不但一聯酬贈夢真上人禪舍因吟往晴來坐徹宵春通三徑晚家别九江遙巢重禽初宿窗明葉旋飄住期應未定謝守有詩招青社凌使君以詩見招五六何以圈見靜極之味也送文光上人西遊髙木墜殘霖關河入遠心嵩遊忘楚夢華近識秦音塔古懸圖認碑荒背燒尋幾思興替事獨上灞陵吟五六工三四裝四個地名似賈島姚合之弊送僧南歸僧簡長漸老念鄉國先歸獨羡君吳山全接漢江樹半藏雲振錫林煙斷添瓶澗月分重棲上方定孤狖雪中聞簡長九僧之五第六句絶妙送行禪師南國山重疊歸心向石門寄禪依鳥道絶食過漁村楚雪黏瓶凍江沙濺衲昏白雲深隱處枕上海濤翻與行肇師宿廬山棲賢寺僧惟鳳冰瀑寒侵室圍爐靜話長詩心全大雅祖意會諸方磬斷危杉月燈殘古塔霜無眠向遙夕又約去衡陽惟鳳九僧之六所選每首必有一聯工人多在景聯晚唐之定例也盛唐則不然大手筆又皆不然寄希書間中吟鬢改多事與心違客路逢人少家書入闕稀秋聲落晚木夜魄透寒衣幾想林間社他年許共歸弔長禪師霜鐘侵漏急相弔晚悲濃海客傳遺偈林僧寫病容潄泉流落葉定石集鳴蛩回首雲門望殘陽下遠峯此詩中四句皆工一字不茍金銀稱上分定盤星也訪楊雲卿淮上别墅僧惠崇地近得頻到相携向野亭河分岡勢斷春入燒痕青望久人收釣吟餘鶴振翎不愁歸路晚明月上前汀九僧之七惠崇最為髙者三四雖取前人二句合成此聯為人所詆然善詩者能合二人之句為一聯亦可也但不可全盜二句一聯者耳贈文兆偶依京寺住誰復得相尋獨鶴窺朝講鄰僧聽夜琴注瓶沙井遠鳴磬雪房深久與松蘿别空懸王屋心惠崇有佳句為圖詩殊不止此容續添入寄保暹師僧宇昭吟會失秋期荒山寄病時客髭生白早叢木落青遲渴狄窺莎井隂蟲占菊籬歸心何以見霜月下天涯宇昭九僧之八幽居即事掃苔人迹外漸老喜深藏路僻間行遠春晴晝睡長餘花留暮蝶幽草戀殘陽盡日空林下孤禪念石霜寺居寄簡長僧懷古雪苑東山寺山深少往還紅塵無夢想白日自安間杖履苔痕上香燈樹影間何須更飛鍚歸隱沃洲山懷古九僧之九人見九僧詩或易之不知其幾煆錬幾𫾣推乃成一句一聯不可忽也此惟釋梵一類選此他類尚多佳作宋之盛時文風日熾乃有梅聖俞之醖籍間雅陳后山之苦硬瘦徑一專主韻一專主律梅寬陳嚴並髙一世而古人之詩半或可廢則其髙於九僧亦人才涵養之積然也居天柱山僧贊寧四野豁家庭柴門夜不扃水邊成半偈月下了殘經雖逐諸塵轉終歸一夢醒未知斯旨者萬後盡勞形僧家一偈四句謂之伽陀長篇六句而上謂之祗夜此云半偈乃是吟成一聯詩也工而妙贈聞聰師僧知圓淡然塵慮絶禪外苦風騷性覺眠雲僻名因背俗高水煙蒸紙帳寒髮澀銅刀幾宿秋江寺間吟聽夜濤李洞云日閃剃刀明意新語工而險此又云寒髮澀銅刀恐是淨髮刀不磨耳可笑酬伉上人僧遵式鳥卧清間極誰能更似君山光晴後見瀑響夜深聞拾句書幽石收茶踏亂雲江頭待無事終學棄人羣中四句俱工雅贈智倫弟溪竹擁疏簾溪雲冷不厭千巖唯虎伴一講許詩兼煮茗𫾣冰柱看經就雪簷有時開靜戶寒日下峯尖寄月禪師聞道安禪處深蘿住隔溪清猿定中發幽鳥座邊棲雲影朝晡别山峯遠近齊不知誰問法雪夜立江西嵩公藤州人文似韓昌黎歐公薦之於朝詩佳者尚多與楊公濟倡和及晤辨二師者亦與甚有清瘦竒古之句容續入再遊鶴林寺僧道潛招隱山南寺重來歲巳寒風林驚墜雪雨澗咽飛湍壁暗詩千首霜清竹萬竿東軒謫仙句洗眼共君看此參寥子三四清爽山中僧祕演結茅臨水石淡寂益間吟久雨寒蟬少空山落葉深危樓乘月上遠寺聽鐘尋昨日江僧信期來息此心此山東繪石曼卿方外友歐公序其詩者書景舒菴壁僧清順大布君能衣始知蠶口非冢間容一榻身外但三衣護戒避生草淨心觀落暉寂寥能自守今世固應稀東坡所交順怡然北山垂雲庵所謂間來石上眠落葉不知數及十竹軒詩知名者也陳后山遊浙亦與之詩此篇首句謂景舒著布不著絹帛以下句句皆佳有滋味贈尼昧上人僧惠洪不著包頭絹能披壞衲衣愧無灌溪辨敢對末山機未肯題紅葉終期老翠微余今倦行後投杖夢煙霏一本作扉大愚法嗣端州末山尼了然禪師有灌溪間和尚者來山問今日離何處曰路口山曰何不蓋却間乃禮拜問如何是末山山曰非男女相間乃喝曰何不變去山曰不是神不是鬼變箇甚麼間於是伏應作園頭三載覺範用此事然紅葉之句又似侮之末句有欲炙之色女人出家終何益哉寄致虛兄僧善權避冦經重險懷君屢陟岡空餘接浙飯無復宿舂糧衣袂饒霜露柴荆足虎狼春來何所恨棣蕚政含芳江西𣲖中三僧倚松老人饒德操僧號如璧詩最髙足與吕居仁對壘祖可正平善權巽中二人齊名世稱瘦權癩可然瀑泉集無一首律詩可取五言古詩間有自然間淡者七言長句得山谷變體而不得其正格雖矯古語無韻味殊使人厭真隱集律詩僅三二首如此詩亦出老杜而避冦寄兄題目甚易無一唱三歎之風謂晚唐雕蟲小技不及此之大片粗抹亦恐過矣老杜之細潤工密不可不參無徒曰喝咄以為豪也觀者幸勿謂僣虎丘僧元肇滄海何年湧秦傳虎踞丘池空劒光冷墳闕鬼吟愁石礙樓臺側煙深草木浮吳人貪勝槩眷盡亦來遊第五句好尾句有風味徑山東西兩徑幽歲晚得同遊壑雪隂猶在溪雲凍不浮鳥驚樵斧重猿挂樹枝柔怕有梅花發因行到水頭此近世詩僧淮海肇聖徒也通州人及見葉水心曩印應雷為淮閫以同里嘗招致之肇猶無恙蓋端平淳祐以來方外以吟知名者肇之後有珍藏叟云重字下得好若下響字便是小兒山行晚歸僧善珍藥徑入雲林晚晴扶杖吟照泥星復雨經朔月猶隂樹折憐巢覆泉清見葉沉愛間自如此不是學灰心珍藏叟泉州人繼淮海肇有聲迹近年方化里諺有云星月照濕土為再雨之象詩人所未用而用之故新第六句亦見靜者之趣落葉沉水底非極晴不能察也第五句恐有所感春寒松間燈夕過顧影在天涯雪暝迷歸鶴春寒誤早花艱難知世味貧病厭年華故國風塵外無人可問家松一作林春寒誤早花此句極佳詩中無此等新句而欲名世可乎廣潤寺新寮僧自南客不赴齋招冥心坐寂寥青山若厭看白日也難消鷺起衝荷葉蟲行蝕菊苗何年稱老宿來住此間寮此近年僧詩凡出家人知講律而不知禪巳為下矣况應供庸流為人饒唄而赴供取資曾為奴僕之不若也故第一句可取若有一毫厭山之心則長日不可度矣此迂説之句也雖俗而通五六亦工贈浩律師僧簡長浩也毗尼學精於玉帳嚴蟻酣停掃砌燕乳記鈎簾茶鼎敲冰煮花壺漉水添夢回池草緑忍踐緑纎纎蜀僧北澗簡讀其集及見葉水心與之絶句且令其除去集中生日詩此説是也豫此選所以不取生日詩蓋有所見嘗讀周少隱集有秦檜生日詩甚為可惡近世李雁湖集魏鶴山集皆不去生日詩一例刋之亦一快也簡之集終於送吳尚書之溫州蓋吳詠嘉熙中人也出蜀之浙自嘉熙約三十餘年住大剎交貴人古詩頗瘦而詩題多俗士往來惟此一律詩工之又工似乎過於工者第三句最好餘亦近套七言四十五首涪城縣香積寺官閣杜甫寺下春江深不流山腰官閣逈添愁含風翠壁孤雲細背日丹楓萬木稠小院回廊春寂寂浴鳬飛鷺晚悠悠諸天合在藤蘿外昏黑應須到上頭老杜七言律晚唐人無之凡學詩五言律可晚唐只如七言律不可不老杜也留别公安太易沙門隱居欲就廬山遠麗藻初逢休上人數問舟航留制作長開篋笥擬心神沙村白雪猶含凍江縣紅梅欲放春先踏爐峯置蘭若徐飛錫杖出風塵擬字合考欲放一作巳破因許八奉寄江寧是上人不見旻公三十年封書寄與淚潺湲舊來好事今能否老去新詩誰與傳碁局動隨幽澗竹袈裟憶上泛湖船聞君話我為官在頭白昏昏只醉眠看前輩詩不専於景上觀當於無景言情處觀老杜此三詩三樣然骨格則一也送靈徹上人還越中劉長卿禪客無心杖錫還沃洲深處草堂間身隨敝屨經殘雪手綻寒衣入舊山獨向青溪依樹下空留白月在人間那堪别後長相憶雲木蒼蒼但閉關三四佳第六句亦不猶人靈徹工於詩有詩留别故和而送之廣宣上人頻過韓愈三百六旬長擾擾不衝風雨即塵埃久為朝士無裨補空愧髙僧數往來學道窮年何所得吟詩竟日不能回天寒古寺遊人少紅葉窗前有幾堆老杜詩無人敢議穿花蛺蝶深深見點水蜻蜓欵欵飛程夫子以為不然自齊梁陳隋以來専於風花雪月草木禽魚組織繪畫無一句雅淡至唐猶未盡草而晚唐詩料於琴棋僧鶴茶酒竹石等物無一篇不犯昌黎大手筆也此詩中四句却只如此枯稿平易不用事不狀景不泥物是可以非詩訾之乎此體惟后山有之惟趙昌父有之學者不可不知也觀題意似惡此僧往來太頻即紅樓院應制詩僧也送王十八歸山寄題仙遊寺白居易曾於太白峯前住數到仙遊寺裏來黑水澄時潭底出白雲破處洞門開林間暖酒燒紅葉石上題詩掃緑苔惆悵舊遊那集作無復到菊花時節羡一作待君回五六自然而工讀禪經須知諸相皆非相若住無餘却有餘言下忘言一時了夢中説夢兩重虛空花豈得兼求果陽熖如何更覔魚攝動是禪禪是動不禪不動即如如遊戲三昧不可以詩律拘佛語陽熖者謂遠地日光如見水然以對空花與夢幻泡影譬喻一同酬淮南廖參謀秋夕見過之作劉禹錫揚州從事夜相尋無限新詩月下吟初服已驚玄髮長髙情猶向碧雲深語餘時舉一杯酒坐久方聞數處砧不逐繁華訪間散知君擺落俗人心休公昔為揚州從事參謀從釋子反初服第四句妙甚謂已還俗猶不能忘情於僧也送景玄師東歸東林寺裏一沙彌心愛當時才子詩山下偶隨流水出秋來却一作欲赴白雲期灘頭躡履挑沙菜路上停舟讀古碑想到舊房拋鍚杖小松應有過簷枝劉夢得詩格髙在元白之上長慶以後詩人皆不能及且是句句分曉不喫氣力别無暗昧關鎖酬慈恩寺文郁上人賈島袈裟影入禁池清猶憶鄉山近赤城籬落罅間寒蟹過莓苔石上晚蛩行期登野閣間應甚阻宿幽房疾未平聞説又尋南嶽去無端詩思忽然生第三句好寄無得頭陀夏臘今應三十餘不離樹下冡間居貌堪良匠抽毫寫行趁髙僧續傳書落澗水聲來遠遠當空月色自如如白衣只在青門裏心每相親迹且疏三四好第六句亦好贈圓上人誦經千卷得為僧塵尾持行不拂蠅古塔月髙聞咒水新壇日午見燒燈一雙童子澆紅藥百八真珠貫綵繩且説近來心裏事仇讐相對似親朋以六句竒異此聯遂新不可言贈僧從來多是遊山水省泊禪舟月下濤初過石橋年尚少久辭天柱臘應髙青松帶雪懸銅鏡白髮如霜落鐡刀常恐畫工援筆寫身長七尺有眉毫賈浪仙五言詩律髙古平生用力之至者七言律詩不逮也贈神遘上人周賀草履蒲團山意存坐看庭木長桐孫行齋罷講仍香氣布褐離牀帶雨痕夏滿尋醫還出寺晴來曬疏暫開門道情淡薄間愁盡霜色何因入鬢根贈僧藩府十年為律業南朝本寺住來新辭歸幾别深山客赴請多從遠處人松吹入堂資講力野蔬供飯爽禪身他年更息登壇計應與雲泉作四鄰二詩皆五六工但晚唐人七言律其格不能甚髙遊西禪伍喬遠岫當軒别翠光髙僧一衲萬緣忘碧松影裏地長潤白藕花中水亦香雲自雨前生淨石鶴於鐘後宿塵廊遊人戀此吟終日盛暑樓臺早有涼三四自然工美末句尤有味宿山寺項斯栗葉重重覆翠微黃昏溪上語人稀月明古寺客初到風度間門僧未歸山果經霜多自落水螢穿竹不停飛中宵能得幾時睡又被鐘聲催著衣登南神光寺塔院韓偓無奈離腸日九回強攄離抱立髙臺中華地向城邊盡外國雲從島上來四序有花長見雨一冬無雪却聞雷日宫紫氣生冠冕試望扶桑病眼開此乃閩中依王審知時詩謂近海迫南風土如此還俗尼本歌妓吳融栁眉梅額倩粧新笑脫袈裟得舊身三峽却為行雨客九天曾是散花人空門付與悠悠夢寶帳迎回暗暗春寄語江南除一作徐老客一作説一生長短託清塵三四止是體貼五六方有形容盡其味夜投豐德寺謁液上人盧綸半夜中峯有磬聲偶尋樵者問山名上方月晚集作日曉聞僧話一作語下界林疏見客行野鶴巢邊松最老毒龍潛處水偏清願得遠公知姓字焚香洗鉢過浮生春日遊禪智寺羅隱遠樹連天水接空幾年行樂舊隋宫花開花謝長如此人去人來自不同楚鳳調髙何處酒吳牛蹄健滿車風思量只合騰騰醉煮海平陳盡夢中感慨甚深榮上人遽欲歸以詩留之王安石道人傳業自天台千里翛然赴感來梵行毗沙為外護法筵靈曜得重開已能為我迂神足便可隨方長聖胎肯顧北山如慧約與公西崦斸莓苔毗沙門天王那吒太子護法神也靈曜寺梁武所建佛足去地四指金光明經有神足語長養聖胎智封禪師及馬祖並有此語慧約婁法師也此詩工密已甚和平甫招道光法師鍊師投老演真乘像却空王爪與肱於總持門通一路以光明藏續千燈從容發口酬摩詰邂逅持心一作將契慧能新句得公還有賴古人詩字恥無僧鄭谷詩四十餘首有僧字故晚唐人有詩云詩裏無僧字不清又有曰鄭谷詩壇愛惹僧遊山寺王圭寒日征驂懶復回經宵仍喜駐巖隈徑盤幽迹遙知鹿林逗清香定有梅曉影瘦猿窺澗溜夜深肥栗灹爐灰我心非動亦非靜白足禪僧無妄猜此必禹玉少年詩一入都門致宰相坐中書十四年有土地不須權之嘲即知此非老筆也灹字絶新同器之過金山奉寄兼呈潛道王安國憶同支遁宿􅋂崟不負平生壯觀心北固山隨三楚盡中泠水入九江深紛紛落月搖窗影杳杳歸舟送梵音東去何時來蠟屐天邊爽氣夢相尋平父金山甘露諸詩皆好散見所選此一首入僧寺類亦隨手分撥如此三四壯絶合詩格五六亦佳贈僧介然張耒寒窗寫就碧雲篇客至研茶手自煎儒佛故應同是道詩書本自不妨禪長松千尺巢雲鶴寒嶠三更嘯月猿請以篇章為佛事要觀半偈走人天此詩僧黎介然晚年與饒德操吕居仁汪信民俱在符離倡和者西溪無相院張先積水涵虛上下清幾家門靜岸痕平浮萍破處見山影小艇歸時聞棹聲入郭僧尋塵裏去過橋人似鑑中行已慿暫雨添秋色莫放修林礙月生此東坡所稱三四一聯子野詩集湖州有之近亡其本送淳用長老歸卭州楊繪曾扣禪扉喜接陪師將境物諭輪回燈籠不滅心中火香印空殘死後灰綿邑難留真錫駐臨卭還慶法堂開臨卭綿邑何分别無去無來無去來楊繪元素綿州人號無為子楊傑字次公無為人亦號無為子二公皆好佛學此詩三四本乎正五六且説蹤迹未為竒忽被末後一句喚醒一篇精神妙不可言葛藤之説若異於吾儒然其實有此理也夏日龍井書事四首僧道潛翠樹髙蘿結晝隂驕陽無地迫吾身石崖細聽紅泉落林果初嘗碧奈新揮塵已欣從惠遠談經終恨少遺民何時暫著登山屐來岸烏紗漉酒巾元注呈辨才法師兼寄吳興蘇太守并秦少遊少遊時在越惠遠謂辨才遺民謂少遊雨氣千巖爽氣新孤懷入夜與誰鄰風蟬故故頻移樹山月時時自近人禮樂汝其攻我短形骸吾已付天真露華漸冷飛蚊息窗裏吟燈亦可親自憐多病畏炎曦長夏投蹤此最宜青石白沙含淺瀨碧桐蒼竹聒涼颸雲中雞犬聽難辨谷口漁樵問不知斑杖芒鞋隨步遠歸來煙火認茅茨三四用四個顔色字而不艷不冗大有幽寂之味末句尤深淡可喜却來人外慰栖遲谷遠山長萬事遺好鳥未嘗吟俗韻白雲還解弄竒姿藤花冉冉青當戶竹色娟娟碧過籬不羡故人探禹穴短橈孤榜逐漣漪或問朱文公語録云覺範詩如何及得參寥此語還可分别其然以誨後學否曰此甚易見參寥詩句句平雅有味做成山林道人真面目覺範詩虛驕之氣可掬因讀山谷詩欲變格以從之而力量不及業已晚矣稿項頂螺忘歲年及論詩得雉膏二詩皆偽為山谷所作而人不能察覺範佳句雖多却自是士人詩官員詩參寥乃真髙僧禪客詩也二人皆不幸毁服而覺範之禍尤酷然覺範才髙亦一時人物云題慈德寺頥堂為長老宗皓作鄒浩龍隱巖前忽轉頭翛然瓶錫此淹留十方法界元無限一片心田自有秋草木曲躬歸白足江山依位拱青眸我來不問西來意獨喜茶香啜滿甌鄒公名節冠千古於禪説深熟詩佳者不止此寄璧公道友吕本中符離城裏相逢處酒肉如山放手空已見神通過鶖子未應鮮健勝龎公且尋扇子舊頭角一任杏花能白紅破箬笠前江萬里無人曾識此家風江西詩晚唐家甚惡之然粗則有之無一點俗也晚唐家吟不著卑而又俗淺而又陋無江西之骨之律且如此詩五六晚唐決不夢見扇子杏花物對物也頭角白紅各自為對惟陳簡齋妙得此法次韻答吕居仁僧如璧向來相許濟時功大似頻伽餉遠空我已定交木上座君猶求舊管城公文章不療百年老世事能排雙頰紅好貸夜窗三十刻胡牀趺坐究幡風撫州士人饒德操客從曾布議不合去而落髮法名如璧道號倚松老人江西𣲖中比瘦權癩可此三四老杜句法晚唐人不肯下五六亦出於老杜決不肯拈花貼葉如界畫畫如甃砌牆也惟韓子蒼不喜用此格故心不甘於入𣲖而其詩或謂之太官樣要之天下有公論豫亦無庸贅也再次前韻曾將千古較窮通芥孔能容幾許空借問折腰辭五斗何如折臂取三公四時但覺風雨過一飯何須刀几紅要識壞魔三昧力更培根橃待春風五六即是居仁首唱五六格用寄璧上人韻范元實趙才仲及從叔知止吕本中故人瓶錫各西東吾道從來冀北空病去漸於文字懶南來猶覺歲時公江回夜雨千巖黑霜著髙林萬葉紅政好還家君未肯莫教慚愧北窗風居仁和此韻凡六首酒如震澤三江緑詩似芙蕖五月紅雙鬢共期他日白千花猶是去年紅銀杯久持浮大白桃花且著舒小紅皆脫灑圓活次韻持上人題延慶寺清玉軒張武子水芳未動城南路一一僧簾有竹看政爾塵埃能自表故應悠久淡相安長楊曉獵干戈肅古棘春朝萬玉寒碧眼阿師來授記化龍飛去抑何難張武子字良臣關中人樓攻愧尤延之序其詩甚詳豫及識其子諱畤字居卿先生教豫以作詩之法尤至但律詩少耳此詩句句佳有骨三山次潘靜之升書記韻朱橰客路那知歲月長掀髯一笑苾芻房且傾徐邈聖賢酒不問陳登上下牀雲影翻空迷海嶠秋聲隨夢到江鄉明朝各聽船窗雨猶憶枯棊戰寺廊朱文公之父曰松字喬年季父曰橰字逢年嘗夢至玉蘭堂如王平甫之靈芝宫自號其詩曰玉蘭集尤延之為作序詩格髙峭惜乎不多三四甚佳豫亦偶嘗記之羅浮寶積寺芮曄木落天寒山氣沉年華客意共蕭森偶於佳處發深省其實宦遊非本心紅日坐移鐘閣影白雲間度石樓隂還家莫話神仙事老不寬人雪滿簪芮曄字國器一字仲蒙吳興人嘗為御史司業祭酒吕東萊再娶乃其女也詩三四甚髙雅與僧淨璋陸九淵自從相見白雲間離别嘗多會聚難兩度逢迎當汝水數年隔濶是曹山客來濯足傍僧怪病不烹茶侍者間不是故人尋舊隱只應終日閉禪關陸復齋雖不以詩名此詩後四句佳有唐味頃遊龍井得一聯王伯齊同兒輩遊因足成之樓鑰路入風篁上翠微老龍蟠井四山圍水真緑淨不可唾一作水從何來不知處魚若空行無所依勝處雖多終莫及舊遊誰在事皆非祗今匏繫何由到徒羡聯鑣帶月歸水真緑淨不可唾魚若空行無所依佳句也上龜山寺潘柳菜花開處認遺基荒屋殘僧未忍離寺付丙丁應有數岸分南北最堪悲金鈴塔上如相語鐵佛風前亦斂眉野匠不知行客意競磨濃墨打頑碑丙丁南北之對巧中有味贈源長老歸自湘中趙師秀白髮半頭寒未剃形容清瘦異於常為人作畫衣添黑對客圍碁爪甚長不染世間如菡蓞只留胸次著瀟湘住山亦自年來懶竹閣門前借一房滑稽之中亦新巧第六句佳送炭與湘山西堂惠然師僧顯萬紛紛向火乞兒多獨有君如擇乳鵝萬煆爐中尋粲可一堆灰裏撥隂何雪欹敗屋間犀柄草卧空庭任雀羅亟送烏薪相暖熱恐隨春夢入南柯顯萬字致一浯溪人嘗參吕居仁浯溪集洪景盧為序此詩借送炭説事理凡禪機必險絶然亦不為不佳也附僧類中瀛奎律髓卷四十七

body:
  text: 瀛奎律髓巻七元方回編風懷類晏元獻類要有左風懷右風懷二類男為左女為右今取此義以類凡倡情冶思之事止於妓妾者流或記辭寓諷而有正焉不皆邪也其或邪也亦以為戒而不踐可也五言十二首失婢白居易宅院小牆庳坊門帖一作揭榜遲舊恩慚自薄前事悔難追籠鳥無常主風花不戀枝今宵在何處惟有月明知三四乃失婢之主罪已而不責婢之為淫奔亦近厚矣末句尤深而不露失鶴詩所謂想應只在秋江上蓋本於此和樂天誚失婢榜者劉禹錫把鏡朝猶在添香夜不歸鴛鴦分瓦去鸚鵡透籠飛不逐張公子即隨劉武威新知正相樂從此脱青衣夜過盤石隔河望永樂寄閨中效齊梁體岑參盈盈一水隔寂寂二更初波上思羅襪魚邊憶素書月如睂已畫雲似鬢新梳春物知人意桃花笑索居波魚月雲所覩之四物也襪書睂鬢所思之四事也可謂工矣幽牕韓偓刺繡非無暇幽牕自尠歡手香江橘嫩齒軟越梅酸密約臨行怯私書欲報難無憑諳鵲語猶得暫心寛致光筆端甚髙唐之將亡與呉融詩律皆不全似晚唐善用事極忠憤惟香奩之作詞工格卑豈非世事已不可救姑留連荒亡以紓其憂乎馬上見驕馬錦連錢乗騎是謫僊和裾穿玉鐙隔袖把金鞭去帶懵騰醉歸應困頓眠自憐輸廐吏餘暖在香韀香奩之作為韓偓無疑也或以為和凝之作嫁名於韓劉潛夫誤信之攷諸同時呉融集有依韻倡和者何可掩哉誨淫之言不以為恥非唐之衰而然乎春詞呉融鸞鏡長侵夜鴛衾不識寒羞多轉面語妬極定睛㸔金市舊居近鈿車新造寛春期莫相誤一日百花殘三四非十分着意何以説得至此觀翟玉妓李愿女郎閨閣春抱瑟坐花茵艷粉宜斜燭羞蛾慘向人寄情揺玉柱流盼整羅巾幸以芳香袖承君宛轉塵愿李晟之子李愬之弟昌黎送歸盤谷假借太過愿屢為節度使皆以貪婪敗事此詩見御覽集曰未見好徳可也新春劉方平南陌春風早東隣曙色斜一花開楚國雙燕入盧家眠罷梳雲髻粧成上錦車誰知如昔日更浣越溪紗此葢賦所謂莫愁者用驪姬西子事遺意春日有贈楊巨源堤暖柳絲斜風光屬謝家晚心應戀水春恨定因花步逺憐芳草歸遲見綺霞由來感情思獨自惜年華中四句極細潤緩慢有意味末句尤不迫美人春怨妾家巫峽陽羅幌寢蘭堂曉日臨牕久春風引夢長落釵仍掛鬢微汗欲銷黄縱便朦朧覺魂猶逐楚王名姝詠阿嬌年未多體弱性能和怕重愁拈鏡憐輕喜曳羅臨津雙洛浦對月兩嫦娥獨有荆王殿時時暮雨過兩詩俱流麗可配香奩艷女詞露井桃花發雙雙燕並飛美人姿態裏春色上羅衣自愛頻開鏡時羞欲掩扉心知行路客遥惹五香歸五六工甚亦句法也七言二十四首次韻張公逺二首張耒襄王坐上徵詞客子建車前步水妃瞥過低鬟流盼處争先含笑獨來時東邊日下終無雨闕上書時合有碑腸斷呉王烟水國扁舟何日逐鴟夷平淡春雲捧額浮秋光劍㦸近人流無腸可斷方為恨有藥能治不是愁可待挑琴知有術未傳驅豆更無謀遥知添得春牕夢猶在樽前燭下羞䕫州竇侍郎使君見示悼妓詩顧余嘗識之因命同作劉禹錫前年曾見兩鬟時今日驚吟悼妓詩鳳管學成知有籍龍媒欲換歎無期空廊月照常行地後院花開舊折枝寂寞魚山青草裏何人更立智瓊祠竇夔州見寄寒食日憶故姬小紅吹笙因和之鸞聲窈眇管參差清韻初調衆樂隨幽院粧成花下弄髙樓月好夜深吹忽驚暮槿飄零盡惟有朝霞夢想期聞道今年寒食日東山舊路獨行遲和楊師臯給事傷小姬英英幼學胡琴見藝成今年追想幾傷情撚絃花下呈新曲放撥燈前謝改名但是好花皆易落從來尤物不長生鸞臺夜直衣衾冷雲雨無因入禁城懷妾三山不見海沈沈豈有僊蹤更可尋青鳥去時雲路斷嫦娥歸處月宫深紗牕遥想春相憶書幌誰憐夜獨吟料得夜來天上鏡只應偏照兩人心偶見韓偓千金莫惜早憐一作蓮生一笑從教下蔡傾仙樹有花難問種御香聞氣不知名愁來自覺歌喉咽瘦去誰憐舞掌輕小疊紅牋書恨字與奴方便送卿卿意有餘而不及於䙝則風懷之作猶之可也書婦人之言於雅什不已卑乎故香奩之作惟取七言律六首此詩似三四佳尾句太猥䙝首句早憐生一作買娉婷春盡樹頭初日照西簷樹底蔫花夜雨沾外院池亭聞動鎖後堂欄檻見垂簾柳腰入户風斜倚榆莢堆牆水半淹把酒送春惆悵在年年三月病懨懨此詩只尾句佳宋人用以為小詞者五更往年曾約鬱金牀半夜潛身入洞房懷裏不知金鈿落暗中唯覺繡鞋香此時欲别魂俱斷自後相逢眼更狂光景旋銷惆悵在一生贏得是凄凉前四句太猥太䙝後四句始是詩詠浴再整魚犀攏翠簪解衣先覺冷森森教移蘭燭頻羞影自試香湯更怕深初似洗花難抑按終憂沃雪不勝任豈知侍女簾帷外賸取君王幾餅金趙后外傳昭儀浴帝竊觀之令侍兒勿言投贈以金一浴賜百餅此詩尚有所諷謂世之為君者亦惑乎此也席上有贈矜嚴標格絶嫌猜嗔怒難逢笑靨開小雁斜侵眉柳去媚霞横接眼波來鬢垂香頸雲遮藕粉着蘭胸雪壓梅莫道風流無宋玉好將心力事粧臺五六雖䙝然止形容其貌如巧笑美目之詩不及乎淫也倚醉倚醉無端尋舊約却憐惆悵轉難勝静中樓閣春深雨逺處簾櫳夜半燈抱柱立時風細細遶廊行處思騰騰分明牕下聞裁剪敲徧闌干喚不譍此詩方有味而不及乎猥天平公座中呈令狐公時蔡京在坐李商隠罷執霓旌上醮壇謾裝嬌樹水晶盤更深欲訴蛾睂斂衣薄臨醒玉艷寒白足禪僧思敗道青袍御史擬休官雖然同是將軍客不敢公然子細㸔京嘗為僧司徒故有第五句無題昨夜星辰昨夜風畫樓西畔桂堂東身無彩鳳雙飛翼心有靈犀一㸃通隔坐送􅍐春酒暖分曹射覆蠟燈紅嗟余聴鼓應官去走馬蘭臺類轉蓬颯颯東南細雨來芙蓉塘外有輕雷金蟾齧鎖燒香入玉虎牽絲汲井迴賈氏窺簾韓掾少宓妃留枕魏王才春心莫共花争發一寸相思一寸灰相見時難别亦難東風無力百花殘春蠶到死絲方盡蠟燭成灰淚始乾曉鏡但愁雲鬢改夜吟應共月光寒蓬山此去無多路青鳥殷勤為探㸔楚宫月姊曾逢下彩蟾傾城消息隔重簾已聞珮響知腰細更辨絃一作琴聲覺指纖暮雨自歸山峭峭秋河不動夜厭厭王昌且在牆東住未必金堂得免嫌次韻和王員外雜游四韻呉融一分難減亦難加得自溪頭浣越紗兩槳慣邀催去艇七香曾占取來車黄昏忽墮當樓月清曉休開滿鏡花誰見王郎腸斷處露牀風簟半欹斜三四句好無題楊億曲池波暖蕙風輕頭白鴛鴦占緑萍纔斷歌雲成夢雨陡迴笑電作嗔霆湘蘭自古傳幽怨秦鳳何年入杳㝠不待萱犀蠲薄怒閒階鬭雀有餘翎合歡蠲忿亦休論夢蝶翩翩逐怨魂祇待傾城終未笑不曾亡國自無言風翻林葉迷歸燕露裊池荷觸戲鴛湘水東流何日竭烟篁千古見啼㾗無題錢惟演誤一作晤語成疑意已傷春山低斂翠睂長鄂君繡被朝猶掩荀令薰爐冷自香有恨豈因燕鳳去無言寧為息侯亡合歡不驗丁香結祇得凄凉對燭房耿耿寒燈照翠羅㸔朱成碧意如何虎頭辟惡無妨枕犀角凉心更待磨惟有幽蘭啼月露可將尺素託雲波山屛六曲歸來夜祗恐重抛折齒梭走馬章臺冐雨歸後門猶歎滯前期荷心出水終無定蘿蔓從風莫自持複帳麝輕難辟惡曲房蠶懶不成絲漸漸麥隴藏鳴雉更恨如臯一箭遲簾聲燭影浪多疑仙穀何能為解迷藻井風髙蛛壞網古梁春暖燕争泥更㸔山逺堆凝黛縱許犀靈祇駭雞枉裂霜繒幾千尺紅蘭終夕露珠啼瀛奎律髓巻七

body:
  text: 瀛奎律髓巻三元方回編懷古類懷古者見古迹思古人其事無他興亡賢愚而已可以為法而不之法可以為戒而不之戒則又以悲夫後之人也齊彭殤之修短忘堯桀之是非則異端之説也有仁心者必為世道計故不能自黙於斯焉五言三十二首白帝懷古陳子昂日落滄江晚停橈問土風城臨巴子國臺没漢王宫荒服猶周甸深山尚禹功巖懸青壁斷地險碧流通古木生雲際歸帆出霧中川途去無限客坐思何窮律詩自徐陵庾信以來亹亹尚工然猶時拗平仄唐太宗時多見初學記中漸成近體亦未脱陳隋間氣習至沈佺期宋之問而律詩整整矣陳子昂感遇古詩三十八首極為朱文公所稱天下皆知其能為古詩一掃南北綺靡殊不知律詩極精此一篇置之老杜集中亦恐難别乃唐人律詩之祖如沈如宋如老杜之大父審言併子昂四家觀之可也盖皆未有老杜以前律詩峴山懐古秣馬臨荒甸登髙覽舊都猶悲墮淚碣尚想卧龍圗城邑遥分楚山川半入吳邱陵徒自出賢聖已凋枯野樹蒼煙斷津樓晚氣孤誰知萬里客懐古正踟蹰此老杜以前律詩悲壯感慨即無纎巧砌甃邱陵徒自出一句疑有誤字金陵懐古劉禹錫潮落冶城渚日斜征虜亭蔡洲新草綠幕府舊煙青興廢由人事山川空地形後庭花一曲幽一作憂怨不堪聽每讀劉賔客詩似乎百十選一以傳諸世者言言精確前四句用四地名而以潮日草煙附之第五句乃一篇之斷案也然後應之曰山川空地形而末句乃寓悲愴其妙如此項亭懐古竇常力取誠多難天亡路亦窮有心裁帳下無面到江東命阨留騅處年銷逐鹿中漢家神器在須廢拔山功五竇之長也此詩句句有議論用字無一不工經故人舊居儲嗣宗萬里訪遺塵鶯聲淚濕巾古書無主散廢宅與山隣宿草風悲夜荒村月弔人凄涼問殘栁今日為誰春三四佳送康紹歸建業周賀南朝秋色滿君去意如何帝業空城在民田壊塚多月圎䑓獨上栗綻寺頻過籬下西江水相思見白波三四眼前事亦不可少經費拾遺所居呈封員外李羣玉雲卧竟不起少微空隕光惟應孔北海為立鄭公鄉舊館莓苔合幽齋松菊荒空遺書帶草日日上堦長三四用一事貫串老杜有此體嘉樹傳角弓詩是也武侯廟古柏李商隠蜀相堦前柏龍蛇捧閟宫隂成外江畔老向惠陵東大樹思馮異甘棠憶召公葉凋湘燕雨枝折海雞風玉壘經綸逺金刀厯數終誰將出師表一為問昭融五六善用事玉壘金刀之偶尤工末句候考陳後主宫𤣥武開新苑龍舟燕幸頻渚蓮參法駕沙鳥犯鉤陳夀獻金莖露歌翻玉樹塵夜來江令醉别詔宿臨春鈎陳星後宫之象亦左右宿衞之象過陶徵君舊居崔塗陶令曾居此弄琴遺世情田園三畆綠軒冕一銖輕衰栁自無主白雲猶可耕不隨陵谷變應只有髙名荒淫亡國之主姦邪誤國之臣詩人必詆其遺跡而數其罪至於英主賢臣則美之不容口其或子孫已微陵谷已變猶惓惓焉傷悼悲痛讀此詩者可以類推矣然後知善不可不修惡不可不戒無曰莊生齊物而可以懵然於身後也題倪居士舊居儒翁九十餘舊向北山居生寄一壺酒死留千巻書欄摧新竹少池淺故蓮疎但有子孫在帶經還荷鉏子孫之賢不肖天也雖聖賢亦無如之何張芸叟詩云兒童不識字耕稼魏公莊魏鄭公之後至不識字亦奈何哉過昭君故宅以色靜胡塵名還異衆嬪免勞征戰力無媿綺羅身骨竟埋青塚魂應怨畫人不堪逢舊宅零落對江濵只第一句已感慨青塚之句本非竒異第六句一喚醒併第五句亦精神魂應怨畫人妙甚妙甚題豪家故池吳融嵗乆無泉引春來仰雨流萍乾粘朽檻沙淺露沉舟照影人何在持竿客寄游翛然興廢外囘首謝眠鷗第五句最感慨謂其家歌舞之類今安在哉經廢宅杜荀鶴人生當貴盛修徳可延之不慮有今日爭教無破時蘚斑題字壁花發帶巢枝何况髙原上荒墳與折碑荀鶴詩首首相似定是頷聨作一串景聫體物南游有感杜陵無厚業不得駐車輪重到曾游處多非舊主人東風千嶺樹西日一洲蘋又渡湘江水湘江水復春三四有無窮之味不必指言何代何人而感舊懐今之意自見過侯王故第過此一酸辛行人淚有痕獨殘新碧樹猶擁舊朱門歌歇雲初散簷空燕尚存不知彈鋏客何處感新恩第六句即劉夢得舊時王謝燕之意也猶渾厚未露至尾句則全是夢得燕句意賔客皆何所徃乎懐古眺望宋祁城闉聊屬眺千古恨悠悠夏享空䑓毁韓亡故社留釣䑓韓城悉有遺址在廟祠旌頴鳳黄丞相祠并鳳皇里溪水識巢牛潁水過城下春色依林動晨煙傍戍浮庌騶閒自集田鶴呌相求町篠夤緣宻川葭靃靡柔櫟墟迷鄭鄙隗路隔軒游春秋櫟邑莊周載大隗山皆在感昔如吾輩曽經㡬斛愁此許州詩也公自翰苑出守許昌作工甚長安道中悵然作三首三輔古風煙征驂悵未前山園蓬顆外賈山議始皇侈𦵏言後世不得蓬顆蔽冡宫室黍離邊樹老經唐日碑殘刻漢年便須真隕涕不待雍門絃興亾作今古事徃始堪悲宫破黄山在城空北斗移走岡寒兎隠啼戍暮鴉饑灞㟁重囘首惟餘王粲詩城闕今安在關河昔所憑種祠秦故畤抔土漢諸陵苑樹圎排薺樓雲淡引繒南山不改色千古恨相仍景文自真定移守成都過長安有此詩皆工妙逼唐人過惠崇舊居崇工詩有名於世雖昧平生契懐賢要可傷生涯與薪盡法意共燈長遺畫空觀貌殘詩孰補亾本院惟有師詩稿數巻神期通一語無乃困津梁元註云予為郡之年師之去世已二紀矣景文年四十四初得郡夀陽惠崇舊居院在境内選此一詩以見惠崇之死宋公年二十也過故關韓琦春日并州路羣芳夾故關前騶驅弩過别境荷戈還古戍餘荒堞新耕入亂山時平民自適白首樂農閒承平之際并州用武之地亦閒樂如此五六有味金陵梅堯臣恃險不能乆六朝今已亾山形象龍虎宫地牧牛羊江上鷗無數城中草自長臨流邀月飲莫掛一毫芒龍蟠虎踞本是熟事以宫地牧牛羊為對不覺杜撰之妙猶老杜賞因歌枤杜歸及薦櫻桃也丫頭巗此碑也在金陵斷石岡上有吴大帝字焉丫頭石雖斷文字未全訛年筭赤烏近書疑皇象多㡬時經霹靂異代見干戈更與千秋看松煤定費磨經來白馬寺僧到赤烏年竒矣赤烏皇象則尤竒矣皇象恐作黄非假對真如子規黄葉更佳夏日晚霽與崔子登周襄王故城雨脚收不盡斜陽半古城獨攜幽客步閒閱老農耕寳氣無人發隂蟲入夜鳴余非避喧者坐愛逺風清五六工而自然夏日陪提刑彭學士登周㐮王故城聊隨漢使者一上周王城片雨北郊晦殘陽西嶺眀野禽呼自别香草問無名誰復黍離詠但興箕潁情五六平淡之中有滋味亦工緻三四亦無不工淮隂青環瘦鐵纜繫在淮隂城水脛多長短林枝有直横山䕫一足走妖鳥九頭鳴韓信祠堂古誰將跨下平五六如其所賦之怪塗山古傳神禹迹今向舊山阿莫問辛壬娶從來甲子多夜淮低激射朝嶺上嵯峨荒廟立泥骨巗頭風雨過辛壬甲子亦竒甚與夏侯繹張唐民游蜀岡大明寺秋葉已多蠧古碑看更荒廢城無馬入破塚有狐藏寒日稍清迥羣山分莽蒼田夫指白水此下是雷塘永寜遣興張耒國破空陵墓時移改要衝人隨幽谷路縣隠亂山峰零落荒祠樹悠揚晚寺鐘猶傳僊舊隠跨鹿有遺蹤臞僊詩自然楊誠齋之言也每憶此言讀此詩則知之徐孺子宅趙師秀今識髙眠處滄波是切隣已知難即鹿惟有獨潛鱗苹長過荷葉藤深失樹身閒思昔微子猶自得稱仁五六似不切徐孺子宅異乎西日照窗涼者然亦工宻題釣䑓徐照當時廊廟去此地也成空草木多年換兒孫近代窮無言傷末俗乆立慕髙風梅福神僊者新知是婦翁尾句自來無人道七言七十八首荆州懐古劉禹錫南國山川舊帝畿宋䑓梁館尚依稀馬嘶古樹行人歇麥秀空城澤雉飛風吹落葉填宫井火入荒陵化寶衣徒使詞臣庾開府咸陽終日苦思歸松滋渡望峽中渡頭輕雨灑寒梅雲際溶溶雪水來夢渚草長迷楚望夷陵土黑有秦灰巴人淚應猿聲落蜀客船從鳥道囘十二碧峰何處所永安宫外是荒䑓漢夀城春望古荆州刺史治亭其下有子胥廟兼故楚王墳漢夀城邊野草春荒祠古墓對荆榛田中牧䜿燒芻狗陌上行人看石麟華表半空驚霹靂碑文纔見滿埃塵不知何日東瀛變此地還成要路津西塞山懐古王濬樓船下益州金陵王氣黯然收千尋鐵鎻沈江底一片降幡出石頭人世㡬囘傷徃事山形依舊枕寒流今逢四海為家日故壘蕭蕭蘆荻秋館陶李丞舊居皇甫冉盛名天下挹餘芳棄置終身不拜郎詞藻世傳平子賦園林人比鄭公鄉門前墜葉浮秋水籬外寒臯帶夕陽舊日青松成古木祗應來者為心傷此詩好處元只在平子賦鄭公鄉一聫誰謂為詩不當用事乎用事而不為事所用可也若但有後四句則墮套括隋宫守嵗李商隠消息東郊木帝囘宫中行樂有新梅沉香甲煎為庭燎玉液瓊酥作夀杯遥望露盤疑是月逺聞鼉鼓欲驚雷昭陽第一傾城色不踏金蓮不肯來此以隋宫除夜命題第三句足見其侈末句用潘妃事亦譏煬帝耳以為對作即是為也亦詩家一泛例可戒井絡井絡天彭一掌中謾誇天設劍為峰陣圗東聚燕江口邊柝西懸雪嶺松堪歎故君成杜宇可能先主是真龍将來為報姦雄輩莫向金牛訪舊蹤五六對巧隋宫紫泉宫殿鎻煙霞欲取蕪城作帝家玉璽不縁歸日角錦帆應是到天涯於今腐草無螢火終古垂楊有暮鴉地下若逢陳後主豈宜重問後庭花日角天涯巧籌筆驛魚鳥猶疑畏簡書風雲長為䕶儲胥徒令上將揮神筆終見降王走傳車管樂有才真不忝關張無命欲何如他年錦里經祠廟梁甫吟成恨有餘起句十四字壯哉五六痛恨至矣馬嵬海外徒聞更九州他生未卜此生休空聞虎旅鳴宵柝無復雞人報曉籌此日六軍同駐馬當時七夕笑牽牛如何四紀為天子不及盧家有莫愁六軍七夕駐馬牽牛巧甚善能鬬湊崑體也凌歊䑓當塗縣西宋髙祖築許渾宋祖凌歊樂未囘三千歌舞宿層䑓湘潭雲盡暮山出巴蜀雪消春水來行殿有基荒薺合寢園無主野棠開百年便作萬年計巗畔古碑生綠苔劉裕起於布衣節儉之主三千歌舞之句不近誣否第四句㝡𤣥上一句似牽強至如有基無主一聫近乎熟套而格卑許丁夘詩俗所甚喜予輒抑之以救俗其集懐古數詩為最驪山聞說先皇醉碧桃日華浮動鬱金袍風隨玉輦笙歌迥雲捲珠簾劍佩髙鳳駕北歸山寂寂龍旟西幸水滔滔蛾眉沒後廵游少瓦落宫墻見野蒿咸陽城東樓一上髙城萬里愁蒹葭楊栁似汀洲溪雲初起日沉閣山雨欲來風滿樓鳥下綠蕪秦苑夕蟬鳴黄葉漢宫秋行人莫問當年事故國東來渭水流一作行人莫問前朝事渭水寒光晝夜流尾句合用此十四字為佳中四句與前詩一同皆裝景而已登尉佗樓劉項持兵鹿未窮自乗黄屋島夷中南來作尉任囂力北向稱臣陸賈功簫鼓尚陳今世廟旌旗猶鎻一作鎮昔時宫越人未必知虞舜一奏薰弦萬古風前四句能述尉佗心迹良佳五六不能無病今世昔時猶所謂耳聞英主提三尺眼見愚民盗一抔三尺一抔甚工耳聞眼見即拙矣今世昔時亦然姑蘇懐古宫館遺基輟棹過黍離無限獨悲歌荒䑓麋鹿爭新草空苑鳬鷖占淺莎吴岫雨來虚檻冷楚江風急逺帆多可憐國破忠臣死日日東流生白波學詩者若止如此賦詩甚易而不難得一句即撰一句對而無活法不可為訓以王半山多選其詩亦不可盡捐故取其懐古諸篇於此金陵懐古玉樹歌殘王氣終景陽兵合戍樓空松楸逺近千官塚禾黍髙低六代宫石燕拂雲晴亦雨江豚吹浪夜還風英雄一去豪華盡惟有青山似洛中禾黍髙低六代宫此一句好上句所謂松楸逺近千官塚非也大抵亡國之餘烏有松楸蔽千官之塚者五六却切於江上之景經故丁補闕郊居死酬知已道終全波暖孤氷且自堅鵩上承塵纔一日鶴歸華表巳千年風吹藥蔓迷樵徑雨暗蘆花失釣船四尺孤墳何處是闔閭城外草連天故居舊宅有傷惋之言附諸懐古事有興必有廢勢有盛必有衰國然家亦然也惡人而富貴賢人而終貧賤亦不免遺跡為後人所歎苐是是非非自不同耳故都韓偓故都遥想草萋萋上帝深疑亦自迷塞雁已侵池籞宿宫鴉猶戀女墻啼天涯烈士空垂涕地下强魂必噬臍掩鼻計成終不覺馮驩無路效鳴雞此為昭宗作第六句佳經煬帝行宫劉滄此地曾經翠輦過浮雲流水意如何香銷南國美人盡怨入東風芳草多殘栁宫前空露葉夕陽川上浩煙波行人遥起廣陵思古渡月明聞棹歌咸陽懐古經過此地無窮事一望凄然感廢興渭水故都秦二世咸陽秋草漢諸陵天空絶塞聞邊雁葉盡孤村見夜燈風景蒼蒼多少恨寒山半出白雲層長洲懐古野燒空原盡荻灰吳王此地有樓䑓千年事徃人何在半夜月明潮自來白鳥影從江樹沒青猿聲入楚雲哀停車日晚薦蘋藻風靜寒塘花正開劉藴靈大中八年進士其詩乃尚有大厯以前風味所以髙於許渾者無他渾太工而貪對偶劉却自然頓挫耳聴人話叢䑓李逺有客新從趙地囘自言曾上古叢䑓雲遮㐮國天邊盡樹遶漳河地裏來絃管變成山鳥哢綺羅留作野花開金輿玉輦無踪跡風雨惟知長碧苔平熟但頗近套不收或謂遺材也過九成宫吳融鳳輦東歸二百年九成宫殿半荒阡魏公碑字封蒼蘚注魏文帝有碑唐帝泉聲落野田注云太宗行幸有靈泉自湧碧草新沾僊掌露綠楊猶憶御爐煙昇平舊事無人說萬叠青山但一川過丹陽雲陽縣郭半郊坰風雨蕭條萬古情山帶梁朝陵路斷水連劉尹宅基平桂枝自折思前代李考功於此知貢舉藻鑑難逢恥後生殷文學於此集英靈遺事滿懐兼滿目不堪孤棹艤荒城富春水送山迎入富春一川如畫晚晴新雲低逺渡帆來重潮落寒沙鳥下頻未必栁間無謝客也應花裏有秦人嚴光萬古清風在不敢停橈更問津三四言景五六懐人至尾句乃歸之嚴光髙矣武關時來時去若循環雙闔平雲謾鎻山祗道地教秦設險不知天與漢為闗貪生莫作千年計到了都成一夢閒爭得便如巗下水從他興廢自潺潺題延夀坊東南角古池蔓草蕭森曲㟁摧水籠沙淺露莓苔更無簇簇紅粧點猶有雙雙翠羽來雨細㡬逢耕犢去日斜時見釣人囘繁華自古皆相似金谷荒園土一堆廢宅風飄碧瓦雨摧垣却有隣人為鎻門㡬樹好花閒白書滿庭荒草易黄昬放魚池涸蛙爭聚栖燕梁空雀自喧不獨凄凉眼前事咸陽一火便成原赤壁懐古崔塗漢室河山鼎勢分勤王誰肯顧元勲不知征伐由天子唯許英雄共使君江上戰餘陵是谷渡頭春在草連雲分明勝敗無尋處空聴漁歌到夕曛三四善用事好題潤州妙善寺前石羊傳云吳主孫權與蜀主劉備嘗置此㑹云羅隠紫髯桑盖此沉吟很石猶存事可尋漢鼎未安聊把手楚醪雖滿肯同心英雄已徃時難問苔蘚何知日漸深還有市㕓沽酒客雀喧鳩聚話蹄涔此詩昭諫集中第一今京口此石猶存詩牌亦無恙云經故友所居槐花漠漠向人黄此地追逰迹已荒清論不知莊叟逹死交空歎趙岐亡病來未忍言閒事老去惟知覔醉鄉日暮街東策羸馬一聲横笛似山陽五六淡而有味曲江有感江頭日暖花正開江東行客心悠哉髙陽酒徒半凋落終南山色空崔嵬聖代也知無棄物侯門未必用非才滿船眀月一竿竹家在五湖歸去來此但是不得志之辭不見懐古如何第四句亦有所指黄河莫把阿膠向此傾此中天意固難明觧通銀漢應須曲纔出崑崙便不清髙祖誓功衣帶小僊人占斗客槎輕三千年後知誰在何必勞君報太平此以譬人心不可測者籌筆驛抛擲南鄉為主憂北征東討盡良籌時來天地皆同力運去英雄不自由千里山河輕孺子兩朝冠劍恨譙周惟餘嵓下多情水猶解年年傍驛流廣陵開元寺閣上作滿檻山川漾落暉檻前事事去如飛空中雞犬劉安過月下笙簫煬帝歸江蹙海門帆散出地呑淮口樹相依紅樓翠幙知多少長向東風有是非戱者謂三四為見鬼詩其實驕王荒帝亦自不宜引用然俗口傳之已熟尾句亦可人也䑓城晚雲隂暗下空城六代纍纍夕照眀玉井已乾龍不起金甌雖破虎曾爭亦知罷世才難得却是窮塵事㝡平深谷作陵山作海茂𢎞流輩莫傷情水邊偶題野水無情去不囘水邊花好為誰開只知事逐眼前去不覺老從頭上來窮似丘軻休歎息逹如周召亦塵埃思量此理何人㑹家邑先生㝡有才三四老世人誦之甚稔乃昭諫詩也南朝四首楊億五鼓端門漏滴稀夜籖聲斷翠華飛繁星曉埭聞雞度細雨春塲射雉歸步試金蓮波濺襪歌翻玉樹涕沾衣龍盤王氣終三百猶得澄瀾對敞扉夜半至雞鳴埭及射雉迺齊事金蓮潘妃事玉樹陳後主事此雜賦南朝耳詩並見西崑倡酬事組織華麗盖一變晚唐詩體香山詩體而效李義山自楊文公劉子儀始歐梅既作尋又一變然歐公亦不非之而服其工二錢惟演結綺臨春映夕霏景陽鐘動曙星稀潘妃寶釧光如晝江令花牋落似飛舴艋臨波朱火度觚稜拂漢紫煙微自從飲馬秦淮水蜀栁無因對殿幃右錢惟演詩惟演有擁旄集行於世亦首作崑體之一人即錢思公也三劉筠華林酒滿勸長星青漆樓髙未稱情麝壁燈廻偏照晝雀航波漲欲浮城鐘聲但恐嚴粧晚衣帶那知敵國輕千古風流佳麗地盡供哀思與蘭成崑體詩所以用事務為雕蔟者此也一衣帶謂大江耳蘭成謂庾信哀江南賦四李宗諤僊華玉夀曉沉沉三閣齊雲複道深平昔金鋪空廢苑於今瓊樹有遺音珠簾映寢方成夢麝壁飄香未稱心惆悵雷塘都㡬日吟魂醉魄巳相尋尾句絶妙隋煬帝為晉王從賀若弼等下江南既而荒淫於江都恍惚月下見陳後主陳隋䘮亡相尋一轍不以徳競而以力勝俱亡而巳漢武四首楊億蓬萊銀闕浪漫漫弱水囘風欲到難光照竹宫勞夜拜露漙金掌費朝餐力通青海求龍種死諱文成食馬肝待詔先生齒編貝那教索米向長安此詩有說譏武帝求僊徒費心力用兵不勝其驕而於人才之地不加意也詩話稱此五六二劉筠漢武天䑓接絳河半涵飛霧鬱嵯峨桑田欲看他年變瓠子先成此日歌夏鼎㡬遷空象物秦橋未就巳沉波相如作賦徒能諷却助飄飄逸氣多五六言興亾之運理所必有雖漢武帝之力鉅心勞終亦無如之何也末句謂諫者之不切三錢惟演一曲横汾鼓吹逥侍臣髙㑹柏梁䑓金芝曄煜凌晨見青雀軒翔白晝來立候東溟邀鶴駕窮兵西極待龍媒甘泉祭罷神光滅更遣人間識玉杯東求蓬島西求宛馬亦志大心勞矣𦵏地玉杯遄出人間悲之也亦理之所不能免也人君而鍳此則修徳人臣而感此則盡心以事主聴其運於天可也四刀衎髙宴柏梁詞可仰横汾簫鼓樂難窮巳教丞相開東閣猶使將軍悞北戎灑淚甘泉還有恨祈年僊館惜成空誰知辛苦囘中道共盡千齡五柞宫人無有不死者堯舜桀紂其死一也儉而安於自然者順也侈而不安其天卒亦歸於一空者逆也不伏死之人未有不得其死曾謂其智力可恃乎眀皇三首楊億玉牒開觀檢未封鬬雞三百逺相從紫雲度曲傳浮世白石標年鑿半峰河朔叛臣驚舞馬渭橋遺老識真龍蓬山鈿合愁通信囘首風濤一萬重五六詩話所稱凡賦唐眀皇詩至於養成祿山之禍皆自侈靡奢縱始蠱於心而昏於事不過如此二錢惟演山上湯泉架玉梁雲中複道拂瑶光絲囊暗合三危露翠幰時遺百和香任是金雞親便坐更抛珠被掩方牀匆匆一曲梁州罷萬里橋邊見夕陽詩貴一輕一重對說一曲梁州為樂㡬何萬里橋在成都府却忽屈萬乗至彼樂之中成此哀也三劉筠嵗嵗南山見夀星百蠻囘首奉威靈梨園法部兼畨部玊輦長亭復短亭河鼔暗期隨日轉馬嵬恨血染塵腥西歸重按臨波舞故老相看但涕零三四良佳荒唐沉湎有如此流離顛沛忽如彼皆可為後世人主之戒眀皇賴有太子即位靈武郭子儀李光弼之兵足以戰及忠臣義士之志未離唐室故得返駕舊京有此末句不然父子俱入蜀中原之人雖不服祿山江東已有永王璘欲炙矣事將如何成都三首楊億五丁力盡蜀川通千古成都綠酎濃白帝倉空蛙在井青天路險劍為峰漫傳西漢祠神馬巳見南陽起卧龍張載勒銘堪作戒莫矜函谷一丸封公孫述以術愚民衆傳光武破隗囂天水述急下令謂白帝倉米一夕大空民爭徃觀意其怪也既而實不失米乃謂民曰此猶妄傳天水破耳竟如此語自合檢看此専以公孫述割據恃險戒後之人二劉筠鏤膚剽俗恣遊遨可得蹲鴟號富饒井絡共知天與險蠶叢無奈世興妖杜鵑積恨花如血諸葛遺靈柏半燒才似文園何足道一生琴意祗成痟三錢惟演武侯千載有餘靈盤石刀痕尚未平巴婦自饒丹穴富漢庭還負碧砮征雨經蜀市應和酒琴到臨卭别寄情知有忠臣能叱馭不論雲棧更崢嶸劉錢二公泛詠蜀事亦各有工處始皇三首楊億衡石量書夜漏深咸陽宫闕杳沉沉滄波沃日虛鞭石白刃凝霜枉鑄金萬里長城穿地脉八方馳道聴車音儒坑未冷驪山火三月青煙繞翠岑第七句㝡佳作詩之法也坑儒未㡬驪山巳火以一火字貫上意二劉筠利觜由來得擅塲盡遷豪富入咸陽屬車夜出迷雲雨峻令朝行劇虎狼前殿建旗臨紫極東門立石見扶桑從臣善頌徒虚美不奈盧生䜟國亡尾句絶妙亡秦者胡也此䜟巳預播矣徳不足以弭之雖勒碑頌美亦自愚而巳三錢惟演天極周環百二都六王鐘鐻接流蘇金椎謾築甘泉道匕首還隨督亢圗巳覺副車驚博浪更攜連弩望蓬壺不將寸土封諸子劉項由來是匹夫督亢之亢作平聲作仄聲用亦可末句尤妙天下事每出於智之所不能料有天下者修徳而巳人主徃徃知懲前代之失至於矯枉過正則其禍必伏於人之所不能見者劉項匹夫而亡秦又豈必封建地大者足為患耶此崑體詩一變亦足以革當時風花雪月小巧呻吟之病非才髙學博未易到此乆而雕篆太甚則又有能言之士變為别體以平淡勝深刻時勢相因亦不可一律立論也過鴻溝王禹偁侯公緩頰太公歸項籍何曾㑹戰機只見鴻溝分兩界不知垓下有重圍危橋帶雨無人過敗葉隨風傍馬飛半日垂鞭念前事露莎霜樹映斜暉元之詩學樂天此首殊覺髙古官下宋祁東泊驂驔一駐車騩雲芣木淡扶疎鄭與騩山風經禦冦僊游外野識裨諶草創餘潁谷寒煙仍井邑時門殘日但邱墟古治國非今治所兩都大道過從盛不稱支離佩左魚公自成都府詔許交事還䑓尋知鄭州所謂圃田虎牢也列子裨諶潁谷時門四事切善造語題杜子美書堂趙抃直將騷雅鎮澆淫瓊貝千章照古今天地不能籠大句鬼神無處避幽吟㡬逃兵火羈危極欲厚民風意思深茅屋一間遺像在有誰於此是知音句句中的和張民朝謁建隆寺二次用寫望試筆韵梅堯臣荒䑓殘壘舊名邦曾說王師此受降西漢衣冠拜原廟五天龍象䕶經窗蜀岡井味人猶品隋帝宫基闕尚雙自古興亡不須問風鈴閒聴響幡幢以雙對品甚工異世之所鮮題朝元閣韓琦試徃驪山頂上行朝元孤絶聳崢嶸了無樓殿嗟餘侈自見耕桑復太平雨後綠苔多滑徑葉間紅子不知名南巔更就丹霞挹頓覺汪然病骨清太平而懐古與離亂而懐古兩般情懐公熙寜初鎮長安題此和吳御史臨淮感事王安石柵鎻城扉曉一開柂牙車軸轉成雷黄塵欲碍龜山出白浪空分汴水來澄觀有材邀味陋霽雲無力報姦囘騷人此日追前事悲氣随風動管灰和微之重感南唐事叔寶傾陳衍弊梁可嗟曾不見興亡齋祠父子終身費酣詠君臣舉國荒南狩皖山非故地北師淮水失名王天移四海歸真主誰誘昏童肯用長末句押韻好謂有舟楫之長技而不能保夫江者以運去人離也次韻微之髙齋有感臺殿荒墟辱井堙豪華不復見臨春北山漠漠雲垂地南堞悠悠水映人馳馬蔽虧松半死射塲埋沒雉多馴登髙一曲悲亡國想遶紅梁落暗塵二詩皆金陵懐古之别題耳金陵懐古四首霸祖孤身取二江子孫多以百城降豪華盡出成功後逸樂安知與禍雙東府舊基留佛刹後庭遺唱落船牕黍離麥秀從來事且置興亡共酒缸天兵南下北橋江敵國當時指顧降山水雄豪空復在君王神武自難雙留連落日頻囘首想像餘墟獨倚牕却憶夏陽纔一葦漢家何事費罌缸地勢東囘萬里江雲間天闕古來雙兵纏四海英雄得聖出中原次第降山水寂寥埋王氣風煙蕭颯滿僧牕廢陵敗冢空冠劍誰復沾纓酹一缸憶昨天兵下蜀江將軍談笑士爭降黄旗已盡年三百紫氣空收劍一雙破堞自生新草木廢宫誰識舊軒牕不須搔首尋遺事且倒花前白玉缸讀半山所作又讀劉貢父所作韻險而律熟若皆似乎不和韻者亦可長學詩者一格也第三首移降字雙字先後之此亦一例金陵懐古次韻劉攽虎踞羣山帶遶江為誰興國為誰降髙臺麋鹿看無數廢苑鳬鷖去自雙萬事朝雲隨逝水百年西日照虚牕白門酒美東風快笑數英雄盡一缸樓船西下勢横江元帥旌旗就約降旋報前師覆張悌亟傳單騎馘王雙燕焚正自當煙突蟻潰何堪值水牕囘首三軍歡奏凱萬牛行䏑酒千缸耆老傳云金陵城破自城下水牕兵入楚貢來遲詭問江漢收羣䇿士心降一言已重黄金百再見仍䝉白璧雙票客脫身甘馬革老儒投筆謝書牕豈知三閣酣詩酒浩唱庭花倒玉缸頽垣落水半平江喬木呼風不易降耕出珠璣時得一道逢麟鳳不成雙潮聲半夜來寒渚月色深秋照舊牕唯有魚鹽城下市檣烏相對集瓶缸四詩皆工麗悲壯善用事一也善用韻二也全篇無牽强不似和詩其美三也依韻和金陵懐古王珪懐鄉訪古事悠悠獨上髙樓滿目秋一鳥帶煙飛别浦數帆和雨下歸舟蕭蕭暮吹驚紅葉慘慘寒雲壓舊樓故國凄凉誰與問人心無復更清流此詩誤刋荆公集中今以岐公集為正金陵懐古控帶洪流古帝城欲尋舊事半榛荆六朝山色情終在千古江聲恨未平設險邱陵荒蔓草帶城桑柘接新耕十年重到無人問獨立東風一愴情登懸瓠城感吴季子將軍戈甲從天下丞相旌旗匝地來堪笑怒螳猶強臂不知蟄户欲驚雷咄嗟武相深寃洗指顧山東逆境開吏部聲名千古在斷碑何處卧蒼苔元注碑既磨復命段文昌撰故碑不得予謂今韓碑行於世終不知有文昌碑三鄉懐古清洛東流去不還漢唐遺事有無間廟荒古木連空谷宫廢春蕪入亂山南陌絮飛人寂寂空城花落鳥闗闗登臨㡬度游人老又對東風鬢欲斑登海州樓城外滄溟日夜流城南山直對城樓溪田雨足禾先熟海樹風髙葉易秋疏傅里閭詢故老秦皇車甲想東遊客心不待傷千里檻外風煙盡是愁過鄴中劉屏南逐鹿營營一夢驚事隨流水去無聲黄沙日傍荒臺落綠樹人穿廢苑行遺恨分香憐晚莭勝遊飛盖想髙情我來不暇論興廢一點西山入眼眀分香指曹操飛盖指曹植㝠西園詩也四字極切題釣臺潘檉蟬冠未必似羊裘出處當時巳熟籌但得諸公依日月不妨老子卧林邱英雄陳迹千年在香火空山萬木秋自笑黄塵吹鬢客愛來祠下繫孤舟轉菴潘檉字徳乆永嘉人葉水心快稱其詩競謂永嘉四靈之徒凡言詩者皆夲徳乆父任右職閤門福建兵鈐卒雨花䑓劉克莊昔年講師何住在髙䑓猶有雨花名有時竇向泥尋得一片山無草敢生落日磬殘隣寺閉晴天牛上廢陵耕登臨不用深懐古君看鍾山㡬箇爭後村壯年詩學晚唐初成而未脫俗故尾句終俗瀛奎律髓巻三

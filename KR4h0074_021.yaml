body:
  text: 瀛奎律髓卷二十一元方回編雪類文選以二謝雪賦月賦入物色類雪於諸物色中最難賦今選詩家巨擘一句及雪而全篇見雪意雪景者亦取之雖不專用禁體然用事淺近者皆不取五言三十三首赴京途中遇雪孟浩然迢遞秦京道蒼茫嵗暮天窮隂連晦朔積雪滿山川落雁迷沙渚飢烏噪野田客愁空佇立不見有人煙規模好和張丞相春朝對雪迎氣當春立承恩喜雪來潤從河漢下花逼艷陽開不覩豐年瑞安知燮理才撒鹽如可擬願糝和羮梅此必為張九齡也善用事者化死事為活事撒鹽本非俊語却引為宰相和羮糝梅之事則新矣對雪杜甫北雪犯長沙胡雲冷萬家隨風且間葉帶雨不成花金錯囊垂罄銀壺酒易賖無人竭浮蟻有待至昏鴉詩家善用事者藏一字於句中銀壺酒易賖非易也乃不易也錢囊既已空矣酒可以易賖乎但吟此者著些斷續輕重即見意矣以尾句驗之蓋無人肯賖酒直待至昏黑也對雪戰哭多新鬼愁吟獨老翁亂雲低薄暮急雪舞回風瓢棄樽無緑爐存火似紅數州消息斷愁坐正書空他人對雪必豪飲低唱極其樂唯老杜不然每極天下之憂雪南雪不到地青崖霑未消微微向日薄脈脈去人遙冬熱鴛鴦病峽深豺虎驕愁邊有江水焉得北之朝江水東流欲挽之使北愛君戀闕之心切矣舟中夜雪有懷盧十四侍御弟朔風吹桂水大雪夜紛紛暗度南樓月寒深北渚雲燭斜初近見舟重竟無聞不識山隂道聽雞更憶君舟重竟無聞可謂善言舟中聽雪之狀凡用事必須翻案雪夜訪戴一時故實今用為不識路而不可往則竒矣泊嶽陽城下江國輸千里山城僅百層岸風翻夕浪舟雪灑寒燈留滯才難盡艱危氣益增圖南未可料變化有鯤鵬此一詩只一句言雪而終篇自有雪意其詩壯哉乃詩家樣子也春雪韓愈看雪乘清旦無人坐獨謡拂花輕尚起落地暖初銷已訝凌歌扇還來伴舞腰灑篁留密節著柳送長條入鏡鸞窺沼行天馬度橋遍階憐可掬滿樹戲成搖江浪迎濤日風毛縱獵朝弄間時細轉爭急忽驚飄城險疑懸布砧寒未搗綃莫愁隂景促夜色自相饒昌黎雪詩三大篇贈張籍來字四十韻獻裴尚書篩字二十韻坳中初蓋底垤處遂成堆片片勻如剪紛紛碎若挼奴回切隨車翻縞帶逐馬散銀杯隱匿瑕疵盡包羅委瑣該誤雞宵厄喔驚鵲暗徘徊鯨鯢陸死骨玉石火炎灰日輪埋欲側坤軸壓將頺龍魚冷蟄苦虎豹餓號哀巧借奢華便專繩困約災此來字韻警句也宿雲寒不卷春雪墮如篩喜深將䇿試驚密仰簷窺妬舞時飄袖欺梅併壓枝氣嚴當酒換灑急聽窗知履敝行偏冷門扃卧更羸擬鹽吟舊句授簡慕前規此篩字韻警句也此一首十韻行天馬度橋一句絶唱和欲雪二首梅堯臣貂裘著不暖牙帳曉初開朔氣還先及流風亦屢催擬聞人詠絮將見使傳梅公復憂民畝龍沙幾日來雪欲漫天落雲初著地垂臂鷹過野健走馬上氷遲公子多論酒騷人自詠詩都無少年意只卧竹窗宜似是和晏元獻欲雪詩前首下先及屢催擬聞將見又繼以龍沙幾日來皆欲雪未雪之辭雪詠雪色混青冥搴帷宿酒醒龍蛇緣古木鳳鵠舞幽庭密勢因風力輕姿任物形公堂何寂寞橫案對玄經五六細潤臘日雪風毛隨校獵浩浩古原沙寒入弓聲健隂藏兔徑賖馬頭迷玉勒鷹背落梅花少壯心空在悠然感歲華刋本誤以獵為臘豫輒改定乃是獵而遇雪五六絶佳十五日雪三首寒令奪春令六花浸百花塘氷膠燕觜野水澀芹芽擁柱輕於絮吹墀淨若沙乳禽飢啄木誰誤撥琵琶新雷奮蛇甲密雪鬭鵝毛正欲裁輕縠重令著敝袍沙泉流復凍煙蕚折還韜只待鄰醅熟微聲聽酒槽春風九十日一半已銷磨凖擬看花少依稀詠雪多官車猶載炭菢鵲不離窠向此興都盡戴家誰復過此乃花朝日雪是年皇祐五年癸巳正月十五日狄青破儂智髙之年陳后山生聖俞五十二嵗監永濟倉次韻范景仁舍人對雪三尺沒腰雪京華頻嵗無髙低相掩覆竅隙似封糊帖缺都迷醜增妍不問枯因時混貧富遇物得圓觚眩目何曽數流風不可圖冥冥山霧合浩浩海雲鋪未覺花飛葉先看霰集珠落機裁扇素獵野割膚腴粲爾娥奔月皤然叟赴酺落才今揣稱小巧愧非夫又聯獸餒迷行穴禽寒立並枯受降鍪甲積罷獵羽毛鋪裝成新樹色遮盡古苔䀶尤佳雪中寄魏衍陳師道薄薄初經眼輝輝巳映空融泥還結凍落木復沾叢意在千年表情生一念中遙知吟榻上不道絮因風魏衍后山門人遙知吟榻上不道絮因風此教人作詩之法也撒鹽空中羞可擬此固謝家子弟之拙未若柳絮因風起未可謂謝夫人此句冠古也想魏衍此時作詩必不用此等陳言乃后山意也然則詩家有翻案法又在乎人晉書郭文曰情由憶生不憶故無情雪初雪已覆地晚風仍積威木鳴端自語鳥起不成飛寒巷聞驚犬鄰家有夜歸不無慚敗絮未易泣牛衣句句如瘦鐡屈蟠次韻無斁雪後二首閉閣春雲薄開門夜雪深江梅猶故意湖雁起歸心草潤留餘澤窗明度積隂殷勤報春信屋角有來禽取信一作性無通介隨時有異同雪餘蓋地白春淺著梢紅寄食虛長算論詩缺近功相看不相棄賴有古人風凡與朝無斁倡和皆在曹州后山依其婦翁郭槩於曹無斁時為學官雪後黃樓寄眉山居士林廬煙不起城郭嵗將窮雲日明松雪溪山進晚風人行圖盡裏鳥度醉吟中不盡山隂興天留憶戴公明字進字皆詩眼元日雪半夜風如許平明雪皓然簾踈穿細碎竹壓更嬋姢窘兔走留迹飢烏鳴乞憐遙欣炎海上還復得新年末句為東坡在儋州雪意睡眼拭朦朧開門雪巳濃客來迷舊徑虎過失新蹤浦逺渾無鶴林疏只有松借琴如不解酒興若為工雪之浦惟其逺故鶴不可見謂之渾無鶴可也雪之林惟其踈故松獨可見謂之只有松可也全在逺字疏字上見工更得前聯不用虎迹一句則不冗矣此二句尹穡得其餘工有詩曰草黃眠失犢石白動知鷗亦佳併記諸此榆關書不到雪又滿平蕪指冷頻呵玉胸寒屢掩酥緑嘗冬至酒紅擁夜深爐塞上風沙惡征衣也到無此篇似閨人念征夫詠雪呵玉掩酥一聨亦流麗雪盡吕本中雪盡寒仍在園荒春欲歸晴空落雁少古木聚鴉稀肺病猶宜酒囊空合典衣碧雲愁不見千里故山薇三四佳年華陳與義去國頻更嵗為官不救飢春生殘雪外酒盡落梅時白日山川映青天草木宜年華不負客一一入吾詩金潭道中晴路籃輿穩舉頭間望賖前岡春泱漭後嶺雪槎牙海內兵猶壯村邊嵗自華客行驚節序回眼送一作望桃花陳簡齋無專題雪詩此二首一云春生殘雪外一云後嶺雪槎牙皆於雪如盡佳句也且詩律絶髙特取諸此以備玩味雪中偶成潘良貴飛花看六出俄向臘中來解驗人情喜始知天意回夜闌窗愈白曉凍日難開麥熟何時節飢民正可哀歉嵗多流冗邦侯善勞來雪餘驚臘盡耕近喜春回郊野猶同色江天巳半開短衣難掩脛誰説少陵哀潘良貴字子賤詩傳者不多風格老練而繳句皆髙古悲愴味其旨仁人之言也用朱教授韻架上殘書猶可讀瓶中儲粟不堪舂用姪德久韻尚餘披樹雪巳有浴溪禽皆佳雪中登王正中書閣曽幾對雪誰同語登樓似欲仙人家修月户丈室散花天山擁鈎簾外江橫隱几前寒深落雁渚清集釣魚船扶病從摩詰消愁得仲宣展書明細字烹茗濕疏煙月好還同夢詩成巳下弦明年倘相憶為一到關邊次韻雪中積雪何所待凍雲終未開有時聞㵼竹無路去尋梅只欲關門卧誰能蕩槳來辟寒須底物正乏麴生才亦用袁安子猷事但詩律穩熟可法雪中二首陸遊春晝雪如篩清羸病起時迹深驚虎過煙絶憫僧飢地凍萱牙短林深烏哢遲西窗斜日晚呵手斂殘棋忽忽悲窮處悠悠感嵗華暮雲如潑墨春雪不成花眼澀燈生暈詩成字半斜殘樽已傾盡試起問東家前篇中四句不勝其工末句尚不放過更著餘工可喜也後篇亦可取小雪夜卧風號野晨興雪擁籬未言能壓瘴應是欲催詩跨蹇雖堪喜呼舟似更竒元知剡溪路不減灞橋時此詩五六善斡旋大雪月下至旦欲午始晴薄暮雪雲低清宵意慘悽方聽打窗急巳報與階齊踈箔穿飛蝶空庭聚戲猊新晴思訪客愁絶滿城泥雪尤袤睡覺不知雪但驚窗户明飛花厚一尺和月照三更草木淺深白邱塍髙下平飢民莫咨怨第一念邊兵見雪而念民之飢常事也今不止民飢又有邊兵可念歐陽詩可憐鐡甲冷徹骨四十餘萬屯邊兵以此忤晏相意而晏相亦坐此罷相然則凡賦詠者又豈但描寫物色而已乎雪意濃復作雨范成大擬看飛花陳翻成建水聲雨吾寧不識雪汝幾時成三白從今卜千倉待此盈暮雲如有意青女莫無情三白千倉對偶新雪楊萬里夜映非真曉山明不覺遙儘寒無禁爽且落未須銷體怯心仍受顔衰酒強朝毛錐自堪戰寸鐡亦何消是雨還堪拾非花却解飛兒童最無賴搏弄肯言歸白樹翻投竹欺人故點衣肩寒未妨聳筆凍可能揮細聽無仍有貪看立又行落時晨却暗積處夜還明幸自漫山好何如到夏清似知吾黨意未遣日華晴用白戰律仍禁用故事詠三首誠齋此詩枯瘦甚矣七言四十七首暮登四安寺鐘樓寄裴十迪杜甫暮倚髙樓對雪峰僧來不語自鳴鐘孤城返照紅將斂近市浮煙翠且重多病獨愁常閴寂故人相見未從容知君苦思緣詩瘦太向交遊萬事慵老杜七言律無全篇雪詩此首起句言髙樓對雪峰三四返照浮煙乃雪後景也選置於此以表詩體前四句專言雪後晚景後四句専言彼此情味自然雅潔必若著題詩八句黏帶即為詩必此詩而詩拙矣所謂不可無開闔也春雪秦韜玉雪重寒空思寂寥玉塵如糝滿春朝片才著地輕輕陷力不禁風旋旋消惹砌任從香粉妬縈叢自學小梅嬌誰家醉捲珠簾看絃管堂深暖易調三四頗切於春雪但詩格稍弱次韻和刁景純春雪戲意梅堯臣雪與春歸落嵗前曉開庭樹有餘妍楊花撲撲白漫地蛺蝶紛紛飛滿天胡馬嘶風思塞草吳牛喘月困沙田我貧始覺今朝富大片如錢不解穿此戲語耳三四雖戲却自佳雪後書北臺壁蘇軾城頭初日始翻鴉陌上晴泥巳沒車凍合玉樓寒起粟光搖銀海眩生花遺蝗入地應千尺宿麥連雲有幾家老病自嗟詩力退空吟氷柱憶劉義雪宜麥而辟蝗蝗生子入地雪深一尺蝗子入地一丈玉樓為肩銀海為眼用道家語然竟不知出道家何書蓋黃庭一種書相傳有此説黃昏猶作雨纎纎夜靜無風勢轉嚴但覺衾裯如潑水不知庭院巳堆鹽五更曉色侵書幌半月集作夜寒聲落畫簷試掃北臺看馬耳未隨埋沒有雙尖馬耳山名與臺相對坡知密州時作年三十九嵗偶然用韻甚險而再和尤佳或謂坡詩律不及古人然才高氣雄下筆前無古人也觀此雪詩亦冠絶古今矣雖王荆公亦心服屢和不巳終不能壓倒再用韻九陌凄風戰齒牙銀杯逐馬帶隨車也知不作堅牢玉無乃能開頃刻花對酒強歌愁底事閉門高臥定誰家臺前日暖君須愛氷下寒魚漸可義巳分酒杯欺淺懦敢將詩律鬭深嚴漁簔句好真堪畫柳絮才高不道鹽敗履尚存東郭指飛花又舞謫仙簷書生事業真堪笑忍凍孤吟筆退尖漁簔句好鄭谷漁簔道韞桞絮賴此增光而世無異論不道鹽三字出南史詳見詩話及本詩注退之詩兔尖齊莫並若苦寒則退尖矣李白詩好鳥吟春歌後院飛花送酒舞前簷文字可謂縛虎手義尖二字和得全不喫力非坡公天才萬卷書胸未易至此讀眉山集次韻雪詩五首今取第一首餘見注王安石古木昏昏未有鴉凍雷深閉阿香車摶雲忽散篩為屑剪水如紛綴作花擁帚尚憐南北巷持杯能喜兩三家戲挼亂掬輸兒女羔袖龍鍾手獨義和險韻賦難題此一詩已未易看矣第一句謂日晦第二句謂雷墊皆所以形容寒天也三四謂摶雲而篩為屑剪水而綴為花所以形容雪之融結也擁帚持杯則謂以雪為苦者多以雪為樂者少末兩句最佳戲挼亂掬者兒女曹不畏雪也老人則義手於袖中耳第二首夜光往往多聯壁小白紛紛每散花形容雪之積雪之飛珠網纚連拘翼座此一句用佛書事拘翼者天帝之名也增益阿含經有釋提桓與菩提論天帝拘翼治病藥事瑶池渺漫阿環家此一句用西王母事阿環亦王母之名也珠網之座瑶池之家以形容雪耳然晦僻不及坡之自然末句銀為宫闕尋常見豈即諸天守夜義言邂逅於雪天見銀宫闕無夜義以守之亦牽強矣又第三首前聯皭若易緇終不染紛然能幻本無花亦佳但頗裝點觀空白足寧知處疑有青腰豈作家亦揑合慧可忍寒真覺晚為誰將手少林義用立雪事亦平平第四首長恨玉顔春不久畫圖時展為君義謂雪不長存當畫為圖時時義而觀之暗用唐薛媛寄夫詩恐君渾忘却時展畫圖看又第五首豈能舴艋真尋我且與蝸牛獨臥家亦佳末句欲挑青腰還不敢直須詩膽付劉義即坡巳用之韻劉義有詩膽大於天之句亦不為不善用也五詩皆選恐誤人故細注論之讀睂山集愛其雪詩能用韻復次韻一首靚粧嚴飾曜金鴉比興難同漫百車水種所傳清有骨天機能織皎非花嬋娟一色明千里綽約無心熟萬家長此賞懷甘獨臥袁安交戟豈須義荆公和坡義字韻至此為六水種所傳清有骨李雁湖注水種未詳逸雅釋名雪綏也水下遇寒而凝綏綏然下也觀此則雪本水為之豫謂深僻難曉併下句天機能織皎非花亦不可曉若曰用天孫織女事與雪無關涉也但五六極佳嬋娟一色明千里似謂雪之色與月無異綽約無心熟萬家即莊子姑射神人其神凝年穀熟出處有綽約若氷雪語意儘工也末句亦奇漢三公領兵入見交戟義頸袁安以卧雪得舉孝亷後為三公意謂義頸而入朝正不如閉門而獨臥也然則亦勉強矣次韻王勝之詠雪萬户千門車馬稀行人却返鳥休飛玲瓏剪水空中墮的皪裝春樹上歸素髮聨華驚老大玉顔爭好羡輕肥朝來巳賀豐年瑞試問農家果是非尾句好朝廷以為瑞而賀矣田家其果然否羡輕肥三字押韻牽強次韻酬府推仲通學士雪中見寄朝來看雪詠新詩想見朱衣在赤墀為問火城將䇿試何如雪屋聽窗知曲牆稍覺吹來密窮巷終憐掃去遲欲訪故人非興盡自緣無路得傳之喜深將䇿試驚密仰簷窺氣嚴當酒暖灑急聽窗知昌黎詩中摘六字用雪中過城東仰懷平甫學士劉季孫馬蹄踏雪過東城暫喜京塵不上纓寒木鳥驚花散漫敗簷人怯玉峥嶸豈無良一作梁燕容枚老定有高才憶戴生未負物華聊一賦知君麗句已先成此劉季孫詩見平甫集中次韻景文雪中見寄王安國未能談笑破愁城猶幸都無俗事攖載酒何人過揚子評詩今日得鍾嶸杜門落寞塵埃隔掃徑侵尋霰雪生誰向梁園能授簡看君文格出天成此不専賦雪但二人倡和不可不知故選雪意雪意悠悠底未成年華促促尚誰驚浮雲稍助春來暗薄日遲回午後明靜見遊塵侵蘚迹忽聞落葉掃階聲此時俯僂無酬酢世諦吾心棄不爭詠雪奉呈廣平公元注宋盈祖黃庭堅春寒晴碧來飛雪忽憶江清水見沙夜聽踈踈還密密曉看整整復斜斜風回共作婆娑舞天巧能開頃刻花政使盡情寒至骨不妨桃李用年華夜聽曉看一聨徐師川有異論東坡家子弟亦疑之以問坡謂黃詩好在何處坡却獨稱許之以余味之亦無不可元祐詩人詩既不為楊劉崑體亦不為九僧晚唐體又不為白樂天體各以才力雄於詩山谷之竒有崑體之變而不襲其組織其巧者如作謎然此一聨亦雪謎也學者未可遽非之下一聨婆娑舞頃刻花則妙矣外集又有次韻張祕校喜雪有四聨可觀學子已占秋食麥廣文何憾客無氊巷深朋友稀來往日晏兒童不掃除寒生短棹誰乘興光入疏櫺我讀書潤到竹根肥臘筍暖開蔬甲助春盤乃北京教授時詩春雪呈張仲謀暮雪霏霏若撒鹽須知千隴麥纎纎夢間半枕聽飄瓦睡起髙堂看入簾剩與月明分夜砌即成春漏滴晴簷萬金一醉張公子莫道街頭酒價添蘇黃名出同時山谷此二詩適亦用花字簷字韻此乃山谷少作耳視坡詩髙下如何細味之夢間睡起踈密整斜二聨與坡潑水堆鹽之句亦只是一意但有淺深工拙而庭院已堆鹽之句却有頓挫坡詩天才髙妙谷詩學力精嚴坡律寬而活谷律刻而切云連日大雪以疾作不出聞蘇公與德麟同登女郎臺陳師道掠地衝風敵萬人蔽天密雪幾微塵漫山塞壑疑無地投隙穿帷巧致身晚節讀書今已老閉門髙臥不緣貧遙知更上湖邊寺一笑潛回萬室春此詩為潁州教時作東坡為守趙令畤為簽判東坡有和篇云蒼檜作花真強項凍鳶儲肉巧謀身是也雪後送往開新雪又晴故留臘白待春青稍回杉色伸梅怨併得朝看與夜聽已覺庭泥生鳥迹遽修田事帶朝星莫年功利歸持律不是騷人故獨醒此詩第一句至第六句皆出格破體不拘常程於虗字上極力安排戊午山間對雪三首取一徐俯雪中出去雪邊行屋下吹來屋上平積得重重那許重飛來片片又何輕簷間日暖重為雨林下風吹再落晴表裏江山應更好溪山已後不勝清東湖居士詩三大卷上卷古體中卷五言近體下卷七言近體以豫考之殆以山谷之甥嘗親見之故當世不敢有異論在江西派中無甚竒也惟壓卷詩數首可觀亦人所可到律詩絶無可選一百五日寒食雨二十四畨花信風若可備節序之選而上聨乃云方知園裏千株雪不比山茶獨自紅又甚無格亦不工獨此一雪詩可喜耳師川以山谷夜聽踈踈還密密一聨為不然此詩前聨即其遺意也又師川詩多愛句中疊字十首八九如此可憎可厭招張仲宗陳與義北風日日吹茅屋幽子朝朝只地爐客裏賴詩增意氣老來唯懶是工夫空庭喬木無時事殘雪疏籬當畫圖亦有張侯能共此焚香相待莫徐驅簡齋無專題雪律詩五言選取一七言選取一皆以一句及雪取之如畫圗見雪也此空庭喬木無時事一句尤竒人所不能道者比小齋焚香無是非更髙雪崔鶠朔風萬里卷龍沙剪出千林六出花仙子衣裳雲不染天人顔色玉無瑕月寒桂樹尤藏秀海凍珊瑚未敢芽欲上踈簾望南北却愁光照鬢邉華海凍一句竒甚第四句雖用玉字自號天人顔色不犯俗例對雪二首取一毛滂玉京咫尺不應疑龍鳯交橫舞屢僛素色可能粧粉似真香直到齒牙知珠樓先曉月未落瑶草自春天亦私千里一裘誰有樣鄒郎吹律為薰之雪有香食之乃見亦好異矣次首輕盈舞殿三千女縹眇飛天十二臺下一句新追和東坡雪詩三首取一胡銓為瑞應便種麥鴉餘光猶得映書車也知一臘要三白故作六霙先百花授簡才慳慚賦客披簑句好憶漁家擬酤斗酒聽琴操三百青銅落畫義種麥鴉三字好光映書車已強押矣三白百花亦熟料披簑句好憶漁家犯坡已道末句三百青銅落畫義引為酤酒事則可矣第二首當時號令君聽取白戰無須帶步義亦恐太僻唯啖氊使者莫思家一句佳第三首梁園髙會憶鄒嚴亦竒千里蓴羮未下鹽則恐不切於雪中有羈孤濕帽尖亦壓不倒看來十分好詩在前似不當和也雪作曾幾卧聞霰集却無聲起看階前又不能一夜紙窗明似月多年布被冷如冰履穿過我柴門客笠重歸來竹院僧三白自佳情亦好諸山粉黛見層層此可為南渡雪詩之冠十二月六日大雪薄晚蓬山下直餘笑看六出點衣裾絮飛簾外無縈絆花落階前不掃除松鬛垂身全類我竹頭搶地最憐渠短檠便可捐牆角剩有窗光映讀書格律整峭每讀茶山詩無不滿意處更無絲毫偏枯頽塌此詩花絮二字更改去尤佳上元日大雪勾芒整轡浹辰間雪片相隨大可觀挑菜園林有餘潤燒燈庭院不勝寒柳條弄色政爾好梅蕊飄香殊未闌便似落花飛絮去直疑春事併衰殘詩先看格髙而意又到語又工為上意到語工而格不髙次之無格無意又無語下矣此詩全是格而語意亦峭次秀野詠雪韻三首朱熹閉門髙卧客來稀起看天花滿院飛地逈杉篁增勝槩庭虗鳥雀噪空飢酒腸凍澀成新恨病骨侵凌減舊肥賴有袁生清興在忍寒應未泣牛衣一夜同雲匝四山曉來千里共漫漫不應琪樹猶含凍翻笑楊花許耐寒乘興政須披鶴氅瀹甘猶喜破龍團無端酒興催吟筆却恐長鯨吸海乾開門驚怪雪交加亂落橫飛豈有涯密竹不妨呈徑節早梅何處覔殘花山隂客子須乘興洛下先生想卧家病廢杯觴寒至骨哦詩無復更豪誇三詩未免用雪故事然終不及瑶瓊銀玉等句詩律審細有味次韻雪後書事晴煙裊裊弄晨炊雪屋流澌未覺遲擬挈凍醪追勝飢聊穿蠟屐過疏籬掃開折竹仍三徑認得殘梅祗數枝不耐歲寒心事苦滔滔欲説定從誰未覺春光到柳條誰教飛絮倚風搖眼驚銀色迷千界夢斷彤庭散百寮梅塢恁從長笛弄竹窗間把短檠挑何人剝啄傳清唱更喜殘年樂事饒前首中四句皆佳後首第三句熟料第四句却以生對熟憶百寮賀雪而退有新意甲午春前得雪元題宗美有詩交和往復成十五首今取其三尤袤寒聲昨夜響蕭蕭逗曉階庭亦已消殘臘距春無幾日一年飛雪只今朝微陽欲動梅驚蕚餘潤才沾麥放苗天意未能違物意漫留殘白占山腰飛英回旋逐風飄爽氣令人意欲消荏苒流年春送臘殷勤密雪暮連朝冬回庾嶺花無數煙暖蘭田玉有苗一飽自今真可望更看南畝麥齊腰凍雲排陳擁山椒待伴還應不肯消皎月冰壺千頃夜冷煙茅屋幾家朝梅枝堆亞難尋蕚萱草侵凌不辨苗殘甲敗鱗隨處是被誰敲折玉龍腰苗字韻猶有云千尺龍鱗蟠檜頂一畨蜩甲長蔬苗剩對風花吟柳絮更將冰水瀹芎苖萬室歡呼忘凍餒一犂酥潤到根苖腰字韻猶有云寄語髙人來問法莫辭門外立齊腰前村酒美無錢換怪底金龜不繫腰寒窗莫怪吟聲苦舉室長懸似細腰蓋淳熙元年詩也戰退玉龍三百萬敗殘鱗甲滿天飛本關中人張元詩叛從元昊者善用之化為佳句也正月二十八日夜大雪辛丑一冬無雪潤田疇渴井泉源凍不流昨夜忽飛三尺雪今年須兆十分秋占時父老應先喜忍凍飢民莫漫愁晴色已回春氣候晚風搖緑看來牟淳熙八年辛丑遂初為江東倉行部時詩三四輕快雪陸遊瘴癘家家一洗無更欣餘潤沃焦枯花壺夜凍先除水衣焙朝寒久覆爐松頂積髙時自墮竹枝壓重欲相扶雲間正值春風早却看晴光滿九衢淳熙十四年丁未放翁守嚴州時年六十三矣花壺衣焙一聨雪天之室中事也積松壓竹一聨雪天之林間事也其工密安排如此作雪寒甚有賦雲暝風號得我驚硯池轉盼巳冰生窗間頓失踈梅影枕上空聞斷雁聲公子皂貂方痛飲農家黃犢正深耕老人別有超然處一首新詩信筆成律熟雪但苦祁寒惱病翁豈知上瑞報年豐一庭不掃待新月萬壑盡平號斷鴻繭紙欲書先硯凍羽觴才舉巳樽空若耶溪上梅千樹欠我今年繫短蓬起句竒峭三四壯浪雪平郊漫漫覺天低况復寒雲結慘悽老子方驚飛蛺蝶羣兒已説聚狻猊中宵猿墮頻摧木徹旦雞瘖重壓棲只待新晴梅塢去青鞋未怯踏春泥三四新大雪大雪江南見未曾今年方始是嚴凝巧穿簾罅如相覔重壓林梢欲不勝氊幄擲盧忘夜睡金羈立馬怯晨興此生自笑功名晚空想黃河徹底冰中四句不用事只虗模寫亦工雪中作竹折松僵鳥雀愁閉門我亦擁貂裘已忘作賦遊梁苑但憶銜枚入蔡州屬國餐氊真強項翰林煮茗自風流明朝日暖君須記更看青鴛玉半溝中四句皆用雪事不妨工緻鬢毛無奈嵗華催一笑登臨亦樂哉平地忽成三尺雪繞湖何啻萬株梅雲山疊疊朝慿閣簾幕沉沉夜舉杯節物鼎來方自此酥花綵勝待春回富麗和馬公弼雪楊萬里灑竹穿梅湖更山客間得此未嫌寒髯疏也被輕輕點齒冷猶禁細細餐晴了還成三日凍銷餘留得半庭看慿誰説似王郎婦鹽絮吟來總未安此見江湖集隆興元年癸未錢塘作省幹馬公弼名彥輔西人見公山谷浣花圗歌題注末句言鹽絮總為未佳得后山之意霰雪花遣汝作前鋒勢頗張皇欲暗空節瓦巧尋踈處漏跳階誤到暖邊融寒聲帶雨山難白冷氣侵人火失紅方訝一冬暄較甚今宵敢歎臥如弓霰詩前未有之三四工甚盡霰之態紹興三十二年壬午永州零陵丞詩環林踏雪樓鑰筍輿衝雪過溪橋流水方東未晚潮白裏不知梅奮色青邊尤喜麥成苗煙深帶雨參差下空濶隨風自在飄可是忍寒詩更切故求野路踏瓊瑶今朝踏作瓊瑶迹為有詩從鳯沼來昌黎詩也攻愧樓公鑰字大防嘉定初參政自乾淳大儒巨公淪謝之後有一樓攻愧又其後真西山魏鶴山為學者領袖云頃與公擇讀東坡雪後北臺二詩歎其韻險而無窘步嘗約追和以見詩之難窮去冬適無雪正月二十日大雪因用前韻呈公擇趙蕃細思不是冬無雪留待春風鬭冷嚴病骨未憂衣乏絮早餐寧歎食無鹽梅添鑿落元同色竹擁參差半入簷坐守地爐應不厭破窗平見北山尖雪埋老屋無薪賣晨起謀炊自毁車覔飽預期千頃麥破慳先試一春花便營野屐尋茶户更約綈袍當酒家處士祗今疑姓賈壁間但沒挂錢義元注事見坡答少遊書昌父當行本色詩人押此詩亦且如此殆不當和而和也存此以見花義鹽尖之難和荆公淡菴章泉俱難之况他人乎瀛奎律髓卷二十一

body:
  text: 瀛奎律髓卷二十四元方回編送别類送行之詩有不必皆悲者别則其情必悲此類中有送詩有别詩當觀輕重又送人之官言及風土者已於風土類中收之間亦見此不可以一律拘也五言八十七首送崔著作東征陳子昂金天方肅殺白露始專征王師非樂戰之子慎佳兵海氣侵南部邊風掃北平莫賣盧龍塞歸邀麟閣名平仄不粘唐人多有此體陳子昂才高於沈佺期宋之問惟杜審言可相對此四人唐律在老杜以前所謂律體之祖也送魏大從軍胸奴猶未滅魏絳復從戎悵别三河道言追六郡雄雁山橫岱北狐塞接雲中勿使燕然上獨有漢臣功刋本以狐塞為孤塞豫為改定唐之方盛律詩皆務雄渾尾句雖拗平仄以前六句未用意立論只說行色形勢末乃勉勵之此一體也送朔方何侍郎宋之問聞道雲中使乘驄往復還河兵守陽日塞虜失隂山拜職嘗隨驃銘功不讓班旋聞受降日歌舞入蕭關漢武時有從驃合騎侯故此云常隨驃不讓班一用將軍號一用人姓送賀知章歸四明唐明皇豈不惜賢達其如髙尚何此詩㑹稽有石刻朱文公為倉使時讀之最喜起句雄健偶忘記後六句當俟尋索足之按此亦非起句原編如此仍之知章年八十六卧病上表乞為道士還鄉上許之捨宅為觀賜名千秋仍賜鑑湖剡水一曲詔令供帳東門百僚祖餞御製賜詩云遺榮期入道辭老競抽簪豈不惜賢達其如髙尚心寰中得祕要方外散幽襟獨有青門餞羣英悵别深今以中二句為首又非元韻恐誤記耶永嘉浦逢張子容孟浩然逆旅相逢處江村日暮時衆山遙對酒孤嶼共題詩廨宇鄰鮫室人烟接島夷鄉園萬餘里失路一相悲永嘉得孤嶼中川之名自謝康樂始此詩五六俊美送孟六歸襄陽張子容杜門不復出久與世情疏以此為長䇿勸君歸舊廬醉歌田舍酒笑讀古人書好是一生事無勞獻子虛元詩二首見浩然集今取其一子容亦志義之士浩然嘗有詩送應進士舉子容今送浩然歸乃為此骨鯁之論其甘與世絶懷抱髙尚可想見云送友人入蜀李白見說蠶叢路﨑嶇不易行山從人靣起雲傍馬頭生芳樹籠秦棧春流繞蜀城升沉應已定不必問君平太白此詩雖陳杜沈宋不能加送張舍人之江東張翰江東去正值秋風時天清一雁逺海濶孤帆遲白日行欲暮滄波杳難期吳洲如見月千里幸相思一雁孤帆之句亦以寓吾道不偶之歎下句引白日滄波而云行欲暮杳難期意可見也衡州送李大夫勉赴廣州杜甫斧鉞下青冥樓船過洞庭北風隨爽氣南斗避文星日月籠中鳥乾坤水上萍王孫丈人行垂老見飄零此詩氣蓋宇宙不待贅說老杜送人詩多矣此為冠夏日楊長寧宅送崔侍御常正字入京探韻得深字醉酒揚雄宅升堂子賤琴不堪垂老鬢還對欲分襟天地西江逺星辰北斗深烏臺俯麟閣長夏白頭吟五六悲壯惟老杜長於此送段功曹歸廣州南海春天外功曹幾月程峽雲籠樹小湖日落船明交趾丹砂重韶州白葛輕幸君因估客時寄錦官城才大則氣盛此小詩八句若轉石下千仭山而細看只四十字非如他人補綴費力酸嘶破碎也送韋郎司直歸成都竄身來蜀地同病得韋郎天下兵戈滿江邊歲月長别筵花欲暮春日鬢俱蒼為問南溪竹抽梢合過牆一直說將去自然工密起句如晚唐而亦作對尾句必換意乃詩法也送張二十參軍赴蜀州因呈楊五侍御好去張公子通家别恨添兩行秦樹直萬㸃蜀山尖御史新驄馬參軍舊紫髯皇華吾善處於汝定無嫌三四只言地形五用驄馬事以指楊六用髯參軍事以指張尾句有托庇之欲亦一體也送陵州路使君赴任王室比多難髙官皆武臣幽燕通使者嶽牧用詞人國待賢良急君當拔擢新佩刀成氣象行蓋出風塵戰伐乾坤破瘡痍府庫貧衆僚宜潔白萬役但平均霄漢瞻佳士泥塗任此身秋天正搖落回首大江濱此詩十六句當作四片看前四句以初用儒者為喜實論時也次四句美路使君也又四句教之以為政也選同僚平庶役則乾坤之破尚可救也尾四句又感慨之不得已也送逺帶甲滿天地胡為君逺行親朋盡一哭鞍馬去孤城草木歲月晚關河霜雪清别離已昨日因見古人情前四句悲壯亂世之别也送舍弟穎赴齊州岷嶺南蠻北齊關東海西此行何日到送汝萬行啼絶域惟髙枕清風獨杖藜時危暫相見衰白意都迷三首取一此骨肉之别也第二首云風塵久不開汝去幾時來兄弟分離苦形容老病催尤佳而悲痛奉濟驛重送嚴公逺送從此别青山空復情幾時杯重把昨夜月同行列郡謳歌惜三朝出入榮江村獨歸處寂寞養殘生此知已之别也逺送從此别此一句極酸楚未句尤覺倣徨無依後嚴武再帥蜀卒於位公遂去蜀云泛江送客二月頻送客東津江欲平烟花山際重舟楫浪前輕淚逐勸杯落愁連吹笛生離筵不隔日那得易為情此所送之人未知為誰淚逐勸杯落足見離别之苦下一句亦對得好暮秋將歸秦留别湖南幕府親友水濶蒼梧野天髙白帝秋途窮那免哭身老不禁愁大府才能㑹諸公德業優北歸衝雨雪誰憫敝貂裘三四極羈旅瑣瑣之態五六雖無華麗非老筆不能然其實雄深雅健也末句十字可憐甚矣諸親友能無情乎贈别鄭鍊赴襄陽峨嵋杜所留峴首鄭所赴戎馬交馳際柴門老病身把君詩過日念此别驚神地濶峨眉晚天髙峴首春為於耆舊內試覔姓龎人鄭鍊蓋能詩者而其詩不傳三四悲哀而新異五六工甚此等詩可學也贈别何雍生死論交地何由見一人悲君隨燕雀薄宦走風塵綿谷元通漢沱江不向秦五陵花滿眼傳語故鄉春三四係十字句法酬别杜二嚴武獨逢堯典日再覩漢官時未效風霜徑空慚雨露私夜鐘清萬户曙漏拂千旗並向殊庭謁俱承别館追斗城憐舊路渦水惜歸期峰樹還相伴江雲更對垂試回滄海棹莫妒敬亭詩祗是書應寄無忘酒共持但令心事在未肯鬢毛衰最悵巴山裏清猿惱夢思武自蜀帥趨朝老杜送之有詩而武以此酬之也詩雖不及老杜之徑健宏濶然亦間架齊整近世富貴巨公妄自標矜未有斯作故特取之老杜元是六韻詩所謂諸將應歸盡題書報旅人者再别詩八句酸楚之甚已見此前送李太保充渭北節度即太尉光弼弟也岑參詔出未央宫登壇近總戎上公周太保副相漢司空弓抱關西月旗翻渭北風弟兄皆許國天地荷成功送張都尉歸東都白羽緑弓弦年年只在邊還家劍鋒盡出塞馬蹄穿逐虜西踰海平胡北到天封侯應不逺燕頷豈徒然送懷州吳别駕灞上柳枝黃壚頭酒正香春流飲去馬暮雨濕行裝驛路通函谷州城接太行覃懷人總喜别駕得王祥學老杜詩而未有入處當觀老杜集之所稱詠敬歎及所交遊倡酬者而求其詩味之亦有入處矣其稱詠敬歎者蘇武李陵陶潛庾信鮑昭隂鏗何遜陳子昂薛稷孟浩然元結之類其所交遊倡酬者李白髙適岑參賈至王維韋迢之類是也此岑參三送人詩皆壯浪宏濶非晚唐手可望送祕書虞校書虞鄉丞花綬傍腰新關東縣欲春殘書厭科斗舊閣别麒麟虞坂臨官舍條山映吏人看君有知已坦腹向平津送張子尉南海不擇南州尉髙堂有老親縣樓重蜃氣邑里雜鮫人海暗三山雨江明五嶺春此鄉多寶玉慎莫厭清貧餞李尉武康潘郎腰綬新霅上縣花春山色低官舍湖光映吏人不須嫌邑小莫即耻家貧更作東征賦知君有老親岑參此三詩梅聖俞送行詩似之官舍吏人一聨兩首相似蓋熟套也送從舅成都丞廣南歸蜀盧綸巴字天邊水秦人去是歸棧長山雨響溪亂火田稀俗富行應樂官雄祿豈微魏舒終有淚還濕寧家衣三四佳送康判官往新安得江路西南尹皇甫冉不向新安去那知江路長猿聲此廬霍水色勝瀟湘驛樹收殘雨漁家帶夕陽何須愁旅泊使者有輝光唐人詩多前六句說景物末兩句始以精思議論結裹亦一體也新安江路實如所言送單于裴都護赴西河崔皓征馬去翩翩城秋月正圓單于莫近塞都護欲臨邊漢驛通煙火湖沙乏井泉功成須獻捷未必去經年盛唐人詩師直為壯者乎賦得稱送孟孺卿包何願以金稱鎚因君贈别離鈎懸新月吐衡舉衆星隨掌握須平執錙銖必盡知由來投分審莫放弄權移合收入著題詩以入送餞類亦可三四賦稱甚妙餘皆工送泉州李使君之任傍海皆荒服分符重漢臣雲山百越路市井十洲人執玉來朝逺還珠入貢頻連年不見雪到處即行春第四句絶妙送王汶宰江隂郡北乘流去花間竟日行海魚朝滿市江鳥夜喧城止酒非關病援琴不在聲應緣米五斗數日值淵明三四好送德清喻明府李頻棹返霅溪雲仍參舊使君州傳多古跡縣記是新文水栅橫舟閉湖田立木分但如詩思苦為政即超羣五六盡水鄉之妙尾句尤清而有味送鳯翔范書記西京無暑氣夏景似清秋天府來相辟髙人去自由江山通蜀國日月近神州若共將軍話河南地未收晚唐詩鮮壯健頻却有此五六一聨送孫明秀才往潘州謁韋卿北鳥飛不到北人今去遊天涯浮瘴水嶺外問潘州草木春冬茂猿猱日夜愁定知遷客淚只敢對君流送友人之揚州一别長安後晨征便信雞河聲入峽急地勢出關低緑樹叢垓下青蕪濶楚西路長知不惡隨處好詩題頻睦州人姚合壻也詩雖晚唐却多壯句送曹椅司空曙青春三十餘衆藝盡無如中散詩傳畫將軍扇賣書楚田晴下雁江日暖多魚惆悵空相送歡娛自此疏綺麗雲陽館與韓升卿宿别故人江海别幾度隔山川乍見翻疑夢相悲各問年孤燈寒照雨深竹暗浮烟更有明朝恨離杯惜共傳三四一聨乃久别忽逢之絶唱也送李員外院長分司東都韓愈去年秋露下羈旅逐東征今歲春光動驅馳别上京飲中相顧色送後獨歸情兩地無千里因風數寄聲前四句謂之扇對唐詩多有之五六曲盡離别之狀甚妙李員外乃李正封也元和十二年秋退之正封從裴晉公討蔡在郾城有聨句送逺吟孟郊河水昏復晨河邊相别頻離杯有淚飲别栁無枝春一笑忽然斂萬愁俄已新東波與西日不借逺行人東野不作近體詩昌黎謂髙處古無上是矣此近乎律離杯有淚飲猶老杜淚逐勸杯落而深切過之矣送楊八給事赴常州白居易無嗟别青瑣且喜擁朱輪五十得三品百千無一人須勤念黎庶莫苦憶交親此外無過醉毗陵何限春三四新洛陽送牛相公出鎮淮南北闕至東京風光十六程坐移丞相閣春入廣陵城紅斾擁雙節白鬚無一莖萬人開路看百吏立班迎閫外君彌重樽前我亦榮何須身自得將相是門生元注元和初牛相公應制登第三等豫為翰林考覆官樂天元和元年應制科自盩厔尉除集賢校理踰月即入翰林為學士時年三十五歲牛竒章又其所考制科門生也此可為座主門生故事作此詩時樂天為河南尹送河南皇甫少尹赴絳州劉禹錫祖帳臨周道前旌指晉城午橋羣吏散亥字老人迎詩酒同行樂别離方見情從兹洛陽社吟詠缺書生自洛赴絳故以亥字老人事上搭對午橋為偶詩家常例也五六方有味前四句只是形模不下周道晉城四字則午橋亦喚不來送陸侍御歸淮南使府五韻用年字江左重詩篇陸生名久傳鳳城來已熟羊酪不嫌羶歸路芙蓉府離堂玳瑁筵泰山呈臘雪隋柳布新年曾忝揚州薦因君達短箋元注時段丞相鎮揚州嘗辱表薦選此詩知唐人五言律有五韻者芙蓉府玳瑁筵詩家可有不可多送友人歸武陵崔魯聞道桃源住無村不是花戍旗招海客廟鼓集江鴉别島垂橙實閒田長荻芽遊秦未得意看即便離家此八句俱有思致前二句喝起題目中四句俱言景物未二句微立議論情思繳之此又一格送許棠張喬離鄉積歲年歸路逺依然夜火山頭市春江樹杪船干戈愁鬢改瘴癘喜家全何處營甘㫖波濤浸薄田秋日送方干遊上元曹松天髙淮泗白料子趣修程汲水疑山動揚帆覺岸行雲離京口樹雁入石頭城後夜分遙念諸峰霧露生中四句俱有位置處分送謝夷甫宰鄮縣戴叔倫君去方為縣兵戈尚未消邑中殘老小亂後少官僚廨宇經山火公田沒海潮到時應變俗新政滿餘姚髙仲武中興間氣集謂叔倫詩骨氣稍軟然此詩五六佳送溧水唐明府韋應物三為百里宰已過十餘年祇歎官如舊旋聞邑屢遷魚鹽瀕海利薑柘傍湖田到此安民俗琴堂又晏然蘇州五言古體最佳律詩亦雅潔如此送張侍御祕書江右覲省莫歎都門路歸今駟馬車繡衣猶在篋藝閣已觀書沃野收紅稻長江釣白魚晨餐亦可薦名利欲何如篋字刋本作當考送澠池崔主簿邑帶洛陽道年年應此行當時匹馬客今日縣人迎暮雨投關郡春風别帝城東西殊不逺朝夕待家聲二詩皆整淨秋夕與友話別崔塗懷君非一夕此夕倍堪悲華髮猶漂泊滄洲又别離冷禽棲不定衰葉墮無時况值干戈隔相逢未可期别情可掬第六句妙尾句近老杜旅舍别故人一日又欲暮一年春又殘病知新事少老别舊交難山盡路猶險雨餘春尚寒那堪試回首烽火到長安三四好尾句亦近老杜那堪二字詩中不當用近乎俗送鄒明府遊靈武賈島曽宰西畿縣三年馬不肥債多平劍與官滿載書歸邊雪藏行徑林風透卧衣靈州聽曉角客館未開扉平一作慿三四極佳今宰邑者能如此何患世之不治耶第二句三年馬不肥亦好送朱可久歸越中石頭城下泊北固暝鐘初汀鷺潮衝起船窗月過虛吳山侵越衆隋栁入唐疏日欲供調膳辟來何府書汀上之鷺潮衝之而見其起舟中之窗月過之而見其虛可謂善言吳中泊舟之趣吳山隋柳一聨近乎粧砌大過趙紫芝全用此聨為瀟水添湘濶唐碑入宋稀殊為可笑所選二妙集於浪仙取八十一首其非僧道而送行者凡取十首獨不取此一首蓋欲以䝉蔽蹈襲之罪非耶送李騎曹歸騎雙旌逺歡生此别中蕭關分磧路嘶馬背寒鴻朔色晴天北河源落日東賀蘭山頂草時動卷帆風此詩謂嘶馬背寒鴻則雁南向而人北去又謂河源落日東河源當在西今返在落日之東則身過河源又逺矣所謂賀蘭山蓋回紇之地也送王子遵赴衡陽丞趙蕃王郎妙人物獨步向江東昔尉既不醉今丞寧肯聾相依唇齒國忽去馬牛風清絶官曹外何年著我同醉尉聾丞事融化神妙五六尤善用事送喻鳬校書歸毗陵姚合主人庭葉黑詩稿更誰書闕下科名出鄉中賦籍除山春烟樹衆江晚逺帆疏吾亦家吳者無因到敝廬姚少監合詩選入二妙者百二十一首比浪仙為多此四靈之所深嗜者送人詩三十餘首以余再選僅得三首為武功尉時詩八首最佳其餘有左無右有右無左前聨佳矣後或不稱起句是矣繳句或非有小結裹無大涵容其才與學殊不及浪仙也此詩鄉中賦籍除疑登第人免役不免賦合考送韋瑶校書赴越寄家臨禹穴乘傳出秦關霜落葉滿地潮來帆近山相門賓益貴水國事多閒晨省高堂後餘歡杯酒間第二句言乘傳出秦關忽插入霜落潮來似乎不甚貫穿然其聨單看自好送李侍御過夏州酬恩不顧名走馬覺身輕迢遞河邊路蒼茫塞上城沙寒無宿雁虜近少閒兵飲罷揮鞭去傍人意氣生此詩以虜近少閒兵一句能道邊塞間難道之景故取之上聨迢遞河邊路蒼茫塞上城兩句似泛亦無深病也大抵姚少監詩不及浪仙有氣格卑弱者如瘦馬寒來死羸童餓得癡馬為賒來貴童因借得頑皆晚輩之所不當學如王建脫下御衣偏得著進來龍馬每教騎不惟卑而又俗矣東坡謂元輕白俗然白亦不如是之太俗也又姚詩如茅屋隨年借盤餐逐日炊無竹栽蘆看思山疊石為兩句一般無造化又如簷燕酬鶯語鄰花雜絮飄粧砌太密則反若淺拙豫以公論評之至此其細潤而甚工者亦不可泯沒又當於他詩下備論而表出之送祖擇之赴陜州梅堯臣古來分陜重猶有召公棠此樹且能久後人宜不忘君從金馬去郡在鐡牛旁山色臨關險河聲出地長樽無空美酒魚必薦嘉魴天子憂民切何當務勸桑金馬鐡牛人皆可對必如此穿成句則見活法山色河聲一聨不減盛唐美酒嘉魴一聨句法亦新送王待制知陜府東周尊夾輔西漢重行春風化本從召河山來自秦選良存舊詔出守必名臣導從馳千騎朱丹照兩輪宴杯深畏卯湖水淨連申重見甘棠詠爭傳樂府新召秦卯申四句工送張景純知邵武軍元注張華亭人近輸鶴與馮仲達賭却華亭鶴圍碁未肯還方為剖符守又近爛柯山魚稻荆揚下風烟楚越間小君能賦詠應得助餘閒後四句好言荆揚楚越之美又有能詩之內以佐之也前四句言賭碁輸鶴得郡復近爛柯山殆戲其嗜碁耳送錢駕部知卭州細雨梅初熟輕寒麥已秋路危趨劍道夢穩過刀州秦粟非吳食巴粳類越疇當壚無復舊試似長卿求錢吳越人故有此五六句劍道刀州絶工末句又不走了卭州事也送洪州通判何太博若谷先歸新淦拜官江上客乘馬不乘船獨畏鮫龍浪將歸風雨天葛花侵野徑源水入腴田君住巴丘下西山道路連五六以言新淦之景近世詩人下苦工夫不能作此等語送邵戶曹隨侍之長沙青袍㑹稽掾采服湘江行水館魚方美犀舟枕自清鷓鴣啼欲雨蝃蝀見還晴風土雖卑濕醇醪可養生起句十字拗律變換詩家所許又却切題但不可篇篇如此耳五言律聖俞之所長而送人詩至於五言律尤工無作為不刻書據事言情而有無窮之味乃知近人學晚唐出於强揠而無真趣也送鹽官劉少府古賢我祖南昌尉時危棄去仙劉郎從宦日天子治平年燥茗山中火熬波海上煙吳民不為盜惟此撓君權送陸介夫學士通判泰州從來戎馬地饗士日椎牛介胄奉儒服詩書參將謀隴雲連塞起渭水入關流豈似瀛洲下窮年事校讐送徐君章祕丞知梁山軍蒼壁束江流孤軍水上頭蛟龍驚鼓角雲霧裛衣裘午市巴姑集危灘楚客愁使君才筆健當似白忠州宋人詩善學盛唐而或過之當以梅聖俞為第一善學老杜而才格特高則當屬之山谷后山簡亝且如午市巴姑集唐人之精者僅能之下一句難對却云危灘楚客愁其神妙如此是三詩者又皆有尾句令人一唱三歎送秦覯二首陳師道士有從師樂諸兒却未知欲行天下獨信有俗間疑秋入川原秀風連鼓角悲目前㹠犬類未必慰親思師法時難得親年富有餘端為李君御盡讀鄴侯書結友真莫逆論才有不如折腰終不補可但曳長裾東坡元祐中補外知杭州秦少游之弟少章從行為師法故耳時人或譏其舍親而出故前詩六句後詩四句皆及之世固有莫逆之友亦當戒乎不如已之友得從東坡則師友之際可謂得之矣折腰終不補后山自謂也可但曳長裾言少章從人門下豈無貧薄之歎耶送外舅郭大夫䕫路提刑天險連三峽官曹據上游百年雙鬢白萬里一身浮可使人無訟寧須意外憂平生晏平仲能費幾狐裘后山妻父郭槩頗喜功利前為西川提刑以妻及三子托之送行古詩有云功名何用多莫作分外慮今又為䕫路提刑謂身已老矣使民無訟自當無意外憂晏平仲一狐裘三十年外物亦不足多也蓋規戒之送吳先生謁惠州蘇副使聞名欣識靣異好有同功我亦慚吾子人誰恕此公百年雙白鬢萬里一秋風為說任安在依然一秃翁此吳子野有道術者東坡以紹聖元年謫惠州意謂子野之訪東坡我其門下士亦慚之也任安秃翁事后山自以不負東坡自潁教既罷之後紹聖中不求仕也别劉郎一别已六載相逢有餘哀公私兩多事災病百相催無酒與君别有懷向誰開深知百里逺肯為老夫來三四老徑尾句逼老杜四十字無一字風花雪月凡俗之徒所以閣筆也别鄉舊數有中年别寬為滿歲期得無魚口厄聊復雁門踦齒脫心猶壯秋清意自悲平時郡文學鄧禹得三為此棣州教時所作蓋徐教潁教凡三任也别伯恭陳與義樽酒相逢地江楓欲盡時猶能十日客共出數年詩供世無筋力驚心有别離好為南極柱深慰旅人悲此長沙帥向子諲字伯恭此詩絶似老杜再别多難還分手江邊白髮新公為九州督我是半途人政爾須全節終然却要身平生慕溫嶠不必下張巡溫嶠張巡之說當觀時義殷有三仁或死或不死自靖自獻而已送宜黃宰任滿赴調元注君修邑學及拒賊有聲績韓駒聽說宜黃政他邦總不如里門喧誦讀村落罷追胥縱未分侯印猶當擁使車此詩無麗句聊代薦賢書吕居仁引韓入江西𣲖子蒼不悅謂所學自有從來此詩非江西而何大抵宣政間忌蘇黃之學王初寮隂學東坡文子蒼諸人皆隂學山谷詩耳送常子正赴召二首吕本中屬者居閒久今來促召頻但能消黨論便足掃邉塵衆水因歸海殊塗必問津如何彼黠敵敢謂漢無人疾病老逾劇交親窮轉疏惟公不變舊怪我未安居日月干戈裏江山瘴癘餘因行見李白亦莫問何如常子正諱同二詩俱有少陵風骨别李德翁尤袤長恨古人少斯人今古人二難俱益友兩載覺情親世態深難測心期久益真相看俱半百此别倍酸辛不用景物語意一串古淡有味此台州任滿别二李一曰才翁送趙成都二首趙蕃蜀道當謀帥維城孰愈公夷陵護江左斜谷顧關中北勢心豺虎南蠻勢蟻蜂守攻雖有異鎮撫不妨同不但元戎貴仍兼制使雄深沉天與度簡敬學成功人士薰陶內兵民教訓中祗應先郤縠寧復後文翁昌父詩參透江西而近后山此殆迫老杜矣丞相忠定公趙汝愚子直淳熙中為四川制置安撫知成都府送詩中選此二首夷陵斜谷壯哉語也送陳郎中棟知嚴州翁卷頻年經虎害人望使君來地重分旌節官清管釣臺凉天星象動吉日印符開帝擢平津䇿曾知有用才頻年經虎害太淺露指前太守或一切官吏乎須要分曉不可波及無辜只有官清管釣臺一句佳上一句言係節度州又似不切大都皆然七言七十一首送路六侍御入朝杜甫童稚情親四十年中間消息兩茫然更為後㑹知何日忽漫相逢是别筵不分桃花紅勝錦生憎柳絮白於綿劍南春色還無賴觸忤愁人到酒邊送韓十四江東省覲兵戈不見老萊衣歎息人間萬事非我已無家尋弟妹君今何處訪庭闈黃牛峽靜灘聲轉白馬江寒樹影稀此别應須各努力故鄉猶恐未同歸送王十五判官扶侍還黔中得開字大家東征逐子回風生洲渚錦帆開青青竹筍迎船出白白江魚入饌來離别不堪無限意艱危須仗濟時才黔陽信使應稀少莫怪頻頻勸酒杯大家指言王判官母以班氏比之也後漢曹世叔妻班彪之女名昭字惠姬和帝召入宫令皇后貴人師事焉號曰大家子穀為陳留長垣縣長大家隨至官作東征賦以敘行李王母子同行故用孟宗筍王祥魚而善融化如此公安送韋二少府匡贊逍遙公後世多賢送爾維舟惜别筵念我能書數字至將詩不必萬人傳時危兵甲黃塵裏日短江湖白髮前古往今來皆涕淚斷腸分手各風煙老杜七言律詩一百五十餘首唐人粗能及之者僅數公而皆缺悲壯晚唐人工於五言律於七言律甚弱觀此所選送行四詩能並肩者幾人哉同樂天送河南馮尹學士劉禹錫可憐玉馬風流地暫輟金貂侍從才閣上掩書劉向去門前修刺孔融來崤陵路靜寒無雨洛水橋長晝起雷共羡府中棠棣好先於城外百花開自館閣出為河南尹故三四用事如此之精送渾大夫赴豐州鳳銜新詔降恩華又見旌旗出渾家故吏來辭辛屬國精兵願逐李輕車氊裘君長迎風懼錦領酋豪踏雪衙其奈明年好春日無人喚看牡丹花夢得詩句句精絶其集曾自刪選故多佳者視樂天之易不侔也送姚杭州赴任因思舊遊白居易與君細話杭州事為我留心莫等閒閭里固宜勤撫恤樓臺亦要數躋攀笙歌縹眇虛空裏風月依稀夢想間且喜詩人重管領遙飛一盞賀江山渺渺錢塘路幾千想君到後事依然靜逢竺寺猿偷橘閒看蘇家女採蓮故妓數人頻問信新詩兩首倩流傳舍人雖健無多興老校當時八九年此送姚合也詩律雖寬自是白體有味有韻送蘄州李十九使君赴郡可憐官職好文詞五十專城未是遲曉日鏡前無白髮春風門外有紅旗郡中何處堪携酒席上誰人解和詩惟有交親開口笑知君不及洛陽時八句皆可取送陜州王司馬建赴任陜州司馬去何如養靜資貧兩有餘公事閒忙同少尹料錢多少敵尚書祗携美酒為行伴唯作新詩趂下車自有鐵牛無詠者料君投刃必應虛第二句詩句之有關鍵者尾句方見得是陜府也長樂亭留别灞滻風煙函谷路曾經幾度别長安昔時蹙促為遷客今日從容自去官優詔幸分四皓秩祖筵慚繼二疏歡塵纓世網重重縛回顧方知出得難樂天以刑部侍郎除太子賓客分司東都作此詩别之事同而味不同如此留别微之平時久與本心違悟道深知前事非猶厭勞形辭郡印那將趂伴著朝衣五千言裏教知足三百篇中勸式微少室雲邊伊水畔比君校老合先歸白詩自然五六何其易之至也此蘇州病告滿去時詩送刁景純學士使北梅堯臣常聞朔北寒尤甚己見黃河可過車馹騎駸駸持漢節邊風慘慘聽悲笳朝供酪粥冰生碗夜卧氊廬月照沙侍女新傳教坊曲歸來偷賞上林花祖宗時與契丹盟好甚篤故凡送使人詩亦不敢輕易及邊事熙豐以來人人抵掌務欲生事於西北遂致靖康之禍悲夫送唐紫微知蘇臺洞庭五月水生寒盧橘楊梅已滿盤泰伯廟前看走馬闔閭城下見驂鸞吳娃結束迎新守府吏趨蹡拜上官曽過揚州能慣否劉郎盞底勸須寬聖俞詩似唐人而渾厚過之如此篇者是送張待制知越州滄海東邊㑹稽郡朱輪逺下相臣家已同雲漢星辰轉不與鑑湖風月賒越箭抽萌供美茹秦山堆翠照髙牙買臣嚴助前時貴破盜論功未足誇末句議論是送余少卿知睦州青山峽裏桐廬郡七里灘頭太守船雲霧未開藏宿鳥坡原將近見燒田養茶摘蕊新春後種橘收包小雪前民事蕭條官政簡家書時問霅溪邊中四句皆佳但嚴陵今乏橘惟衢州多末句有味送趙諌議知徐州及鹿車幾兩馬幾匹軫建朱幡騎彀弓雨過短亭雲斷續鶯啼髙柳路西東吕梁水注千尋險大澤龍歸萬古空莫問前朝張僕射毬場細草緑䝉䝉五六切于徐州送沈待制陜西都運邈歐陽修幾歲瘡痍近息兵經營方喜得時英從來漢粟勞飛挽當使秦人自戰耕道左旌旗諸將列馬前弓劍六蕃迎知君材力多閒暇剩聽陽關醉後聲送鄆州李留後北州遺頌藹嘉聲東土還聞政有成組甲光寒圍夜帳綵旗風暖看春耕金叉墜鬢分行立玉塵髙談四座傾富貴常情誰不羡愛君風韻有餘清送王平甫下第安國歸袂搖搖心浩然曉船鳴鼓轉風灘朝廷失士有司恥貧賤不憂君子難執手聊須為醉别還家何以慰親歡自慚知子不能薦白首胡為侍從官細味歐陽公詩初與梅聖俞同官於洛所作已超元白之上一掃崑體其古詩甚似韓昌黎以讀其文過熟故也其五言律詩不濃不淡自有一種蕭散風味其七言律詩自然之中有壯浪處有間逺處又善言富貴而無辛苦之態未嘗不立議論而斧鑿之痕泯如也如送王平甫下第詩三四已似江西末句尤見好賢樂善之誠心所與交遊及門下士為宋一代文人巨擘焉詩乃公之一端後之作者亦無所容其喙也送德之提刑郎中赴廣西王安國天扶開寶至熙寧和氣薰蒸瘴癘停五管閭閻如按堵六朝仁聖喜祥刑欲推恩澤求膚使果見謀猷簡大庭嗟我白頭甘抱槧看君歸日上青冥善言朝廷祥刑脈絡語意一串送文淵使君郎中赴當塗看花金谷屢銜杯先後歸時出處乖朝日衣冠辭魏闕春風旗鼓過秦淮談間威愛連雲屋事外歡娛付水齊回首未成東下計可無書札寫離懷送李子儀知明州兒童劇戲甬東天一别侵尋二十年海岸樓臺青嶂外人家簫鼓白鷗邊哀容愁問州民事勝概欣逢太守賢為我剩題蕭散句還聞鳳沼待詩仙送馬子山給事赴揚州都人供帳國門東淮海兵符節制中青瑣議思虛夜月朱轓游衍值秋風侯嗟誰在思張仲民喜重臨得次公內外忘懷能自適何時談笑一樽同平甫詩壯而整次韻孔常父送張天覺河東提刑蘇軾送君應典鷫鸘裘慿仗千鍾洗别愁脫帽風流餘長史埋輪家世本留侯子河駿馬方爭出昭義疲兵亦少休定向秋山得佳句故關黃葉滿行舟諸家元注麟府馬出子河汊昭義步兵澤路弓箭手公自注謂天覺好草書而不工故以張旭事為戲云送龔鼎臣諌議移守青州蘇轍稷下諸公今幾人三為諌議髮如銀梁王宫殿歸留鑰尚父山河屬老臣沂水絃歌重曾㸃菑川故舊識平津過家定有金錢費千里爭看衣錦身西山負海古諸侯信美東南第一州勝槩未容秦地險竒花僅比雒城優新絲出盎冬裘易貢棗登場歲事休鈴閣虛閒官釀熟應容將佐得遨遊周益公嘗問陸放翁以作詩之法放翁對以宜讀蘇子由詩蓋詩家之病忌乎對偶太過如此則有形而無味三洪工於四六而短於詩殆胸中有先入者故難化也放翁其以此針益公歟或問蘇子瞻勝子由否以豫觀之子瞻浩博無涯所謂詩濤洶退之也不若所謂詩骨聳東野則易學矣子由詩淡靜有味不拘字靣事料之儷而煆意深下句熟老坡自謂不如子由識者宜細咀之可也送青州簽判俞退翁致仕還湖州不作清時言事官海邦那復久盤桓早依蓮社塵緣少新就草堂歸計安富貴暫時朝露過江山故國水精寒宦遊從此知多事收取楞伽靜處看吳興俞汝尚以御史召力辭不允竟歸子由為齊州記室作此送之第五句乃虛說第六句乃實事自然髙妙汝尚四世孫澄淳熙丁未守筠陽併其髙祖和詩刋置欒城集中蓋亦不附荆公者也送顧子敦赴河東三首黃庭堅頭白書林二十年印章今領晉山川紫參可掘宜包貢青鐡無多莫鑄錢勸課農桑誠有道折衝樽爼不臨邊要知使者功多少看取春郊處處田家在江南不繫懷愛民憂國有從來月斜汾沁催驛馬雪暗岢嵐傳酒杯塞上金湯惟粟粒胸中水鏡是人才遙知更解青牛句一寸功名心已灰攬轡都城風露秋行臺無妾護衣篝虎頭墨妙能頻寄馬乳蒲萄不待求上黨地寒應强飲西河民病要分憂猶聞昔在軍興日一馬人間費十牛元祐元年夏顧臨子敦除河東漕東坡有古詩山谷押云西連魏三河東盡齊四履是也豫竊謂一寸功名心已灰此句有病以元祐之時勸其退豈子敦有不滿乎行臺無妾護衣篝此亦小事近乎不莊大抵山谷詩律髙而用意亦多出於戲如折衝樽爼不臨邊意好却犯子敦名西河民病要分憂一馬人間費十牛始是惻怛愛民之意山谷送人律詩少外集有送徐隱父宰餘干有云贅叟得牛民少訟長官齊馬吏爭亷未云治狀要須存豈弟此行端為霽威嚴極佳山谷詩自任淵所注之外有外集有别集外集中詩不可謂之不逮前集任淵所注亦多鹵莽止能注其字面事料之所出而不識詩意如次韻文潛同遊王舍人園自移竹淇園下至牽黃臂老蒼十三韻皆稱美王才元園林田疇屋廬聲色花竹之美所謂買田宛丘間江漢起濫觴乃指才元所以致富之本也注乃謂山谷為歸老之漸不亦謬乎如此詩一馬人間費十牛蔡卞切齒謂谷譏熙豐政事陳留史禍亦本於此而淵不能注送蘇逮陳師道胸中歷歷著千年筆下源源赴百川真字飄揚今有種清談絶倒古無傳出塵悟解多為路隨世功名小著鞭白首相逢恐無日幾時筆札到林泉逮字仲豫東坡次子也寄送定州蘇尚書初聞簡䇿侍前旒又見衣冠送作州北府時清惟可飲西山氣爽更宜秋功名不朽聊通袖海道無違具一舟枉讀平生三萬卷貂蟬當復出兜鍪出字一作自又云作兜牟元祐八年九月東坡出知定州時宣仁上仙時事已變勸東坡省事髙退其意深矣明年乃有惠州之謫久之又謫海外然當是時坡雖欲退身殆亦無地自藏矣此乃國家大氣數也北橋送客張耒橋上垂楊繫馬嘶橋頭船尾插紅旗船來船去知多少橋北橋南長别離亭上幾傾行客酒遊人自唱少年詞百年回首皆陳迹浮世飄零亦可悲此詩似張司業送楊補之赴鄂州支使相逢顧我尚童兒二十年來鬢有絲涕淚兩家同患難光隂一半屬分離扁舟又作江湖别千里長懸夢寐思何日粗酬身世了卜鄰耕釣老追隨此文潛姊夫也送三姊之鄂州兄弟分飛各一方老來分袂苦多傷兩行别淚江湖逺五月征車岐路長休歎伯鸞甘寂寞所欣楊惲好文章甥克一苦為詩北歸會有相逢地只恐塵埃鬢易蒼此即文潛之姊甥克一能文故有五六一聨用事極佳送曹子方赴福建運判平生鄴下曹公子家世風流合有文橫槊尚傳瞞相國紫髯不是畫將軍詔書寬大民何怨刺史威嚴吏合勤好作楚詞更下里雲中一降武夷君曹輔子方亦詩豪也與文潛考試有同文倡和此詩三四用其姓事尤切送畢平仲西上畢字夷直庚午五月歷陽賦賀鑄吟鞭西指鳳皇州好趂華年訪昔遊新樣春衫裁白紵舊題醉墨滿青樓鳴蛙雨細生梅潤揚燕風髙報麥秋須念江邊桃葉女定從今日望歸舟賀鑄方回鏡湖遺老詩集每一詩必自注所與之人所作之地及歲月於題目下其詩鏗鏘整暇本武人以蘇公軾范公百祿荐授從事郎然即請嶽祠兩為通判年五十八便求致仕再以荐起家再致仕宣和二年卒於常州年六十七葬宜興縣北山程公俱銘其墓仍序其詩此篇風致頗如其詞以詞之尤髙也故世人不甚知其詩而余獨愛之送客出城西陳與義鄧州誰亦解丹青畫我羸驂晚出城殘年政爾供愁了末路那堪送客行寒日滿川分衆色暮林無葉寄秋聲垂鞭歸去重回首意落西南計未成五六一聨絶妙分字寄字竒送熊博士赴瑞安令衣冠衮衮相逢處草木蕭蕭未變時聚散同驚一枕夢悲歡各誦十年詩山林有約吾當去天地無情子亦饑笑領銅章非失計歲寒心事欲深期簡齊詩氣勢渾雄規模廣大老杜之后有黃陳又有簡齊又其次則吕居仁之活動曽吉甫之清峭凡五人焉送曽宏父守天台曾幾莫作陽關墮淚聲丹丘勝事要君聽興公賦裏雲霞赤子美詩中島嶼青天近豈無宣室召地偏猶有草堂靈鑾坡飛上勤回首記取來遊舊客星三四于台州切送吕倉部治先守齊安齊安剖竹要循良分付吾家坦腹郎賸有江山連赤壁略無訟獄到黃堂鈴齊晝永宜深念邊瑣秋髙合過防此地元之遺烈在勉旃幸未鬢毛蒼吕蒼部大器字治先茶山之壻是生東萊先生吕成公黃堂赤壁深念過防四句皆佳適越留别朱新仲扁舟緑漲漕渠時解釋離懷政用詩管鮑交朋無變態朱陳嫁娶有佳期元注新仲次子已議定女孫有姻期矣長洲茂苑著身久秦望鏡湖行腳宜二浙中間才一水短書莫使寄來遲三四整雅送嚴壻侍郎北使葉夢得朔風吹雪暗龍荒荷槖驚看玉節郎楉矢石砮傳地産醫閭析木照天光傳車玉帛風塵息盟府山河歲月長寄語遺民知帝力勉拋鋒鏑事耕桑石林葉夢得少藴以妙年出蔡京之門靖康初守南京當罷廢胡文定公安國以其才奏謂不當因蔡氏而棄之實有文學詩似半山然石林詩話專主半山而隂抑蘇黃非正論也南渡後位執政帥金陵卜居霅川福夀全備此詩楛矢石砮醫閭析木一聨佳取之秦檜之和雖萬世之下知其非是後四句含糊說過無一毫忠義感慨之意則猶是黨蔡尊舒紹述之徒常態也送丘宗卿帥蜀楊萬里人似隆中漢卧龍韻如江左晉諸公四川全國牙旗底萬里長江羽扇中玉壘頓清開宿霧雪山增重起秋風近來廊廟多西帥出相誰言只在東諭蜀宣威百萬兵不須號令自精明酒揮勃律天西碗鼓卧蓬婆雪外城二月海棠傾國色五更杜宇說鄉情少陵山谷千年恨不遇丘遲眼為青蜀人詫蜀不能休花作江山錦作州老我無緣更行腳羡君來歲領遨頭碧雞金馬端誰見酒肆琴臺訪昔遊收入西征詩集裏憶儂還解記儂不右見江東集送贛守張子智左史進直敷文閣移帥八桂龍尾名臣進寶奎虎頭移鎮赴榕溪握刀將帥迎牙纛解辮戎蠻貢象犀翠浪玉虹餘昨夢碧篸羅帶入新題鳯池雞樹公棲處早箇雲飛不要梯拋官九載卧柴荆有底生涯底友生白鷺鸕鷀雙屬玉青鞋布襪一笭箵贛江府主憐逋客樽酒綈袍篤故情天上故人今又去碧雲西望暮天橫右見退休集五詩皆壯麗白鷺青鞋一聨變體俊快送族弟子西赴省吾家詞伯達齊翁阿季文名有父風筆陳千軍能獨掃馬羣萬古洗來空嗟豫還笏歸林下看子乘船入月中淡墨榜頭先快睹泥金帖子不須封見退休集送士人赴省及鹿鳴宴舉世難得好詩此乘船入月中一句竒別林景思尤袤二年無德及斯民獨喜從游得此君囊乏一錢窮到骨胸蟠千古氣凌雲論交却恨相逢晚别袂真成不忍分後夜相思眇空濶尺書應許雁知聞吳興林憲字景思少從其父宦遊天台因留蕭寺寓焉初賀參政允中竒其才妻以女孫而不取奩田貧甚為詩學韋蘇州淳熙五年戊戌尤延之為守為作雲巢記又為雲巢小集序柔櫓晚湖上寒燈深樹中汲井延晚花推窗數新竹延之謂唐人之精者不是過此詩相别有古人交道意送晦菴南歸二年摩手撫瘡痍恩與廬山五老齊合侍玉皇香案側却持華節大江西鼎新白鹿諸生學築就長虹萬丈堤待哺飢民偏戀德老翁猶作小兒啼淳熙八年辛丑三月初四日朱文公在南康除江西提刑先是嘗有任滿奏事之㫖故延之詩云耳送提舉楊大監解組西歸征轅已動不容攀回首棠隂蔽芾間為郡不知歌舞樂憂民贏得鬢毛斑澄清未展須持節注想方深便賜環從此相思隔煙水夢魂飛不到螺山三首取一此楊誠齊萬里也知常州滿除廣東提舉尤延之家居作此詩送之首篇有云歸裝見說渾無物添得新詩數百篇即所謂荆溪集傳於世送吳待制帥襄陽二首方持紫槖侍西清忽領雄藩向暑行誰謂風流貴公子甘為辛苦一書生詞源筆下三千牘武庫胸中十萬兵從此君王寬北顧山南東道得長城欲將盤錯試餘鋒故擁旗麾訖外庸南峴北津形勝地前羊後杜昔賢蹤不妨倒載同民樂自有輕裘折敵衝努力功名歸報國莫思山月與林鐘元注公詩飽看七寶山頭月慣聽三茅觀裏鐘此吳環也琚之第髙宗吳后之姪送親戚錢尉入國丁黼正是朔風吹雪初行縢結束問征途不能剌剌對婢子已是昂昂真丈夫常惠舊曽隨屬國蘇武傳蘇武中郎將及假吏常惠等烏孫今亦病丐奴不知漢節歸何日凖擬殷勤說汴都丁涎溪黼居池州寶慶初正人也嘉定以來士大夫能詩如任斯菴清叟與公皆是而任合於史彌逺至參政公忤於史後帥蜀成都破死之此詩三四佳五六善用事送陸務觀得倅鎮江還越三首取一韓無咎髙文不試紫雲樓猶得聲名動九州金馬漸登難避世蓬萊已近却回舟燒城赤舌知何事許國丹心惜未酬歸卧鏡湖聊洗眼雨餘萬壑正爭流放翁詩亦有云赤口能燒萬里城送陸務觀福建提倉觥船相對百分空京口追隨一夢中落紙雲烟君似舊盈巾霜雪我成翁春來茗葉還爭白臘近梅梢儘放紅領略溪山須妙語小迂使節上凌風元注僕為建安宰作凌風亭此詩淳熙五年戊戌作前詩隆興元年癸未作相去一十六年放翁已入蜀而出亦年五十四矣杜叔髙秀才雨雪中相過留一宿而别口誦此詩以送之陸游久客方知行路難關山無際水漫漫風吹欲倒孤城逺雪落如篩野寺寒暮挈衣囊投土室晨沽村酒掛驢鞍文章一字無人識胸次徒勞萬卷蟠此金華杜旃也杜斿其同氣俱登科有詩名斿至端平從官送陳懷叔赴上臯酒官却還都下竒才初試發硎刀匹馬秋風到上臯地近雖同三輔重時平無復五陵豪極知穩步煙霄路却要微知郡縣勞歸去平津首開宴吐茵應復忤西曹兩聨皆佳送任夷仲大監元受之子往者江淮未撤兵丹陽邂逅識耆英叩門偶綴諸公後倒屣曾䝉一笑迎敢意癡頑成後死相從髣佛若平生小詩話别初何有一段清愁伴櫓聲元注昔在京口與陳應求馮國仲查元章張欽夫諸人從先提刑游今三十九年矣放翁詩似此瘦健者少矣送王簡卿歸天台二首劉過枚數人才難倒指有如公者又東歸班行失士國輕重道路不言心是非載酒青山隨處飲談詩玉塵為誰揮歸期趂得春風早莫放梅花一片飛千巖萬壑天台路一日分為兩日程事可語人酬酢易靣無慚色去留輕放開筆下閒風月收斂胸中舊甲兵世事看來忙不得百年到手是功名王居安字資道一字簡卿台州人淳熙十四年丁未探花韓托胄之死驟入言路尋即去國此送詩殆其時也後起家帥江西與湖南漕帥曹彥伯同平峒寇位至侍從改之吉州人所謂龍洲道人劉過也以詩遊謁江湖大缺針線托胄嘗欲官之使金國而漏言卒以窮死惟此二詩可觀前詩三四用歐陽公送王平甫句意歸期趂得東風早與世事看來忙不得兩句太俗忙不得者何等議論衰颯甚矣送劉改之王居安劉子堂堂七尺軀髙談世事奮髯鬚觀渠論到前賢處據我看來近世無出語令人驚辟易處窮無鬼敢揶揄徜徉閙市渾無畏要是人間烈丈夫即前注王居安也第一首云名滿江湖劉改之半生窮困但吟詩人言季布恐難迹我謂鄭老真其師後四句不稱第二首不識劉郎莫便語酒酣耳熱未全疏士當窮困能無慊我自斟量愧不如橫槊賦詩俱有分輕裘緩帶特其餘當今四野無塵土宜有竒才在草廬非不豪爽但缺平妥優游之意亦足以見改之乃一俠士然外俠內餒作詩多干謁乞索態云送王伯奮守筠陽樓鑰三槐名德萃清門七葉為州賴有君道院無忘山谷賦郡齊當寄潁濱文君應膝上憐文度我向東牀憶右軍振起家聲差易耳便看奏最躡青雲攻愧集第九卷此詩後有别王恭叔詩别長女淯詩逺侍雙親官道院為同盡室餞西橋又云老我年來百念輕文姬助我以琴鳴蓋攻愧長女淯嫁王恭叔隨侍其父赴筠守也攻愧此詩三四切於其州五六用王氏二事以見伯奮之愛子已之愛壻皆工次韻知常德袁尊固監丞送别八月十日魏了翁細把行藏為子評只知盡分敢徼名出如有益殷三聘用不能行魯兩生此道古人如飲食後來竈婢或猜驚子雲亦號知書者猶把商山作採榮孔訓元無實對名只言為已與求人能知管仲不為諒便識殷賢都是仁義利兩途消處長古今一理屈中伸自從聖學寥寥後千百年誰信得真别來歲月爾滔滔流落天涯忽此遭萬木辭榮秋意淡百川歸壑岸容髙笑看海上兩蝸角閒秃山中千兔毫若向顔曾得消息直須奴僕命離騷夕陽舂處是吾家水繞山環路轉賒蹙蹙四方渾未定茫茫大化渺無涯歸來已恨十年晚老却空嗟雙鬢華各願及時崇令德萬鍾於我本何加鶴山魏公寶慶乙酉謫靖州凡七年後紹定辛卯歸蜀此云八月十日蓋是歲也其在謫無一毫戚嗟憔悴之言亦不通史彌逺一字大儒德言非區區小詩人可企及也送趙子直帥蜀得須字尤袤射䇿當年首漢儒去登雲路只斯須飽聞治最誇閩部已有先聲到益都壯略定羌元自許宗英帥蜀舊來無前驅叱馭休辭逺看取東歸上政塗帝念西南在一隅簡求才德應時須羌夷種落誇威令秦隴關河聽指呼自古功名多少壯及今談笑定規模玉山舊政人誰記應掃棠隂看畫圖元注云公前夢玉山汪端明次日有帥蜀之命校其出處大略相似且俱以四十七歲入蜀其夢玉山持帚相拜故用東坡送周文儒帥梓棠隂之語成都太守自國朝以來至今皆畫像云玉山汪應辰諱端明趙子直諱汝愚皆狀元出身以宗室帥蜀自子直始後以為相亦越前此也瀛奎律髓卷二十四

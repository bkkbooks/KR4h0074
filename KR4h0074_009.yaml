body:
  text: 瀛奎律髓巻九元方回編老夀類香山九老之㑹洛陽耆英繼之此盛事也予嘗羡慕近世詩人如曾茶山陸放翁趙昌父滕元秀劉潛夫皆年八十以上而放翁之夀為最髙故多取放翁詩云七言八首胡吉鄭劉盧張六賢皆多年壽予亦次焉偶於敝舍合成尚齒之㑹七老相顧既醉且懽静而思之此㑹世所稀有因成七言六韻詩以記之傳好事者白居易七人五百七十嵗拖紫紆朱垂白鬚囊裏無金莫嗟嘆樽中有酒且歡娯詩吟兩句神還壯酒飲三杯氣且麄嵬峩狂歌教婢拍婆娑醉舞遣孫扶天年髙邁二疏傳人數多於四皓圖除却三山五天竺人間此㑹更應無胡杲年八十九吉旼年八十六鄭據年八十四劉貢年八十二盧貞年八十二張渾年七十四白居易年七十四元註已上七人合五百七十嵗㑹昌五年三月二十四日於白家履道宅同宴宴罷賦詩時秘書監狄兼謨河南尹盧貞以年未七十雖與會而不及列予按㑹者九人狄兼謨盧貞以年未七十不著於詩雖名七老實九老也故世傳九老圖云且一時有同姓名者亦可謂異矣睢陽五老圖杜衍五人四百有餘嵗俱稱分曹與掛冠天地至仁難補報林泉幽致許盤桓花朝月夕隨時樂雪鬢霜髯滿座寒若也睢陽為故事何妨列向畫圖㸔杜衍八十嵗王煥九十嵗畢世長九十四馮平八十七朱貫八十八借觀五老圖次韻歐陽修脫遺軒冕就安閒笑傲丘園縱倒冠白髮憂民雖種種丹心許國尚桓桓鴻㝠得路髙難慕松老無風韻自寒聞説優游多倡和新篇何惜盡傳㸔耆英㑹文彦博九老舊賢形繪事元豐今勝㑹昌春垂肩素髮皆時彦揮塵清談盡席珍染翰不停詩思健飛觴無算酒行頻蘭亭雅集誇修褉洛社英游賞序賓自愧空疎陪几杖更容欵密奉簪紳當筵尚齒尤多幸十二人中第二人富弼七十九彦國文彦博七十七寛夫席汝言七十七君從王尚恭七十六安之趙丙七十五南正劉几七十五伯壽馮行已七十五肅之楚建中七十三正叔張問七十昌言王拱辰七十一君貺王謹言七十二不疑張燾七十景元司馬光六十四君實七十陸游七十殘年百念枯桑榆元不補東隅但存隠具金鴉觜那夢朝衣玉鹿盧身世蠶眠將作繭形容牛老已垂胡客來莫問先生處不釣娥江即鏡湖枕上作龍鍾七十豈前期矮㡌枯笻與老宜愁得酒巵如敵國病須書巻作良醫登山筋力雖尤健閉户工夫頗自竒今日快晴春睡足卧聴簷鵲已多時八十三吟石帆山下白頭人八十三回見早春自愛安閒忘寂寞天將强健報清貧枯桐已爨寧求識敝帚當捐却自珍桑苧家風君莫笑他年猶得作茶神戲遣老懷平生碌碌本無竒况是年垂九十時阿囝畧如郎罷意稚孫能伴太翁嬉花前騎竹强名馬階下埋盆便作池一笑不妨閒過日歎衰憂死却成癡昌黎詩老翁真箇似童兒汲水埋盆作小池亦此謂也瀛奎律髓巻九

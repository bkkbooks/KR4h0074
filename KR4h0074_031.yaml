body:
  text: 瀛奎律髓卷三十一元方回編宫閫類長門買賦團扇託詞后妃于君王猶然婦人女子疏而不怨難矣自易之咸恆詩之關雎雞嗚其義不明而後風俗衰恩義薄居寵而自損上也而或失愛怨其所可怨不誹不亂可也五言七首春宫怨杜荀鶴早被嬋娟誤欲粧臨鏡慵承恩不在貌教妾若為容風暖鳥聲碎日髙花影重年年越溪女相憶採芙蓉譬之事君而不遇者初亦恃才而卒為才所誤愈欲自衒而愈不見知蓋寵不在貌則難乎其容矣女為悅己者容是也風景如此不思從平生貧賤之交可乎長門怨岑參君王嫌妾妬閉妾在長門舞袖垂新寵愁眉結舊恩緑錢生履跡紅粉濕啼㾗羞被桃花笑看君獨不言婕好怨皇甫冉由來詠團扇今已值秋風事逐時偕往恩無日再中早鴻聞上苑寒鷺上深宫顔色年年謝相如賦豈工閨情戎昱側聽宫官說知君寵尚存未能開笑頰先欲換愁魂寶鏡窺粧影紅衫裛淚痕昭陽今再入寧敢恨長門長信宫于武陵簟凉秋氣初長信恨何如拂黛月生指解鬟雲滿梳一從悲畫扇幾度泣前魚坐聽南宫樂清風搖翠裾玉階怨鄭鏦昔日同飛燕今朝似伯勞情深爭擲果寵罷怨殘桃别殿春心斷長門夜樹髙雖能不自悔誰見舊衣褒三四工甚有味王家少婦一云古意崔皓十五嫁王昌盈盈入畫堂自矜年最少復倚壻為郎舞愛前溪緑歌憐午夜長閒年鬭百草度日不成粧一作能粧此等婦人世間有之但不多耳七言二首貧女秦韞玉蓬門未識綺羅香擬托良媒亦自傷誰愛風流髙格調共憐時世儉梳粧敢將十指誇纎巧不把雙眉鬬畫長最恨年年壓金線為他人作嫁衣裳此詩世人盛傳誦之洛意楊億蘅臯駐馬獨依依寄恨微波帶減圍淚迸不成雙玉筯身輕誰賦六銖衣穿針靜夜星榆出擺手清晨雪絮飛目斷風簾舊巢燕新看先傍杏梁歸瀛奎律髓卷三十一

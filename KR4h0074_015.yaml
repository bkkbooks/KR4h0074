body:
  text: 瀛奎律髓巻十五元方回編暮夜類道途晚歸齋閣夜坐眺暝色數長更詩思之幽致尤見於斯五言五十首晚次樂鄉縣陳子昻故鄉杳無際日暮且孤征川原迷舊國道路入邊城野戍荒烟斷深山古木平如何此時恨噭噭夜猿鳴盛唐律詩體渾大格高語壯晚唐下細工夫作小結裹所以異也學者詳之向夕杜甫畎畝孤城外江邨亂水中深山催短景喬木易高風鶴下雲汀近雞栖草屋同琴書散明燭長夜始堪終日暮牛羊下來夕各已閉柴門風月自清夜江山非故園石泉流暗壁草露滴一作滿秋根頭白燈明裏何須花燼繁晚行口號三川不可到歸路晚山稠落雁浮寒水饑烏集戍樓市朝今日異䘮亂幾時休逺媿梁江總還家尚黒頭客夜客睡何曾着秋天不肯明入簾殘月影髙枕逺江聲計拙無衣食途窮仗友生老妻書數紙應悉未歸情倦夜竹凉侵卧内野月滿庭隅重露成涓滴稀星乍有無暗飛螢自照水宿鳥相呼萬事干戈裏空悲清夜徂中夜中夜江山静危樓望北辰長為萬里客有媿百年身故國風雲氣髙堂戰伐塵胡雛負恩澤嗟爾太平人邨夜風色蕭蕭暮江頭人不行邨舂雨外急隣火夜深明胡羯何多難漁樵寄此生中原有兄弟萬里正含情旅夜書懷細草微風㟁危檣獨夜舟星垂平野濶月湧大江流名豈文章著官應老病休飄飄何所似天地一沙鷗老杜夕暝晚夜五言律近二十首選此八首潔淨精緻者多是中兩句言景物兩句言情若四句皆言景物則必有情思貫其間痛憤哀怨之意多舒徐和易之調少以老杜之為人純乎忠襟義氣而所遇之時喪亂不已宜其然也出郭霜露晚凄凄高天逐望低逺烟鹽井上斜景雪峰西故國猶兵馬他鄉亦鼔鼙江城今夜客還與舊烏啼野望清秋望不極迢遞起層隂逺水兼天淨孤城隠霧深葉稀風更落山逈日初沉獨鶴歸何晚昏鴉已滿林此亦老杜暮夜詩而題中惟指郊野各極遒健悲慘不可不選前詩分明道亂離後詩結末四句有歎時感事助賢惡不肖之意焉晚泊牛渚劉禹錫蘆葦晚風起秋江鱗甲生殘霞忽改色逺雁有餘聲戍鼓音響絶漁家燈火明無人能詠史獨自月中行意盡晚景尾句用袁宏詠史事尤切於牛渚也按楊誠齋晚景一聨亦曰暮天無定色過雁有歸聲夕次洛陽道中崔塗秋風吹故城城下獨吟行高樹鳥已息古原人尚耕流年川暗度往事月空明不復歎岐路馬頭塵夜生陳簡齋高原人獨耕似勝古原人尚耕為第四句下古字第一句却只作秋風吹故城故字不甚好若曰秋風吹古城此一句既妙第四句却作故原人尚耕亦可也酬夢得窮秋夜坐即事見寄白居易細焰燈將盡聲遥漏正長老人秋向火小女夜縫裳菊悴籬經雨萍銷水得霜今冬煖寒酒已擬共君嘗三四有情味齊雲樓晚望偶題十韻兼呈馮侍御田殷二協律樓在蘇州潦倒宦情盡蕭條芳嵗䦨欲辭南國去重上北城看複嶺江山壯平鋪井邑寛人稠過楊府坊鬧半長安插霧峰頭沒穿霞日脚殘水光紅漾漾樹色緑漫漫約略留遺愛殷勤念舊歡病抛官職易老别友朋難九月全無熱西風亦未寒齊雲樓北面半日凭欄干前一聨見蘇州之盛後一聨真情可掬彭蠡湖晚歸彭蠡湖天晚桃花水氣春鳥飛千白㸃日沒半紅輪何必為遷客無勞是病身但來臨此望少有不愁人自是一家尾句凄然如此遷謫中常態也山中寒夜呈許棠曹松山寒草堂暖寂夜有良朋讀易分高燭煎茶取折冰庭垂河半角窗露月微稜俱入詩心地爭無俗者情詩一作論情一作憎第四句竒此等語惟唐人能之南塘暝興水色昏猶白霞光暗漸無風荷揺破扇波月動連珠蟋蟀啼相應鴛鴦宿不孤小僮頻報夜歸步尚踟蹰中四句而三句新只起句十字亦不茍與清江上人及諸公宿李八昆弟宅耿湋湯公多外友洛社自相依逺客還登㑹秋懷欲忘歸驚風林果少驟雨砌蟲稀更過三張價東遊媿陸機五六工緻月夜登王屋僊臺顧非熊月臨峰頂壇氣爽覺天寛身去銀河近衣沾玉露寒雲中日己赤山外夜初殘即此是仙境惟愁再上難五六勝於三四同劉秀才宿見贈僧無可浮雲流水心只是愛山林共恨多年别相逢一夜吟既能持苦節勿謂少知音憶就西池宿月圎松竹深中四句苦淡末句脱洒高妙趙紫芝雪晴江月圎全學此也寒夜過叡川師院長生推獻壽法坐四朝登問難無彊敵聲名掩古僧絶塵苔積地栖竹鳥驚燈語黙俱忘寐殘窗半月稜五六自是一様句法第七句尤佳西陵夜居吳融寒潮落逺汀暝色入柴扄漏永沉沉静燈孤的的青林風移宿鳥池雨定流螢盡夕成愁絶啼螀莫近庭五六絶妙兩字眼用工夕陽僧宇昭向夕江天逈微微接水平帶㠶歸極浦隨客上荒城雲外僧看落山西鳥過明何人對幽怨苒苒敗莎并宇昭九僧之一江東人夕陽着題詩也中四句皆工冬夜旅思寇準年少嗟覊旅煙霄進未能江樓千里月雪屋一龕燈逺信憑邊雁孤吟寄岳僧爐灰愁擁坐硯水半成冰讀此詩與晚唐人何異豈知其為宰相器乎三四悲壯五六自唐人翻出第二句見其進取之心焉暝梅堯臣杳杳鐘初發昏昏户閉時巢禽投樹盡疲馬入城遲醉唱眠茅屋燒光透槿籬荷鋤休帶月亭長豎毛眉夜日從東溟轉夜向西海沉羣物各已息衆星燦然森蝦蟇將食月魑魅爭出隂阮籍獨不寐徘徊起彈琴前一首曲盡山城暮景後一首不專從律而意謂日沒星出群隂之類爭逞憂世之士獨彈琴不寐有深意也豈但賦夜而已哉吳正仲見訪迴日暮必未晚膳因以解嘲永日無車馬閒坊有竹隣雨中烏㡌至門外緑苔新不殺雞為黍堪題鳳向人山公識墨在知我舊來貧五六用事妙不覺其為用事也以題有暮晚字附諸此秋夜集李式西齋趙湘澤國秋光淡詩家夜會清雨餘逢月色風靜得琴聲小徑幽蟲絶寒堦落葉并當余不擬睡自起繞池行太宗朝詩人多學晚唐此詩三四係一句法五六是偶江樓晴望魯交江干一雨收霽色染新愁逺水碧千里夕陽紅半樓笛寒漁浦晚山翠海門秋更待牛津月袁宏欲泛舟三四善言晚景臘後晚望宋祁寒日繫難定鳴笳弄己休凍崕初辨馬昏谷自量牛漢樹臨闗密胡泉入塞流登高能賦未風物古堯州崑體善于用事兩崕不辨牛馬與谷量牛馬融化作臘後晚望詩精密之至五六亦佳真定府詩城隅晚意寥寥天意晚稍覺井閭閒水落呈全嶼雲生失半山牛羊樵路暗燈火客舟還暝思輸鳬鵠歸飛沆漭間三四工巧西樓夕望炎氛隨日入岑寂坐遥帷倦鶩昏投浦驚蟬夜去枝桂花兼月破槎影帶星移珍重窗風好羲人即此時三四工皆成都詩固是有羲皇上人此曰羲人則生晚遊九曲院和章秀才陳師道冷落叢祠晚回斜峽路賒平荷留夜雨驚鳥過隣家雲暗重重樹風開旋旋花病身無俗事待得後歸鴉此錢塘九曲院也后山遊吳時在三十嵗以前元豐五年壬戌詩湖上晚歸寄詩友功名違壯志戒律負前身劉徳長欺客王融却笑人殘年憎受嵗病眼怯逢春杖屨知何向如公未厭頻受一作送此錢塘西湖也后山元豐中游吳任淵注本不收此詩三十嵗所作乃謝克家本添入者憎受嵗怯逢春亦老蒼矣未可以少作視之後湖晚出水淨偏明眼城荒可當山青林無盡意白鳥有餘閒身致江湖上名成伯季間目隨歸雁盡坐待暮鴉還滄江萬古流不盡白鳥雙飛意自閒東坡賞歐公詩謂敵老杜后山三四一聨尤簡而有味不致身于廟堂而致身於江湖之上名成伯季間謂在蘇門六君子中亞於黄而高於晁張也晚泊清切臨風笛深明隔水燈堆塲穿鳥雀暗溜入溝塍年使扶行老船催趂渡僧兹遊恐未已着句續先曾使之年出左傳謂問絳人年幾嵗使之自言也晚坐栁弱留春色梅寒釀雪花溪明數積石月過戀平沙病減還増藥年侵却累家後歸棲未定不但只昏鴉六句下六字為眼尾句尤高古寒夜留滯常思動艱虞却悔來寒燈挑不焰殘火撥成灰凍水滴還歇風簾捲復開孰知文有忌情至自生哀此赴棣州教授詩起句十字士大夫之常態宿濟河燭暗人初寂寒生夜向深潛魚聚沙窟墜鳥滑霜林稍作他年計初回萬里心還家只有夢更着曉寒侵句句有眼字字無瑕尾句尤深幽宿合清口風葉初疑雨晴窗誤作明穿林出去鳥舉棹有來聲深渚魚猶得寒沙雁自驚卧家還就道身計豈蒼生此亦赴棣州教時作所以去鳥穿林而出者以舉棹者有來聲也上問下答起句十字盡客夜之妙末句歎喟出處無補蒼生逺矣和西齋張耒山色供開鏡溪光照掩扉暗蟲先夜響萎葉近秋飛灌壠晴蔬出開籠暮鶴歸鳴琴坐朗月輕露㸃秋衣三四自然好五六工冬夜嵗晚轉無趣席門誰駐車澗泉分當井山葉掃供厨謀拙從人笑身閒讀我書幸知霜霰晚時得灌園蔬三四亦自然從人笑讀我書各有出處非杜撰小舟過吉澤效王右丞陸游澤國霜露晚孤汀煙火微本去官道逺自然人跡稀木落山盡出鐘鳴僧獨歸漁家閒似我未夕閉柴扉汀一作邨五六可謂得句五鼔不得眠起酌一杯復就枕棲冷雞聲咽牕深燭焰明流年容易過華髪等閒生濁挹連醅酒香搓帶葉橙殘骸付螻蟻汗簡更須名第六一句新冷泉夜坐趙師秀衆境碧沉沉前峰月正臨樓鐘晴聽響池水夜觀深清浄非人世虚空見佛心却尋來處宿風起古松林三四下一字是眼中一字是眼之來脉作詩當如此秤停訪端叔提幹葛天民水趂潮頭上山隨柁尾行大江中夜滿雙櫓半空鳴雁冷來無幾鷗清睡不成平生師友地此夕最闗情三四有盛唐風味雪夜冷蘂通幽信孤山欠幾遭盃因寒更滿句到淡方髙雪滴晴簷雨松翻夜壑濤布衾雖似鐵猶念早趨朝五六儘佳三四幽淡月夜書懷陳傅良送客門初掩收書室更虚新篁高過瓦凉月下臨除婦病纔扶杖兒饞或餽魚今朝吾已過莫問夜何如尾句高不可言暝色劉克莊暝色千邨静遥峰帯淺霞荷鋤歸别墅乞火到隣家疎鼔聞更逺昏燈見字斜小軒風露冷自起灌蘭花七言十一首閣夜杜甫嵗暮隂陽催短景天涯霜雪霽寒宵五更鼔角聲悲壯三峽星河影動揺野哭千家聞戰伐夷歌幾處起漁樵卧龍躍馬終黄土人事音書漫寂寥三四東坡所賞世間此等詩惟老杜集有之暮歸霜黄碧梧白鶴棲城上擊柝復烏啼客子入門月皎皎誰家搗練風凄凄南渡桂水闕舟楫北歸秦川多鼔鼙年過半百不稱意明日看雲還杖藜自是一種骨格風調又自是一種悲壯哀慘返照楚王宫北正黄昏白帝城西過雨痕返照入江翻石壁歸雲擁樹失山村衰年肺病惟髙枕絶塞愁時早閉門不可久留豺虎亂南方實有未招魂想必先得三四故以返照命題翻字失字詩眼也和周亷彦張耒天光不動晚雲垂芳草初長襯馬蹄新月已生飛鳥外落霞更在夕陽西花開有客時攜酒門冷無車出畏泥修褉洛濱期一醉天津春浪緑浮堤三四不見着力自然渾成夜泊逺雁初歸楓葉乾孤舟晚繫岸邊灘淮聲夜静凌風壯月色秋深照客寒疎拙功名甘濶畧飄零蹤跡但悲歎不闗酒薄難成醉自是年來少所懽律熟句妥夜泊寧陵韓駒汴水日馳三百里扁舟東下更開帆旦辭杞國風微北夜泊寧陵月正南老樹挾霜鳴窣窣寒花垂露落毶毶茫然不悟身何處水色天光共蔚藍扁舟東下更開帆此是詩家合當下的句只一句中有進步猶云同是行人更分首也五六亦工夜坐呂本中所至留連不計程兩年堅卧厭南征荒城日短溪山靜野寺人稀鸛雀鳴藥裹向人閒自好文書到眼病猶明較量定力差精進夜夜蒲團坐五更夜雨陸游蕭蕭殘髪雪侵冠冉冉清愁用底寛把巻昏眸常欲閉投床睡興却先䦨惟須酒沃相如渴未分人哀范叔寒雨霽定知梅已動佩壺明日試尋看五六氣壯以第六句喚醒第五句也冬夜不寐姜特立宵柝迢迢驚睡魔靜思甘分老林坡忍饑只有嵇康嬾扣角曾無寗戚歌不起妄心思世事只將閒意養天和時人休説長生術學着長生事轉多五六俱曠達秋夜偶書趙師秀此生謾與蠧魚同白髪難收紙上功輔嗣易行無漢學𤣥暉詩變有唐風夜長燈燼挑頻落秋老蟲聲聽不窮多少故人天禄貴猶將寂寞歎揚雄三四有議論却不可以晚唐詩一例看若如此推去儘高呈蔣薛二友中夜清寒入緼袍一杯山茗當香醪禽翻竹葉霜初下人立梅花月正高無欲自然心似水有營何止事如毛春來擬約蕭閒客同上天台看海濤此等詩平正近世人甚誇之不深甫乾淳以前所作耳然尾句高灑瀛奎律髓巻十五

body:
  text: 瀛奎律髓巻十二元方回編秋日類悲哉秋之為氣宋玉之辭極矣後之作者悲秋為多中秋九日詩不盡入節序及泛述秋興秋懐精於言秋者屬此五言六十首秋日二首唐太宗爽氣澄蘭沼秋風動桂林露凝千片玉菊散一叢金日岫髙低影雲空㸃綴隂蓬瀛不可望泉石且娛心菊散金風起荷疎玉露圓將一作入秋數行雁離夏幾林蟬雲凝愁半嶺霞碎纈髙天還似成都望直見峨眉前唐太宗既得天下盡修諸史晉書南北史及八代史是也盡註諸書今註疏是也其有功於後世者甚大不止一時混合軌文而已作小小八句詩壓倒一時文人書生瀛洲十八學士及天下能言之人焉不心服詩體源流陳隋多是前六句述景末句乃以情終之後篇將秋之聯係響字霞碎纈髙天纈字甚妙山谷秋入園林花老眼乃是如此下字李賀龜甲屏風生眼纈亦出此秋日翠微宫秋光凝翠嶺凉吹肅離宫荷疎一葢缺樹冷半帷空側陣移鴻影圓花釘菊叢攄懷俗塵外髙眺白雲中側陣移鴻影一聯自是佳句釘字似險細味之乃以菊花之圓如釘裝然亦竒也又遼東山夜臨秋詩亦佳一聯云烟生遥岸隠月落半崕隂秋清杜甫髙秋蘇肺氣白髮自能梳藥餌憎加減門庭悶掃除杖藜還客拜愛竹遣兒書十月江平穏輕舟進所如此老杜詩之似晚唐者悲秋凉風動萬里羣盜尚縱横家逺傳書日秋來為客情愁窺髙鳥過老逐衆人行始欲投三峽何由見兩京此詩不勝悲歎五六尤哀壯激烈秋野秋野日疏蕪寒江動碧虚繫舟蠻井絡卜宅楚村墟棗熟從人打葵荒欲自鋤盤飱老夫食分減及溪魚易識浮生理難教一物違水深魚極樂林茂烏知歸吾老甘貧病榮華有是非秋風吹几杖不厭北山薇禮樂攻吾短山林引興長掉頭紗㡌側曝背竹書光風落收松子天寒割蜜房稀疎小紅翠駐屐近微香逺岸秋沙白連山晚照紅潛鱗輸駭浪歸翼㑹髙風砧響家家發樵聲箇箇同飛霜任青女賜被隔南宫身許麒麟畫年衰鷗鷺羣大江秋易盛空峽夜多聞逕隠千重石帆留一片雲兒童解蠻語不必作參軍讀老杜此五詩不見所謂景聯亦不見所謂頷聯何處是四虚何處是四實虚中有實實中有虚景可為頷頷可為景大手筆混混乎無窮也却有一絶不可及處五首詩五箇結句無不喫緊着力未嘗有輕易放過也然則真積力久亦在乎熟之而已或問吾老係單字榮華是雙字亦可對否曰在老杜則可若我輩且當作衰老甘貧病然不如吾老之語健意足也秋日過徐氏園林包佶回塘分越水古樹積呉煙掃竹催鋪席垂蘿待繫船鳥窺新罅栗龜上半欹蓮屢入忘歸地長嗟俗事牽五六工甚秋日送客至潛水驛劉禹鍚候吏立沙際田家連竹溪楓林社日鼓茅屋午時雞雀噪晚禾地蝶飛秋草畦驛樓宫樹近疲馬再三嘶三四天下誦之秋日暑退贈白樂天暑服宜秋着清琴入夜彈人情皆向菊風意欲摧蘭嵗稔貧心泰天凉病體安相逢取次第却甚少年歡三四已佳五六十分佳絶早秋杜牧疎雨洗空曠秋標驚意新大暑去酷吏清風來故人樽酒酌未酌晚花嚬不嚬銖秤與縷雪誰覺老陳陳大暑如酷吏之去清風如故人之來倒裝一字便極髙妙晚唐無此句也牧之才髙意欲異衆心鄙元白良有以哉尾句怪秋思熱去解􅎂鐵飄蕭秋半時微雨池塘見好風襟袖知髮短梳未足枕凉閑且欹平生分過此何事不參差首句即去酷吏之意三四眼前事道着即好池上白居易嫋嫋凉風動凄凄寒露零蘭衰花始白荷破葉猶青獨立棲沙鶴雙飛照水螢若為寥落境仍值酒初醒第四句最新和左司郎中秋居五首張籍閒堂新灑掃稱是早秋天書客多呈帖琴僧與合絃莎臺乗晚上竹院就凉眠終日無忙事還應似得僊自知清淨好不要問時豪就石安琴枕穿松壓酒槽山情因月甚詩語入秋髙身外無餘事唯應筆硯勞醉倚斑藤杖閑眠癭木牀案頭行氣訣爐裏降真香尚儉經營少居閒意思長秋茶莫夜飲新月作松漿菊地纔通履茶房不壘階憑醫㸔蜀藥寄信覔呉鞋盡得僊家法多隨道客齋本無榮辱意不是覺安排閒來松菊地未省有埃塵直去多將藥朝回不訪人見僧收酒器迎客換紗巾更恐登清要難成自在身和劉補闕秋園五首朱慶餘閒園清氣滿新興日堪追隔水蟬鳴後當簷雁過時雨餘槐穟重霜近藥苗衰不似朝簪貴多將野客期逍遥人事外杖屨入杉蘿草色寒猶在蟲聲晚漸多靜逢山鳥下幽稱野僧過幾許開新菊開從落葉柯深齋常獨處詎肯厭秋聲翠篠寒逾靜孤花晚更明每因逢石坐多見抱書行入夜聴疎杵遥知耿此情門巷唯苔蘚誰言不稱貧臺閒人下晚果熟鳥來頻石脈潛通井松枝靜離塵殘蔬得雨後又見一畨新竹逕通隣圃清深稱獨游蟲絲交影細藤子墜聲幽積潤苔紋厚迎寒薺葉稠閒來尋古畫未廢執茶甌朱慶餘詩荆公少選然如此五詩多工語和劉補闕秋園行寓興六首雍陶水木夕隂冷池塘秋意多庭風吹故葉階露淨寒莎愁燕窺燈語情人見月過砧聲聴已别蟲響復相和閉門無事後此地即山中但覺鳥聲異不知人境同晚花開為雨殘果落因風獨坐還吟酌詩成酒已空花開為雨果落因風自是佳句然詩家亦或忌此因即是為為即是因二字相犯也昌黎詩風能折芡觜露亦染梨腮山谷謂能當作稜亦當作液詩中不可無虚字然用虚字而不切則泛也因對為鳥對禽知對覺凡三者所當省也自得家林趣常時在外稀對僧餐野食迎客着山衣雀鬭翻簷散蟬驚出樹飛功成他日後何必五湖歸秋色庭蕪上清朝見露華疎篁抽晚笋幽藥吐寒芽引水新渠淨登臺小徑斜人來多愛此蕭爽似仙家禁掖朝迴後林園勝賞時野人來辨藥庭鶴往㸔棋晚日明丹棗朝霜潤紫梨還因重風景猶自有秋詩聖代少封事閒居方屏喧漏寒雲外闕木落月中園山鳥宿簷樹水螢流洞門無人見清景林下自開樽六詩皆工而可觀荆公所取者劉補闕為諫官而家園有山水之樂唐人之仕於東西都者皆然郊居秋日酬奚贊府見寄楊巨源繁菊照深居芳香春不如聞尋周處士知伴庾尚書日晚汀洲曠天晴草木疎閒言揮塵柄清步掩蝸廬野老能親牧髙人念逺漁幽叢臨古㟁輕葉度寒渠暮色無狂蝶秋華有嫩蔬若為酬郢曲從此愧璠璵起句十字最佳而照字尤妙後所㸃兩聯一開濶一細潤此本合入郊野類以其言秋日者多故附之秋長安秋夜章孝標田家無五行水旱卜蛙聲牛犢乗春放兒孫候暖耕池塘煙未起桑柘雨初晴嵗晚香醪熟邨邨自送迎章孝標詩集一巻荆公選僅取五首題云長安秋夜而前六句自言春意止末後兩句係秋意今不敢輕改古題附秋詩中亦只起句十字新異立秋日司空曙律變新秋至蕭條自此初花酣蓮報謝葉在柳呈疎淡日非雲映清風似雨餘巻簾凉暗度迎扇暑先除草靜多翻燕波澄乍露魚今朝散騎省作賦興何如秋寄賈島僧無可暗蟲分暮色黙坐思西林聴雨寒更盡開門落葉深昔因京邑病併起洞庭心亦是吾兄事遲迴直至今聴雨徹夜既而開門乃是落葉如雨此體極少而絶佳微陽下喬木逺燒入秋山亦然陳后山輝輝垂重露㸃㸃綴流螢謂柏枝垂露若綴螢然一句指事一句設譬詩中之竒變者也秋寄李頻使君僧貫休務簡趣誰陪清吟共緑苔葉和秋蟻落僧帶野風來留客朝嘗酒憂民夜畫灰終期冐風雪江上見宗雷李頻睦州人終於建州刺史貫休婺州蘭溪人死於蜀為詩有極竒處亦有太粗處盡日覓不得有時還自來為人嘲作失猫詩此類是也然道價甚髙年壽亦髙蚤與李頻交而老依錢鏐不肯改一劍霜寒十四州遂入蜀此詩第四第六句好新秋雨後僧齊己夜雨洗河漢詩懷覺有靈籬聲新蟋蟀草影老蜻蜓靜引閒機發凉吹逺思醒逍遥向誰説時泥漆園經齊已潭州人與貫休並有聲同師石霜二僧詩唐之尤晚者已詩如夜過秋竹寺醉打老僧門最佳此詩起句自然第六句尤好秋徑僧保暹杉竹清隂合閒行意有憑凉生初過雨靜極忽歸僧蟲迹穿幽穴苔㾗接斷稜翻思深隠處峰頂下層層此賦秋徑云杉竹清隂合即其中乃徑也第二句閒行字雨之所過僧之所歸皆徑也五六尤見徑中秋事尾句仍不走作原上秋草僧古懷秋來深徑裏老病眼慵開户外行人絶林間朔吹回亂蛬鳴古塹殘日照荒臺唯有他山約相親入望來第六句深得秋意山中僧秘演結茅臨水石淡寂益閒吟久雨寒蟬少空山落葉深危樓乗月上逺寺聴鐘尋昨得江山信期來此息心此石曼卿至交山東演也歐陽公為其詩集序中四句鍛而成却足前後起末句九僧亦多如此落葉潘閬片片落復落園林漸向空幾畨經夜雨一半是秋風靜擁莎堦下閒堆蘚徑中巖松與巖檜寧共此時同潘閬出處予著名僧詩話已詳見落葉合入着題詩今附秋日類中三四有議論五六只是體貼尾句却有出脱不如此非活法也秋日題瑯琊山寺巗下多幽景且無塵事喧鐘聲晴徹郭山色曉當門深洞藏泉脈懸崕露樹根更期來此宿絶頂聴寒猿此為滁州㕘軍時所作有賈島餘韻五六尾句尤髙渭上秋夕閒望秋夕滿秦川登臨渭水邊殘陽初過雨何樹不鳴蟬極浦涵秋月孤帆沒逺煙漁人空老盡誰似太公賢五六清淡尾句必合如此乃有轉換暮秋閒望魏野水閣閒登望郊原欲刈禾壞簷巢燕少積雨病蟬多砧隔寒溪搗鐘隨曉吹過扁舟何日去江上負煙簑中四句皆工第四句尤好秋風王安石揫斂一何饕天機亦自勞牆隈小翻動屋角盛呼號漠漠驚沙密紛紛斷柳髙江湖豈在眼昨夜夢波濤八句無一字不工第一句下饕字二句下天機字尤於秋風為切也秋露日月跳何急荒庭露送秋初疑宿雨泫稍怪曉霜稠曠野將馳獵華堂已御裘空令半夜鶴抱此一端愁周處風土記曰白鶴性警至八月繁露降流草葉上滴滴有聲即鳴也春秋繁露白鶴知夜半此詩三四已切于秋露五六似若言秋而未及露却着結句引半夜鶴以終之亦妙秋懷歐陽修節物豈不好秋懷何黯然西風酒旗市細雨菊花天感事悲雙鬢包羞食萬錢鹿車終自駕歸去潁東田歐陽公於自然之中或壯健或流麗或全雅淡有徳者之言自不同也三四全不喫力俗間有云香橙螃蟹月新酒菊花天本此秋日家居梅堯臣移榻愛晴暉翛然世慮微懸蟲低復上鬭雀墮還飛相趂入寒竹自收當晚闈無人知靜景苔色照人衣相趂入寒竹以應鬭雀墮還飛自收當晚闈以應懸蟲低復上又是一體首尾翛然出塵可謂着題詩也秋懷示黄預陳師道窗鳴風歴耳道壞草侵衣月到千家靜林昏一鳥歸冥冥塵外趣稍稍眼中稀送老須公等秋棋未解圍三四絶妙五六非老筆不能秋懷稍稍昏烟集鼕鼕一再更短檠㸔細字髙枕忘平生來鶴妨身健新陽喚眼明已須甘酒力不用占時名詩中四句皆有眼只已須不用閒字却是緊要處雜詩唐庚兀兀且如此出門安所之手香柑熟後髮脱草枯時精力㸔書覺情懷舉盞知炎州無過雁二子在天涯水過漁村濕沙寛牧地平片雲明外暗斜日雨邊晴山轉秋光曲川長暝色横瘴鄉人自樂耕釣各浮生子西惠州雜詩凡二十首佳句甚多此二詩尤切於秋而山轉秋光曲一聯尤古今絶唱他如身謀嗟翠羽人事歎榕根茶隨東客到藥附廣船歸翻泥逢暗笋汲井得飛梅湖盡船頭轉山窮屐齒迴濯足樓船㟁髙歌抱朴村雪曾前嵗有地過此邦無笋蕨春生箸魚蝦海入盤草平連别洞雨轉入他山人情雙鬢雪天色屢頭風國計中宵切家書隔嵗通皆雋永有味梅市道中陸游雨暗山陂路人喧北渡頭廟垣新畫馬邨笛逺呼牛買飯諳爭席迎潮競解舟平生苦吟處又送一年秋秋夜紀懷北斗垂蒼莽明河浮太清風林一葉下露草百蟲鳴病入新凉減詩從半睡成還思散闗路炬火驛前迎中四句皆工秋晚滕甫槭槭霜風勁駸駸物象彫屢遷憐蟋蟀一敗笑芭蕉林葉疎逾響山雲薄易消雖無逺行役對此亦何聊元秀秋晚十首今選其一他如苔㾗遺鳥爪菊本寄蛬音客櫓行何晚隣機織未休老屋險不仆寒袍半欲紕亦佳句此屢遷一敗之句為絶妙江西體也七月四首韓琥水石雲山裏歸來已九秋隔城如淺近隣寺始深幽慧逺逢修靜文淵説少游徑荒殊不掃風葉上牽牛地僻稀人迹重林日自虚鳥飛晨氣外蟬噪晚凉初餘潤從侵屨浮埃倦整書樵漁時上下閉户又何居木末芙蓉起亭亭緑且青牆猶承片瓦牕不礙疎櫺次第花擎葢縱横葉展屛石丁誰主者仙豈待沈㝠擁砌叢生菊何闗老意多澆花驚易燥耘草喜成科枕腊尤宜睡餐香豈待哦淵明藏不盡滿把尚婆娑此嘉定十三年庚辰詩所謂歸來已九秋則出處亦可攷也第一首五六用人名而不覺其冗尾句幽雅第二首中四句俱工第三首只言木芙蓉第四首言菊而枕腊餐香四字絶佳老筆勁健非江湖近人餖飣可及七言三十首秋盡杜甫秋盡東行且未回茅齋寄在少城隈籬邊老却陶潛菊江上徒逢袁紹盃雪嶺獨㸔西日落劍門猶阻北人來不辭萬里長為客懷抱何時得好開讀老杜詩開口便覺不同獨㸔西日落猶阻北人來一聯不勝悲壯結句更有氣力秋夜露下天髙秋氣清空山獨夜旅魂驚疎燈自照孤帆宿新月猶懸雙杵鳴南菊再逢人卧病北書不至雁無情步檐倚杖㸔牛斗銀漢遥應接鳳城此詩中四句自是一家句法千巗無人萬壑靜三步迴頭五步空是也耕田欲雨刈欲晴去得順風來者怨亦是也山谷得之則古詩用為滄江鷗鷺野心性隂壑虎豹雄牙須亦是也葢上四字下三字本是兩句今以合為一句而中不相粘實則不可拆離也試先讀上四字絶句然後讀下三字則句法截然可見矣黄草黄草峽西船不歸赤甲山下行人稀秦中驛使無消息蜀道兵戈有是非萬里秋風吹錦水誰家别淚濕羅衣莫愁劍閣終堪據聞道松州已被一作破一作解圍兵戈有是非則兆端在乎上之人劍閣恐終不可據則叛於蜀者亦終於滅亡而已此等詩豈徒言秋日光景者哉吹笛吹笛秋山風月清誰家巧作斷腸聲風飄律吕相和切月傍闗山幾處明胡騎中宵堪北走武陵一曲想南征故鄉楊柳今揺落何得愁中却盡生慷慨悲怨自是一種風味李太白謂江城五月落梅花此亦以指楊柳葢笛中有此二曲也吹笛本是着題今以附之秋類七月一日題終明府水樓髙棟層軒已自凉秋風此日灑衣裳翛然欲下隂山雪不去非無漢署香絶壁過雲開錦繡疎松隔水奏笙簧㸔君宜着王喬履真賜還應出尚方宓子彈琴宰邑日終軍棄繻英妙時承家節操尚不泯為政風流今在兹可憐賓客盡傾葢何處老翁來賦詩楚江巫峽半雲雨清簟疎簾㸔奕棋前詩人所不及後詩謂之呉體惟山谷能學而肖之餘人似難及也老杜别有秋興七言律八首在䕫州懷長安而作不専言秋以多不能備取宿府幕清秋幕府井梧寒獨宿江城蠟炬殘永夜角聲悲自語中天月色好誰㸔風塵荏苒音書絶闗塞蕭條行路難已忍伶俜十年事强移棲息一枝安此嚴武幕府秋夜直宿時也三四與五更鼓角聲悲壯三峽星河影動揺同一聲調詩之様式極矣長安晚秋趙嘏雲物凄凉拂曙流漢家宫闕動髙秋殘星幾㸃雁横塞長笛一聲人倚樓紫艷半開籬菊淨紅衣落盡渚蓮愁鱸魚正美不歸去空戴南冠學楚囚以三四佳呼趙倚樓始聞秋風劉禹錫昔㸔黄菊與君别今聴𤣥蟬我獨迴五夜颼飀枕前覺一年顔狀鏡中來馬思邊草拳毛動鵰盼青雲倦眼開天地肅清堪四望為君扶病上髙臺痛快江亭晚望碧江凉冷雁來疎閒望江雲思有餘秋舘池亭荷葉歇野人籬落豆花初無愁自得僊翁術多病能忘太史書聞説故園香稻熟片㠶歸去就鱸魚三四明秀秋日小園錢惟演碧簟凉生白祫衣庾園秋晚得幽期千房嫩菊金螢亂百本衰荷鈿扇欹日薄蘚花沿素壁雨淫蛙鼓占清池翛然自合䝉莊趣誰識無心似摽枝崑體三四怪麗秋日湖西晚歸舟中書事林逋水㾗秋落蟹螯肥閒過黄公酒舍歸魚覺船行沈草㟁犬聞人語出柴扉蒼山半帶寒雲重丹葉疎分夕照微却憶青溪謝太傅當時未解惜蓑衣句句有滋味秋霽魏野草堂髙迥勝危樓時節殘陽向晚秋野色青黄禾半熟雲容黑白雨初收依依永巷聞邨笛隠隠長河認客舟正是詩家好風景懶隨前輩却悲愁三四極工而不覺五六無㾗迹秋日登樓客次懷張覃進士聞説飄零亦異鄉登樓吟望益悲凉當時欲别言難盡他日相逢語更長蟬噪水邨千萬樹雁過雲岫兩三行明朝䇿蹇還無定空凭危闌到夕陽三四能言人情秋日閒居楊朴忽聞髙柳噪新蟬厭暑情懷頓豁然庭檻夜凉風撼竹池塘香散水揺蓮鱸魚鱠憶奔江浦焦尾琴思換蜀絃莫遣金樽空對月滿斟髙唱混流年徳人之言字字出於天真故取之莫字當作戲今且從刋本乙已重九韓琦苦厭繁機少適懷欣逢重九啟賓罍招賢敢並翹材館樂事難追戲馬臺蘚布亂錢乗雨出雁排新陣拂雲來何時得遇樽前菊此日花隨月令開英宗治平二年乙巳忠獻公在相位飲客蘇老泉所和壯心還傍醉中來已見節序類中此亦當入節序而選詩巳定故附此公前後入相出藩元夕上已寒食中秋九日為詩至多言言有味菊花不應月令開於九日為宰相而有此詩亦自謙之辭也五六響亮三四亦典正九日水閣池館摧隳古榭荒比延嘉客會重陽雖慚老圃秋容淡且㸔黄花晚節香酒味已醇新過熟蟹黄先實不須霜年來飲興衰難强謾有髙吟力尚狂此神宗熙寧二年已酉公判相州時九日詩也黄花晚節句與老枝擎重雪詩並見强至所撰遺事書於續鑒實為天下名言至熙寧四年辛亥相州九日詩凡四首有句云坐上半非前嵗客杯中無改舊花香銅鉢一聲詩已就金鈴千朶菊争開凡三判相州九日詩亦不止此秋日與諸公馬頭山登髙歐陽修晴原霜後石榴紅佳節登臨興未窮日汎花光揺露際酒浮山色入樽中金壺恣灑毫端墨玉麈交揮席上風惟有淵明偏好飲籃輿落落一衰翁第一句詩家所未有歐陽公詩大率自然如此中秋口號秦觀雲山簷楯接低空公宴初開氣鬱葱照海旌幢秋色裏激天皷吹月明中香槽旋滴珠千顆歌扇驚圍玉一叢二十四橋人望處台星正在廣寒宫生日詩致語詩皆不可易為以其徇情應俗而多諛也所以予於生日詩皆不選少游作此詩是夜無月遂改尾句云自是我翁多盛徳却迴秋色作春隂或嘲謂晴雨翻覆手姑存此以備話柄三四亦響亮九月八日夜大風雨寄王定國長年身外事都捐節序驚心一慨然正是山川秋入夢可堪風雨夜連天桐梢摵摵增凄斷燈燼飛飛落小圓湔洗此情須痛飲明朝試訪酒中僊少游詩文自謂秤停輕重銖兩不差故其古詩多學三謝而流麗之中有澹泊律詩亦敲㸃勻靜無偏枯突兀生澁之態然以其善作詞也多有句近乎詞此詩下凄斷小圓字亦三謝餘味别有秋日絶句三首尾句云菰蒲深處疑無地忽有人家笑語聲風定小軒無落葉青蟲相對吐秋絲安得萬粧相向舞酒酣聊把作纒頭此謂虹霓皆極怪麗秋日客思陳與義南北東西俱我鄉聊從地主借繩牀諸公共得何侯力逺客新鈔陸氏方老去事多藜杖在夜來秋到葉聲長蓬萊可托無因至試覓人間千仞岡共得何侯力以指新進新鈔陸氏方以憐遷客漢何武唐陸贄傳可攷此詩家用事之妙五六尤佳次韻周教授秋懷一官不辦作生涯幾見秋風捲㟁沙宋玉有文悲落木陶潛無酒對黄花天機衮衮山新瘦人世悠悠日自斜誤矣載書三十乘東門何地不宜𤓰格髙次韻家叔衮衮諸公車馬塵先生孤唱發陽春黄花不負秋風意白髮空隨世事新閉户讀書真得計載肴從學豈無人只應又被支郎笑從者依然困在陳自是一種髙格英風秋雨初晴有感陸游炎曦赫赫尚餘威冷雨蕭蕭故解圍號野百蟲如自訴辭柯萬葉竟安歸芼羮菰菜珍無價上釣魴魚健欲飛散吏何功霑一飽髙眠仍聴搗秋衣三四哀感五六響邨居秋日桔橰引水遶荒畦病卧蝸廬不厭低小聚數家秋靄裏平坡千頃夕陽西亭臯草木猶葱蒨天上風雲已慘悽逋負如山炊米盡終年枉是把鋤犁三四自然秋晚書懷頹然兀兀復騰騰萬事惟除死未曾無奈喜歡閒弄水不勝頑健逺尋僧喚船野㟁横斜渡問路雲山曲折登却笑吾兒多事在夜分未滅讀書燈三四新詭舍北行飯書觸目落雁昏鴉集逺洲青林紅樹擁平疇意行舍北三义路閒㸔橋西一片秋少婦破烟撐去艇丫童横笛喚歸牛形容野景無餘思自怪癡頑不解愁如畫放翁萬詩秋日詩僅得此四首九日破曉攜兒姪上前山竚立佳甚韓琥懷玉鏡臺開逺晴靈溪葛水去無聲園荒不礙憑髙立徑側何須委曲行露氣已濃清可掬日華初出畫難成閒居九日依辰至舉俗胡為亦愛名五六極佳非閒中知味者不能道節序詩編次巳定故附此秋日類中風雨中誦潘邠老詩滿城風雨近重陽獨上呉山㸔大江老眼昏花忘逺近壯心軒豁任行藏從來野色供吟興是處秋光合斷腸今古騷人乃如許暮潮聲捲入蒼茫此詩悲壯激烈第一句用潘邠老句若第二句押不倒則餒矣此第二句雖是借韻軒豁痛快不可言喻三四非後生晚進胸次至第六句則入神矣至第八句則感極而無遺矣世稱韓澗泉名下無虚士乃慶元戊午詩也毅齋即事徐僑自吾齋外付諸兒除却詩書總不知苔色上侵閒坐處鳥聲來和獨吟時十分秋色重陽近一味新凉老者宜調得身心能自慊止吾所止復何疑毅齋徐公諱僑字崇文婺安人朱文公門人也端平侍從近世君子之無瑕者此詩中四句絶妙味其學力非小小詩家可及有徳者必有言也瀛奎律髓巻十二

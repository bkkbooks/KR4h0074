body:
  text: 瀛奎律髓巻三十六元方回編論詩類詩人世豈少哉而傳於世者常少由立志不髙也用心不苦也讀書不多也從師不真也喜為詩而終不傳其傳不傳蓋亦有幸不幸而其必傳者必出乎前所云之四事今取唐宋詩人所論著列於此與學者共之五言三首苦吟杜荀鶴世間何事好最好莫過詩一句我自得四方人已知生應無輟日死是不吟時始擬歸山去林泉道在茲喜陸少監入京姜特立昔人思老杜長恨不相隨還寄有劉白同吟惟陸皮物暌終必合句妙却難追試問長安陌何如㶚岸時范大參入覲頗愛鄙作以詩謝之問句石湖老如將日指標枯中說滋味髙處戒虚驕頗許唐音近寧論漢道遙正聲今在耳萬樂聽簫韶七言三首鄉有好事者出君謨行草八分書數幅中有梅聖俞詩一首因成拙句以識二美杜衍莆田筆健與文豪尤愛南山縣詠髙欲使英辭長潤石每逢佳句即揮毫清如韶濩諧音律逸似鸞皇振羽毛羲獻有靈應悵望當時不見此風騷太師相公篇章真草過人逺甚而特奬後進流於詠言輙依韻和梅堯臣杜詩嘗說少陵豪祖德兼誇翰墨髙蘇李為奴令侍席鍾王北面使持毫郊麟作瑞唯逢趾天馬能行不辨毛一誦東山零雨句無心更學楚離騷子美祖審言嘗自謂我詩可使蘇李為奴書可使鍾王北面送朝天集歸楊誠齋姜夔翰墨場中老斵輪縱横一筆掃千軍年年花月無閒日處處江山怕見君箭在的中非爾及風行水面偶成文先生只可三千首囘施江東日暮雲白石道人䕫字堯章饒州人千巖蕭公以其女妻之當時甚得詩名幾於亞蕭尤楊陸范者予嘗與南昌陳杰壽夫論詩閱其餘藳則大不然堯章自能按曲為詞甚佳詩不逮詞逺甚予選其詩亦此一首合予意容更詳之瀛奎律髓巻三十六

  - {type: page-break, offset: 0, content: '', id: KR4h0074_WYG_016-1a, image: WYG1366/WYG1366-0164a.png}
body:
  text: 瀛奎律髓巻十六元方回編節序類或問節序詩以冬至為首何也古厯法皆起於冬至有一陽之復然後有三陽之泰故以此為首邵康節詩云冬至子之半最佳而𤣥酒味方淡太音聲正希兩句一意故不取今此選專以論詩故詩非極工者不預焉五言五十四首冬至王安石都城開博路佳節一陽生喜見兒童色一作意歡傳市井聲幽閒亦聚集珍麗各攜擎却憶他年事關商閉不行李參政註博路未詳予謂常曰禁賭博惟節曰不禁耳幽閒聚集珍麗攜擎此等句細潤乃三謝手段半山多如此又至節五言詩佳者絶少七言則老杜數篇盡之矣和王子安至日陳師道晨起公私廹昏歸鳥雀催百年忙裏盡萬事醉間來竹雨深宜晚江梅半欲開風燈挑不焰寒火撥成灰三四妙本三詩今取一第一首云近節翻多事為家不亦難第二首云隂陽消長際老疾去留間皆好冬至後張耒水國過冬至風光春已生梅如相見喜雁有欲歸聲老去書全懶閒中酒愈傾窮通付吾道不復問君平張文潛詩予所師也楊誠齋謂肥仙詩自然不事雕鐫得之矣文潛兩謫黄州此殆黄州時詩三四絶佳大概文潛詩中四句多一串用景似此一聨景一聨情尤潔淨可觀周伯㢸定四實四虚前後虚實為法要之本亦無定法也辛酉冬至陸游今日日南至吾門方寂然家貧輕過節身老怯増年元註鄉俗謂喫盡至飯即添一嵗畢祭皆扶拜分盤獨早眠惟應探春夢已繞鏡湖邊放翁宣和乙巳生嘉泰元年辛酉年七十七矣三四平穏有味臘日晚步喜覺陽和近山園策杖行草應知地暖栁欲向人輕殘雪通春信鳴禽報曉晴田閭未成計搔首問春耕此題三首今選其一栁欲向人輕最佳句也殘雪通春信通字絶妙第一首警聨云愁思供多病風光欲近人亦佳臘日二首日暖山邨路人家送送迎婚姻須嵗暮酒醴幸年登簫鼔兒童集衣裳婦女矜敢辭雞黍費農事及春興擊柝山城閉疎燈夜店扄疾風鳴夜谷晴水動浮星霜翼歸何晚隣雞織未停短歌聊自放愁絶更誰聽此題六首今選其二衣裳婦女矜此一韻絶妙晴水動浮星此一句絶妙第二首一聨云雪意千山靜天形一雁高尤佳迎字許借韻也守嵗唐太宗暮景斜芳殿年華麗綺宫寒辭去冬雪暖帶入春風階馥舒梅素盤花巻燭紅共歡新故嵗迎送一宵中唐太宗才高此詩尾句有把握起句有兩字為眼殊不茍也又太原守嵗一聨尤佳送寒餘雪盡迎嵗早梅新文集四十巻今亡初學記中得此杜位宅守嵗杜甫守嵗阿戎家椒盤已頌花盍簪喧櫪馬列炬散林鴉四十明朝過飛騰暮景斜誰能更拘束爛醉是生涯阿戎當作阿咸葢杜位者少陵之姪也以四十字對飛騰字謂四與十對飛與騰對詩家通例也唐子西詩四十緇成素清明緑勝紅祖此除夜宿石頭驛戴叔倫旅館誰相問寒燈獨可親一年將盡夜萬里未歸人寥落悲前事支離笑此身愁顔與衰鬢明日又逢春此詩全不説景意足辭潔除夕唐庚患難思年改龍鍾惜嵗徂闗河先壠逺天地小臣孤吾道憑温酒詩情付擁爐南荒足妖怪此日謾桃符唐庚字子西眉山人年十七見知東坡為張天覺丞相牽連謫居恵州此詩三四似老杜故取之然子西詩大率精緻除夜陳師道七十已強半所餘能幾何懸知暮景促更覺後生多遁世名為累留年睡作魔西歸端著便老子不婆娑前四句即四十明朝過飛騰暮景斜之意樂天亦云行年三十九嵗暮日斜時前輩競辰如此晚輩可不勉哉留年睡作魔絶佳謂不寐以守嵗而不耐困也除夜對酒贈少章嵗晚身何托燈前客未空半生憂患裏一夢有無中髪短愁催白顔衰酒借紅我歌君起舞潦倒畧相同五六一聨當時盛稱其工見漁隠叢話除夜陳與義疇昔追歡事如今病不能等閒生白髪耐久是青燈海内春還滿江南硯不氷題詩餞殘嵗鐘鼓報晨興海内春還滿此一句壯甚嵗除即事趙庚連夜縫紉辦今朝杵臼頻買花簪穉女送米贈窮隣宦薄惟名在年華與鬢新桃符詩句好恐動往來人趙庚字仲白寓居興化軍趙紫芝為晚唐詩名冠四靈而仲白亞紫芝劉後村誌墓趙南塘為序詩集謂古詩出情性後世挾才格此乃唐體選之尤者亦當不以才格論與尾句太自矜新年作宋之問鄉心新嵗切天畔獨澘然老至居人下春歸在客先嶺猿同旦暮江栁共風煙已似長沙傅從今又幾年三四費無限思索乃得之否則有感而自得次韻仲卿除日立春王安石猶殘一日臘併見兩年春物以終為始人從故得新迎陽朝剪綵守嵗夜傾銀恩賜隨嘉節無功只自塵五六切題元日陳師道老境難為節寒梢未得春一官兼利害百慮孰疎親積雪無歸路扶行有醉人望鄉仍受嵗回首向松筠讀后山詩若以色見以聲音求是行邪道不見如來全是骨全是味不可與拈花簇葉者相較量也嘉祐己亥嵗旦呈永叔内翰梅堯臣堦前去年雪鏡裏舊時人不覺應銷盡相看只似新屠酥先尚幼綵勝又宜春獨愛開封尹鍾陵請去頻聖俞嘉祐五年庚子四月卒年五十九此年五十八也葢老筆宜章元日吕本中東風初解凍桃李已經春避地逢雞日傷時感雁臣湖南馳賊騎江外踐邊塵憔悴成無用虚煩淚濕巾雞日雁臣之句甚工北夷酋長遣子入侍者常秋來春去避中國之熱號曰雁臣己酉元日元註以諒隂免賀禮陸游夜雨解殘雪朝陽開積隂桃符呵筆寫椒酒過花斟巷栁揺風早街泥濺馬深行宫放朝賀共識慕堯心放翁解嚴州後歸鏡湖尋入為禮部郎淳熙十五年戊申明年己酉元日以思陵服中免賀放翁年六十五矣桃符椒酒此聨後又嘗用之是冬翁竟去國晚節乃為韓平原一出甲子元日題中元有嵗字今刪之元注開嵗微隂不雨法當有年飲罷屠酥酒真為八十翁本憂縁直死却喜坐詩窮米賤知無盜雲􅙨又主豐一簞那復慮嬉笑伴兒童嘉泰四年甲子寧廟在位十一年放翁年八十屢見米賤年豐真福人也第五句最好元日立春元日兼春日霜寒又雪寒併煩傳菜手同捧頌椒盤疊膝稀穿履扶頭懶正冠五年如此度寧得諱衰殘淳熙十五年戊申元日立春選亦所以記時也石湖二詩一云元日兼春日閒身是老身人日杜甫元日至人日未有不隂時氷雪鶯難至春寒花較遲雲隨白水落風振紫山悲蓬鬢稀疎久無勞比素絲東方朔占書一日為雞二日為狗三日豕四日羊五日牛六日馬七日人八日穀其日晴主所生之物盛隂則災人日唐庚人日傷心極天時觸目新殘梅詩興晚細草夢魂春挑菜年年俗飛蓬處處身蟇頤頻語及髣髴見東津以人日對天時雖近在目前子細看甚工東坡以人日對鬼門亦佳見此巻後正月十五日蘇味道火樹銀花合星橋鐵鎻開暗塵隨馬去明月逐人來遊妓皆穠李行歌盡落梅金吾不禁夜玉漏莫相催味道武后時人詩律己如此健快古今元宵詩少五言好者殆無出此篇矣夜遊今夕重門啟遊春得夜芳月華連晝色燈影雜星光南陌青絲騎東隣紅粉粧管絃遥辨曲羅綺暗聞香人擁行歌路車攢鬭舞塲經過猶未已鐘鼔出長楊元夕者太平之所宜有而離亂多富貴之所宜有而寂寞多讀此詩欲逢此辰不可得也味道前一詩見初學記此一詩見搜玉小集觀燈王諲暫得金吾夜通看火樹春停車傍明月走馬入紅塵妓雜歌偏勝塲移舞更新應須盡記取説向不來人此詩但尾句十字佳凡觀元宵之人必多村翁癡子欲盡記所見以誇與不能同來者此意得之正月十五夜月白居易嵗熟人心樂朝遊復夜遊春風來海上明月在江頭燈火家家市笙歌處處樓無妨思帝里不合厭杭州樂天以長慶二年冬十月杭州到任長慶四年元宵詩也杭自唐固已盛矣然終未若京都長安之盛三四佳句也如李易安月上栁梢頭則詞意邪僻矣和元夜陳師道笳鼔喧燈市車輿避火城彭黄爭地勝汴泗廹人清梅栁春猶淺闗山月自明賦詩隨落筆端復可憐生景聨極佳后山家徐州彭黄謂彭門黄樓也汴水泗水交流城角故云擇之誦所賦擬進吕子晉元宵詩因用元韻二首朱熹何處元宵好山房入定僧往來衣上月明暗佛前燈實際徒勞説空華詎可憑還教知此意妙用一時興何處元宵好寒龕獨寐人月窗同皎皎燈鏡自塵塵靜鑒通天地潛思妙鬼神却憐迷路子狂走鬧城闉今按胡文定公安國宣和七年乙已賦元夕詩一聨云詞臣侍宴詩能好潁客披圖事莫傅文定元註云舍人吕子晉賦元夕十詩首篇云何處元宵好迎鑾册府西鞘聲雲外起扇影日邊低秘禁威容肅名流步武齊舜瞳回左顧真欲過金閨末篇云何處元宵好雙林宴坐僧戒圎三五夜心耀百千燈茅舍門常掩繩牀几謾憑世間娱樂事一念不曾興時皆諷誦之又註慶厯中潁昌一童子有道之士嘗至花月着道士服擕酒果飲野外隨意所適至元夜則閉門不出有詩云閉門獨看華山圖後不知所往有人飲京師市樓見過樓下急往追之不及吕原明有詩紀其事胡文定公賦此詩而明年汴京亂矣文公所和林擇之前首即吕子晉第十首韻也元宵之樂太平之世富貴之人自不可無學道君子尚不肯輕費時光從事於不切之務况區區此等癡騃迷狂之所為乎謹取文公此二詩於元宵之後山谷詩曰讀易一篇如酒醒亦此意也月晦唐太宗晦魄移中律凝暄起麗城罩雲朝葢上穿露曉珠呈笑樹花分色啼枝鳥合聲披襟歡眺望極目暢春晴唐太宗三代而下英主也武定禍亂文致太平餘事猶能作詩雖未脱徐庾陳隋之氣句句説景末乃歸之於情然此詩亦佳五六巧奉和晦日幸昆明池應制宋之問春豫臨池近蒼波帳殿開舟凌石鯨渡槎拂斗牛回節晦蓂全落春遲栁暗催象溟看浴景燒刼辨沉灰鎬飲周文樂汾歌漢武才不愁明月盡自有夜珠來首句臨池近一作靈池㑹用春字豫字便好節晦蓂全落見得是正月三十日急着春遲栁暗催一句足其意池象溟海而觀浴日既已壯麗又引胡僧刼灰事為偶則尤精切可謂極天下之工矣鎬飲汾歌一聨王禹玉襲為上元應制詩殊不知之問已先用矣尾句尤佳不愁明月盡謂晦日則無月也池中自有大蚌明月之珠如近世甓社湖珠現是也妙甚春社梅堯臣年年迎社雨淡淡洗林花樹下賽田鼓壇邊伺肉鴉春醪朝共飲野老暮相誇燕子何時至長臯㸃翅斜春社詩苦無五言律此篇獨佳淡泊中有醲醇味社日謝逸雨栁垂垂葉風溪細細紋清歡惟煮茗美味只羮芹飲不遭田父歸無遺細君東臯農事作舉趾待耘耕春社五言律前後甚少老杜九農百祀之作乃秋社詩謝無逸此篇飲不遭田父葢用老杜成都父老説尹事古詩也歸無遺細君本東方朔伏日事老杜用詼諧割肉之説豈古人社日伏日皆有所分之肉歸遺細君故一例用之耶徐師川亦有社日詩乃云哀公問松柏田父祭春秋殊為麄率學晚唐人厭江西詩如師川詩不律不精可厭也至如無逸幼槃兄弟詩自佳但恐此一社日可謂貧甚無酒無肉只有芹茗而已寒食杜甫寒食江村路風花高下飛汀煙輕冉冉竹日淨暉暉田父要皆去隣家問不違地偏相識盡雞犬亦㤀歸起句十字寒食清明天氣所必然也後四句可見老杜為人樂易乃成都草堂詩壬辰寒食王安石客思似楊栁春風千萬條更傾寒食淚欲漲冶城潮巾髮雪爭出鏡顔朱早彫未知軒冕樂但欲老漁樵半山詩步驟老杜有工緻而無悲壯讀之久則令人筆拘而格退丙寅舟次宋城作賀鑄水館四邊邨登臨奈斷魂黄花開小徑紅粉哭高原舟檝逢新火松楸老故園斜陽一千里依約是蘇門此廼元祐元年丙寅宋城寒食詩紅粉哭高原自來無人曾道廼寒食近城處所必有也黄花定是菜花耳道巾寒食二首陳與義飛絮春猶冷離家食更寒能供幾嵗月不辨了悲歡刺史蒲萄酒先生苜蓿盤一官違壯節百慮集征鞍斗粟淹吾駕浮雲笑此生有詩酬嵗月無夢到功名客裏逢歸雁愁邊有亂鶯楊花不解事更作倚風輕簡齋詩即老杜詩也予平生持所見以老杜為祖老杜同時諸人皆可伯仲宋以後山谷一也后山二也簡齋為三吕居仁為四曾茶山為五其他與茶山伯仲亦有之此詩之正𣲖也餘皆傍支别流得斯文之一體者也孫真人千金方三十六巻每一巻藏一仙方予所選唐宋詩節序五言律凡五十首藏仙方于其中不知幾也巻巻有之在人自求清明陸游氣候三一作江吴異清明乃爾寒老僧邱墓感貧苦道途難燕子家家入梨花樹樹殘一春回首盡懷抱若為寛三四悽愴第七句最好景聨亦平熟三月三日梨園亭侍宴沈佺期九門馳道出三已禊堂開畫鷁中川動青龍上苑來野花飄御座河栁拂天杯日晚迎祥處笙鏞下帝臺司馬彪續漢書禮儀志曰三月上已宫人並禊飲於東流水上沈約宋書曰魏以後但用三日不復用已也沈佺期宋之問唐律詩之祖此詩雖無絶高處平正整妥上已日洛中寄王山人逈孟浩然卜洛成周地浮杯上已筵鬬雞寒食後走馬射堂前垂栁金隄合平沙翠幙連不知王逸少何處㑹羣賢浩然作此詩時其體未甚刻畫但細看亦自用工第二句下浮杯字便着題平沙翠幙連一句初看似未見工久之乃見祓禊而游者甚盛也尾句用逸少事所寄之人適又姓王切矣上已陸游殘年登八十佳日遇重三簾幙低垂燕房櫳起晚蠶名花紅滿舫美醖緑盈甔春事還如昨衰懷自不堪歴選上已五言律無佳者唐百家詩選荆公所取上已清明詩亦不甚妙惟孟浩然一首尾句可喜此放翁八十嵗時詩亦豐碩端午日賜衣杜甫宫衣亦有名端午被恩榮細葛含風軟香羅叠雪輕自天題處濕當暑著來清意内稱長短終身荷聖情第七句王洙註一云恰稱身長短又註情一作明自天當暑四字出論語前輩亦以為詩家用古語之法黄鶴註謂乾元元年戊戌在諫省六月出為華州司功是年四十七嵗是後不復至長安矣端午五七言律詩遍閲唐宋集無佳者小邢五言云佩符從楚俗角黍薦湘纍尾句乃云異鄉逢此日寥落不勝悲無足取高子勉和王子予五日雨詩亦牽強他如翰苑端帖絶句詩不勝其多用鑄鏡佩符亊佳者自可攷也七夕杜審言白露含明月青霞斷絳河天街七襄轉閣一作闗道二神過袨服鏘環佩香筵拂綺羅年年今夜盡機杼別情多審言又有七夕侍宴應制詩有云天逈兎欲落河曠雀停飛那堪盡此夜復往弄殘機七夕梅堯臣古來傳織女七夕渡明河巧意世爭乞神光誰見過隔年期已拙舊俗驗方訛五色金盤果蜘蛛浪作窠謂牛女一年而一㑹已且自拙何能以巧應人之乞哉雖戲言而有味神光誰見過亦佳織女之渡誰實嘗見之耶九日登梓州城杜甫伊昔黄花酒如今白髪翁追歡筋力異望逺嵗時同弟妹悲歌裏朝廷醉眼中兵戈與闗塞此日意無窮老杜此詩悲不可言唐人無能及之者岑參四句云強欲登高去無人送酒來遥憐故園菊應傍戰塲開有老杜之風雲安九日鄭十八擕酒陪諸公宴寒花開已盡菊蕊獨盈枝舊摘人頻異清香酒暫隨地偏初衣裌山擁更登危萬國皆戎馬酣歌淚欲垂九日三首取二舊日重陽日傳杯不放杯即今蓬鬢改但愧菊花開北闕心長戀西江首獨回茱萸賜朝士難得一枝來舊與蘇司業兼隨鄭廣文采花香泛泛坐客醉紛紛野樹歌還倚秋砧醒却聞歡娱兩㝠漠西北有孤雲老杜九日五言律凡九首今取其四如綴席茱萸好浮舟菡萏衰季秋時欲半九日意兼悲如坐開桑落酒來把菊花枝如舊采黄花賸新梳白髪微皆佳句九日捨萸菊不用則何以成詩容齋隨筆言之詳矣予謂老杜九日三用茱萸明年此㑹知誰健醉把茱萸子細看此為第一茱萸賜朝士難得一枝來此為第二綴席茱萸好此為第三王維有云遥知兄弟登高處遍揷茱萸少一人亦佳用事同而用意異也奉和聖製重陽節上壽應制王維四海方無事三秋大有年百生逢此日萬壽願齊天芍藥和金鼎茱萸揷玳筵玉堂開右个天樂動宫懸御栁疎秋景城鴉拂曙煙無窮菊花節長奉柏梁篇此生已覺都無事今嵗仍逢大有年東坡之句乃出於此芍藥對茱萸亦猶櫻桃對枤杜也唐宋詩人經了幾畨重九好重九王右丞諸人占了惡重九却分付與老杜可歎也應制詩本不甚選取此以發一嘅云九日懷舍弟唐庚重陽陶令節單閼賈生年秋色蒼梧外衰顔紫菊前登高知地盡引滿覺天旋去嵗京城雨茱萸對恵連唐子西詩無往不工此政和辛卯年謫居恵州時用單閼賈生對重陽陶令工矣蒼梧紫菊又工登高引滿地盡天旋之聨又愈工末句用茱萸事思弟尤工也七言六十九首小至杜甫天時人事日相催冬至陽生春又來刺繡五紋添弱線吹葭六琯動飛灰岸容待臘將舒栁山意衝寒欲放梅雲物不殊鄉國異教兒且覆掌中杯冬至年年至日長為客忽忽窮愁泥殺人江上形容吾獨老天涯風俗自相親杖藜雪後臨丹壑鳴玉朝來散紫宸心折此時無一寸路迷何處見三秦至日遣興奉寄北省舊閣老兩院故人二首去嵗兹辰捧御床五更三㸃入鵷行欲知趨走傷心地正想氤氲滿眼香無路從容陪笑語有時顛倒著衣裳何人錯憶窮愁日愁日一作日日愁隨一線長憶昔逍遥供奉班去年今日侍龍顔麒麟不動爐烟上孔雀徐開扇影還玉几由來天北極朱衣只在殿中間孤城此日堪膓斷愁對寒雲雪滿山此二詩乾元元年戊戌作於華州為司功時去嵗即至徳二年丁酉為左拾遺時也五更三㸃入鵷行此句四六家用之不啻千百人矣前二詩乃䕫州詩在大厯元二年間此固未論凡老杜七言律詩無有能及之者而冬至四詩檢唐宋他集殆遍亦無復有加于此矣餘一篇見後近吴體註家謂廣徳二年至後冬至至後日初長逺在劍南思洛陽青袍白馬有何意金谷銅駝非故鄉梅花欲開不自覺棣蕚一别永相望愁極本憑詩遣興詩成吟詠轉凄凉金谷者石崇之所遊銅駝者索靖之所哭皆在洛陽故第二句云逺在劍南思洛陽王洙巨源號博洽妄註云皆蜀中故事非也青袍公嘗有矣此云青袍白馬有何意亦歎夫身老不遇為嚴武幕府也是年老杜五十二後乃服緋則又有句云扶病垂朱紱冬至夜白居易老去襟懷常濩落病來鬚鬢轉蒼浪心灰不及爐中炭鬢雪多於砌下霜三峽南賔身最逺一年冬至夜偏長今宵始覺房櫳冷坐索寒衣泥孟光心灰鬢霜引喻亦佳一年冬至夜偏長前未有人道也冬至夜作天復二年隨駕鳳翔韓偓中宵忽見動葭灰料得南枝有早梅四野便應枯草緑九重先覺凍雲開隂氷莫向河源塞陽氣今從地底回不道慘舒無定分却憂蚊響又成雷是時朱全忠圍岐甚急李茂貞有連和之意偓之孤忠處此殆知其必一反一覆終無定在歟此闗時事不但詠至節也長至日述懷兼寄十七兄曾幾老來愈覺白駒忙眼見重陽又一陽心佀死灰飛不起技如寒日短中長厭看賔客空投謁強對妻孥略舉觴回首山隂酬勸地應憐鴻雁不成行元註辛未年長至日在紹興府侍兄宴㑹予按紹興元年辛亥十一年辛酉二十一年辛未此又在其後未知何年重陽又一陽已新異矣用死灰長日事穿入自家身上事來尤為新也厭字空字強字略字皆詩眼讀茶山詩如冠冕佩玉有司馬立朝之意用江西格參老杜法而未嘗麄做大賣陸放翁出其門而其詩自在中唐晚唐之間不主江西間或用一二格富也豪也對偶也哀感也皆茶山之所無而茶山要為獨高未可及也臘日杜甫臘日常年暖尚遥今年臘日凍全消侵凌雪色還萱草漏泄春光有桞條縱酒欲謀良夜醉還家初散紫宸朝口脂面藥隨恩澤翠管銀罌下九霄漏泄春光一句極工唐朝皆有臘日宣賜宋無之惟閫帥戎司在外者有夏藥臘藥以詔書賜之此至徳二年丁酉為左拾遺時詩年四十六和臘前梅堯臣漢家戍日看看近雲景蒼茫已嵗昏欲驗方書治百藥預調飛走獵平原土人熏肉經春美宮女藏鈎舊戲存獨把凍醪驚節物草芽微動見庭萱臘日詩無可選者除老杜詩外僅得此治藥調獵熏肉藏鈎能述臘中諸事亦可觀也當是和晏元獻公韻下有呈晏元獻臘藥臘酒臘脯臘笋詩云臘日二首張耒臘日開門雪滿山愁隂短景嵗時闌江梅飄落香元在汀雁飛鳴意已還佳節再逢身且健一樽相屬鬢生斑明光起草真榮事寂寂衡門我且閑異鄉懷舊人千里勝日難忘酒一杯不恨北風催短景最憐殘雪冷疎梅江邊寒色雁催盡天上春光斗挹回獨我呼兒賸丸藥微功聊取助衰骸臘日難得好詩此二首儘佳除夜寄微之白居易鬢毛不覺白毿毿一事無成百不堪共惜盛時辭闕下同嗟除夜在江南家山泉石尋常憶世路風波子細看老校於君合先退明年半百又加三此長慶三年癸卯嵗除也明年半百又加三樂天五十三嵗係長慶四年甲辰正在杭州葢樂天生於壬子實代宗大厯六年也長栁子厚一嵗除夜陳與義城中爆竹已殘更朔吹翻江意未平多事鬢毛隨節換盡情燈火向人明比量舊嵗聊堪喜流轉殊方又可驚明日岳陽樓上去島煙湖霧看春生壬戌嵗除作明朝六十嵗矣曾幾禪榻蕭然丈室空薫銷火冷閉門中光隂大似燭見䟦問學只如船逆風一嵗臨分驚老大五更相守笑兒童休言四十明朝過看取霜髯六十翁以詩推之知曾文清公元豐七年甲子生此乃紹興十二年壬戌也公年八十二當是乾道元年乙酉卒茶山清名滿世年且六十猶曰問學只如船逆風後生可不勉諸嵗盡漏箭更籌日夜催萬牛不挽白駒回梅花雪片嵗除盡萱草栁芽春鼎來病裏詩書元不讀貧中樽爼未嘗開年光似此真虚擲請以丹心學死灰茶山詩學山谷往往逼真此又在壬戌後數十年元日過丹陽明日立春寄曾元翰一作魯之翰蘇軾堆盤紅縷細茵陳巧與椒花兩鬬新竹馬異時寧信老土牛明日莫辭春西湖弄水猶應早北寺觀燈欲及辰白髮蒼顔誰肯記曉來頻嚏為何人西湖北寺皆指杭州事元翰在杭故于元日作此詩寄之也元日五年元日只流離楚俗今年事事非後飲屠蘇驚已老長乘舴艋竟安歸擕家作客真無策學道刳心却自違汀草㟁花知節序一身千恨獨霑衣此紹興元年辛亥元日也乙未元日范成大浮生四十九俱非樓上行藏與願違縱有百年今過半别無三䇿但當歸定中久已安心竟飽外何須食肉飛若使一丘併一壑還鄉曲調儘依稀石湖靖康丙午生乾道己丑年四十四充泛使入燕淳熙甲午乙未帥桂林時被命帥蜀年五十丙午新正書懷十首選五瘦骨難勝遇節衣日高催起趂晨炊病憐榔栗隨身慣老覺屠蘇到手遲一飽但蘄庚癸諾百年甘守甲辰雌莫言此外都無事桞眼梅梢正索詩石湖靖康元年丙午生是年淳熙十三年丙午年六十一其為叅政也在淳熙五年戊戌四月入六月罷僅兩月耳是年正月王淮為左丞相周必大為樞密使而前叅政錢良臣皆丙午生故石湖有甲辰雌之句豈亦不能忘情乎煮茗燒香了嵗時靜中光景笑中嬉身閑一日似兩日春淺南枝如北枝朝鏡畧無功業到午窗惟有睡魔知年來併束牀頭易一任平章濟叔癡窮巷閒門本閴然強將爆竹聒階前人情舊雨非今雨老境増年是減年口不兩匙休足穀生能幾屐莫言錢掃除一室空諸有龎老家人總解禪石湖叅大政嘗帥蜀後又帥四明金陵乃云窮巷閑門嘗質金帶於人詩云不是典來償酒債亦非將去換簑衣乾淳間無貪士大夫也元註吳諺云一口不能揷兩匙俗情如絮已泥沾因病偷閒意属厭鵬鷃相安無可笑熊魚自古不容兼灰藏榾柮多時暖雪壓蔓菁滿意甜温飽閉門吾事辦異時書判指如籖窗明窗暗篆煙馡珍重晨光與夕暉東院齋鐘披被坐南城嚴鼔㟁巾歸幾人霜滑騎朝馬何處燈殘織曉機懶裏若承三昧力始知忙裏事俱非元註此篇叙早眠晏起之事此詩十首陸放翁皆次韻然不在丙午年在淳熙己酉禮部去國之後亦不言新正意度是追和有云此身顛仆應無日諸老彫零不計年又云百年過隙古所歎衆口鑠金胡不歸放翁宣和乙已生長石湖一嵗佳句尤多己亥元日尤袤玉厯均調嵗啓端東風又逐斗杓還蕭條門巷經過少老病腰支拜起難白髪但能欺稿項青春不解駐朱顔餘齡有幾仍多幸占得山林一味閒幽棲地僻經過少老病人扶再拜難少陵詩也尤延之小改用作元日詩却似稍切新年書感陸游早嵗西游賦子虚暮年負耒返鄉閭殘軀未死敢忘國病眼欲盲猶愛書朋舊何勞記車笠子孫幸不廢菑畬新年冷落如常日白髪蕭蕭悶自梳嘉定二年己巳放翁年八十六此詩全未覺老耄數日前自註謂大兒新年六十二仲子六十季子亦近六十亦可謂稀有矣是年放翁卒丙辰元日劉克莊免騎朝馬趂南衙五見空村換嵗華旋遣廚人挑薺菜虚勞坐客頌椒花不施鬱壘鈞編户雖飲屠蘇殿一家二十宦遊今七十於身何損復何加寳祐四年丙辰後村年七十淳祐十一年辛亥冬鄭清之卒於相位以大蓬直院去國今五年戊午元日二首取一過去光隂箭離弦河清易俟鬢難𤣥再加孔子從心嵗三倍周郎破賊年元註赤壁之㨗瑜二十四嵗耄齒阻陪鳩杖列瞽言曾獻獸樽前磻溪淇澳吾安敢且學香山也自賢寳祐六年戊午後村年七十二第二首末句好卧聞兒女誇翁健詩句年光一様新是年四月程訥齋罷相丁大全繼之危亂始此自鄭清之歿吳潛謝方叔董槐併為五相並不能用後村賈似道入乃招致之為尚書端明而歸景定四年癸亥正旦予寓行在所聞劉朔齋與後村在朝論詩後村年已七十七矣今忽復二十年庚辰嵗人日作元註云時聞黄河已復北流老臣舊數論此今斯言乃驗蘇軾老去仍栖隔海邨夢中時見作詩孫天涯已慣經人日歸路猶欣過鬼門三策已應思賈讓孤忠終未赦虞翻典衣剩買河源米屈指新篘作上元不用長愁掛月邨㯽榔生子竹生孫新巢語燕還窺硯舊雨來人不到門春水蘆根看鶴立夕陽楓葉見鴉翻此生念念隨泡影莫認家山作本元前輩論詩文謂子美䕫州後詩東坡嶺外文老筆愈勝少作而中年亦未若晚年也此詩元符三年東坡年六十五謫居儋耳所作人日鬼門之對固工兩篇首尾雄渾不敢刪落存此則知選詩之意不拘節序也明年建中靖國元年辛巳七月東坡北還卒于常州云海南人日燕已來巢亦異事人日雪元註己巳元旦至人日雨雪間作陸游病卧江村不厭深貂裘無奈曉寒侵非賢那畏蛇年至多難却愁人日隂嫋嫋孤雲生翠壁霏霏急雪灑青林一盂飯罷無餘事坐看生臺下凍禽放翁卒于是年之冬年八十六嘉定二年也蛇年人日亦亞于東坡之鬼門人日與唐子西之天時人日三聨皆佳子西有詩云非賢幸脱龍蛇嵗上聖猶憐蟣虱臣放翁亦暗合奉和御製上元觀燈夏竦魚龍曼衍六街呈金鎻通宵啓玉京冉冉游塵生輦道遲遲春箭入歌聲寳坊月皦龍燈淡紫館風微鶴燄平宴罷南端天欲曉迴瞻河漢尚盈盈此夏英公竦詩形整而味淡存之以見承平之盛以端門為南端亦新韻語陽秋以為典麗富艷則可矣依韻恭和聖製上元觀燈王珪雪消華月滿仙臺萬燭當樓寳扇開雙鳯雲中扶輦下六鼇海上駕峰來鎬宫春酒霑周宴汾水秋風陋漢材一曲昇平人盡樂君王又進紫霞杯元註唐有聖代昇平樂曲韻語陽秋元豐中王禹玉蔡持正為左右相持正叩禹玉上元應制用事禹玉曰鼇山鳳輦外不可使章子厚為門侍笑曰此誰不知後禹玉詩出乃如此駕峰一作駕山鎬宫一作鎬京今從岐公華陽集乃壓巻第三詩也此但為善用事亦詩法當爾宋之問晦日應制有云鎬飲周文樂汾歌漢武材五六全用之又添出秋風二字似不甚佳陋字亦不甚好未幾神宗宴駕禹玉殂持正謫矣讀英公岐公二詩曽不如梅聖俞三詩有味也上元從主人登尚書省東樓梅堯臣閶闔前臨萬嵗山燭龍銜火夜珠還高樓逈出星辰裏曲葢遥瞻紫翠間轣轆車聲碾明月參差蓮焰競紅顔誰教言語如鸚鵡便着金籠宻鎻闗自和沉水香焚金博山杜陵誰復與車還馬尋綺陌知何處人在珠簾第幾間法部樂聲長滿耳上樽醇味易酡顔更貧更賤皆能樂十二重門不上闗又和康莊咫尺有千山欲問紫姑應已還人似嫦娥來陌上燈如明月在人間車頭小女雙垂髻簾裏新粧一破顔却下玉梯雞已唱謾言齊客解偷闗此為省試考官鏁院而作想見嘉祐中太平之極令人每遇佳句為擊節也三詩六聨俱好錢塘上元夜祥符寺陪咨臣郎中丈燕席曾鞏月明如晝露華濃錦帳名郎笑語同金地夜寒消美酒玉人春困倚東風紅雲燈火浮蒼海碧水樓臺浸逺空白髪蹉跎歡意少強顔猶入少年叢上元金鞍馳騁属兒曹夜半喧闐意氣豪明月滿街流水逺華燈入望衆星高風吹玉漏穿花急人倚朱欄送目勞自笑低心逐年少祇尋前事撚霜毛洪覺範妄誕著其兄彭淵才之説以為曽子固不能詩學者不察隨聲附和今淵才之詩無傳而子固詩與文終不朽兩上元詩止是一意金地夜寒消美酒玉人春困倚東風豈不能詩者乎非精於詩者不到此也人倚朱欄送目勞併上句看乃見其妙謂遊冶属意者不勝其注想而恨夫夜之短也大抵文名重足以壓詩名猶張子野賀方回以長短句尤有聲故世人或不知其詩然二人詩極天下之工也子固詩一掃崑體所謂鬬飣刻畫咸無之平實清健自為一家后山未見山谷時不惟文學南豐詩亦學南豐既見山谷然後詩變而文不變耳上元夜過赴儋守召獨坐有感蘇軾使君置酒莫相違守舍何妨獨掩扉靜看月窗盤蜥蜴卧聞風幔落蛜蝛燈花結盡吾猶夢香篆消時汝欲歸搔首凄凉十年事傳柑歸遺滿朝衣此詩元符元年戊寅作坡年六十三矣在儋州亦半年餘以去年紹聖丁丑六月渡海也十年前事當是元祐二年丁卯以翰林學士侍宴端門戊辰知貢舉皆在朝至五十九嵗時紹聖元年甲戌自中山謫恵州乙亥年賦上元古詩有云前年侍玉輦端門萬枝燈即元祐八年癸酉正月也去年中山府老病亦宵興即甲戌正月也今年江海上雲房寄山僧即乙亥正月也人生能幾何年如上元一節物耳出處去來嵗嵗不同當是時又焉知渡海而逢上元耶坡甲戌之貶至元符三年庚辰徽廟立乃得北歸建中靖國元年辛巳卒于常州學者覩此則知身如浮雲外物如雌風如雄風皆不足計較也上元思京輦舊游三首張耒萬雉春城逼絳霄上元雕輦盛遊遨遲遲瑞月低黄傘焯焯榮光上赭袍雲巻珠簾開綵雉山盤玉闕枕仙鰲長安一别將華髮溪竹山城夜寂寥九門燈火夜交光羅綺風來撲面香信馬恣穿深巷栁隨人偷看隔簾粧身拘舊宦安知樂心逐流年暗減狂留滯山城莫嗟歎貂蟬從古属金張隨計當年寄玉京一時交結盡豪英倒觥凌亂迷籌飲醉㡌欹斜並轡行仕路飛騰輸俊㨗山城憔悴感功名佳晨強酌清樽酒寒竹蕭蕭月正明此謫居黄州思京師上元第二首三四尤佳京師上元二首取洪覺範及時膏雨已闌珊黄道春泥曉未乾白面郎敲金鐙過紅粧人揭綉簾看管絃沸月喧和氣燈火燒空奪夜寒咫尺鳳樓開雉扇玉皇僊仗紫雲端覺範江西筠州人姓彭兩坐罪還俗一為張天覺丞相黥海外有甘露滅詩集此詩三四俗人盛傳道之僧徒為此語無耻之流也取之以博粲耳上元宿嶽麓寺上元獨宿寒嵒寺卧看篝燈映絳紗夜久雪猿啼嶽頂夢回明月上梅花十分春瘦縁何事一掬鄉心未到家却憶少年閒樂處軟紅香霧噴京華考韓子蒼覺範墓誌熙寧四年辛亥生崇寧三年甲申山谷謫宜州過長沙覺範在湖西作此詩時年三十四前京師上元詩年二十餘耳又嘗偽作山谷贈已其實非山谷詩也一掬鄉心胡元任詩話大譏之然詩未嘗不佳故取之政和元年辛卯得罪配朱崕年四十一五年乙未還年四十五建炎二年戊申卒年五十八春社禮成借用寺簿釋奠詩韻羅願素餐深覺愧漣漪后稷勾龍實吏師平土至今猶有賴配天自昔葢多儀操豚底用勤巫祝餉黍行看媚婦兒海内和平頌聲作登歌還有載芟詩此羅鄂州在郡時祀社用通判劉寺簿子澄韻賦此子澄者劉清之也鄂州名願字端良號存齋弟郢州名頌字端彦號狷菴皆博學工文而端良文尤高古上逼史漢朱文公周益公皆敬畏之所著新安志爾雅翼行於世小集者即子澄所刋社日詩唐宋鮮有可選惟此篇韻險而理列狷菴詩棗本所傳多於存齋予於兵革後為人掠去云小寒食舟中作杜甫佳辰強飲食猶寒隠几蕭條戴鶡冠春水船如天上坐老年花似霧中看娟娟戲蝶過閒幔片片輕鷗下急湍雲白山青萬餘里愁看直北是長安強飲一本作強起愁看一本作看雲是長安一本作至長安沈佺期釣竿篇云人如天上坐魚似鏡中懸公加以斤斧一變而妙矣小寒食前一日也黄本註謂大厯五年潭州作是年庚戌公年五十有九矣是夏卒于衡之耒陽吕汲公謂卒于岳陽未知孰是此子美老筆也又有清明二長句云大厯四年作恐即是此詩之後二日前云繡羽衝花他自得紅顔騎竹我無縁後云春城樓閣煙花裏漢主山河錦繡中皆壯麗悲慨詩至老杜萬古之凖則哉寒食成判官垂訪徐鉉常年寒食在京華今嵗清明在海涯逺巷蹋歌深夜月隔墻吹管數枝花鴛鸞得路音塵濶鴻雁分飛道里賒不是多情成二十斷無人解訪貧家徐鉉字鼎臣仕李後主為吏部尚書歸宋仕至散騎常侍世稱徐騎省在江東與韓熙載齊名詩有白樂天之風弟鍇俱工字學鴻雁分飛之句為弟設也依韻和李舍人旅中寒食感事梅堯臣一百五日風雨急斜飄細濕春郊衣梨花半殘意思少客子漸老尋遊非戢戢車徒九門盛寥寥煙火萬家微今朝甘自居窮巷無限墦間得醉歸聖俞詩不爭格高而在乎語熟意到此乃吳體第一句六字仄聲第二句五字平聲愈覺其健梨花客子一聨深勁有味惟陳簡齋妙得其法焉寒食贈游客張耒隂隂畫幙映雕欄一縷微香寳篆殘寒食園林三月近落花風雨五更寒筝調寳柱絃初穏酒滿金壺飲未乾明日踏青郊外去緑楊門巷繫雕鞍平熟圓妥視之似易能作詩到此地亦難也寒食只旬日間風雨不已曾幾年光胡不少留連熟食清明又眼前敢望深宫傳蠟燭可堪小市禁炊烟滿城風雨無杯酒故國松楸欠紙錢老病心情冷時節只將書策替幽禪寒食清明二首取一劉克莊寂寂柴門邨落裏也教揷栁記年華禁烟不到粤人國上冡亦擕龎老家漢寢唐陵無麥飯山蹊野徑有梨花一樽徑藉青苔卧莫管城頭奏暮笳後村詩欠變格麥飯梨花一聨殆近前輩句法紹定五年壬辰詩海南人不作寒食而以上已上冢余擕一瓢酒尋諸生皆出矣獨老符秀才在因與飲至醉符葢儋人之安貧守靜者也元註秀才符林蘇軾老鵶銜肉紙飛灰萬里家山安在哉蒼耳林中太白過鹿門山下徳公囘管寧投老終歸去王式當年本不來記取南城上已日木棉花落刺桐開昌黎不謫潮州後世豈知有趙徳東坡不落海南後世豈知有符林李太白集尋城北范居士落蒼耳道中坡用此以譬尋符林也司馬徳操詣龎徳公值其上冢坡用此以譬所尋諸生皆已上冢不值也管寧避地遼東後還中國坡用此以譬已終當北歸也王式為博士悔為江公所辱曰我本不欲來坡用此以譬已元祐進用亦本無富貴心也坡詩間架宏大不可步驟豈許用晦四句裝景所可及歟此詩首尾四句言景中四句用事又未若移易中間四句兩用事兩言景為佳也上已晚泊龜山作元註元祐辛未賦賀鑄薄暮東風不滿㠶遲遲未忍去淮南故園猶在北山北佳節可憐三月三蘭葉自供游女佩芸編聊對故人談洛橋車騎相望客曾為吳兒幾許慚三四好賀公詩總論見送饑類中次韻王仲至西池㑹飲張耒聖朝無復用舟師戲遣艨艟揷㦸枝沸浪有聲黄㡌動春風無力彩旗垂不勝杯杓寧辭醉傳語風光共此嬉逺比永和真繼軌臨模蠒紙看他時此元祐中西池上已之㑹也文潛詩為一時冠三四實佳句秦少游有云簾幙千家錦繡垂王仲至嘲謂又待入小石調以秦詩近詞故也上已趙蕃朝來一雨快隂晴東郊百鳥間闗鳴受風栁條不自惜蘸水桃花可憐生不見山隂蘭亭集况乃長安麗人行東西南北俱為客且送江頭返照明老杜集此等詩謂之吳體昌父乾道中詩猶少作也五六天生此對上已詩無復加矣上已劉克莊櫻笋登盤節物新一笻踏遍九州春似曾山隂訪脩竹不記水邊觀麗人豪飲自憐非少日俊遊亦恐是前身暮歸尚有清狂態亂揷山花滿角巾山隂脩竹水邊麗人一聨亞於趙昌父紹定五年壬辰詩後村年四十六閒居莆中所以言俊游亦恐是前身皆思舊事也重午范成大熨斗熏籠分夏衣翁身獨比去年衰已孤菖緑十分勸却要艾黄千壯醫蜜粽氷團為誰好丹符綵索聊自欺小兒造物亦難料藥裹有時生網絲菖緑艾黄之對新後四句又用吳體和黄預七夕陳師道盈盈一水不斯須經嵗相過自作疎坐待翔禽報佳㑹徑須飛雨洗香車超騰水部陳篇上收拾愚溪作賦餘信有神仙足官府我寧辛苦守殘書七夕詩七言律無可選僅此而已何遜七夕詩仙車駐七襄鳯駕出天潢月映九微火風吹百和香逢歡暫巧笑還涙已啼粧别離不得語河漢漸湯湯后山以為陳篇吾儕當㑹意也乞巧李樸處處香筵拂綺羅為傳神女渡天河休嫌天上佳期少已恨人間巧態多齚舌自應工嫵媚方心誰更苦鐫磨元註見孫樵栁子厚乞巧文獨收至拙為吾事笑指雙針一縷過李樸字先之章貢人早從程伊川游坐為陳瑩中所薦流落三十年靖康初除給事中不及拜七夕無好律詩以此備數其人能踐言不媿此詩登高杜甫風急天高猿嘯哀渚清沙白鳥飛回無邊落木蕭蕭下不盡長江滚滚來萬里悲秋常作客百年多病獨登臺艱難苦恨繁霜鬢潦倒新停濁酒杯此詩已去成都分曉舊以為在梓州作恐亦未然當攷公病而止酒在何年也長江滚滚必臨大江耳九日藍田崔氏莊老去悲秋強自寛興來今日盡君歡羞將短髮還吹㡌笑倩傍人為正冠藍水逺從千澗落玉山高並兩峰寒明年此㑹知誰健醉把茱萸子細看楊誠齋大愛此詩以予觀之詩必有頓挫起伏又謂起句以自對君亦是對句殊不知強自二字與盡君二字正是着力下此以為詩句之骨之眼也但低聲抑之讀五字却高聲揚之讀二字則見意矣三四融化落㡌事甚新末句子細看茱萸超絶千古此老杜九日七言律四首取兩首入變體詩中今列者二此詩在未入蜀以前終篇不言兵革又難定在禄山已反之後註家説不可信九日和韓魏公蘇洵晚嵗登門最不才蕭蕭華髮映金罍不堪丞相延東閣閒伴諸儒老曲臺佳節已從愁裏過壯心偶傍醉中來暮歸衝雨寒無睡自把新詩百遍開詩話謂韓魏公九日飲執政老泉以布衣與坐今味閒傍諸儒老曲臺之句即是修太常禮之時非布衣也葢英宗治平二年乙巳韓公首倡見安陽集是日有雨所和詩非席上所賦其曰暮歸衝雨寒無睡乃是飲歸而和此詩耳五六要是佳句朱文公語録頗不以為然恐門人傳録未必的也次韻李節推九日登山陳師道平林廣野騎臺荒山寺鳴鐘報夕陽人事自生今日意寒花只作去年香巾欹更覺霜侵鬢語妙何妨石作腸落木無邊江不盡此身此日更須忙重九詩自老杜之外便當以杜牧之齊山詩為亞已入變體詩中陳簡齋一首亦然陳后山二首詩律瘦勁一字不輕易下非深於詩者不知亦當以亞老杜可也九日寄秦觀疾風迴雨水明霞沙步叢祠欲暮鴉九日清樽欺白髮十年為客負黄花登髙懷逺心如在向老逢辰意有加淮海少年天下士獨能無地落烏紗無地落烏紗極佳孟嘉猶有一桓温客之秦併無之也九日登戲馬臺元註壬戌彭城賦當年節物此山川倦客登臨獨惘然戲馬臺荒年自久射蛇公去事空傳黄花半老清霜後白鳥孤飛落照前不與興亡城下水穏浮漁艇入淮天射蛇公用劉裕新洲伐荻事以對戲馬良佳重九賞心亭登髙范成大憶隨書劍此徘徊投老雙旌重把杯緑鬢風前無幾在黄花雨後不多開豐年江隴青黄徧落日淮山紫翠來飲罷此身猶是客鄉心却付晚潮回此淳熙八年辛丑石湖自四明移帥金陵年五十六前此朱文公在南康苦旱此獨云年豐明年重九石湖猶在金陵乃有官忙憫雨之句此乃富貴人重九也九日登天湖以菊花須揷滿頭歸分韻賦詩得歸字朱熹去嵗瀟湘重九時滿城風雨客思歸故山此日還佳節黄菊清樽更晚暉短髪無多休落㡌長風不斷且吹衣相看下視人寰小祇合從今老翠微此乾道四年戊子也文公去年訪南軒於長沙故有此起句予嘗謂文公詩深得后山三昧而世人不識且如故山此日還佳節黄菊清樽更晚暉上八字各自為對一瘦對一肥愈更覺好葢法度如此虚實互換非信口信手之比也山谷簡齋皆有此格此詩後四句尤意氣濶逺時以去年冬除樞密院編修官猶待闕於家歸報徳再用前韻幾枝藤竹醉相攜何處千峰頂上歸正好臨風眺平楚却須入谷避斜暉酒邊泉溜寒侵骨坐上嵐光翠染衣踏月過橋驚易晚林坰回首更依微易晚疑當作已晚此即九日晚歸詩也詩思無一絲近塵土壬子九日劉克莊平蕪盡處即滄溟身寄區中等一萍種杞菊翁猶老健揷茱萸伴半凋零元註羣從十四人存者七人去年勅設塵飛鞚今日村酤草塞瓶却笑癡人妄分别何曾未必勝劉伶淳祐十二年壬子去年辛亥後村在朝為秘書監直玉堂九月十日宣鎖有六絶句其冬鄭丞相清之卒去國恰近一年家居之樂亦何至村酤草塞瓶乎周益公四六有云朝趍鳳闕綰五組之光華夕侣漁舟披一簑之􅀈縷文人之言例過實也尾句猶不能㤀情於榮進者瀛奎律髓巻十六

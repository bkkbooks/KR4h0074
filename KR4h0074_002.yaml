body:
  text: 瀛奎律髓卷二元方回編朝省類公槐卿棘序鷺班鴛人臣豈惡此而欲逃之進思盡忠退思補過可以榮而無所愧則聲詩亦所以言志也五言十四首酬蘇味道夏晚寓直省中沈佺期並命登仙閣通宵直禮闈大官供宿膳侍史護朝衣卷幔天河入開窗月露微小池殘暑退髙樹早涼歸冠劍無時釋軒車待漏飛明朝題漢柱三署有光輝此詩三聨緊峭精神尾句亦善用郎署事即田鳳為尚書郎入奏事帝目送之因題柱曰堂堂乎張京兆田郎者也出三輔録在廣州聞崔馬二御史並拜臺郎蘇味道振鷺齊飛日遷鶯逺客聞眀光共待漏清覽各披雲喜得廊廟舉嗟為臺閣分故林懷柏帨新渥阻蘭薰冠去神羊影車迎瑞雉羣逺從南斗外遙仰列星文唐人自御史除省郎至以為榮栁子厚以御史得禮部自謂過分是也此詩於御史除省郎曲盡體貼春夜寓直鳳閣懷羣公魏知古拜門傳漏晚寓省索居時昔重安仁賦今稱伯玉詩鴛池滿不溢雞樹久逾滋夙夜懷山甫清風詠所思西漢中書有令僕射丞郎魏置中書通事郎晉改為中書侍郎東晉改為通事郎尋改為中書郎隋改中書郎省為內侍省又改為內書監唐初改為內史省龍朔二年改為西臺光宅初改為鳳閣開元改為紫薇世稱鳳閣鸞臺者即古中書門下省也知古為鳳閣侍郎故引潘賦卞詩卞伯玉赴中書郎詩有云大方信包含優渥遂不巳濯鱗龍鳳池揮翰紫宸裏雞棲樹事出郭頒魏晉世語同崔員外秋宵寓直王維建禮髙秋夜承明候曉過九門寒漏徹萬井曙鐘多月迥藏珠斗雲消出絳河更慚衰朽質南陌共鳴珂蔡質漢官典職曰尚書郎晝夜更直五日於建禮門外承明者殿廬也珂石次玉瑪瑙色白如雪或云螺屬生海中通典老鷗入海為玳可作馬勒謂之珂唐儀衛志一品至五品官有象輅革輅木輅軺車三品以上珂九子四品七子五品五子車輅藏於太僕制册大事則給餘皆以騎代車珂則馬銜也又五品以上有珂傘寄左省杜拾遺岑參聨步趨丹陛分曹限紫薇曉隨天仗入暮惹御香歸白髮悲花落青雲羡鳥飛聖朝無闕事自覺諫書稀岑參為右補闕屬中書省故云分曹限紫薇奉答岑參補闕見贈杜甫窈窕清禁闕罷朝歸不同君隨丞相後我往日華東冉冉栁枝碧姢姢花蕊紅故人得佳句獨贈白頭翁老杜為左拾遺屬門下省故退朝之後所往治事之地各異唐宫省多植花栁子美是年乾元元年戊戌春四十七嵗已云白頭翁則老杜早衰亦可見也春宿左省花隱掖垣暮啾啾棲鳥過星臨萬户動月傍九霄多不寢聽金鑰因風想玉珂明朝有封事數問夜如何晚出左掖晝刻傳呼淺春旗簇仗齊退朝花底散歸院栁邊迷樓雪融城濕宫雲去殿低避人焚諫草騎馬欲雞栖老杜天寶十四年乙未年四十四矣始得為河西尉不赴改帥府胄曹十一月而祿山反公如奉天明年七月肅宗即位靈武公在鄜州奔行在為賊所得留長安或謂亦囚至東都十月房琯敗於陳濤斜即至德元年丙申也明年丁酉夏五月間道走鳳翔除左拾遺閏八月詔放至鄜州省妻子九月復長安十月肅宗還京公亦歸班此二詩皆答岑參詩並乾元元年戊戌正二月間詩也六月移華州司功去國終不復入公平生僅為朝士一年許耳所謂封事諫草人不盡知史不詳書夜不寢而待曉晝治事而晚出於此二詩並見之其年已四十七矣山谷評公詩猶必以夔州後詩為準然則不變不進愈變愈進老杜且然况他人乎早朝耿湋鐘鼓餘聲裏千官向紫薇冒寒人語少乘月燭來稀清漏聞馳道輕霞映瑣闈猶看嘶馬處未啓掖垣扉湋大厯中左拾遺詩平正大饗明堂慶成王圭皇祐更秋律明堂奉帝禋粢盛雖薦德霜露本懷親於赫朝三后無文秩百神九筵交玉幣重屋近星辰邃幄留颷御清壇墮月津衣冠漢儀舊金石舜韶新受胙開宣室鳴鐘降紫宸羣隂光復旦叶氣斗回春靈貺叢千祝豐恩滲四垠慚非老辭筆徒學煥堯文禹玉為詞臣則摛藻細潤典雅徑健未有後來全句長句之病詩號為至寶丹以多用金玉珠璣錦繡之類然亦有不全然者此詩豈不謂之細潤典雅依韻恭和聖製龍圗天章閣觀三聖御書半夜傳君召西清閲帝文筆回丹穴鳳書法要録有丹穴鳳舞清泉龍躍之勢歌起沛中雲御幄金虯轉仙墀羽仗分君王自天縱况復睿心勤君王自天縱用老杜君王自神武也自天縱又加學力故有尾句依韻和吳相公從駕至開寶寺慶夀崇因閣崇因開寶構金碧晝相輝禁蹕隨曦馭層城轉斗機梵音獅子吼妙相鴿王歸洛水浮神篆天花滿御衣塔疑從地湧棟擬入雲飛上行乘今果羣超悟昨非慧珠常自照法雨遍成霏但起真如念梯梁即可幾依韻和王原叔內翰有懷暮鑰嚴溫省宵鈴靜浴堂銀花無奈冷劉夢得詩銀花懸院榜瑶草又還芳夢久聞仙吹班清犯曉霜帝閽何所扣一炷祝堯香歲暮直舍感懷薑特立嵗暮坐公館永懷時序遷雪消殘臘外春到早梅邊夜色侵鳥鵲年光送管絃無人同晤語輸寫賴詩篇七言二十四首早朝大明宫呈兩省僚友門下省中書省賈至銀燭朝天紫陌長禁城春色曉蒼蒼千條弱栁垂青瑣百囀流鶯繞建章劔佩聲隨玉墀步衣冠身惹御爐香共沐恩波鳳池上朝朝染翰侍君王用兩染字上字合改為惹和賈至舍人早朝大明宫杜甫五夜漏聲催曉箭九重春色醉仙桃旌旗日暖龍蛇動宫殿風微燕雀髙朝罷香煙攜滿袖詩成珠玉在揮毫欲知世掌絲綸美池上於今有鳳毛賈至之父亦嘗為中書舍人故云超宗殊有鳳毛出南史宋書謝鳳子超宗有文辭補新安王常侍王母殷淑儀卒超宗作誄奏之帝大嗟賞謂謝莊曰超宗殊有鳳毛同前王維絳幘雞人報曉籌尚衣方進翠雲裘九天閶闔開宫殿萬國衣冠拜冕旒日影才臨仙掌動香煙欲傍衮龍浮朝罷須裁五色詔佩聲歸到鳳池頭同前岑參雞鳴紫陌曙光寒鶯囀皇州春色闌金闕曉鐘開萬户玉階仙仗擁千官花迎劍佩星初落栁拂旌旗露未乾獨有鳳凰池上客陽春一曲和皆難按此四詩倡和在乾元元年戊戌之春唐肅宗至德二載丁酉九月廣平王復長安子美以是年夏間道奔鳳翔六月除左拾遺十月肅宗入亰師居大明宫賈至為中書舍人岑參為右補闕十二月六等定罪王維降授太子中允四人早朝之作俱偉麗可喜不但東坡所賞子美龍蛇燕雀一聯也然亰師喋血之後瘡痍未復四人雖誇美朝儀不已泰乎西掖省即事西掖重雲開曙暉北山疏雨點朝衣千門栁色連青瑣三殿花香入紫薇平明端笏陪鴛列薄暮垂鞭信馬歸官拙自悲頭盡白不如巗下掩柴扉亞於前所和賈至者宣政殿退朝晚出左掖杜甫天門日射黃金榜春殿晴薰赤羽旗宫草微微承委珮爐煙細細駐遊絲雲近蓬萊常五色雪殘鳷鵲亦多時侍臣緩步歸青瑣退食從容出每遲唐明皇以來朔望朝臣顓用常服今云委珮未詳紫宸殿退朝口號户外昭容紫袖垂雙瞻御座引朝儀香飄合殿春風轉花覆千官淑景移晝漏稀聞髙閣報天顏有喜近臣知宫中每出歸東省會送夔龍集鳳池聞楊十二新拜省郎遙以詩賀白居易文昌新入有光輝紫界宫墻白粉闈曉日雞人傳漏箭春風侍女護朝衣雪飄歌句髙難和鶴拂煙霄老慣飛官職聲名俱入手近來詩客似君稀元注向曾有贈楊詩落句云不用更教詩句好折君官職是聲名今故云俱入手此楊巨源也喜張十八博士除水部員外郎老何歿後吟聲絶雖有郎官不愛詩無復篇章傳道路空餘風月在曹司長嗟博士官猶屈亦恐騷人道漸衰今日聞君除水部喜於身得省郎時何遜以詩名老杜頌之曰能詩何水曹張籍是除樂天賀之五十六字如一直説話自然條暢新除水曹郎答白舍人張籍年過五十到南宫章句無名荷至公黃紙開呈丞相後朱衣引入謝班中諸曹縱許為仙侣羣吏多嫌是老翁幸有紫薇郎見愛獨稱官與古人同長慶元年九月樂天自中書舍人出為杭州刺史張之除水部當在元和長慶間早朝楊巨源鐘傳清禁才應徹漏報仙闈儼已開雙闕薄煙籠菡萏九城初日照蓬萊朝時但向丹墀拜仗下方從碧落回聖代逍遙更何事願將巴曲贊康哉平正雨後月中玉堂間坐韓偓銀臺直北金鑾外暑雨初晴皓月中惟對松篁聽刻漏更無塵土翳虛空緑香尉齒氷盤果清冷侵肌水殿風夜久忽聞鈴索動玉堂西畔響丁東中秋禁直星斗疏明禁漏殘紫泥封後獨憑闌露和玉屑金盤冷月射珠光貝闕寒天襯樓臺籠苑外風吹歌管下雲端長卿祗為長門賦未識君臣際會難以上二詩俱端重有體六月十七日召對自辰及申方歸本院清暑簾開散異香恩深咫尺對龍章花應洞裏常時發日向壺中特地長坐久忽疑槎犯斗歸來兼恐海生桑如今冷笑東方朔唯用詼諧侍漢皇三四真有仙家之意五六用事變陳為新末句詆東方朔尤有味卧病逾月請郡不許復直玉堂十一月一日鎖院是日苦寒詔賜官燭法酒書呈同院蘇軾微霰疏疏點玉堂詞頭夜下攬衣忙分光御燭星辰爛拜賜宫壺雨露香醉眼有花書字大老人無睡漏聲長何時却逐桑榆暖社酒寒燈樂未央中四句氣焰逼人夜直玉堂攜李之儀端叔詩百餘首讀至夜半書其後玉堂清冷不成眠伴直難呼孟浩然暫借好詩消永夜每逢佳處輒參禪愁侵硯滴初含凍喜入燈花欲鬬妍寄語君家好兒子他時此句一時編李之儀詩得意趣頗深晦非東坡不之察故有是佳句以孟浩然待之非誇也次韻子由五月一日同轉對跪奉新書笏在腰談王正欲伴耕樵晉陽豈為一門事宣政聊同五月朝憂患半生聨出處歸休上䇿早招要後生可畏吾衰矣刀筆從來錯料堯兄弟一門用溫大雅事唐髙祖語極切尾句又似不平執政者之驟進此乃東坡平生口病也次韻蔣穎叔錢穆父從駕景靈宫歸來病鶴記城闉舊踏松枝雨露新半白不羞垂領髮軟紅猶戀屬車塵雨收九陌豐登後日麗三元下降辰粗識君王為民意不才何以助精禋此元祐七年壬申南郊時事殿後書事和范景仁梅堯臣天子尋常幸直廬裹頭宫女捧雕輿紅泥已賜春醅酒黃帕曾經御覽書林果鳥應銜去後燕窠蟲有落來餘禁中事事能傳詠播在人間不是虛老杜云户外昭容紫袖垂則知唐之外庭以宫女引朝儀聖俞云裹頭宫女捧雕輿則知宋之內庭以宫女直輿事不惟詩好可備故事作一對也此乃和范景仁殿中雜題三十九首取其一且如前聨紅泥已賜春醅酒黃帕曾經御覽書豈不勝王建黃帕蓋鞍呈了馬紅羅纏項鬬回雞乎建詩卑弱今不取校藝和王禹玉內翰分庭答拜士傾心却下朱簾絶語一作好音萬蟻戰來一作酣春日永一作暖五星眀聚一作處夜堂深力槌頑石方逢玉盡撥寒沙始見金淡墨榜名何日出金眀池苑一作館可能尋詩話以前聨為萬蟻戰酣春晝永五星眀聚夜堂深承平時省試諸公例有倡和於考校兩不相妨是年歐陽公知舉王岐公以翰學與聖俞俱在院得二蘇與南豐之年也元祐三年東坡為知舉黃山谷李伯時俱為屬唱和尤盛張宛邱集後有同文館倡和數卷朝無咎曹子方蔡天啓鄧忠臣皆與佳句無算亦考試時作南渡以後此風頽落知舉監試官用從官言路之長小試官四十餘人雖宣鎖四十餘日未有一篇詩傳於世者於熟爛時文之中求天下之士賦必有一定之説經必拘破題四句小巧以此為了事癡兒世道日以衰矣歐蘇大老昔司文衡賦詩校藝兩用其至綽綽有餘蓋不可復見矣悲夫謝永叔答述舊之作和禹玉天下才名罕有雙今逢陸海與潘江筆生造化多多辦聲滿華夷一一降金帶繫袍回禁署翠娥持燭侍吟窗人間榮貴無如此誰愛區區擁節幢此亦試院作謂永叔禹玉二學士大才也前聨壯哉次聨麗甚校藝贈永叔和禹玉今看座主與門生事事相同舉世榮並直禁林司詔令又來西省選豪英飛龍借馬天邊下光祿供醪月底傾食葉蠶聲句偏美當時曾記賦將成食葉蠶聲謂歐公句也王岐公乃歐公十五年前所取門生呈永叔書事華陽集第四卷元注嘉祐二年禮部倡和王圭詔書初捧下西廂重棘連催暮鑰忙緑繡珥貂留帝詔元注元夕有緑衣中使傳宣紫衣鋪案拜宸香卷如驟雨收聲急筆似飛泉落勢長十五年前出門下最榮今日預東堂禹玉弱冠甲科出歐公門至是十五年亦可謂榮進速矣許光凝撰集序謂不出都城致位宰相豫謂岐公詩多富貴語惟如此富貴人能為之次韻景彞赴省直宿馬上梅堯臣烏紗帽底青眸轉朱雀街頭玉轡搖燈火髙樓吹短笛簾櫳斜巷隘初宵身歸蘭省惟看月心在天津欲倚橋枕上夜深應不寐羡他年少酒微銷曲盡京師承平市井繁盛之狀又見赴省直宿於馬上或有所睹而不能忘情之意流麗圎活自然有味景彞王景彞也瀛奎律髓卷二

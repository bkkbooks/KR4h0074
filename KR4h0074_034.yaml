body:
  text: 瀛奎律髓卷三十四元方回編川泉類浮遊浪波之上玩泳泉壑之間大而滄海黃河長江巨湖之洶湧小而溪谷陂池之靚深雄壯而觀潮淒酸而阻風間寂而弄水尋源皆類於此五言三十二首遊禹穴回出若耶宋之問禹穴今朝到耶溪此路通著書聞太史錬藥有仙翁鶴往籠猶挂龍飛劍已空石帆搖海上天鏡落湖中水底零露白山邊墜葉紅歸舟何慮晚日暮使樵風江亭晚望賈島浩渺浸雲根煙嵐出逺村鳥歸沙有迹帆過浪無痕望水知柔性看山欲斷魂縱情猶未已回馬欲黃昏三四似熟套在浪仙時初出亦佳后山效之則無味矣盧氏池上遇雨贈同遊者溫庭筠簟翻涼氣集溪上潤殘棊萍皺風來後荷喧雨到時寂寥間望久飄灑獨歸遲無限松江恨煩君解釣絲萍皺荷喧一聨工過天津橋梁晴望姚合間立津橋上寒光助逺林皇宮對嵩頂清洛貫城心雪路初晴出人家向晚深自從王在鎬天寶至如今題僧院引泉泉眼髙千丈山僧取得歸架空橫竹影鑿石逺渠飛洗藥溪流濁澆花雨力微朝昏長逺看護惜似持衣家園新池數日自穿池引泉來近陂尋渠通咽處繞岸待清時深好求魚養間堪與鶴期幽聲聽難盡入夜睡常遲兩詩俱清潤但力量欠雄大早秋江行竇鞏回首湓池逺西風吹荻花暮潮江勢濶秋雨雁行斜多醉渾無夢頻愁欲到家漸驚雲樹轉點點是神鴉大醉則必無夢詩人自來不曽説到與豫心暗合蓋非常醉者不能知也今江州西泝地名盤塘近興國軍港口即有神鴉迎船人與飯肉唐以來固然矣老杜湖南詩云迎棹舞神鴉兼峽中亦如此渡淮白居易淮水東南地無風渡亦難孤煙生乍直逺樹望多團春浪棹聲急夕陽帆影殘清流宜映月今夜重吟看三四尖新終南東溪口作岑參溪水碧於草潺潺花底流沙平堪濯足石淺不勝舟洗藥朝與暮釣魚春復秋興來從所適還欲向滄洲句句明白不見其用力處晚發五溪客厭巴南地鄉鄰劒北天江村片雨外野寺夕陽邊芋葉藏山徑蘆花間渚田舟行未可住乘月且須牽詩律往往健整平實非晚唐纎碎可望巴南舟中夜書事渡口欲黃昏歸人爭渡喧近鐘清野寺逺火點江村見雁思鄉信聞猿積淚痕孤舟萬里外秋月不堪論句句分曉無包含而自在起句十字尤絶唱秋日富春江行羅隱逺岸平如剪澄江靜似鋪紫鱗仙客馭金顆李衡奴冷疊晴山濶清幽萬象殊嚴陵亦髙見歸卧是良圖一公新泉嚴維山下新泉出泠泠北去源落池才有響漬石未成痕獨映孤松色殊分衆鳥喧唯當清夜月觀此啓禪門過洞庭湖許棠驚波常不定半日鬢堪斑四顧疑無地中流忽有山鳥飛常畏墜帆逺卻如間漁父前相引時歌浩渺間山下泉李端碧水映丹霞濺濺露淺沙暗通山下草流出洞中花淨色和雲落潺聲繞石斜明朝更尋去應到阮郎家工而潤嶽陽館中望洞庭湖劉長卿萬古巴丘戍平湖此望長問人何渺渺愁暮更蒼蒼疊浪浮元氣中流沒太陽孤舟有歸客早晚達瀟湘五六儘佳非中流果沒日也水逺而日短故所見者日落于中耳水之外又水地之外又地而水與地目不可及者日月常可得而見非日月之光有餘為之乎答勸農李淵宗嘉州江行見寄宋祁嘉月嘉州路軻峩按部船山圍杜宇國江入夜郎天霽引溪流望涼供水閣眠愧君舟楫急遂欲濟長川嘉州古夜郎國三四有老杜及盛唐人風味中秋新霽壕水初滿自城東隅泛舟回謝公命賦齋舫談經後官池載酒行斜陽鳥外落新月樹端生演漾思江浦夷猶繞郡城東轅有遺恨日日物華清陪謝紫微晚泛積雨漲秋壕輕舟共此遨菰蒲斂鋩鍔蓮芡熟櫜韜岸靜魚跳月林喧鳥避篙歸時興不淺風物正蕭騷渡湘江張祁春過瀟湘渡真觀八景圖雲藏嶽麓寺江入洞庭湖晴日花爭發豐年酒易沽長沙十萬户遊女似京都總得居士張公祁字晉彥兄邵字才彥和州烏江人才彥宣和三年上舍建炎初自衢州曹官借禮書使金紹興十三年同朱辨洪浩還有軿輶軒唱和集晉彥有子是為中書舍人于湖居士孝祥字安國以安國魁多士羅織下獄官至淮漕號總得居士此詩壯浪所以子有父風金明池遊梅堯臣三月天池上都人袨服多水明搖碧玉岸響集靈鼉畫舸龍延尾長橋霓入聲飲波苑花光粲粲女齒笑瑳瑳行袂相朋接遊肩與賤摩津樓金間采幄殿錦文窠挈榼車傍綴歸郎馬上歌川魚應望幸幾日翠華過同徐道暉文淵趙紫芝泛湖翁卷相逢亦相親吟中得幾人扁舟當夏日勝賞共間身山雨曽添碧湖風不動塵晚來漁唱起處處藕花新巨野陳師道餘力唐虞後沈人海岱西不應容桀黠寧復有青齊燈火魚成市帆檣藕帶泥十年塵霧底瞥眼怪鳬鷖后山詩全是老杜以萬鈞九鼎之力束于八句四十字之間江湖行役詩凡九首選諸此篇篇有句句句有字巨野泊觸事滿巷牽絲直平湖墜鏡清順流風借便捷路雪初晴鳥度欲何向鷗來只自驚有行真快意安得易為情雪一作雨河上背水連漁屋橫河架石梁窺巢烏鵲競過雨艾蒿光鳥語催春事窗明報夕陽還家慰兒女歸路不應長野望霜葉紅於染吹花落更馨平江行詰屈小徑夾蔥青度鳥開愁眼遙山入畫屏畏人惟可飲從俗卻須醒西湖小徑才容足寒花只自香官池下鳬雁荒冢上牛羊有子吾甘老無家去未量三年哦五字草木借餘光湖上湖上難為别梅梢已著春林喧鳥啄啄風過水鱗鱗緣有三年盡情無一日親白頭厭奔走何地與為鄰此皆潁州西湖也后山元祐中為教授滿而將去故有此詩寓目曲曲河回復青青草接連去帆風力滿來雁一聲先野曠低歸鳥江平進晚牽望鄉從此始留眼未須穿顔氏阻風水到西流濶風從北極來聲驅峽口拆力拔嶺根摧突兀重重浪轟豗處處雷順流看過舫更著快帆催萬古梁山泊今來末掾船阻風兼著雪費日亦忘年世事元相忤衰懷忍自煎曉來聲更惡始覺畏途邊梁山泊即巨野在今東平府西北受泰山諸水為北清河所出入之瀦向者河決即連而為一南通泗北通濟荆公當國時或欲涸梁山泊為田故后山元符末赴棣教阻風于此有萬古梁山泊之句謂決不可涸猶天理決不可磨滅也過孔雀灘贈周靜之陳與義海內無堅壘天涯有近親不辭供笑語未慣得殷勤舟楫深宜客溪山各放春髙眠過灘浪已寄百年身七言十六首開龍門八節石灘白居易七十三翁旦暮身誓開險路作通津夜舟過此無傾覆朝脛從今免苦辛十里叱灘類河漢八寒隂獄化陽春我身雖沒心常在暗施慈悲與後人新安道中玩流水吳融一渠春碧弄潺潺密竹繁花掩映間看處便須終日住算來爭得此身間縈紆似接迷春洞清冷應憐有雪山上卻征車更回首了然塵土不相關新安有此至清之水沈休文創為詩乃後相繼不一今歙睦是分水嶺兩派潺湲不暫停嶺頭長㵼别離情南隨去馬通巴棧北逐歸人達渭城澄處好窺雙黛影咽時堪寄斷腸聲紫溪舊隱還如此清夜柴山月更明三四言水之分而南北者如此第五句巧第六句亦佳自鞏洛舟行入黃河即事寄府縣僚友韋應物夾水蒼山路向東東南山豁大河通寒樹依微逺天外夕陽明滅亂流中孤村幾嵗臨伊岸一鴈初晴下朔風為報洛橋遊宦侣扁舟不繫與心同過桐廬胡宿兩岸山花中有溪山花紅白遍髙低靈源忽若乘槎到仙洞還同採藥迷二月辛夷猶未落五更鴉臼最先啼茶煙漁火遙堪畫一片人家在水西武平此詩妙甚八句五十六字無一字不佳形容桐廬盡矣起句十四字併尾句可作竹枝歌謳也湖嶺下十里是為黯淡灘行者多至此捨舟鞏仲至急流方了又髙岡日永周旋未覺忙壁上字多知店老嶺邊松茂喜車涼叢叢亂篠承欹石帖帖新荷戀小塘黯淡惡灘應笑我為虞魚腹犯羊腸三四新甚五六下兩眼亦佳冬末同友人泛瀟湘杜荀鶴殘臘泛舟何處好最多吟興是瀟湘就船買得魚偏美踏雪沽來酒倍香猿到夜深啼嶽麓雁知春近别衡陽與君剩掠江山景裁取新詩入帝鄉買得沽來等語晚唐詩卑之尤卑者然意新則亦可喜此聨世所共稱荀鶴詩句法大率如此皆不敢選雪中過重湖信筆偶題韓偓道方時險擬如何謫去甘心隱薜蘿青草湖將天暗合白頭浪與雪相和旗亭臘酎踰年熟水國春寒向晚多處困不忙仍不怨醉來惟是欲傞傞題薛十二池姚合每日樹邊消一日繞池行過又須行異花多是非時有好竹皆當要處生斜立小橋看島勢逺移幽石作泉聲浮萍著岸風吹歇水靣無塵晚更清五六好餘恐格卑王建集中亦有此詩西湖林逋混元神巧本無形匠出西湖作畫屏春水淨於僧眼碧晚山濃似佛頭青欒櫨粉堵搖魚影蘭社煙叢閣鷺翎往往鳴榔與橫笛細風斜雨不堪聽一作風斜雨細三四人所爭誦觀潮齊唐何意滔天苦作威狂驅海若走馮夷因看平地波翻起知是滄浪鼎沸時初似長平萬瓦震忽如圓嶠六鰲移直應待得澄如練會有安流往濟時齊唐字祖之會稽人天聖中進士嘗試制科從范文正公辟杭州料院仕至曹郎有少微集此詩凡觀潮之作皆在其下漢陽晚泊楊徽之傍橋吟望漢陽城山遍樓臺徹上層犬吠竹籬沽酒客鶴隨苔岸洗衣僧踈鐘未徹聞寒漏斜月初沈見逺燈夜靜鄰船問行計曉帆相與向巴陵楊徽之字仲猷建州浦城人南唐時間道至開封中進士第太宗索詩百篇進御以十聨寫御屏為禮侍天府判官侍讀卒年八十淮水暴漲舟中有作劉筠行行極目天無柱渺渺橫流眼有花客子方思舟下碇陰虬自喜海為家村遙樹列秦川薺岸濶牛分觸氏蝸鳶嘯風髙良可畏此情難諭坎中蛙中山劉子儀首變詩格為崑體者五六真李義山規格竒壯東溪梅堯臣行到東溪看水時坐臨孤嶼發船遲野鳬眠岸有間意老樹著花無醜枝短短蒲茸齊似剪平平沙石淨於篩情雖不厭住不得薄暮歸來車馬疲三四為當世名句衆所膾炙江行野宿寄大光陳與義檣烏送我入蠻鄉天地無情白髮長萬里回頭看北斗三更不寐聽鳴榔平生正出元子下此去還經思曠傍投老相逢難衮衮共恢詩律撼瀟湘宿千嵗菴聽泉劉克莊因愛菴前一脈泉襆衾來此借房眠驟聞將謂溪當户久聽翻疑屋似船變作怒聲猶壯偉滴成細點更清圓君看昔日蘭亭帖亦把湍流替管絃瀛奎律髓卷三十四

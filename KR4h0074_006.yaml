  - {type: page-break, offset: 0, content: '', id: KR4h0074_WYG_006-1a, image: WYG1366/WYG1366-0068c.png}
body:
  text: 瀛奎律髓巻六元方回編宦情類岀將入相行道得時仕也乗田委吏州縣徒勞亦仕也今所選詩不於其達與不達之異其位髙取其憂畏明哲而知義焉其位卑取其情之不得已而知分焉驕富貴歎貧賤者咸黜之是可以見選詩之意矣五言四十三首南還湘水言懐張九齡拙宦今何有勞歌念不成十年乖夙志一别悔前行歸去田園老儻来軒冕輕江間稻正熟林裏桂初榮魚意思在藻鹿心懐食苹時哉茍不達取樂遂吾情似韋蘇州郡内閒齋郡閣晝常掩庭蕪日復滋簷風落鳥毳牕葉掛蟲絲拙病宦情少羈閒秋氣悲理人無異績為郡但經時惟有江湖意沉冥空在兹張曲江詩有韋蘇州滋味三四五六俱髙爽沉着而句句婉美也使至廣州昔年長不調兹地亦邅迴本謂雙鳬少何知駟馬來人非漢使槖郡見越王䑓去去雖殊事山川常在哉此為嶺南黜陟使時詩所謂衣錦者也三四工布衣仕至王朝人才衆多江湖之雙鳬乗雁也駟馬而歸不亦榮乎張雖丞相亦驕矣初至犍為作岑參山色軒楹内灘聲枕席間草生公府靜花落訟庭閒雲雨連三峽風塵接百蠻到來能㡬日不覺鬢毛斑頗似老杜詩而無其悲憤末句亦不堪逺仕矣然為刺史則勝如為客之流離也郡齋平望江山時牧犍為水路東連楚人煙北接巴山光圍一郡江月照千家庭樹純栽橘園畦半種茶夢魂知憶處無夜不京華知嘉州所作岑後竟不能入長安卒於蜀其節義有可稱者宿岐州北郭嚴給事别業郭外山色暝主人林館秋疎鐘入卧内片月到床頭遥夜惜已半清言殊未休君雖仕青瑣心不忘滄洲仕宦而常欲退者必吉人尾句不急而有味題永樂韋少府㕔大河南郭外終日氣昏昏白鳥下公府青山當縣門故人是邑尉過客駐征軒不憚煙波濶思君一笑言三四好晚唐人多用之題元錄事開元所居劉長卿幽居蘿薜情髙卧紀綱行鳥散秋鷹下人閒春草生冒嵐歸野寺收印出山城今日新安郡因君水更清長卿之稱新安皆唐睦州開元必城外之古寺如送張栩之睦州首句云遥憶新安舊然則新安為睦州無疑也第二句好髙卧而法自行行字乃是有力字罷郡姑蘇北歸渡揚子津劉禹鍚㡬度悲南國今朝賦北征歸心渡江勇病體得秋輕海濶石門小城髙粉堞眀奎山舊游寺過㟁聴鐘聲俗諺云於仕宦謂賀下不賀上凡初至官者乃任事之始未知其終也故不賀解官而去則所謂善終者也故賀夢得於此詩句句佳三四尤𦂳和裴僕射移官言志張籍身在勤勞地常思放曠時功成歸聖主位重委羣司看疊䑓邊石閒吟篋内詩蒼生正瞻望難與故人期此和裴晉公也為上公而用心常常如此所以善終如蔡京史彌逺賈似道則不然矣晚歳白居易壯嵗忽巳去浮雲何足論身為百口長官是一州尊不覺白雙鬢徒言朱兩轓病難施郡政老未答君恩嵗暮别京洛年衰無子孫惹愁諳世網因苦賴空門攬帶知腰痩看燈覺眼昏不縁衣食繫尋合返邱園此在杭州作殆初至郡時自詠在蘇州作公私頗多事衰憊殊少歡迎送賔客懶鞭笞黎庶難老耳倦聲樂病口厭杯盤既無可戀者何以不休官六十拜河南尹六十河南尹前途足可知老應無處避病不與人期幸遇芳菲日猶當强健時萬金何假借一盞莫推辭流水光隂急浮雲富貴遲人間若無酒盡合鬢成絲三四韓子蒼一聫出此七年春題府㕔潦倒守三川因循涉四年推誠廢鈎距示恥用蒲鞭以此補公事將何銷俸錢雖非好官職嵗乆亦妨賢河南尹在當時想非要路故曰雖非好官職罷府歸舊居陋巷乗籃入朱門掛印囘腰間抛組綬纓上拂塵埃屈曲閒池沼無非手自開青蒼好竹樹亦是眼看栽石片擡琴匣松枝閣酒盃此生終老處昨日始歸來第三四韻自作隔對亦一體也罷河南尹歸家故云爾寄武功縣姚主簿賈島居枕江沱北情懸渭曲西數宵曽夢見㡬處得書批驛路穿荒坂公田帶淤泥靜棋功奥妙閒作韻清凄鉏草留叢藥尋山上石梯客迴河水漲風起夕陽低空地䑓連井孤邨火隔溪巻簾黄葉落鎖印子規啼隴色澄秋月邊聲入戰鼙㑹須過縣去况是屢招攜大是用工題皇甫荀藍田㕔任官經一年縣與玉峰連竹籠拾山果瓦瓶擔石泉客歸秋雨後印鎖暮鐘前乆别丹陽浦時時夢釣船前輩歐梅論詩頗不然此三四然賈島姚合非如此不能竒不可棄也題長江𤣥心俱好靜廨署落暉空歸吏封宵鑰行蛇入古桐長江頻雨後眀月衆星中若任遷人去西浮與剡通武功縣中姚合縣去帝城逺為官與隠齊馬隨山鹿放雞雜野禽棲遶舍惟藤架侵階是藥畦更師嵇叔夜不擬作書題三四好五六似張司業而太易太易則淺三十詩中選此十二首四靈之所學也此可學也學賈島不可及矣簿書多不㑹薄俸亦難消醉卧慵開眼閒行懶繫腰移花兼蝶至買石得雲饒且自心中樂從他笑寂寥五六㝡工曉鐘驚睡覺事事便相闗小市柴薪貴貧家砧杵閒讀書多旋忘賒酒數空還長羨劉伶輩髙眠出世間三四㝡細潤一日看除目終年損道心山宜衝雪上詩好帶風吟野客嫌知印家人笑買琴只應隨分過已是一作定錯彌深起句舊改終作三年讀之遂成話柄日出方能起庭前看種莎吏來山鳥散酒熟野人過岐路荒城少煙霞逺岫多同官數相引下馬上西坡三四句平正尾句亦可取朝朝眉不展多病怕逢迎引水逺通澗疊山髙過城秋燈照樹色寒雨落池聲好是吟詩夜披衣坐到眀閉門風雨裏落葉與堦齊野客嫌杯小山翁喜枕低聴琴知道性尋藥得詩題誰更能騎馬閒行祗杖藜前四句閒適之味可掬腥羶都不食稍稍覺神清夜犬因風吠隣雞帶雨鳴守官常卧病學道不稱名小有洞中路誰能引我行第三句好第四句似乎因而成對假日多無事誰知我獨忙移山入院宅種竹上城墻驚蝶遺花蘂游蜂帶蜜香唯愁眀早出端坐吏人傍一官無限日愁悶欲何如掃舍驚巢燕尋方落壁魚從僧乞淨水憑客報閒書白髪誰能鑷年來四十餘朝朝門不閉長似在山時賓客抽書讀兒童斫竹騎乆貧還易老多病懶能醫道友應相怪休官日巳遲長憶青山下深居遂性情壘堦溪石淨燒竹竈煙輕點筆圗雲勢彈琴學鳥鳴一作聲今朝知縣印夢裏百憂生曽以簿權邑來自唐已苦作邑之難也縣中秋宿鼓絶門方掩蕭條作吏心露垂庭際草螢照竹間禽棋罷嫌無月眠遲聴盡砧還知未離此時復更相尋老杜月眀垂葉露此句古今無敵今此句非有意竊取之亦佳句也詳味合詩輕而淺頗有沾沾自喜之意實有愛官職之心焉縣丞㕔即事王建宫殿半山上人家髙下居古㕔眠愛魘老吏語多虛雨水洗荒竹溪沙填廢渠聖朝收外府皆自九天除建為昭應丞故有丞㕔即事之作姚合集有是詩題曰書縣丞舊㕔非也合為武功簿而題趙縣丞舊居於義不通又第二句作人家髙下居亦非是今定為王建詩三四新贈李主簿周賀稅時兼主印每日得閒稀對酒妨科吏為官亦典衣案遲吟坐待宅近步行歸見說偏論道應愁判是非賀詩格與姚合王建相類而此一詩尤近之僑居二首宋祁抱病苦憂幽都城困倦游身抛秃翁板言入稗家流世路風波惡天涯日月遒危心正無泊持底喻窮愁公宇靜寥寥居然俗意銷屐閒誰記齒帶適自忘腰畝首秋殘穫城西日暮樵比來行樂熟隨意度溪橋前篇三四善用事宋公少年髙科平生宦逹乃有此窮作士大夫有先困而後亨者少公又詩云長安舉頭近湓浦竄身危後篇三四工入壬辰新嵗五十為衰始仍餘五嵗衰雙眸不眀鑒殘鬢已紛絲銅虎雖頻剖荷囊信濫持何須依老格先作故山期壬辰乃仁宗皇祐四年也景文是年五十五初為夀州時十一年矣此則再自翰苑出知亳州盖公生於真宗咸平元年戊戌老格字極新新詔七十不致仕許彈劾郡齋宴坐張公庠為州容散誕真慰野人情撼膝禪初悟揺頭句未成試香秋院靜鬬墨午窗眀已有東歸計柴扉掩姓名公庠字元善有張泗州集皇祐元年馮京榜進士五六好除棣學陳師道老作諸侯客貧為一飽謀折腰真耐辱捧檄敢輕投早作千年調中懐萬斛愁莫年隨手盡心事計盟鷗至棣未乆即除正字乃韓忠彥為相復用元祐時人所以眀年改為建中靖國僅一年改崇寜而后山以其年卒更二十年不死何限好詩垂世亦恐無處着身耳除官扶老趍嚴召徐行及聖時端能㡬字正敢恨十年遲肯着金根誤寜辭乳嫗譏向來憂畏斷不盡鹿門期或云得一正字遽云嚴召所以止於此官后山以建中靖國元年辛巳十二月二十九日卒年四十九此除在元符三年庚辰冬寜既崇矣蘇黄之文且禁矣敢疵后山俗態也書直舍壁陸游道山西下路杳杳歴重廊地寂聞傳漏簾疎有斷香渠清水馬健屋老瓦松長欲出重欹枕無何覔故鄉水馬瓦松詩人罕用此一聫可喜致仕述懐彈冠紹興末觧組慶元中灔澦危途過邯鄲幻境空閒傳相牛法醉喚鬬雞翁衝雨歸來晚山花滿笠紅韋布還初服蓬蒿卧故廬所慚猶火食更恨未巢居叱叱驅黄犢行行跨白驢交親各强健不必問何如秋日偶書趙師秀官事何曽曉閒名苦要簽大書公吏恐直語衆人嫌俸少貧如故醫慵病却添秋風墻下菊相對憶陶潛詩亦平妥但三四俗五六有樂天語意筠州推官時作七言三十八首寄李儋元錫韋應物去年花裏逢君别今日花開又一年世事茫茫難自料春愁黯黯獨成眠身多疾病思田里邑有流亡愧俸錢聞道欲來相問信西樓望月㡬囘圎朱文公盛稱此詩五六好以唐人仕宦多誇美州宅風土此獨謂身多疾病邑有流亡賢矣書懐自小難收疎懶性人間萬事總無功别從僊客求方法曽到僧家問苦空老大登朝如夢裏貧窮作話是邨中未能即便休官去慚愧南山採藥翁五六好一箇窮朝士酬秘書王丞見寄相看頭白來城闕却憶漳溪舊徃還今體詩中偏出格常參官裏毎同班街西借宅多臨水馬上逢人亦說山芝閣水曹雖㝡冷與君常喜得身閒此與王建酬倡者微之就辭尚書居易續除刑部因書賀意兼述離懐白居易我為憲部入南宫君作尚書鎮浙東老去一時成白首别來七度換春風簪纓假合虛名在筋力銷磨實事空逺地官髙親故少些些笑語與誰同觧蘇州自喜自喜天教我少縁家徒行計兩翩翩身兼妻子都三口鶴與琴書共一船僮僕減來無冗食資糧筭外有餘錢攜收貯作邱中費猶免饑寒待㡬年道是白詩平易三四都如此竒哉異哉出律破格本是自然胸懐無粉餙也喜罷郡五年兩郡亦堪嗟偷出游山走看花自此光隂為己有從前日月屬官家樽前免被催迎使枕上休聞報坐衙睡到午時歡到夜逥看官職是泥沙乆困仕宦方知此詩之妙樂天真樂天哉從同州刺史改授太子分司承華東署三分務履道西馳七過春歌飲優游聊卒嵗園林瀟灑可終身留侯爵秩誠虛貴疏受生涯未苦貧月俸百千官二品朝廷雇我作閒人贈皇甫六張十五李廿三賔客昨日三川新罷守今年四皓盡分司幸陪散秩閒居日好是登山臨水時家未苦貧常醖酒身雖疾病尚吟詩龍門泉石香山月早晚同游報一期家常得醖酒唐以來仕宦之家皆然和髙僕射罷節使譲尚書授太保分司喜遂游山水之作暫辭八座罷雙旌更作登山臨水行能以忠貞酬重任不將富貴礙髙情朱門出去簪纓從絳帳歸來歌吹迎鞍馬閙裝光滿路何人信道是書生誇美髙公富貴佀乎譏之其少起於書生當攷贈秋浦張眀甫杜荀鶴君為秋浦三年宰萬慮闗心兩鬢知人事旋生當路縣吏才難展用兵時農夫背上題軍號賈客船頭挿戰旗他日親知問官况但教吟取杜家詩語俗而事或切唐末之亂如此縣令之難可知也書懐簡孫何丁謂王禹偁三入承眀巳七年自慚蹤跡乆妨賢吾子㡬時歸鳳閣老夫方欲買魚船季路旨甘知已矣潘安毛鬢更皤然舉人自代何由得歸去東臯種水田王元之平生重孫丁相期甚至然丁謂不如所期官有餘而行不足書懐寄劉五楊億風波名路牡心殘三徑荒涼未得還病起東陽衣帶緩愁多騎省鬢毛斑五年書命塵西閣千古移文愧北山獨憶瓊林苦霜霰清樽嵗晏强酡顏崑體之平淡者世事悠悠未遽央虛名真意兩相忘休誇失馬曾歸塞未省牽牛解服箱四客髙風驚楚漢五君新詠棄山王秋來安有漁樵夢多在箕峰潁水傍五六甚佳崑體未嘗不美寄子京宋庠八年三郡駕朱輪更忝鴻樞對國鈞老去師丹多忘事少來之武不如人車中顧馬空能數海上逢鷗想見親唯有弟兄親隠者共將耕鑿報堯仁是時士大夫風俗渾厚如元憲名徳後豈易及此詩三四絶佳世所稱者元注為郡八年榮顯巳息朝恩念舊復假相印筦内樞然思歸之心已切怛矣把酒宋祁歌管嘈嘈月露前且將身世付酡然謾誇鼷鼠機頭箭不識醯雞甕外天青史有人譏巧宦黄金無術治流年君看醉趣兼醒趣始覺靈均更可憐此出知亳社所作兩入翰林之後所諷亦不無意必立朝為人所不容故爾予既到郡有詔仍修唐書寄局中諸僚一章通奏領州麾詔許殘書得自隨吾黨成章真小子官中了事是癡兒昏眸視乆花爭亂倦首搔餘雪半垂所願韋吳皆傑筆劉生當見汗青期知㡬論史嘗言頭白有期汗青無日三四佳作郡而修史亦文士之至榮矣盖亳州也真定述事莫嫌屯壘是邊州試聽山河說上游帳下文書三幕府馬前鞾靺五諸侯王藩故社經涂國俠窟餘風解報仇四十年來民緩帶使君何事不輕裘部署安撫二司并府事故曰三幕府所管邢洺磁相趙五州故曰五諸侯公自亳州改知真定府古之鎮州常山郡也元微之詩㑹稽旁帶七諸侯此近之擬杜子美峽中意天入虛樓倚百層四方遥謝此登臨驚風借壑為寒籟落日容雲作暝隂峴井北抛王粲宅楚衣南逐女嬃砧十年不識長安道九籥宸開紫氣深擬老杜亦頗近之此乃在城都時作富貴之至而無一毫驕態唯寫羇思則知逺大者不以井蛙自矜也罷學士出守還拜承旨十八年前玷玉堂當時綠鬢已蒼蒼傷禽縱奮愁瘡重廐馬雖還笑齒長薰罷山爐飄暗燼漱餘銅椀冰寒漿須慚清切鑾坡地不是吾人得擅塲晉侯戱荀息曰屈產之齒長矣五六句法響公又詩云五腰守印十寒温盖守許昌亳社真定成都莆田凡五郡和公齊臨替有感見寄王彥霖孤宦邊城遇衆賢及𤓰能不動依然風號古木葉堆地雲攪遥山水拍天籬菊開時寒有信賔鴻過後暑無權古今惜别君須念乗暇何妨到酒船三六絶好海陵春雨日曽肇公事無多使客稀雨時衙退吏人歸沉煙一炷春隂重畵角三聲晚照微桑雉未馴慚報政海鷗相近信忘機只將宴坐收心念懶向人間問是非送推官王永年致仕還鄉張耒為憶田園便拂衣休官退隠似君稀塵埃擺脫青衫去閭里驚嗟白髪歸南畝稻粱仍嵗熟舊山芝术入秋肥百年從此皆閒日寄語人間浪是非三四㝡佳以其年四十而致仕故曰驚嗟白髪歸和即事溪如垣塹木如城魚鳥從游信有情啅雀踏枝飛尚裊仰荷乗雨側還傾彈琴廢乆重尋譜種藥多求旋記名干世乆知無妙䇿直應歸學老農耕此詩全似唐人髙於張司業也和范三登淮亭身如客雁寄汀洲北望休登王粲樓殘雪臈風驚歳晚早梅新栁動春愁免遭斤斧甘無用敢向波濤較善游奔走塵埃欲歸去勒移恐作故山羞游字押得甚新三四詩中不可少入都陸游葵莧登盤酒可賒豈知扶病又離家朝行打岸濤頭惡夜宿垂天斗柄斜不恨山林淹嵗月但悲道路困風沙隣翁好為看耕隴行矣東歸一笑譁放翁嘉定壬戌致仕出領史局年七十八矣眀年除秘書監再奉祠告老此壬戌入都詩也史院晚出巳乞殘骸老故邱誤恩重作道山游龍津雨過橋如拭鳳闕煙銷瓦欲流直舍少眠鐘報午歸塗微冷葉飛秋心知伏櫪無千里縱有王良也合休此時行都猶太平故有三四之句上章納祿恩畀外祠遂以五月東歸身似霜松老不枯乞骸猶得侍清都百錢濁酒渾家醉六月飛蝱徹曉無美睡不愁閒客攪出游自有小兒扶買山尚恐巢由笑敢向君王覔鏡湖黄紙淋漓字似鴉即今真箇是還家園廬漸近湖山好隣曲來迎鼓笛譁籩實傍籬收豆莢盤蔬臨水採芹芽皇家養老非忘汝不必青門學種𤓰士大夫老而歸有村人鼓笛迎之不亦樂乎羣玉峰頭孤夢斷五雲溪上野舟迴傍人鷗鳥自然熟到處藕花無數開麥飯不饜猶靣槁柴門閒閉自心灰雨來正作盆池地不怕㝠㝠半月梅身是風前一斷蓬經年竊食竟何功倚天青嶂迎船出撲馬紅塵轉眼空網户餉魚勝丙穴旗亭送酒等郫筒死前幸作扶犂叟免使淮南笑發紅丙穴郫筒大犯老杜此身唯有一躬耕乞得餘年樂太平東觀並游驚昨夢西湖重到付來生一堤草露眀晨照半浦荷香颭晚晴歴歴歸途皆勝事江亭先聴櫂歌聲去年公出領史局以今嘉泰三年癸亥得歸年七十九矣此五詩皆妙絶仕而歸樂也老而出出而復歸其樂可知眀發南屏楊萬里新晴在在野花香過雨迢迢沙路長兩度立朝今結局一生行客老還鄉猶嫌數騎傳書劄剰喜千山入肺腸到得江頭上船處莫將白髪照滄浪誠齋平生實三度立朝此乃秘少出知筠州時詩也第六句絶妙次韻傅惟肖蕭海藻竹根蟋蟀太多事喚得秋來籬落間又過暑天如許乆未償詩債若為顏肝腸與世苦相反巗壑嗔人不早還八月放船飛様去蘆花叢外數青山蕭海藻字東夫三山人初與楊誠齋湖湘同官誠齋盛稱其詩為尤蕭范陸止於福建帥參使不早死雖誠齋詩格猶出其下其詩苦硬頓挫而極其工五六一聨諸公並不能及起句竒峭姜堯章乃其壻云詩板舊在永州傳者罕焉呈方叔姜特立聱牙落魄一閒官職事何嘗見一斑不是論松須說劍若非尋壑即觀山閒看落葉隨風去冷笑奔雲送雨還更有劉巗楊處士方叔伴渠癡坐老花間楊方叔即姜公之客常相倡和者夏日奉天台祠祿青天揮箑卧藤床翠袖攜壺過酒漿蝟腹出波烹芡實褭蹄和露擘蓮房相呼時入雞豚社獨坐曽無雁鶩行便是赤城真吏隠不須劉阮更相將中四句皆工肅客借重金紫綬袁說友平生青紫濫紆身更冐金章肅使賔何以假為誠豈敢烏知非有笑無因猿狙自是羞華服鵷鷺姑容接後塵回首紛紛天下事有時宜假不宜真建安袁說友隆興癸未進士仕至樞宻大資自號東塘居士此時借官接伴金使詼諧有味寒夜鞏仲玉瓦欲飛霜水欲冰蒲團今夜有塵凝爐寒閒取薪添火窗暗時將燭助燈乆欲歸田游宦客未能忘肉在家僧於書更覺心情懶病眼愁看細字蠅在官所思歸之詩中旬休日呈巗老近見東郊出土牛燒燈巳過又旬休酸風鱗面慵開眼細雨毛空怯上樓百嵗光隂真蟻穴一年寒燠未鴻溝偷閒文字聊遮眼勲業悠悠且掉頭鱗字毛字下得有眼第六句絶妙瀛奎律髓巻六

body:
  text: 瀛奎律髓卷二十八元方回編陵廟類君陵臣墓大廟小祠或官為禁樵採或民間香火祭賽不容遏蓋聖賢之藏所宜重而鬼神有靈亦本無容心於其間也屈子是以有山鬼國殤之騷詩人有降迎送神之詞生敬死哀寧無感乎五言二十首經鄒魯祭孔子而歎之唐明皇夫子何為者栖栖一代中地猶鄹氏邑宅即魯王宫歎鳳嗟身否傷麟怨道窮今看兩楹奠當與夢時同此祭孔子必於其廟所謂宅即魯王宫也魯共王壞孔子舊宅以為宫室後所謂靈光殿者巋然獨存豈非以孔子之故哉豫過兖州東望洙泗而識孔子之所在惜不及一往拜奠讀此詩為之悵然三四以下俱佳重過昭陵杜甫草昧英雄起謳歌厯數歸風塵三尺劍社稷一戎衣翼亮貞文德丕承戢武威聖圖天廣大宗祀日光輝陵寢盤空曲熊羆守翠微再窺松柏路還見五雲飛老杜先有行次昭陵五言唐律首云舊俗疲庸主羣雄問獨夫讖歸龍鳳質威定虎狼都又云文物多師古朝廷半老儒可謂善頌唐太宗以多不選此篇前八句字字佳禹廟禹廟空山裏秋風落日斜荒庭垂橘柚古屋畫龍蛇雲氣生虛壁江聲走白沙早知乘四載疏鑿控三巴凡唐人祠廟詩皆不能出老杜此等局段之外二詩蓋絶唱也湘夫人祠肅肅湘妃廟空牆碧水春蟲書玉佩蘚燕舞翠帷塵晚泊登汀樹微香借渚蘋蒼梧恨不盡染淚在叢筠閬州别房太尉墓他鄉復行役駐馬别孤墳近淚無乾土低空有斷雲對碁陪謝傅把劍覔徐君惟見林花落鶯啼送客聞少陵因救房公琯而去諫職閬州别墓足見少陵於交誼不薄也第一句是十分好他鄉已為客矣於客之中又復行役則愈客愈逺此句中折旋法也近淚無乾土尤佳淚一作哭可謂痛之至而哭之多矣對碁把劍一聨一指生前房公之待少陵為何如一指身後少陵之所以感房公為何如詩之不茍如此其後房公改葬東都少陵復有二詩更痛切悲悼前云一德興王後孤魂久客間後云風塵終不解江漢忽同流乃知陳后山丘原無起日江漢有東流實本諸此句法同詩意不同蜀先主廟劉禹鍚天下英雄氣千秋尚凛然勢分三足鼎業復五銖錢得相能開國生兒不象賢淒涼蜀故妓來舞魏宫前元注漢末稱黃牛白腹五銖當復胡淡菴有詩云須令民去思如漢思五銖自注謂五銖起於元狩五年新室罷之民思以五銖市買莽法復挾五銖者投四裔光武因馬援言復之民以為便董卓悉壞五銖曹操為相復之自魏至梁陳周隋皆以五銖為便唐武德四年鑄開通元寶五銖始不復見夢得此詩用三足鼎五銖錢可謂精當然末句非事實也蜀固亡矣魏亦豈為存哉其業已屬司馬氏矣諸葛公之子死於難不為先主羞而魏之羣臣舉國以授晉則何滅蜀之有哉經伏波神祠蒙蒙篁竹下有路上壺頭漢壘麏鼯鬭蠻溪霧雨愁懷人敬遺像閲世指東流自負霸王略安知恩澤侯鄉關辭石柱筋力盡炎州一以功名纍翻思馬少遊能道馬伏波心事此公筆端老辣髙處不減少陵山中古祠張籍春草空祠處荒林唯鳥飛紀年碑石在經亂祭人稀野鼠緣朱帳陰塵蓋畫衣近來潭水黑時見宿龍歸平易而新美漂母墓劉長卿昔賢懷一飯兹事已千秋古墓樵人識前朝楚水流渚蘋行客薦山木杜鵑愁春草綿綿緑王孫舊此遊長卿意深不露第四句蓋謂楚亡漢亡惟有流水耳一漂母之墓樵人猶能識之亦以其有一飯之德於時耳屈原廟崔塗讒勝禍難防沈魂信可傷本圖安楚國不是怨懷王廟古碑無字洲晴蕙有香獨醒人尚少誰與奠椒漿三四句説得屈原心事好古冢曹松代逺已難問纍纍似古城民田侵不盡客路踏還平作穴蛇分蟄依岡鹿繞行唯應風雨夕鬼火出林明盡古冢之態淮陰侯廟梅堯臣漢家天下將廟古像公圭百戰自亡楚一時空王齊鄉人奏簫鼓舟子賽豚雞不改寒潮水朝平暮復低先有古詩一首末云髙皇四海平有酒不共釂古來稱英雄去就可以照此律詩亦佳新開墳路古徑約城斜鋤荒可過車直穿深篠去不比繞村賖伐樹侵籬腳裨塍掘澗沙欲為蘭若處松柏屬吾家五六細潤古冢南陽道中作南陽古原上荒冢若魚鱗劍佩不為土衣冠應化塵枯骸托魑魅細草沒麒麟何必問名氏漢家多近親五六佳和叔才岸傍古廟王安石樹老垂纓亂祠荒向水開偶人經雨踣古屋為風摧野鳥棲塵座漁郎奠竹杯欲傳山鬼曲無奈楚詞哀三四句佳雙廟兩公天下駿無地與騰驤就死得處所至今猶耿光中原擅兵革昔日幾侯王此獨身如在誰令國不亡北風吹樹急西日照窗涼志士千年淚泠然落奠觴荆公題雙廟云北風吹樹急西日照窗涼及詳味之其托意深逺非止詠景物而已蓋巡逺守睢陽當時安慶緒遣突厥徑兵攻之日以危困所謂北風吹樹急也是時肅宗在靈武號令不行於江淮諸將觀望莫肯救之所謂西日照窗涼也此深得老杜句法如老杜題蜀相廟映階碧草自春色隔葉黃鸝空好音亦自托意其中矣上王荆公墓曽肇天上龍胡斷人間鵩鳥來未應淮水竭所惜泰山頺華屋今非昔佳城閉不開白頭門下士悵望有餘哀諸曾皆出王半山門下此言亦恐太過元祐時王氏在金陵寂寞張芝叟名舜民詩亦譏之紹聖而後紹述禍作乃漸張大以至南渡乃少損云光武廟徐照帳閉爐煙聚山龍帝者衣真人元有道社鬼忽無威畫剝金猶在碑平字半非鼓鳴村犬吠祭罷數翁歸五六妙但是廟俱可用郭璞墓劉克莊先生精數學卜穴未應疏因捋虎鬚死還尋魚腹居如何師鬼谷卻去友靈胥此理憑誰詰人方寶葬書譏青囊之術不靈其説亦是堯廟帝與天同大天存帝亦存桑麻通絶徼簫鼓出深村水至孤亭合山居列岫尊尚餘土階意樵牧踐籬藩起句十字能言堯之大末句十字能言堯之小惟其能土階之小所以能與天地同大也七言三十二首蜀相杜甫丞相祠堂何處尋錦官城外柏森森映階碧草自春色隔葉黃鸝空好音三顧頻煩天下計兩朝開濟老臣心出師未捷身先死長使英雄淚滿襟子美流落劍南拳拳於武侯不忘其詠懷古迹於武侯云伯仲之間見伊吕指揮若定失蕭曹及此詩皆善頌孔明者長陵唐彥謙長陵髙闕此安劉附葬纍纍盡列侯豐上舊居無故里沛中原廟對荒丘耳聞明主提三尺服看愚民盜一抔千載豎儒騎瘦馬渭城斜日重回頭此漢髙帝陵也耳聞眼看或以為病然提三尺盜一抔屬對親切詩體如李義山彥謙又有警句云煙橫博望乘槎水月上文王避雨陵茂陵李商隱漢家天馬出蒲梢苜蓿榴花遍近郊內苑只知銜鳳觜屬車無復插雞翹玉桃偷得憐方朔金屋粧成貯阿嬌誰料蘇卿老歸國茂陵松柏雨瀟瀟義山詩織組有餘細味之格律亦不為髙此詩譏誚漢武甚矣謂驕侈如此終歸於盡也題濮廟曹鄴曉祭瑶齋夜叩鐘鰲頭風起浪重重人間直有仙桃種海上應無肉馬蹤赤水夢沉迷象罔翠華恩斷泣芙蓉不知皇帝三宫駐始向人間著衮龍詩體似李義山巫山神女廟劉禹錫巫山十二鬱蒼蒼片石亭亭號女郎曉霧乍開疑卷幔山花欲謝似殘粧星河好夜聞清佩雲雨歸時帶異香何事神仙九天上人間來就楚襄王尾句譏之良是然本無此事也詞人寓言耳陽山廟觀賽神元注梁松南征至此遂為神在朗州漢家都尉舊征蠻血食如今配此山曲蓋深幽蒼檜下洞簫愁絶翠屛間荆巫脈脈傳神語野老娑娑啓醉顔日落風生廟門外幾人連踏竹歌還豫嘗遊此廟在今常德府北三十里似不當祭之人馬伏波為其所傾者蘇武廟溫庭筠蘇武魂銷漢使前古祠髙樹兩茫然雲邊雁斷胡天月隴上羊歸塞草煙回日樓臺非甲帳去時冠劍是丁年茂陵不見封侯印空向秋波哭逝川此見别集甲帳丁年甚工亦近義山體陳琳墓曽於青史見遺文今日飄零過古墳詞客有靈應識我霸才無主始憐君石麟埋沒藏秋草銅雀淒涼起暮雲莫怪臨風倍惆悵欲將書劍學從軍謂曹操有無君之志而後用此等人甚妙黃陵廟李羣玉小孤洲北浦雲邊二女明糚共儼然野廟向江春寂寂古碑無字草芊芊東風近墓吹芳芷落日深山哭杜鵑猶似含嚬望巡狩九疑如黛隔湘川第六句好春日拜壠經田家梅堯臣田家春作日日近丹杏破萼場圃頭南嶺禽過北嶺呌髙田水入低田流桑芽將綻霧露裛蠶子未浴箱筐收今我還朝固不逺紫宸已夢瞻珠旒此乃田家詩然題有拜壠二字以附此經秦皇墓魯交祖龍何事苦東巡仙駕歸來冢草新項籍已飛三月火子嬰猶醉六宫春元來滄海殊無藥卻是芒碭暗有人自古乾坤屬真主驪山山下好霑巾潼川人魯交詩曰三江集山谷稱為魯三江今從之三四謂項羽之起不待至咸陽而三月之火已然矣子嬰猶未悟也五六尤佳獨末後一句頗俗過井陘淮陰侯廟韓琦破趙降燕業已成兔亡良犬日圖烹家僮上變安知實史筆加誣貴有名功蓋一時誠不滅恨埋千古欲誰明荒祠尚枕陘間道澗水空傳哽咽聲三四明韓不反此長者之言足慰淮陰於地下也冬至祀墳至日郊原擁節旄先塋躬得奉牲醪霜威壓野寒方重山色凌虛氣自髙衣錦不來誇富貴報親惟切念劬勞連村父老歡相迓因勸勤耕候土膏此熙寧元年戊申冬詩自長安被召不入再領鄉郡三四句格如其造語元日祀墳馬上三朝偏喜得晴和嵗美民康此驗多天運主生方啓户土膏乘暖已騰波雪憑空濶髙低在風引韶妍次第過霽靄正開先壠近太行晡景上嵯峨此熙寧二年己酉元日詩魏公三領鄉郡拜墳之詩極多今選八首為人子孫全功名保富貴節義文章萬世無歉者公一人而已今選其詩以寓敬仰癸丑初拜先墳書錦三來治鄴城古人無似此公榮首過先壠心還慰一見家山眼自明釃酒故廬延父老駐車平野問農耕便思解綬從田叟報國慚惟萬死輕此熙寧六年自中山三領鄉郡時詩次日早起西墳風入旌旗撼曉光兩塋親展喜非常濃陰蔽野瞻喬木逸勢橫天認太行自歎重茵寧及養縱垂三組敢誇鄉路人或指榮雖甚明哲何如漢子房三四下一句壯甚秋風赴先塋馬上暫趨先壠弭旗旄因恤吾民穡事勞穀實已傷嗟嵗廪麥根雖立望春膏林疏山骨清彌瘦天濶詩魂病亦豪田舍罕逢車騎過聚門村婦擁兒曹魏公襟量古之所謂大臣然詩句亦騷此詩第六句是也初冬祀墳曉來輕冷上平岡西欵親塋一舍強帶靄逺峰時隱見半霜殘葉雜青黃來牟渴雨空成壠鴻雁衝雲自著行此日初冬嚴祀事只增悽惕不夸鄉五六峭健西享先墳已致誠卻嚴軒從指東塋鴻驚去斾參差起馬避柔桑詰曲行農寓兵來間即教牛無休日旱猶耕病翁寡術蘇疲瘵徒勸民心厚所生第四句見鄉里間行馬之態河朔素有民兵第五句又自兼言公事第六句愛民之至也乙卯寒食祀墳鄉守三逢禁火天每驅旌纛掃松阡衰殘豈足酬恩遇光寵徒知及祖先望極西山饒勝氣樂舒東户革荒年何時歸處墳廬下不假蘇秦負郭田此熙寧八年乙卯也五六饒字革字甚佳魏公詩不茍如此宋宰相能詩者多夏竦丁謂王圭王安石事業狼狽惟寇萊公魏公功臣詩人兩無愧云魏公重修五代祖塋域記云夫謹家牒而心不忘乎先塋者孝之大也惟墳墓祭祀之有托故子孫以不絶為重自志於學每見祖先所為文字與家世銘志則知寶而藏之遺逸者常精意收掇未始少懈時編嵗緝寖以大備其所志先域之所在雖距今百有餘年必思博訪而得之卒不墜先業推及先域之八世得以嵗時奉祀少慰九原之志向使宗牒之不謹祖先文字不傳雖有孝於祖先之心欲究其宅兆而嚴事之其可得乎嚴陵祠堂王安石漢庭來見一羊裘默默俄歸舊釣舟迹似磻溪應有待世無西伯可能留﨑嶇馮衍才終廢索寞桓談道不謀勺水果非鱣鮪地放身滄海亦何求放馮衍黜桓談此固光武之失然子陵心事亦未必然介甫豈以英廟時召不肯起借嚴為喻耶然介甫不知人韓魏公之為相仁英之為主而猶不滿可乎狄梁公陶淵明俱為彭澤今至今有廟在焉刁景純作詩繼以一篇梁公壯節就夔魖陶令清身托酒徒政在房陵成底事年稱甲子亦何須江山彭澤空遺像嵗月柴桑失故區末俗此風猶不競詩翁歎息未應無梁公立武后朝晚節不差未可毁也淵明則無可訾矣半山好為異論謂年稱甲子亦何須則淵明亦無足取耶只第七句一繳謂此等人今世亦無之庶可發慨歎耳小姑小姑未嫁與蘭支何限流傳樂府詩初學水仙騎赤鯉竟尋山鬼從文貍繽紛雲襡空棠楫綽約煙鬟獨桂旗弄玉有祠終或往飛瓊無夢故難知小孤山之神訛為小姑澎浪磯訛為彭郎此不過循名騁博作此詩然實筆力不可及題裴晉公祠張耒獨持將鉞靜氛妖後世英名日月昭善聽聖君非易遇將亡凶豎不難梟悲風蔓草移今古野殿空庭鎖寂寥更有從軍老司馬勒銘文字配咸韶三四謂元濟易擒憲宗難遇良是謁太昊祠千里垂精帝道尊神祠近在國西門風搖廣殿松杉老雨入修廊羽衛昏日落狐狸號草莽年豐父老薦雞豚舊遊零落今誰在塵壁蒼茫字半存老杜先主廟詩翠華想象空山裏玉殿虛無野寺中古廟松杉巢水鶴嵗時伏臘走村翁此中詩句全相似東山謁外大父墓陳師道土山宛轉屈蒼龍下有槃槃蓋世翁萬木刺天元自直叢篁侵道更須東百年富貴今誰見一代功名託至公少日拊頭期類我暮年垂淚灑西風后山先母夫人皇祐丞相龎公籍之女初丞相父格官彭城丞相與孔道輔從后山祖洎遊而成此姻后山父諱琪字寶之受丞相恩仕至國子博士通判綘州熙寧九年卒年六十母夫人紹聖二年卒年七十七嵗靈惠公廟汪藻臺殿崇崇冠冢巔行人跪起白雲邊山河霸業三千里歌舞靈衣五百年鐵馬威神通異域衮龍書命降中天偃王遺種班班在好乞韓碑記邈綿邈一作遜元注宣歙間有主嶺靈惠公廟存焉靈惠余祖也隋末有宣徽之衆本朝以陰兵佐邊境錫今封余通守宣城故用韓碑故事王姓汪諱華以六郡歸唐廟今號忠烈封八字王主嶺廟在績溪而墓在歙縣北七里雲嵐橋又廟在郡城烏聊山香火特盛每以嵗正月十八日賽祀踰旬凡此郡汪姓皆其後浮溪先生藻字彥章中興詞臣之最浮溪者婺源地名先生故居以名其集末句用昌黎徐偃王碑事意婉他本改記邈綿三字為萬古傳徒張大而無味浮溪欲與作碑而自夸乎元和九年徐氏放為刺史而汪浮溪謂亦汪王之後故用此事韓文公為刺史徐放作偃王廟記其辭曰秦傑以顛徐由邈綿徐偃王名誕廟在衢州西安縣南七十里靈山下韓愈撰廟碑題夫差廟范成大縱敵稽山禍已胎垂涎上國更荒哉不知養虎自遺患只道求魚無後災夢見梧桐生後圃眼看麋鹿上髙臺千齡只恐忠臣恨化作濤江雪浪堆此詩起句末句俱好兩後字不相妨九日行營夀藏之地家山隨處可松楸荷插攜壺似醉劉縱有千年鐵門限終須一箇土饅頭三輪世界猶灰劫四大形骸強首丘螻蟻烏鳶何厚薄臨風撫掌菊花秋得夀藏先隴之旁密邇松楸地一隅會心何必問青烏亢宗雖愧鎮公子沒世尚從先大夫京兆漢阡賢聞望邢山鄭冢儉規模家庭遺訓焄蒿在不學邠卿畫古圖自古皆有死二詩逹矣劉屯田墓壯節亭尤袤西澗當年卜考槃便於神武挂衣冠後生無復知前輩故老猶能説長官三尺荒墳埋玉冷百年壯節倚天寒表章賴有羣賢力誰把生芻奠酒盤劉屯田諱渙字凝之后山所謂身在菰蒲中名滿天地間者是也子恕字道原父子名塞天下尤延之詩語不驚人細咀有味過虞美人墓潘柳樽前一曲奈何歌千古英雄恨不磨女子在軍今莫問君王愎諫向來多最憐秋雨添狐穴誰與春醪酹棘窠一朽何須論異域寄聲青冢太媕婀此奉使時詩亦有議論瀛奎律髓卷二十八

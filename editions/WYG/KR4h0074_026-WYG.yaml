body:
  text: 瀛奎律髓巻二十六元方回編變體類周伯㢸詩體分四實四虚前後虚實之異夫詩止此四體耶然有大手筆焉變化不同用一句説景用一句説情或先後或不測此一聨既然矣則彼一聨如何處置今選於左併取夫用字虚實輕重外若不等而意脈體格實佳與凡變例之一二書之五言十首上已日徐司録林園宴集杜甫鬂毛垂領白花蘂亞枝紅欹倒衰年廢招尋令節同薄衣臨積水吹面受和風有喜留攀桂無勞問轉蓬鬂毛垂領白言我之形容情也花蘂亞枝紅言彼之物色景也既如此開劈下面似乎難繼却再着一句應上句形容其老為可憐又着一句言不孤物色之意然後五六一聨皆是以情穿景然結句亦不弱也尚雙峙力繳惟老杜能之惟黄陳能之惟曾茶山趙章泉能之如重過何氏四句云蹉跎暮容色悵望好林泉何日沾微禄歸山買薄田此等變格豈小手段分二十字巧粧纎刻者能之乎江漲又呈竇使君向晚波微緑連空岸却青日兼春有暮愁與醉無醒漂泊猶杯酒踟蹰此驛亭相看萬里别同是一浮萍日且暮春亦且暮景也愁不醒醉亦不醒情也以輕對重為變體且交互四字如秤分星云屏跡用拙存吾道幽居近物情桑麻深雨露燕雀半生成村鼔時時急漁舟箇箇輕杖藜從白首心跡喜雙清或問雨露二字雙重生成二字雙輕可以為法乎雨自對露生自對成此輕重各對之法也必善學者始能之憶江上吳處士賈島閩國揚帆去蟾蜍虧復圓秋風吹渭水落葉滿長安此地聚㑹夕當時雷雨寒蘭橈殊未返消息海雲端或問此詩何以謂之變體豈秋風吹渭水落葉滿長安為壯乎曰不然此即唐人春還上林苑花滿洛陽城也其變處乃是此地聚㑹夕當時雷雨寒人所不敢言者或曰以雷雨對聚㑹不偏枯乎曰兩輕兩重自相對乃更有力但謂之變體則不可常爾病起嵩丘歸未得空自責遲回身事豈能遂蘭花又已開病令新作少雨阻故人來燈下南華巻祛愁當酒杯老杜此等體多於七言律詩中變獨賈浪仙乃能於五言律詩中變是可喜也昧者必謂身事不可對蘭花二字然細味之乃殊有味以十字一串貫意而一情一景自然明白下聨更用雨字對病字甚為不切而意極切真是好詩變體之妙者也若往往語復黙微微雨洒松則其變太厓異而生澁矣寓北原作登原見城闕䇿蹇畏炎天日午路中客槐花風處蟬逺山秦樹上清渭漢陵前何事居人世皆從名利牽日午路中客一句似麤疎槐花風處蟬一句却細宻亦變體也秦樹漢陵及尾句俱佳寄宋州田中丞古郡近南徐關河萬里餘相思深夜後未答去年書自别知音少難忘識面初舊山期已久門掩數畦蔬相思深夜後未答去年書初看甚淡細看十字一串不喫力而有味浪仙善用此體如白髪初相識秋山擬共登如羡君無白髪走馬過黄河如萬水千山路孤舟一月程皆句法之變也如自别知音少難忘識面初又當截上二字下三字分為兩段而觀方見深味葢謂自相别之後知音者少自别二字極有力而最難忘者尤在識面之初老杜有此句法每語見許文章伯之類是也不寐防巴虎全生狎楚童亦是也山谷欲嗔王母惜稍慧女兄誇亦是也寄張文潛舍人陳師道今代張平子雄深次子長名髙三俊上官立右螭傍車笠吾何恨飛騰子莫量時平身早達未用夢凝香君乘車我戴笠他日相逢下車揖此所謂車笠之盟也車笠二字實以對飛騰二虚字可乎曰老杜雨露對生成有例后山又有詩曰預知河嶺阻不作往來頻聲言随地改吳越到江分皆是以輕對重老柏有序勝果院後有柏見之二十餘年疎痩如故予寓其舍數以水灌之遂有生意庭柏無生意摧殘二十秋稍沾杯水潤已與歳寒謀黄裏青青出愁邊稍稍瘳㑹看笙鶴下暮雀莫深投黄裏青青出用三箇顔色字愁邊稍稍瘳却只平淡不帶顔色字此與襟三江帶五湖控蠻荆引甌越同例如張宛丘七言有曰白頭青鬂有存没落日斷霞無古今互換錯綜而此尤竒矣是為變體歳月那能記風霜亦飽經槁乾仍故節潤澤出新青色與江波共聲留静夜聽輝輝垂重露㸃㸃綴流螢尾句謂柏葉之上輝輝垂重露遥見之者如㸃㸃綴流螢也試嘗於月下看樹木皆然老杜云月明垂葉露此句暗合唐人詩聽雨寒更盡開門落葉深微陽下喬木逺燒入秋山與此同例是為變體七言十九首江上值水如海勢聊短述杜甫為人性僻耽佳句語不驚人死不休老去詩篇渾漫與春來花鳥莫深愁新添水檻供垂釣故着浮槎替入舟焉得思如陶謝手令渠述作與同游以詩篇對花鳥此為變體後來者又善於推廣云九日重陽獨酌盃中酒抱病起登江上臺竹葉於人既無分菊花從此不須開殊方日落𤣥猿哭舊國霜前白雁來弟妹蕭條各何在干戈衰謝兩相催此竹葉酒也以對菊花是為真對假亦變體於人既無分從此不須開於虚字上十分着力去年登髙郪縣北今日重在涪江濵苦遭白髪不相放羞見黄花無數新世亂鬱鬱乆為客路難悠悠長傍人酒䦨却憶十年事腸斷驪山清路塵此兩首皆當入節序類以其為變體之祖故入此白髪人事也黄花天時也亦景對情之謂後人九日詩無不以白髪對黄花皆本老杜如即今蓬鬂改但愧菊花開亦是苦遭羞見乃虚字着力處齊山杜牧江涵秋影雁初飛與客携壺上翠微塵世難逢開口笑菊花須挿滿頭歸但將酩酊酬佳節不用登臨怨落暉古往今來只如此牛山何必淚沾衣此以塵世對菊花開闔抑揚殊無斧鑿痕又變體之俊者後人得其法則詩如禪家散聖矣送春蘇軾夢裏青春可得追欲將詩句絆餘暉酒䦨病客惟思睡蜜熟黄蜂亦嬾飛芍藥櫻桃俱掃地鬂絲禪榻兩忘機慿君借取法界觀一洗人間萬事非酒䦨病客惟思睡我也情也蜜熟黄蜂亦嬾飛物也景也芍藥櫻桃俱掃地景也鬂絲禪榻兩忘機情也一輕一重一來一往所謂四實四虚前後虚實又當何如下手至此則知繫風捕影未易言矣坡妙年詩律頗寛至晚年乃神妙流動首夏官舍即事安石榴花開最遲絳裙深樹出幽菲吾廬想見無限好客子倦遊胡不歸座上一樽雖得滿古來四事巧相違令人却憶湖邊寺垂柳隂隂書掩扉此詩變體他人殆難繼也首唱兩句自説榴花下面如何着語似乎甚難却自想吾盧之好而恨此身之未歸第五第六却又謂不是無酒只是心事自不樂爾至尾句却又擺脱而歸宿於湖上之寺葢謂雖未可遽歸一出遊僧舍亦可也變體如此難學姑書之以見蘇公大手筆之異如初夏賀新郎詞後一段全説榴花亦他人所不能也如老杜即看燕子入山扉以下四句説景却將四句説情則甚易爾善變者將四句説景括作一句又將四句説情括作一句以成一聨斯謂之難次韻葢郎中率郭郎中休官黄庭堅世態已更千變盡心源不受一塵侵一作險阻艱難親得力是非憂患飽經心青春白日無公事紫燕黄鸝俱好音付與兒孫知伏臘聽教魚鳥遂飛沉黄公壚下曽知味定是逃禪入少林青春白日紫燕黄鸝變體次韻郭右曹閲世行將老斵輪那能不朽見仍雲歳中日月又除盡聖處工夫無半分秋水寒沙魚得計南山濃霧豹成文古心自有着鞭地尺璧分隂未當勤歳中日月又除盡景也聖處工夫無半分情也賈島身事豈能遂蘭花又已開當一律觀老杜竹葉菊花一聨又白髪黄花一聨即是此様手段和師厚郊居示里中諸君籬邊黄菊關心事牕外青山不世情江橘千頭供歳計秋蛙一部洗朝酲歸鴻往燕競時節宿草新墳多友生身後功名空自重眼前樽酒未宜輕歸鴻往燕競時節天時也宿草新墳多友生人事也亦一景對一情上面四句用菊山橘蛙四物亦不覺冗山谷詩變體極多明月清風非俗物輕裘肥馬謝兒曹功名富貴兩蝸角險阻艱難一酒杯春風春雨花經眼江北江南水拍天碧嶂清江元有宅黄魚紫蟹不論錢上八字各自為對如洞庭歸客有佳句庾嶺疎梅如小棠公庭休更進湯餅語燕無人窺井欄則變之又變在律詩中神動鬼飛不可測也次韻春懷陳師道老形已具臂膝痛春事無多櫻笋來敗絮不温生蟣蝨大杯覆酒着塵埃衰年此日仍為客舊國當時只廢臺河嶺尚堪供極目少年為句未須哀后山詩痩鉄屈蟠海底珊瑚枝不足以喻其深勁老形已具臂膝痛身欲老也春事無多櫻笋來春欲盡也前輩詩中千百人無后山此二句以一句情對一句景輕重彼我沉着深鬱中有無窮之味是為變體至如蟣蝨塵埃一聨所用字有前例亦佳早起隣雞接響作三鳴殘㸃連聲殺五更寒氣挾霜侵敗絮賓鴻將子度微明有家無食惟髙枕百巧千窮只短檠翰墨日疎身日逺世間安得尚虚名有家無食百巧千窮各自為對變體也如寒氣挾霜侵敗絮賓鴻將子度微明輕重互換愈見其妙一篇之中四句皆用變體如熟路長驅聊緩步百全一發不虚弦即此所評之變體如喬木下泉餘故國黄鸝白鳥解人情含紅破白連連好度水吹香故故長隠儿忘言終不近白頭青簡兩相催不以顔色對顔色猶不以數目對數目而各自為對皆變體也春日張耒輝輝暖日弄游絲風軟晴雲緩緩飛殘雪暗隨氷筍滴新春偷向桞梢歸可憐客鬂蹉跎老每惜梅花取次稀何事都城輕薄子買懽沽酒試春衣此亦以客鬂對梅花皆自老杜鬂毛花蕋一聨發之懷天經智老因以訪之陳與義今年二月凍初融睡起苕溪緑向東客子光隂詩巻裏杏花消息雨聲中西庵禪伯還多病北柵儒仙只固窮忽憶輕舟尋二子綸巾鶴氅試春風以客子對杏花以雨聲對詩巻一我一物一情一景變化至此乃老杜即今蓬鬂改但愧菊花開賈島身事豈能遂蘭花又已開翻窠換臼至簡齋而益竒也后山老形已具臂膝痛春事無多櫻笋來一聨極其酸苦而此聨有富貴閒雅之味后山窮簡齋達亦可覘云寓居劉倉廨中晚步過鄭倉臺上紗巾竹杖過荒陂滿面春風二月時世事紛紛人老易春隂漠漠絮飛遲士衡去國三間屋子美登臺七字詩草遶天西青不盡故園歸計入支頤以世事對春隂以人老對絮飛一句情一句景與前客子杏花之句律令無異但如此下兩句后面難措手簡齋胸次却㑹變化斡旋全不覺難此變體之極也重陽去歳重陽已百憂今年依舊歎羈遊籬底菊花惟解笑鏡中頭髪不禁秋凉風又落宫南木老雁孤鳴漢北洲如許行年那可記謾排詩句寫新愁菊花對頭髪即老杜蓬鬂菊花一聨定例對酒新詩滿眼不能裁鳥度雲移落酒杯官裏簿書無日了樓頭風雨見秋來是非衮衮書生老歳月匆匆燕子囘笑撫江南竹根枕一樽呼起鼻中雷此詩中兩聨俱用變體各以一句説情一句説景竒矣坡詞有云官事何時畢風雨外無多日即前聨意也後聨即與前詩世事紛紛春隂漠漠一聨用意亦同是為變體學許渾詩者能之乎此非深透老杜山谷后山三關不能也陪粹翁舉酒於君子亭亭下海棠方開世故驅人殊未央聊從地主借繩牀春風浩浩吹遊子暮雨霏霏濕海棠去國衣冠無態度隔簾花葉有輝光使君禮數能寛否酒味撩人我欲狂此詩中四句皆變兩句説已兩句説花而錯綜用之意謂花自好人自愁耳亦其才能驅駕豈若瑣瑣鐫砌者之詩哉清明清明閒步澗邊沙行入荒林聞亂鴉寒食清明驚客意暖風遲日醉梨花書生投老王官谷壯士偷生漂母家不用鞦韆與蹴踘只將詩句答年華三四變體又頗新異嗚呼古今詩人當以老杜山谷后山簡齋四家為一祖三宗餘可預配饗者有數焉睡起憨憨與世共兒嬉兀兀從人笑我癡閒裏事忙晴㬠藥静中機動夜争棋心情詩巻無佳句時節梅花有好枝熟睡覺來何所欠菜根香軟飯流匙淳熙十四年丁未春石湖作此詩年六十二可作平生詩第一心情詩巻無佳句言情思時節梅花有好枝言景物詩變體至此不可加矣上兩句又自不覺其冗絶作也瀛奎律髓巻二十六

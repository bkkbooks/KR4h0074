body:
  text: 瀛奎律髓巻十八元方回編茶類茶之興味自唐陸羽始今天下無貴賤不可一餉不啜茶且其𣙜與鹽酒並為國利而士大夫尤嗜其品之髙者盧仝一歌至飲七椀以竒語豪思發茶之神工妙用然首閲月團三百片則必不精達官送一處士茶雖佳亦不至如是之多啜茶者皆是也知茶之味者亦鮮矣五言十三首送陸羽皇甫曽千峰待逋客香茗復叢生採摘知一作尋深處煙霞羨獨行幽期山寺逺野飯石泉清寂寂燃燈夜相思磬一聲茶之盛行自陸羽始止是碾磑茶耳其妙處在於别水味盧仝所謂首閲月團三百片恐團茶不應如是之多多則必不精也今則江茶最富為末茶湖南西川江東浙西為芽茶青茶烏茶惟建寧甲天下為餅茶廣西修江亦有片茶雙井䝉頂顧渚壑源一時不可卒數南人一日之間不可無數杯北人和揉酥酪雜物蜀人又特入白土皆古之所無有也羽死號為茶神故取此一首為茶詩之冠故人寄茶曹鄴劍外九華英緘題下玉京開時微月上碾處亂泉聲半夜招僧至孤吟對月烹碧沉霞脚碎香泛乳花輕六府睡神去數朝詩思清月餘不敢費留伴肘書行睡神詩思之聨極切於茶煎茶丁謂開緘試雨前須汲逺山泉自遶風爐立誰聽石碾眠細微縁入麝猛沸恰如蟬羅細烹還好鐺新味更全花隨僧筯破雲逐客甌圓痛惜藏書篋堅留待雪天睡醒思滿啜吟困憶重煎祇此消塵慮何須作酒仙堅留佳茗以待雪天此一句無人曾道尾句却説不須飲酒乃常例也閤門水元註朝堂嘉祐元年九月九日宿齋歐陽永叔張叔之孫之翰㑹賦梅堯臣宮井固非一獨傳甘與清釀成光禄酒調作太官羮上舍銀瓶貯齋廬玉茗烹相如方病渴空聽轆轤聲此山谷詩所謂閤門水不落第二竟陵谷簾定誤書者也專宜煎茶故附之茶類中吳正仲遺新茶十片建溪春乾雲碾作塵天王初受貢楚客已烹新漏泄闗山吏悲哀草土臣捧之何敢啜聊跪北堂親三四即盧仝至尊之餘合王公何事便到山人家也此詩聖俞五十二居母憂時所以用悲哀草土臣聊跪北堂親乃奠酹之意也穎公遺碧霄峰茗到山春已晚何更有新茶峰頂應多雨天寒始發芽採時林狖靜烹處石泉嘉持作衣囊秘分來五柳家中四句精工不可言建溪新茗南國溪隂暖先春發茗芽採從青竹籠蒸自白雲家粟粒烹甌起龍文御餅嘉過兹安得此一作比顧渚不須誇矞雲龍小餅先朝以為近臣之異賜建茶為天下第一廣西修江胯茶次之南渡後宫禁嬪御日所飲用即此品胯茶修四寸博三寸許人亦罕有芽茶則多品矣茶磨楚匠斫山骨折檀為轉臍乾坤人力内日月蟻行迷吐雪誇春茗堆雲憶舊溪北歸惟此急藥臼不須齎仕宦而擕茶磨其石不輕亦一癖也寧不擕藥臼而擕此物可謂嗜茶之至者建茶呈使君學士李虚己石乳標竒品瓊英碾細文試將梁苑雪煎動建溪雲清味通宵在餘香隔坐聞遥思摘山日龍焙未春分八句皆佳三四崑體也凡崑體必於一物之上入故事人名年代及金玉錦繡等以實之謝人送壑源絶品云九重所賜也曾幾三伏汗如雨終朝霑我裳誰分金掌露來作玉溪凉别甑軟炊飯小爐深炷香麯生何等物不與汝同鄉元註别甑炊香飯供養于此人禪家語也詩格清峭廸姪屢餉新茶吾家今小阮有使附書頻喚起南柯夢持來北焙春顧予多下駟况復似陳人不是能分少其誰遣食新勅廚羞煮餅掃地供爐芬湯鼎聊從事茶甌遂策勲興來吾不淺送似汝良勤欲作柯山㸃元註俗所謂衢㸃也當令阿造分元註造姪妙于擊拂述姪餉日鑄茶寳胯自不乏山芽安可無子能來日鑄吾得具風爐夏木囀黄鳥僧窗行白駒談多喚坐睡此味政時須茶山詩觀其格已高人一頭地觀其用字着語句殆鍜鍊不一時也日鑄以對風爐湯鼎以對茶甌南柯以對北焙分少以對食新此本老杜賞應歌枤杜喜收京軍捷可用也忽着下一句曰歸及薦櫻桃本非切對而化為佳對後之詩人皆祖之七言八首夜聞賈常州崔湖州茶山境㑹想羡歡宴因寄此詩白居昜遥聞境㑹茶山夜珠翠歌鐘俱繞身盤下中分兩州界燈前合作一家春青娥遞舞應爭妙紫笋齊嘗各鬬新自歎花時北窗下蒲萄酒對病眠人元註時馬墜損腰正飲蒲萄酒此可備故事和伯恭自造新茶余靖郡庭無訟即仙家野圃栽成紫筍茶疎雨半晴回暖氣輕雷初過得新芽烘褫精謹松齋靜採擷縈迂澗路斜江水對煎萍髣髴越甌新試雪交加一槍試焙春尤早三椀搜腸句更嘉多藉彩牋貽雅唱想資詩筆思無涯依韻和杜相公謝蔡君謨寄茶梅堯臣天子嵗嘗龍焙茶茶官催摘雨前芽團香已入中都府鬬品爭傳太傅家小石冷泉留早味紫泥新品泛春華吳中内史才多少從此蒓羮不足誇因茶而薄蓴羮是亦至論陸機以蓴羮對晉武帝羊酪是時未尚茶耳然張華博物志已有真茶令人不寐之説次韻曹輔寄壑源試焙新芽蘇軾仙山靈草濕行雲洗遍香肌粉未勻明月來投玉川子清風吹破武林春要知玉雪心腸好不是膏油首面新戲作小詩君勿笑從來佳茗似佳人此謂壑源新芽自如玉雪不似餅茶團茶外若膏油之沃也故云佳茗似佳人汲江煎茶活火仍須活水烹自臨釣石汲深清大瓢貯月歸春甕小杓分江入夜瓶雪乳已翻煎處脚松風忽作瀉時聲枯腸未易禁三椀卧數荒城長短更楊誠齋大賞此詩謂自臨釣石取深清深也清也近石也又非常石乃釣石不令僕取而自取之也一句含數意三四尤竒吳傅朋送恵山泉兩瓶并所書石刻曾幾錫谷寒泉雙玉瓶故人捐恵意非輕疾風驟雨湯聲作淡月疎星茗事成新嵗綱頭須擊拂舊時水遞費經營銀鈎蠆尾増竒麗併得晴窗兩眼明逮子得龍團勝雪茶兩胯以歸予其直萬錢云移人尤物衆談誇持以趨庭意可嘉鮭菜自無三九種龍團空取十千茶烹嘗便恐成災怪把玩那能定等差賴有前賢小團例一囊深貯只傳家茶山嗜茶茶詩無一篇不清峭有竒骨李相公餉建溪新茗奉寄一書説盡故人情閩嶺春風入户庭碾處曾看眉上白元註茶家云碾茶須碾着眉上白乃為佳分時為見眼中青飯羮正晝成空洞枕簟通宵失杳㝠無奈筆端塵俗在更呼活水發銅瓶茶以碾而白為上品摘處佳人指甲黄碾時童子眉毛綠未極茶之妙也此第三句得之矣瀛奎律髓巻十八

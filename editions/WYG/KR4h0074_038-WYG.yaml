  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0074_WYG_038-1a, image: WYG1366/WYG1366-0444c.png}
body:
  text: 瀛奎律髓巻三十八元方回編逺外類汲冢周書有王㑹圖周官有象胥環人之職漢蒟醬卭竹蒲萄苜蓿安石榴皆自外國至逺人慕化而來使人將命而出以柔以撫其事不一形諸賦詠詭異譎觚於唐為多宋亦不無也五言十三首送褚山人歸日東賈島懸帆待秋色去入杳冥間東海幾年别中華此日還岸遙生白髪波盡露青山隔水相思在無書也是閒送黄知新歸安南池亭沈飲徧非獨曲江花地逺路穿海春歸冬到家火山難下雪瘴土不生茶知決移來計相逢期尚賖送朴處士歸新羅顧非熊少年離本國今去已成翁客夢孤舟裏鄉山積水東鼇沉崩巨岸龍鬭出遙空學得中華語將歸誰與同日東病僧項斯雲水絶歸路來時風送船不言身後事猶坐病中禪深壁藏燈影空牕出艾烟已無鄉土信起塔寺門前曲盡外國僧老病之味貢院鎖宿聞吕員外使髙麗贈送徐騎省聖化今無外征途莫憚賖揚帆箕子國駐節管寧家去伴千年鶴歸途八月槎離情限華省持此待疎麻送新羅使張籍萬里為朝使離家經幾年應知舊行路却上逺歸船夜泊避蛟窟朝炊求島泉悠悠到鄉國還望海西天贈東海僧别家行萬里自說過扶餘學得中州語能為外國書與毉收海藻持呪取龍魚更問同來伴天台幾處居送人游日本國方干蒼茫大荒外風教却難知連夜揚帆去經年到岸遲波濤含左界星斗定東維或有歸風便當為相見期第四句佳然今自明州定海出昌國徃徃順風六七日耳歲惟有此一番風徃來必經年也送僧歸日本國呉融滄溟分故國渺渺泛杯歸天盡終期到人生此别稀無風亦駭浪未午已斜暉繫帛何須雁金烏日日飛三四妙送朴山人歸新羅馬戴浩渺行無極揚帆但信風雲山過海半鄉樹入舟中波定遙天出沙平逺岸窮離心寄何處目斷暮霞東王昭君劉中叟歛袂出明光琵琶道路長初聞胡騎語未解漢宫粧薄命隨塵土元功屬廟堂蛾眉如有用慚愧羽林郎劉戲魚臺劉次莊也長沙人以開梅山入洞曉諭得官熙寧七年賜同進士出身仕至侍御江西漕送僧歸新羅姚鵠淼淼萬餘里扁舟發落暉滄溟何處别白首此時歸寒暑途中變人煙嶺外稀驚天巨鼇鬬蔽日大鵬飛雪入行沙屨雲生坐石衣漢風深得習休恨本心違七言四首送源中丞充新羅國册立使劉禹錫相門才子稱華簪持節東行捧德音面帶霜威辭鳯闕口傳天語到雞林煙開鼇背千尋碧日落鯨波萬頃金想見扶桑受恩後一時西拜盡傾心百濟新羅後皆為髙麗所併此詩中四句全佳贈日本僧智藏浮杯萬里過滄溟遍禮名山適性靈深夜降龍潭水黒新秋放鶴野田青身無彼我那懐土心㑹真如不讀經為問中華學道者幾人雄猛得寧馨三四遒麗五六有議論送和蕃公主張籍塞上如今無戰塵漢家公主出和親邑司猶屬宗卿寺册號還同虜帳人九姓旗旛先引路一生衣服盡隨身氈城南望無囘日空見沙蓬水栁春崑崙兒崑崙家住海中洲蠻客將來漢地遊言語解教秦吉了波濤初過鬱林洲金環欲落曽穿耳螺髻長拳不裹頭自愛肌膚黒如漆行時半脫木綿裘此所謂崑崙兒即今之黒厮也瀛奎律髓巻三十八

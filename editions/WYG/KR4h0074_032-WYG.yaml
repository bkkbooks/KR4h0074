body:
  text: 瀛奎律髓巻三十二元方囘編忠憤類世不常治於是有麥秀黍離之詠焉庾信哀江南賦亦人心之所不容泯也炎紹間有和江子我詩者乃曰成壞一反掌江南未須哀子我以為何其不仁之甚惟出於荆舒之學京黻之門者例如此今取其可以怨者列之不特臣於君子於親凡門生故吏學徒於主於師皆與五言二十五首春望杜甫國破山河在城春草木深感時花濺淚恨別鳥驚心烽火連三月家書抵萬金白頭搔更短渾欲不勝簪此第一等好詩想天寳至徳以至大厯之亂不忍讀也有歎壯心久零落白首寄人間天下兵常鬬江東客未還窮猿號雨雪老馬望關山武徳開元際蒼生豈重攀遣興干戈猶未定弟妹各何之拭泪霑襟血梳頭滿面絲地卑荒野大天逺暮江遲衰疾那能久應無見汝期遣憂亂離知又甚消息苦難真受諫無今日臨危憶古人紛紛乘白馬擾擾着黄巾隋氏留宫室焚燒何太頻避賢避地嵗時晚竄身筋骨勞詩書遂牆壁奴僕且旌旄行在僅聞信此生隨所遭神堯舊天下㑹見出腥臊天寳十四年乙未冬安祿山反老杜年四十四自是流移轉徙一為拾遺一為華州功曹一為劔南叅謀至大厯五年庚戌卒年五十九凡十六年間無非盜賊干戈之日忠臣固宜痛憤而老杜一飯不忘君多見於詩如諸侯春不貢使者日相望由來强榦地未有不臣朝領郡輙無色之官皆有詞天地日流血朝廷誰請纓弟妹悲歌裏朝廷醉眼中空村惟見鳥落日未逢人汩汩避羣盜悠悠經十年偷生惟一老伐叛已三朝赤眉猶世亂青眼只途窮朝野歡娛後乾坤震蕩中路衢惟見哭城市不聞歌忽聞哀痛詔又下聖明朝行在諸軍闕來朝大將歸奪馬悲宫主登車泣貴嬪窮愁但有骨羣盜尚如毛皆哀痛惻愴令人有無窮之悲彼生世常逢太平者烏足以語此初選五首外併此佳句紀之秋日懷賈隨進士羅隠邊冦日騷動故人音信稀長纓慚賈誼孤塚憶韓非曉匣魚腸冷春園鴨掌肥知君安未得聊且示忘機亂後逢友人滄海去未得倚舟聊問津生靈冦盜盡方鎮改更頻夢裏舊行處眼前新貴人從來事如此君莫獨沾巾遣興青雲路不通歸計奈長䝉老恐醫方悞窮憂酒盞空何堪離亂後更入是非中長短遭譏笑囘頭避釣翁九日江端友萬里江河隔傷心九日來蓬驚秋日後菊換故園開楚欲圖周鼎湯猶繫夏臺東籬那一醉塵爵耻虚罍江鄰幾與梅聖俞多唱和嘉祐起居舍人子懋相生三子端禮字子和端友字子我端本字子之與吕居仁多唱和入江西𣲖子我以元祐黨家居不仕亦不娶隠居封丘門外靖康初少宰吳元中薦之以為承務郎賜進士出身諸王宮教授上書辨宣仁誣謗遭黜渡江寓居桐廬之鸕鷀源後為太常少卿趙蕃昌父得其詩於韓琥仲止曰七里先生自然菴集刋留嚴陵郡齋此詩題目雖曰九日而周鼎夏臺之句乃是忠憤故以類入於此子我西池再展一月詩最有諷諌味朱文公亦喜之還韓城吕本中乍喜全家脱虛疑疋馬一作萬馬奔乾坤徳盛大盜賊爾猶存稻壠秋仍旱溪流晚自渾素冠兼白髪悉絶更誰論三首取一乾坤盜賊一聨生逼老杜丁未二月上旬日厄運雖云極羣公莫自疑民心空有望天道本無知野帳留華屋青城插皂旗燕雲舊耆老寧識漢官儀主辱臣當死時危命亦輕誰吞豫讓炭肯結仲由纓泣血瞻行殿傷心望敵營尚存儀衛否早晚復神京此靖康二年丁未事五月改建炎兵亂後雜詩五首吕祖謙晚逢戎馬際處處聚兵時後死翻為累偷生未有期積憂全少睡經刼抱長饑欲逐范仔輩同盟起義師元註云近聞河北布衣范仔起義師羽檄連朝暮戎旃匝邇遐未教知死所詎敢作生涯東郭同逃戸西郊類破家萍蓬無定迹屢欲過三巴碣石烟塵起長驅出不虞是誰遺此賊故使亂中都官府室如罄人家錐也無有司少恩惠何忍復追呼左傳室如懸罄如訓而謂室而將空也後人誤以為似磬之空非是觀此對則得本意矣萬事多返覆蕭蘭不辨真汝為誤國賊我作破家人求飽羮無糝澆愁爵有塵往來梁上燕相顧却情親蝸舍嗟蕪沒孤城亂定初籬根留敝屨屋角得殘書雲路慚髙鳥淵潛羡巨魚客來闕佳致親為摘山蔬東萊外集凡二十九首取其五他如水水但爭渡城城各㸃兵牛亡春奪種馬死盡徒行風雨無由障牛羊自入廬簷楹鏃可拾草木血猶腥六龍時臲卼百雉日孤危報國寧無䇿全軀各有詞皆佳句也老杜後始有此感事陳與義䘮亂那堪説干戈竟未休公卿危左袵江漢故東流風斷黃龍府雲移白露洲云何舒國步持底副君憂世事非難料吾生本自浮菊花紛四野作意為誰秋危故二字最佳黄龍府謂二帝北狩白鷺洲謂髙廟在金陵聞王道濟䧟北庭海内堂堂友如今在賊圍虚傳袁盎脫不見華元歸浮世身難料危途計易非雲孤馬息嶺老涕不勝揮三四善用事五六有無窮之痛焉喜誅大將劉子翬自提烏合衆南北久跳梁避事幾危國専權僭擬王然臍誅未快擢髪罪難詳膏血汙玷斧何曽洒戰塲曽作如尤佳此殆誅范瓊時所為己酉亂後寄常州使君姪四首汪藻汾水游仍逺瑶池宴未歸航遷羣廟主矢及近臣衣代馬窺天塹邊峰斷日畿百年淮海地囘首復成非草草官軍渡悠悠梟騎旋方嘗勾踐膽已補女媧天諸將爭隂拱蒼生忍倒懸乾坤滿羣盜何日是歸年身老今何向兵拏未肯休經旬甘半菽盡室委扁舟台折星猶彗農饑麥未收日邊無一使兒女詎知愁春到花仍笑時危特自哀平城龍凖去𤓰步佛狸來地下皆寃肉人間半刼灰只今衰淚眼那得向君開此建炎三年己酉冬烏珠入吳航海避亂之後也靖康中在圍城中者吕居仁徐師川汪彦章皆詩人也居仁多有痛憤之詩師川以邦昌之名名其婢而詩無所見彦章至此乃有亂後詩豈當時諸人或言之太過恐忤時相而刪之乎後秦檜既相賣國求和則士大夫噤不能發一辭矣此等詩皆本老杜亦惟老杜多有此等詩庾信猶賦哀江南皆知此意聞寇至初去柳州曽幾剝啄誰敲戸蒼茫客抱衾只㸔人似蟻共道賊如林兩岸侔千里扁舟抵萬金病夫桑下戀萬一有佳音此篇雖未見忠憤之意遼亡金熾盜賊充斥自中原破至於嶺表非士大夫之罪乎當任其咎者讀之而思可也七言二十二首恨别杜甫洛城一别四千里胡騎長驅五六年草木變衰行劔外兵戈阻絶老江邊思家步月清宵立憶弟㸔雲白晝眠聞道河陽近乘勝司徒急為破幽燕河陽之勝在至徳二年己亥冬十月祿山之反在天寳十四年乙未十一月繼以史思明反今四五年司徒謂李光弼秋興聞道長安似奕棋百年世事不勝悲王侯第宅皆新主文武衣冠異昔時直北關山金鼓振征西車馬羽書遲魚龍寂寞秋江冷故國平居有所思八首取一廣徳元年癸卯冬十月吐蕃入長安代宗幸陜安史死久矣而又有此事故曰奕棋然首篇有云巫山巫峽氣蕭森即大厯初詩也釋悶四海十年不解兵犬戎也復臨咸京失道非關出襄野揚鞭忽是過湖城豺狼塞路人斷絶烽火照夜屍縱横天子亦應厭奔走羣公固合思昇平但恐誅求不改轍聞道嬖孽能全生江邊老翁錯料事眼暗不見風塵清此亦所謂吳體拗字天寳十四年乙未祿山反至永泰元年乙巳恰十一年犬戎也復臨咸京謂前年癸卯吐蕃入長安代宗出奔也詩意曲折誅求不改嬖孽全生此禍亂未巳之兆山中寡婦杜荀鶴夫因兵死守蓬茅蔴苧衣冠鬢髪焦桑柘廢來猶納税田園荒後尚徴苗時挑野莱和根煑旋斫生柴帶葉燒任是深山更深處也應無計避征徭荀鶴詩至此俗甚而三四格卑語率最是廢來荒後似此者不一學晚唐者以為式予心葢不然之尾句語俗似諢卻切旅泊遇郡中叛亂示同志握手相㸔誰敢言軍家刀劔在腰邊遍搜寳貨無藏處亂殺平人不怕天古寺拆為修寨木荒墳開作甃城磚郡侯逐出渾閑事政是鑾輿幸蜀年不經世亂不知此詩之切雖麄厲亦可取中元甲子以辛丑駕幸蜀羅隠子儀不起渾瑊亡西幸誰人從武皇四海為家雖未逺九州多事竟難防已聞旰食思真將㑹待畋游致假王應感兩朝巡狩跡綠槐端正驛荒凉自蘇臺至望亭驛人家盡空李嘉祐南浦菰蒲覆白蘋東吳黎庻逐黄巾野棠自發空流水江燕初歸不見人逺樹依依如送客平田𣺌𣺌獨傷春那㸔回首長洲苑烽火年年報戰塵安貧韓偓手風難展八行書眼暗休尋九局圖牕裏日光飛野馬案頭筠管長蒲盧謀身拙為安蛇足報國危曽捋虎鬚舉世可能無黙識未知誰擬試齊竽韓偓字致光當崔𦙍朱全忠表裏亂國獨守臣節不變寧不為相而在翰苑無俸竟忤全忠貶濮州司馬事見本傳所謂報國危曽捋虎鬚非虚語也王荆公選唐詩多取之詩律精確亂後春日途經野塘世亂他鄉見落梅野塘晴暖獨徘徊船衝水鳥飛還住袖拂楊花去又來季重舊游多䘮逝子山新賦亦悲哀眼㸔朝市成陵谷始信昆明是刼灰吳質季重為曹操所殺致光之交有為朱全忠所殺者引庾信子山賦事可謂極悲哀矣亂後郤至近甸有感狂童容易犯金門比屋齊人作旅魂夜户不扄生茂草春渠自溢浸荒園關中卻是屯邊卒塞外翻聞有漢邨堪恨無情清濁水渺茫依舊遶秦源唐僖昭以來其亂如此八月六日作二首日離黄道十年昏敏手重開造化門火帝動爐銷劒㦸風師吹雨洗乾坤左牽犬馬誠難測右袒簪纓最負恩丹筆不知誰是罪莫留遺迹怨神孫金虎挻災不復論構成狂猘犯車塵御衣空惜侍中血國璽幾危皇后身圖覇未能知盜道飾非惟欲害仁人黄旗紫氣今仍舊免使老臣攀畫輪金樓感事吳融太行和雪疊晴空二月郊原尚朔風飲馬早聞臨渭北射鵰今欲過山東百年徒有伊川歎五利寧無魏絳功日暮長亭正愁絶哀笳一曲戍煙中吳融韓偓同時慨歎兵戈之間詩律精切皆善用事如此中四句㣲而顯也偶題賤子曽塵國士知登門倒屣憶當時西川酌盡菊花酒東閣編成詠雪詩莫道精靈無伯友尋聞任俠報爰絲烏衣舊宅猶能認粉竹金松一兩枝此乃感恩之言必為某人為朱温之徒所殺而未有能報之者也予於魏公明已門下亦然次韻尹潛感懐陳與義北兵又㸔遶淮春歎息猶為國有人可使翠華周㝢縣誰持白扇靜風塵五年天地無窮事萬里江湖見在身共説金陵龍虎氣放臣迷路惑烟津周尹潛詩亦學老杜此詩壯哉乃思陵即位之五年紹興元年也傷春廟堂無䇿可平戎坐使甘泉照夕烽初怪上都聞戰馬豈知窮海㸔飛龍孤臣霜髪三千丈每嵗煙花一萬重稍喜長沙向延閣疲兵敢犯敵軍鋒謂潭州向伯恭野泊對月有感周莘可憐江月亂中明應識逋逃病客情斗柄䦨干洞庭野角聲凄斷岳陽城酒添客淚愁仍濺浪巻歸心暗自驚欲問行朝近消息眼中羣盜尚縱横尹潛名莘為岳陽決曹掾陳簡齋集屢見詩題乃錢塘人東坡所與交周長官開祖之孫也詩有老杜氣骨簡齋亦欽畏之只江月亂中明一句便髙三四悲壯併結句自可混入老杜集北風劉子翬雁起平沙晚角哀北風逥首恨難裁淮山已隔邊塵斷汴水猶穿故苑來紫色鼃聲真倔强翠華龍衮暫徘徊廟堂此日無遺䇿可是憂時獨草萊忠憤至矣五六尤精命意尤切屏山又有汴京紀事絶句二十首今書四首於此空嗟覆鼎誤前朝骨朽人間罵未消夜月池臺王傅宅春風楊柳相公橋萬炬銀花錦綉圍景龍門外軟紅飛凄凉但有雲頭月曽照當時步輦歸梁園歌舞足風流美酒如刀解斷音短愁憶得少年多樂事夜深燈火上樊樓輦轂繁華事可傷師師垂老過湖湘縷衣檀板無顔色一曲當時動帝王不減唐人宿牧牛亭秦太師墳菴楊萬里函關只有一穰侯瀛館寧無再帝丘天極八重心未死台星三㸃坼方休只㸔壁後新亭䇿恐作栘中屬國羞今日牛羊上丘壟不知丞相更嗔不此為秦檜元註暮年起大獄必殺張徳逺胡邦衡等五十餘人不知諸公殺盡將欲何為奏垂上而卒故有新亭之句然初節似蘇子卿而晚繆書憤陸游白髪蕭蕭卧澤中秪憑天地鑒孤忠阨窮蘇武餐氈久憂憤張巡嚼齒空細雨春蕪上林苑頺垣夜月洛陽宫壯心未與年俱老死去猶能作鬼雄鏡裏流年兩鬢殘寸心自許尚如丹衰遲罷試戎衣窄悲憤猶爭寳劍寒遣戍十年臨滴博壯圖萬里戰臯蘭關河自古無窮事誰料如今袖手㸔悲壯感慨不當徒以虚語視之書事劉克莊人道山東入秘方書生膽小慮空長遺民似蟻饑難給俠士如鷹飽易颺未見馳車修寢廟先聞鑄印拜侯王青齊父老應流涕何日鸞旗駐路旁此為山東李全作李全固叛賊反覆不足道史彌逺遇千載一㑹之機無晉人絲毫伎倆可憾也瀛奎律髓巻三十二

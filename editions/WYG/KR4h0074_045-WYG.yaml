body:
  text: 瀛奎律髓巻四十五元方回編感舊類七言七首陳阜卿先生為兩浙轉運司考試官時秦丞相之孫以右文殿修撰來就試直欲首選阜卿得予文巻擢置第一秦氏大怒予明年既顯黜先生亦幾陷危機偶秦公薨遂已予晚歲料理故書得先生手帖追感平昔作長句以識其事不知衰涕之集也陸游冀北當年浩莫分斯人一顧每空羣國家科第與風漢天下英雄唯使君後進何人知大老横流無地寄斯文自憐衰鈍辜真賞猶竊虚名海内聞此謂秦塤也選此詩以見老檜之無識放翁下第以此雪夜感舊江月亭前樺燭香龍門閣上䭾聲長亂山古驛經三折小市孤城宿兩當晚歲猶思事鞍馬當時那信老耕桑緑沉金鏁俱塵委雪灑寒燈淚數行憶昔憶昔從戎出渭濱壺漿馬首泣遺民夜棲髙冡占星象晝上巢車望敵塵共道功名方迫逐豈知老病只逡巡燈前撫巻空流涕何限人間失意人感昔三著朝冠入上都黄封頻醉渴相如馬慵立仗寧辭斥蘭偶當門敢怨鋤富貴尚思還此笏衰殘故合愛吾廬燈前目力依然在且盡山房萬巻書五丈原頭秋色新當時許國欲忘身長安之西過萬里北斗以南惟一人徃事已如遼海鶴餘年空羨葛天民腰間白羽凋零盡却照青溪整角巾夢蜀夢飲成都好事家新粧執樂雁行斜赭肩郫縣千筒酒照眼彭州百䭾花醉帽傾欹歌未闋罰觥㶑灔笑方譁霜鐘喚覺晨窻白自怪無端一念差體熟語麗伏讀二劉公瑞巖留題感事興懐至于隕涕追次元韻偶成一篇朱熹誰將徤筆寫崖隂想見當年抱膝吟緩帶輕裘成昨夢遺風餘烈到如今西山爽氣㸔猶在北闕精誠直自深故壘近聞新破竹起公無路祗傷心元註右懐寳忠李公作近聞西兵進取闗陜其帥即公舊部曲也瀛奎律髓巻四十五

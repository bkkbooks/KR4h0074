  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0074_WYG_019-1a, image: WYG1366/WYG1366-0215c.png}
body:
  text: 瀛奎律髓巻十九元方回編酒類詩與酒常並言未有詩人而不愛酒者也雖不能飲者其詩中亦未嘗無酒焉身入醉鄉無畔岸心與歡伯為友朋山谷竒語以非律不與兹選亦律之變格宜附書諸此五言十九首獨酌杜甫步屧一作倚杖深林晚開樽獨酌遲仰蜂黏落絮行蟻上枯梨薄劣慚真隠幽偏得自怡本無軒冕意不是傲當時此以獨酌為題其實皆幽棲自怡之事仰蜂行蟻盖獨酌時所見如此凡為詩只兩句摹景精工為一篇之眼餘放淡浄為佳獨酌成詩燈花何太喜酒綠正相親醉裏從為客詩成覺有神兵戈猶在眼儒術豈謀身苦被微官縛低頭愧野人燈花何太喜問也酒綠正相親答也醉裏詩成一聨天出竒語一獨酌間其妙如此軍中醉飲寄沈劉叟元註或作沈八劉叟酒渴愛江清餘甘漱晚汀軟莎欹坐穏冷石醉眠醒野膳隨行帳華音發從伶數杯君不見都已遣沉㝠黄本註杜詩無此篇山谷嘗用酒渴愛江清為韻賦詩任淵註亦云杜詩而白本杜詩亦有此篇或以為暢當詩然頓挫翕忽不可以律縛恐暢當未辦此也第二句甘亦作酣何處難忘酒白居易何處難忘酒天涯話舊情青雲俱不達白髪遞相驚二十年前别三千里外行此時無一盞何以叙平生何處難忘酒霜庭老病翁暗聲啼蟋蟀乾葉落梧桐鬢為愁先白顔因醉暫紅此時無一盞何計奈秋風何處難忘酒青門送别多斂襟收涕淚蹴馬聽笙歌煙樹㶚陵岸風塵長樂坡此時無一盞爭奈去留何何處難忘酒逐臣歸故園赦書逢驛騎賀客出都門半面瘴煙色滿衫鄉淚痕此時無一盞何處可招魂七首内三首以士人及第少年春夜軍功建旄而飲今刪之何則得志之人能不汨于酒則人品高矣所取四首以逆旅窮交老境寒病都門送别逐臣遇赦而飲此則不能忘情于酒者人情之常也鬢為愁先白一聨后山畧換數字便鍜鐵成金此又學者所當知也不如來飲酒莫作商人去悽惶君未諳雪霜行塞北風水宿江南藏鏹百千萬沉舟十二三不如來飲酒仰面醉酣酣莫事長征去辛勤難具論何曾畫麟閣祇是老轅門蟣蝨衣中物刀鎗面上痕不如來飲酒合眼醉昏昏莫上青雲去青雲足愛憎自賢誇智慧相糾鬬功能魚爛縁吞餌蛾焦為撲燈不如來飲酒任性醉騰騰莫入紅塵去令人心力勞相爭兩蝸角所得一牛毛且滅心中火休磨笑裏刀不如來飲酒穏卧醉醄醄不如來飲酒七首刪去三首深山也農夫也學仙也不可招之使還商人征夫雲路塵勞此當以酒招耳人言白詩平易相爭兩蝸角所得一牛毛豈不竒崛胸中所見高則下筆自高此又在乎涵養省悟之有得不得專求之文字間也把酒思閒事把酒思閒事春愁誰最深乞錢覊客面落第舉人心月下低眉立燈前抱膝吟憑君勸一醉勝與萬黄金把酒思閒事春嬌何處多試鞍新白馬弄鏡小青娥掌上初教舞花頭欲按歌憑君勸一醉勸了又如何樂天所賦必近人情前一詩言覊窮之人不可無酒也後一詩言得志之人酒後有所不能自已也一以憐一以戒也晚春酒醒尋夢得料合同惆悵花殘酒亦殘醉心忘老易醒眼别春難獨出雖慵懶相逢定喜歡還擕小蠻去試覓老劉看此以小蠻為酒榼名又非舞腰之小蠻也臘酒韋氏月録云臘月造四月成梅堯臣汲井轆轤鳴寒泉碧甕盛欲為三伏美方俟十旬清漫憶黄公舍徒聞韋氏名熟時梅杏小獨飲效淵明此和晏元獻臘中諸詩臘酒四月而成今人未有得其法答高判官和唐店夜飲露宿勤王客相從月下來黄流何日漲緑酒暫時開風定燈光爛天高斗柄迴醉言多脱畧吾黨不須猜五六流麗壯健末句之意又高於淵明矣邨醪雨濕破荆籬風搖樹亞旗小槽聲下急挈榼問沽遲摘果野棠熟望人船火隨燈前相對飲還似昔過時五六不甚𦂳要而有味答田生陳師道酒亦有何好人今未肯忘茍無愁可解何必醉為鄉賸欲論竒字終能諱秘方直饒肌骨秀正要畫眉長此戒田生過飲尾句恐其不自修飾則天資之美亦不可恃也醉中作陸游宦遊三十載舉步亦看人愛酒長官罵近花丞相嗔湖山今入手風月始闗身少吐胸中氣從教白髮新三四天生對偶七言十六首嘗酒聽歌招客白居易一甕香醪新揷篘雙鬟小妓薄能謳管絃漸好新教得羅綺雖貧免外求世上貪忙不覺苦人間除醉却須愁不知此事君知否君若知時從我游曠達之言長齋月滿擕酒先與夢得對酌醉中同赴令公之宴戲贈夢得齋宮前日滿三旬酒榼今朝一拂塵乘興還同訪戴客解酲仍對姓劉人病心湯沃寒灰活老面花生朽木春若怕平原怪先醉知君未慣吐車茵第四句善詼諧五六足見飲酒之喜快于心見于面橋亭卯飲卯時偶飲齋時卧林下高橋橋上亭松影亂窗眠始覺竹風吹面醉初醒就荷葉上包魚鮓當石渠中洗酒瓶生計悠悠身兀兀甘從妻喚作劉伶五六新異太守徐君猷通守孟亨之皆不飲酒詩以戲之云蘇軾孟嘉嗜酒桓温笑徐邈狂言孟徳疑公獨未知其趣耳臣今時復一中之風流自有高人識通介寧隨薄俗移二子有靈應拊掌吾孫還有獨醒時全用孟徐二人飲酒事以其泉下有靈却笑厥孫不飲善滑稽者章質夫送酒六壺書至而酒不達戲作小詩問之白衣送酒舞淵明急掃風軒洗破觥豈意青州六從事化為烏有一先生空煩左手持新蟹漫遶東籬嗅落英南海使君今北海定分百榼餉春耕青州烏有之聨既切題左手東籬一聨下空煩漫遶四字見得酒不至也善戲如此醉中陳與義醉中今古興亡事詩裏江湖揺落時兩手尚堪盃酒用寸心唯是鬢毛知稽山擁郭東西去禹穴生雲朝暮竒萬里南征無賦筆茫茫逺望不勝悲此以醉中為題耳三四絶妙餘意感慨深矣對酒陳留春色撩詩思一日搜腸一百迴燕子初歸風不定桃花欲動雨頻來人間多待須微禄夢裏相逢記此杯白竹扉前容醉舞煙波一作邨渺渺欠高臺簡齋詩響得自是别郡中禁私釀嚴甚戲作曾幾結交歡伯無他腸小槽竊比顧建康此身忽墮禁酒國何路得到無功鄉官酤快甚夏酌水齋釀愜於冬飲湯客來且復置是事北焙薦椀春風香元註時建上送新茗此吳體三四絶佳避寇遷居郭内風雨凄然鄭顧道餉酒煙雨昏昏一月梅全家避寇寄城隈欲尋碧落侍郎去遽沐青州從事來令我妻孥爭洗盞想公伯仲正傳杯安能鬱鬱久居此且傍茶山松逕回碧落青州之句本於東坡家釀紅酒美甚戲作麯生竒麗乃如許酒母穠華當若何向人自作醉時面遣我寧不蒼顔酡得非琥珀所成就更有丹砂相盪磨可憐老杜不對汝但愛引頸舟前鵞此詩三四不甚入律然終篇發明紅酒之妙前此未有當時時玩味之乃老杜吳體山谷詩法也秋夜獨酌黄公度溪山態足身無事天地功深嵗有秋投老相從管城子平生得意醉鄉侯捲簾清坐月排闥横笛人家風滿樓可是離人更遺物何縁身世兩無求黄公度字師憲興化軍莆田人紹興八年諒闇大魁思陵在御丁未至壬午三十六年首甲科十有一人梁克家丞相陳誠之樞使三尚書曰汪應辰劉章王佐五從官曰李易張九成趙達張孝祥王十朋獨師憲以忤秦檜得正字即被論與祠後倅肇慶紹興二十五年檜死始得召為考功員外郎而卒年不逮五十洪景盧序其知稼集有句曰雨意欲晴山鳥樂寒聲初到井梧知景盧謂大厯十才子不能窺藩又有句曰還鄉且盡田家樂舉世誰非市道交醉鄉歸去疑無路詩筆拈來似有神是可以言詩矣小飲梅花下作陸游脱巾莫歎髪成絲六十年間萬首詩予自十七八學詩今六十年得萬篇排日醉過梅落後通宵吟到雪殘時偶容後死寧非幸自乞歸耕已恨遲青史滿前閒即讀幾人為我作蓍龜第二句舉世無對六日雲重有雪意獨酌遍游藪澤一漁舠歴盡風霜只緼袍天為念貧偏與健人因見懶悞稱高地連海澨濤聲近雲冒山椒雪意豪偶得芳樽須痛飲凉州那得直蒲萄三四善斡旋有味小圃獨酌少年裘馬競豪華豈料今為老圃家數㸃霏微社公雨兩叢閒淡女郎花詩成枕上常難記酒滿街頭却易賖自笑邇來能用短只將獨醉作生涯對酒老子不堪塵世勞且當痛飲讀離騷此身幸已免虎口有手但能持蟹螯牛角掛書何足問虎頭食肉亦非豪天寒欲與人同醉安得長江化濁醪醉中自贈富貴猶宜早退休一生齟齬更何求賦形未至欠壬甲語命寧須憎斗牛栗里收身貧亦樂平陵埋骨死無憂狂歌醉舞真當勉剩折梅花揷滿頭放翁此五詩皆新異瀛奎律髓巻十九

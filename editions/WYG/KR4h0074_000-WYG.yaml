body:
  text: 瀛奎律髓總集類提要臣等謹案瀛奎律髓四十九巻元方回編回所著續古今考已别著録是書兼選唐宋二代之詩分四十九類所録皆五七言近體故名律髓自序謂取十八學士登瀛洲五星聚奎之義故曰瀛奎大㫖排西崑而主江西倡為一祖三宗之説一祖者杜甫三宗者黄庭堅陳師道陳與義也其説以生硬為徤筆以粗豪為老境以煉字為句眼頗不諧於中聲其去取之間如杜甫秋興惟選第四首之類亦多不可解然宋代諸集不盡流傳於今者頗賴以存而當時遺聞舊事亦往往見於其註故厲鶚作宋詩紀事所采最多其議論亦頗有可取者故亦未能竟廢之此書世有二本一為石門吳之振所刋前載龍遵叙述傳授源流至詳一為蘇州陳士泰所刋於原註多所刪削其龍遵原序亦併刪之校讐舛駁殊不勝乙之振切譏之殆未可謂之已甚焉乾隆四十三年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀瀛奎律髓原序瀛奎律髓四十九巻宋紫陽方虛谷先生之所編選予蚤年嘗聞是編不獲一覩天順甲申叨守新安實先生鄉郡因捜訪得其傳録全本間有舛訛卒無善夲校正之續又得定宇陳先生手自抄本共十類定宇自識云惟節序類得虛谷親校本抄之餘皆傳録本疑誤甚多雖間可是正而不能盡圈點悉謹依之遂以其本與先所得本參對之無大差異者苐惜不得全編通校之於是又徧訪郡之儒者因得各家所藏抄本讀之亦率多殘缺脫落得此遺彼遂㑹取諸本通參訂之舛訛者是正圈點一依先本為定然後是編始獲復全而虛谷編選之志亦庶㡬其不終泯嗟夫以定宇去虛谷時猶未逺而是編已不可得其全矣今一旦得之又何其幸耶先生自序謂詩之精者為律今觀其所選之精嚴所評之當切涵泳而雋永之古人作詩之法詎復有餘藴哉誠所謂律髓也故不敢私之於己敬夀諸梓以廣其傳但巻帙浩繁傳録之誤陶而隂亥而豕者不能無也四方博學君子幸共鑒而正之成化三年龍集丁亥六月下澣皆春居士識瀛者何十八學士登瀛洲也奎者何五星聚奎也律者何五七言之近體也髓者何非得皮得骨之謂也斯登也斯聚也而後八代五季之文弊革也文之精者為詩詩之精者為律所選詩格也所註詩話也學者求之髓由是可得也方囘者誰家於歙嘗守睦其字萬里也至元癸未良月旦日紫陽虚谷居士方囘撰瀛奎律髓原序

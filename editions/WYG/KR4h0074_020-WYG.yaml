body:
  text: 瀛奎律髓巻二十元方回編梅花類虚谷曰梅見於書詩周禮禮記大戴禮左氏傳管子淮南子山海經爾雅本草取其實而已曰爾惟鹽梅曰摽有梅曰籩人八梅􅢀為乾梅䟽者謂梅皆有乾濕曰獸用梅曰五月煮梅為豆實曰水火醯醢鹽梅以亨魚肉曰五沃之土其梅其杏曰一梅不足為百人酸曰雲山之上其實乾腊郭璞註腊為乾梅曰梅柟似杏實酢曰梅實明目益氣不饑未以其花為貴也惟詩山有嘉卉侯栗侯梅大戴禮夏小正正月梅杏杝桃始華一言卉一言華說苑越使諸發執一枝梅遺梁臣韓子顧左右曰惡有一枝梅乃遺列國之君乎由是考之則梅以花貴自戰國始西京雜記漢初修上林苑羣臣谷獻名果有朱梅紫花梅同心梅紫蒂梅則梅種之多特以花書又自西漢始漢武帝元封三年作柏梁臺詔羣臣有能為七言者乃得上座太官令曰枇杷橘栗桃李梅梁簡文帝引此事為梅花賦而曰七言表柏梁之詠則知漢武帝時始有七言詩及梅也亦恐不専主花荆州記曰陸凱與范曄相善自江南寄梅一枝詣長安與曄併贈詩曰折梅逢驛使寄與隴頭人江南無所有聊贈一枝春詩家以為晉人非宋文時范曄姑從其說則梅花見於五言詩自晉時始也大槩梅花詩五七言至梁陳而大盛梁簡文帝雪裏不見梅花詩有云絶訝梅花晚爭來雪裏窺定須還剪綵學作兩三枝梁元帝詩有云梅含今春樹還臨先日池人懷前嵗憶花發故年枝鮑泉詩有云可憐階下梅飄蕩逐風囘度簾拂羅幌縈窗落梳臺隂鏗詩有云春近寒雖薄梅舒雪尚飄從風還共落照日不俱消庾肩吾詩有云窗梅朝始發庭雪晚初消道逺終難寄馨香徒自饒庾信詩有云當年臈月半已覺梅花闌不信今春晚俱來雪裏看早知覔不見眞悔着衣單此雖非全篇皆可膾炙其全篇清雅者如何遜云兎園標物序驚時最是梅銜霜當路發映雪凝寒開枝横却月觀花遶凌風臺朝灑長門泣夕駐臨卭杯應知早飄落故逐上春來其七言流麗者如江總有云臘月正月早驚春衆花未發梅花新梅花芬芳臨玉臺朝攀晚折還復開滿酌金巵催玉柱落梅樹下宜歌舞又有一句全聯可觀者􅁫臨曲池影扇拂玉堂梅梁元帝也砌石披新錦梁花畵早梅陰鏗也草短猶通屧梅香漸着人徐君倩也綠條初變柳紫莟欲舒梅隋煬帝也沿唐及宋則梅花詩殆不止千首而一聨一句之佳者無數矣今摘其尤異者尾於所賦着題詩之後而雪也月也晴也雨也亦着題詩又尾於後紅梅臘梅詩亦附乎此格物在致知玩物則䘮志在學者擇之五言六十二首和王司馬折梅寄京邑兄弟張九齡離別念同嬉芳榮欲共持獨攀南國樹遥寄北風時林惜迎春早花愁去日遲還聞折梅處更有棣華詩明皇宰相張九齡曲江集二十巻賦一巻詩五巻此詩在第二巻蜀本芳榮作方榮惜字不可認以近本所刋芮挺章國秀集正之國秀還聞作仍聞此詩在少陵太白之前陳子昻杜審言沈宋之後曲江公身為一代正人而詩亦字字清切云芮挺章選唐天寶三年以前諸公凡九十人詩二百三十首以李嶠為第一次宋之問杜審言沈佺期又次張說徐安貞張敬忠賀知章王翰董思恭杜巖崔滌沈宇劉希夷而九齡為第十五人云時猶未數少陵同時諸公也庭梅詠芳意何能早孤榮亦自危更憐花蒂弱不受歳寒移朝雪那相妬隂風已屢吹馨香雖尚爾飄蕩復誰知此見曲江集第五巻詳味詩思盖為李林甫所䧟先罷相又坐舉周子諒為御史貶荆州長史此荆州詩也先有戲題春意云一作江南守江林三四春在玉泉寺古塚詩後然則詩豈無為而徒作者哉以寘少陵之前可也子壽未相之前嘗為洪州都督徙桂州兼嶺南按察選補使所至詩必佳洪州詩有云有趣逢樵客忘懷狎野禽廵屬縣云途中却郡掾林下招邨民妙甚江梅杜甫梅蘂臘前破梅花年後多絶知春意早最奈客愁何雪樹元同色江風亦自波故園不可見巫岫鬱嵯峩起句十字已盡梅花次第春雪間早梅韓愈梅將雪共春彩豓不相因逐吹能爭宻排枝巧妬新誰令香滿座獨使淨無塵芳意饒呈瑞寒光助照人玲瓏開已徧㸃綴坐來頻那是俱疑似須知兩逼真熒煌初亂眼浩蕩忽迷神未許瓊花比從將玉樹親先期迎獻嵗更伴占兹辰願得長輝映輕微敢自珍汗血千里馬必能折旋蟻封昌黎大才也文與六經相表裏史漢並肩而驅者其為大篇詩險韻長句一筆百千字而所賦一小著題詩如雪如笋如牡丹櫻桃榴花蒲萄一句一字不輕下此題必當時有同賦者春雪早梅中著一間字只彩豔不相因一句五字巳佳矣彩言雪豔言梅本不相資而成此美句是非相為得之意芳意饒呈瑞以言梅之芳又饒以雪之祥瑞寒光助照人以言雪之光足助乎梅之映煦錯綜用工亦云宻矣學者作詩謂不思而得喝咄呌怒即可成章吾不信也惟更伴占兹辰一句恐有誤束大才於小詩之間惟五言律為最難昌黎此詩賦至十韻較元微之春雪映早梅多四韻題旣甚難非少放舂容不可也柳子厚有早梅詩古體仄韻早梅發髙樹逈映楚天碧朔吹飄夜香繁霜滋曉日欲為萬里贈杳杳山水隔寒英坐銷落何用慰逺客單賦早梅不為律易鍜鍊也譬如雪詩千山鳥飛絶萬徑人蹤滅孤舟簑笠翁獨釣寒江雪為古體則可極天下之竒為律體則不可矣昌黎將䇿試聴窗知六字為荆公引用亦是費若干思索律體尤難古體差易故也江梅鄭谷江梅且緩飛前輩有歌詞莫惜黄金縷難㤀白雪枝吟看歸不得醉齅立如癡和雨和煙折含情寄所思五六亦深造梅趣賦得春雪映早梅元稹飛舞先春雪因依上畨梅一枝方漸秀六出巳同開積素光逾宻眞花節暗催搏風飄不散見晛忽偏摧郢曲琴空奏羗音笛自哀今朝兩成詠翻挾昔人才一句賦雪一句賦梅本不為難起句上畨梅不走了早字三四巧見晛忽偏摧此一句佳謂日出則雪先消梅如故也梅杜牧輕盈照溪水掩歛下瑶臺妬雪聊相比欺春不逐來偶同佳客見似為凍醪開若在秦樓畔堪為弄玉媒牧之詩才髙此小詩若不介意五六却淡靚有味山路見梅感而作錢起莫言山路僻還被好風催行客凄凉過邨籬冷落開晚溪寒水照晴日數蜂來重憶江南酒何因把一杯刋本誤以蜂為峰必是蜂字無疑梅發雖則尚寒然晴日旣暖必有蜂採香但不多耳予每親見之十一月中旬至扶風見梅花李商隠匝路亭亭豓非時裛裛香素娥唯與月青女不饒霜贈逺虚盈手傷離適斷腸為誰成早秀不待作年芳義山之詩入宋流為崑體此謂梅花最宜月不畏霜耳添用素娥青女四字則謂月若私之而獨憐霜若挫之而莫屈者亦竒末句又似有所指云早梅朱慶餘天然根性異萬物盡難陪自古承春早嚴冬鬭雪開豓寒宜雨露香冷隔塵埃堪把依松竹良圖一處栽張洎序項斯詩謂元和中張水部律格不渉舊體惟朱慶餘一人親授其㫖㳂而下則有任藩陳標章孝標司空圗等及門項斯於寳厯開成之際尤為水部所賞然則韓門諸人詩𣲖分異此張籍之派也姚合李洞方干而下賈島之派也慶餘此詩亦有氣脉有字眼不可忽荆公乃僅選其薔薇一篇早翫雪梅有懐親屬韓偓北陸候纔變南枝花已開無人同悵望把酒獨徘徊凍白雪為伴寒香風是媒何因逢越使腸斷謫仙才全篇有味五六洒落早梅僧齊已萬木凍欲折孤根暖獨回前村深雪裏昨夜一枝開風逓幽香去禽窺素豓來明年猶應律先發映春臺尋常只將前四句作絶讀其實二十字絶妙五六亦幽致王荆公選唐百家詩梅花僅有五首五言律僅有韓致光一首五言絶句一首王適云忽見寒梅樹開花漢水濵不知春色早疑是弄珠人亦佳句也七言絶句二首戎昱云一樹寒梅白玉條逈臨邨落傍溪橋應緣近水花先發疑是經春雪未消劉言史云竹與梅花相並枝梅花正發竹枝垂風吹總向竹枝上眞一作直似王家雪下時崔魯七言律一首見此巻後今以予所選五言律增廣之楊誠齋喜唐人崔道融十字云香中別有韻清極不知寒未見全篇以荆公之精於詩梅花五言律無七言律亦無之止有五言絶句五首有云墻角數株梅凌寒獨自開遥知不是雪時有暗香來李雁湖注引古樂府庭前一樹梅寒多未覺開祗言花似雪不悟有香來謂介甫畧轉換耳或偶同也予攷楊誠齋所言則謂祗言花似雪不悟有香來為蘇子卿作雖未必然而花是雪與花似雪一字之間大有逕庭知花之似雪而云不悟香來則拙矣不知其為花而視以為雪所以香來而不知悟也荆公詩似更髙妙然則盡唐二百九十年僅選得梅花五言律十二首其誠難題也哉馬上見梅花初發宋庠瞥見江南樹繁英照苑墻無雙春外色第一臘前香雲葉遥驚目瓊枝昔斷腸莫吹羗塢笛容易損孤芳三四極工春外之外臘前之前似乎閒而非閒字也乃最𦂳最切最實之字雲葉瓊枝乃崑體常例梅花王珪冷香疑到骨瓊豓㡬堪餐半醉臨風折清吟拂曉觀贈春無限意和雪不勝寒桃李有慚色枯枝試並欄其香到骨其豓堪餐起句十字已不茍中二聨皆清爽不可以至寳丹忽之也馬處厚席上探得早梅晁端友嶺梅何處早雪裏看芳菲北陸寒猶在南枝春巳歸曉粧初見妬殘角未成飛引我江頭夢清香憶滿衣晁無咎乃翁端友詩不减唐人紅梅梅堯臣家住寒溪曲梅先雜暖春學粧如小女聚笑發丹唇野杏堪同舍山櫻莫與隣休吹江上笛留伴庾園人野杏堪同舍此堪字乃是不堪也善詩者多如此用虚字西清詩話紅梅昔獨盛於姑蘓晏元獻始移植西園第中貴游賂園吏得一枝分接都下始有二本元獻嘗賦詩曰若更遲開三二月北人應作杏花看客曰公詩固佳待北俗何淺也元獻笑曰顧傖父安得不然王君玉時以詩寄元獻云舘娃宫北舊精神粉瘦瓊寒露蕋新園吏無端偷折去鳯城從此有雙身王荆公小絶云春半花纔發多應不奈寒北人初未識渾作杏花看胡元任叢話以為介甫詩與元獻暗合然介甫句意為工梅花似畏羣芳妬先春發故林曾無鶯蝶戀空被雪霜侵不道東風逺應悲上苑深南枝已零落羗笛寄餘音依韻答僧圓覺早梅江南自寒苦花不與時同清向三冬足香傳一國中雲湖藏舊市雪樹認新豐未有虧氷素隨粧入漢宫九月見梅花江南風土暖九月見梅花逺客思邊草孤根暗磧砂何曾逢寄驛空自聽吹笳今日樽前勝其如秋鬢華聖俞詩不見著力之迹而風韻自然不同偶折梅數枝置案上盎中芬然遂開張耒偶別霜林陋來䝉玉案登清香侵硯水寒影伴書燈見我粲初笑贈人慵未能將何伴髙潔清曉誦黄庭見我粲初笑贈人慵未能更有味以誦黄庭為梅伴則兩俱髙潔矣感梅憶王立之晁沖之王子已仙去梅花空自新江山餘此物海岱失斯人賔客他鄉老園林㡬度春城南載酒地生死一沾巾晁叔用名沖之自號具茨有集入江西𣲖晁氏自文元公逈至補之無咎五世世有文人無咎之父端友字君成詩逼唐人有新城集無咎有濟北集從弟說之字以道號景迂有景迂集以道親弟詠之字之道有崇福集補之詠之四朝國史已入文藝傳叔用此詩蓋學陳后山也其兄無斁載之見知於后山因是亦知叔用叔用有子曰公武著讀書志者可謂盛矣王立之名直方居汴南父棫字才元髙貲元祐中延致名士唱和為蘓黄作頓有亭吕居仁亦以其詩入𣲖此詩才學后山便有老杜遺風梅素月清溪上臨風不自勝影寒垂積雪枝薄帶春冰香近行猶逺人來折未曾江山正蕭瑟玉色照松藤此詩未及前篇按集俞汝礪因公武請為作序諸弟有二十弟賁之飾道二十二弟允之息道二十三弟豫之虞道二十八弟夬之决道而叔用初字用道與說之皆從道字聨表也以道為四兄之道為十二兄又有三十三弟頌之梅南雪看未穩北風吹已殘才堪十年夢不稱一生酸日月方囘首風霜與凭欄遲明出謝客頓覺㡌圍寛居仁小絶蠟梅詩云學得漢宫粧偷傳半額黄不將供俗鼻愈更覺清香早梅云獨自不爭春都無一㸃塵忍將氷雪靣所至媚游人凡賦梅盛稱其美不若以自况而自超於物外可也嶺梅曾幾蠻烟無處洗梅蕋不勝清顧我已頭白見渠猶眼明折來知韻勝落去得愁生坐入江南夢園林雪正晴此茶山將詣桂林時詩有二絶連此詩後云桂林梅花盛開有懷信守程伯禹故知之髙郵無梅求之於揚帥鄧直閣送臘臘垂盡迎春春欲囘如何萬家縣不見一枝梅有客幽尋去無人逺寄來揚州何遜在政用小詩催鄧帥寄梅併山堂酒甓社湖邊路詩筒得報囘舊時雲液酒元註揚州上尊名也新歳雨肥梅不是園官送真成驛使來鬢毛都白盡更著此花催此晚年使淮南詩但觀其句律何乃瘦健鏗鏘至此雖平正中有竒古也次韻張守梅詩劉子翬破雪梅初動南枝更北枝傍牆應折盡背日較開遲曉角驚殘夢春愁占兩睂狂夫將落蘂故入畫樓吹梅詩難賦不必句句新得如此圓熟亦可也觀梅花開盡不及吟賞感歎成詩聊貽同好二首朱熹憶昔身無事尋梅只怕遲沉吟窺老樹取次折横枝絶豓驚衰鬢餘芳入小詩今年何草草政爾負幽期棐几氷壺在梅梢雪蘂空不堪三弄咽誰與一樽同鼻觀殘香裏心期昨夢中那知北枝北猶有未開叢文公詩似陳后山勁瘦清絶而世人不識此兩詩皆八句一串又何必晚唐家前頷聨後景聯堆塞景物求工於一字二字而實則無味耶宋文示及紅梅蠟梅借韻兩詩復和呈以發一笑聞說寒梅盡尋芳去已遲冷香無宿蘂穠豓有繁枝正復非同調何妨續舊詩廣平偏娬媚鐡石悞心期元注宋文前篇乃用施朱粉事風雪催殘臘南枝一夜空誰知荒草裏却有暗香同質瑩輕黄外芳勝淺綘中不遭岑寂侣何以媚孤叢此二詩前屬紅梅後屬蠟梅清江道中見梅今日清江路寒梅第一枝不愁風嫋嫋正奈雪垂垂暖熱惟須酒平章却要詩他年千里夢誰與寄相思朱文公乾道三年丁亥訪南軒歸十二月江西詩也書坊刋全芳備俎節去首尾以中四句為庾信詩悞甚與弟姪飲梅花下分得香字張栻日夕色愈正春和天與香提携一樽酒問訊滿園芳嗣嵗詩多思懷人心甚長更須多秉燭玉立勝紅粧前輩鉅公有不可專以詩人目之者至於難題髙致下筆便自不同以胸中天趣勝也此詩前二句有力而又有味中四句平淡末二句用東坡海棠詩髙燒銀燭照紅粧不必說破只說秉燭以照玉立者其勝豓麗多矣王長沙約飲縣圃梅花下分韻得梅字平生佳絶處心事付江梅縣圃經年見芳樽薄暮開朗吟空激烈燒燭且徘徊未逐徴書去窮冬尚一來王長沙名師愈婺州人早登楊龜山之門後與朱張吕三先生交仕至中奉大夫直煥章閣乾淳名卿也其為長沙宰先一年嘗招南軒賞梅南軒分得林字此第二年再㑹故云縣圃經年見師愈生澣從吕東萊及朱文公游仕至朝奉郎澣生柏號魯齋著可言集亦載南軒林字韻及此詩其祖古詩亦附焉蠟梅楊萬里粟玉圎雕蕾金鈿細著行來從眞蠟國自號小黄香夕吹撩寒馥晨曦透暖光南枝本同姓喚我作他楊范石湖梅譜謂蠟本非梅類以其與梅同時香又相近色酷似蜜脾故名蠟梅凡三種檀香梅為上磬口梅次之花小香淡以子種出不經接者為下又謂最難題詠乃誠然也山谷后山簡齋三鉅公但為五言小絶句而東坡唱后山和亦有七言長篇簡齋又有智瓊額黄且勿誇之句大率不過言黄言香而已髙子勉一絶云少鎔燭淚裝應似多爇龍涎嗅不如只恐春風有機事夜來開破㡬丸書此為至佳而律詩全篇則亦罕見云梅尤袤不奈雪埋照可堪風漏香天寒無疹粟日暮有嚴粧桃李真肥婢松筠共老蒼合教居第一獨自占年芳二首取一桃李真肥婢巳是佳句却用老蒼為對似乎借蒼頭之蒼以對婢也全篇俱有味和渭叟梅花不避風霜苦自甘邱壑潛未禁沾額角信好揷梳尖春意已張本寒威今解嚴殷勤留客意尚許隔牆覘梅花冷豓天然白寒香分外清稍驚春色早又喚客愁生待索廵簷笑嫌聞出塞聲園林多少樹見爾眼偏明此八句詩却如渾脫鑄成本只是爛熟說話而無手叚者自不能撮虗空也蠟梅破臘驚春意凌寒試曉粧應嫌脂粉白故染麴塵黄綴樹蜂懸室排箏雁著行團酥與凝蠟難學是生香五六亦能寫蠟梅形狀尾句雖說破香只得亦可謂善賦矣道上人房老梅翁巻孤髙不受埃老怪昔誰栽仙魄乗槎去龍身帶雪來數枝寒照水一㸃淨沾苔頭白狂詩客花時屢往囘此所謂永嘉四靈之一也翁巻字續古一字靈舒詩曰西巖集徐機字文淵一字致中號靈淵詩曰泉山集徐照字道暉號靈暉詩曰山民集趙師秀字紫芝號靈秀詩曰天樂堂集乾淳以來尤楊范陸為四大詩家自是始降而為江湖之詩葉水心適以文為一時宗自不工詩而永嘉四靈從其說改學晚唐詩宗賈島姚合凡島合同時漸染者皆隂撏取摘用驟名於時而學之者不能有所加日益下矣名曰厭傍江西籬落而盛唐一歩不能少進天下皆知四靈之為晚唐而鉅公亦或學之趙昌父韓仲止趙蹈中趙南塘兄弟此四人不為晚唐而詩未嘗不佳劉潛夫初亦學四靈後乃少變務為放翁體用近人事組織太巧亦傷太冗同時有趙庚仲白亦可出入四靈小器此近人詩之源流本末如此嚴先輩詩送紅梅次韻趙蕃盡道梅花白能紅又一竒渾疑丹換骨不是酒侵肌看此敷腴色思儂少壯時盛年雖不再猶擬嵗寒知分界鋪愛直驛張安道因杉製名而驛之前有老梅一株不知安道何為捨彼而取此也杉自誰人種梅從何代栽腹空雷有擊根古土無培要是百年物曾經㡬客來直哉雖見錄清矣可遺材憶梅縱乏幽人宅猶餘大樹祠帶山仍帶水宜飲亦宜詩勿待全開後當乗半放時昏昏郭隂霧皎皎上朝曦趙章泉日作梅課盡乾道淳熙詩得此五言律三首妙絶句六言極多佳者梅花劉克莊造化生尤物居然冠衆芳東家傅粉靣西域返魂香眞可婿芍藥未妨妃海棠平生恨歐九極口説姚黄元注孟郊詩芍藥真堪婿潛夫後集此詩乃寶祐四年丙辰作年七十矣詩太富豓以梅為丈夫而芍藥海棠以為妻妾亦不過一巧耳乏自得趣味也蓋梅詩不貴流麗後村詩細味之極俗亦頗冗梅花張道洽朔風吹石裂寒谷自春生根老香全古花踈格轉清園林干樹秃籬落一枝横佩芷兼懷玉悠然見此兄苔封鶴膝枝流水繞疎籬一白雪相似獨清春不知風流無俗韻恬澹出天姿霜月娟娟夜吾今見所思半枯頑銕石特地數花生逈立風塵表長含水月清屋頭寒嶺瘦門外小溪横萬里今為客相看如弟兄疎疎竹外枝短短水邊籬南雪若相避東風殊不知蘭荃皆弱植桃杏總凡姿坐歎逋仙逺清宵費夢思不帶吟詩癖緣何太瘦生肌膚姑射白風骨伯夷清格外宫粧別天然畵軸横涪翁太多可喚作水仙兄蒼虬百嵗枝殘雪數家籬㸃俗那能染孤芳只自知肯囘桃李靣要是雪霜姿不見紫芝久悠悠使我思不與百花競春風驀地生故將天下白獨向雪中清我輩詩仍要誰家笛自横嵗寒堪共老髯叟十年兄何處出斜枝茆簷自竹籬首囘春一盼最與月相知嚴冷氷霜面清癯山澤姿㡬畨將鶴去倚樹說相思有月色逾淡無風香自生霜崕和樹瘦氷壑養花清政爾疎還冷忽然斜又横千林成獨韻難弟又難兄雪後半横枝溪邊一帶籬春從窮臘透香報老夫知淡月弄疎影嫩寒含令姿天涯值西子牢落慰吾思慇懃天女供那復一塵生質淡全身白香寒到骨清常留雪中看遮莫鬢邉横萬古月宫桂猶吾異姓兄古蘚䕶疎枝幽花發短籬唯宜霜月照莫遣雪風知數㸃玲瓏玉三生灑落姿自從窗外見風味至今思玉肌元不粟未怕夜寒生雪裏孤花發山中一段清㡬囘和月㸔獨立到參横不傍人籬落誰呼石作兄春脚到寒枝詩情滿雪籬每留孤鶴伴不遣一蜂知風漏臘前信月描塵外姿憶從歸閬苑終嵗祗君思萬壑寒皆沍孤根暖自生不隨千卉豓獨負一身清水際寒香逈窗閒夜影横輿臺桃李輩誰弟又誰兄突出一清枝孤村雪擁籬韻無凡眼識香有自心知不是神仙骨何緣氷玉姿㸔㸔金鼎實此味㡬人思實齋張公道洽字澤民衢州開化人端平二年乙未進士真西山所取也老矣始為池州簽判平生梅花詩三百餘首此池州和同官韻五言十六首也或喜其一白雪相似獨清春不知殊不知篇篇有味雖不過古人已言之意然縱說横説信口信手皆脱洒清楚他人學詩三五十年未易及也前是嘗為廣州司理里中新貴馬天驥為帥劉朔齋震孫為倉使天驥怒其作越王臺詩若譏已者朔齋將舉改官奪以他畀澤民不屑也予後至池陽為倉幕白使長拉留之為足舉員改辟襄陽府推官赴在所班改一夕醉臥客舍明早弗興視之卒年六十四今又十六年矣其詩格為江湖不務太髙而圎熟混淪與人色笑和易而逺俗子為仇今亦無復斯人此二韻和二十首刪其四餘七言律百餘韻亦選十餘首也早梅李龏草木盡凋殘孤標獨奈寒瘦成唐杜甫髙抵漢袁安雪裏開春國花中立將壇年年笑紅紫翻作背時㸔雪林李龏字和父近年始卒於霅上年近八十有潄石吟行於世晚節更進此篇惟演漢唐二字為剰五六佳七言一百四十八首和裴廸發蜀州東亭送客逢早梅相憶見寄杜甫東閣官梅動詩興還如何遜在揚州此時對雪遥相憶送客逢春可自由幸不折來傷歳暮若為㸔去亂鄉愁江邊一樹垂垂發朝夕催人自白頭老杜詩自入蜀後又別至夔州又別後至湖南又別此詩脱去體貼於不甚對偶之中寫無窮婉曲之意惟陳后山得其法老杜詩凡有梅字者皆可喜廵簷索共梅花笑冷蘂疎枝半不禁索笑二字遂為千古詩人張本岸容待臘將舒柳山意衝寒欲放梅未將梅蕋驚愁眼要取椒花媚逺天梅花欲開不自覺棣蕚一別永相望繡衣屢許移家醞皂蓋能㤀折野梅此七言律之及梅者市橋官柳細江路野梅香雪岸叢梅發春泥百草生雪籬梅可折風榭柳微舒綠垂風折笋紅綻雨肥梅梅花萬里外雪片一冬深秋風楚竹冷夜雪鞏梅香去年梅柳意還欲攪春心何當㸔花蕊欲發照江梅此五言律之及梅者皆響人牙頰且不特老杜凡唐人宋人詩中有梅字者即便清雅標致但全篇專賦則為至難題而强揠者實為可憾云岸梅崔魯含情含態一枝枝斜壓漁家短短籬惹袖尚憐香半日向人如訴雨多時初開偏稱雕梁畵未落先愁玉笛吹行客見來無去意解帆烟浦為題詩五六善用事雕梁畫早梅隂鏗詩樂府有落梅曲黄鶴樓中吹玉笛江城五月落梅花李白詩梅花韓偓梅花不肯傍春光自向深冬著豓陽龍笛逺吹胡地月燕釵初試漢宫粧風雖强暴翻添思雪欲侵凌更助香應笑暫時桃李樹盗天和氣作年芳五六善評梅心事者併起句豈自喻耶酬崔八早梅有贈兼示之作李商隠知訪寒梅過野塘久留金勒為廻膓謝郎衣袖初翻錦荀令爐薫更換香何處拂胸資蝶粉㡬時塗額藉蜂黄維摩一室雖多病亦要天花作道塲蝶粉以言梅花之片蜂黄以言梅花之鬚似乎借梅以詠婦人之胸之額矣起句平淡却好梅花寄所親李建勲一氣纔新物未知每慚青律與先吹雪霜迷素猶嫌早桃杏雖紅且後時雲鬢自粘飄處粉玉鞭誰指出牆枝老夫多病無風味只向樽前詠舊詩第六句玉鞭誰指出墻枝有風味建勲別有一詩次聨云北客見皆驚節氣郡寮癡欲望杯盤不佳憶杭州梅花因叙舊游寄蕭協律白居易二年閒悶在餘杭曽為梅花醉㡬塲伍相廟前繁似雪孤山園裏麗如粧蹋隨游騎心長惜折贈佳人手亦香賞自初開直至落歡因小飲便成狂薛劉相次埋新隴沈謝雙飛出故鄉歌伴酒徒零散盡惟餘頭白老蕭郎元註薛劉二客沈謝二妓皆是當時歌酒之侣也賞自初開直至落一句最佳胡中丞早梅方干不獨閒花不共時一株寒豓尚參差凌晨未噴含霜朶應候先開亞水枝芬郁合將蘭並茂凝明應與雪相期謝公詠賞愁飄落可得更拈長笛吹凝明二字似生而實佳首句亦有味不獨與閒花異雖獨開亦不忙也梅花林逋吟懷長恨負芳時爲見梅花輙入詩雪後園林纔半樹水邊籬落忽横枝人憐紅豓多應俗天與清香似有私堪笑兒童亦風味解將聲調角中吹和靖梅花七言律凡八首前輩以為孤山八梅胡澹菴嘗兩和之成十六首山谷謂水邉籬落忽横枝此一聨勝疎影暗香一聯疑歐公未然蓋山谷專論格歐公專取意味精神耳山園小梅衆芳揺落獨暄妍占盡風情向小園疎影横斜水清淺暗香浮動月黄昏霜禽欲下先偷眼粉蝶如知合斷魂幸有微吟可相狎不須檀板共金樽剪綃零碎㸃酥乾向背稀稠畵亦難日薄縱甘春至晚霜深應怯夜來寒澄鮮秪共鄰僧惜冷落猶嫌俗客㸔憶著江南舊行路酒旗斜拂墮吟鞍疎影暗香之聨初以歐陽文忠公極賞之天下無異辭王晉卿嘗謂此兩句杏與桃李皆可用也蘇東坡云可則可但恐杏桃李不敢承當耳予謂彼杏桃李者影能疎乎香能暗乎繁穠之花又與月黄昏水清淺有何交渉且横斜浮動四字牢不可移山園小梅數年閒作園林主未有新詩到小梅摘索又開三兩朶團欒空遶百千迴荒隣獨映山初盡晚景相禁雪欲來寄語清香少愁結為君吟罷一銜杯三四眼前所可道亦有味梅花㡬回山脚又江頭遶著瑶芳看不休一味清新無我愛十分孤靜與伊愁任教月老須微見却為春寒得少留終共公言數來者海棠端的免包羞小園煙景正凄迷陣陣寒香壓麝臍池水倒窺疎影動屋簷斜入一枝低畵工空向間時㸔詩客休徴故事題慚愧黄鸝與蝴蝶祗知春色在桃蹊屋簷斜入一枝低王直方以為可與歐黄二公所喜之聨相伯仲胡元任漁隱叢話猶不然直方之說終共公言數來者此一句當攷梅花宿靄相黏凍雪殘一枝深映竹叢寒不辭日日旁邊立長願年年末上看蕋訝粉綃裁太碎蔕疑紅蠟綴初乾香篘獨酌聊為壽從此羣芳興亦䦨孤根何事此柴荆邨色仍將臘候并横隔片煙爭向靜半黏殘雪不勝清等閒題詠誰為媿子細相看似有情搔首壽陽千載後可堪青草雜芳英此一作在半黏殘雪不勝清亦佳句也李雁湖注荆公梅花詩謂粉綃紅蠟之聨為魏野詩恐不然也梅花晁端友皎皎仙姿脉脉情絳羅纎蕚裹瑶英色侔姑射無雙白香比酴醿一倍清臘後春前芳信宻水邊林下曉粧明故應不屬東君管冷豓孤芳取次成晁無咎乃翁詩逺逼唐人近勝宋人東坡所作新城集叙論已見於前也依韻和叔治晚見梅花梅堯臣楚人住處將為援越使傳時合有詩常是臘前混雪色却驚春半見瓊姿笛吹逺曲還多怨風送清香似可期我欲細看持在手誰能為折向南枝梅花江南臘月前溪上照水野梅多少株豓薄自將同鵠羽粉寒曽不逐蜂鬚桃根有妹猶含凍杏樹為隣尚帶枯楚客且休吹玉笛清香飄盡更應無梅花巳先羣卉得春色不與杏花為比紅薄薄逺香來澗谷疎疎寒影近房櫳全枝惡折憎隣女短笛横吹怨楚童墜蕚誰將呵在鬢蘂殘金粟上睂蟲和梅花特特不甘春著力年年能占臘前芳水邊攀折此中女馬上嗅尋何處郎山舍更清裁作援鳯樓偏巧學成粧團枝宻葉都如雪野雀飛來翅合香聖俞此四詩猶少作前一詩見第十巻湖州後作後三詩見第十二巻所㸃皆有味之句或謂老杜負鹽出井此溪女打鼓發船何郡郎下六字可全用乎曰用之而切於題亦何不可次韻道隱憶太平州宅早梅王安石大梁春費寶刀催不似湖隂有早梅今日盤中看剪綵當時花下就傳杯紛紛自向江城落杳杳難隨驛使來知憶舊遊還想見一作在西南枝上月徘徊李雁湖元註次道隠宋敏求韻也叅知政事綬之子嘗知太平州此詩無格律平正而巳能言汴京憶當塗梅之意在他人為之必費力次韻徐仲元詠梅溪杏山桃欲占新亭梅放蘂尚嬌春額黄映日明飛燕肌粉含風冷太真玉笛凄凉吹易徹冰紈生澁畫難親爭妍喜有君詩在老我翛然敢效顰舊挽青條冉冉新花遲亦度栁前春肌冰綽約如姑射膚雪參差是太真揺落㑹應傷嵗晚攀翻剰欲寄情親終無驛使傳消息寂寞誰知笑與顰或問半山此詩方之和靖髙下如何予謂荆公不過鬪飣工緻而已君復之韻不可及也和靖飄然欲仙半山規行矩歩如用太真事凡兩聨誠無一字茍率然不如揺落攀翻之聨有滋味與微之同賦梅花得香字三首漢宫嬌額半塗黄粉色凌寒透薄粧好借月魂來映燭恐隨春夢去飛揚風亭把盞酬孤豓雪徑廻輿認暗香不為調羮貪結子直須留取占年芳李雁湖註此句亦兆公相業也予謂不然世稱王沂公絶句云雪中未問和羮事且向百花頭上開以為宰相狀元之兆俱見於此矣盖亦偶然也但荆公命意自佳結子非貪鼎鼐嘗偶先紅杏占年芳從教臘雪埋蔵得却怕春風漏泄香不御鈆華知國色祗裁雲縷想仙裝少陵為爾牽詩興可是無心賦海棠少陵在西川不賦海棠詩初自薛能拈出此語事見薛能鄭谷詩集鄭谷海棠詩云浣花溪上堪惆悵子美無心為發揚今半山却引而歸於梅可矣東閣官梅動詩興老杜本以稱裴廸今指為老杜亦可也詩話或云子美母名海棠故集中無海棠詩或云曉看紅濕處花重錦官城非海棠不能當也惟陸放翁六言詩云廣平作梅花賦子美無海棠詩政自一時偶爾俗人平地生疑此說得之淺淺池塘短短墻年年為爾惜流芳向人自有無言意傾國天教抵死香鬚裊黄金危欲墮蒂團紅蠟巧能粧嬋娟一種如冰雪依倚春風笑野棠遯齋閒覽云凡詠梅多詠白而荆公獨云鬚裊黄金蒂團紅蠟不惟造語巧麗可謂能道人不到處矣予亦謂褒許太過蒂凝紅蠟綴初乾林和靖已嘗道來此篇惟向人自有無言意一句迸自然要之自况殊覺急廹無和靖水邉林下自得之味也黄梅花庾嶺開時媚雪霜梁園春色占中央未容鶯過毛無纇已覺蜂歸蠟有香弄月似浮金屑水飄風如舞麴塵場何人剰着栽培力太液池邊想菊裳熙寧五年壬子館中作是時但題曰黄梅花未有蠟梅之號至元祐蘓黄在朝始定名曰蠟梅盖王才元園中花也直方之父作頓有亭時則蠟梅詩開山祖似當以平甫詩為首也歐陽公梅聖俞南豐東坡山谷后山盛稱王平甫詩讀其集佳者良多視其兄介甫頗豪富髙於元白多矣比張文潛則風味不及比蘓子美則骨骼不及殆不下坡門秦晁也燈花詩云夜光迷蝶夢朝燼拂蛾眉春夏云過牆紅杏留窻隙著壁青苔上履綦如春從鶗鴂聲中盡人向酴醿影裏閒三神山閉蒼龍闕九道江涵白鷺洲老悟天機思抱甕靜諳人事戒垂堂三伏塵埃火雲外八灘風月石樓中皆壬子年詩其文曰校理集六十巻而詩占二十九巻壬子癸丑兩年詩乃占十四巻似乎太多未經刪擇也東坡謂異時長怪謫仙人舌有風雷筆有神稱許如此平甫所可取者不以兄介甫行新法用小人為然宜諸公尤多之也憶梅花禁街人語絶喧譁庭下沉吟斗柄斜萬里雲容含霰雪一陽泉脉動萌芽頓忘人世蓬心累巳任天年葆鬢加早晚翩然青雀舫滿江春色看梅花梅花醉筆題詩紫界牆梅花零落撲衣裳天香又雜杯中淥春色還驚鬢上蒼渉世何妨為白璧流年未抵熟黄糧一吟起我生平志今古冥㝠出處忘二詩俱豪雪中梅鄭獬臘雪欺寒飄玉塵早梅鬪巧雪中春更無俗豔能相雜惟有清香可辨真姑射仙人氷作體秦家公主粉為身素娥巳自稱佳麗更作廣寒宫裏人鄭獬字毅夫安陸人皇祐五年進士第一有鄖溪集行世其詩壯麗此篇三四最佳梅在雪中故別無可雜者雜字好惟有清香可辨真尤見雪不藏香之意公主粉為身雖引婦人為譬却正而不邪雅而不滛也岐亭道上見梅花戲贈季常元注陳慥字季常蘇軾蕙死蘭枯菊亦摧返魂香入隴頭梅數枝殘綠風吹盡一㸃芳心雀啅開野店初嘗竹葉酒江雲欲落豆稭灰行當更向釵頭見病起烏雲正作堆一㸃芳心雀啅開此句最佳坡天人也作詩不拘法度而自有生意雀之為物嘗凍啅梅開本無情於梅下此語乃若不勝情者尾句盖謂季常侍兒病起新粧行當於釵頭見此花欲其出以侑樽也豆稭灰出文酒清話王勉雪詩上天燒下豆稭灰烏李從教作白梅亦俚語世傳以為戲者東坡作詩初學劉夢得頗渉譏刺第以荆公新法天下不便故勇於排之而又不能忘情於詩間有所斥非敢怨君元豐中李定何正臣舒亶彈劾之下獄欲寘之死至於今此三人姓名士君子望而惡之亶有和石尉早梅二首曰霜林盡處碧溪傍小露檀心媚夕陽天下三春無正色人間一味有真香相思誰向風前寄更晚那辭雪後芳朝夕催人頭欲白故園正在水雲鄉又依然想見故山傍半倚垣陰半向陽短笛樓頭三弄夜前邨雪裏一枝香可能明月來同色不待東風已自芳幸免杜郎傷歲暮莫辭吟對釣漁鄉此兩詩亦頗可觀但以少陵為杜郎則稱譽不當亶眼不識東坡而謂其能識梅花耶兼亦格卑句巧似乎凑合而成惟東坡詩語意天然自出髙妙懸絶不同其人品不堪與東坡作奴故附其詩於坡詩之下不以入正選云紅梅三首取一怕愁貪睡獨開遲自恐氷容不入時故作小紅桃杏色尚餘孤痩雪霜姿寒心未肯隨春態酒暈無端上玉肌詩老不知梅格在更看綠葉與青枝石曼卿紅梅詩認桃無綠葉辨杏有青枝坡嘗謂此兩語村學堂中體也范石湖著梅譜因詩老二字誤以為聖俞詩非矣第二首尾句云不應便雜夭桃杏半㸃微酸已著枝第三首前聯云丹鼎奪胎那是寳玉人頩頰更多姿俱佳坡梅詩古句佳者有江頭千樹春欲暗竹外一枝斜更好及惠州邨字韻三首絶竒如次韻楊公濟二十絶氷盤未薦含酸子霜嶺先看耐凍枝應笑春風木芍藥豐肌弱骨要人醫洗盡鈆華見雪肌要將真色鬭生枝檀心已作龍涎吐玉頰何勞獺髓醫又如明日酒醒應滿地空令饑鶴啄莓苔慿仗幽人收艾納國香和雨入蒼苔前醫字韻二首尤妙後苔字韻亦苦思為之矣梅花寄汝陰蘇太守僧道濳湖山揺落嵗方悲又見梅花破玉蕤一樹輕明侵曉岸數枝清瘦炯疎籬良辰易失空回首習氣難忘尚有詩所向皆公舊題墨肯辜魚鳥却來期東坡元祐六年辛未三月去杭入朝為翰長侍讀道潛師在西湖智果八月坡為賈易等所彈出為龍學潁州此詩乃其年冬所寄也葢猶有望於坡之復來紹聖元年甲戌坡南行而師亦下平江獄屈其服編管邕州謂之何哉次韻賞梅黃庭堅要知宋玉在隣墻笑立春晴照粉光淡薄自能知我意幽閒元不為人芳微風拂掠生春思小雨亷纎洗暗粧只恐濃葩委泥土誰今解合返魂香外集有此詩恐少作然一字不茍和和叟梅花陳師道百卉前頭第一芳低臨粉水浸寒光巻簾初認雲猶凍逆鼻渾疑雪亦香鼎實自期終有待天眞不假更勻粧江南望斷無來使且伴詩翁入醉鄉元註漢房陵有粉水此詩見后山外集任淵所不注者恐非后山作以五六太露不然則是少作嘗自刪去者也梅花張耒北風萬木正蒼蒼獨占新春第一芳調鼎自期終有實論花天下更無香月娥服馭無非素玉女精神不尚粧洛岸苦寒相見晚曉來魂夢到江鄉宛􅏀詩大率自然調鼎自期終有實此句亦不能兆文潛為相故前評謂王沂公王荆公詩兆皆偶然耳論花天下更無香句乃士大夫當以自任者次韻李秬梅花晁補之寒嵒幽霧不曾開殘雪猶封宿草荄一蕚故應先臘破百花渾未覺春來慚非上苑青房比誤作唐昌碎月猜常恨清谿照疎影横斜還許落金杯碎月一作玉蕋蘇門諸公以魯直少游無咎文潛為四學士併陳無己李方叔文集傳世號六君子文名下無虚士讀其詩則知之三四佳五六似近崑體以用事故也尾句婉而妙謂清溪照影雖若可恨然移此影落冨貴家酒杯中亦似未肯也和補之梅花廖正一蕙蘭芳草久暌離偶洩春光此一枝自許輕盈羞粉白何人閒麗得隣窺寒欺薄酒魂消夜月入重簾夢破時幸有暗香襟袖暖江南歸信不應遲廖正一字明畧安陸人元祐中召試舘職見知東坡自號竹林居士有白雲集名亞四學士普明寺見梅楊萬里城中忙失探梅期初見僧窗一兩枝猶喜相看那恨晚故應更好半開時今冬不雪何闗事作伴孤芳却欠伊月落空山正幽獨慰存無酒且新詩梅花下小飲今年春在臘前囘怪底空山見早梅數㸃有情吹面過一花無頼背人開為㩦竹葉澆瓊樹旋折氷葩浸玉杯近節雨晴誰料得明朝無興也重來二詩見江湖集猶少作也誠齋詩晚乃一變江湖荆溪二集猶歩歩繩墨懐古堂前小梅漸開梅邊春意未全囘澹月微風暗裏催近水數株殊小在一梢雙朶忽齊開生愁落去輕輕折不怕清寒得得來膓斷故園千樹雪大江西去亂雲堆隨意行穿翠篠林暗香撩我獨闗心遥看小朶不勝好走近寒梢無處尋未吐誰知膚底雪半開猶䕶蕊頭金老來懶去渾無緒奈此南枝索苦吟絶豔元非着粉團眞香亦不在鬚端何曾天上氷玉質却怕人間霜雪寒枝似去年仍轉瘦花於來嵗定誰看老夫官滿梅應熟齒軟猶禁半㸃酸揀得疎花折得囘銀瓶氷水養教開忽然燈下數枝影喚作窗前一樹梅嵗律又殘還見此我頭自白不須催相看姑置人間事嚼玉餐香嚥一杯此見荆溪集知常州時作梅詩難矣瘦健清洒如此亦不易得克信弟坐上賦梅花二首對酒初驚髪半華折梅還覺興殊佳如何屋角西南月只隔一作照梢頭一兩花自是向來香寂寞不須更道影横斜北枝別有春無價和靖何曾覔得些月波成露露成霜借與南枝作淡粧寒入玉衣燈下薄春撩雪骨酒邊香却於老樹半枯處忽見一梢如許長道是疎花不解語伴人醒醉替人狂此見西歸集在知常州之後立春後一日和張功父園梅未開韻前夕三更月落時東風巳動萬花知江梅端合先交割春色如何未探支只欠梁溪氷柱句追懐和靖暗香詩張家剩有葱根指不把瓊酥滴一枝此見朝天集梁溪謂尤延之時同朝張功父名鎡南湖集俟檢末句甚佳至日後十日雪中觀梅小樹梅花徹夜開侵晨雪片趂花囘即非雪片催梅發却是梅花喚雪來琪樹横枝吹腦子玉妃乘月上瑶臺世間除却梅梢雪便是氷霜也帶埃此退休集詩最為老筆千變萬化横説直説學者未至乎此不可便以為率梅花陸游家是江南友是蘭水邊月底怯新寒畵圗省識驚春早玉笛孤吹怨夜殘冷淡合教閒處着清癯難遣俗人看相逢剩作樽前恨索笑情懐老漸闌放翁詩至萬篇七言律梅花詩三十餘首今選取中半凡十五首總評於後十一月八夜燈下對梅獨酌累日勞甚頗自慰也奔走人間無己時夜窗喜對出塵姿移燈看影憐渠瘦掩户留香笑我癡冷艶照杯欺麴蘖孤標逼硯結氷澌本來難入繁華社莫向春風怨不知十二月初一日得梅一枝絶竒戲作長句今年於是四賦此花矣高標巳壓萬花羣尚恐驕春習氣存月兎𢷬霜供換骨湘娥鼓瑟為招魂孤城小驛初飛雪斷角殘鐘半掩門盡意端詳終有恨夜寒皴玉倩誰温荀秀才送蠟梅十枝竒甚為賦此詩與梅同譜又同時我為評香似更竒痛飲便􅂸千日醉清狂頓减十年衰色疑初割􅉕脾蜜影欲平欺鶴膝枝揷向寶壺猶未稱合將金屋貯幽姿樊江觀梅樊江越中地名莫笑山翁老據鞍探梅今夕到江干半灘流水浸殘月一夜清霜催曉寒倚醉更教重秉燭怕愁元自怯慿欄誰知携客芳華日曽費纒頭錦百端梅花四首老厭紛紛漸鮮歡愛花聊復客江干月中欲與人爭瘦雪後休慿笛訴寒野艇幽尋驚嵗晚紗巾亂挿醉更䦨猶憐心事凄凉甚結子青青亦帶酸月地雲堦暗斷腸知心誰觧賞孤芳相逢只怪影亦好歸去始知身染香渡口耐寒窺淨綠橋邉凝怨立昏黄與卿俱是江南客剰欲樽前說故鄉元㝠行令肅冰霜墻角疎梅特地芳屑玉定煩修月户堆金難買破天荒了知一氣環無盡坐笑千林凍欲僵力量世間難得似挽回歳律放春陽折得名花伴此翁詩情却在醉魂中髙標不合塵凡有尤物眞窮造化功霧雨更知仙骨別鈆丹那悟色塵空前身姑射疑君是問道端須順下風漣漪亭賞梅判為梅花倒玉巵故山幽夢憶疎籬冩真妙絶横窗影徹骨清寒蘸水枝苦節雪中逢漢使髙標澤畔見湘纍詩情怯為花拈出萬斛塵襟我自知射的山觀梅射的山前雨墊巾籬邊初見一枝新照溪盡洗驕春意倚竹真成絶代人餐玉元知非火食化衣應笑走京塵即今畵史無名手試把清詩當冩真凌厲冰霜節愈堅人間乃有此癯仙坐收國士無雙價獨出東皇太一前此去幽尋應盡日向來別恨動經年花中竞是誰流輩欲許芳蘭恐未然園中賞梅閱盡千葩萬卉春此花風味獨清真江邊曉雪愁欲語馬上夕陽香趁人熨眼紅苞初報信囘頭青子又生仁覊游偏覺年華速徙倚闌干一愴神行遍茫茫禹畫州尋梅到處得閒游春前春後百囘醉江北江南千里愁未愛繁枝壓紗㡌最憐亂㸃糝貂裘一寒可賀君知否又得幽香數日留梅若耶溪頭春意慳梅花獨秀愁空山逢時决非桃李輩得道自保冰雪顔仙去要令天下惜折來聊伴放翁閒人中商畧誰堪比千載夷齊伯仲間和靖八梅未出猶為易題疎影暗香一經此老之後人難措手矣近世諸人為梅詩一切蹈襲殊無佳話甚者搜竒抉隠組織千百去梅愈逺放翁七言律三十餘首其在蜀中所賦尤多似若寓意於所愛者詠梅當以神仙隠逸古賢士君子比之不然則以自况若専以指婦人過矣此所選十五首又似若肉多於骨與同時尤楊范體格不同云紅梅毛滂何處曽臨阿母池渾將綘雪㸃寒枝東牆羞頰逢誰笑南國酡顔强自持㡬過風霜仍好色半呼桃杏聽羣兒青春獨養和羮味不為黄蜂飽蜜脾毛滂字澤民為杭州法曹任滿已去抵富陽有惜分飛詞為東坡所賞追還久之以此知名後乃出京卞之門詞佳於詩東堂集亦惟此紅梅花詩為最所至庖饌奢侈有王武子之風味其事見鄭景望集中和草堂吕君玉梅花崔鶠綽約冰肌絶可憐雪中飛燕自媥妍迎春不負千金諾占上常贏一著先斜倚野橋愁脉脉獨窺冰水淨涓涓著人自有竒香在不是偷將與少年崔鶠字徳符雍邱人徙陽翟住坐元符上書言邪人章惇下廢三十年政和中為績溪宰後召殿院不就靖康初右正言請斬蔡京者有婆娑集此詩善用事末句謂著人竒香非偷與韓夀之比其不茍如此他詩可覘江梅田亘千林含凍鬱蒼蒼只有江梅獨自芳暗吐幽香穿別院半欹斜影入寒塘冰膚宛是姑仙女粉靣端疑騎省郎若是蜜奴曾拂掠肯收紅豓貯蜂房田亘字元邈陽翟人與陳叔易崔徳符善建炎以察官召卒嘗有飛鳶詩詆相國寺前資寮僧云涎涎晴空作鶻盤仰空誰不羡髙閒豈知盡日勞心眼只在塵寰腐䑕間其為人可知也梅詩三首前二首云趂暖不隨千卉折凌寒先伴六花開臨溪照影為誰好映竹無人空自憐皆工惟用索笑事乃云廵簷一笑屑瓊瑰韻與事不叶次亦可畧惟此尾句謂蜜蜂若知此花又豈肯收他花為用亦足以諷夫人之不察者姑仙女騎省郎尚可議也窗外梅花盧襄巳消殘雪豆稭灰斜壓疎籬一半開雖我故園無分看問渠春色㡬時來冷香漸欲薫詩夢落蘂猶能韻砌臺定復水邉多屐齒試令長鬛視蒼苔三衢盧㐮字賛元詩見曾慥百家選句律盡健南渡前侍從和田南仲梅壽陽粧額太矜持不待宫貂賜口脂惜妙風姿令雪妬定真消息有春知試看呵手攀條處何似成隂著子時莫遣王孫三弄絶早尋疎影對江􅎠起句尾句類崑體同曾户部吳縣尉張秀才北山僧房尋梅令客對棋徐俯處處已收南畆稻閒閒還㸔北山梅累觴聊爾酡顔在對局怡然笑口開掃徑似知佳客至杖藜惟可數君來移松種樹鄱陽老章甫風帆歳一囘第六句可人庭中梅花正開用舊韻貽端伯羗笛何勞塞北吹江南何處不寒梅千林寂寂無人看獨樹亭亭對客開偏為咨嗟惟爾念是誰移種待君來縱留一曲安能唱恰似朝歌墨子廻師川詩律疎濶其說甚傲其詩頗拙只雪詩二首可取此以予愛梅故及之惟第四句可人耳和和靖八梅用汝南故事禁用體物字胡銓感時濺淚㡬時乾顧影伶俜獨立難自恐迹孤無與對誰憐族冷不勝寒未應一世供愁斷長願三更秉燭看雨過花邉行更好猶嫌子美借銀鞍風亭小立夢初殘歩歩凌空對廣寒照眼雙明清可掬閒情一味淡相㸔曉縈瑞霧黏初潤晴映髙雲薄未乾三嗅臨風思無限蕋宫遥夜酒初闌暗裏尋香自不迷照空焉用夜燃臍欲危疎朶風吹老太瘦長條雨颭低孤豓㡬時同把盞野香猶記助㸔題唐人未識髙標在浪自紛紛說李蹊痩吟幽翫有餘妍更向髙人獨樂園無垢未應經露沐不緇寧信受塵昏春風自識明妃靣夜雨能清吏部魂挿向膽瓶看更好凛如明水薦靁樽當年曾見鳯城頭入骨貪看興未休小摘欲論千種恨微吟還喚一畨愁每嫌俗物一作客薰心醉長願清馨滿世㽞穠李倚風梨帶雨比方應合靣騂羞縞裠練帨照釵荆霜竹寒松秀色并八詠格高凌太白千林地逈切西清着枝有味知深意欹屋無言似薄情日暮水邊空悵望渾如湘浦見皇英一年佳處早梅時勾引風情巧釣詩未分霜凌禁瘦朶漸看春入奈愁枝晚尤奇特憐無伴夜更分明不可私冷落便須憑酒煖從今鄒律未消吹紛紛紅紫勿相猜自古騷人酷嗜梅皂蓋折花憐老杜黄梅時雨憶方回一生耐凍天憐惜滿世趨炎我獨來桃李爭春身老大急須吟醉莫停杯和靖八梅非一日而成有思亦且有力澹菴和之欲一舉而成則不容不竭思而加力此中大有佳語又和八篇用東坡雪詩聲色氣味富貴勢力賦之以多不取返魂梅曾幾徑菊庭蘭日夜摧禪房未合有江梅香今政作依稀似花乃能令頃刻開笑説巫陽真浪下寄聲驛使未須來為君浮動黄昏月挽取林逋句法回此非梅花也乃製香者合諸香令氣味如梅花號之曰返魂梅子選詩無燒香類蓋香癖詩人有之而律詩少也茶山此詩可謂善游戲矣不惟切於題而亦句律森然聳峭諸人見和再次韻蠟炬高花半欲摧班班小雨學黄梅有時燕寢香中坐如夢前村雪裏開披拂故令㩦袖滿横斜便欲映窗來重簾幽户深深閉亦恐風飄不得回此只是燒香似梅花香詩中四句善形容前邨雪裏横斜映窗等語挽而歸之於所聞之香既雅潔又標致瓶中梅小窗氷水青琉璃梅花横斜三四枝若非風日不到處何得色香如許時神情蕭散林下氣玉雪清映閨中姿陶泓毛頴果安用踈影冩出無聲詩此詩吳體也可謂神清蕭散雪後梅花盛開折置燈下滿城桃李望東君破臘江梅未上春窗几數枝逾靜好園林一雪倍清新巳無妙語形容汝不用幽香觸撥人迨此暇時當舉酒明朝風雨恐傷神靜好二字佳園林一雪倍清新尤為佳句喻子才提舉招昌源觀梅倦不克徃蘇仁仲有詩次韻問公何許看花回賸説郊坰十里梅樹雜古今他處少枝分南北一齊開昌源巳辦行厨去離渚猶須使節來况復蘭亭公所葺清流九曲要傳杯元注離渚梅花亦盛昌源離渚皆越上地名奉和姚仲美臘梅趙暘陽和都未見芳菲初喜寒苞發故枝絶色夐無朱粉態真香寧許燕鶯知凝愁金谷登樓日歛黛温泉賜浴時冩作新聲傳玉笛誰人持向月中吹夐無朱粉態不朱不粉可見其為黄梅此句佳餘亦只賦得梅花耳趙暘字乂若其先本杭人徙鄭州及汴畢漸榜甲科靖康初左正言過江寓信州玉山章泉之曾祖也正月七日初見梅花方元修雪淨氷融溪作鱗梅花經眼日當人北枝風力顧不早東閣詩情聊一新煙並博山薰莫亂色同衰鬢揷宜親一年好處得全盡紅綻雨肥猶弄春桐廬處士元英先生之後元修少有詩名政和初審察監大觀庫後通判濬州弟元若靖康右史秘少元矩亦典郡詩三四亦佳嘗同吕居仁趙才仲入大名幕梅花潘良貴天與孤高花獨新世間草木信非倫影涵水月不受采氣傲氷霜何待春冷淡自能驅俗客風騷端合付幽人徃來百匝堦除裏頓使心無一㸃塵氣律崢嶸嵗欲新寒梅芳信冠羣倫直能平地凌大雪可是回根迎小春九畹蕙蘭真上客千山桃李盡庸人即今㩦酒江郊去弄蕋攀條一拂塵中書舎人潘子賤名良貴一字義榮金華人號黙成居士宣和初博士建炎初司諫紹興初都司左史屢以忤時相去為西掖叱向子恭奏事無益不切坐去又惡秦檜遂不起朱文公序其集畤字德久其兄子也探梅呈汪信民吕本中縞帶銀杯欲着塵小園幽樹巳含春風流王謝佳公子臭味曹劉入幕賓細朶定無塵土涴暗香猶帶雪霜新剩摩枵腹搜竒句去惱城南得定人拈出細朶無涴處亦新末句活動謝勝一作亭尉送梅破帷冷落不禁風疾病深藏稱懶慵忽有梅花來陋巻喜聞春信出初冬未須趂雪争先覩尚恐衝寒不滿容㑹約君家好兄弟他年樽酒更相從三四亦活江梅江梅消息未真傳微露芳心几杖前不信氷霜能作惡要令桃李便爭先斜枝似帶千峰雪冷艶偷回二月天准擬從君出城去竹輿仍勝百花韀尋梅則竹輿可矣尋春則可百花韀也此語極新居仁詩專主乎活曾茶山與之同年生於元豐七年甲子過江時各年未五十居仁先有詩名茶山倡和求印可而居仁教以詩法故茶山以傳陸放翁其説曰最忌參死句今人看居仁詩多不領㑹蓋專以工求則不得其門而入也以活求則此梅詩亦可參矣和周楚望紅梅用韻方惟深清香皓質世稱竒試作輕紅更自宜紫府與丹來換骨春風吹酒上凝脂直教臘雪無藏處只恐朝雲有去時溪上野桃何足種秦人應獨未相知范石湖梅譜稱此換骨凝脂之聨曾季貍裘甫著艇齋詩話以為徐師川十三嵗時詩見知東坡蓋妄也慶元中陳剛刋板已著為方子通子通名惟深有莆田小集行於世他詩亦佳裘甫詩話多諛師川恐非作家子通王荆公同時人半出岸沙楓欲死繫舟時有去年痕乃子通詩也荆公愛之書於座右乃誤刋入荆公集曾慥詩選不收此詩謂為姑蘇人其實莆田人也次韻張守梅詩劉子翬草棘蕭蕭野岸隈暗香消息已傳梅雪欺籬落遥難認暖入枝條併欲開愁向天涯今度見老隨春色暗中來似聞詩社多何遜盍試招魂共一杯五六天涯春色有思致次韻劉秀野前邨梅朱熹玉立寒烟寂寞濵仙姿瀟灑盡無塵千林揺落今如許一樹横斜絶可人真與雪霜娛晚景任從桃李殿殘春緑陰青子明年事衆口矜嗟鼎味新次韻劉秀野早梅可愛紅芳愛素芳多情珍重老劉郎踈英的礫尊中影微月黄昏句裏香胸次自憐真玉雪人間何處有氷霜廵簷説盡心期事肯醉佳人錦瑟傍此皆寄意於梅猶孔子所言嵗寒然後知松柏之後彫也無上文無下文只此十箇字足見士君子之為人也次韻秀野雪後書事惆悵江頭㡬樹梅杖藜行遶去還來前時雪壓無尋處昨夜月明依舊開折寄遥憐人似玉相思應恨刼成灰沉吟落日寒鴉起却望柴荆獨自回詩有興有比有賦如風雅頌古體與今固殊而稱人之美即頌也實書其事曰賦要説得形状出微寓其辭則比興皆托於斯如此詩首尾四句實書其事也中兩聨賦則微寓其辭言尋梅見梅寄梅有比有興而味無窮矣不見梅再用來字韻舊嵗將除新嵗來梅花長是雪毰堆如何此日三州路不見寒葩一樹開野水風煙迷慘淡故園霜月想徘徊夜窗却恐勞幽夢速把新詩取次裁文公以乾道三年丁亥八月如長沙訪南軒十一月同游衡岳十二月公歸建陽道中抵新喻西境賦詩曰北嶺蒼茫雨欲來南山騰踏翠成堆穉松遶麓千旗巻野水涵空一鑑開客路情懐無倥偬今晨游眺且徘徊自然觸目成佳句雲錦無勞更剪裁故不見梅詩有此篇韻三州路謂潭衡袁也叔通老友探梅得句垂示且有領客㩦壺之約迎霜破雪是寒梅何事今年獨晚開應為花神無意管故煩我輩着詩催繁英未怕隨清角踈影誰憐蘸緑杯珍重南隣諸酒伴又尋江路探香一作春來夫仁亦在乎熟之而巳矣此詩當以熟觀和宇文正甫探梅張栻天與孤清逈莫隣祗應空谷伴幽人千林掃迹愁無奈一㸃横梢眼便親顧影莫驚身易老哦詩尚覺句能新㡬多生意氷霜裏説與夭桃自在春此詩瀟然出塵其惓惓於當世之君子至矣得見此人焉不得而疎之也紅梅韓無咎不隨羣艶競年芳獨自施朱對雪霜越女謾誇天下白壽陽還作醉時粧半依修竹餘真態錯認夭桃有暗香月底瑶臺清夢到霓裳新換舞衣長韓尚書南澗本桐木𣲖有甲乙集淳熙七年庚子詩當是時鉅儒文士甚盛稱無咎與茶山先是俱寓信州茶山之甥吕成公即無咎之婿無咎詩亦與尤楊范陸相伯仲有子曰琥字仲止號澗泉尤有高節詩與趙昌父並立於信上此詩五六甚佳去年多雪苦寒梅花遂晚元夕猶未盛開范成大隔年寒力凍芳塵勒住東風寂寞濵只管苦吟三尺雪那知遲把一枝春燈烘畵閣香猶冷湯暖銅瓶玉尚皴花定有情堪索笑自憐無術喚真真此詩淳熙十二年乙巳作再題瓶中梅園林揺落凍芳塵南北枝間玉蕋皴風袂挽香雖淡薄月窗横影巳精神雪霜春事年年晚今古詩情日日新鐡石如公猶索句真成嚼蠟對横陳淳熙十四年丁未作次韻尹朋梅花尤袤江北江南天未春陽和先巳到孤根斜枝冷落溪頭路瘦影扶踈竹外邨水部未妨時遣興玉妃誰復與招魂天寒好伴羅浮醉明月清風許重論梅花竹外籬邊一樹斜可憐芳意自萌芽也知春到先舒蘂又被寒欺不放花索笑㡬回驚嵗晚相思一夜繞天涯直須待得垂垂發踏月相㩦過酒家冷蕋疎枝半不禁眼看芳信日駸駸雪霜不管朝天靣風月能知匪石心望逺可無南北使客愁空費短長吟年年准擬花排恨不道看花恨更深尤遂初詩初看似弱久看却自圓熟無一斧一斤痕迹也落梅清溪西畔小橋東落月紛紛水映紅五夜客愁花片裏一年春事角聲中歌殘玉樹人何在舞破山香曲未終却憶孤山醉歸路馬蹄香雪襯東風第二句未有別本可攷遂初詩其孫新安半刺藻嘗刋行而焚於兵予得其家所抄副本頗有訛缺云入春半月未有梅花枯樹扶疎水滿池攀翻未見玉團枝應羞無雪教誰伴未肯先春獨探支㡬度杖藜貪㸔早一年芳信恨開遲留連東閣空愁絶只誤何郎作好詩徳翁有詩再用前韻三首文章仙伯記仇池毎想横斜竹外枝未放柔柯攢玉雪稍看紅葉染燕支别來望逺慿誰寄老去尋春只恐遲把酒問花花觧語定應催促要新詩立馬黃昏遶曲池㡬回踏雪問南枝不應春到花猶未定恐寒侵力不支隴上已驚傳信晚梅前只想弄粧遲臨風不語空歸去獨立無憀自詠詩嘗記尋芳到習池攀條頻認去年枝曉穿曲徑千林去晚度危橋一木支不避春寒來得得只緣人望故遲遲無錢可辦羅浮醉報答春光只有詩首唱以入春半月梅花未開為題八句極委曲有味却不料支字難和有所酬答又成三首遂初詩不見其有著氣力處而平淡中自有拗斡三支字皆壓倒次韻渭叟蠟梅二首取一快㵼鵝黃若下春要將香色鬬清珍蠟丸暗拆東君信梔貌寧欺我輩人光價未輸何遜早詩篇重見豫章新渾金璞玉爭多少要與江梅作近親蠟丸梔貌亦新前首末句云强學瞿曇金作靣只應惟怪老禪親皆能言其色也梅花趙蕃平生欠汝哦詩債歳嵗年年湏要還未至臘時須訪問巳過春月尚躋攀直從開後至落後不問山間與水間却笑淵明賦歸去庭柯目眄自怡顔全樹婆娑夥匪奢數枝纎瘦少尤佳春風上苑吾何忝落日孤邨汝自嗟定論要為塵外物細看那是世間花不然山谷能詩老曷與山礬定等差世之作者無窮尤楊范陸之後又有一趙昌父直從開後至落後即樂天賞自初開直至落第二首五六絶妙梅詩甚多特選此耳探梅韓琥檢㸃山前梅蕋痕花雖未放巳銷魂縱饒老榦摧幽谷也勝繁華倚市門冷落不成欺歲晚陽和且可待春温清香一噴紅梢滿却月凌風未易論此澗泉紹熙三年壬子詩澗泉生於紹興三十年巳卯是年才三十四歳而作詩巳如此三四固以自謂雖如此勝如彼矣第六句猶未㤀世情嘉定初即休官不仕嘉定十七年甲申理宗即位之月卒年六十四其大節有可取則自許之意不必如詩所云可也詩四十餘巻約五千篇澗泉諱琥字仲止南澗無咎之子予嘗為作傳梅花今年全未作梅詩與向花前浪品題不分雪霜摧折盡尚須天日照臨之静看冷蕋無人㑹閒遶孤根只自知猶有幽禽解鳴語為予醻酢殆移時肯同桃李强攙春自占空山野水濵老氣却因髙樹得清姿不待數花新本來淡薄難從俗縱入紛華亦絶塵最愛夜深霜重處冷風吹起月精神此澗泉紹興末年詩朱文公入講筵侂胄未甚盛之時仲止其言已如此髙了第二首三四愈吟愈有味謂髙樹老氣亦無待於數花不亦妙乎凡前輩自許只許退不許進王沂公梅詩偶爾做著狀元宰相乃謂詩必以榮進為兆乃俗論也春山看紅梅年年常得醉君家今日紅梅正著花㸃綴初非桃有艶横斜寧與李爭華依然竹外併林下况復山巔與水涯歩遶孤根香更在髙懐無惜共流霞此仲止開禧中詩三四殊佳餘尚有梅詩數十首今但選八首於此澗上蠟梅香照眼花枝是蠟梅香傳小樹為誰開弄陰欲雪山長暝破曉終風水漫洄鳥語春聲喧復靜鴻飛寒影去還來數間敗屋浮橋外何苦無吟不舉杯中四句引四物若不切於梅者而句句有委折縈紆無盡之意所謂蠟梅香甚在其中矣嘉定八年乙亥詩也梅下雖得霜濃春自濃野梅無處不為容半依古渡迷芳草獨占荒山對古松綽約花房宜戲蝶崔嵬枝幹若游龍角巾一幅支笻久不覺烟中有寺鐘歐公詩春風疑不到天涯二月山城未見花此詩起句十四字似之三四尤佳尾句愈佳丙子年詩澗東臨風飲梅花尚未全放一樹獨佳殘雪餘寒二月來澗東猶是欲開梅夕陽影淡初尋句流水聲清更把杯取友喚隣相領略破荒擇勝獨徘徊誰能折向南枝醉一陣寒香撲麝煤五六惟陳后山到此地仲止筆力古淡亦能之丙子年詩探梅探梅山路一杯亭日淡風微遠靄生莫問古來尋古話只知春近愛春情㡬枝冷蕋吟方見一㸃疎花畵不成我挾兩兒同二友老來酒外更何營痩淡之中自穠粹嘉定庚辰詩仲止卒於十七年甲申八月有大節此四詩皆老筆也寄尋梅戴復古寄聲說與尋梅者不在山邉即水涯又恐好枝為雪􅐦或生幽處被雲遮蜂黃塗額半含蕋鶴膝翹空疎帶花此是尋梅端的處折來湏付與詩家輕快可喜石屛戴復古字式之天台人早年不甚讀書中年以詩游諸公間頗有聲夀至八十餘以詩為生涯而成家盖江湖游士多以星命相卜挾中朝尺書奔走閫臺郡縣餬口耳慶元嘉定以來乃有詩人為謁客者龍洲劉過改之之徒不一人石屏亦其一也相率成風至不務舉子業干求一二要路之書為介謂之濶匾副以詩篇動獲數千緍以至萬緍如壺山宋謙父自遜一謁賈似道獲楮幣二十萬緍以造華居是也錢塘湖山此曺什伯為羣阮梅峰秀實林可山洪孫花翁季蕃髙菊磵九萬徃徃雌黄士大夫口吻可畏至於望門倒屣石屏為人則否每於廣座中口不談世事縉紳多之然其詩苦於輕俗髙處頗亦清健不至如髙九萬之純乎俗如劉江邨瀾最晚輩本天台道士能詩還俗磨瑩工宻自謂晚唐予及識其人今亦歸九泉而處士詩名遂絶響矣故因取石屏此詩而詳記之於此梅孤標粲粲􅐦羣葩獨占春風管歲華㡬樹參差江上路數枝粧㸃野人家冰池照影何湏月雪㟁聞香不見花絶似人間隐君子自從幽處作生涯皆前人已曽道之句而律熟句輕頗亦自然亦不可弃也石屏小集詩百餘首趙嬾菴汝讜字蹈中所選也蹈中詩至中年不為律體獨喜為選體有三謝韋栁之風其所取石屛詩殆亦庶矣蹈中兄曰南塘汝談字履常詩文俱髙尤精四六䟦語頗亦不滿於石屛之詩一言以䔩之曰輕俗而已葢根本淺也今續集有詠梅投所知中四句云獨開殘臘與時背奄勝衆芳其格髙欲啟月宫休種桂如何仙苑只栽桃所謂其格髙者殊為衰颯欲啟如何一聮尤覺俳陋非深於詩者不能察也同時稍後有許棐梅屋者有蠟梅江梅同瓶詩曰苗裔元從庾嶺分兩般標致一般春淡粧西子呈嬌態黄靣瞿曇現小身不羡腰金横玉貴來尋嚼蠟飲氷人只愁花謝香狼藉桃李如何接後塵第二句不勝其俗三句愈覺其俗此江湖詩所以難選云客有致橫驛苔梅者絶奇古劉良叔以詩借觀次韻奉納方岳雪侵橫驛苔枝古莫作江南一様看醖釀春情何遜老崚嶒詩骨孟郊寒也知餘子十分俗雅有書生半㸃酸政恐劉郎識桃耳相逄冷淡亦良難五用韻水曹為骨逋為髓風雪㶚橋誰共㸔千里夢廽歸路逺一枝春占暮江寒飛飛雨片猶堪醉㸃㸃晴香巳帶酸䨇玉瓶乾情正洽與君落筆不辭難秋崕詩二十巻七言律梅花詩十餘首獨選此二首又五中之二也此在維楊制幕時年壯氣銳句律髙峭而詩始佳莫作江南一様看盖秋崕江東人亦所以自標也二和有云蘚樹卧龍鱗甲老霜橋立馬毛骨寒亦壯健四和有云笑堪索否便堪醉盟可尋歟不可寒比之楊誠齋詩變之又變古未有此法學者不可以為凖也落梅劉克莊一片能教一斷腸可堪平砌更堆牆飄如遷客來過嶺墜似騷人去赴湘亂㸃莓苔多莫數偶粘衣袖久猶香東風謬掌花權柄却忌孤髙不主張昨夜尖風幾陣寒心知尤物久留難枝疎似被金刀剪片細疑經玉杵殘痛叱山童持箒去苛留野客坐苔看月中徙倚慿空樹也勝吳兒賞牡丹潛夫淳熙十四年丁未生二十五為靖安尉嘉定中從李大江淮制幕監南岳廟以歸詩集始此初有南岳五藁此二詩嘉定十三年庚辰作年三十四時正奉祠家居後從辟廵廣西帥蜀知建陽縣當寳慶初史彌逺廢立之際錢塘書肆陳起宗之能詩凡江湖詩人皆與之善宗之刋江湖集以售南岳藁與焉宗之賦詩有云秋雨梧桐皇子府春風楊栁相公橋哀濟邸而誚彌逺本改劉屏山句也敖臞菴器之為太學生時以詩痛趙忠定丞相之死韓侂胄下吏逮捕亡命韓敗乃始登第致仕而老矣或嫁秋雨春風之句為器之所作言者併潛夫梅詩論列劈江湖集板二人皆坐罪初彌逺議下大理逮治鄭丞相清之在𤨏闥白彌逺中輟而宗之坐流配於是詔禁士大夫作詩如孫花翁惟信李蕃之徒寓在所改業為長短句紹定癸巳彌逺死詩禁觧潛夫為病後訪梅九絶句云夢得因桃却左遷長源為栁忤當權幸然不識桃并栁却被梅花累十年又云一言半句致魁台前有沂公後簡齋自是君詩無警䇿梅花窮殺幾人來又云春信分明到草廬呼兒沽酒買溪魚從前弄月嘲風罪即日金雞巳赦除時潛夫廢閒恰十年矣其詩格本卑晚而漸進如此詩遷客騷人金刀玉杵二聯皆費粧㸃氣骨甚弱如憶真州梅園詩次韻方孚若瀑上種梅窻龎之韻至於十首今無可選後集梅絶句至百首謂之百梅如方烏山澄孫諸人各和至百首頗不無贅而亦有竒者惟此可備梅花大公案也趙禮部和予梅詩十絶送林錄參韻雜之萬如詩中殆不可辨别課一詩以謝劉克莊更無一㸃涴鈆華狀出氷枝糁玉葩十絶頓令儂北靣萬如原住子東家自羞貧女釵邉朶難傍宫人額上花縱使北風如鐡勁未妨雪月照槎牙禮部當是趙時煥寓居泉州林錄参當是林觀後四句有所諷自羞貧女釵邉朶言詩之淡者難傍宫人額上花言詩之艶者北風雪月二句以喻夫臨患難而不可奪也然後邨詩未為全淡盖出處之際亦似未然萬如居士李縝字伯玉李雲龕之子朱文公作墓誌稱其有文十巻梅百詠寓泉州後村初為石塘林同林合賦梅花百絶未知有萬如詩後見之乃謂萬如詩如漢宫洞簫梨園羯鼔用事精切下字清新音節流麗有二宋王仲至晏叔度之風惜其太脂粉視陳簡齋便自邈然後村又自謂所賦如樵歌牧唱妍詞巧思不及李逺甚即此詩五六意也然以予觀之梅花詩清瘦瀟洒近年莫如尤延之雖楊誠齋陸放翁亦頗浮肥矣後邨之言良是其詩未臻乎奥地也梅花二十首張道洽和靖風流百世長吟魂依舊化幽芳巳枯半樹風煙古纔放一花天地香不肯靣隨春冷暖只將影共月行藏懸知骨法清如許傳得仙人服玉方數蘤疎踈靜處芳便成佳景不荒凉暖回窮谷春常早影落寒溪水也香自倚風流髙格調唯消質素淡衣裳滿天霜月花邊宿無復莊周蝶夢狂泠冷澗水石橋傍春正濃時風味長清介終持孤竹操繁華不夢百花塲描來月地前生瘦吹落風簷到死香結習已空無染着每來花下輒成狂凍蘤無多樹更孤一溪霜月照清癯終身只友竹君子雅志絶羞松大夫白玉都􅂸雕作蕋黃金不惜撚為鬚亦知世有春風伴問萬花中著得無孤芳嫌殺渾羣芳雪滿山坳月滿塘韻士不隨今世態仙姝猶作古時粧雪羞潔白常囘避春忌清髙不主張地僻何妨絶供給饑來只用嚥寒香不主張之句仍是本劉後村政爾寒陰惨淡時忽逄孤艶映疎籬金蘭氣味無人識玉雪襟懐只自知竹屋紙窻清不俗茶甌禪榻兩相宜花邊不敢髙聲語羗管凄凉更忍吹千林凍損積陰凝一㸃春從底處生玉色獨鍾天地正鐵心不受雪霜驚孤芳若與東君背數樹能令南紀明醉後惟愁踏花影青鞋不敢近花行數株如玉照寒塘無日無風自在香谷冷難教春管領山深自共雪商量巳成到骨詩家瘦不賣入時宫様粧亂挿繁花花下醉只應我似放翁狂陸放翁詩我死諸君思此狂今句本此行盡荒林一徑苔竹稍深處數枝開絶知南雪羞相並欲嫁東風耻自媒無主野橋隨月管有根寒谷也春囘醉餘不睡庭前地只恐忽吹花落來天然標格閬風鄉薄薄鈆華淡淡粧月地向誰孤弄影雪天驀地忽聞香征鞍處處頻囘首羗管聲聲欲斷腸天上玉妃新謫墮游蜂不敢近花傍纔有梅花便自竒清香分付入新詩閒持盃酒臨風處獨倚欄干待月時試向園林千萬樹何如籬落兩三枝霜天角裏空哀怨邱壑風流總不知纔有梅花便自清孤山兩句一條冰問渠紫陌花間客得似清溪樹下僧雅淡久無蘭作伴孤髙惟有竹為朋雪天枝上三更月人在瑤臺第㡬層天寒花信未能靈佇立通宵户不扄小蕚欲爭天下白數條獨向雪中青肯教旅雁尋常見未許游蜂取次經一片唯愁汚塵士寒苕和月掃中庭纔有梅花便不塵和霜和月為精神風流晉宋之間客清曠羲皇以上人年後臘前無盡意水邊林下自然春萬花錦繡東風閙難凂翛翛玉雪身纔有梅花便不村其人如玉立黃昏些些蕋裏藏風韻箇箇枝頭帶月魂常挹清香來燕坐可教落片㸃空樽到腰深雪庭前白心事寒松擬共論纔有梅花便不同一年清致雪霜中疎踈籬落娟娟月寂寂軒窻淡淡風生長元從瓊玉圃安排合在水晶宫何湏更探春消息自有幽香夢裏通天下無花白到梅風前和我不塵埃崚嶒鶴骨霜中立偃蹇龍身雪裏來未許瓊花為行軰定教玉蕋作輿臺夜深立盡扶疎影一路清溪踏月囘㡬年冷樹雪封骨一夜東風春透懐花裏清含僊韻度人中癯似我形骸三㸃兩㸃淡尤好十枝五枝疎更佳野意終多官意少玉堂茅舎任安排愛疎愛淡愛枯枝已愛梅花更愛竒江路一年春好處石橋半夜月明時蹇驢積雪深須去破㡌嚴霜打不知世上非無好顔色詩人所賞是風姿癖愛梅花不可醫開教探早落教遲欲知無限春風意盡在相將暮雪時竹嶼煙深尋得巧茅簷月淡立成癡夢驂鸞鶴相尋去題遍江南寺寺詩實齋張道洽字澤民開禧元年乙丑生今而猶存則七十九矣年六十四卒於錢塘七言律梅花詩六十首今選其二十首夫詩莫貴於格髙不以格髙為貴而專尚風韻則必以熟為貴熟也者非腐爛陳故之熟取之左右逄其原是也此二十首梅詩他人有竭氣盡力而不能為之者公談笑而道之如天生成自然有此對偶自然有此聲調者至清潔而無埃至和平而不怨放翁後村亦當歛衽也又和予七月見梅花詩二十首亦七言律而韻太險有二聯云前生薝葡林中夢到死旃檀國裏香早緣服玉肌能白不為熏衣骨亦香只是泛言梅花亦清爽有思致云見梅雜興陸夢發人間誰是識梅真弃實求花後世心何似只如三代日分甘投老萬山深寄來陸凱渾多事說到林逋亦費吟耿耿知音唯月在無言相㸔古猶今余友太府寺丞陸太初諱夢發同里人長予五嵗徳祐元年乙亥以公事殁於上海年五十四平生苦吟好髙梅興三十首今選此一首五六本前輩遺論夫草木之花三百五篇巳或取之至楚騷而特盛後世以花詠梅亦比興之不容巳者也似未可貶特陳腐襲蹈則可鄙耳必將如三代之時取梅於其實不於其花則吾太初又何必見之詩又有一聫云生禀東南温厚氣才當西北苦寒時盖自况也但太露瀛奎律髓巻二十

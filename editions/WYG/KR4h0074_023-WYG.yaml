body:
  text: 瀛奎律髓巻二十三元方回編閒適類韓昌黎送李愿歸盤谷序下一段所謂窮居而閒處升髙而望逺坐茂樹以終日濯清泉以自潔采於山美可茹釣於水鮮可食黜陟不聞理亂不知起居無時惟適之安此能極言閒適之味矣詩家之所必有而不容無者也凡山遊郊行原居野處幽寂隱逸之趣於此所選詩備見之如姚合少監集有閒適一類武功縣中作三十首者乃是仕宦而閒適已選置宦情類中先欲分郊野閒適為二類要之閒適者流多在郊野身在城府朝市而有閒適之心則所謂大隱君子亦世之所希有者也亦不無一二附諸其中焉五言一百八首終南别業王維中歳頗好道晚家南山陲興來每獨往勝事空自知行到水窮處坐看雲起時偶然值林叟談笑無還期右丞此詩有一唱三歎不可窮之妙如輞川孟城㘭華子岡茱茰沜辛夷塢等詩右丞唱裴廸酬雖各不過五言八句窮幽入𤣥學者當自細叅則得之歸嵩山作清川帶長薄車馬去閒閒流水如有意暮禽相與還荒城臨古渡落日滿秋山迢逓嵩髙下歸來且閉關閒適之趣澹泊之味不求工而未嘗不工者此詩是也韋給事山居尋幽得此地詎有一人曾大壑隨階轉羣山入户登庖厨出深竹印綬隔垂藤即事辭軒冕誰云病未能此詩善用韻曾登二韻險而無迹羣山入戸登一句尤竒比之王介甫兩山排闥送青來尤簡而有味輞山閒居一從歸白社不復到青門時倚簷前樹逺看原上村青菰臨水映白鳥向山翻寂寞於陵子桔橰方灌園右丞有六言田園樂七首花落家童未掃鶯啼山客猶眠舉世稱歎山下孤烟逺村天邊緑樹髙原與此時倚簷前樹逺看原上村予獨心醉不已淇上即事屏居淇水上東野曠無山日隱桑柘外河明閭井間牧童望村去田犬隨人還静者亦何事荆扉乘晝關右丞詩長於山林河明閭井間一聨詩人所未有也牧童田犬句尤雅淨歸終南山孟浩然北闕休上書南山歸敝廬不才明主棄多病故人疎白髪催年老青陽逼歳除永懷愁不寐松月夜窗虚王維私邀浩然伴直禁林以此詩忤明皇八句皆超絶塵表過故人莊故人具雞黍邀我至田家緑樹村邊合青山郭外斜開軒面場圃把酒話桑麻待到重陽日還來就菊花此詩句句自然無刻畫之迹浩然自有厨人具雞黍稚子摘楊梅以真對假見稱於世如郊野之作釣竿垂北澗樵唱入南軒先人留素業老圃作隣家鳥過烟樹宿螢傍小軒飛皆佳又如山水㑹稽郡詩書孔氏門亦佳句吾州孔氏改㑹稽二字為新安用為桃符累年晚輩不知為浩然詩也東陂遇雨率爾貽謝南池田家春事起丁壯聚東陂殷殷雷聲作森森雨足垂海虹晴始見河栁潤初移予意在耕鑿因君問土宜此詩起句末句幽雅自然又有句云草得風光動虹因雨氣成亦佳正月三日歸溪上有作簡院内諸公杜甫野外堂依竹籬邊水向城蟻浮猶臘味鷗泛已春聲藥許隣人斸書從稚子擎白頭趨幕府深覺負平生老杜合是廊廟人物其在成都依嚴武為叅謀亦屈甚矣此詩二起句言草堂之狀三四言時節五六言情懐而未二句感慨深矣老杜平生雖流離多在郊野而目擊兵戈盜賊之變與朝廷郡國不平之事心常不忘君父故哀憤之辭不一不獨為一身發也草堂即事荒村建子月獨樹老夫家雪裏江船渡風前逕竹斜寒魚依宻藻宿鷺起圓沙蜀酒禁愁得無錢何處賒此亦成都草堂詩也末句無錢賒酒其窮甚矣雪風一聨如畫四句皆體物者暮春題瀼西新賃草屋彩雲隂復白錦樹曉來青身世雙蓬鬢乾坤一草亭哀歌時自短醉舞為誰醒細雨荷鋤立江猿吟翠屏此詩䕫州瀼西作彩雲隂復白謂晴雲如彩隂則忽復變白錦樹曉來青謂花之驟開如錦曉來猶是青樹未見花也起句言景中四句言身老言家陋言所以感慨者而細雨一句喚醒二起句葢是景也實雨為之猿吟一句尤深怨矣老杜傷時亂離往往如此其詩開閤起伏不可一律齊也江亭坦腹江亭暖長吟野望時水流心不競雲在意俱遲寂寂春將晚欣欣物自私故林歸未得排悶强裁詩老杜詩不可以色相聲音求如所謂圓荷浮小葉細麥落輕花市橋官柳細江路野梅香柱穿蜂溜蜜棧缺燕添巢細雨魚兒出微風燕子斜芹泥香燕觜花蕋上蜂鬚他人豈不能之晚唐詩千鍜萬錬此等句極多但如老杜水流心不競雲在意俱遲即如片雲天共逺永夜月同孤景在情中情在景中未易道也又如寂寂春將晚欣欣物自私江山如有待花栁更無私作一串説無斧鑿痕無粧㸃迹又豈只是説景者之所能乎他如有客過茅宇呼兒正葛巾自媿無鮭菜空煩卸馬鞍憂我營茅棟携錢過野橋十字只是五字却下在第五第六句上亦不如晚唐之拘正如山谷詩秋盤登鴨脚春網荐琴髙其下却云共理須良守今年輟省曹上聨太工下聨放平淡一直道破自有無窮之味所謂善學老杜者也又此篇末句排悶似與心不競意俱遲迥異殊不知老杜詩以世亂為客故多感慨其初長吟野望時閒適如此久之即又觸動覊情如彼不可以律束縛拘覊也過鸚鵡洲王處士别業劉長卿白首此為漁青山對結廬問人尋野筍留客饋家蔬古栁依沙發春苗帶雨鋤共憐芳杜色終日伴閒居第五句發當作岸閒遊二首韓愈雨後來更好澆池徧青青栁花閒度竹菱葉故穿萍獨坐殊未厭孤斟詎能醒持竿至日暮幽詠欲誰聽第四句故一作亂茲遊苦不數再到遂經旬萍葢汙池淨藤籠老樹新林烏鳴訝客岸竹長遮鄰子雲祗自守奚事九衢塵此二詩一唱三歎有餘味以工論之只前詩第一句已極佳後詩第六句着題詩亦體貼不盡題李凝幽居賈島閒居少隣並草徑入荒園鳥宿池邊樹僧敲月下門過橋分野色移石動雲根暫去還來此幽期不負言此詩不待贅説敲推二字待昌黎而后定開萬古詩人之迷學者必如此用力何止吟安一个字撚斷數莖髭耶訪李甘原居原西居處静門對曲江開石縫銜枯草楂根漬古苔翠微泉夜落紫閣鳥時來仍憶尋淇岸同行採蕨廻此詩亞於前作第四句蜀碑本作查根上淨苔紫閣白閣終南山二峰之别名二詩皆以平聲起句而末句平倒在老杜集四更山吐月平起平倒者甚少晚唐必欲如此而其終擲前六句不顧别出一意繳此一一句亦一格也如老杜合分雙賜筆猶作一飄蓬以自然對繳住則晚唐所不能矣僻居無可上人相訪自從居此地少有事相關積雨荒隣圃秋池照逺山硯中枯葉落枕上斷雲閒野客將禪子依依徧往還此詩較前二首皆一體中四句極其工而皆不離乎景情亦寓乎景中但不善措置者近乎冗老杜則不拘有四句皆景者有兩句情兩句景者尤伶俐淨潔也送唐環歸敷水莊毛女峰當戸日髙頭未梳地侵山影掃葉帶露痕書松徑僧尋廟一作藥沙泉鶴見魚一川風景好恨不有吾廬八句皆好三四尤精緻無中造有者掃山影之謂也微中致著者書露痕之謂也人能作此一聨亦可以名世矣原東居喜唐温淇頻至曲江春草生紫閣雪分明汲水嘗泉味聽鐘問寺名墨研秋日雨茶試老僧鐺地近勞頻訪烏紗出送迎起句十字自然而佳中四句用工而佳末句放寛亦大自在原上秋居關西又落木心事復如何歳月辭山久秋霖入夜多鳥從井口出人自岳陽過倚杖聊閒望田家未剪禾五六謂經年乃下得句學者當細味之寄錢庻子曲江春水滿北岸掩柴關祗有僧鄰舍全無物映山樹隂終日掃藥債隔年還猶記聽琴夜寒燈竹屋間五六最佳末句脱洒偶作野步隨吾意那知是與非稔年時雨足閠月暮蟬稀獨樹依岡老遥峰出草微園林自有主宿鳥且同歸此詩妙五六尤淡而細只那知是與非一句頗俗馬戴居華山因寄玉女洗頭盆孤髙不可言瀑流蓮岳頂河注華山根絶雀林藏鶻無人境有猿秋蟾纔過雨石上古松門五六謂絶雀之林為藏鶻無人之境始有猿一句上本下一句下本上詩家不可無此互體工部詩林踈黄葉墜野静白鷗來亦似南齋獨自南齋卧神閒景自空有山來枕上無事到心中簾捲侵牀月屏遮入座風望春春未至應在海門東此詩中四句却平易白樂天集亦有此詩題云閒卧起句云盡日前軒卧第三句有雲當枕上第五句月作日第七句至作到恐只是白公詩孟融逸人孟君臨水居不食水中魚衣衲惟麄帛筐箱祗素書樹林幽鳥戀世界此心踈擬棹孤舟去何峰又結廬五六變體若專如三四則大鄙矣不可不察此曲折也題朱餘慶所居天寒吟竟曉古屋瓦生松寄信船一隻隔鄉山萬重樹來沙岸鳥窗度雪樓鐘每憶江中嶼更看城上峰三四新異今蜀人語頗多類第三句豈普州人得其遺風而廣之耶寄胡遇一自殘春别經炎復到凉螢從枯樹出蛩入破堦藏落葉書勝紙閒砧坐當牀東門因送客相訪也何妨此詩句句伶俐不知幾鍜而成後人豈可一蹴而至耶閒卧白居易薄食當齋戒散班同隱淪佛容為弟子天許作閒人唯置牀臨水都無物近身清風散髮卧兼不要紗巾此所謂閒之至者起句十字有思索三四天成尾句脱洒閒坐煖擁紅爐火閒搔白髪頭百年慵裏過萬事醉中休有室同摩詰無兒此鄧攸莫論身在日身後亦無憂樂天心事曠達而詩律寛和雖則云然着力為詩者終不能及也三四妙陳后山偶相犯末句尤妙題令狐處士溪居項斯白髪已過半無心離此溪病嘗山藥徧貧起草堂低為月窗從破因詩壁重泥近來嘗夜坐寂寞與僧齊三四妙甚劉後村深喜之早春題湖上顧氏新居近得水雲看門長侵早開到時微有雪行處已無苔勸酒客初醉留茶僧未來每逢晴暖日唯見乞花栽門不當官道行人到亦稀故從餐後出方至夜深歸開篋揀書巻掃牀移褐衣幾時同買宅相近有柴扉蜀本賈島集誤收此詩賈詩更覺苦硬而此覺寛慢然此亦新美可喜也東郊别業耿湋東臯占薄田耕種過餘年䕶藥栽山棘澆蔬引竹泉晚雷期稔歳重霧報晴天若問幽人意思齊沮溺賢中四句皆工后聨尤新題馬儒乂石門山居顧非熊尋君石門隱山近漸無青鹿迹入柴户樹身穿草亭雲低收藥徑苔惹取泉瓶此地客難到夜琴誰共聽顧况之子其詩工甚三四竒矣第六句小巧中有味晚秋閒居張籍獨坐髙秋晚蕭條足逺思家貧長畏客身老轉憐兒萬種盡閒事一生能幾時從來疎懶性應祗有僧知三四似纒於家累然佳句也五六遂破前説而自開解焉亦佳句也過賈島野居青門坊外住行坐見南山此地去人逺知君終日閒蛙聲籬落下草色户庭間好是經過處惟愁暮獨還予嘗評之賈浪仙詩幽奥而清新姚少監詩淺近而清新張文昌詩平易而清新題盧處士山居温庭筠西溪問樵客遥指故人家古樹老連石急泉清露沙千峰隨雨暗一徑入雲斜日暮雀飛散滿山蕎麥花温飛卿詩多麗而淡者少此三四乃佳晚秋拾遺朱放訪山居秦系不逐時人後終年獨閉關家中貧自樂石上卧常閒墜栗添新味殘花帶老顔侍臣當獻納那得到空山五六工讀唐人五言律詩千變萬化賈島是一様張司業是一様忽讀此詩又别是一様無窮無盡竒妙山中贈張正則評事系時被奏左衛以疾不就終年常避喧師事五千言流水閒過院春風與閉門山容邀上客桂實落華軒莫强教余起微官不足論三四自然天下詠之江村題壁李商隱沙岸竹森森維舟聽越禽數家同老壽一徑自隂深喜客常留橘應官説採金傾壺真得地愛日靜霜砧三四好五六亦是晚唐義山詩體不宜作五言律詩不淡不為極致而艶而組不可也南澗耕叟崔塗年年南澗濱力盡志猶存雨雪朝耕苦桑麻歳計貧戰添丁壯力老憶太平春見説經荒後田園半屬人第四句六句結句皆好鐘陵野步曹松岡扉聊自啓信步出波邊野火風吹濶春冰鶴啄穿渚檣齊驛樹山鳥入公田未割孤雲勢空思白閣年唐詩自是一種風味只岡扉二字便新中四句工山中言事嵐靄潤窗櫺吟詩得冷癥教餐有效藥多媿獨行僧雲濕煎茶火冰封汲井繩片扉深着掩經國自無能冷癥二字竒第六句太竒與苔惹取泉瓶同鏡中别業方干世人如不容吾自縱天慵落葉慿風掃香秔倩水舂花朝連郭霧雪夜隔湖鐘身外能無事頭宜白此峰此吾家處士𤣥英先生方干也逺祖居歙之東鄉曰真應仙翁名儲先生家在桐廬白雲原又曰鸕鷀原别業在越之鏡湖唐未不仕巢賊擾中原强臣據方鎮卒全名節以終釣臺書院與嚴子陵范文正公並祠一原數百家方姓至今衣冠不絶詩尤見知於姚秘監合此篇起句超放未句有終焉之志佳句不一予别以摘抄矣題李頻新居姚合賃居求賤處深僻任人嫌葢地花如毯當門竹勝簾勸僧嘗藥酒教僕認一作辨書簽庭際山宜小休令著石添予謂學姚合詩如此亦可到也必進而至於賈島斯可矣又進而至老杜斯無可無不可矣或曰老杜如何可學曰自賈島幽微入而參以岑參之壯王維之潔沈佺期宋之問之整過楊處士幽居引水穿風竹幽聲勝逺溪裁衣延野客剪翅養山雞酒熟聽琴酌詩成削樹題惟愁春氣暖松下雪和泥第六句最新閒居不自識疎鄙終年住在城過門無馬跡滿宅是蟬聲帶病吟雖苦休官夢已清何當學禪觀依止古先生中四句皆佳四靈亦學到此地但却學賈島未升其堂况入其室乎山中寄友生獨在山河裏朝朝遂性情曉泉和雨落秋草上牆生因客始沽酒借書方到城詩成聊自遣不是趂聲名五六好比賈島斤兩輕一不逮對偶切二不逮意思淺三不逮却有一可取曰清新閒居遣懷永日厨煙絶何曾暫廢吟閒詩隨思緝小酒恣情斟看月嫌松宻垂綸愛水深世間多少事無事可關心第五句最佳必是先得之句下句却無甚滋味終年城裏住門户似山林客怪身名晚妻嫌酒病深寫方多識藥失譜廢彈琴文字非經濟空虚用破心五六豈不佳只眼前事自是㑹凑合春日閒居居止日蕭條庭前惟藥苗身閒眠自久眼差視還遥簷燕酬鶯語鄰花雜絮飄客來無酒飲搔首擲空瓢第四句好五六恐如此粧㸃太刻而淺山中述懷為客久未歸寒山獨掩扉晚來山鳥散雨過杏花稀天逺雲空積溪深水自微此情對春色欲盡總忘機晚一作嘵散一作閙此詩相傳為周賀作撿賀集無之自是歐公詩話誤和元八郎中秋居聖代無為化郎中是散仙晚眠隨客醉夜坐學僧禪酒用林花釀茶將野火煎人生知此味獨恨少因縁五六清爽但用字將字元一般亦不可為法不得已則然原上新居王建長安無舊識百里是生一作天涯寂寞思逢客荒凉喜見花訪僧求賤藥將馬中豪家乍得新蔬菜朝盤忽覺奢春來梨棗盡啼哭小兒饑隣富雞長去莊貧客漸稀借牛耕地晚賣樹納錢遲牆下當官路依山補竹籬此詩姚合集亦有之然建集十三詩中第五首格律一同當是建詩又春來梨棗盡則啼哭小兒飢合集乃云秋來梨棗熟益知其非自掃一閒房唯鋪獨卧牀野􅅅溪菜滑山紙水苔香陳藥初和白一作蜜新經未入黄近來心力少休讀養生方近來年紀到世事總無心古碣慿人搨閒詩任客吟送經還野院移石入幽林谷口春風惡梨花葢地深住處去山近傍園麋鹿行野桑穿井長荒竹過牆生新識隣里面未諳村社情石田無力及賤賃與人耕荆公唐選取此詩之二首誤曰原上新春予亦選入春類矣今觀其集乃是原上新居十三首併選五首不妨重也贈溪翁溪田借四鄰不省解憂身看日和仙藥書符救病人伴僧齋過夜中酒卧經旬應得丹砂力春來黒髪新山居屋在瀑泉西茅房下有溪閉門留野鹿分食養山雞桂熟長收子蘭生不作畦初開洞中路深處轉松梯閒居即事老病貪光景尋常不下簾妻愁耽酒癖人怪考詩嚴小婢偷紅紙嬌兒弄白髯有時看舊巻未免意中嫌小婢一句新下一句嬌兒弄白髯壓倒上句溪居叟杜荀鶴溪翁居處靜溪鳥入門飛早起釣魚去夜深乘月歸見君無事老覺我有求非不識風霜苦三冬一草衣荀鶴詩晚唐之尤晚者此全篇可觀贈魏野僧宇昭别業惟栽竹多閒亦好竒試泉尋寺逺買鶴到家遲藥就全離母詩高祗教兒未能終住此共有海山期五六母與兒真假對三四佳水村即事冦準虚齋臨逺水吟釣度朝晡葦岸秋聲合莎庭鶴影孤片雲藏疊巘野燒起寒蕪獨步時凝望離人隔五湖字字工宻澶淵一擲非一擲也見明筭精亦此詩之餘力也耶閒居梅堯臣讀易忘饑倦東窗盡日開庭花昏自斂野蝶晝還來謾數過籬笋遥窺隔葉梅唯愁車馬入門外起塵埃若論宋人詩除陳黄絶高以格律獨鳴外須還梅老五言律第一可也雖唐人亦只如此而唐人工者太工聖俞平淡有味岸貧無能事耕穫亦不有雞豚燒蚌㬠槎沫織蓑依樹根野蘆編作室青蔓與為門稚子將荷葉還充犢鼻裩村豪日擊收田鼓時稱大有年爛傾新釀酒飽載下江船女髻銀釵滿童袍毳㲲鮮里胥休借問不信有官權田人夜歸田收野更逈墟里隔烟陂荒徑已風急獨行唯犬隨荆扉候不掩稚子望先知自是一生樂何須閭井為予初選郊野閒適詩為二類然閒適之人多在郊野故村落間事亦附入焉此三詩是也林處士水亭陳堯佐城外逋翁宅開亭野水寒冷光浮荇葉靜影浸漁竿吠犬時迎客飢禽忽上䦨疎籬僧舍近嘉樹鶴庭寛拂砌煙絲裊侵牕筍㦸攢小橋横落日幽徑轉層巒好景吟何極清歡盡亦難憐君留我意重疊取琴彈此為林和靖作不可不取之時一觀以想其所居也書友人屋壁魏野達人輕禄位居處傍林泉洗硯魚吞墨烹茶鶴避烟閒惟歌聖代老不恨流年静想閒來者還應我最偏魏仲先名野陜府人真宗祀汾隂遣使召之題此詩壁間遁去使還以詩奏上曰野不來矣先是上嘗圖种放所居野居亦有幽致又令圖之此洗硯烹茶一聨最佳又有詩云易諳馴鹿性難辨鬭雞情妻喜栽花活兒誇鬭草嬴能盡閒適之味种放出而名少摧如後來常秩敗闕處士之能終者鮮矣當時唯仲先林君復楊契𤣥終始全節故其詩尤可敬云湖樓寫望林逋湖水混空碧慿欄凝睇勞夕寒山翠重秋靜鳥行高逺意極千里浮生輕一毫叢林數未徧杳靄隔漁舠和靖先生林處士名逋字君復錢塘西湖孤山隱居夕寒山翠重一聨佳句也梅花詩冠絶古今見着題詩中湖山小隱猿鳥分清絶林蘿擁翠微步穿僧徑出肩搭道衣歸水墅香菰熟烟崖早筍肥功名無一㸃何要更忘機園井夾蕭森紅芳墮翠隂晝巖松䑕靜春塹竹雞深歳課非無木家藏獨有琴顔原遺事在千古壯閒心衡門鄰晚塢環渚背寒岡片月通蘿徑幽雲在石牀客游抛鄠杜漁事擬滄浪管樂非吾尚昻頭肯自芳和靖詩予評之在姚合之上兼無以詩自矜之意而渾涵亦非合可望小隱自題竹樹遶吾廬清深趣有餘鶴閒臨水久蜂懶得花疎酒病妨開巻春隂入荷鋤嘗憐古圖畫多半寫樵漁有工有味句句佳贈清逸魏閑處士宋祁奕世依巖石褒恩下帝庭姓名高士傳父子少微星池溜遥通澗家林近帶坰分明詔書意天極賜鴻㝠此魏野之子閑也亦能詩世其隱故公三四極力褒之而亦極工喜友人過隱居曹汝弼忽向新春裏閒過隱士家旋收松上雪來煮雨前茶禽換新歌曲梅粧隔歳花應慙非遁者難久在煙霞此詩禽元作琴予為改定村家王操野景村家好柴籬夾樹身牧童眠向日山犬吠隨人地僻鄉音别年豐酒味醇風光吟有興桑麥暖逢春宋初諸人詩皆有晚唐風味此江南王􅋵處士太宗時授官仕至殿中丞中四句有意味東山招復古俞汝尚聞道廣文客東來欲載書志勤甘淡薄情舊免生疎野飯多無菜溪􅅅或有魚小心新買得且遂帶經鋤俞汝尚吳興人熙寧初召為御史不老而致仕號溪堂居士夏日閒居無人到窮巷長日守閒居宿火惟烘藥喜晴還曬書鄰翁伴村酒稚子課園蔬門外蒿萊地從深不用鋤放懷陳師道施食烏鳶喜持經鳥雀聽杖藜矜矍鑠顧影怪伶俜門靜行隨月窗虚卧見星擁衾眠未穏艱阻飽曾經選衆詩而以后山居其中猶野鶴之在雞羣也前六句極其工後二句不知宿於何寺乃有逆旅漂泊之意詩人窮則多苦思放慵陳與義暖日薫楊栁濃春醉海棠放慵真有味應俗苦相妨官拙從人笑交疎得自藏雲移穏扶杖燕坐獨焚香此公氣魄尤大起句十字朱文公擊節謂薫字醉字下得妙又何必專事晚唐題齋壁陸游皥皥太平民堂堂大耋身乾坤一旅舍日月兩車輪蓑貴超三品蔬甘敵八珍明年真耄矣爛醉海棠春力穡輸公上藏書教子孫追遊屏裘馬宴集止雞豚寒士邀同學單門與議婚定知千載後猶以陸名村自述古井無由浪浮雲一掃空詩書修孔業塲圃嗣豳風懼在饑寒外憂形夢寐中吾年雖日逝猶冀有新功舊業還耕釣殘年逼老期筋骸衰後覺力量夢中知客約溪亭飲僧招竹院棊未為全省事終勝宦遊時屏跡歸休後頤生寂寞中忍貧辭半俸學古得全功西埭村醅釅東坡小彴通經行有佳趣稚子也能同書適老翁雖七十其實似童兒山果啼呼覔鄉儺喜笑隨羣嬉累瓦塔獨立照盆池更挾殘書讀渾如上學時放翁老壽為近世詩人第一其閒適之詩尤多姑選此五言六首每首必有一聨一句佳山果啼呼覔老翁不應亦啼當作號呼幽事日日營幽事時時有好懷雨園殘竹粉風砌落松釵伴蝶行花徑聽蛙傍水涯窮通了無謂不必更安排五六眼前事耳能道者不妨自高於人有工無迹葺圃種樹書頻讀齊民術屢窺曾求竹醉日更問栁眠時盧橘初非橘蒲葵不是葵因而辨名物甘作老樊遲竹醉栁眠一聨極工五六辨析名物尤竒幽事幽事春來早晨興即啓閽掃梁迎燕子挿楥䕶龍孫數日招賔友先期辦酒樽淋漓衣袖濕不管漬春痕三四犯陳后山織竹䕶龍孫之聨然龍孫畢竟換一物亦可也北檻北檻近中堂縁堦物自芳晨清花拱露地僻蘚侵廊坐久時開巻吟餘或炷香終朝無客至一枕到羲皇三四已佳五六以炷開字為眼却便覺佳止齋即事陳傅良性已耐岑寂老應忘隱憂齊年雙白髪盡日一蒼頭竹閉緘門鑰蒲團數漏籌未知庭廡下還有雀羅不閉字音第四聲教子時開巻逢人强整襟最貧看晚節多病得初心地僻茭蓮好山低竹樹深寄聲同燕社明日又秋砧君舉以時文鳴此二詩高古縁才高也次韻山居陳塤解組滄溟畔携家紫翠間地臨雙港勝天與兩年閒茅屋靜聞雨竹籬疎見山所慚鄰舍老句險不容攀陳塤字伯和澗上丈人族子寓居桐廬嘗知黟縣予讀滕元秀詩盛稱伯和所作此所謂次韻隣舍老者殆亦和元秀詩耳雙港者桐廬縣東分水港合焉五六靜字疎字下得是西山葉適對面吳橋港西山第一家有林皆橘樹無水不荷花竹下晴垂釣松間雨試茶更瞻東掛綵空翠雜朝霞水心以文知名㧞四靈為再興唐詩者而其所自為詩恐未嘗深加意五言律如此者少西山葢永嘉勝處有醉樂亭水心為記甚悉題翁巻山居徐照空山無一人君此寄閒身水上花來逺風前樹動頻蟲行黏壁字茶煮落巢薪若有髙人至何妨不裹巾此詩真不减晚唐山中世事已無營翛然物外形野蔬僧飯潔山葛道衣輕掃葉燒茶鼎標題記藥瓶敲門舊賓客稚子㑹相迎中四句工貧居既與世不合當令人事疎引泉魚走石掃徑葉平蔬誰念交情淺難如識面初榮途多寵辱未敢怨貧居四靈詩專於中四句用工尾句不甚着力今如此乃可喜也山居栁竹藏花塢茅茨接草池開門驚燕子汲水得魚兒地僻春猶靜人閒日自遲山禽啼忽住飛走又相隨近乎爛熟然亦不可棄也幽居翁巻蓬户掩還開幽居稱不才移松連嶠土買石帶溪苔藥信仙方服衣從古様裁本無官可棄安用賦歸來夢回一枕莊生夢回來日未斜自煎砂井水更煮嶽僧茶宿雨消花氣驚雷長荻芽故山滄海角遥念在春華隱者所居百事已無機空林不掩扉蜂沾朝露出鶴帶晚雲歸石老苔為貌松寒薜作衣山翁與溪友相過轉依依春日和劉明逺不奈滴簷聲風回昨夜晴一堦春草碧幾片落花輕知分貧堪樂無營夢亦清看君話幽隱如我願逃名四靈中翁獨后死然未能考其没在何年此四詩㸃圈處十分佳也偶題徐文卿緑樹何稠疊清風稍羡餘枕縈雲片片簾透雨疎疎修筧通泉壑殘碑出野鉏丘陵知幾變耕稼雜陶漁五六佳雨後到南山村家衝雨入窮山山民猶閉關橘垂茅屋畔梅映竹籬間竒石依林立清泉繞舍灣吾思隱茲地凝立未知還樟丘徐文卿字斯逺信州玉山人嘉定四年進士與趙昌父韓仲止聲名伯仲前詩中四句俱雅淡後詩五六工北山作劉克莊骨法枯閒甚惟堪作隱君山行忘路脈夜坐認天文字痩偏題石詩寒半説雲近來仍喜瞶閒事不曾聞夜一作野第六句佳甚七言五十一首江村杜甫清江一曲抱村流長夏江村事事幽自去自來堂上燕相親相近水中鷗老妻畫紙為棊局稚子敲針作釣鈎多病所須唯藥物微軀此外更何求南鄰錦里先生烏角巾園收芋栗未全貧慣看賔客兒童喜得食階除鳥雀馴秋水纔深四五尺野航恰受兩三人白沙翠竹江村暮相送柴門月色新狂夫萬里橋西一草堂百花潭水即滄浪風含翠篠姢娟淨雨裛紅蕖冉冉香厚禄故人書斷絶恒飢稚子色凄凉欲填溝壑惟疎放自笑狂夫老更狂老杜七言律詩一百五十餘首求其郊野閒適如此者僅三篇而此之第三篇後四句亦未免歎貴交之絶憫貧稚之飢信矣和平之音難道而喜起明良之音難值也然格髙律熟意竒句妥若造化生成為此等詩者非真積力久不能到也學詩者以此為凖為吳體拗字變格亦不可不知題刑部李郎中山亭秦韜玉儂家雲水本相知每到髙齋强展眉痩竹嚲烟遮板閣捲荷擎雨出盆池笑吟山色同欹枕閒背庭隂對覆棋不是主人多野興肯開青眼重漁師中四句工尾句亦好僻居酬友人伍喬僻居惟愛近林泉幽徑閒園任蘚連向竹掩扉隨鶴息就溪安石學僧禪古琴帶月音聲正山果經霜氣味全多謝故交憐朴野隔雲時復寄佳篇秋深閒興韓偓此心兼笑野雲忙甘得貧閒味甚長病起乍嘗新橘柚秋深初換舊衣裳晴來喜鵲無窮語雨後寒花特地香把釣覆棊兼舉白不離名教可顛狂題張逸人園林韓翃花源一曲映茅堂清論閒堦坐夕陽麈尾手中毛已脱蟹螯樽上味初香春深黄口羣窺樹雨後青苔散㸃牆更道小山宜助賞呼兒舒簟醉巖房書懷寄王秘書張籍白髪如今欲滿頭從來百事盡應休祇於觸目須防病不擬將心更養愁下藥逺求新熟酒看山多上最髙樓頼君同在京城住每到花前免獨遊送楊判官應得烟霞出俗心茅山道士共追尋閒憐鶴貌偏能畫暗辨桐聲自作琴長嘯每來松下坐新詩堪向雪中吟征南幕府多賔客君獨相知最覺深書懷吳融傍巖倚樹結簷楹夏物蕭疎景更清灘響忽高何處雨松隂自轉此山晴見多鄰火遥相認來慣幽禽近不驚爭敢便誇饒勝事九衢塵裏免勞生閒望三㸃五㸃映山雨一枝兩枝臨水花蛺蝶狂飛掠芳草鴛鴦對浴翹暖沙闕下新居非已業江南舊隱是誰家東還西去俱無計却羡暝歸林上鴉題林逸士肥上新屋壁劉筠久壓侯鯖盡室來卜居隣近釣魚臺舊山鶴怨無錢買新竹僧同借宅栽載酒誰從揚子學棹舟空訪戴逵回抽毫有汚東陽壁但惜明時老澗才三四須先看上二字為小分句却看下五字則得其意矣郊外王安國野曠天寒氣象嘉浮雲濃淡日初斜澤中雨漲無鳴鸛荷下波翻有怒蛙簫鼓殘聲來帝闕漁樵歸徑見人家塵簪羞把黄花挿不耐飛蓬鬭鬢華此乃汴京郊外所以有第五句退居詹中正宦情文思競䦨珊利户名樞莫我關無可奈何新白髪不如歸去舊青山須知百歲都為夢未信千金買得閒珍重樽中賢聖酒非因風月亦開顔中正祥符八年蔡齊榜甲科衢州人三四東坡嘗用為詞世人不知為詹白雲詩也中正又有一聨吟餘妓散杯中酒歸去蝶隨頭上花下句佳贈張處士趙湘應問秋雲學得閒飄然如不在人間青藤篋裏詩多怪紫栗枝邊藥更殷一作瘢江客對碁曾賭鶴野僧分屐借登山仍聞昨日來城市又抱孤琴踏月還清獻家審言詩如此宜乎乃孫之詩如其人之清有自來哉野墅夏晚錢昭度一抹生紅畫杏腮半園沉緑鎖桐材黄蜂衙退海潮上白蟻戰酣山雨來睡思幾家金帶枕酒香何處玉交杯太陽西落波東去惆悵無人喚得回三四詩話所稱湖山小隠林逋道着權名便絶交一峰春翠濕衡茅莊生已憤鴟鳶嚇揚子休譏蝘蜓嘲潏潏藥泉來石竇霏霏茶靄出松梢琴僧近借南薫譜且併閒工子細抄憤當作慣閒搭綸巾擁縹囊此心隨分識興亡黒頭為相雖無謂白眼看人亦未妨雲噴石花生劍壁雨敲松子落琴牀清猿幽鳥遥相呌数筆湖山又夕陽三四亦豪壯隱君子非專衰懦之人也易從上人山亭湖水汪灣隔數峰籬門和竹夾西東閒來此地行無厭又共吾廬看不同靈隱路歸秋色裏招賢庵在鳥行中屏風若欲相攙見合把巉巗與畫工懐舊隱陳亞多媿當年未第間卜居人外得清閒排聨花品曾非僭愛惜苔錢不是慳秋閣詩情天淡淡夕溪漁思月彎彎而今慚厚明朝禄敢念藏愚莫買山三四絶佳亞黄蜀葵詩秋風似學金丹術戯把硫黄禦酒盃尤佳郊行即事程顥芳原緑野恣行時春入遥山碧四圍興逐亂雲穿栁巷困臨流水坐苔磯莫辭盞酒十分醉只恐風花一片飛况是清明好天氣不妨游衍莫忘歸大儒事業有大於詩者不可以詩人例目之五六乃朱文公所深取小村梅堯臣淮濶洲多忽有村棘籬疎敗謾為門寒雞得食自呼伴老叟無衣猶抱孫野艇鳥翹唯斷䌫枯桑水齧只危根嗟哉生計一如此謬入王民版籍論此乃村落間事以附閒適類山中陳與義當復入州寛作期人間踏地有安危風流丘壑真吾事籌䇿廟堂非所知白水春波天澹澹蒼峰晴雪錦離離恰逢居士身輕日正是山中多景時参政簡齋陳公名與義字去非洛陽人自黄陳紹老杜之后惟去非與吕居仁亦登老杜之壇居仁主活法而去非格調髙勝舉一世莫之能及初以墨梅詩見知於徽廟客子光隂詩巻裏杏花消息雨聲中大為髙廟所賞欲學老杜非参簡齋不可此乃不欲赴召之詩風流籌䇿一聨苕溪詩話似乎未㑹此意後學宜細味此等詩與許丁卯髙下如何題東家壁斜陽步屧過東家便置清樽不煮茶髙柳光隂初罷絮嫩鳬毛羽欲成花羣公天上分時棟閒客江邊管物華醉裏吟詩空跌蕩借君素壁落栖鴉三四極天下之工亦止言景耳五六遜時棟於天上羣公而以江邊閒客自許氣岸髙峻骨格開張殆天授非人力然亦力學則可及矣雨後至城外吕本中日日思歸未就歸只今行露已沾衣江村過雨蓬麻長野水連天鸛鶴飛塵務却嫌經意少故人新更得書稀鹿門縱隱猶多事苦向人前説是非孟明田舍未嫌衰病出無驢尚喜冬來食有魚往事髙低半枕夢故人南北數行書茅茨獨倚風霜下粳稻微收雁鶩餘欲識淵明只公是邇來吾亦愛吾廬簡齋詩髙峭吕紫微詩圓活然必曲折有意如雪消池館初晴後人倚䦨干欲暮時荒城日短溪山靜野寺人稀鸛鶴鳴皆所謂清水出芙蓉也如此二詩末句却議論深復非輕易放過者習閒范成大習閒成懶懶成癡六用都藏縮似龜雪已許多猶不飲梅今如此尚無詩閒看猫暖眠氊褥靜聽猧寒呌竹籬寂寞無人同此意時時惟有睡魔知梅今如此尚無詩亦標致可掬親戚小集避濕違寒不出門一冬未省正冠巾月從雪後皆竒夜天向梅邊有别春秉燭登臨空話舊擁爐情味莫懷新榮華勢利輸人慣贏得樽前自在身石湖風流醖藉每賦詩必有高致而無寒相三四一聨可見登東山陸游老慣人間歳月催强扶衰病上崔嵬生為柱國細事耳死畫雲臺何有哉熟計提軍出青海未如喚客倒金罍明朝日出春風動更看青天萬里開放翁詩萬首佳句無數少師曾茶山或謂青出於藍然茶山格高放翁律熟茶山專祖山谷放翁兼入盛唐題菴壁衰髪蕭疎雪滿巾君恩乞與自由身身并猿鶴為三口家托烟波作四鄰十日風號未成雪一年梅發又催春漁舟底用勤相覔本避浮名不避人白樂天有云身兼妻子都三口鶴與琴書共一船尤佳此亦小異而律同山行過僧菴不入垣屋參差竹塢深舊題名處懶重尋茶爐煙起知高興棊子聲疎識苦心淡日暉暉孤市散殘雲漠漠半川隂長吟未斷清愁起已見横林宿暮禽詩不但豪放高勝非細下工夫有針線不可但欲如老杜所謂裁縫滅盡針線迹耳此詩題目甚竒山行是一節過僧菴而不入又似是兩節垣屋參差竹塢深只此一句便見山行而過僧菴及過僧菴而不入矣舊題名處懶重尋即是曾遊此菴而今懶入矣茶爐烟起知髙興此謂不入菴而遥見煮茶之烟想像此僧之不俗也棋子聲疎識苦心則妙之又妙矣聞棋聲而不得觀其棋固已甚妙於棋聲疎緩之間想見棋者用心之苦此所謂妙之又妙也過僧菴而不入盡在是矣淡日殘雲下一聨及未句結乃結煞山行一段餘意前輩詩例如此須合别有擺脫老杜縛雞行山谷水仙花一律皆然此放翁八十五歳時詩也閒中書事病過新年逐日添清愁殘醉兩厭厭惜花萎去常遮日待燕歸來始下簾堂上清風生玉塵澗中寒溜滴銅蟾一生留滯君休歎意望天公本自亷一畆山園半畝池流年忽逮掛冠期賣花醉叟剥紅桂種藥高僧寄玉芝午枕聽兒哦舊句晚窗留客弄殘棋登庸䇿免多新報老子癡頑總不知慶元乙卯寧宗新元除罷史可考也小築放翁小築寄江郊屋破隨時旋補茅暮看白煙横水際曉聽清露滴林梢生來不啜猩猩酒老去那營燕燕巢目斷鹿門三太息龎公千載可論交猩猩酒燕燕巢公兩用之誠為佳句窮居半世倀倀信所之窮居仍抱暮年悲燒金術誤囊衣薄種黍年凶酒味醨大厦萬間空有志後車千乘更無期掩書常笑城南杜麻屨還朝受拾遺窮居而思萬間千乘不得志之言也然彼得志者又何如哉西窗西窗偏受夕陽明好事能來慰此情看畫客無寒具手論書僧有折釵評薑宜山茗留閒啜豉下湖蓴喜共烹酒䏑朱門非我事諸君小住聽松聲此詩尾句好所以不可遺耕罷偶書新溉東臯畝一鍾烏犍麤足事春農㶚橋風雪吟雖苦杜曲桑麻興本濃老大斷非金谷友生存惟冀酒泉封莫嘲野餉蕭條甚箭茁蓴絲亦且供四句四事皆巧對小築小築湖邊避俗囂幾年於此寓簞瓢雖無隠士子午谷寧愧詩人丁卯橋羅雀門庭無俗駕縁雲磴路有歸樵詩情酒興常相屬堪笑傍人説寂寥子午谷丁卯橋亦巧過鄰家戲作久脱朝冠岸幅巾時時乘興過比鄰缾無儲粟吾猶樂步有新船子豈貧醅甕香浮花露熟藥欄土潤玉芝新玉芝謂鬼臼山家多有之相從覔笑真當勉又過浮生一歳春三四陶韓語工簡鄰里今年意味報君知屬疾雖頻未苦衰獨坐冷齋如自訟三舍法行時嘗上書言事者屏置一齋曰自訟小鐫殘俸類分司樂天詩云猶被妻孥教漸退莫求致仕且分司閒撐野艇漁簔濕亂挿山花醉㡌欹有興行歌便終日逢人那識我為誰自訟分司雖戲語下一聨又自好戲詠閒適涉世心知百不能閉門懶出病相仍簞瓢味美如烹鼎鄰曲人淳似結繩半夥鴉殘牆外杏一枝鵲澗邊藤蕭然掃盡彈冠興敢為詩情望武陵閒中頗自適戲書示客髪猶半黒臉常紅老健應無似放翁烹野八珍邀父老燒窮四和伴兒童野八珍見王􅂂道詩世又有窮四和香法剪紗新製簪花㡌乞竹寛編養鶴籠巢許䕫龍竟誰是請君下語勿匆匆縱説横説爛熟幽居述事曾㑹蘭亭醉墮簪後身依舊住山隂琴傳數世漆文斷鶴養多年丹頂深滌硯灘頭無漬墨吹簫月下有遺音小詩戲述幽居事後有高人識此心頽然掩户不妨竒又賦幽居第二詩大業鼎成令虎守精思床穏用龜支壺中自喜乾坤别局上元知日月遲更就羣童閒鬭草人間何處不兒嬉落葉平溝日滿廊幽居又賦第三章喜無俗事干靈府恨不終年住醉鄉上樹榜船雖老健䟽泉移竹亦窮忙山僧欲去還留話更盡西齋一炷香舴艋東歸喜遂初頓拈枯筆賦幽居細燒柏子供清坐明㸃松肪讀道書蒼爪嫩芽開露茗紅根小把瀹煙蔬年來自許機心盡頗恠飛鷗自作疎四詩皆八十歳之作脱洒竒妙村居陳傅良業已將身落耦耕時於觀物悟浮生擇棲未定鳥離立避礙已通魚並行野老窺巢占太歳牧童敲角報殘更絶勝倚市看郵置客至還無菜甲􅅅閒詠姜特立坐叨厚廪飲醇醪不押文書不坐曹撿㸃園花為日課裒尋詩草計年勞仍将書冊供慵卧時喚盃盤佐老饕感激大恩何以報惟祈聖壽與天高此乃奉祠時所作否則為婺州總戎時也負暄不是羲和徳澤流寒鄉何處覔温柔絶憐天上黄綿襖大勝人間紫綺裘旋挾胡牀隨影轉更携書巻與閒謀天和妙處誰能㑹欲獻君王郤自羞古所謂曝背之樂欲獻之天子者此詩乃佳書懷趙子覺柳影槐隂緑遶村日長細得話詩情迎風紫燕忽雙去隔雨黄鸝又一聲筆墨生涯成冷淡筍蔬盤饌易經營世間微利真刀蜜有底驅馳取重輕雪齋趙子覺字彦先超然居士令衿之子為嚴倅時放翁為郡守楊誠齋以詩寄放翁謂幕中何幸有詩人又曰青眼何妨顧徳鄰謂子覺也此詩亦似放翁移居謝友人見過趙師秀賃得民居亦自清病身於此寄漂零笋從壞砌磚中出山在鄰家樹上青有井極甘便試茗無花可挿任空瓶巷南巷北相知少感爾詩人逺叩扄小巧有餘瀛奎律髓巻二十三

body:
  text: 瀛奎律髓巻四十六元方回編俠少類昔司馬子長作游俠列傳余倣其意分俠少類五言八首雜詩盧象君家御溝上垂柳夾朱門列鼎會中貴鳴珂朝至尊死生在片議窮達獨一言須識苦寒士莫矜狐白温此詩有古樂府之意格調甚髙前四句敘其富貴五六言其權勢之盛末句使之憐寒士也贈張建韓翃結客平陵下當年倚俠游傳看轆轤劍醉脱驌驦裘翠羽雙鬟妾珠簾百尺樓春風坐相待晚日莫淹留雙鬟妾百尺樓本無足道亦見世間有此驕佚之人也以入俠少亦在乎時而已長安路長安九城路戚里五侯家結束趨平樂聯翩互狹斜髙樓臨積水複道出繁花惟有相如宅蓬門度歲華詩法當如此前六句總説繁華結句却合歸之寂寞前一段全説書生氣味結句却合説豪貴不知此詩乃為佳也關山月霍總珠籠翡翠牀白晳侍中郎五日來花下雙童問道傍到門車馬狹連夜管絃長毎笑東家子窺他宋玉墻邯鄲俠少年鄭鏦夜渡濁河津衣中劒滿身兵符刼晉鄙匕首刺秦人報士非無膽髙堂念有親昨緣秦苦趙來往大梁頻第六句有味少年行劉長卿射飛誇侍獵行樂愛聯鑣薦枕青蛾豔鳴鞭白馬驕曲房珠翠合深院管絃調日晚春風裏衣香滿路飄此詩似非長卿所作中四句太艶而淺末句頗可採此題於其後不無少貶乃佳少年行林寛栁煙侵御道門映夾城開白日莫空過青春不再來報讐衝雪去乘醉臂鷹迴看取歌鐘地殘陽滿壊臺三四本形容俠少汲汲皇皇為游樂之事不肯虚度時光幼時見人書此句以戒學堂兒曹其承上句即無正當之論不足采也不知乃為唐人林寛詩也少年張耒朱繩縛天狗白羽射旄頭新佩將軍印初成甲第樓絲羅諸院夜鞍馬五陵秋惟有如霜鬢令君覽鏡愁格近古似陳宋七言九首贈王樞宻一作中貴王樞宻守澄宗姪也王建三朝行坐鎮相隨今日春宫見小時脱下御衣先試着進來龍馬毎教騎長承宻㫖歸家少獨奏邊機出殿遲自是姓同親向説九重争得外人知聞説桃花百葉不成春鶴筭千年也未神秦隴洲緣鸚鵡貴王侯家為牡丹貧歌頭舞靣迴迴别鬢様眉心日日新鼓動六街騎馬出相逢總是學狂人歎時世衰薄不務本長安富貴之家所知惟此而不知生熟好惡也寄丹陽劉太真韓翃長安道上落花朝羡爾當年賞事饒下筯已憐鵞炙美開籠不少鴨疑當作雉媒嬌春衣曉入青陽巷細馬初過皂角橋相訪不辭千里遠西風好借木蘭橈富平少侯李商隱七國三邊未到憂十三身襲富平侯不收金彈抛林外却惜銀牀在井頭綠樹轉燈珠錯落繡檀迴枕玉雕鎪當關不報侵晨客新得佳人字莫愁丁年王安石丁年結客盛游從宛洛氊車處處逢吟盡物華愁筆老醉消春色愛酷濃壚間寂寞相如病鍛處荒凉叔夜慵早晚青雲須自致立談平取徹侯封公子楊億夾道青樓拂綵霓月軒宫袖按前溪錦鱗河伯供烹鯉金距隣翁逐鬬雞細雨墊巾過柳市輕風側㡌上銅鞮珊瑚擊碎牛心熟香草蘭芳客自迷公子劉筠油壁香車隔渭橋黄山路遠苦相邀行庖㸑蠟雕胡熟永埒鋪金汗血驕别舘横陳張静婉期門長揖霍嫖姚注鈎握槊曽無憚綠桂膏濃曉未銷公子錢惟演蓮勺交衢接荻園來時十里一開筵歌翻南國桃根曲馬過章臺杏葉韉别殿對迴雙綬貴後門歸夜九枝然閒隨翠幰欹烏㡌紫陌三條入栁煙公子胡宿北第當衢㦸有衣巾帷鮮媚僕如犀萬錢供筯鳴鐘沸三組垂腰佩玉低座上賦鸚窮處士樓前盤馬小征西去天尺五城南路此去青雲别有梯胡武平筆端髙爽似陸農師瀛奎律髓巻四十六

body:
  text: 瀛奎律髓巻二十二元方回編月類著題詩中梅雪月最難賦故特以為類中秋月尤難賦此夜一輪滿清光何處無僧貫休句也此生此夜不長好明月明年何處看東坡句也萬山不隔中秋月山谷一句尤奇然則月詩五言律無出於杜少陵故所取杜詩為多而五七言共得四十首云爾五言三十首和康五望月有懐杜審言明月髙秋逈愁人獨夜看暫將弓並曲翻與扇俱團霧濯清輝苦風飄素影寒羅衣一此鑒頓使別離難起句似與其孫子美一同以終篇味之乃少陵翁家法也一此二字杜集不分曉今從文苑英華本詠月康令之天使下西樓光含萬里愁臺前疑掛鏡簾外似懸鈎張尹將眉學班姬取扇儔佳期應借問為報在刀頭唐國秀集姓名下註云河陰尉天寳三載芮挺章編樓頴序有王綰髙適而未有老杜鏡鈎一聯老杜後亦用之豈暗合耶文苑英華編為沈佺期和洛州康士曺庭芝望月有懐如此則自有一庭芝詠月與康令之近似姑存疑可也秋夜望月姚崇明月有餘鑒羈人殊未安桂含秋樹晚影入夜池寒灼灼雲枝淨光光草露團所思迷所在長望獨長歎歐公詩曰元劉事業時無取姚宋篇章世不知宋廣平有梅花賦姚元崇亦有此等詩未可忽也起句峭健最佳尾句所思迷所在文苑英華作所由而註疑字予為改定曰所思無可疑也月夜杜甫今夜鄜州月閨中只獨看遥憐小兒女未觧憶長安香霧雲鬟濕清輝玉臂寒何時倚虛幌䨇照淚痕乾少陵自賊中間道至鳳翔拜左拾遺既收京從駕入長安時寄家鄜州八句皆思家之言三四及兒女六句全是憶内與乃祖詩骨格聲音相似初月光細弦初上影斜輪未安微升古塞外巳隱暮雲端河漢不改色闗山空自寒庭前有白露暗滿菊花團詩話謂此詩喻肅宗初立亦是老杜月詩選十五首今無能及之者矣月白夜月休弦燈花半委眠號山無定鹿落樹有驚蟬暫憶江東膾事見張翰兼懐月下船事見王徽之蠻歌犯星起重覺在天邊城郭悲笳暮邨墟過翼稀甲兵年數久賦歛夜深歸暗樹依嵒落明河繞塞微斗斜人更望月細鵲休飛月天上秋期近人間月影清入河蟾不没搗藥兎長生只益丹心苦能添白髮明千戈知滿地休照國西營四更山吐月殘夜水明楼塵匣元開鏡風簾自上鈎兎應疑鶴髪蟾亦戀貂裘斟酌嫦娥寡天寒奈九秋東坡以四更山吐月為絶唱西湖湧金門觀月用韻衍為五首末句言嫦娥而秋寒亦酷矣月圓孤月當楼滿寒江動夜扉委波金不定照席綺逾依未缺空山靜髙懸列宿稀故園松桂發萬里共清輝月斷續巫山雨天河此夜新若無青嶂月愁殺白頭人魍魎移深樹蝦蟆動半輪故園當北斗直想照西秦月夜憶舎弟戍鼔斷人行秋邊一雁聲露從今夜白月是故鄉明有弟皆分散無家問死生寄書長不達况乃未休兵舟月對驛近寺更深不假燭月朗自明船金刹青楓外朱樓白水邊城烏啼眇眇野鷺宿娟娟皓首江湖客鈎簾獨未眠江月江月光於水髙樓思殺人天邊長作客老去一沾巾玉露團清影銀河没半輪誰家挑錦字燭滅翠眉顰翫月呈漢中王夜深露氣清江月滿江城浮客轉危坐歸舟應獨行闗山同一照烏鵲自多驚欲得淮王術風吹暈巳生八月十五夜月滿目飛明鏡歸心折大刀轉蓬行地逺攀桂仰天髙水路疑霜雪林栖見羽毛此時瞻白兎直欲數秋毫十六夜翫月舊挹金波爽皆傳玉露秋闗山隨地濶河漢近人流谷口樵歸唱孤城笛起愁巴童渾不寐半夜有行舟十七夜對月秋月仍圎夜江村獨老身捲簾還照客倚杖更隨人光射潛虬動明翻宿鳥頻茅齋依橘柚清切露華新裴廸書齋望月錢起夜來詩酒興月滿謝公樓影閉重門静寒生獨樹秋鵲驚隨葉散螢逺入煙流今夕遥天末清輝㡬處愁姚合極𤣥集取此詩月滿作獨上予以獨字重改從元本鵲元本作鶴予改從姚本西樓月白居易悄悄復悄悄城隅隱林杪山郭燈火稀峽天星漢少年光東流水生計南飛鳥月没江沉沉西樓殊未曉此乃仄聲律詩也八句皆佳中四句山谷嘗摘書之西樓望月張籍城西樓上月復見雪晴時寒夜共來望思鄉獨下遲幽光落水塹淨色在霜枝明日千里去此中還别離前四句佳甚八月十五夜翫月劉禹錫天將今夜月一遍洗寰瀛暑退九霄淨秋澄萬景清星辰讓光彩風露發晶英能變人間世翛然是玉京絶妙無敵中秋月王禹偁何處見清輝登樓正午時莫辭終夜看動是隔年期冷濕流螢草光凝睡鶴枝不禁雞唱曉輕別下天涯三四天下之所共知中秋月曹汝弼年年相對賞永夜坐吟牀衆望自疑別孤髙非異常園林分淨影臺榭起餘光誰似蟾宫客得攀仙桂香歙之休寧松蘿山人曹處士名汝弼字夢得其先青州人南唐時徙歙詩一百五十首傳世曰海寧集舒職方雄為序中子屯田郎中矩登第其後以進士仕者六人以恩蔭仕數十人贈職方員外郎今曹君涇清其九世孫天禧祥符間髙蹈有聲與林逋魏野潘閬等善詩亦似之此詩三四於中秋月亦竒也中秋與希深別後月下寄梅堯臣薄霧生寒水寥寥艤畵船人傷千里別桂吐十分圓把酒非前夕追歡憶去年南樓足佳興好在謝臨川淡靜隴月夜靜初見月雲薄未分明髙樹尚無影逺鴻時有聲下階嫌履濕閉户認苔生寂寂牆陰暝更長巳漸傾詩題曰隴月葢朦朧淡月雲來徃之意在文彦博貝州軍中拜相時之後聖俞謂曹彬潘美下一國亦不拜相素不以文潞公為然乎抑謂朝廷未然乎詩意恐有所為而發是後有未晴夜陰夜暗三詩曰缺月如羞出曰月色明還暗曰新晴月正明皆未可臆度為指何事也陪友人中秋賞月王安石海霧看如洗秋陽望却昏光明疑不夜清瑩欲無坤掃掠風前坐留連露下樽苦吟應到曉况復我思存清瑩欲無坤竒嶮末句又用毛詩一語陳中取新竊恐是王逢原詩誤刋荆公集亦有乃弟王平甫詩誤置公集如舞急錦腰纒十八酒酣金盞困東西平甫詩也醉膽憤痒遣酒拏王逄原詩也兩集予俱有之候考十五夜月陳師道向老逄清節歸懐托素輝飛螢元失照重露巳沾衣稍稍孤光動沉沉衆籟微不應明白髮似欲勸人歸詩意謂向老而俯仰世間為明月所照破也老硬中秋前一夕翫月楊萬里月擬來宵好吾先今夕遭纔升半璧許已復一輪髙遷坐明相就群飛影得逃望秋惟有此徹夜敢辭勞此詩五六佳句亦清痩夜中歩月陸游夜半不成寐起尋微夜行風生驚葉堕露重覺荷傾兀兀酒中趣悠悠身後名興䦨還掩户坐待日東生放翁詩萬首而月詩少別有十月十五夜對月詩云重露滴松鬛髙風吹鶴聲亦佳七言十首中秋月白居易萬里清光不可思添愁益恨遶天涯誰人隴外久征戍何處庭前生別離失寵故姬歸院夜没蕃老將上樓時照他㡬許人腸斷玉兎銀蟾逺不知中四句皆述人之失意者末乃謂照人腸斷月實不知即所謂雌雄風者也八月十五夜禁中寓直寄元四稹銀臺金闕靜沉沉此夜相思在禁林三五夜中新月色二千里外故人心渚宫東靣烟波冷浴殿西頭鐘漏深猶恐清光不同見江陵地濕足秋隂元㣲之為江陵法曹樂天在翰林中秋松江新橋對月和桞令蘇舜欽月晃長江上下同盡橋横絶冷光中雲頭灔灔開金餅水靣沉沉卧彩虹佛氏觧為銀世界仙家多住玉華宫地雄景勝言難盡但欲追隨乘曉風蘇子美壯麗頓挫有老杜遺味然多哀怨之思予少時初亦學此翁詩惜乎子美早卒使老夀山谷當並立也此篇古今絶唱與吳江長橋中秋月色成三絶依韻和歐陽永叔邀許發運梅堯臣看取主人無俗調風前喜御夾衣凉競邀三五最圓魄知比尋常特地光艶曲旋教應可聼秋花雖種未能香曽非惡少休防准衆寡而今不易當元註永叔詩云仍約多為詩准備共防梅老敵難當許發運名元歙州人歐公時知揚州在慶歴七年丁亥此先以詩邀許而中秋乃無月和永叔中秋月夜㑹不見月酬王舍人主人待月敞南樓淮雨西來􅈝變秋自有嬋娟侍賔榻不須迢逓望刀頭池魚暗聼歌聲躍蓮菂明傳酒令優更愛西垣舊詞客共將詩興壓曹劉宋初詩人惟學白體及晚唐楊大年一變而學李義山謂之崑體有西崑倡酬集行於世其組織故事有絶佳者有形完而味淺者尚以流麗對偶豈肯如此淡淨委蛇而無一語不近人情耶梅公之詩為宋第一歐公之文為宋第一詩不减梅蘇子美不早卒其詩入老杜之域矣一傳而蘇長公之門得四學士黄陳特以詩格髙為宋第一而張文潛足繼聖俞盛哉盛哉酬王君玉中秋席上待月值雨歐陽修池上雖然無皓魄樽前殊未减清歡綠醅自有寒中力紅粉尤宜燭下看羅綺塵隨歌扇動管絃聲雜雨荷乾客舟閒臥王夫子詩陣誰教主將壇聖俞和云自有嬋娟侍賔榻謂人足以代月也永叔答王君玉云紅粉尤宜燭下看謂燭下見美人勝於月下固一時滑稽之言然亦近人情而竒上一句亦佳八月十五夜月二首曾幾玉露金波不可孤相瞻今夕定何如氛埃未淨雨湔洗陰翳小留風掃除丹桂看來元了了白榆種得許疎疎一杯濁酒非難事未有新詩報答渠雲日晶熒固自佳幽人有待至昏鴉逺分巖際松楓樹復亂洲前蘆荻花曵履商聲憐此老倚樓長笛問誰家霜螯玉柱姚江上作意三年醉月華癸未八月十四日至十六夜月色皆佳年年嵗歲望中秋歲嵗年年霧雨愁凉月風光三夜好老夫懐抱一生休明時諒費銀河洗缺處應湏玉斧修京洛紅塵滿人眼不知能似浙江不隆興元年癸未茶山年八十中秋呈潘徳父韓琥一年明月在中秋數日陰雲不奈愁忽喜新晴轉書室極知清夜照歌樓醉當弄影如坡老詩就撞鐘憶貫休千里故人應若此吾生常好更何求澗泉此中秋月詩引東坡貫休事極新異瀛奎律髓巻二十二

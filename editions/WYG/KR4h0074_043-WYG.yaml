body:
  text: 瀛奎律髓巻四十三元方囘編遷謫類遷客流人之作唐詩中多有之伯竒擯屈原放處人倫之不幸也或實有咎責而獻靖省循或非其罪而安之若命惟東坡之黄州惠州儋州尤偉云五言十八首初到黄梅臨江驛宋之問馬上逢寒食途中屬暮春可憐江浦望不見洛陽人北極懐明主南溟作逐臣故園腸斷處日夜栁條新之問之為人不足道也然唐律詩起於之問與沈佺期此詩貶瀧州叅軍時所作坐媚張易之事而敗其早發韶州律詩有云珠厓天外郡銅柱海南標日夜晴明少冬春霧雨饒身經山火熱顔入瘴江銷觸景含沙怒逢人毒草搖霧濃㸔袂濕風颺覺船飄又如發藤州云雲峰刻不似苔壁畫難成霧裛千花氣泉和萬籟聲戀結芝蘭砌悲纒梧檟塋如發端州云人意長懐北江行日向西破顔看鶴喜拭淚聽猿啼如失意潜行蠱猜顔輟報讐如呉將水為國楚用火耕田皆佳此篇北極南溟一聯老杜北闕心長戀西江首獨囘亦何以異乎乃知以言語文字取人工則工矣又當觀其人之心行為如何之問後逃還為考功復以醜行貶越州長史流欽州賜死桂州故曰其為人不足道也寄遷客張祜萬里南遷客辛勤嶺路遥溪行防水弩野店避山魈瘴海須求藥貪泉莫舉瓢但能堅志義白日甚昭昭寄流人項斯毒草不曽枯長流客健無霧開蠻市合船散海城孤象跡頻驚水龍涎逺閉珠家人秦地老泣對日南圖送流人司空曙聞說南中事悲君重竄身山邨楓子鬼江廟石郎神童稚留荒宅圖書托故人青門好風景為爾一沾巾送流人王建且說長沙去無親亦共愁隂雲鬼門夜寒雨瘴江秋水國山魈引蠻鄉洞主留漸看歸處逺垂白住炎洲送人流雷州楊衡逐客指天涯人間此路賒地圖經大庾水驛過長沙臘月雷州雨秋風桂嶺花不知荒徼外何處有人家此五首大抵相似唐人之所長而宋人多不為之惟梅聖俞集有此調度多是作送人之官詩耳遷客張籍去去逺遷客瘴中衰病身青山無限路白首不歸人海國戰騎象蠻州市用銀一家分幾歲誰見日南春唐人有長流者恐此亦是寓言無其人而立此題獨向長城北黄雲暗塞天流名屬邊將舊業作公田擁雪添軍壘收冰當井泉知君住應老須記别鄉年此乃没家資配邊戍者果有之亦可憐黔中書事竇羣萬事非京國千山擁麗譙佩刀看日晒賜馬傍江調言語多重譯壺觴每獨謠㳂流如着翅不敢問歸橈竇羣字丹列德宗時布衣召除右拾遺憲宗時以御史中丞舉職太過出觀察黔中此乃左遷時詩也尾句尤佳江流雖逺而不敢言歸云謫至干越亭作劉長卿天南愁望絶亭上栁條新落日獨歸鳥孤舟何處人生涯投越徼世業陷邊塵杳杳鍾陵暮悠悠番水春秦臺悲白首楚澤怨青蘋草色迷征路鶯聲傍逐臣獨醒翻引笑直道不容身得罪風霜苦全生天地仁青山數行淚滄海一窮鱗牢落機心盡唯應鷗鳥親此詩所賦四聯可賞而得罪風霜苦全生天地仁尤佳長卿詩謂之五言長城世稱劉隨州然不及老杜處以時有偏枯月下呈張秀才自古悲搖落誰家奈此何夜蛬偏傍枕寒鳥數移柯向老三年謫當秋百感多貧家唯有月空愧子猷過此遷謫中作八句皆有味北歸次秋浦界清溪館萬里猿啼斷孤邨客暫依鴈過彭蠡暮人向宛陵稀舊路青山在餘生白首歸漸知行近北不見鷓鴣飛首二句一作萬古啼猨後孤城落日依末句最新此公詩淡而有味但時不偶或有一苦句送客南遷白居易我說南中事君應不願聽曽經身困苦不覺語丁寧燒處愁雲夢波時憶洞庭春畬煙勃勃秋瘴霧㝠㝠蚊蚋經冬活魚龍欲雨腥水蟲能射影山鬼解藏形穴掉巴蛇尾林飄鴆鳥鴒􅄓風千里黒䕭草四時青客似驚弦雁舟如委浪萍誰人勸言笑何計慰漂零慎勿琴離膝長須酒滿瓶大都從此去宜醉不宜醒樂天一貶江州司馬移忠州刺史後歸朝為中書舎人出知杭州召復為蘇州未嘗逺貶其殆借此為題以誇筆端之富妙於鋪叙南土風景歟㣲之相與倡和尤長於斯予所選五言律止於十韻惟此至十二韻亦破例也戲題巫山縣用杜子美韻黄庭堅巴俗深留客呉儂但憶歸直知難共語不是故相違東縣聞銅􅆨江陵換裌衣丁寧巫峽雨慎莫暗朝暉山谷以紹聖元年甲戌朝㫖於開封府界居住取㑹史事二年乙亥謫黔州實甲戌十二月之命是年四月二十三至摩圍元符元年戊寅六月改元去年紹聖四年丁丑十二月避使者張向嫌移戎州今年六月至僰道三年庚辰正月徽廟登極五月得鄂州監鹽十月寧國僉判十二月離戎州建中靖國元年辛巳至峽州乃後始有舒州之命吏郎之召改知太平州等事蓋流離跋涉八年矣未嘗有一詩及於遷謫真天人也此出峽詩起句有石本作巴俗殊親我呉儂但憶歸細味則改本為佳直知難共語不是故相違此老杜句法巴人相留非不用情奈不可與語所以去之此有深意東縣聞銅􅆨者蜀人用鐵錢過巫山始用銅錢山谷舊改此句謂乃退之照壁喜見蝎之意予以為即班超生入玉門關之意也江陵換裌衣紀時序亦見天氣漸佳尾句殊工有憂時之意建中改紀熙豐之黨不樂想是已見萌芽必亦有所深指謂不可以雲雨蔽太陽也學老杜詩當學山谷詩又當知山谷所以處遷謫而浩然於去來者非但學詩而已十二月十九日夜中發鄂渚曉泊漢陽親舊載酒追送聊為短句接淅報官府敢為王事程宵征江夏縣睡起漢陽城隣里煩追送杯盤瀉濁清秪應瘴鄉老難答故人情建中靖國元年辛已夏山谷至江陵召至吏部即病癰不能入朝乞知太平州崇寧元年壬午春還江西六月初九日太平州到任九日而罷九月至鄂渚寓居二年癸未以荆南作承天塔記運判陳舉承望趙挺之風㫖摘謂幸災除名編𨽻宜州十二月十九日啟行此詩亦無一毫不滿之意而老筆與少陵詩無以異矣試通前詩論之直知難共語不是故相違即老杜詩直知騎馬滑故作泛舟囘也凡為詩非五字七字皆實之為難全不必實而虚字有力之為難紅入桃花嫩青歸栁葉新以入字歸字為眼凍泉依細石晴雪落長松以依字落字為眼櫸栁枝枝弱枇杷樹樹香以弱字香字為眼凡唐人皆如此賈島尤精所謂敲門推門爭精㣲於一字之間是也然詩法但止於是乎惟晚唐詩家不悟蓋有八句皆景每句中下一工字以為至矣而詩全無味所以詩家不專用實句實字而或以虚為句句之中以虚字為工天下之至難也后山曰欲行天下獨信有俗間疑欲行信有四字是工處剩欲論竒字終能諱秘方剰欲終能四字是工處簡齋曰使知臨難日猶有不欺臣使知猶有四字是工處他皆倣此且如此首宵征江夏縣睡起漢陽城又與氣蒸雲夢澤波動岳陽城不同蓋宵征睡起四字應接淅之意聞命赴貶不敢緩也與老杜下牀髙數尺倚杖没中洲句法一同詳論及此後學者當知之懐逺陳師道海外三年謫天南萬里行生前只為累身後更須名未有平安報空懐故舊情斯人有如此無復涕縱横東坡以紹聖四年丁丑謫儋州至元符二年己夘三年矣生前以名為累故至此豈復要死後名乎無復涕縱横謂涕已為公竭也宿深明閣二首窈窕深明閣晴寒是去年老將災疾至人與歲時遷黙坐元如在孤燈共不眠暮年身萬里賴有故人憐縹緲金華伯人間第一人劇談連晝夜應俗費精神時要平安報反愁消息真牆根霜下草又作一番新山谷修神宗實録蓋皆直筆紹聖初蔡卞惡其書王安石事摘謂失實召至陳留問狀寓佛寺題曰深明閣尋謫居黔州紹聖三年后山省龎丞相墓至陳留宿是閣有此詩暮年身萬里賴有故人憐謂山谷至黔州守曹譜伯逺倅張兟茂宗皆善待之牆根霜下草又作一番新謂紹聖小人也次韻無斁偶作此老三年别何時萬里囘更無南去雁猶見北枝開㑹有哀籠鳥寧須溺死灰聖朝無棄物與子賦歸哉此懐東坡也坡在儋耳三年矣獨坐任伯雨得喪榮枯事悠悠過耳風此身猶是幻何物不為空酒聖心常醉詩窮語更工小軒搔首坐斜日滿牕紅伯雨字德翁眉州人元符諫官坐論蔡卞等謫儋耳有海外詩曰乘桴集此公鐵人詩其餘事然此首句句工夫七言三十九首送王李二少府貶潭峽髙適嗟君此别意何如駐馬銜杯問謫居巫峽啼猿數行淚衡陽歸雁幾封書青楓江上秋天逺白帝城邊古木疎聖代只今多雨露暫時分手莫躊躇兩謫客李峽中王長沙中四句指土俗所尚末句開以早還亦一體也送鄭十八䖍貶台州司户叅軍傷其臨老陷賊之故闕為面别情見於詩杜甫鄭公樗散鬢如絲酒後嘗稱老畫師萬里傷心嚴譴日百年垂死中興時蒼惶已就長途徃邂逅無端出餞遲便與先生應永訣九重泉路盡交期工部又有題鄭十八著作主人詩七言八韻起句云台州地濶海㝠㝠雲水長和島嶼青尾句云窮巷悄然車馬絶案頭乾死讀書螢尤為哀痛今此選七言律過六韻者不收五言律至十韻而止蓋長篇太多則讀者頗難精也按唐史鄭䖍無表字貶後數年死老杜度其終無量移之命故詩云云左遷至藍關示姪孫湘韓愈一封朝奏九重天夕貶潮州路八千欲為聖朝除弊事肯將衰朽惜殘年雲横秦嶺家何在雪擁藍關馬不前知汝逺來應有意好收吾骨瘴江邊人多諱死時謂有䜟昌黎自謂必死潮州明年量移袁州尋爾還朝次鄧州界潮陽南去倍長沙戀闕那堪又憶家心訝愁來惟貯火眼知别後自添花商顔暮雪逢人少鄧鄙春泥見驛賒早晚王師收海嶽普將雷雨發萌芽元和十四年己亥春正月以佛骨事謫潮州三月二十五日到任其秋七月憲宗加號大赦十月二十四日量移袁州刺史唐左降官聞命即日上道未能攜家故有此詩衡陽與夢得分路别贈栁宗元十年顦顇到秦京誰料翻為嶺外行伏波故道風煙在翁仲遺墟草木平直以疎慵招物議休將文字占時名今朝不用臨河别垂淚千行便濯纓栁子厚永貞元年乙酉自禮部員外郎謫永州司馬年二十三矣是時未有詩元和十年乙未詔追赴都三月出為栁州刺史劉夢得同貶朗州司馬同召又同出為連州刺史二人者黨王叔文得罪又才髙衆頗忌之憲宗深不悅此二人疎慵招物議既不自反尾句又何其哀也其不逺到可覘夢得乃特老壽後世亦鄙其人云别舍弟宗一零落殘魂倍黯然雙垂别淚越江邊一身去國六千里萬死投荒十二年桂嶺瘴來雲似墨洞庭春盡水如天欲知此後相思夢長在荆門郢樹煙此乃到栁州後其弟歸漢郢間作此為别投荒十二年其句哀矣然自取之也為太守尚怨如此非大富貴不滿願亦躁矣哉再受連州至衡陽酬贈别劉禹錫去國十年同赴召湘江千里又分岐重臨事異黄丞相三黜名慚栁士師歸目併隨囘雁盡愁腸正遇斷猿時桂江東過連山下相望長吟有所思說見子厚詩下栁士師事甚切江湖秋思司空曙趍陪禁掖雁行稀遷放江潭鶴髮垂素浪遙疑八漢水青楓忽似萬年枝嵩南春遍傷魂夢湖口雲深隔路岐共望漢朝多沛澤蒼蠅早晚得先知遷人望歸之意見乎此寄韓潮州賈島此心曽與木蘭舟直到天南潮水頭隔嶺篇章來華岳出關書信過瀧流峰懸驛路殘雲斷海浸城根老樹秋一夕瘴烟風掩盡月明初上浪西樓初到江州白居易潯陽欲到思無窮庾亮樓南湓口東樹木凋疎山雨後人家低濕水煙中菰蔣餵馬行無力蘆荻編房卧有風遙見朱輪來出郭相勤勞動使君公樂天元和十年乙未貶江州司馬年四十四初到忠州贈李六好在天涯李使君江頭相見日黄昏吏人生梗都如鹿市井疎蕪只抵邨一隻蘭船當驛路百層石磴上州門更無平路堪行處虚度朱輪五馬恩元和末自江州司馬移忠州刺史此等遷謫作太守未為惡也而氣象遽如此得微之到官後書備知通州之事悵然有感因成四章來書子細說通州州在山根峽岸頭四野千重火雲合中心一道瘴江流蟲蛇白晝攔官道蚊蚋黄昏撲郡樓何罪遣君居此地天髙無處問來由匼匝巔山萬仞餘人家應似甑中居寅年籬下多逢虎亥日沙頭始賣魚衣斑梅雨長須熨米澁畬田不解鉏努力安心過三考已曾愁殺李尚書元註李實尚書先貶此州身没於彼處予讀至此乃知古人初無忌諱元㣲之貶移通州司馬今蜀之開州也未為甚惡樂天在江州乃引死人事寄詩足見前輩直情人稀地僻醫巫少夏旱秋霖瘴瘧多老去一身須愛惜别來四體得如何侏儒飽笑東方朔薏苡讒憂馬伏波莫遣沈愁結成病時時一唱濯纓歌通州海内恓惶地司馬人間冗長官傷鳥有弦驚不定卧龍無水動應難劍埋獄底誰深掘松偃霜中盡泠看舉目爭能不惆悵髙車大馬滿長安酬樂天得㣲之詩知通州事因成四首元稹茅簷屋舎竹籬州虎怕偏蹄蛇兩頭暗蠱有時迷酒影浮塵向日似波流沙含水弩多傷骨田仰畬刀少用牛知得與君相見否近來魂夢轉悠悠平地才應一頃餘閭闌都大似巢居入衙官吏聲疑鳥下峽舟船腹似魚市井無錢論丈尺田疇付火罷耘鉏此中愁殺須甘分惟惜平生舊著書元註巴人多在山坡架木為居自號閭闌頭也又元註末句云努力安心過三考已曽愁殺李尚書予病甚將平生所為文題云異日送白二十二郎也哭鳥晝飛人少見倀魂夜嘯虎行多滿身沙蝨無防處獨脚山魈不奈何甘受鬼神侵骨髓常憂岐路起風波南歌未有東西分敢唱滄浪一字歌荒蕪滿院不能鋤甑有塵埃圃乏蔬定覺身將囚一種未知生共死何如飢搖困尾喪家狗熱暴枯鱗失水魚苦境萬般君莫問自憐方寸本空虚微之為御史以彈劾嚴勵分司東都又劾宰相親故貶江陵士曹移通州司馬未為大戚樂天以朋友之義傷之則可微之答和乃全述通州衰惡若不能一朝居者詞雖善而意已陋異日由宦官進得相位僅三月貽終古羞蓋其本心志在富貴故也四詩徃徃酸苦太楚選附白詩以識其非送唐介之貶所李師中孤忠自許衆不與獨立敢言人所難去國一身輕似葉髙名千古重於山並游英俊顔何厚未死姦諛骨已寒天為吾皇扶社稷肯教夫子不生還唐介子方上殿劾宰相文彦博交結張貴妃仁宗震怒子方謫春州李師中誠之送以此詩係用出入韻未死姦諛骨已寒此句乃元本也以指文公不無小過或改為已死姦雄骨尚寒子方劾生宰相於已死姦雄何與故予改從古本初到黄州蘇軾自笑平生為口忙老來事業轉荒唐長江遶郭知魚美好竹連山覺筍香逐客不妨員外置詩人例作水曹郎只慚無補絲毫事尚費官家壓酒囊東坡元豐二年己未冬責授檢校水部員外郎黄州團練使本州安置明年二月到郡何遜張籍孟賓三詩人皆水部八月七日初入贛過惶恐灘七千里外二毛人十八灘頭一葉身山憶喜歡勞逺夢地名惶恐泣孤臣長風送客添帆腹積雨浮舟減石鱗便合與官充水手此生何止畧知津元註蜀道有錯喜懽鋪在大散關上紹聖元年甲戌東坡自知定州降知英州未到貶惠州安置十月二日初到惠州彷佛曾游豈夢中欣然雞犬識新豐吏民驚怪坐何事父老相攜迎此翁蘇武定知還漠北管寜自欲老遼東嶺南萬户皆春色㑹有髙人客寓公紹聖元年甲戌六月二十日夜渡海參横斗轉欲三更苦雨終風也解晴雲散月明誰㸃綴天容海色本澄清空餘魯叟乘桴意粗識軒轅奏樂聲九死南荒吾不恨茲游竒絶冠平生紹聖四年丁丑東坡在惠州年六十二矣五月再謫瓊州别駕昌化軍安置即儋州也以六月二十日夜渡海七月十三日至儋州或謂尾句太過無省愆之意殊不然也章子厚蔡卞欲殺之而處之怡然當此老境無怨無怒以為茲游竒絶真了生死輕得喪天人也四詩可一以此意觀過嶺二首暫著南冠不到頭却隨北雁與歸休平生不作兎三窟今古何殊貉一丘當日無人送臨賀至今有廟祀潮州劍關西望七千里乘興真為玉局游七年來徃我何堪又試曹溪一勺甘夢裏似曽遷海外醉中不覺到江南波生濯足鳴空澗霧繞征衣滴翠嵐誰遣山雞忽飛起半巖花雨落毿毿紹聖元年甲戌貶惠州四年丁丑貶儋州明年元符戊寅改元三年庚辰量移廉州永州自便凡七年楊憑貶臨賀尉惟徐晦送之此事極切夢裏似曽遷海外此聯甚佳殊不以遷謫為意也是年坡公年六十五明年建中靖國元年辛巳七月卒於常州送王元均貶衡州兼寄元龍二首陳師道先生英氣蓋區中命與仇謀得老窮又見長身有家法可辭短簿怒吾公石頭路滑行能速宣室歸來語未終宛洛風塵莫囘顧直須留眼送歸鴻先生秀句滿江東二子縁渠得再窮詩禮向來堪發冡孫劉能使不為公炎方瘴癘避軒豁故國山河開始終傳語元龍要相識江湖春動有來鴻王安國字平甫有校理集百巻行於世尤富於詩曽南豐作序陳后山作後序神宗召試賜第坐忤吕惠卿引連鄭俠獄以著作佐郎集賢校理斥元豐初卒年四十七子旊字元均斿字元龍元符元年看詳訴理所言宣德郎王斿於元祐初進狀稱安國寃抑斿貶監江寜糧料旊罷京東運判監衡州酒稅后山家居作此詩送之兩先生字皆指平甫詩禮向來堪發冡以指吕惠卿口先王而行市人也孫劉能使不為公乃辛毘語吾立身自有本末就與孫劉不平不過不作三公而已謂孫資劉放后山指謂惠卿之陷平甫亦不過不作三公耳予友陳杰壽夫嘗謂此詩用事竒妙意至而詞嚴不為事所束縛詩之第一格也瘴癘避軒豁謂衡陽非瘴地故國山河謂介甫封荆公衡乃荆州他日終復其始未可知也國史安國傳不載此事止云子斿有父風此事見舊録云次韻答清江主簿趙彦成黄叔達日轉溪山幾百遭厭聞虎嘯與猿號笙歌忽把二天酒風雨猶驚三峽濤已作齊民尋要術安能痛飲讀離騷看君自是青田質清唳當聞徹九臯黄知命名叔達山谷弟也先是山谷貶黔州未攜家紹聖三年丙子知命自蕪湖攜已之子耜山谷之子相及兩所生母五月六日抵黔州先至施州赴太守張仲猷飲清江即施州城下縣主簿趙彦成名肯堂嘉州人知命此詩謂忽把二天酒當是與彦成同席也知命凡二十詩見山谷集或謂經乃兄潤色以成其名然則兄在貶所弟為攜家孝友之道也予先君四府君自廣州謫封州先叔八府君元圭一至靜江問勞後又至封州取喪以歸亦山谷之知命也故有所感而取此詩云歲晚有感張耒疎梅㸃㸃栁毿毿殘臘新春氣候參天靜秋鴻來塞北雲收片月出江南青霄雨露將囘律白首江湖尚避讒未信世途無倚伏有時清鏡理朝鬖文潜兩謫黄州其詩毎和平而不怨初到惠州唐庚盧橘楊梅乃爾甜肯容遷謫到眉尖因行採藥非無得取足看山未害廉辨謗若為家一喙著書不直字三縑老師補處吾何敢政謂宗風不敢謙大觀四年子西謫惠州乃東坡補處二字出釋書釋迦佛補處如崛闍耆給孤獨曽是佛位之地收景初貶所書信斷常懐信斷憂得書還有得書愁未應宿業都相似總為譊聲不肯休見說胸中巻雲夢莫將皮裏貯陽秋迺公有道知興廢不患無詞詣播州次景初見寄韻此生正坐不知天豈有豨苓解引年但覺轉喉都是諱就令搖尾有誰憐腰金已付兒童佩心印當還我輩傳他日乗車來問道葦間相顧共延縁此皆子西貶所詩皆工甚任景初亦蜀人大觀四年同子西入京師子西貶之明年景初亦謫江左皆數歲未得歸送胡邦衡之新州貶所二首王庭珪一封朝上九重關是日清都虎豹閒百辟動容觀奏牘幾人囘首媿朝班名髙北斗星辰上身落南州瘴癘間不待百年公議定漢庭行召賈生還大厦元非一木支要將獨力拄傾危癡兒不了公家事男子要為天下竒當日姦諛皆膽落平生忠義祗心知端能飽喫新州飯在處江山足䕶持王盧溪先生諱庭珪字民瞻廬陵人政和八年登第調茶陵丞以上官不合去隱盧溪者五十年紹興八年戉午十一月編脩胡公銓字邦衡以和議奏封事乞斬王倫秦檜孫近黜十一年謫新州盧溪作是詩送之同邑人歐陽炎識遣其里人匡求告詩謗訕送虎獄送勘盧溪引咎追官送辰州編管時年七十矣檜殂得歸孝廟立召除國子監簿再召除直敷文閣時年九十餘有盧溪詩集傳於世楊誠齋作序盧一作瀘胡公謂於民瞻初未識面胡再謫朱厓檜殂紹興二十六年移衡州又久之始得自便孝廟立召用至從官資政殿學士張魏公謂秦檜之專權只成就得胡邦衡一人如盧溪隱節固髙因此詩得罪大名愈著夫人不可以為不善造物者未嘗肯泯没之又以見夫正人義士之不幸乃國家之不幸生靈之大不幸也選此詩識中國之所以衰也雷州和朱彧秀才詩時欲渡海胡銓何人着眼覷征驂賴有新詩作指南螺髻層層明晚照蜃樓隠隱倚晴嵐仲連蹈海徒虚語魯叟乘桴亦謾談爭似澹菴乗興徃銀山千叠酒微酣紹興十八年戉辰十一月十五日新州編管人胡銓移吉陽軍編管先是廣東經畧使王鈇問知新州張棣曰胡銓何故未過海銓嘗賦詞云欲駕巾車歸去有豺狼當轍棣奏銓倡和毁謗而有是命棣選使臣游崇部送封小項筒過海銓徒步赴貶人皆憐之至雷州守臣王趯捕游崇私茗械治厚餉銓趯後亦得罪澹菴此詩不少屈撓真鐵漢又過於劉器之云丙子年始移衡州和李參政泰發送行韻落網端從一念差崕州前定復何嗟萬山行盡逢黎母雙井渾疑到若耶山鬼可人曽入夢相君談易更名家此行所得誠多矣更願從公北泛槎元註李參政詩云夢裏分明見黎母生前定合到朱崕蓋予嘗在新州夢一媪立牀前曰吾黎母也黎姞山在瓊州儋萬之間子瞻所謂四山環一島是也先是秦檜大書三人姓名於其家格天閣下曰趙鼎李光胡銓所必欲殺者也鼎謫瓊州紹興十七年丁卯卒光字泰發上虞人時謫儋州澹菴朱崕之行經過儋州故泰發以詩送之澹菴夙有黎母之夢付諸前定如謫新州時亦謂前定福唐幕中分扇得一畫騎驢人西南行者後新州之命亦若暗合夫不以遷謫介意而付之於分非達人不能也次李參政送行韻答黄舜楊打成大錯一毫差萬里去尋留子嗟㣲管閒思齊仲父賜奴長價漢渾邪道窮憐我空憂國句好知君定作家便欲相攜趁帆飽要觀子美賦靈槎齊仲父漢渾邪此澹菴心事也不以秦檜講和為然流離顛沛之死不變今秦氏安在而澹菴之忠肝義膽萬古不朽也識此詩以見張魏公之貶岳武穆之死趙李胡三公海外之竄南渡之業所以不復再振而至於厭厭無氣愈弱愈下者誰實為之此非常之痛無窮之悲不但為二三君子悵然也李泰發參政得㫖自便將歸以詩迓之曽幾苦遭前政墮危機二十餘年詠式微天上謫仙皆欲殺海濱大老竟來歸故園松菊猶存否舊日人民果是非最小郎君今弱冠别時聞道不勝衣元註謂孫壻文授秦檜謫三大賢於海外趙丞相鼎李參政光胡編脩銓又書其姓名於格天閣下必欲殺之趙先殁李胡皆生還此詩第二句悲愴三四切題瀛奎律髓卷四十三

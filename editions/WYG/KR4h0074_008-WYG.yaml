  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0074_WYG_008-1a, image: WYG1366/WYG1366-0088a.png}
body:
  text: 瀛奎律髓巻八元方回編宴集類昭明選詩則分公讌祖餞今以宴集合之五言十首宴散白居易小宴追凉散平橋步月迴笙歌歸院落燈火下樓臺殘暑蟬催盡新秋雁帶來將何迎睡興臨卧舉殘盃三四人所共知萬年縣中雨夜㑹宿寄皇甫佃姚合縣齋還寂寞夕雨洗蒼苔清氣澄微潤寒聲竹共來蟲移上階近客起到門迴想得吟詩處惟應對酒盃頷聯不對唐人多此體五六言雨事巧蟲上階近人雨中多有之客起到門始知有雨而還則人之所難言者故曰巧淮上喜㑹梁川故人韋應物江漢曾為客相逢每醉還浮雲一别後流水十年間歡笑情如舊蕭疎鬢已斑何因不歸去淮上有秋山揚州偶㑹前洛陽盧耿主簿楚塞故人稀相逢本不期猶存袖裏字忽怪鬢邊絲客舍盈樽酒江行滿篋詩更能連騎出還似洛橋時韋嘗貳洛陽有連騎之游月夜㑹徐十一草堂空齋無一事㟁幘故人期暫輟觀書夜還題玩月詩逺鐘髙枕後清露捲簾時暗覺新秋近殘河欲曙遲蘇州詩淡而自然此三詩皆是也餘干夜晏奉餞韋蘇州使君除婺州劉長卿復拜東陽郡遥瞻北闕心行春五馬急向夜一猿深山過康郎近星㸔婺女臨幸容棲托分猶戀舊棠隂味此詩恐是應物知蘇州時長卿為長洲尉也宴安樂公主宅宋之問英藩築外館愛主出王宫賓至星槎落仙來月宇空玳梁翻賀燕金埒倚晴虹簫去秦臺裏書開魯壁中短歌能駐日艷舞欲嬌風聞有淹留處山河滿桂叢送髙判官和唐店夜飲梅堯臣露宿勤王客相從月下來黄流何日漲緑酒暫時開風定燈花爛天髙斗柄回醉言多脱畧吾黨不須猜第五遒勁第六宏壯亦如燈之爛花斗之移柄云春晏宴北園宋祁天意歇餘芳人間日始長落花風觀閣睡鴨雨池塘稍倦持螯手猶殘藍尾觴春歸無所預羈客自回腸三四峭麗偶然得之乎其亦思而得之乎成都時詩十日宴江瀆亭節去歡猶在賓來賞更延悠揚初短日凄緊乍寒天霽沼元非漲秋花自少妍蟻留新獻酎蕙續不殘烟戲鰋衝餘藻游龜避折蓮流芳真可惜從此逐凋年折蓮一聯好七言十三首宴周皓大夫光福宅白居易何處風光最可憐妓堂階下砌臺前軒車擁路光照地絲管入門聲沸天緑蕙不香饒桂酒紅櫻無色讓花鈿野人不敢求他事惟借泉聲伴醉眠嵗日家宴戲示弟姪兼呈張侍御殷判官弟妹妻孥子姪甥嬌癡弄我助歡情嵗盞後推藍尾酒春盤先進膠去聲牙􅄳形骸老倒雖堪歎骨肉團圓亦可榮猶有誇張少年處笑呼張丈喚殷兄燕李録事韋應物與君十五侍皇輿曉拂爐烟上赤墀花開漢苑經過處雪下驪山沐浴時近臣零落今誰在仙駕飄颻不可期此日相逢思舊日一杯成喜亦成悲前豪誇後感慨次韻盛居中夜飲張耒呉衣厭拂洛陽塵夢寐一樽淮海濱每願托車常貯酒况逢投轄苦留賓蒼龍掛斗寒垂夜翡翠浮花暖作春上界髙真足官府追隨却逐散仙人同周楚望飲花園杖藜攜手踏青苔瀟灑池亭為客開柳色漸輕秋雨暗荷香時為好風來斜陽似欲粧詩句新月邀將入酒盃身世己甘長寂寞忘形賴有子徘徊春宴行樂家園宋祁園芿初乾小雨泥飲壺游屐况親攜身輕早蝶千回舞枝癢新禽百種啼乗飲草茵侵坐軟畏風桃綬向林低陽暉自有留人意銜照髙樓未遽西芿人去聲九日水閣韓琦池館隳摧古榭荒此延嘉客㑹重陽雖慚老圃秋容淡且㸔黄花晚節香酒味已成新過熟蠏黄先實不須霜年來飲興衰難强謾有髙吟力尚强辛亥二月十五儵忽韶光一半過寒威猶自壓暄和故摧春色歡終減屢失花期日旋那病骨不禁風料峭衰悰難遏醉吟哦凭闌更為芳菲惜重取輕苫擁舊科辛亥重九㑹安正堂斯堂曾許占風光須到重陽復命觴坐上半非前嵗客杯中無改舊花香初晴已過登髙事散慮宜趨自得場惟有一樽詩酒戰願開强户振雄鋩即席蕪音逢節佐賓罍屬和當筵盡雅才銅鉢一聲詩已就金鈴千朶菊爭開月明正有抽毫樂夜永何妨秉燭回無酒可嗤彭澤令東籬空望白衣來王龜齡王嘉叟木藴之同過小園用郡圃植花韻洪邁節到中和暖尚賖東風隨處起芳華自慚翳翳松三逕相對蕭蕭馬五花老去醉鄉為日月年來痼疾在煙霞午橋别墅歸公手早定淮西取白麻龜齡名十朋藴之名待問皆永嘉人嘉叟名秬初寮王安中之孫寓居泉南此必饒守泉守憲使也上已訪楊廷秀賞牡丹於御書扁榜之齋其東圃僅一畝為街者九名曰三三徑周必大楊監全勝賀監家賜湖豈比賜書華回環自斸三三徑頃刻常開七七花門外有田聊伏臘望中無處不煙霞却慚下客非摩詰無畫無詩只謾誇周益公丞相之四六楊誠齋秘監之詩俱名天下而同郡此益公老筆公常問詩法於放翁對云當法子由此言深有㫖子由詩勝子瞻不工不博不深於其間字用力而有幽味示同㑹朱翌無奈春寒老不禁喜㸔晴日上牕櫺羣花半露乾坤巧百刻平分晝夜停拄杖有時挑菜甲桔橰無復問畦丁逢春不出何為者衆醉誰知可獨醒朱仲新善詩而所傳不多此首第四句言春分以上一句喚動而知其春分也合二句詠之甚齊當上四下三截斷㸔瀛奎律髓巻八

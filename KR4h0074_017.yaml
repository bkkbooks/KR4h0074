  - {type: page-break, offset: 0, content: '', id: KR4h0074_WYG_017-1a, image: WYG1366/WYG1366-0191a.png}
body:
  text: 瀛奎律髓巻十七元方回編晴雨類雨而晴晴而雨洪範所謂時若恒若而天地之豐凶異焉詩人有喜有感斯可以觀五言九十五首發營逢雨應詔虞世南豫游欣勝地皇澤乃先天油雲隂一作低御道膏雨潤公田隴麥沾逾翠山花濕更燃稼穡良所重方復悦豐年唐之盛瀛洲十八學士於詩文皆餘事也世南集不可見初學記中得此詩奉和春日途中喜雨魏知古皇遊向洛城時雨應天行麗日登巖送隂雲出野迎濯枝林杏發潤葉渚蒲生絲入綸言喜花依錦字明㣲臣忝東觀載筆佇西成此乃和武后詩五韻律詩多有之第七句巧途中遇晴孟浩然已失五陵道獨逢蜀坂泥天開斜景逈山出晚雲低餘濕猶霑草殘流尚入溪今宵有明月鄉思逺凄凄三四壯浪五六細潤形容雨晴妙甚雨四首杜甫微雨不滑道斷雲疎復行紫崕奔處黒白鳥去邊明秋日新霑影寒江舊落聲柴扉臨野碓半濕搗香粳江雨舊無時天晴忽散絲暮秋霑物冷今日過雲遲上馬迴休出看鷗坐不辭高軒當灔澦潤色靜書帷物色嵗將晏天隅人未歸朔風鳴淅淅寒雨下霏霏多病久加飯衰容新授衣時危覺彫喪故舊短書稀楚雨石苔滋京華消息遲山寒青兕呌江晚白鷗饑神女花鈿落鮫人織杼悲繁憂不自整終日洒如絲老杜晴雨詩取二十首似乎太多然他人無此等氣魄學者但觀老杜聖俞后山簡齋四家賦雨甚𢎞大其工宻其高爽為如何即知入處矣晨雨小雨晨光内初來葉上聞霧交纔洒地風逆旋隨雲暫起柴荆色輕霑鳥獸羣麝香山一半亭午未全分喜雨南國旱無雨今朝江出雲入空纔漠漠洒逈已紛紛巢燕高飛盡林花潤色分晚來聲不絶應得夜深聞對雨莾莾天涯雨江邊獨立時不愁巴道路恐濕漢旌旂雲嶺防秋急繩橋戰勝遲西戎甥舅禮未敢背恩私村雨雨聲傳兩夜寒事颯高秋挈帶看朱紱開箱覩黒裘世情只益睡盜賊敢忘憂松菊新霑洗茅齋慰逺遊梅雨南京犀浦道四月熟黄梅湛湛長江去㝠㝠細雨來茅茨疎易濕雲霧宻難開竟日蛟龍喜盤渦與岸迴朝雨凉氣曉蕭蕭江雲亂眼飄風鴛藏近渚雨燕集深條黄綺終辭漢巢由不事堯草堂樽酒在幸得遇清朝夜雨小雨夜復宻迴風吹早秋野凉侵閉户江滿帶維舟通籍恨多病為郎忝薄遊天寒出巫峽醉别仲宣樓更題只應踏初雪騎馬發荆州直怕巫山雨真傷白帝秋羣公蒼玉佩天子翠雲裘同舍晨趍侍胡為淹此留春夜喜雨好雨知時節當春乃發生隨風潛入夜潤物細無聲野徑雲俱黒江船火獨明曉看紅濕處花重錦官城紅濕二字或謂惟海棠可當此詩絶唱對雨書懷走邀許主簿東嶽雲峰起溶溶滿太虚震雷翻幕燕驟雨落河魚座對賢人酒門聽長者車相邀愧泥濘騎馬到堦除乘雨入行軍六弟宅曙角凌雲罷春城帶雨長水花分塹弱巢燕得泥忙令弟雄軍佐凡才汙省郎萍飄忍流涕衰颯近中堂詩全言景物易令弟凡才一聨却難他人為之則陳腐大手筆為之則高古雨晴雨晴山不改晴罷峽如新天路休殊俗秋江思殺人有猿揮淚盡無犬附書頻故國愁眉外長歌欲損神晴二首久雨巫山暗新晴錦繡文碧知湖外草紅見海東雲竟日鶯相和摩霄鶴數羣野花乾更落風處急紛紛草碧指言湖外雲紅指言海東其善於張大如此啼烏爭引子鳴鶴不歸林下食遭泥去高飛恨久隂雨聲衡塞盡日氣射江深囘首周南客驅馳魏闕心晚晴邨晚驚風度庭幽過雨霑夕陽薫細草江色映疎簾書亂誰能帙杯乾自可添時聞有餘論未怪老夫潛晚晴返照斜初散浮雲薄未歸江虹明逺飲峽雨落餘飛鳬鶴終高去熊羆覺自肥秋風一作分客尚在竹露夕微微夏日對雨裴度登樓逃盛暑萬象正埃塵對面雷嗔樹當堦雨趂人簷疎蛛網重地濕燕泥新吟罷清風起荷香滿四隣裴晉公度累朝元老於功名之際盛矣而詩人出其門尤盛自為之詩尤不可及灰心縁忍事霜鬢為論兵與劉夢得諸人聨句見之凡聨句晉公詩皆竒絶此篇見文苑英華句句清切嗔字趂字尤見夏雨之快春雨劉復細雨度深閨鶯愁欲懶啼如煙飛漠漠似露濕萋萋草色行看靡花枝暮欲低曉聽鐘鼓動早送錦障泥令狐楚為翰林學士時選進唐御覽詩凡三十家劉復四首所選大抵工麗一名選進集一名元和御覽盧綸墓碑云三百一十篇今傳者二百八十九篇云賦暮雨送李胃一作渭韋應物楚江微雨裏建業暮鐘時漢漠帆來重㝠㝠鳥去遲海門深不見浦樹逺含滋相送情無限霑襟比散絲三四絶妙天下誦之寺居秋日對雨有懷喻亮翛翛復雭雭黄葉此時飛隠几客吟斷隣房僧話稀鴿寒棲樹定螢濕在窗微即事瀟湘渚漁翁披草衣五六見雨意而工裴端公使院賦得隔簾見春雨包何細雨未成霖垂簾但覺隂惟看上砌濕不遣入簾深度隙霑編簡因風潤綺琴須移户外屨簷溜夜相侵前四句儘好後四句巧梅雨栁宗元梅實迎時雨蒼茫值晚春愁深楚猿夜夢斷越雞晨海霧連南極江雲暗北津素衣今盡化非為洛陽塵謂衣生醭也醭匹卜切老杜在蜀曰南京犀浦道四月熟黄梅子厚在永州曰梅實迎時雨蒼茫入晚春今江浙間以五月芒種節後逢壬為入梅夏至後逢庚為出梅定有大雨惟北土無之或謂蜀亦無梅雨杜以為四月栁以為三月豈梅熟有先後之異乎郴州祈雨韓愈乞雨女郎魂炮羞潔且繁廟開鼯鼠呌神降越巫言旱氣期銷蕩隂官想駿奔行看五馬入蕭颯己隨軒雨中寄張博士籍侯主簿喜放朝還不報半路蹋泥歸雨慣曾無節雷頻自失威見牆生菌徧憂麥作蛾飛嵗晚偏蕭索誰當救晉饑昌黎大手筆僅有此晴雨詩二首前詩三四高古後詩三四有議論雷失威尤竒同裴少府安居寺對雨皇甫冉共結尋真會還當對食初爐煙雲氣合林葉雨聲餘溽暑銷珍簟浮凉入綺疏歸心從念逺懷此復何如五六工微雨吳融天清織未遍風急舞難成粉重低飛蝶黄濃不語鶯乍隨春靄亂還放夕陽明惆悵池塘逺荷珠㸃㸃輕此乃一幅微雨畫也雨張蠙半夜西亭雨離人獨啓闗桑麻荒舊國雷電照前山細滴高槐底繁聲叠漏間唯應孤鏡裏明日長愁顔三四壯麗尾句有味見英華集又有劉灣對雨愁悶詩云積雨細紛紛饑寒命不分攬衣愁見肘窺鏡覓縱文見肘縱文甚巧而粗故不取用周亞夫縱理事也依韻和子聰夜雨梅堯臣牕燈光更逈宿霧晦層簷寒氣微生席輕風欲度簾濕螢依草沒暗溜想池添况值相如渴無嫌魯酒甜新秋雨夜西齋文㑹夜色際隂霾燈青謝客齋梧桐生靜思絡緯動秋懷小酌寧辭醉清言不厭諧誰憐何水部吟苦怨空階此皆聖俞西京詩妙年細密初學者不可不知依韻和簽判都官昭亭謝雨迴廣教見懷賽雨何從事高情苦愛山謝公聨句後元註謝公有昭亭賽雨與何從事聨句詩恵逺過溪間笑處巖相答歸時酒在顔端憂守窮巷無力共躋攀笑處歸時一聨淡而有味春夜聞雨風味正不寢驟來寒氣增簷斜滴野籜窗缺擺春燈孺子睡中語行人歸未能前溪波暗長定已沒灘稜三四工餘皆有味夏雨林梅初弄熟密雨閉重闗潤裛衣巾上凉生竹樹間水聲通逺澗雲色暝前山野鳥寂無語公庭盡晝閒五六佳新霽望岐笠山元註謝紫微坐中賦北望直百里峩峩千仞青斷虹迎日盡飛雨帶龍腥隂壑煙雲畜陽崖草木靈登臨終不厭時許到兹亭三四佳此從謝師厚在鄧州詩寳元二年己卯授汝州襄城縣未赴年三十七嵗其年九月赴官師厚尋卒歐陽公經過留鯽魚待之之時也觀水并序庚辰秋七月汝水暴至溢岸親率縣徒以土塞郭門居者知其勢危皆結庵於木末徬徨愁歎故作此詩秋水漫長堤郊原上下迷孤城閉版築高樹見巢棲耳厭蛙聲極漚生雨㸃齊渚間牛不辨誰為掃隂霓康定元年庚辰公年三十八知襄城縣又有詩題云城中壞廬舍千餘和小雨蛟龍噀白霧天外細濛濛霑土曾無跡昏林似有風巻旗妨酒舍濕翅下洲鴻稍見斜陽透西雲一半紅當是和晏相國舟中值雨裴刁二君見過江上渰淒淒天形接野低岸痕生舊水馬跡踏春泥風急侵衣重山昏巻幔迷誰驚二客論不愧巨源妻此将赴霅上鹽税在京口作此時聖俞先内謝氏無恙殆在舟中聞二公語後乃再娶刁氏次韻和景彞元夕雨晴春雲收暮城九陌洒然清星出紫霄下月從滄海明車音還似晝鼓響已知晴靜閉衡門卧無心學後生車音鼓響之聨妙甚感春之際以病止酒水邱有簡云時雨乍晴物景鮮麗疑未是止酒時因成短章奉答東風固無迹何處見春歸土逐草心坼雨兼花片飛雖憐柔甲長只恐艷條稀君但惜晴景休言止酒非韓子華約遊園上馬後雨作遂歸誰約玩春物狂風雲驟開擺叢多落葉蔽路足昏埃逆上燕迎雨將生鵞怕雷嵇康今轉懶騎馬半途回三四言大風五六言雨言雷皆工而新集英殿賜百官宴以雨放春來無㸃雨三月始聞雷曉殿鳴簷急羣公罷食迴燕迎風翅健馬踏霧泥開晚覺微陽透飛光上緑槐雨則罷宴足攷故事雨中二首張耒手種堦前樹今朝亦有花春隂寒食節陋巷逐臣家欲酌消愁酒先澆破睡茶遊人歸踏雨里巷晚諠譁肥仙詩自然楊誠齋之評不虚也節物即自好客心何落然早寒清野市夜雨暗江天破屋疎茅滴空廚濕葦煙政須一杯酒相與度流年第四句夜雨暗江天待别本檢補和應之細雨朝煙和雨細病眼暗難分有潤物皆澤無聲人不聞緑連平野稼翠雜亂山氛晚霽復何有飄飄神女雲有潤無聲之句亞於老杜寄無斁陳師道敬問晁夫子官池幾許深已應飛鳥下復作卧龍吟待我中痾愈同君把臂臨泥塗無去馬夏木有來禽晁無斁為曹州教官后山婦翁郭槩為州守多唱和后山五言律為雨而作者選七首自老杜後始有后山律詩往往精於山谷也山谷宏大而古詩尤高后山嚴宻而律詩尤高暑雨密雨吹不斷貧居常閉門東溟容有限西極更能存束濕炊懸釡翻床補壞垣倒身無着處呵手不成温夜雨十月天猶雨三更月失明溟濛纔洒潤㸃滴不成聲闢户風煙入投林鳥雀輕強懷終易感倐起别離情和寇十一同遊城南阻雨還登寺山雨阻遊南步泥留逐北情稍看飛霧斷復作逺山横野濶膏新澤樓明納晚晴歸宜有佳思紗帽壓香英膏字納字詩眼極矣和寇十一雨後登樓秀嶺歸雲裏華譙夕照中登臨終一作初不數吟嘯近多同麥秀知春力人和驗嵗豐預為逃暑約一快楚臺舂一作風次韻夜雨暗雨來何急寒房客自醒驟看燈閃閃擬對竹青青聲到江干失風迴葉上聽更長那得曉欹側想儀刑和黄預久雨甲子仍逢夏連朝雨脚垂黒雲𤣥甲駐鐵騎冷官馳映日還䝉霧懸麻却散絲頺牆通犬豕破柱出蛟螭野潤風光秀凉生枕簟宜撥雲開日月噀水見虹霓貧可留須捷恩當記扊扅蒼頭行冒雨赤脚出衝泥詩好聲生吻書工手着胝衰年得佳句懷抱頓能移扊扅一句言雨中婦以門牡為炊攻苦食淡異時不可忘也揚雄方言南楚凡人貧衣被醜弊謂之須捷或曰摟裂此引用言雨中解衣以供薪水之費也驟雨唐庚黑雲驚小市白雨沸秋江聲入家家樹凉傳處處窗亂流鳴决决叠鼓鬧龐龐蘋末清風起斜陽覷海邦江漲秋來雨似澆雨罷水如潮市改依高岸津喧救斷橋雲隂哭鳩婦池溢走魚苗天意良難測前時旱欲焦工不可言市改津喧之聨尤精選雨陳與義蕭蕭十日雨穏送祝融歸燕子今年别梧桐昨夢非一凉恩到骨四壁事多違衮衮繁華地西風吹客衣簡齋五言律為雨而作者選十九首詩律精妙上廹老杜仰高鑽堅世之斯文自命者皆當在下風后山之後有此一人耳連雨書事九日逢連雨蕭蕭穏送秋龍公無乃倦客子不勝愁雲氣昏城壁鐘聲咽寺樓年年授衣節牢落向他州風伯方安卧雲師亦少饕氣連河漢潤聲到竹松高老雁猶貪去寒蟬遂不
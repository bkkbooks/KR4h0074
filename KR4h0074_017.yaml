過水翻迴去燕子銜泥濕不妨飛閣捲簾圖畫裏虚無只少對瀟湘三四必先得之句其體又自不同亦是一法苦雨悶悶對酒偶吟白居易凄凄久雨暗銅駞嫋嫋凉風起漕河自夏及秋晴日少從朝至暮悶時多鷺臨池立窺魚笱隼傍林飛拂雀羅賴有杯中神聖物百憂無奈十分何樂天詩多近人情三四是也秋夕閒居對雨贈别盧七侍御竇牟燕燕辭巢蟬蛻枝窮居積雨壞藩籬夜長簷溜寒無寐日晏廚烟濕未炊悟主一言那可學從軍五首竟徒為故人驄馬朝天去洛下秋聲恐要知五竇連珠集嚴陵郡齋有之劉後村詩話云未見士大夫藏未必皆是也賦得秋雨晏殊㸃滴行雲覆苑牆飄蕭微影度迴塘秦聲未覺朱絃潤楚夢先知薤葉凉野水有波增澹碧霜林無韻濕疎黄螢稀燕寂高窗暮正是西風玉漏長此亦崑體葢當時相尚如此有美堂暴雨蘇軾游人脚底一聲雷滿坐頑雲撥不開天外黑風吹海立浙東飛雨過江來十分瀲灔金樽凸千丈敲鏗羯鼓催喚起謫仙泉灑面倒傾鮫室㵼瓊瑰老杜朝獻太清宫賦九天之雲下垂四海之水皆立本是竒語摘海立二字用之自東坡始此聨壯哉和魏道輔雨中見示王安國移病憛憛久雨中鳴騶時聽六街龍忽吟佳客詩消暑逺勝前人檄愈風海運我殊慚斥鷃陸沉君合伴翔鴻更酬珠玉思談笑裹飯何須厭屢空三四詩話所稱雨意柱礎霑濡雨意成翾翾鳥雀隔簾鳴侵尋爽氣來欹枕想像滄波去濯纓已識古今無得喪直須彼我不將迎囅然一笑呼歸騎聊更飛毫戲友生囅丑展丑忍二切囅然笑貌雨餘雨餘宫闕映秋旻漠漠槐花水上新夜有蝭蟧催節物朝無沆瀣助精神形如槁木聊依世名若浮煙底徇人莫笑長吟銷短景故園囘首隔參辰蝭蟧蟬也下力么切得雨青天赤日水如湯車馬飛塵百尺長望嵗人人憂旱魃舞雩旦旦待商羊清𠂻愛物回天鑒膏澤乘時助嵗穰自有股肱歌盛徳芻蕘誰敢僭揄揚平甫詩多豪健富麗然此三首前二首頗悲感後一首前聨佳尾句未稱次韻張昌言給事喜雨黄庭堅三雨全清六合塵詩翁喜雨句凌雲垤漂戰蟻餘追北柱繫乖龍有裂文減去鮮肥憂主食徧宗河嶽起爐熏聖功恵我豐年食未有涓埃可報君自巴陵畧平江臨湘入通城無日不雨至黄龍謁清禪師繼而晚晴山行十日雨霑衣幕阜峰前對落暉野水自添田水滿晴鳩更喚雨鳩歸靈源大士人天眼雙塔老師諸佛機白髪蒼頭重到此問君還是昔人非元題下云邂逅禪客戴道純歎雨作長句呈道純靈源大士即黄龍清禪師也其師曰晦堂心禪師飛心禪師藏骨之所曰雙塔皆山谷平生禪友也梅聖俞詩云高田水入低田流此云野水自添田水滿尤妙或問劉夢得一詩用兩高字東坡一詩用兩耳字皆以義不同今此乃用兩雨字何也老杜江閣邀賔許馬迎又云醉於馬上往來輕此亦有例張文潛詩多重叠用字朱文公語録道破亦不以為病然後學却合㸃檢必老成而後用此例可也次韻何子温祈晴陳師道九龍當闗信不傳燒香纔上已回天驅除霧雨還朝日畜縮濤波復二川奪日光華開秀句堆塲藁秸騐豐年從今更上中和頌少費將軍九萬牋何琬字子温處州人蘇黄深交何丞相執中何澹叅政皆其後也王右軍為㑹稽内史謝公乞箋紙庫中九萬悉與之憫雨唐庚老楚能令畏壘豐此身翻累越人窮至今無奈曾孫稼幾度虚占少女風兹事㑹須星有好他時曽厭雨其濛山中賴是萊糧足不向諸侯託寓公莊子庚桑楚第二十三老耼之後有庚桑楚者北居畏壘之山居三年畏壘大壌註本又作穰廣雅云豐也子西時謫恵州謂庚桑楚居畏壘之山能令豐穰恵州人以我之故而至于不雨以窮耶善用事曾孫稼少女風星有好雨其濛又用四事如此加以斡旋為句而委曲妥帖不止工而已也尾句尤高妙畏音猥壘音磊夜雨陳與義經嵗柴門百事乖此身真合卧蒼苔蟬聲未足秋風起木葉俱鳴夜雨來碁局可觀浮世理燈花應為好詩開獨無宋玉悲秋念但喜新凉入酒杯雨晴天缺西南江面清纎雲不動小灘横牆頭語鵲衣猶濕樓外殘雷氣未平盡取微凉供穏睡急搜竒句報新晴今宵絶勝無人共卧看星河盡意明雨中對酒庭下海棠經雨不謝巴陵二月客添衣草草杯觴恨醉遲燕子不禁連夜雨海棠猶待老夫詩天翻地覆傷春色齒豁頭童祝聖時白竹籬前湖水濶茫茫身世兩堪悲立春雨衡山縣下春日雨逺映青山絲様斜容易江邊欺客袂分明沙際濕年華竹林路隔生新水古渡船空集亂鴉未暇獨憂巾一角西溪當有續開花觀雨山客龍鍾不解耕開軒危坐看隂晴前江後嶺通雲氣萬壑千林送雨聲梅壓竹枝低復舉風吹山角晦還明不嫌屋漏無乾處正要羣龍洗甲兵觀江漲漲江臨眺足銷憂倚杖江邊地欲浮叠浪併翻孤日去兩津横捲半天流黿鼉雜怒爭新穴鷗鷺驚飛失故洲可為一官妨快意眼中唯覺欠扁舟江非雨不漲故附於此雨後至城外吕本中日日思歸未就歸只今行露已沾衣江邨過雨蓬麻亂野水連天鸛鶴飛塵務却嫌經意少故人新更得書稀鹿門縱隠猶多事苦向人前説是非苦雨雨添東澗連西澗雲斷前山起後山野水到門人去盡昏煙迷樹鳥飛還江天日月渾無色客路風埃只強顔舞石至今隨燕乳裁詩不復哭龍慳栁州開元寺夏雨風雨翛翛似晚秋鴉歸門掩伴僧幽雲深不見千巖秀水漲初聞萬壑流鐘喚夢回空悵望人傳書至竟沉浮面如田字非吾相莫羡班超封列侯萬壑流刋本誤作留予為改定人傳書至竟沉浮句絶佳末句乃是避地嶺外聞將相驟貴者亦老杜秦蜀湖湘之意也居仁在江西派中最為流動而不滯者故其詩多活乙卯嵗江南大旱七月六日臨川得雨奉呈仲高侍御曽幾縹緲爐煙上帝閽朝來一洗旱如焚壠頭無復成龜兆水面初看起縠紋政使夏畦炊白玉未妨秋稼刈黄雲使君憫雨心猶在化得邦人不茹葷元註時屢禁屠宰乙卯紹興五年也茶山五十二嵗甲子生自七月二十五日大雨三日秋苗以蘇喜雨有作一夕驕陽轉作霖夢回凉冷潤衣襟不愁屋漏牀牀濕且喜溪流岸岸深千里稻花應秀色五更桐葉最知音無田似我猶欣舞何况田家望嵗心三四已佳五六又下得應字最字有精神次韻徳翁苦雨尤袤十年江國水如淫怕見三秋雨作霖可念田家妨卒嵗須煩風伯蕩層隂禾頭昨夜憂生耳木徳何時却守心兀坐書窗詩作祟寒蟲嗚咽伴愁吟如一作為苦雨誰不能和禾頭生耳本是俗語忽用木徳守心為對則竒之又竒前無古人矣天文録曰嵗星留心天下大豐穀賤天文總論曰嵗星經心帝必延年陶隠居曰嵗星守心天下吉善甘徳曰嵗星守心天下大豐孝經援神契曰嵗星守心年穀豐傳曰心三星天王之正位中星為明堂天子位前星為太子後星為庶子嵗星者東方星属春木於五常為仁主福主大司農司主五穀所在之宿主其國壽昌富樂心為天子之位而木徳守之天下之福不止嵗豐而已尤遂初押韻用事神妙如此敬歎敬歎臨安春雨初霽陸游世味年來薄似紗誰令騎馬客京華小樓一夜聽春雨深巷明朝賣杏花矮紙斜行閒作草晴窗細乳戱分茶素衣莫一作又起風塵歎猶及清明可到家據劍南集編在嚴州朝辭時所作翁年六十二嵗劉後村詩話乃謂妙年行都所賦思陵賞音恐誤當攷秋雨剡曲高秋一草亭雨來廹我醉初醒豪吞平野宜閒望亟打虚窗入靜聽沙上濕雲號斷雁籬根衰草綴孤螢老人嬾復親燈火卧看爐香掩素屏秋雨北榭作秋風吹雨到江濆小閣疎簾晚色分津吏報増三尺水山僧歸入萬重雲飄零露井無桐葉斷續烟汀有雁羣了却文書早尋睡簷聲偏愛枕間聞此嚴陵郡圃也三四極工而活春雨倚欄正爾愛斜陽細雨霏霏度野塘本為栁枝留淺色却教梅蕊洗幽香小沾蝶粉初何惜暫濕鶯身亦未妨造化無心能徧物憑誰閒與問東皇於梅栁蝶鶯四物形容雨意亦細潤雨家近蓬萊白玉京草堂登望不勝清初驚野色昏昏至已見波紋細細生殘醉頓消迎亂㸃微吟漸一作苦覺入寒聲只愁今夕虚簷滴又對青燈夢不成工而潤亦如小雨云久雨梅天一日幾隂晴對酒無聊醉不成巧厯莫能知雨㸃孤桐那解寫溪聲林深鳥雀來無數草茂鋤耰去即生明日雲開天萬里御風吾欲到青城三四竒崛小雨初霽歸來偶似老淵明消渴誰憐病長卿小雨染成芳草色好風吹斷畫簷聲剪燈院落晨猶冷賣酒樓臺晚放晴莫道此翁遊興嬾蘭亭蕭寺已闗情雨中聞伯恭至湖上韓無咎莫嫌鞭馬踏春泥茶鼎詩囊偶共擕山色雨深看更好湖光煙接望還迷連天花絮飛將盡夾道蒲荷長欲齊官事得閒須洗眼蓬壺只在帝城西韓南澗名無咎字元吉伯恭即吕成公其壻也記建安大水孤城雨脚暮雲平不覺魚龍自滿庭託命已甘同木偶置身端亦似羸瓶浮家却羡鴟夷子弄月常憂太白星當日乘槎便仙去故人應在曲江靈元註紹興甲子寓建安夏大水舉家蕩覆騎危僅脱作此自唁癸巳將命過高郵遇杜受言猶子鏗録以見示受言時提舉茶事募人拯予者也詩中四句用事俱勝晚晴趙蕃殘風落日蟬亂鳴細履小園欣晚晴投林倦鳥分暝色滿地落葉無秋聲衛尉一錢曽不直阮郎幾屐畢平生三十六中第一䇿脱却世故甘傭耕聱牙細潤吳體也讀至尾句乃與山谷逼真此章泉學詩妙言也二月十日喜雨呈李純教授去非尉曹滄浪一夜起鳴雷雨陣因之續續來所病農家成久旱未論花事有新開書生狂妄常憂國聖代飄零豈棄才儒館尉曹俱國士好為詩賦詠康哉三四竒瘦五六古典此公詩惟有骨全無肉雨後呈斯逺已是霜凝更雨濕春其漸起但無痕莫嗟草色欲垂死定有梅花當返魂小駐要須窮日日細尋不惜遍邨邨揩摩病眼從兹始併待君詩洗睡昏章泉愛用虚字拗斡不專以為眼也如春其漸起但無痕所用其字是矣此句甚妙草色垂死梅花返魂小民之幸君子之福深可雋味日日邨邨一聨亦不茍勁瘦枯淡瀛奎律髓巻十七

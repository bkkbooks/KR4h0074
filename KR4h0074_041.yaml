body:
  text: 瀛奎律髓卷四十一元方回編子息類五言六首卜歲日喜談氏外孫女孩滿月白居易今旦夫妻喜他人豈得知自嗟生女晚敢訝見孫遲物以稀為貴情因老更慈新年逢吉日滿月乞名時桂燎熏花果蘭湯洗玉肌懷中有可抱何用是男兒阿雀兒詩謝病卧東都羸然一老夫孤單同伯道遲暮過商瞿豈料鬢成雪方看掌上珠已衰寧望有雖睨亦勝無蘭入前春夢桑懸昨日弧里閭多慶賀親戚共歡娛膩剃新胎髮香綳小繡襦玉芽開手爪酥顆點肌膚乳氣初離殼啼聲漸變雛何時能反哺供養白頭鳥元白皆苦無子樂天晚得此子後亦夭也詩人窮相形容無所不至晚乃所以妨此子歟詠孩子嚴維嘉客會初筵宜時魄再圓衆皆含笑戲誰不點頤憐繡被花堪摘羅綳色欲妍將雛有舊曲還入武城絃楊本勝説於長安見小兒阿衮李啇隱聞君來日下見我最嬌兒漸大啼應數長貧學恐遲寄人龍種瘦失母鳯雛癡語罷休邊角青燈兩鬢絲小孫納婦薑特立慶事集朋親孫枝喜氣新歌雲停碧落舞雪眩青春暖日花君子清樽酒聖人一春行樂地不負牡丹辰此翁樂哉為人祖而見孫納婦貧亦樂也况富貴乎哭開孫陸遊學步漸扶床乘車已駕羊虛稱砌臺史不遇玉函方杳杳天難問茫茫夜正長寂寥誰伴汝蕭寺閉空房七言六首豫與微之老而無子發於言歎著在詩篇今年冬各有一子戲作二什一以相賀一以自嘲白居易常憂到老都無子何况新生又是兒隂德自然宜有慶皇天可得道無知一園水竹今為主百卷文章更付誰莫慮鵷雛無浴處即應重入鳯凰池五十八翁方有後靜思堪喜亦堪嗟一珠甚小還慚蚌八子雖多不羡鴉秋月晚生丹桂實春風初長紫蘭芽持杯願祝無他語慎勿頑愚似汝爺樂天生於大厯七年壬子此年太和三年己酉年五十八歲微之小樂天七歲是年五十一哭雀兒掌珠一顆兒三歲鬢雪千莖父六旬豈料汝先為異物常憂吾不見成人悲腸自斷非因劍啼眼加昏不是塵懷抱又空添默默依然重作鄧攸身六十無子不容不悲人情也戲題贈二小男劉長卿異鄉流落頻生子幾許悲歡併在身欲識老容羞白髮每看兒戲憶青春未知門户堪誰主且免琴書與别人何幸暮年方有後舉家相對却沾巾第四句已佳五六句全似樂天相使君第七男生日娶妻生子復生男獨有君家衆所談荀氏八龍唯欠一桓生四鳯已過三他時幹蠱聲名著今日懸弧宴樂酣誰道衆賢能繼體須知箇箇出於藍賦第七男用事造語巧綴然昌黎五男兒亦如此形狀不可棄也寄二子陸遊大兒新作鶴林遊仲子經年戍吉州日日望書常至暮時時入夢却添愁得官本自輕齊虜對景寧當似楚囚識取乃翁行履處一生任運笑人謀瀛奎律髓卷四十一

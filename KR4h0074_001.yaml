body:
  text: 瀛奎律髓卷一元方回編登覽類登髙能賦則為大夫於傳識之名山大川絶景極目能言者衆矣拔其尤者以充雋永且以為諸詩之冠五言二十首度荆門望楚陳子昂遙遙去巫峽望望下章臺巴國山川盡荆門煙霧開城分蒼野外樹斷白雲隈今日狂歌客誰知入楚來陳拾遺子昂唐之詩祖也不但感遇詩三十八首為古體之祖其律詩亦近體之祖也白帝峴山二首極佳已入懷古類今揭此一詩為諸選之冠陳子昂杜審言宋之問沈佺期俱同時而皆精於律詩孟浩然李白王維賈至髙適岑參與杜甫同時而律詩不出則已出則亦足與杜甫相上下唐詩一時之盛有如此十一人偉哉登襄陽城杜審言旅客三秋至層城一作樓四望開楚山橫地出漢水接天回冠蓋非新里章華即舊臺習池風景異歸路滿塵埃此杜子美乃祖詩也楚山漢水一聫子美家法中四句似皆言景然後聫寓感慨不但張大形勢舉里臺二名而錯以新舊二字無刻削痕末句又傷時俗不古無習池山公之事尤有味也晚唐家多不肯如此作必搜索細碎以求新然審言詩有工密處如淑景催黃鳥晴光轉緑萍風光新栁報宴賞落花催下釣看魚躍探巢畏鳥飛葉疏荷已晚枝亞果新肥鹿麛銜妓席鶴子曳童衣園果嘗難遍池蓮摘未稀日氣含殘雨雲隂送晚雷皆有味壯語如雨雪關山暗風霜草木稀據鞍雄劔動插檄羽書飛不宰神功運無為大化懸八荒平物土四海接人煙文物驅三統聲名走百神禹食傳中使堯樽遍下人則晚唐所無此等句若置之子美集無大相逺也欲述杜詩源流故詳及之臨洞庭湖一作嶽陽樓孟浩然八月湖水平含虛混太清氣蒸雲夢澤波撼嶽陽城欲濟無舟楫端居恥聖眀坐看垂釣者徒有羡魚情豫登嶽陽樓此詩大書左序毬門壁間右書杜詩後人自不敢復題也劉長卿有句云疊浪浮元氣中流沒太陽世不甚傳他可知也登嶽陽樓杜甫昔聞洞庭水今上嶽陽樓吳楚東南坼乾坤日夜浮親朋無一字老病有孤舟戎馬關山北憑軒涕泗流嶽陽樓天下壯觀孟杜二詩盡之矣中兩聫前言景後言情乃詩之一體也登兖州城樓東郡趨庭日南樓縱目初浮雲連海岱平野入青徐孤嶂秦碑在荒城魯殿餘從來多古意臨眺獨躊躇此詩中兩聫似皆言景然後聫感慨言秦魯俱亡以古意二字結之即東坡用蘭亭意也登牛頭山亭子路出雙林上亭窺萬井中江城孤照日山一作春谷逺含風兵革身將老關河信不通猶殘數行淚忍對百花叢牛頭山在梓州郪縣西南二里髙一里寶應元年壬寅秋廣德元年癸卯春公並在梓州依李刺史有上牛頭山望牛頭寺詩寰宇記謂樓閣煙花為一方之冠路出雙林上言亭在樹之頂亭窺萬井中則可見城市皆環之也癸卯春作公年五十二嵗秋登宣城謝眺北樓李白江城如畫裏山色望晴空兩水夾明鏡雙橋落彩虹人煙寒橘柚秋色老梧桐誰念北樓上臨風憶謝公太白亦有登嶽陽八句未及孟杜此詩起句似晚唐中二聫言景而豪壯則晚唐所無也宣州有雙溪疊嶂乃此州勝景也所以云兩水惟有兩水所以有雙橋王荆公虎圗行目光夾鏡當座隅虎兩目如夾兩鏡得非倣謫仙兩水夾明鏡之意乎此聫妙絶起句所謂江城如畫裏者即指此三四一聫之景與五六皆是也謝眺為宣城賢太守人呼為謝宣城得太白表章之其名踰千古不朽焉漢江臨眺王維楚塞三江接荆門九派通江流天地外山色有無中郡邑浮前浦波瀾動逺空襄陽好風日留醉與山公江一作湘右丞此詩中兩聫皆言景而前聫尤壯足敵孟杜嶽陽之作登蒲澗寺後二巖李羣玉五仙騎五羊何代降兹鄉澗有堯時韭山餘禹日糧樓臺籠海色草樹發天香浩笑煙波裏浮溟興甚長寺在廣州堯時韭禹日糧之對工矣詩忌太工工而無味如近人四六及小學答對則不可兼必拘此式又為崑體善為詩者備衆體亦不可無此也如老杜能變化為善之善者五六一聫亦精神勝果寺僧處默路自中峰上盤回出薜蘿到江吳地盡隔岸越山多古木藂青靄遙天浸白波下方城郭近鐘磬雜笙歌寺在錢塘故有吳地越山之聫或以田莊牙人譏之似不害寫物之妙后山縮為一句吳越到江分髙矣譬之共君一夜話勝讀十年書山谷縮為一句曰話勝十年書是也因書諸此以見詩法之無窮金山寺張祜一宿金山寺微茫水國分僧歸夜船月龍出曉堂雲樹影中流見鐘聲兩岸聞因悲在城市終日醉醺醺此詩金山絶唱孫魴者努力繼之有云天多剩得月地少不生塵過櫓妨僧定歸濤濺佛身誰言張處士詩後更無人其言矜誇自大然濺佛之句或者則謂金山豈如此其低耶大厯十才子以前詩格壯麗悲感元和以後漸尚細潤愈出愈新而至晚唐以老杜為祖而又參此細潤者時出用之則詩之法盡矣金山寺梅堯臣吳客獨來後楚橈歸夕曛山形無地接寺界與波分巢鶻寧窺物馴鷗自作羣老僧忘嵗月石上看江雲三四絶妙尾句自然有味誰言張處士詩後更無人然則有梅聖俞可也登鵲山陳師道小試登山腳今年不用扶微微交濟濼歷歷數青徐朴俗猶虞力安流尚禹謨終年聊一快吾病失醫盧元注山因扁鵲而名豫按此詩后山年四十八為棣州教授時所作明年下世詩暗合老杜今注本無之細味句律謂后山學山谷其實學老杜與之俱化也故書此以示學者登快哉亭城與清江曲泉流亂石間夕陽初隱地暮靄已依山度鳥欲何向奔雲亦自間登臨興不盡稚子故須還亭在徐州城東南隅提刑廢廨熙寧末李邦直持憲節搆亭城隅之上郡守蘇子瞻名曰快哉唐人薛能陽春亭故址也子由時在彭城亦同邦直賦詩任淵注此詩謂亭在黃州不知此詩屬何處蓋川人不見中原圗志豫讀賀鑄集得其説任淵所謂亭在黃州者乃東坡為清河張夢得命名子由作記非徐州之快哉亭也豫選此詩懼學者讀處默張祜詩知工巧而不知超悟如度鳥奔雲之句有無窮之味全篇徑健清瘦尾句尤幽邃此其所以逼老杜也甘露寺元注寺中有石如卧羊謂之狠石朝端友北固山頭寺風煙昔縱觀卧亭秋石狠環舍海濤寒越舶樓前聚江楓户外丹最宜清夜月虛閣憶盤桓寺在京口多景樓在寺中天下絶景也朝君成名端友無咎之父第進士仕至新城令東坡為其詩集引豫取此篇者以人或尚晚唐詩則盛唐且不取亦不取宋殊不知宋詩有數體有九僧體即晚唐體也有香山體者學白樂天有西崑體者祖李義山如蘇子美梅聖俞並出歐公之門蘇近老杜梅過王維而歐公直擬昌黎東坡暗合太白惟山谷法老杜后山棄其舊而學焉遂名黃陳號江西派非自為一家也老杜實初祖也如君成詩當黃陳未出之前自為元和間唐詩不可不拈出使世人知之也登定王臺有廟朱熹寂寞番君後光華帝子來千年遺一作餘故國萬事只空臺日月東西見湖山表裏開從知爽鳩樂莫作雍門哀朱文公詩迫近后山此詩尾句雖后山亦只如此乾道二年丁亥文公訪南軒於長沙所賦用事命意定格下字悉如律令雜老杜后山集中可也爽鳩出左傳昭公二十年渡江陳與義江南非不好楚客自生哀搖楫天平渡迎人樹欲來雨餘吳岫立日照海門開雖異中原險方隅亦壯哉此謂渡浙江也簡齋紹興初避地廣南赴召由閩入越行在時寓會稽過錢塘簡齋洛陽人詩逼老杜於渡浙江所題如此可謂亦壯矣哉登越臺宋之問江上越王臺升髙望幾回南溟天外合北户日邊開地濕煙常起山晴雨半來冬花掃盧橘夏果摘楊梅迹類虞翻枉人非賈誼才歸心不可度白髮重相催宋之問唐律詩之祖詩未嘗不佳論其為人則初附張易之事敗謫隴州參軍逃歸洛陽告王同皎事附武三思天下醜之為鴻臚簿考功郎又附太平安樂中宗時貶越州長史亦大藩郡也此詩怨望謂如虞翻可乎尋流欽州賜死詩則未嘗不佳字字細密陪章留後侍御宴南樓得風字杜甫絶域長夏晚兹樓清宴同朝廷燒棧北鼓角漏天東屢食將軍第仍騎御史驄本無丹竈術那免白頭翁寇盜狂歌外形骸痛飲中野雲低渡水簷雨細隨風出號江城黑題詩蠟炬紅此身醒復醉不擬哭途窮老杜登覽詩最多此演至八韻者整齊工密而開闔抑揚他如此者尚衆當自於集中求之登多景樓朝端友樓上無窮景樓前正落暉開軒跨寥廓覽物極纎微雲破孤峰出潮平兩槳飛東溟看月上西渡認僧歸木落吳天逺江寒越舶稀魚龍鄰海窟雞犬隔淮圻草色迷千古波聲蕩四圍廢興懷霸業融結想天機浩浩羣流會沉沉百怪依登臨真偉觀回首重歔欷此詩無一字一句不工孰謂宋詩非唐詩乎五言律八句內一聫而工可名世矣此乃頓有數聫曲盡多景之妙南渡後詩牌充塞如劉改之之長律阮秀實之大篇皆徒虛喝耳夫以天下之形勝無窮而所選五言止此二十首猶時文之有格不在多也七言二十首登黃鶴樓崔皓昔人已乘白雲去此地空餘黃鶴樓黃鶴一去不復返白雲千載空悠悠晴川歷歷漢陽樹芳草萋萋鸚鵡洲日暮鄉關何處是煙波江上使人愁此詩前四句不拘對偶氣勢雄大李白讀之不敢再題此樓乃去而賦金陵鳳凰臺也登金陵鳳凰臺李白鳳凰臺上鳳凰遊鳳去臺空江自流吳宮一作時花草埋幽徑晉代一作國衣冠成古邱三山半落青天外二水中分白鷺洲總為浮雲能蔽日長安不見使人愁太白此詩與崔皓黃鶴樓相似格律氣勢未易甲乙此詩以鳳凰臺為名而詠鳳凰臺不過起語兩句已盡之矣下六句乃登臺而觀望之景也三四懷古人之不見也五六七八詠今日之景而慨帝都之不可見也登臺而望所感深矣金陵建都自吳始三山二水白鷺洲皆金陵山水名金陵可以北望中原唐都長安故太白以浮雲遮蔽不見長安為愁焉鸚鵡洲鸚鵡東過吳江水江上洲傳鸚鵡名鸚鵡西飛隴山去芳洲之樹何青青煙開蘭葉香風暖岸夾桃花錦浪生遷客此時徒極目長洲孤月向誰明鸚鵡洲在今鄂州城南對南樓黃鶴樓在城西向漢陽太白此詩乃是效崔皓體皆於五六加工尾句寓感歎是時律詩猶未甚拘偶也登樓杜甫花近髙樓傷客心萬方多難此登臨錦江春色來天地玉壘浮雲變古今北極朝廷終不改西山寇盜莫相侵可憐後主還祠廟日暮聊為梁甫吟老杜七言律詩一百五十九首當寫以常玩不可暫廢今於登覽中選此為式錦江玉壘一聫景中寓情後聫却明説破道理如此豈徒模寫江山而已哉閣夜歲暮隂陽催短景天涯霜雪霽寒宵五更鼓角聲悲壯三峽星河影動搖野哭千家聞戰伐夷歌幾處起漁樵卧龍躍馬終黃土人事音書漫寂寥此老杜夔州詩所謂閣夜蓋西閣也悲壯動搖一聫詩勢如之卧龍躍馬俱黃土謂諸葛公孫賢愚共盡孔丘盜跖俱塵埃玉環飛燕皆塵土一意感慨豪蕩他人所無登大茅山頂王安石一峯髙出衆山巔疑隔塵沙道里千俯視雲煙來不極仰攀蘿蔦去無前人間已換嘉平帝地下誰通句曲天陳迹是非今草莽紛紛流俗尚師仙建康句容縣茅山初名句曲山像形也漢時三茅君來居曰茅盈茅固茅衷俱得道先是秦始皇三十一年更名臘曰嘉平嘗自會稽登此山史注引太原真人茅盈內紀謂盈曽祖父蒙於始皇三十一年於華山乘雲駕龍白日升天其邑謡曰神仙得者茅初成繼世而往在我盈帝若學之臘嘉平故始皇改是名介甫此詩不信神仙之説故有後四句人間已換嘉平帝言始皇終於長往也地下誰通句曲天謂此句曲山之冗名曰華陽洞天誰能入乎本是次韻其弟平甫三詩平甫詩曰王校理集李雁湖殆未見也登中茅山翛然杖屨出塵囂雞犬無聲到泬寥欲見五芝莖葉老尚攀三鶴羽翰遙容溪路轉迷橫彴仙几風來得墮樵興罷日斜歸亦懶更磨蒼蘚認前朝五芝見茅君傳食四節隱芝者為真卿如此五種金闕帝君謂茅君盡食之矣此道家妄誕不足信三鶴謂三茅君得道各乘白鶴據一山頭也容溪在茅山仙几亦山名在句容縣此詩律精語妙登小茅山捫蘿路到半天窮下視淮洲杳靄中物外真遊來几席人間榮願付苓通白雲生處龍池杳明月歸時鶴馭空回首三君誰更似子房家世有髙風馬矢為通豬矢為苓山以髙而羣仙易於接近故云物外真遊來几席身登絶境視世之榮利如糞土故云人間榮願付苓通此一韻自公作古前此未有人用三詩皆絶妙平山堂城北橫岡走翠虬一堂髙視兩三州淮岑日對朱欄出江岫雲齊碧瓦浮墟落耕桑公愷悌杯觴談笑客風流不知峴首登臨處誰覩當時有此不慶厯八年二月歐陽公以起居舍人知制誥守揚州作是堂於蜀岡之大明寺江南諸山拱列簷下故名曰平山堂淮岑江岫皆言山也日出對朱欄雲浮齊碧瓦則所謂平山而堂字又在其中也其精如此他人泥於題則巧而反拙半山斂髙才於小篇包藏萬象至矣五六亦間雅末句不諛而善頌次韻平甫金山會宿寄親友天末海雲橫北固煙中沙岸似西興巳無船舫猶聞笛逺有樓臺祗見燈山月入松金破碎江風吹水雪崩騰飄然欲作乘桴計一到扶桑恨未能介甫有金山寺五言律詩未為極致此和其弟平甫者遁齋間覽謂金山寺佳句絶少張祜樹影中流見鐘聲兩岸聞孫魴天多剩得月地少不生塵亦未為工熙寧中荆公有北固西興之句始為中的豫謂孫魴詩過櫓妨僧定歸濤濺佛身下一句金山何其卑也前輩巳能議之今不以入選張祜詩無可議矣荆公此詩恐亦未能壓倒張處士也金山同正之吉甫會宿作寄城中二三子王安國寺壓蒼崖勢欲傾歡然西度為誰興雲隨草樹縈羣岫江浸樓臺點萬燈坐久不知身寂寞夢回猶覺氣軒騰思君城郭塵埃滿相逐尋間亦未能此詩只第四句佳看來被乃兄壓倒也平甫自和有云檻外風吹前渡語江邊影落萬山燈半空月上方清徹萬里潮來自沸騰又較親切乃皇祐中少作荆公時未達前謂熙寧亦非也陪潤州裴如晦學士遊金山回作楊蟠試上蓬萊第幾洲長雲漠漠鳥飛愁海山亂點當軒出江水中分繞檻流天逺樓臺橫北固夜深燈火見揚州回船却望金陵月獨倚牙旗坐浪頭前輩詩話或譏此五六為莊宅牙人語若如此論介甫亦犯此戒其實自是佳句公濟燈火見揚州介甫沙岸似西興孰勝細味公濟尤勝尤切題非外來也甘露上方滄江萬景對朱欄白鳥羣飛去復還雲捧樓臺出天上風飄鐘磬落人間銀河倒瀉分雙一作明月錦水西來轉幾山今古冥冥難借問且持玉爵破愁顏歐陽公有云卧讀楊蟠一千首乞渠秋月與春風公濟詩葩藻流麗與王平甫相似雲捧樓臺出天上佳句也下句亦稱遊廬山宿棲賢寺王安國古屋蕭蕭卧不周敝裘起坐興綢繆千山月午乾坤晝一壑泉鳴風雨秋迹入塵中慚有纍心期物外欲何求眀朝松路須惆悵忍更無詩向此留王安國平甫年四十七而卒其詩陳后山亟稱之當時諸公歐蘇莫不敬歎欽奬或謂其得於天才不學而能然其人胸次耿介非其兄荆公新法之所為詆呂惠卿為佞人天下尤髙之也南渡後其曽孫曄始刋王校理集於臨安郡學詩佳者不可勝算而富於風月此詩三四壯浪而清灑登覽詩極難得絶髙者取此參入其間亦快人心目也登快閣黃庭堅癡兒了却公家事快閣東西倚晚晴落木千山天逺大澄江一道月分眀朱絃已為佳人絶青眼聊因美酒橫萬里歸船弄長笛此心吾與白鷗盟此詩見山谷外集為太和宰時作呂居仁謂山谷妙年時已氣骨成就是也山谷生於慶厯五年乙酉至元豐四年辛酉作邑三十七矣和寇十一晚登白門一本云庚辰三月晚登白門間望陳師道重門傑觀屹相望表裏山河自一方小市張燈歸意動輕衫當户晚風長孤臣白首逢新政遊子青春見故鄉富貴本非吾輩事江湖安得便相忘白門在徐州亦曰白下地近狹邪冦國寶后山鄉人屢引白下事戲之小市輕衫之句亦所以寓戲也元符庚辰三月以徽廟登極湔滌南遷諸人故有云白首逢新政尾句又謂吾輩如蘇黃本非有意富貴但不能恝然忘情俾脫遷謫而北還亦私誼之所許也詞意深婉豈徒詩而巳哉如許渾登凌歊臺湘潭雲淨莫山出巴蜀雪消春水來不過砌疊形模而晚唐家以為句法今不敢取蓋老杜自有此等句但不如是之太偶而不活耳登嶽陽樓陳與義洞庭之東江水西簾旌不動夕陽遲登臨吳蜀橫分地徙倚湖山欲暮時萬里來遊還望逺三年多難更憑危白頭弔古風霜裏老木滄波無限悲簡齋登嶽陽樓凡三詩又有巴丘書事一詩皆悲壯激烈如晚木聲酣洞庭野晴天影抱嶽陽樓四年風露侵遊子十月江湖吐亂洲又如乾坤萬事集雙鬢臣子一謫今五年近逼山谷逺詣老杜今全取此首乃建炎中避地時詩也白樂天有此樓詩云春岸緑時連夢澤夕波紅處近長安下一句好上一句涉粧點與大光同登封州小閣去程欲數莽難知三日封州更作遲青嶂足稽天下士錦囊今有嶠南詩共登小閣春風裏回望中原夕靄時萬本梅花為我夀一杯相屬未全癡老杜詩為唐詩之冠黃陳詩為宋詩之冠黃陳學老杜者也嗣黃陳而恢張悲壯者陳簡齋也流動圎活者吕居仁也清徑潔雅者曽茶山也七言律他人皆不敢望此六公矣若五言律詩則唐人之工者無數宋人當以梅聖俞為第一平淡而豐腴捨是則又有陳后山耳此余選詩之條例所謂正法眼藏也鄂州南范成大誰將玉笛弄中秋黃鶴飛來識舊遊漢樹有情橫北渚蜀江無語抱南樓燭天燈火三更市搖月旌旗萬里舟却要鱸鄉垂釣叟武昌魚好便淹留石湖名成大字至能嘗使燕帥西廣成都四明金陵參大政乾淳間詩巨擘稱尤楊范陸謂遂初誠齋放翁及公也此出蜀時詩燭天燈火三更市承平時鄂渚之盛如此過揚子江楊萬里祗有清霜凍太空更無半點荻花風天開雲霧東南碧日射波濤上下紅千古英雄鴻去外六朝形勝雪晴中攜瓶自汲江心水要試煎茶第一功楊誠齋詩一官一集每一集必一變此朝天續集詩也其子長孺舉似於范石湖尤梁溪二公以為誠齋詩又變而誠齋謂不自知詩不變不進此本二詩今選其一中兩聨俱爽快且詩格尤髙瀛奎律髓卷一

body:
  text: 瀛奎律髓卷三十元方回編邊塞類征戰守戍大而將帥小而卒伍其情不同采薇以遣之杕杜以勞之此周之詩然也後世之邊塞非古矣從軍有樂問所從誰六月于邁言觀其師文人才士類能言之凡兵馬射獵等亦附此五言五十一首和陸明甫贈將軍重出塞陳子昂忽聞天上將關塞重橫行始返樓蘭國還向朔方城黃金裝戰馬白羽集神兵星月開天陳山川列地營曉風吹畫角春色耀飛旌寧知班定逺猶是一書生盛唐詩渾成曉風吹畫角猶池塘生春草自然詩句亦是别用一意塞北沈佺期胡馬犯邊埃風從丑上來五原烽火急六郡羽書催冰壯飛狐冷霜濃候雁哀將軍朝受鉞戰士夜銜枚紫塞金河裏葱山鐵勒隈蓮花秋劍發桂葉曉旗開祕略三軍動妖氛百戰摧何言投華去終作勒銘回八韻十六句無一句一字不工唐律詩之祖也時稱沈宋而佺期之問皆不令終無美善而有艷才議者惜之陳子昂杜審言詩亦絶出一時於四人之中而論其為人則陳杜之詩尤可敬云在軍中贈先還知己駱賓王蓬轉俱行役瓜時獨未還魂迷金闕路望斷玉門關獻凱多慚霍論風幾謝班風塵催白首嵗月損紅顔落雁低秋塞驚鳬起暝灣胡霜如劍鍔漢月似刀環别後庭邊樹相思幾度攀王楊盧駱老杜所不敢忽謂輕薄為文者哂之未休然輕薄之人身名俱滅王楊盧駱如江河萬古所不可廢也斯言厥有㫖哉賓王史不書字武后見其檄始咎宰相失人詩多佳句近似庾信時有平仄字不協此篇乃字字入律工不可言長城聞笛楊巨源孤城笛滿林斷續共霜砧夜月降羌淚秋風老將心靜過寒壘遍暗入故關深惆悵梅花落山川不可尋老將吟竇鞏烽煙猶未盡年鬢暗相催輕敵心空在彎弓手不開馬依秋草病栁傍故營摧唯有酬恩客時聽說劍來讀此詩即知臂弱尚嫌弓力軟本出於此鞏字友封與元微之尤厚夜行故戰場竇庠山斷塞初平人言古戰庭泉冰聲更咽隂火焰偏青月落雲沙黑風回草木腥不知秦與漢徒欲吊英靈此四竇也字胃卿三四佳而第四句新甚與老杜之隂房鬼火青暗合送翁靈舒遊邊徐照孤劍色磨青深謀祕鬼靈離山春值雪憂國夜觀星奏凱邊人悅翻營戰地腥期君歸幕下何石可書名第四句新甚塞外書事許棠征路出窮邊孤吟傍戍煙河光深蕩塞磧色逈連天殘日沈鵰外驚蓬到馬前空懷釣魚所未定卜歸年入塞曲耿湋將軍帶十圍重錦製戎衣猿臂銷弓力虬鬚長劍威首登平樂宴新破大宛歸樓上姝姬笑門前問客稀暮峰𤣥兔急秋草紫騮肥未奉君王詔髙槐晝掩扉將帥富貴如此然千百人無一人也送李騎曹之武寧顧非熊一嵗一歸寧凉天數騎行河來當塞曲山逺與沙平縱獵斾風卷聽笳帳月生新鴻引寒色回日滿京城三四哀壯涇州觀元戎出師戎昱寒日征西將蕭蕭萬馬叢吹笳覆樓雪祀纛滿旗風遮虜黃雲斷燒羌白草空金鐃肅天外玉帳靜霜中朔野長城閉河源舊路通衛青師自老魏絳賞何功槍壘依沙逈轅門壓塞雄燕然如可勒萬里願從公和蕃漢家青史上計拙是和親社稷依明主安危託婦人豈能將玉貌便擬靜邊塵地下千年骨誰為輔佐臣輪臺即事岑參輪臺風物異地是古單于三月無青草千家盡白榆蕃書文字别胡俗語音殊愁見流沙北天西海一隅唐人雖奄有輪臺然詩人終只以為蕃書胡語也其可久有之哉過酒泉憶杜陵别業昨夜宿祁連今朝過酒泉黃沙西際海白草北連天愁裏難消日歸期尚隔年陽關萬里夢知處杜陵田三四壯五六麗奉陪封大夫宴時封公兼鴻臚卿西邊胡盡平何處更專征幕下人無事軍中政已成坐參殊俗語樂雜異方聲醉裏樓臺月偏能照列卿三四自然末句用月卿事題金城臨河驛樓古戍依重險髙樓見五凉山根盤驛道河水浸城牆庭樹巢鸚鵡園花隱麝香忽如江浦上憶作捕魚郎老杜亦有鸚鵡麝香之聨當時人詩體亦相似宿鐵關西館馬汗踏成泥朝馳幾萬蹄雪中行地角火處宿天倪塞逈心常怯鄉遙夢亦迷那知故園月也到鐡關西五六勝三四以有議論而自然末句爽逸已甚首秋輪臺異域隂山外孤城雪海邊秋來惟有雁夏盡不聞蟬雨拂氊牆濕風搖毳幕羶輪臺萬里地無事歷三年唐之盛時漢之所棄輪臺亦奄有之然勤於邊略不如修實德以悅近人也氊牆二字新北庭作雁塞通鹽澤龍堆接醋溝孤城天北畔絶域海西樓秋雪春仍下朝風夜不收可知年四十猶自未封侯鹽澤人所共知醋溝則未之知也甚新中四句皆如鑄成武威春暮聞宇文判官西使還已到晉昌片雨過城頭黃鸝上戍樓塞花飄客淚邊桞掛鄉愁白髮悲明鏡青春換敝裘君從萬里使一作去聞已到瓜州三四與孤燈燃客夢寒杵搗鄉愁同調送楊中丞和蕃郎士元錦車登隴日邊草正凄凄舊好隨君長新愁聽鼓鼙河源飛鳥外雪嶺大荒西漢壘今猶在遙知路不迷送李將軍赴定州雙旌漢飛將萬里授橫戈春色臨邊一作關盡黃雲出塞多鼓鼙悲絶漠烽戍一作火隔長河莫斷隂山路一作想到隂山北天驕已請和雜詩盧象家居五原上征戰是平生獨負山西勇誰當塞上名死生遼海戰雨雪薊門行諸將封侯盡論功獨不成感慨有味但五原山西遼海薊門四處地相遼逺詩人寓意言辛苦無成者以譏夫偶然而成名者未必皆辛苦也贈王將軍賈島宿衛爐煙近除書墨未乾馬曽金鏃中身有寶刀瘢父子同時捷君王畫陳看何當為外帥白日出長安中四句似不作對而對所以為妙送鄒明府遊靈武曽宰西畿縣三年馬不肥債多平劔與官滿載書歸邊雪藏行徑林風透卧衣靈州聽曉角客館未開扉中四句佳前聨尤勝塞下曲馬戴廣漠雲凝慘日斜飛霰生燒山搜猛虎伏道擊回兵風折旗竿曲沙埋樹杪平黃雲飛旦夕偏奏苦寒聲送客遊邊于鵠若到并州北誰人不憶家塞深無伴侣路盡有平沙磧冷唯逢雁天寒不見花莫隨征將意垂老事輕車第六句最佳三四亦好從軍行楊凝都尉出居延强兵集五千還將張博望直救范祁連漢卒悲簫鼓胡姬濕采旃如今意氣盡流淚挹流泉起句壯末句悲老將不成功者也塞下李宣逺秋日并州路黃榆落故關孤城吹角罷數騎射鵰還帳幕遙臨水牛羊自下山行人正垂淚烽火出雲間八句俱整峭部落曲髙適蕃軍傍塞遊代馬噴風秋老將垂金甲閼支著錦裘雕戈象豹尾紅斾插狼頭日暮天山下鳴笳漢使愁塞上贈王太尉僧惠崇飛將是嫖姚行營已近遼河冰堅度馬塞雪密藏鵰敗虜殘旗在全軍列帳遙傳呼更號令今夜取天驕塞上贈王太尉僧宇昭嫖姚立大勳萬里絶妖氛馬放降來地鵰閒戰後雲月侵孤壘沒燒徹逺蕪分不慣為邊客宵笳懶欲聞歐陽公詩話稱此詩三四而未見其集司馬溫公乃得之以傳世征西將張籍黃沙北風起半夜又翻營戰馬雪中宿探人冰上行深山旗未展隂磧鼓無聲幾道征西將同收碎葉城漁陽將塞深沙草白都護領燕兵放火燒奚帳分旗築漢城下營看嶺勢尋雪覺人行更向桑乾北擒生問磧名沒蕃故人前年戌月支城上沒全師蕃漢斷消息死生長别離無人收廢帳歸馬識殘旗欲祭疑君在天涯哭此時愁怨柳中庸玉樹起凉煙凝情一葉前别離傷曉鏡搖落怨秋絃漢壘關山月胡笳塞北天不知腸斷夢空繞幾山川入塞曲鄭鏦留滯邊庭久思歸嵗月賖黃雲同入塞白首獨還家宛馬隨泰草胡人問漢花還傷李都尉猶是沒黃沙唐御覽詩鄭鏦四首皆艷麗令狐楚所選大率取此體不主平淡而主豐碩云送都尉歸邊盧綸好勇知名早爭雄上將間戰多春入塞獵慣夜燒山陳合龍蛇動軍移草木閒今來部曲盡白首過蕭關詩律響亮整齊贈梁州張都督崔皓聞君為漢將敵騎不南侵出磧清沙漠還家拜羽林風霜臣節苦嵗月主恩深為語西河使知余報國心五六痛快而感激邊遊項斯古鎮門前去長安路在東天寒明堠火日晚裂旗風塞館皆無事儒裝亦有弓防秋故鄉卒暫喜語音同三四或作天晴槐葉霧日暮葦花風無第六句不見秀才遊邊之意邊州客舍閉門不成出麥色遍前坡自小詩名在如今白髮多經年無越信終日厭蕃歌近寺居僧少春來亦懶過無第六句卻於邊州不切此篇詩先看題卻方看此句只一句喚醒一篇精神也塞上逢故人王建百戰一身在相逢白髮生何時得家信每日算歸程走馬登寒壠驅羊入廢城羌歌三兩曲人醉海西營第五句最好非邊上則此句未為竒也尹學士自濠梁移倅秦州宋祁于役三年逺尹自經略西事出入三年論兵兩鬢斑不辭開府辟尹再入部署韓公幕下要作破羌還楯墨應圜熟兜烽報未間浮舠背淮服盤馬入秦關遂閣讐書筆仍餘聚米山憶君他夕恨遙向隴雲間三四絶妙此尹師魯洙也少將李商隱族亞齊安陸風髙漢武威煙波别墅醉花月後門歸青海聞傳箭天山報合圍一朝攜劔起上馬即如飛兵梅堯臣太平無戰陳漢卒久生驕金甲不曽擐犀弓應自調嗟為燎原火終作覆巢梟若使威刑立三軍豈敢囂故原有戰卒死而復蘇來說當時事縱橫尸暴積萬殞少全生飲雨活燕塞脫身歸漢城野獾穿廢竈妖鵩嘯空營侵骨劔瘡在無人為不驚擬王維觀獵晏相公坐中探賦白草南山獵調弓發指鳴原邊黃犬去雲外皂鵰迎近出長陵道還看小苑城聊從向來騎回望夕陽平塞上王操無定河邊路風髙雪灑春沙平寬似海鵰逺立如人絶域居中土多年息戰塵邊城吹暮角久客自悲辛亦可與晚唐諸人爭先遊邊上佩劔遊邊地胡風捲敗莎鵰饑窺壞冢馬渴嗅冰河塞濶人煙絶春深霰雪多蕃戎如畫看散騎立髙坡王撡江南人三四絶佳尾句真如畫也并州道中從軍無住計近獵塞門行風劈靣疑裂凍粘髭有聲太陽過午暗暮雪照人明馬上聞吹角依依認漢城撡詩如此精妙不減賈島和袁郎中破賊後軍行過剡中山水謹上太尉即李光弼劉長卿剡路除荆棘王師罷鼓鼙農歸滄海畔圍解赤城西赦罪陽春發收兵太白低逺峯來馬首橫笛入猿啼蘭渚催新幄桃源識故蹊已聞開閣待誰許卧東溪所圈一聨絶精七言十一首贈索暹將軍王建渾身著箭瘢猶在萬槊千刀總過來輪劔直衝生馬隊抽旗旋踏死人堆聞休鬭戰心還癢見說煙塵眼即開淚滴先王階下土南衙班裏趂朝回老兵之常態也無此輩何以衛國不成一切都作吟詩而不事事者老將韓偓折鎗黃馬倦塵埃掩耳凶徒怕疾雷雪密酒酣偷號去月明衣冷斫營回行驅貔虎披金甲立聽笙歌擲玉杯坐久不須輕矍鑠至今雙擘硬弓開獻淮寧節度李相公劉長卿建牙吹角不聞喧三十登壇衆所尊家散萬金酬士死身持一劍答君恩漁陽老將多回席魯國諸生半在門白馬翩翩春草細邵陵一作少陵西去獵平原送李僕射赴鎮鳯翔張籍由來勳業屬英雄兄弟連營列位同先入賊城擒首惡盡封官庫讓元功旌幢獨繼家聲外竹帛新添國史中天子欲收秦隴地故教移鎮在扶風偶吟遣懷向敏中昔為宰輔居黃閣今作元戎控夏臺萬里蒼黔慚受賜一方清晏有何才紫宸杳杳彌年別紅斾翩翩映日開將相官榮如我少不須頻獻手中杯飛將胡宿曽從嫖姚立戰功胡雛猶畏紫髯翁雕戈夜統千盧衛緹騎秋畋五柞宫後殿拜恩金印重北堂開宴玉壺空從來敵國威名大麾下多稱黑矟公壯麗凡詩讀上一句初不知下一句作如何對必所對勝上句令人不測乃佳此篇是也次韻元厚之平戎獻捷王安石朝廷今日四夷功先以招懷後殪戎胡地馬牛歸隴底漢人煙火起湟中投戈更講諸儒藝免胄爭趨上將風文武佐時慚吉甫宣王征伐自膚公和蔡副樞賀平戎慶捷城郭名王據兩陲軍前一日送降旗羌兵自此無傳箭漢甲如今不解纍幕府上功聨舊伐朝廷稱慶具新儀國家道泰西戎喙還見詩人詠串夷依韻和元厚之內翰平羌王圭詔收新土鳳林東四百餘年陷犬戎葱嶺自橫秦塞上金城還落漢圖中輕裘坐嘯無餘粟解髮來庭有舊風零雨未濛音已捷不勞歸旅詠周公依韻和蔡樞密岷洮恢復部落迎降河湟形勝壓西陲忽覺連營列漢旗天子坐籌星兩兩將軍解佩印纍纍稱觴别殿傳新曲銜璧名王按舊儀江漢一篇猶未美周宣方事伐淮夷聞种諤米脂川大捷神兵十萬忽乘秋西磧妖氛一夕收匹馬不嘶榆塞外長城自越玉關頭兵未進討邊人望見漢城列峙西界中君王别繪凌煙閣將帥今輕定逺侯莫道無人能報國紅旗行去取凉州瀛奎律髓卷三十

body:
  text: 瀛奎律髓卷三十五元方回編庭宇類庭榭宫殿樓閣堂軒庵寮宅舍凡屋廬皆是五言十五首題洛中第宅白居易水竹誰家宅門髙占地寬懸魚挂青甃行馬護朱闌春樹籠煙暖秋庭鎖月寒松膠黏琥珀筠粉撲琅玕試問池臺主當為將相官終身不曽到唯展宅圖看尾四句盡貴人第宅終不能歸之態歸履道宅驛吏引藤輿家童開竹扉往時多暫住今日是長歸眼下有衣食耳邊無是非不論貧與富飲水亦應肥五六豈不自適然他人不能道亦不肯道題潼關樓崔皓客行逢雨霽歇馬上津樓山勢雄三輔關門扼九州川從峽路去河繞華隂流向晚登臨處風煙萬里愁中四句壯哉老杜同調題沈隱侯八詠樓梁日東陽守為樓望越中緑窗明月在青史古人空江靜聞山狖川長數塞鴻登臨白雲晚流恨此遺風起句自在第六句數字是詩眼好處宿胡氏溪亭項斯獨住水聲裏有亭無熱時客來因月宿床勢向山移鶴住松枝定螢歸葛葉垂寂寥唯欠伴誰為報僧知五六劉後村深喜然覺太工太工則拘拘則狹鸛雀樓晴望馬戴堯女樓西望人懷太古時海波通古穴山木閉虞祠鳥道殘虹挂龍潭返照移行雲如可馭萬里赴心期寄題武當郡守吏隱亭僧希晝郡亭傳吏隱間自使君心卷幕知來客懸燈見宿禽茶煙逢石斷棊響入花深會逐南帆便乘秋寄此吟留題承旨宋侍郎林亭翰苑營嘉致到來山意深會茶多野客啼竹半沙禽雪溜懸危石棋燈射逺林言詩素非苦虛答侍臣心碧瀾堂梅堯臣虛雲臨滉漾橋勢對隆穹環珮佳人去汀洲翠帶空橘船過砌下蘭棟起雲中欲問芳非地吳王一廢宫題三角亭俞汝尚竒哉山中人來此池上宇蕙徑斜映帶林煙盡吞吐春無四面花夜欠一簷雨寄傲足有餘何須存一作尋廣廡此仄聲律詩題既竒語亦妙退翁名在隱逸傳其人尤髙不可不取淮安園王直方賢王經别墅深窈近嚴城花竹四時好賓朋一座傾闔奩爭奕罷擊鉢記詩成明日朝天去門扃鳥雀驚此人親炙蘇黃諸公詩傳不多吕居仁位之派中細讀其詩雖不熟亦有格宿裴庵葛天民一徑松杉迥成隂見日稀山晴僧盡出風暖燕交飛結子花拋樹欄人犬護扉間看山月上清坐更添衣尾句有夜味題周氏東山堂翁卷城隅古謝村博士草堂存惟見煙霞起全無市井喧鸛來巢木杪黿出戲蒲根消得吟詩客憑欄看幾番題信州草衣亭簷多山鳥啼山下玉為溪林樹若為長塔峰應更低數僧居似客一佛壞方泥宴坐當時事廊碑具刻題薜氏瓜廬趙師秀不作封侯念悠然逺世紛惟應種瓜事猶被讀書分野水多於地春山半是雲吾生嫌巳老學圃未如君人家半在船野水多於地本樂天仄韻古詩今換一句為對亦佳七言三十首題于家公主舊宅劉禹錫繞樹荒臺葉滿池簫聲一絶草蟲悲鄰家猶學宫人髻園客爭偷御果枝馬埓蓬蒿藏狡兔鳯樓煙雨嘯寒鴟何郎獨在無恩澤不似當初傅粉時題睦州郡中千峰榭方干豈知平地似天台朱户深沉别徑開曳響露蟬穿樹去斜行沙鳥向池來窗中早月當琴榻牆上秋山入酒杯何事此中如世外應緣羊祜是仙才存此詩以見嚴陵郡之千峰榭其來舊矣題韋郎中新亭張籍起得幽亭景復新碧莎池上更無塵琴書看盡猶嫌少松竹栽多亦稱貧藥酒欲開期好客朝衣暫脫見間身成名同日官連署此處經過有幾人次韻張全真參政退老堂吕頤浩東郊卜築傍溪流菡萏香中寄一作繫小舟脫去簪紳歸畎畝悟來漁釣勝公侯青雲舊好何妨厚白雪新詩為寵留又指湘潭問行路一堂風月阻同遊吕丞相家為此堂諸公各有詩今摘選所和者多得體之言次韻李泰叔退老堂東郊半隱繞羣峰門外滔滔一水通再歲依棲欣有幸十年遭濟歎無功間心不厭耕南畝清夢猶思卧北風看取中原恢復後麒麟圖畫首膚公為宰相退居不下第六句則為何如人耶此所以為可選次韻蔡叔厚退老堂心存魏闕豈能忘揣分非才合退藏此日燕休難報國平生艱阻憶垂堂枕戈每歎身先老覽鏡常嗟貌不揚每羡蘧廬聊偃息會須恢復返吾鄉此是次韻詩堂揚二字俱和倒末句又見得宰相用心登西樓王安石樓影侵雲百尺斜行人樓上憶天涯情多自悔登臨數目極因驚悵望賖一曲平蕪連古樹半分殘日帶明霞潘郎何用悲秋色祇此傷春髮已華太湖恬亭檻臨溪上緑隂圍溪岸髙低入翠微日落斷橋人獨立水涵幽樹鳥相依清遊始覺心無纍靜處誰知世有機更待夜深同徙倚秋風斜月釣船歸垂虹亭坐覺塵襟一夕空人間似得羽翰通暮天窈窈山銜日爽氣駸駸客御風草木韻沉髙下外星河影落有無中飄然更待乘桴伴一到扶桑興未窮鍾山西庵白蓮亭山亭新破一方苔白帝留花滿四隈野艷輕明非傅粉秋光深淺不慿杯鄉窮自作幽人伴歲晚誰為靜女媒可笑逺公池上客却因秋菊賦歸來次韻舍弟賞心亭即事二首檻折簷傾野水傍臺城佳氣已消亡難披榛莽尋千古獨倚青冥望八荒坐覺塵沙昏逺眼忽看風雨破驕陽扁舟此日東南興欲盡江流萬古長霜氣消磨不復存舊朝臺殿祗空村孤臣倚薄青天近細雨侵淩白日昏稍覺野雲乘晚霽却疑山月是朝暾此時江海無窮興醒客忘言醉客喧寄題思軒名郎此地昔徘徊天誘良孫接踵來萬屋尚歌餘澤在一軒還向舊堂開右軍筆墨空殘沼內史文章祗廢臺邑子從今誇勝事豈論王謝世稱才華嚴院此君亭一徑森然四座涼殘隂餘韻興何長人憐直節生來瘦自許髙才老更剛曾與蒿藜同雨露終隨松柏到冰霜煩君借此根株在乞與伶倫學鳳凰借一作惜紙閣聯屏蓋障一尋方南設鈎簾北置床側坐對鋪紅絮暖仰窗分啓碧紗涼氈廬易以梅蒸爛錦幄終于草野妨楚穀越藤真自稱每糊因得減書囊垂虹亭宛宛虹霓墮半空銀河直與此相通五更縹眇千山月萬里凄涼一笛風鷗鷺稍回青靄外汀洲特起緑蕪中騷人自欲留佳句忽憶君詩思已窮杭州清風閣趙抃庭有松蘿砌有苔退公聊此逺塵埃潮音隱隱海門至泉勢潺潺石縫來夜榻衾裯仙夢覺曉窗燈火佛書開休官不久輕舟去喜過嚴陵舊釣臺清獻亦喜佛學故有第六句其人可敬不止於詩和稚子與諸生登北都城樓元章簡朔風刮面歲華遒間擁豐貂一倚樓四野凍雲隨地合九河清浪著天流諸君略住方乘興吾土雖非亦解憂更得青襟賡雅唱連章彩筆鬬銀鈎五六用庾亮王粲語其佳如此寄題徐都官新居假山梅堯臣太湖萬穴古山骨共結峰嵐勢不孤苔徑三層平木末河流一道接牆隅已知谷口多花藥祗欠林間落狖鼯誰侍巾褠此遊樂里中遺老肯相呼自然亭張徵久雨妨漁復滯樵自然亭上一逍遙萬緣不自間中起百事唯於睡裏消老去自知如蠛蠓病來誰悟似芭蕉愛名之世忘名客幸有山林舊市朝張徴字伯常陳留人寶元元年進士甲科司馬公同年己酉中秋任才仲陳去非會飲嶽陽樓上酒半酣髙談大笑行草間出誠一時俊遊也為賦之薑仲謙嶽陽樓髙幾千尺俯視洞庭方酒酣萬頃波光天上下兩山秋色月東南興來鸞鵠隨行草夜永魚龍駭笑談我欲煩公釣鼇手盡移雲水到松庵薑仲謙淄州人陳簡齋集有此題三人真竒會也松庵者光彥之號故尾句云思杜亭十里松隂古道場一亭還復枕瀟湘詩翁至死憂唐室野客於今吊耒陽窗戶雲生山雨集巖溪花發曉風香不唯臨眺添惆悵自是年來鬢已霜第三句最佳竹堂張耒誰道清貧守冷官繞家十萬翠珢玕直應流水深相與不待清風已自寒學得鳯鳴真自許化成龍去不知蟠知君何自無來客可是王郎獨與歡登滕王閣曽丰故閣崢嶸已劫灰又看新閣上煙煤斷碑無日不濃墨古砌雖秋猶淺苔江濶鳥疑飛不過風輕帆敢趰先開天髙眼迥詩囊小收拾不多空一來曽丰撙齋吉州人有緣督集詩頗慕楊誠齋佳者不止此也五六最佳章少機建小閣用陳伯強韻何異樓居草草假三間便覺星辰手可攀最喜坐中先得月不妨睡處也看山林疏啼鳥秋彈曲天濶飛鴻曉捲班對鏡清吟無限好典衣泠債幾時還一作彈秋曲捲曉班何異字同叔撫州崇仁人紹熙臺諫慶元禮侍嘉定工書年八十餘月湖其號也題李國博東園東園吟思玉蟾清園客開門古意生冰硯雲燈深洞宇春花秋草舊宫城人藏密樹尋聲見鷺下寒池照影驚三十分司泉石主馬蹄塵外得聞名題環翠閣環翠閣邊無點埃盡收清致助吟才溪頭月落漁煙散岸口城低野色來斜檻半依秋樹出小窗知為北山開沙禽占水間相趁誤入疏簾靜却回小亭葛天民小亭終日對幽叢兀坐無言似定中蒼蘚靜連湘竹紫緑隂深映蜀葵紅貓來戲捉穿花蝶雀下偷銜卷葉蟲斜照尚多髙栁少明年更欲種梧桐五六工則工矣却是答對取此為戒第四句好寄題薛象先新樓陳傅良矮簷風雨送蝸牛有客來誇百尺樓闔郡臺池皆下瞰背城湖海亦全收清時未放徒髙卧半世何為故倦遊解盡槖金君計決月明長笛起漁舟陳水雲與造物遊之樓趙師秀何處飛來縹眇中人間惟有畫圖同兩層簾幕垂無地一片笙簫起半空岸竹低添秋水碧渚蓮平接夕陽紅遊人未達蒙莊旨虛倚闌干面面風此樓在永嘉近城兩層一片頗俗五六亦可觀瀛奎律髓卷三十五

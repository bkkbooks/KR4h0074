  - {type: page-break, offset: 0, content: '', id: KR4h0074_WYG_048-1a, image: WYG1366/WYG1366-0544a.png}
body:
  text: 瀛奎律髓巻四十八元方回編僊逸類神仙之説始於燕齊怪誕而極於秦皇漢武方士不經甚矣其徒又自附於老子之書上推至於黄帝而曰黄老清淨是以無為而治後世益加附㑹自成一教賦命有修短我得以操其權秉質有厚薄我得以變其本舉凡書符受籙燒丹辟穀縮地昇天治鬼伐病其説不一愚而失身姦而惑衆者多矣間有隱逸詭異之徒或毛人木客出于山谷或羽衣星冠巢於林澗而眩於都市則世之好奇者悦之而詩人尤喜談焉五言四十二首南山許宣平隱居三十載築室南山巔静夜翫明月閒朝飲碧泉樵人歌隴上谷鳥戯巖前樂矣不知老都忘甲子年予里舊歙州唐人許翁名宣平隱居歙之城陽山曰南山去城數里賦此詩有題之長安傳舍者李太白見之以為仙也至歙訪之不值宣平又有詩曰負薪朝出賣沽酒日西歸借問酒何在穿雲入翠微以其辭味之蓋得道者或云山中猶嘗見之尋洪尊師不遇劉長卿古木無人地來尋羽客家道書堆玉案仙帔叠青霞鶴老難知歲梅寒未作花山中不相見何處化丹砂史稱劉長卿自號五言長城秦系以偏師攻之似以系為髙者今並刋二人詩于此題女道士居不餌芝术四十餘年秦系不餌住雲溪休丹罷藥畦杏花虚結子石髓任成泥掃地青牛卧栽松白鶴棲共知仙女麗莫是阮郎妻尾句有説話在陪韓院長韋河南同尋劉師不遇得同字竇牟仙客誠難訪吾人豈易同獨游應駐景相顧且吟風藥畹瓊枝秀齋軒粉壁空不題三五字何以達壺公五竇皆號能詩五六秀麗同前得尋字韓愈秦客何年駐仙源此地深還隨躡鳬騎來訪馭風襟院閉青霞入松髙遠鶴尋猶疑隠形坐敢起竊桃心此詩昌黎集中無之附見五竇聯珠集是時昌黎偕竇牟及河南縣令韋執中分韻曰同尋師執中得師字末句曰不知柯爛者何處㸔圍碁亦佳同前得師字韋執中早尚逍遥境常懐汗漫期星郎同訪道羽客杳何之物外求仙侣人間失我師不知柯爛者何處看圍碁詩見竇氏聯珠集汗漫逍遥星郎羽客對偶亦佳惟何之何處頗重複恐久而無傳亦不可失也玉真張觀主下小女冠阿容白居易綽約小天仙生來十六年姑山半峯雪瑶水一枝蓮晚院花留立春窗月伴眠迴眸雖欲語阿母在傍邊昌黎白咽紅頰長眉青一詩已盡女冠竒衺之態適人者理之常也出家者俗之衰也召文人才士之侮何為乎不食姑張籍幾年山裏住巳作綠毛身䕶氣常希語存思自見神養龜同不食留藥任生塵要問西王母仙中第幾人世道衰微異端作邪説肆婦人不食果何為乎殆姦人也題辟穀者學得飱霞法逢人與小還身輕曾試鶴力弱未離山無食犬猶在不耕牛自閒朝朝空潄水叩齒草堂間予未聞有辟穀而仙去者衰世邪人以此惑衆實徼利之徒耳隱者先生已得道市井亦容身救病自行藥得錢多與人問年長不定傳法又非真常見隣家説時聞使鬼神世豈無有道之士而異人之所為或不皆真其人則舉動詭怪此詩句句有所諷通都大邑時見此曹也寄紫閣隱者紫閣氣沉沉先生住處深有人時得見無路可相尋夜鹿伴茅屋秋猿守栗林唯應掃靈藥更不别營心紫閣白閣終南山二峯名張司業詩平易大率如此送宫人入道舊寵昭陽裏尋仙此最稀名初出宫籍身未稱霞衣已别歌舞貴長隨鸞鶴飛中官看入洞空駕玉輪歸宫人入道唐世多有此詩既幽閉之深宫矣一旦得出又以道宫終其身皆非禮也尋胡道士不遇韓翃到來心自足不見亦相親説法思居士忘機憶丈人微風吹藥案晴日照茶巾幽興殊未盡東城飛暮塵贈張道士採藥三山罷乘風五日歸剪荷成舊屋剉檗染新衣玉粒捐應久丹砂驗不微坐看青節引更與白雲飛三四佳第五句缺上字恐當是穀粟之類送耿山人歸湖南周賀南行隨越僧别業幾池菱兩鬢已垂白五湖歸掛罾夜濤鳴柵鏁寒葦露船燈此去已無事却來知不能第二句新五六亦新送韋逸人歸鍾山郎士元逸人歸路遠弟子出山迎服藥顔猶駐耽書癖巳成柴扉多歲月藜杖見公卿更作儒林傳應須載姓名五六髙妙清古訪趙鍊師不遇魚𤣥機何處同仙侣青衣獨在家暖爐留煑藥隣院為煎茶畵壁燈光暗幡竿日影斜殷懃重回首墻外數枝花尾句頗輕俗中四句却俱佳山中道士賈島頭髪梳千下休糧帶瘦容養雛成大鶴種子作髙松白石通宵煮寒泉盡日舂不曾離隠處那得世人逢八句無一句不佳送孫逸人衣屨猶同俗妻兒亦宛然不餐能累月無病已多年是藥皆諳性令人漸信仙杖頭書數巻荷入翠微烟三代之世恐無此譎觚之民也唐人喜為詩則已喜談而樂道之元日女道士受籙元日天新夜齋身稱淨衣數星連斗出萬里斷雲飛霜下磬聲在月髙壇影微立聽師語了右肘繫符歸世間愚人無知而失身者莫若尼姑女冠立聽師語右肘繫符果何所得乎昌黎獨不信如謝自然詩及兩街講經詩必闢之送華隂隱者項斯往往到城市得非徴藥錢世人空識面弟子莫知年自説能醫死相期更學仙近來移住處毛女舊峯前世問有此一等怪人此等詩能道其情狀也題太白山隠者髙居在幽嶺人得見時稀寫籙扄虚白尋僧到翠微掃壇星下宿收藥雨中歸從服小還後自疑身解飛五六極佳而瑩淨華頂道者仙人掌中住生有上天期已廢燒丹處猶多種杏時養龍於淺水寄鶴在髙枝得道復無事相逢盡日棋五六新異第六句尤竒古觀置觀碑巳折看松年不分洞中誰識藥門外日添墳放去龜隨水呼來鹿怕薰壇邊宿灰火幾燒祭星文第四句尤新異贈道者晏來如養氣度日語時稀到處留丹井經寒不絮衣病鄉多藥惠鬼俗有符威自説身輕健今年數夢飛人火氣上炎而下不實則夢飛非仙之所為也王居士許渾笻杖倚柴關都城賣卜還雨中耕白水雲外斸青山有藥身長健無機性自閒即應生羽翼華表在人間三四世人所稱送道士盧綸夢别一仙人霞衣滿鶴身旌幢天路遠梅杏海山春種玉非求稔燒金不為貧自憐頭向白誰與葛洪親唐御覽詩元和學士令狐楚選進盧綸墓碑謂三百一十篇公詩居十之一今世傳本綸三十二首與焉陸放翁嘗跋云訪道者不遇杜荀鶴寂寂白雲門尋真不遇真祗應松上鶴便是洞中人藥圃花香異沙泉鹿跡新題詩留姓字他日此相親此詩刋碑在問政山白雲亭三篆字尤古杜來訪聶師道不遇留此而去門一作亭今亭圮于兵矣贈廬嶽隱者見説來居此未嘗離洞門結茅遮雨露採藥給晨昏古樹藤纒殺春泉鹿過渾悠然無一事不似屬乾坤中四句俱佳予昔遊雲臺觀謁希夷先生陳摶祠堂緬想其人今追作此詩宋祁仙館三峯下年華百歲中夢休孤蝶往此言先生善睡一寢逾一月蜕在一蟬空有家在華山下蘂笈微言秘霄晨浩氣通丹遺䑛後鼎林遣御餘風市霧沉荒白飡霞委暗紅蛾眉有歸約飛步與誰同先生化去前三日語弟子云吾游蛾眉弟子訝不辦裝至期而終此在成都追作送陳豸處士僧惟鳳草長關路微離思更依依家遠知琴在時清買劍歸孤城回短角獨樹隔殘暉别有隣漁約相迎掃釣磯惟鳳九僧之六青城人三四佳金華山人陳襄幽居倚翠巒塵事不相干天地醉來小琴棋静裏歡雨苔春徑綠風竹夜窗寒若問長生術金爐有寳丹古霛一疏薦賢士大夫三十餘人元祐所用皆是真古大丈夫也豈信此術數學仙者乎殆游戯耳靈夀同年兄再以杞屑分惠復成小詩以代善謔曾肇場屋十年長鈴齋一笑歡微言師水薤交分託金蘭腹飽仙人杖心存姹女丹他時玉京路同綴侍宸官仙官有侍帝宸如世之侍中謂之侍宸官徐庶殷浩王嘉何晏等皆為之見真誥用薤本水盂以對金蘭誠佳而巧仙人杖姹女丹亦工侍宸之説博洽者乃通曉贈不食姑徐照衣以青為色謂如天骨青近年全不食飲水自通靈心信生狂語清羸改俗形半空仙樂奏曾向静中聽第六句好不食姑徐機惟誦天童咒飲泉能不饑只緣多自譽翻以致人疑賦質全如鶴謀生却似龜綠華通籍後㑹報女仙知全如却似四字下得不甚好三四頗有評論唐張司業有此題四靈皆倣之也一真姑趙師秀忽然能不食飲水度中年此事知難偽令人信有仙形容無血色衣服有香煙聽説瑶池路猶如在目前四靈學晚唐詩故題目亦傚之四人之中紫芝最熟而有餘味云桐栢觀山深地忽平縹緲見珠庭瀑近春風濕松多曉日清石壇遺鶴羽粉壁剝龍形道士王靈寳輕强滿百齡五六佳延禧觀寂寞古仙宫松林常有風鶴毛兼葉下井氣與雲同背日苔磚紫多年粉壁紅相傳陶縣令曾住此山中平熟妥帖贈九華李丹士翁巻行遍東南地曽看江水源袖藏勾漏藥身是老君孫去住雲相似枯榮事不論九華峯最碧相對舊柴門不食姑嫁時衣尚着忽自欲尋仙終日常持咒經年只飲泉瘦形非是病怪語却如顛金母還知爾招邀歸洞天四靈皆有此詩亦一時怪人也不食何所為乎題玉隆宫周道士足軒貪得無厭者應難向此居爐中姹女藥案上老君書花竹庭堦潔風烟戸牖虛道人隨分外安坐不求餘起句好尾句好中四句平亦近套書嶽麓宫道房借問今行處羣仙第幾家晴􅉉鳴雪滴虚砌影梅花香爇何年柏芽煎未社茶道人三四輩相對誦南華此詩只似宋人詩不入唐味尾句好七言二十二首送賀知章入道姚鵠若非堯運及垂衣肯許巢由脱俗機太液始同黄鶴下仙鄉巳駕白雲歸還披舊褐辭金殿却捧𤣥珠向翠微羈束慚無仙藥分隨車空有夢魂飛第六句忽然出於不測可取也題茅山李尊師山居秦系天師百歲少如童不到山中竟不逢洗藥每臨新瀑水歩虚時上最髙峯籬間五月留殘雪座右千年䕃老松此去人寰知遠近回看雲壑一重重張司業亦有云下藥遠求新熟酒看山時上最髙樓與此暗合第五句六句亦稱之送宫人入道張蕭遠捨寵求仙畏色衰辭天素面立天墀金丹擬駐千年貎寳鏡休勻八字眉師主與裝珠翠後君王看戴角冠時從來宫女皆相妬聞向瑶臺總淚垂此詩誤刋入韋應物集非應物詩也英華以為張蕭遠詩且應物集誤以師主為公主當作師送宫人入道項斯願隨仙女董雙成王母前頭作伴行初戴玉冠多誤拜欲辭金殿别稱名將敲碧落新齋磬却進昭陽舊賜筝旦暮燒香繞壇上步虚猶作按歌聲項詩亞於張故以相次同白二十二贈王山人劉禹錫愛名之世忘名客多事之時無事身古老相傳見來久歲年雖變貎長新飛章上達三清路受籙平交五嶽神笑聽鼕鼕朝暮鼔只能催得市朝人劉公詩才讀即髙似他人渾若天成贈東嶽張煉師東嶽真人張煉師髙情雅淡世間稀堪為烈女書青簡久事元君住翠微金縷機中抛錦字玉清壇上着霓衣雲衢不要吹簫伴只擬乗鸞獨自飛詩格髙律熟贈道士張籍城裏無人得實年衣襟常帶臭黄烟樓中賖酒唯留藥洞裏争碁不賭錢聞客語音知貴賤對花歌詠似狂顛尋常行處皆逢見世上多疑是謫仙亦一怪人也贈閻少保王建髭鬚雖白體輕健九十三來却少年問事愛知天寳裏識人多是武皇前玉裝劍佩身長帶絹寫方書子不傳侍女常時教合藥亦聞私地學求仙此可入老人類亦可入仙逸類葢方士也贈牛山人賈島二十年中餌茯苓收書半是老君經東都舊住商人宅南國新修道士亭鑿石養蜂須買蜜坐山秤藥不争星古來隠者多能卜欲就先生問丙丁第六句甚新送胡道士短褐身披滿磧苔靈溪深處觀門開却從城裏携琴去許到山中寄藥來臨水古壇秋醮罷宿杉幽鳥夜飛迴丹梯願逐真人上日夕歸心白髪催三四一穿而平易浪仙詩似此者少鄭州獻從叔舍人李商隱蓬島煙霞閬苑鐘三官牋奏附金龍茅君奕世仙曹貴許掾全家道氣濃絳簡尚參黄紙案丹爐猶用紫泥封不知他日華陽洞許上經樓第幾重三四善用事義山體喜如此和韓錄事送宫人入道星使追還不自由雙童捧上綠瓊輈九枝燈下朝金殿三素雲中侍玉樓鳳女顛狂成久别月娥孀獨好同游當時若愛韓公子埋骨成灰恨未休玉清隱書云三素耀瓊扇既是宫人何由可愛韓壽若用紅葉題詩後出為韓姓人所得事出小説未可輕信送張逸人羅鄴自説歸山人事賖素琴丹竈是生涯牀頭殘藥䑕偷盡溪上破門風擺斜石井晴垂青葛葉竹籬荒映白茅花遥知此去應稀出獨卧晴窗夢曉霞中四句俱新異仙子送劉阮出洞曹唐慇懃相送出天台仙境那能却再來雲液既歸須强飲玉書無事莫頻開花當洞口應長在水到人間定不回惆悵溪頭從此别碧山明月照蒼苔曹唐專借古仙㑹聚離别之事以寓寫情之妙有如鬼語者有太麄者選此二首極其精婉劉阮再到天台不復見諸仙子再到天台訪玉真青苔白石已成塵笙歌寂寞閒深洞雲鶴蕭條絶舊隣草樹總非前度色烟霞不似往年春桃花流水依然在不見當時勸酒人贈隱逸静隱須教隱者尋清狂何必在山隂蜂彈牕紙塵侵硯鳥鬭庭花露滴琴莫笑亂離方解印猶勝顛蹶未抽簪築金誘得非名士况是無人解築金三四工五六有議論尾句一繳為燕昭王金臺所致便非名士况又無燕昭王之為人者乎其説尤髙矣贈馬道士李九齡水共逍遥雲共孤混時言笑只佯愚經年但醉宜城酒千里唯擔華嶽圖尋野鶴來空碧洞覔琴僧去渡重湖人間再見知何日乞取先生石轆轤九齡乾德五年進士第三人詩中兩句好空碧洞之空未穩贈譚先生楊徽之古觀重重遶翠微杉松深處掩雙扉雲生萬壑投龍去海隔三山放鶴歸花洞宴游春日永石壇朝禮曙星稀每聽髙論長生理擬向塵中便拂衣楊徽之詩亦峻峭此詩中四句是也張先生蘓軾熟視空堂竟不言故應知我未天全肯來傳舍人皆説能致先生子亦賢脱屣不妨眠糞屋流澌爭看浴冰川士廉豈識桃椎妙妄意稱量未必然東坡元叙云先生不知其名黄州故縣人本姓盧為張氏所養佯狂垢汙寒暑不能侵常獨行市中夜或不知其所止往來者欲見之多不能致余試使人召之欣然而來既至立而不言與之言不應使之坐不可但俯仰熟視傳舍堂中久之而去犬熟視傳舎者是中竞何有乎然余以有思惟心追躡其意葢未得也三朶花學道無成鬢巳華不勞千刼漫蒸砂歸來且看一宿覺未暇遠尋三朶花兩手欲遮瓶裏雀四條深怕井中蛇畫圖要識先生面試問房陵好事家東坡元註云房州通判許安世以書遺余言吾州有異人常戴三朶花莫知其姓名郡人因以三朶花名之能作詩皆神仙意又能自寫真有得之者許欲以一本見惠乃為作此詩瓶雀事出楞嚴經大智度論四條蛇事賓頭盧尊者語一宿覺永嘉人有證道歌傳於世湖上遇道翁乃峽中舊所識也陸游大罵長歌儘放顛時時一語却超然掃空百局無棊敵倒盡千鍾是酒仙巴峽相逢如昨日山隂重見亦前緣細思合辱先生友五十年來不負天贈道流煙雲深處作生涯回首人間歲月賖留得朱顔慿綠酒掃空白髪賴丹砂七絃指下泠泠久雙袖風中獵獵斜他日相尋不知處㑹從漁父問桃花瀛奎律髓巻四十八

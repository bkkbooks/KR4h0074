body:
  text: 瀛奎律髓卷二十五元方回編拗字類拗字詩在老杜集七言律詩中謂之吳體老杜七言律一百五十九首而此體凡十九出不止句中拗一字往往神出鬼沒雖拗字甚多而骨骼愈峻峭今江湖學詩者喜許渾詩氷聲東去市朝變山勢北來宫殿髙湘潭雲盡暮山出巴蜀雪消春水來以為丁卯句法殊不知始於老杜如負鹽出井此溪女打鼓發船何郡郎寵光蕙葉與多碧㸃注桃花舒小紅之類是也如趙嘏殘星幾㸃雁橫塞長笛一聲人倚樓亦是也唐詩多此類獨老杜吳體之所謂拗則才小者不能為之矣五言律亦有拗者止為語句要渾成氣勢要頓挫則換易一兩字平仄無害也但不如七言吳體全拗爾五言十首已上人茅齊杜甫已公茅屋下可以賦新詩枕簟入林僻茶瓜留客遲江蓮搖白羽天棘蔓青絲空忝許詢輩難酬支遁辭入字當平而仄留字當仄而平許支二字亦然間或出此詩更峭健又入字留字乃詩句之眼與搖字蔓字同如必不可依平仄則拗用之尤佳耳如雲散灌壇雨春青彭澤田亦是暮雨題瀼西新賃草屋欲陳濟世䇿已老尚書郎不息豺虎鬭空慚鵷鷺行時危人事急風逆羽毛傷落日悲江漢中宵淚滿床濟世䇿三字皆仄尚書郎三字皆平乃更覺入律豺虎鵷鷺又是一樣拗體時危一聨亦變體也上兜率寺兜率知名寺真如㑹法堂江山有巴蜀棟宇自齊梁庾信哀雖久何顒好不忘白牛連逺近且欲上慈航此寺棟宇自齊梁至今則所用自字决不可易亦既工矣江山有巴蜀有字亦决不可易則不應換平聲字却將巴字作平聲一拗如詩應有神助吾得及春遊亦是酬姚校書賈島因貧行逺道得見舊交遊美酒易傾盡好詩難卒酬公堂朝共到私第夜相留不覺入關晚别來林木秋易難二字拗用句意俱佳尾句入林字亦拗詩人如此者多早春題湖上友人新居近得雲中路門長侵早開到時猶有雪行處已無苔勸酒客初醉留茶僧未來每逢晴暖日惟見乞花栽門不當官道行人到亦稀故從餐後出多是夜深歸開篋收詩卷掃牀移卧衣幾時同買宅相近有柴扉前篇客字僧字拗對詩家甚多後篇收詩前句不拗只掃床移卧衣拗一字掃字既仄即移字處合平亦詩家通例也次韻楊明叔黃庭堅全德備萬物大方無四隅身隨腐草化名與太山俱道學歸吾子言詩起老夫無為蹈東海留作濟川桴腐草之腐不容不拗緣一定字不可易如備萬物無四隅亦然所以選此詩者不專為拗字而止身隨腐草化所謂語小莫能破名與太山俱所謂語大莫能載身在菰蒲中名滿天地間九鼎安磐石一身轉秋蓬皆是也五首選一次韻答髙子勉雪盡虛簷滴春從細草回德人泉下夢俗物眼中埃久立我有待長吟君不來重𤣥鎖關鑰要待玉匙開十首摘一以我對君雖非字之工者亦見拗句之健起句十字言景中四句皆言情豈近世四體所得拘黃陳詩有四十字無一字帶景者後學能參此者幾人矣德人謂東坡别負山居士陳師道田園相與老此别意何如更病可無醉猶寒已自和髙名胡未廣詩句尚能多沙草東山路猶須一再過更病可無醉所用可字不容不拗此詩全在虛字上著力除田園沙草山路六字外不曾粘帶景物只於三四箇閒字面上斡旋妙意其苦心亦已甚矣寄答李方叔平生經世䇿寄食不資身孰使文章著能辭轍跡頻帝城分不入書札詗何人子未知吾懶吾寧覺子貧帝城分不入分字不可不拗又此詩四十字無一字黏景物惟趙昌父能之漢書陳咸傳咸滯於郡守時王音輔政信用陳湯咸數賂遺湯豫書曰即䝉子公力得入帝城死不恨詗漢書注偵伺也櫟按誠齊送人下第云孰使文章太驚俗何緣場屋不遺才即用后山此詩三四一聨句法意度然皆老杜文章憎命達之遺意七言十八首題省中院壁杜甫掖垣竹埤梧十尋洞門對雪常隂隂落花遊絲白日靜鳴鳩乳燕青春深腐儒衰晚謬通籍退食遲回違寸心衮職曽無一字補許身愧比雙南金此篇八句俱拗而律吕鏗鏘試以微吟或以長歌其實文從字順也以下吳體皆然落花遊絲白日靜鳴鳩乳燕青春深此等句法惟老杜多亦惟山谷后山多而簡齊亦然乃知江西詩𣲖非江西實皆學老杜耳因附見於下清江碧石傷心麗嫩蕊穠花滿目斑珠簾繡柱圍黃鶴錦纜牙檣起白鷗老杜也頭白眼花行作吏兒婚女嫁望還山青春白日無公事紫燕黃鸝俱好音釣溪築野收多士航海梯山共一家舊管新收幾粧鏡流行坎止一虛舟霜髭雪鬢共看鏡萸糝菊英同送秋山谷也語鵲飛烏春悄悄重簾深院晚沉沉來牛去馬中年眼朗月清風萬里心問舍求田真得計臨流據石有餘清熟路長驅聊緩步百全一發不虛弦后山也寒食清明愁客子暖風遲日醉梨花前江後嶺通雲氣萬壑千巖送雨聲簡齊也東坡亦有之白砂碧玉味方永黃紙紅旗心已灰經卷藥爐新活計舞衫歌扇舊因緣如歐陽公金馬玉堂三學士清風明月兩閒人皆兩句中各自為對或以壯麗或以沉鬱或以徑健或以閒雅又觀本意如何豫亦不能悉數姑舉一二更不别出愁江草日日喚愁生巫峽泠泠非世情盤渦鷺浴底心性獨樹花發自分明十年戎馬暗南國異域賓客老孤城渭水秦山得見否人今罷病馬縱橫南國一本作萬國說如前書夢二月饒睡昏昏然不獨夜短晝分眠桃花氣暖眼自醉春渚日落夢相牽故鄉門巷荆棘底中原君臣豺虎邊安得務農息戰鬭普天無吏橫索錢暮歸霜寒碧梧白鶴棲城上擊柝復烏啼客子入門月皎皎誰家搗練風凄凄南渡桂水闕舟楫北歸秦川多鼓鞞年過半百不稱意明日看雲還杖藜早秋苦熱堆案相仍七月六日苦炎蒸對食暫餐還不能每愁夜中自足蝎况乃秋後轉多蠅束帶發狂欲大呌簿書何急來相仍南望青松架短壑安得赤腳踏層冰老杜詩豈人所敢選當晝夜著几間讀之今欲示後生以體格乃取吳體五首於此他如鄭駙馬宴洞中九日至後崔氏草堂曉發公安等篇自當求之集中題落星寺黃庭堅星宫遊空何時落著地亦化為寶坊詩人晝吟山入座醉客夜愕江撼牀蜂房各自開户牖蟻穴或夢封侯王不知青雲梯幾級更借瘦藤尋上方落星開士深結屋龍閣老翁來賦詩小雨藏山客坐久長江接天帆到遲燕寢清香與世隔畫圖絶妙無人知元注僧隆畫甚富而寒山拾得畫甚妙蜂房各自開户牖處處煮茶藤一枝此學老杜所謂拗字吳體格而編山谷詩者置外集古詩中非是各開戶牖真佳句恐以此遂兩用之汴岸置酒贈黃十七吾宗端居懷百憂長歌勸之肯出遊一作百丈暮捲篙人休侵星爭前猶幾舟黃流不解涴明月碧樹為我生凉秋初平羣羊置莫問叔度千頃醉即休一作詩吟吾黨夜來句酒買田翁社後篘誰倚柁樓吹玉笛斗杓寒掛屋山頭此見山谷外集亦吳體學老杜者注腳四句可參看必從吾宗起句則五六初平叔度黃姓事為切若止用百丈暮捲起句則吾黨田翁一聨亦可也題胡逸老致虛菴藏書萬卷可教子遺金滿籝常作災能與貧人共年穀必有明月生蚌胎山隨宴坐畫圖出水作夜窗風雨來觀水觀山皆得妙更將何物汙靈臺末句一作莫將世事侵兩鬢小菴觀靜鎖靈臺三四謂賑飢者必有後此理灼然五六竒句也亦近吳體又山谷永州題淡山巖前詩亦全是此體寒食張耒暗空無星雲抹漆邑犬吠野人履霜歲云暮矣風落木夜如何其斗插江屋頭眠雞正寂寂野縣嚴鼓先逄逄摩娑老面起篝火春色牀頭酒滿缸曉意城頭清角已三奏樹間眠鳩方一鳴風霜凄緊雁南向星河橫斜天左傾待旦枕戈無怨敵將朝盛服非公卿不如衲被䝉頭睡直至東窗海日生宛丘吳體二首皆頓挫有味窮而不怨蓋謫黃州時詩也聞徐師川自京師歸豫章謝逸九衢塵裏無停輈君居陋巷不出遊滿城惡少弋鳬雁對面故人風馬牛别後夢寒燈火夜歸來眼冷江湖秋馮歡老大食不飽起視八荒提蒯緱謝幼槃之兄也此吳體飲酒示坐客謝薖身前不吝作蟲臂身後何須留豹皮劬勞母氏生育我造物小兒經紀之牙籌在手彼為得塊石支頭吾所師偶逢名酒輒徑醉兒童拍手云公癡臨川謝薖字幼槃兄逸字無逸二人俱入江西詩𣲖此學山谷亦老杜吳體三四尤極詩之變態張子公召飲靈感院曽幾竹輿響肩櫓啞嘔芙蕖城曉六月秋露華猶泫草光合晨氣欲動荷香浮給孤獨園賴君到伊蒲塞供為我修僧窗各自占山色處處熏爐茶一甌茶山曾公學山谷詩有案上黃詩屢絶編之句此其生逼山谷然亦所謂老杜吳體也此體不獨用之八句律用為絶句尤佳山谷荆江亭病起十絶是也茶山有一絶云自公退食入僧定心與香字俱寒灰小兒了不解人意正用此時持事來深有三昧南山除夜薰風吹船落江潭日月除盡猶湖南百年忽已度强半十事不能成二三青編中語要細讀蒲團上禪須飽參兒時顔狀聽渠改瀟湘水色深挼藍合入時序詩中以其為拗字吳體近追山谷上擬老杜故列諸此次韻向君受感秋汪藻向侯拄笏意千里肯為俗彈頭上冠何時盛之青瑣闥妙語付以烏絲欄日邊人去雁行斷江上秋髙楓葉寒向來叔度倘公是一見使我窮愁寬翰林汪公彥章長於四六中興第一存詩不多此效吳體張禕秀才乞詩元注張舊與前輩名士往還甚衆呂本中白蓮菴中張居士夢斷世間風馬牛風塵表物自無意神仙中人聊與游澄江似趂北城曉苦雨不放南山秋君當先行我繼往勾吳東亭留小舟自山谷續老杜之脈凡江西𣲖皆得為此竒調汪彥章與吕居仁同輩行茶山差後皆得傳授茶山之嗣有陸放翁同時尤楊范皆能之乃後始盛行晚唐而髙致絶焉過三衢呈劉共父胡銓别離如許每引領邂逅幾何還著鞭微服過宋我何敢大國賜秦公不然衰鬢雕零已子後髙名崒嵂方丁年即看手握天下砥山中宰相從雲眠元注豫自兵侍罷歸從三衢城外遵陸以兩夫肩籃輿太守劉共父謂豫云兩夫肩輿甚似微服過宋因作此戲簡效吳體淡菴名銓字邦衡上書乞斬秦檜坐謫嶺外及海外二十餘年檜死乃移衡州孝廟時始召用至從官平生所作精核效吳體者甚多瀛奎律髓卷二十五

body:
  text: 瀛奎律髓卷四十九元方回編傷悼類有生必有死弔哭誄賻挽些哀詞所以盡倫理而亦忠信孝悌之天所固有也性情於此見焉交游以此重焉觀者不可以諱忌惡之五言十二首哭長孫侍御杜甫道為詩書重名因賦頌雄禮闈曾擢桂憲府舊一作近乘驄流水生涯盡浮雲世事空惟餘舊臺柏蕭瑟九原中此詩見郭知達黃鶴本哭孟郊賈島身死聲名在多應萬古傳寡妻無子息破宅帶林泉冢近登山道詩隨過海船故人相弔後斜日下寒天凡哭友詩當極其哀彼生而榮者雖哀不宜過也如孟郊之死三四所道人忍聞乎併尾句味之至矣弔孟協律才行古人齊生前品位低葬時貧賣馬遠日哭惟妻孤冢北邙外空齊中嶽西集詩應萬首物象遍曾題孟協律即郊也哭與弔相先後耳郊無子而唐史謂鄭餘慶廪其妻子豈後亦立鄷郢之子為子耶存疑當考哭皇甫七郎中湜白居易志業過𤣥晏詞章似襧衡多才非福祿薄命是聰明不是人間夀還留身後名涉江文一首便可敵公卿元注持正竒文甚多涉江一章尤出衆哭賈島姚合杳杳黃泉下嗟君向此行有名傳後世無子過今生新墓松三尺空階月二更從今舊詩卷人覔寫應爭島無子於此可見又有稚子哭勝猿之句疑島有子存此詩以證之松三尺月二更豫謂尚可改寄弔賈島曹松先生不折桂謫去抱何寃巳葬離燕骨難招入劒魂旅墳低却草稚子哭勝猿冥漠如搜句宜邀賀監論悼賈島有子勝孟郊賈島猶有子於此可考哭李頻員外出麾臨建水下世在公堂苦集休開篋清資罷轉郎瘴中無子奠嶺外一妻孀定是浮香骨東歸就故鄉李頻死於建州刺史五六哀之極矣南豐先生挽詞陳師道早棄人間事真從地上游丘原無起日江漢有東流身世從違裏功名取次休不應須禮樂始作後程仇精爽回長夜衣冠出廣庭勳庸留琬琰形像付丹青道喪餘篇翰人亡更典型侯芭才一足白首太𤣥經丘原無起曰江漢有東流惟曾南豐足以當之侯芭才一足白首太𤣥經非陳后山亦不可以此自許也併挽溫公詩三首他人詩皆可廢矣丞相溫公挽詞恭默思良弼詩書正百工事多違謝傅天遽奪楊公一代風流盡三師禮樂崇若無天下議惡美併成空百姓歸周老三年待魯儒世方隨日化身已要人扶玉几雖來晚明堂訖受圖心知愛諸葛終不羡曹蜍少學真成巳中年記著書輟耕扶日月起廢極吹噓得志寧論晚成功不願餘一為天下慟不敢愛吾廬世方隨日化身已要人扶山谷嘗誦此聯以為今之詩人無出陳無已右者溫公之卒后山猶未得官元祐元年丙寅九月也明年夏后山方為徐州教授三詩關宋治亂非后山之私言也七言七首過元家履信宅白居易雞犬喪家分散後林園失主寂寥時落花不語空辭樹流水無情自入池風蕩宴船初破漏雨淋歌閣欲傾欹前庭後院傷心事唯是春風秋月知元微之身後如此友宦官攻裴晉公所得幾何而竟以慚憤卒於武昌白公雖平生深交不忍言其短而亦可見矣寄劉蘇州去年八月哭微之今年八月哭敦詩何堪老淚交流日多是秋風搖落時泣罷幾回深自念情來一倍苦相思同年同病同心事除却蘇州更是誰清明登老閣望洛陽城贈韓道士風光烟火清明日歌哭悲歡城市間何事不隨東洛水誰家又葬北邙山中橋車馬長無已下渡舟航亦不閒冢墓纍纍人擾擾遼東悵望鶴飛還哭韓將軍顧非熊將軍不復見儀型笑語隨風入杳冥戰馬舊騎嘶引葬歌姬新嫁哭辭靈功勳客問求為志服玩僧收與轉經寂寞一家春色裏百花開落滿山庭工甚劉後村學唐詩慕為此等聲調而不能至也思王逢原王安石蓬蒿今日想紛披冢上秋風又一吹妙質不為平世得微言唯有故人知廬山南墮當書案湓水東來入酒巵陳迹可憐隨手盡欲歡無復似當時百年物望濟時功前路何如向此窮鷹隼奮飛凰羽短騏驎埋沒馬羣空中郎舊業無兒付康子才髙有婦同想見江南原上墓樹枝零落紙錢風挽陳師復寺丞二首取一劉克莊巳奏囊封墨尚新又携袖疏榻前陳小臣憂國言無隱先帝如天笑不嗔闕下舉幡空太學路傍卧轍幾遺民愚儒未解天公意偏壽他人天此人三四穩五六用事巧瀛奎律髓卷四十九

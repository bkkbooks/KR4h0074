body:
  text: 瀛奎律髓卷四十二元方回編寄贈類逺而有寄面而有贈有寄贈則有酬答不專取諛取詩律之精而已五言二十八首答李司户宋之問逺方來下客輶軒攝使臣弄琴宜在夜傾酒貴逢春駟馬留孤館雙魚贈故人明朝散雲雨遙仰德為鄰贈升州金陵也王使君忠臣李白六代帝王國三吳佳麗城賢人當重寄天子借髙名巨海一邊靜長江萬里清應須救趙䇿未肯棄侯嬴盛唐人詩氣魄廣大晚唐人詩工夫纎細善學者能兩用之一出一入則不可及矣此詩比老杜律雖寬而意不迫忝職武昌初至夏口書事獻府主竇鞏白髮放櫜鞬梁王舊愛全竹籬江畔宅梅雨病中天時奉登臨宴閒修上水船時人興謗易莫遣鶴猜錢此所謂府主乃元稹微之也元以故相為武昌節度固請友封為副戎除祕少兼中丞以往鶴者友封自謂也戲酬副使中丞見示四韻元稹莫恨暫櫜鞬交游幾箇全眼明相見日肺病欲秋天五馬虛盈櫪雙蛾浪滿船可憐俱老大無處用閒錢微之時為武昌節度檢校户部尚書未幾卒於任微之見寄與竇七酬唱之什本韻外加兩韻白居易旌鉞從櫜鞬賓僚情禮全夔龍來要地鴛鷺下寥天赭汗騎驕馬青娥舞醉仙合成江上作散到洛中傳窮巷能無酒貧池却有船春裝秋未寄漫道足閒錢合音閣樂天時為河南尹和此詩酬思黯戲贈鍾乳三千兩金叉十二行妬他心似火欺我鬢如霜慰老資歌笑銷愁仰酒漿眼看狂不得狂得且須狂元注思黯自云前後服鍾乳三千兩甚得力而歌舞之妓頗多來詩謔豫羸老故戲答之承竇七中丞見示初至夏口獻戎詩輒戲和云裴度出佐青油幕來吟白雪篇須為九臯鶴莫上五湖船竇詩自稱鶴兼云治船裝故也故態君應在新聲我亦便聞鄂州初教成謳者甚工元侯看再入好被暫留連晉公初為微之所忌微之在相位不一月而出晉公終以再入許之可謂德人君子矣和寄竇七中丞令狐楚仙吏秦蛾别新詩鄂渚來才推今八斗職賦舊三台雕鏤心偏許緘封手自開何年相贈答却得到中臺令狐楚時為吏部尚書和此詩以前任戶部尚書友封為當司員外郎故第四句所云如此觀此五言詩足見一時人物風流之盛過劉員外别墅皇甫曽謝客開山後郊扉水去通江湖千里别衰老一樽同返照寒川滿平田暮雪空滄洲自有趣不復哭途窮寄劉員外南憶新安郡千山帶夕陽斷猿知夜久秋草助江長鬢髮應成素青松獨見霜愛才稱漢帝題柱在田郎此所謂新安者唐之睦州今之嚴州今稱嚴為新定郡歙為新安郡在唐時二郡總亦稱新安喜皇甫侍御相訪劉長卿荒村帶晚照落葉亂紛紛古路無行客空山獨見君野橋經雨斷澗水向田分不為憐同病何人到白雲劉長卿詩細淡而不顯煥觀者當緩緩味之不可造次一觀而已也酬皇甫侍御見寄前相國姑臧公初臨郡離别江南北汀洲葉再黃路遙雲共水砧迥月如霜歲儉依仁政年衰離故鄉佇看宣政召漢法倚張綱第五句不涉風物未嘗不新酬包諫議見寄之什佐郡愧頑疏殊方親里閭家貧寒未度身老歲將除過雪山僧至依陽野客舒藥陳隨逺宦梅發對幽居落日棲梟鳥行人遺鯉魚髙文不可和空愧學相如包佶謫病寄詩此所和也敬酬李判官使院即事見呈岑參公府日無事吾徒只是閒草根侵柱礎苔色上門關映硯時見鳥卷簾晴對山新詩吟未足昨夜夢東還天寶年間詩皆如此飽滿送張南史一云寄李紓郎士元雨過深巷靜獨酌送殘春車馬雖嫌僻鶯花不厭貧蟲聲黏戶網鼠跡印床塵問道山陽㑹如今有幾人贈劉義姚合自君離海上垂釣更何人獨宿空堂雨間行九陌塵避時曽變姓救難似嫌身何處相期宿咸陽酒市春劉義豪俠之士嘗殺人亡命此詩殆義之真像也贈張質山人先生居處僻荆棘與牆齊酒好寧論價詩狂不著題燒成度世藥踏盡上山梯懶聽閒人語爭如谷鳥啼世間多怪人喜吟詩而不切者多有之贈姚合張籍病來辭赤縣案上有丹經為客燒茶竈教兒掃竹亭詩成添舊卷酒盡卧空瓶闕下今遺逸誰瞻隱士星寄孫沖主簿公低折滄洲簿無書整兩春馬從同事借妻怕罷官貧道僻收閒藥詩髙笑古人仍聞長吏奏表乞鎖㕔頻中四句賈浪仙相似姚武功未及也贈任懶未肯求科第深坊且隱居勝遊尋野客髙卧看兵書㸃藥醫間馬分泉灌逺蔬漢庭無得意誰擬薦相如中四句極工贈喻鳬方干所得非衆語衆人那得知才吟五字句又白幾莖髭月閣欹眠夜霜軒正坐時沉思心更苦恐作滿頭絲貽錢塘縣路明府志業不得力至今猶苦吟吟成五字句用破一生心世路屈聲逺寒溪怨氣深前賢多晚達莫怕鬢霜侵志業一作志學又白幾莖髭之聯與用破一生心之聯意相似而破字未佳中路寄喻鳬求名如未遂白路亦難歸送我樽前酒典君身上衣寒蕪隨楚盡落葉渡淮稀莫歎干時晚前心豈便非盡一作濶三四見晚唐詩人其貧如此永州寄翁靈舒徐照古郡百蠻邊蒼梧九㸃煙去家疑萬里歸計在明年風順眠聽角樓髙望見船筠州當半道長得秀詩篇第六句好眼前事但道著便新寄筠州趙紫芝推官府後巖巒衆何時訪古仙井甘鄰室共鐘逺雪風傳病去茶難廢詩多石可鐫蜀江春未動猶得緩歸船三四好投楊誠齊徐機名髙身又貴自住小村深清得門如水貧惟帶有金養生非藥餌常語盡規針四海為儒者相逢問信音三四佳寄酬葛天民翁卷常日已清癯那兼日未除傳來五字好吟了半年餘鐵柱天人觀梅花處士廬江湖正相隔歲晚更愁豫贈滕處士識君戎馬際今又十年餘環海才安息先生便隱居清風三畝宅白日一床書長是閒門掩鄰僧亦不如贈葛天民燕本昔如此清名千載垂誰將囊米施自拾束薪炊栁影連蓬閣湖波浸竹籬朝昏無别事只是欲吟詩寄幼安周信道我屋與君室濟河南北州相逢楚天晚却看蜀江流老境渾能迥妖氛竟未收何時一㕓地歸種故園秋信道與幼安俱濟南人故所作云爾詩意慷慨當阜陵之時思中原可也次韻和季長學正月二十八日出郊見寄之作宋祁雅俗傳祠日州人以二十八日祠保夀侯及唐杜丞相于崇真堂年華重宴辰初陽淡江霧小雨破街塵是日雨而不濘游人皆集客蓋浮輕吹齊刀儼後陳林芳催兔目原色換龍鱗壤路歌聲雜褠娼舞叠新持杯遍酬客唯缺眼中人寄外舅郭大夫陳師道巴蜀通歸使妻孥且舊居深知報消息不忍問何如身健何妨逺情親未忍疏功名欺老病淚盡數行書后山學老杜此其逼真者枯淡瘦徑情味深幽晚唐人非風花雪月禽鳥蟲魚竹樹則一字不能作九僧者流為人所禁詩不能成曷不觀此作乎贈翁卷劉克莊非止擅唐風尤於選體工有時千載事祗在一聯中世自輕前輩天猶活此翁江湖不相見才見又西東後村詩比四靈斤兩輕得之易而磨之猶未瑩也四靈非極瑩不出所以難後村晚節詩飽滿四靈用事冗塞小巧多風味少亦減於四靈也靈舒之死最後容續考書贈髙九萬并寄孫季蕃二首諸人凋落盡髙叟亦中年行世有千首買山無一錢紫髯長拂地白眼冷看天古道微如線吾儕各勉旃菊澗說花翁飄零向浙中無書上皇帝有句惱天公世事年年異詩人箇箇窮築臺并下榻今豈乏英雄髙九萬詩俗甚為老妓詩二首尤俗於後村孫季蕃老於花酒以詩禁僅為詞皆太平時節閒人也寄趙昌父趙師秀逃名逃未得幾載住章泉便使重承詔多應不議邊髙風時所係新集世方傳憶就江樓别雪晴江月圓末句全犯無可憶就西湖宿月圓松竹深然亦可喜贈賣書陳秀才四圍皆古今永日坐中心門對官河水簷依栁樹隂每留名士飲屢索老夫吟最感春燒盡時容借檢尋陳起字宗之睦親坊賣書開肆豫丁未至行在所至辛亥年凡五年猶識其人且識其子今近四十年肆燬人亡不可見矣寄新吳友人每於樓上立逺逺望新吳春至山疑長江空雨似無懷才人盡愛多病體常癯若治東游䇿舟行與子俱三四佳七言五十六首酬淮南牛相公述舊見貽劉禹錫少年曽忝漢庭臣晚歲空餘老病身初見相如成賦日尋為丞相掃門人追思往事咨嗟久喜奉清光笑語頻猶有登朝舊冠冕待公三日拂埃塵酬太原狄尚書見寄家聲烜赫冠前賢時望穹崇鎮化邊身上官銜如座主幕中談笑取同年幽并俠少趨鞭弭燕趙佳人奉管絃仍把天兵書號筆逺題長句寄山川寄李蘄州下車書奏龔黃課動筆詩傳鮑謝風江郡謳謡誇杜母洛陽歡㑹憶東公笛愁春盡梅花裏簟泠秋生薤葉中鄿州出好笛并薤葉簟不道蘄州歌酒少使君難稱與誰同夜宿江浦聞元八改官因寄此什君遊丹陛已三遷我泛滄浪欲二年劍佩曉趨雙鳯闕煙波夜宿一漁船交親盡在青雲上鄉曲遙拋白日邊若報生涯應笑殺結茅栽芋種畬田贈竇五判官韋渠牟故舊相逢三兩家愛君兄弟有聲華文輝錦綵珠垂露逸興江天綺散霞美玉自矜頻獻璞真金難與細披沙終須撰取新詩品更比芙蓉出水花渠牟自稱重表兄弟竇庠此詩極工酬謝韋卿甘五兄俯贈竇庠大賢持贈一明璫蓬蓽初驚滿室光埋沒劍中生紫氣塵埃瑟上動清商荆山璞在終應識楚國人知不是狂莫恨伏轅身未老㑹將筋力見王良此詩亦足以當渠牟之賜酬竇大閒居見寄房儒復來自三湘到五溪青楓無樹不猿啼名慚竹使宦情少路隔桃源歸思迷鵩鳥賦成知性命鯉魚書至恨暌攜煩君强著潘年比騎省風流詎可齊竇大者名常所寄詩後四句云蝸舍喜時春夢覺隼旟行處瘴江清新年且可三十二却笑情郎白髮生故有此答贈商州王使君張籍銜命南來㑹郡堂却思朝裏接班行才雄猶是山城守道薄初為水部郎選勝相留開客館尋幽更引到僧房明朝從此辭君去獨出商關路漸長同將作韋少監贈李郎中舊年同過水曹郎各罷魚符自楚鄉重著青衫承詔命齊趍紫殿異班行别來同說經過事老去相傳補養方憶得當時亦連步如今獨有讀書堂寄梅處士擾擾人間是與非官閒自覺省心機六行班裏身常下九列符中事亦稀市客慣曽賒賤藥家童驚見著新衣君今獨得居山樂應笑多時未便歸依韻和趙令畤陸陶山無事何妨數命賓一湖清境是西鄰栽花要與春為主對酒嗔將月借人詩就彩箋舒卷玉舞餘花碗倒垂銀由來景物常無價謾道錢多㑹有神贈别吳興太守中父學士蓬山仙子任天真乞領南麾奏疏頻金鎖闕邊辭黻座水晶宫裏約朱輸公庭事簡煩丞掾齊閣詩多泣鬼神莫為行春戀苕霅鑾坡揮筆待詞臣和開祖丹陽别子瞻後寄陳舜俞仙舟繫栁野橋東㑹合情多勞謫翁相對一樽浮蟻酒輕寒二月小桃風羇懷散誕謳歌裏世事縱橫醉笑中莫恨明朝又離索人生何處不匆匆陳舜俞字令舉嘉祐四年中制舉坐詆新法謫南康酒稅日與劉凝之遊遇赦不仕卒東坡祭文深痛之寒食中寄鄭起侍郎楊徽之清明時節出郊原寂寂山城栁映門水隔淡煙修竹寺路經疏雨落花村天寒酒薄難成醉地逈樓髙易斷魂回首故山千里外别離心緒向誰言中四句皆美而下聯世人尤傳次韻和內翰楊大年見寄李虛己鼇冠三峰碧海寬雲謠初下藹芝蘭探珠宫裏驪龍睡織錦機中彩鳯盤藥砌蒼苔錢作㸃粉牆修竹玉為竿閒從莊蝶親鳬舄曽得安期九轉丹三四頌楊文公所作如探珠織錦五六言翰苑景物又謂夢中親炙承神仙丹㸃化之力酷有崑體次韻和汝南秀才遊淨土見寄長松繫馬放吟鞭水殿沉檀一炷煙苔破閒階幽鳥立草芳深院老僧眠桃花欲放條風後茶蘂新供穀雨前衰㑹賞詩多狎客我無岐路近神仙三四甚佳虛己官至工侍初與曽致堯倡和致堯謂子之詩工矣而其音猶啞虛己惘然退而精思得沈休文浮聲切響之說遂再綴數篇示曽曽乃駭然歎曰得之矣豫謂此數語詩家大機括也工而啞不如不必工而響潘邠老以句中眼為響字吕居仁又有字字響句句響之說朱文公又以二人晚年詩不皆響責備焉學者當先去其啞可也亦在乎抑揚頓挫之間以意為脈以格為骨以字為眼則盡之將到都先獻樞密大尉相公宋祁再試州旟驗不才却將憔悴到中臺相車問罷同牛喘大厦成時與燕來守壽春日方聞爰立之拜今日謀猷須丙魏他年賓客但鄒枚西園聞道餘春在尚及花前灔灔杯和致政燕侍郎舟中寄晏尚書公自夀州換知陳州至是再入異時仙閣對三休頓首辭榮動邃旒疏廣故僚供祖帳鴟夷盡室付歸舟側階生玉懷歡宴燕壁圖山代逺遊新句漸髙塵纍少紫芝巖曲要相求此晏元憲公也送越州陸學士梅天霞破候旗乾鄉樹依然越絶間挾䇿當年逢掖去懷章此日繡衣還亭餘內史浮觴水路入仙人取箭山牛酒盛誇先墅宴不妨春詔得親班留别虞樞密王質太倉宇宙久陳陳合與英豪共挽新修造鳯樓須有手住持烏寺可無人千官禮絶三司貴一士歸心萬國春藉與八風吹六翮飛騰意度不無神劉後村續詩話云王質景文與王樞使公明詩云試看公出手毋謂我無人與虞丞相云寄身江漢歸無所開眼乾坤見有公甚雋快但下聯云修造鳯樓須有手住持烏寺可無人幾於自鬻矣寄蘇內翰劉季孫倦壓鼇頭請左符笑尋潁尾為西湖二三賢守去非逺六一清風今不孤四海共知霜鬢滿重陽曽插菊花無聚星堂上誰先到欲傍金鐏倒玉壺六一清風一聯已佳四海重陽一聯不唯見天下人共惜東坡之老又且開慰坡公隨時消息不必以時事介意也句律悲壯豪健人人能誦之次韻劉景文見寄蘇軾淮上東來雙鯉魚巧將詩信渡江湖細看落墨皆松瘦想見掀髯正鶴孤烈士家風安用此書生習氣未能無莫因老驥思千里醉後哀歌缺唾壺坡詩亦足敵景文三四徑健五六言景文家世壯烈而能詩氣象嵂屼未易攀也賈麟自睦來杭復將如蘇戲贈短句强至春風那解繫狂游朝醉桐江暮栁洲大手千篇隨地掃一身四海學雲浮榮名不落閒宵夢退築聊為歲晚謀老橘殘鱸猶有興片心還起洞庭舟强至幾聖餘杭人精於詩有祠部集此特其一耳和子瞻沿牒京口憶西湖出游見寄陳襄春隂漠漠燕飛飛可惜春風與子違半嶺煙霞紅斾入滿湖風月畫船歸緱笙一闋人何在遼鶴重來事已非猶憶去年題别處鳥啼花落客沾衣寄長沙簿孫明逺楊時陽城衰晚拙催科闔寢空慚罪已多祭竈請鄰君自適載醪祛惑我誰過猗猗庭倚蘭堪佩寂寂門無雀可羅歸去行尋溪上侣為投纓紱換漁簔楊公道學大儒詩其餘事此篇齊整元祐人句法也寄陳鼎張耒懶著青衫泥醉眠近來沽酒困無錢常憂送乏鄰僧米何啻寒無坐客氊直道謾慿詹尹卜浮生已付祖師禪祗因居士無醒日知有淵明種秫田元注陳新置九華田自號居士長句贈邠老衰疲坐甑極蒸噓念子柯山守舊廬盧叟今無僧送米董生時有吏徴租上書自薦心應恥扶䇿躬耕計未疏虎豹九關今肅穆王門行看曳長裾次韻李德載見寄頭顱幸獲免姦鋒甘分江湖守釣蓬老得一州聊自慰相望千里與誰同已欣臺省登羣俊猶數湖湘卧病翁元注謂二蘇公來書云及詩就醉餘頻走筆待觀雲海戲羣鴻次韻陳師道無已見寄曽文昭故人南北歎乖離忽把清詩慰所思松茂雪霜無改色雞鳴風雨不愆時著書子已通科斗竊食吾方逐鷽斯便欲去為林下友懶隨年少樂新知師道曽作尚書傳故云代祖父次韻酬羅君寶見贈廖剛蕭條門巷陋於顔老去青春僅得閒心畫傳家無計䇿手談留客漫機關靜思往事千年上俯歎勞生一夢間多謝光臨無别意為聞流水與髙山廖剛字用中南劍州順昌人崇寧五年進士仕至尚書方曽大母八九十時陳了翁為其世綵堂詩後達髙廟乙覽此代祖父次韻細潤有集曰髙峰寄靈仙觀舒職方學士楊億緑髮郎潛不記年却尋丹竈味靈篇華隂學霧還成市彭澤橫琴豈要絃曉案祗因餐沆瀣夜灘誰見弄潺湲須知吏隱金門客待乞刀圭作地仙又錢惟演方瞳𤣥髮粉為郎絳闕齊心奉紫皇徴士髙懷雲在嶺騷人秋思水周堂閒園露草開三徑靈宇華燈燭九光知有美田堪種玉幾時春渚逐歸艎又劉筠石渠仙署久離羣抗跡丹臺世絶倫楊子不甘嘲尚白漆園終許自全真紫煙深處鸞雙舞朱髓成來鳥共伸若向雲中見雞犬可能渾望姓劉人答內翰學士舒雅清貴無過近侍臣多情猶隱舊交親金蓮燭下裁詩句麟角峰前寄隱淪和氣忽飄燕谷暖好風隨起謝庭春緘藏便是山家寶留與兒孫世不貧寄荆南故人章冠之餘生自拚一虛舟未害尋詩慰客愁梅欲飄零猶醖藉栁才依約已風流關心弟妹無黃犬入夢江湖有白鷗别後故人相念否東風應倚仲宣樓和趙宣二首胡寅遍游南北與西東欲訪人間國士風處世甚疏皆笑我宅心無纍獨竒公詩才自愧非三上酒聖相從又一中芍藥待開應且住莫令清賞轉頭空冠月裾雲佩緑霞百年將此送生涯愁心别後無詩草病眼燈前有醉花落筆擅場聊寫意背山臨水遂成家也須南畝多栽秫休似東陵只種瓜致堂先生大手筆讀史管見崇正辨之餘成此詩耳贈胡衡仲楊萬里風騷堂上徑雄趨不作俳辭笑已乎紙落煙雲春醉旭氣含蔬笋薄僧殊夜來霜月千家滿雨後風埃半㸃無安得與君幽討去一觴一詠惱西湖當改以用二僧事也嚴州贈姜梅山陸游故人玉骨已生苔謂南澗公晚與君游亦樂哉湖寺繫舟無夢去京塵馳騎有詩來醉中不敢教兒誦看處常須盥手開彈壓風光須健筆相期力斡萬鈞回放翁為嚴州姜特立在婺以詩寄之故有此作五六佳寄姜梅山雷字詩章臺官栁映宫槐寶馬蹄輕不動埃只怪好詩無與敵誰知古學有從來江山常逐客帆逺歲月不禁衙鼓催剩約東鄰投淨社髙情千載友宗雷三四乃教人作詩之法不可强揠必有本者如是和陸放翁見寄姜特立遙知三徑長荒苔解組東歸亦快哉津岸紛紛羣吏去船頭衮衮好山來平時佳客應相過勝日清樽想屢開若許詩篇數還往直須共挽古風回此姜特立答和放翁詩三四佳陸集並無姜詩和陸郎中放翁午庭風雨撼髙槐一洗城頭十丈埃老子坐間尋句好故人門外寄詩來徑鋒久服穿楊妙鈍思深慚擊鉢催清佩左符君未可要聽吟思發春雷此放翁為禮部時倡和詩也寄汪尚書五十年間歎濶疏相忘兩地復江湖書來筆底驚强健詩去吟邊想步趨好對青山看歌舞莫嫌紅粉笑髭鬚鳯毛已有哦松韻尚記金華舊範模五六出竒不可束縛和姜梅山見寄汪大猷投分雖深迹却疏君居東婺我西湖兒曹方喜承毛檄父執應容效鯉趨慨念舊遊多宿草舊同官六十餘人今唯大猷與公獨存僅餘二老見霜鬚詩來喚起相思夢又向梅山得楷模此尚書汪公酬姜之詩五六亦老筆答山谷先生髙荷四篇詩得裊蹄金妙㫖初臨法語尋要我盡除兒子氣知公全用老婆心平章許事真難可付囑斯文豈易任感激面東垂涕泗髙山從此少知音髙荷子勉江陵人五言律三十韻贄見山谷中有曰蜀天何處盡巴月幾回彎㸃檢金閨彥飄零玉筍班尚全宗廟器猶隔鬼門關山谷賞之遂知名和山谷六言皆佳蠟梅絶句尤竒和王子豫章華碑有云威强九鼎懼喪亂一臺成亦可喜後知涿州卒詩入江西派芍藥詩云勃興連穀雨閏位次花王春盡詩云佳人鬭草百稚子擊毬雙謁馬中玉云辨雖豪白馬讒亦困青蠅皆可取寄文潛無咎少游三學士陳師道北來消息不真傳南度相忘更記年湖海一舟須此老蓬瀛方丈自非仙數臨黃卷聊遮眼穩上青雲小著鞭李杜齊名吾豈敢晚風無樹不鳴蟬元祐初朝張俱召試入館后山於二年四月始得官故進二公於富貴而猶欲其驟進也青雲小著鞭本白樂天贈乃兄詩語也寄秦州曽侍郎八年門第故違離千里河山費夢思淮海風濤真有道麒麟圖畫豈無時今朝有客傳何尹是處逢人說項斯三徑未成心已具世間惟有白鷗知寄侍讀蘇尚書六月西湖早得秋二年歸思與遲留一時賓客餘枚叟在處兒童說細侯經國向來須老手有懷何必到壺頭遙知丹地開黃卷解記清波沒白鷗此規東坡以進用不已恐必有後患也乃是潁州召入時後又有寄送定州蘇尚書詩亦云海道無違具一舟君子愛人以德如此贈田從先衣冠魯國動成羣憂患相從只有君落筆如流寧蹈襲行前應敵却紛紜愧非伏老成和伯喜有侯芭守子雲意氣有餘工用少相忘千里定能勤晚唐詩諱用事然前輩善作詩者必善於用事此於師弟子間引兩事用之有何不可贈王聿修商子常欲作新詩挑兩公含毫不下思無窮貪逢大敵能無懼强畫修眉每未工長病忍狂妨痛飲晚雲朝雨滯晴空正須好句留春住可使風飄萬㸃紅能字每字乃是以虛字為眼非此二字精神安在善吟詠古詩者只㸃掇一二好字髙唱起而知其用力著意之地矣贈漳州守綦叔厚陳與義過盡蠻荒興復新漳州畫㦸擁詩人十年去國九行旅萬里逢公一缺伸王粲登樓還感慨紀瞻赴召欲逡巡繩床相對有今日賸醉齊中軟腳春寄德升大光君王優詔起羣公也置樵夫尺一中易著青衫隨世事難將白髮犯秋風共談太極非無意能繫蒼生本不同却倚紫陽千丈嶺遙瞻黃鵠九霄東鵝湖示同志陸九齡孩提知愛長知欽古聖相傳只此心大抵有基方築室未聞無址可成岑留情傳注翻榛塞著意精微轉陸沉珍重友朋勤切琢須知至樂在於今復齊先生陸公九齡字子壽撫州金溪人父賀生六子公居第五乾道四年由太學第進士初授桂陽教改興國教以憂去尋調全州教未上卒淳熙七年九月也年四十九其生紹興四年甲寅少文公四歲文集共有詩十一首云和鵝湖教授韻陸九淵墟墓興哀宗廟欽斯人千古不磨心涓流積至滄溟水拳石崇成太華岑易簡工夫終久大支離事業竟浮沉欲知自下升髙處真僞先須辨只今象山先生陸公九淵字子靜行居第六乾道八年進士東萊吕成公為考官實識其文初授靖安簿丁憂再調崇安簿擢國子正敕令所刪定官將作監丞後省疏駁與祠光宗初除知荆門軍紹興二年九月至郡三年十二月卒年五十四其生紹興九年己未少文公九歲文集共有詩二十三首本集及朱文公年譜末句並作真僞先須辨只今鄭景龍江湖詩續選作真僞先須辨古今恐當以集本為正按陸氏兄弟之學在求其本心而已人之心本善無不善其所以不善者非本心也孟子之說亦如此故子壽詩起句云孩提知愛長知欽古聖相傳只此心子靜亦云墟墓興哀宗廟欽斯人千古不磨心此皆指其心之本然者以示人也然聖賢所言正心養心存心操心於以維持防間夫此心者非一端也是故大學以致知格物在誠意之先而誠意又在乎正心之先心之所以必得其正者其道由此而陸氏兄弟徑去此一段不復於此教人用力特以為一悟本心而可以為聖賢今日愚夫也而一超直入悟此心之本善則堯舜在是矣故吾朱文公非之不以二陸為然次韻朱熹德義風流夙所欽别離三載更關心偶扶藜杖出寒谷又枉籃輿度逺岑舊學商量加邃密新知培養轉深沉却愁說到無言處不信人間有古今朱文公徽州婺源人父松吏部郎官季父柳橰以建炎四年庚戌九月甲戌生於尤溪慶元六年庚申三月甲子卒年七十一十一月葬建陽縣唐石大林谷壻黃幹為行狀門人李方子為編年至蔡謨為年譜益詳按年譜淳熙二年乙未夏五月東萊吕公來訪講學於寒泉精舍留止旬日餞東萊至鵝湖陸九齡子壽九淵子靜劉清之子澄來㑹相與講其所聞二陸俱執已見不合而罷又曰鵝湖辨論今無所考按是時子壽有詩云云文公和云云子靜和云云以詩觀之則學之同異亦可見矣其後子壽頗悔其非而子靜則終身守其說不變按淳熙乙未朱文公年四十六歲陸子壽四十二歲子靜三十七歲東萊三十九歲劉子澄候考子靜是時以年少英鋭之氣肆其唐突兄弟二詩詞意皆頗不遜公然詆文公為榛塞陸沉又曰支離事業竟浮沉而文公和之詞意渾厚以邃密深沉奬借之冀其自悟而二陸根本禪佛之學不能從也又子壽詩題云鵝湖示同志且文公年為二陸之長仕宦輩行蓋亦在先而云示同志亦可謂僣而不謙矣此事天下後世知二陸之非而江西學者相與掩諱是不可不拈出垂世此乃吾道學問一大機括也二陸自不當以詩人責之二詩三四止是一意詩家之所不取非如三百五篇言之不足故詠歌之一意而三申者也寄趙昌父劉克莊世上久無遺逸禮此翁白首不彈冠一生官職監南嶽四海詩盟主玉山經歲著書人少見有時入郭俗爭看何因樵服供薪水得附髙名野史間寄韓仲止昨仕京華豪未減脫鞾不問貴游嗔詩家爭欲推盟主丞相差教作散人閉户自為千載計入山又忍十年貧幾思投老從公去背笈攜琴澗水春贈陳起陳侯生長紛華地却似藝香自沐薰錬句豈非林處士鬻書莫是穆參軍雨簷兀坐忘春去雪屋清談至夜分何日我閒君閉肆扁舟同泛北山雲此所謂賣書陳彥才亦曰陳道人寶慶初以秋雨梧桐皇子府春風楊栁相公橋詩為史彌逺所黥詩禍之興捕敖器之劉潜夫等下大理獄鄭清之在瑣闥止之豫及識此老屢造其肆别有小陳道人亦為賈似道編管瀛奎律髓卷四十二

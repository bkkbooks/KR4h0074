body:
  text: 瀛奎律髓卷十三元方回編冬日類虛谷曰日南至為一陽之復以之首節序之選冬難賦莫難於雪已特為之類矣寒跧沍役興雜感殊著于此五言三十四首初冬杜甫垂老戎衣窄歸休寒色一作氣深漁舟上急水獵火著髙林日有一作往習池醉愁來梁父吟干戈未偃息出處遂何心此工部為參謀成都時作垂老戎衣窄所以自痛也習池醉梁父吟山簡非得已而醉諸葛又何為而吟皆所以痛時世也孟冬殊俗還多事方冬變所為破柑霜落爪嘗稻雪翻匙巫峽寒都薄烏蠻瘴逺隨終然減灘瀨暫喜息蛟螭此夔州詩三四兒童亦能誦也刈稻了詠懷稻穫空雲水川平對石門寒風疏草木旭日散雞豚野哭初聞戰樵歌稍出村無家問消息作客信乾坤三四乃詩家句法必合如此下字則健峭後四句亦惟老杜能道之也過劉員外别墅皇甫曾謝客開山後郊扉去水通江湖千里别衰老一樽同返照寒川滿平田暮雪空滄洲自有趣不復哭途窮本屬郊野以其所賦皆冬景也附諸此詩律平穩碧澗别墅喜皇甫侍郎相訪劉長卿荒村帶返照落葉亂紛紛古路無行客空山獨見君野橋經雨斷澗水向田分不為憐同病何人到白雲劉隨州號五言長城答皇甫詩如此句句明潤有韋蘇州之風他詩為嘗貶謫多凄怨語冬日後作裴説寂寞掩荆扉昏昏坐欲癡事無前定處愁有併來時日影才添線鬢根已半絲明庭公正道應許苦心知一作詩冬日糲食擁敗絮苦吟吟過冬稍寒人却健太飽事多慵樹老生煙薄牆隂貯雪重安排只如此公道會相容兩詩皆冬至詩前詩三四佳後詩三四尤佳乃應破首句所謂糲食敗絮有針線不茍作也第五句樹字疑作厨則與下句尤稱初冬早起寄夢得白居易起戴烏紗帽行披白布裘爐溫先暖酒手冷未梳頭早景煙霜白初寒鳥雀愁詩成遣誰和還是寄蘇州白詩由衷故勝微之冬夕寄清龍寺源公僧無可斂屨入寒竹安禪過漏聲髙杉殘子落深井凍䀶生罷磬風枝動懸燈雪屋明何當招我宿乘月上方行三四極天下之清苦荆公選誤作郎士元非也雪晴晚望賈島倚杖望松雪溪雲幾萬重樵人歸白屋寒日下危峰野火燒岡草斷煙生石一作古松却回山寺路聞打暮天鐘晚唐詩多先鍛景聯頷聯乃成首尾以足之此作似乎一句唱起直説至底者燒字讀作去聲乃與下句叶冬日書事魏野十月天不暖前村到豈能間聞啄木鳥疑是打門僧壞砌平山雪空堂照瀑冰晚來因出户方始暫攜藤四句竒絶山村冬暮林逋衡茅林麓下春氣已微茫雪竹低寒翠風梅落晚香樵期多獨往茶事不全忙雙鷺有時起橫飛過野塘第六句尤佳嵗晚王安石月映林塘淡風含笑語涼俯窺憐緑淨小立佇幽香攜幼尋新菂扶衰上一作坐野航延緣久未已嵗晚惜流光漫叟詩話謂荆公定林後詩律精深華妙此作自以比靈運豫以為一唱三歎之音也次韻朱昌叔嵗暮城雲漏日晚樹凍裹春深槮密魚難暖巢危鶴更隂橫風髙彍弩殘溜細鳴琴嵗換兒童喜還傷老大心漏字裹字詩眼突如其光也深字尤好積柴水中取魚曰槮所感切嵗暮書事張耒風捲塵沙白雲垂雪意凝夜山時呌虎晚市早收燈園栗炮還美村醪醉不能三年官况味真是冷於冰三四壯而哀寒意鄭剛中嶺南霜不結風徑是霜時日落晚花瘦山空流水悲棲鴉尋樹早凍蟻下窗遲季子家何在衣單知不知北山鄭剛中字亨仲婺女人南渡前探花後至四川宣撫有方略秦檜忌之謫歿封州冬日詩起句最佳風徑即知其為霜時而實不結霜豫生於是邦先君以廣西經幹被誣劾卒於是邦亦有詩而泯於火家集不傳今選鄭公之詩於斯所以寄豫懷而紓無窮之悲也北山集佳句甚多豫已别為之跋陳簡齋嘗同窗云舍北搖落景物殊佳偶作五首陸遊今年冬候晚仲月始微霜野日明楓葉江風斷雁行窮途多籍躪老景易悲傷自笑詩情懶蕭然舊錦囊路擁新霜葉溪餘舊漲沙棲烏初滿樹歸鴨各知家世事元堪笑吾生固有涯南村聞酒熟試遣小童賖小聚鷗沙北橫林蟹舍東船頭眠醉叟牛背立村童日落雲全碧霜餘葉半紅窮鱗與倦翼終勝在池籠屋角成金字溪流作縠紋斜通小橋路半掩夕陽門孤艇衝煙過疏鐘隔塢聞杜門非獨病實自厭紛紛草徑人稀到柴扉手自開林疏鴉小泊溪淺鷺頻來簷角除瓜蔓牆隅斸芋魁東鄰膰肉至一笑舉新醅放翁所謂筆端有口新冬野景搜抉無遺屋角成金字本出北史斛律金傳以對溪流作縠紋亦竒殘臘殘臘無多日吾生又一年林塘明夕照墟落淡春煙山色危欄角梅花緑酒邊嵗時元自好老病獨凄然五六壯麗冬日感興十韻戊午雨露天昏曀陂湖地阻深蔽空鴉作陳暗路棘成林有客風埃裏頻年老病侵夢魂來二豎相法欠三壬舊憤開孤劍新愁感斷砧唐衢惟痛哭莊舄正悲吟瘦跨秋門馬寒生夜店衾但思全舊璧敢冀訪遺簪樓上蒼茫眼燈前破碎心長謡傾濁酒慷慨厭層隂三壬二豎秋門夜店舊璧遺簪皆工之又工初寒獨居戲作開殼得紫栗帶葉摘黃柑獨卧維摩室誰同彌勒龕宗文杜子美之子樹雞柵靈照龎居士之女挈蔬籃一段無生話燈籠自可談稍涉變體新異湖堤晚步葛天民照影憐寒水關情奈夕陽雪慳天欠冷年近日添長好句誰相寄浮生各自忙有心聊頓放無事可思量和翁靈舒冬日書事三首徐照石縫敲氷水凌寒自煮茶梅遲思閏月楓逺誤春花貧喜苗新長吟憐鬢已華城中尋小屋嵗晚欲移家思字誤字當是推敲不一乃得之秀句出寒餓從人笑我清步溪波逐影吟竹鳥譍聲酒裏安天運春邊見物情耕桑猶罄槖何事可營生十日南山雪今朝又北風燒衝巖石斷梅映野堂空難語傷時事無成愧老翁一生吟思味獨喜與君同冬日登富覽亭翁卷未委海潮水往來何不間輕煙分近郭積雪蓋遙山漁舸汀鴻外僧廊島樹間晚寒難獨立吟竟小詩還翁靈舒學晚唐中四句工但俱詠景物而已尾句亦只説寒難獨立吟詩而還無逺味也一室宋自遜一室冷如氷梅花相對清殘年日易晚夾雪雨難晴身計繭千緒世紛棋一枰麯生差解事談笑破愁城壺山宋自遜字謙父本婺女人父子兄弟皆能詩而謙父名頗著賈似道賄以二十萬楮結屋南昌詩篇篇一體無變態此詩三四好五六涉爛套也他如酒熟渾家醉詩成逐字評亦佳但近俗耳快哉亭朝寓目賀鑄風起喜舒曠徑趍城上樓初暘動禾黍積雨失汀洲水牯負鴝鵒山樞懸栝蔞坐慚真隱子物我兩悠悠此下四首當入晨朝類後晨朝類戴式之以下四首當列于此觀後卷注自明快哉亭有三處曰彭城曰黃岡曰東武彭城黃岡皆東坡命名而東武者乃東坡自造此事見子由詩中賀公今詩乃彭城快哉亭也水牯負鴝鵒即蘇邁詩中牛戴寒鴉過别村也山樞懸栝蔞即昌黎詩黃團繫門衡也但變化不一耳蒙城早行王之道殘月千家閉荒城萬木號舉頭華蓋近回睇啓明髙野迥霜迎面風清冷透袍十年河上路從此步金鼇相山居士王之道字彥猷無為軍人宣和六年進士建炎中保山寨攝鄉郡尋以議和忤檜晚起漕湖南子蕭藺此詩三四新異早行詩難得佳者蒙城在應天府乃汴河西上入京路也早行僧惠洪失枕驚先起人家半夢中聞雞憑早晏占斗辨西東轡濕知行露衣單怯曉風秋陽弄光影忽吐半林紅歐公詩有夜江看斗辨西東此句似落第二然五言簡亦勝七言山谷集有此詩甘露滅集亦有之谷集為覺恐非晨起陸遊晨起梳頭懶披衣立草堂霧昏全隱樹氣暖不成霜灘急回魚隊天低襯雁行新春猶一月已覺日微長五六下二字眼工七言二十首十二月一日三首杜甫今朝臘月春意動雲安縣前江可憐一聲何處送書雁百丈誰家上瀨船未將梅蕊驚愁眼更取椒花媚逺天明光起草人所羡肺病幾時朝日邊寒輕市上山煙碧日滿樓前江霧黃負鹽出井此溪女打鼓發船何郡郎新亭舉目風景切茂林著書消渴長春花不愁不爛漫楚客唯聽棹相將即看燕子入山扉豈有黃鶯歷翠微短短桃花臨水岸輕輕柳絮點人衣春來準擬開懷久老去親知見面稀他日一杯難強進重嗟筋力故山違此三詩張文潛集中多有似之者氣象大語句熟雖或拗字近吳體然他人拘平仄者反不如也末篇見得峽中春攙臘而至不特閩廣間野望金華山北涪水西仲冬風日始凄凄山連越巂郡名悉委切蟠三蜀水散巴渝下五溪獨鶴不知何事舞飢烏似欲向人啼射洪縣名春酒寒仍緑目極傷神誰為攜西山白雪三城戍南浦清江萬里橋海內風塵諸弟隔天涯涕淚一身遙惟將遲暮供多病未有涓埃答聖朝跨馬出郊時極目不堪人事日蕭條兩野望詩地不同而同是冬日故選入此格律髙聳意氣悲壯唐人無能及之者戊申嵗暮詠懷二首白居易窮冬月末兩三日半百年過六七時龍尾趂朝無氣力牛頭參道有心期榮華外物終須悟老病傍人豈得知猶被妻兒教漸退莫求致仕且分司唯生一女才十二祇欠三年未六旬婚嫁纍輕何怕老飢寒身慣不憂貧紫泥丹筆皆經手赤紱金章盡到身更擬踟蹰覔何事不歸嵩洛作間人言言能道心事豫年五十七嵗選此詩深愧之是嵗太和二年繚垣王安國繚垣烏鵲近人飛簾外曈曈日上遲檜作寒聲風過夜梅含春意雪殘時古今無物為真樂出處何心更詭隨寄語年華聊一笑未應長負醉鄉期三四景五六情規格整齊議論慷慨爽快次韻樂文卿故園陳與義故園歸計墮虛空啼鳥驚心處處同四壁一身長客夢百憂雙鬢更春風梅花不是人間白日色爭如酒面紅且復髙吟置餘事此生能費幾詩筒此詩似新春冬末之作十月十月天公作許悲負霜鴻雁不停飛莽連萬里雲山去紅盡千林秋徑歸病夫搜句了節序小齋焚香無是非睡過三冬莫開户北風不貸芰荷衣簡齋詩獨是格髙可及子美和李上舍冬日書事韓駒北風吹日晝多隂日暮擁階黃葉深倦鵲繞枝翻凍影飛鴻摩月墮孤音推愁不去如相覔與老無期稍見侵顧籍微官少年事病來那復一分心三四極工五六前輩有此語但鍛得又佳耳十月一日曾幾屋角羲娥轉兩輪今朝水帝又司辰山家嘗稻知良月野徑尋梅見小春一嵗坐看除得盡百年正與死相鄰誰能思許無窮事閉閣開爐但飲醇三四切題是十月一日詩不可改用且看他第七句如何下海雲回接騎城北時吐蕃出沒大渡河水上范成大古渡風沙卷夕霏小江煙浪皺春漪天於麥隴猶慳雪人向梅梢大欠詩頓轡青驪飛脫離弦白羽笑寒鴟牙門列校俱慓鋭檄與河邊秃髮知淳熙四年丁酉至能帥蜀十一月十日海雲賞山茶回作此詩人向梅梢大欠詩佳句也豫選詩不甚喜富貴功名人詩亦不甚喜詩之富艷華腴者其人富貴而其詩髙古雅淡如選此篇以有此聯佳句耳用韻詠雪簡湘中諸友陳傅良夾湘而往一塵無不在瑶池在石渠氣蓋松篁誰與競令行螟螣自相屠山光際水天無間夜色通朝月不如中有一翁鬚皓白蕭然野鶴亦乘車陳止齋傅良字君舉漕湖南時作詠雪詩今選二首入冬日亦足以見乾淳以來一時文獻之盛止齋雖専以文名而詩亦健浪如此再用喜雪韻瘴雨蠻煙此後稀童山亦與借餘輝爭看狂稚相呼喚下啄飢烏自匹妃苦乏貂裘堪夜永喜無蝝子著冬飢興來那向一作况山隂客為我扁舟倚石磯冬晴日得間遊偶作陸遊不用清歌素與蠻間愁已自解連環閏年春近梅差早澤國風和雪尚慳詩思長橋蹇驢上棋聲流水古松間箋天有事君知否止乞柴荆到死間五六天成冬晴間步東村由故塘還舍紅藤拄杖獨相羊路繞東村小嶺傍水落枯萍黏蟹椴鄉人植竹以取蟹謂之蟹椴雲開寒日上魚梁洛陽二頃言良是光範三書計本狂歷盡危機識天道要令間健返耕桑五六善用事蟹椴一句新十二月八日步至西村臘月風和意已春時因散䇿過吾鄰草煙漠漠柴門裏牛迹重重野水濱多病所須惟藥物差科未動是間人今朝佛粥爭相餽更覺江村節物新三四古淡五六集句體亦天成也十一月五日晨起書呈葉德璋司法趙蕃卧聞落葉疑飄雨起對空庭蓋卷風政自摧頽同病鶴况堪吟諷類寒蟲忽思有客渾如我却念題詩不似公已分虀鹽終白首可因霜雪愧青銅讀此詩句句是骨非晚唐裝點纖巧之比上四和末云既欲紛紛視兒子何須衮衮羡諸公尤髙亢下視一世也次韻葉德璋見示窮冬未省見梅班故里何由投竹安歸意寧須卜以決衰顔不待鏡頻看交情謝子來今雨節物娛豫後苦寒獨苦更憐終漫興不如骫骳得天歡卜以決鏡頻看此聯已竒來今雨後苦寒此聯又竒詩骨聳東野此之謂歟瀛奎律髓卷十三

body:
  text: 瀛奎律髓卷四十元方回編兄弟類七言七首喜敏中及第偶示所懷白居易自知羣從為儒少豈料詞場中第頻桂折一枝先許我楊穿三葉盡驚人轉於文墨須留意貴向煙霄早致身莫學我兄年五十蹉跎始得掌絲綸敏中新授户部員外郎西歸千里歸程三伏天官新身健馬翩翩行衝赤日加餐飯上到青雲穩著鞭長慶老郎唯我在客曹故事望君傳前鴻後雁行難續相去迢迢二十年送二十兄還鎮江李處權此行檢校幽棲事佳處知公故未忘新笋豈應過母大舊松想已及人長老來對客須靈照貧後持家藉孟光世亂身危何處是二年孤負北窗涼李處權字巽伯洛陽人邯鄲公淑之後有嵩庵集宣和間與陳叔易朱希真以詩名南渡後嘗領三衢布作髙陽臺衆樂園成被命與金陵易地兄弟待罪侍從對更方面實為私門之慶走筆寄子開弟曽布樓臺丹碧照天涯塞北江南未足誇千里煙波方種栁萬株桃李未開花一麾同下西清路兩鎮髙迎上將牙回首林塘莫留戀風光還屬阿連家肇謹次元韻曽肇文物河間信可嘉風流江左亦堪誇水南水北千竿竹山後山前二月花久愧迂儒懷郡紱聊須雋老駐軍牙兩州耆舊無多怪魯衛從來是一家此事古今希有曽布子宣守髙陽弟肇子開守金陵兩易將吏交迎送於途誠盛事也後子宣相子開當制尤盛事也又其後居京口先後一日卒惜子宣為小人之相示長安君王安石少年離别意非輕老去相逢亦愴情草草杯盤供笑語昏昏燈火話平生自憐湖海三年隔又作塵沙萬里行欲問後期何日是寄書應見雁南征宋匪躬太祝先輩示及劉貢父伯仲三人同年登第之詩因奉一篇王安國六朝文物事當竒閥閲如今舉世推射䇿人爭看三虎薦書吾早識孤罷集英曉日臚傳後瓊苑春風宴喜時共羡絲綸歸世掌還開驂隔鳯凰池元注太祝京西第一薦時豫為考官瀛奎律髓卷四十

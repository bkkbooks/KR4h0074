body:
  text: 瀛奎律髓巻三十三元方囘編山巖類登覽詩專取登髙能賦之義山巖則不但登覽大嶽崇嶺小丘幽洞崖巖磴石之遊戲皆聚此五言十二首望終南竇牟日愛南山好時逢夏景殘白雲兼似雪清晝乍生寒九陌峯如墜千門翠可團欲知形勢盡都在紫宸㸔長安宫殿正對終南山此詩得其要領晚晴見終南别峯賈島秦分積多峰連巴勢不窮半旬藏雨裏此日到窗中圓魄將昇兎髙空欲呌鴻故山思不見碣石泬寥東遊茅山杜荀鶴步步入山門仙家鳥徑分漁樵不到處麋鹿自成羣石面迸出水松梢穿破雲道人星月下相次禮茅君遊華山張超谷魯交太華鎻深谷我來真景分有苖皆是藥無石不生雲急瀑和煙㵼清猿帶雨聞幽棲未忍别峰半日將曛三四好但此等句法多相犯巫山髙李端巫山十二峰皆在碧空中迴合雲藏月霏㣲雨帶風猿聲寒過澗樹色暮連空愁向髙唐去清林見楚宫工而穏和永叔新晴獨過東山丁元珍芳辰百五前選勝到林泉萬樹綠初染羣花紅未然陰巖猶貯雪暖谷自生煙婦汲溪頭一作中水人耕草際田日中林影直風靜鳥聲圓健令多情甚尋春最占先元珍前為六一翁所知詩甚工夀昌道中翁巻清遊從此起過處必須㸔背日山梅痩隨潮海鴨寒平途迷望濶峻嶺疾行難聴得居人説今年冬又殘此遊雁宕山詩也石門庵山到極深處石門為地名嵐蒸空寺壞雪壓小庵清果落羣猴拾林昏獨虎行一僧何所得髙坐若無情遊雁宕山中選此二首此一首不減唐人遊山陸游簫鼔湖山路天教脱馽鞿蟬聲入古寺馬影渡荒陂樵唱時傾耳僧談亦解頤偏門燈火閙不敢恨歸遲元註偏門㑹稽城西南門名古寺不來久入門空歎嗟僧亡惟見塔樹老巳無花世事雖難料吾生固有涯殷勤一梳月十里伴還家所㸃兩聨前一聨眼前事耳而詩家自難道後一聨却易道也學者自當審知巢山巢山避世紛身隠萬重雲半谷傳樵響中林過虎羣蟲鎪葉成篆風蹙水生紋不踏溪橋月仙凡自此分第二句好五六工短髪巢山客人知姓字誰穿林雙不借取水一軍持渇鹿羣窺澗驚猿獨掛枝何曽蓄筆硯景物自成詩雙不借一軍持詩家多相犯不可蹈襲第七句好七言六首天竹寺殿前立石姚合補天殘片女媧抛撲落禪門壓地坳霹靂劃深龍舊攫屈盤痕淺虎新抓苔黏月眼風挑剔塵結雲頭雨磕敲秋至莫言長屹立春來自長薜蘿交此詩未委今在天竺何處押險韻而加以剜剔之工殆亦戲筆第一句最好山中書事方干欹枕亦吟行亦醉卧吟行醉更何營貧來猶有故琴在老去不過新髪生山鳥踏枝紅果落家童引釣白魚驚潛夫自有孤雲侣可要王侯知姓名香山詹中正浪兀孤舟一葉輕香山登步覺神清幾多怪石全勝畫大半竒花不識名猿狖盡當吟裏見煙霞祗向眼前生官身未約重來此酒滿螺盃月正明全似樂天幾多大半字雖俗而不覺俗以秤停恰好也遊雲際山在福建邵武府光澤縣陳洙清曉捫蘿踏嶺雲寒風飛溜濕衣巾上攀霄漢無多地直視城闉幾㸃塵古木半陰藏宿霧山禽相語厭遊人明年更補閩中吏來㸔桃花爛漫春陳洙字師道建陽人字與陳后山名同半山詩題中多云陳師道疑即此公與司馬公善韓魏公令達意申言皇嗣事是也此詩絶好山行滕白馬頭門覺入從容叠嶂清秋度百重長見孤雲能作雨未應片水不藏龍花邨幾處連修竹澗石誰家倚痩松本若無心許明代好尋巢許此韜蹤世稱滕工部葢宋初人也詩閑雅潤陂山上作趙師秀一山大半皆櫧葉絶頂閒尋得徑㣲無日謾勞攜紙扇有風猶怯去綿衣野花可愛移難活啼鳥多情望即飛惟與寺僧居漸熟煑茶深院待人歸此詩三四見得是山上作五六亦活動瀛奎律髓巻三十三

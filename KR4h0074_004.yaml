body:
  text: 瀛奎律髓巻四元方回編庭宇類廣谷大川異制民生其間異俗讀禹貢周官史記所紀不如讀此所選詩亦不出户而知天下之意也五言四十二首早發始興江口至虚氏邨作宋之問候曉踰閩障乗春望越臺宿雲鵬際落殘月蚌中開薜荔揺青氣桄榔翳碧苔桂香多露裛石響細泉迴抱葉𤣥蟬嘯䘖花翡翠來南中雖可恱北思日悠哉鬒髪俄成素丹心巳作灰何當首歸躅行剪故山萊之問此篇宿雲殘月一聫前無古人他佳句尤多其為人則不足道媚附張易之至於奉溺器其他傾險尤多卒賜死此乃貶隴州叅軍時詩山谷教人作詩必學老杜今所選亦以老杜為主不知老杜亦何所自乎盖出於其祖審言同時諸友陳子昂宋之問沈佺期也子昂以感遇詩名世其實尤工律詩與審言之問佺期皆唐律詩之祖唐史謂魏建安後迄江左詩律屢變至沈約庾信以音韻相婉附屬對精宻及之問佺期又加靡麗拘忌聲病約句準篇如錦繡成文學者宗之號曰沈宋體語曰蘇李居前沈宋比肩然則學古詩必本蘇武李陵學律詩必本子昂審言輩不可誣也此四人者老杜之詩所自出也特老杜才髙氣勁又能致廣大而盡精微耳旅寓安南杜審言交趾殊風候寒遲暖復催仲冬山果熟正月野花開積雨生昏霧輕霜下震雷故鄉踰萬里客思倍從來此杜子美乃祖詩也子美曰吾祖詩冠古家法如此送楊長史濟赴果州王維褒斜不容幰之子去何之鳥道一千里猿聲十二時官橋祭酒客山木女郎祠别後同眀月君應聴子規右丞詩入宋惟梅聖俞能及之可互看送梓州李使君萬壑樹叅天千山響杜鵑山中一夜雨樹杪百重泉漢女輸賨布巴人訟芋田文翁翻教授不敢倚先賢風土詩多因送人之官及逺行指言其方所習俗之異清新雋永唐人如此者極多如許棠云王租只貢金如周繇云官俸請丹砂皆是秦州杜甫傳道東柯谷深藏數十家對門藤盖瓦映竹水穿沙痩地翻宜粟陽坡可種𤓰船人近相報但恐失桃花痩地一句古今人未嘗道東南水田秈粳皆欲肥西北髙原種粟惟欲地痩亦格物者之所宜知也二十首取一題忠州龍興寺壁忠州三峽内井邑聚雲根小市嘗爭米孤城早閉門空看過客淚莫覔主人恩漂泊仍愁虎深居賴獨園爭米閉門愁虎峽内小郡如此老杜詩善言風土他如塞俗人無井山田飯有砂瓦卜傳神語畬田費火耕白魚如切玉朱橘不論錢之類不可勝數可以類觸送桂州嚴大夫韓愈蒼蒼森八桂兹地在湘南江作青羅帶山如碧玉篸户多輸翠羽家自種黄柑逺勝登僊去飛鸞不暇驂昌黎門人有孟郊賈島張籍盧仝李賀之徒詩體不一昌黎能人人效之此盖張籍體也送鄭尚書赴南海畨禺軍府盛欲說暫停杯盖海旂幢出連天觀閣開衙時龍戸集上日馬人來風靜鶢鶋去官㢘蚌蛤迴貨通師子國樂奏武王臺事事皆殊異無嫌屈大才唐人詩六韻八韻十韻以上舂容之中寓以揫歛如此者不一近人學晚唐詩止於八句中或四句工或二句工而尾句多無力此詩中四聫極言廣府之盛首句且教諸客聴所言土風尾句着力一結而殊異二字乃一篇精神也百花亭白居易朱檻在空虛凉風八月初山形如峴首江色似桐廬佛寺垂舟入人家枕水居髙亭仍有月今夜宿何如此貶江州司馬時作大抵中唐以後人多善言風土如西北風沙酪漿氊幄之區東南水國蠻島夷洞之外亦無不曲盡其妙樂天送人遊嶺南有云訶陵國方界交趾郡為隣土民稀白首洞主盡黄巾又紅旗圍卉服紫綬褁文身麵苦桄榔裛漿酸橄攬新牙檣迎海舶銅鼔賽江神不凍貪泉暖無霜毒草春雲煙蟒蛇氣刀劍鱷魚鱗又云天黄生颶母雨黑長楓人而結之曰須防盃裏蠱莫受槖中珍亦可謂盡南中之俗矣學詩者不可不深造黄陳擺落膏艶而趨於古淡亦不可無此等一二語也送海客歸舊島張籍海上去應逺蠻家雲島孤竹船來桂府山市賣魚鬚入國自獻寳逢人多贈珠却歸春洞口斬象祭天吳唐以詩試進士先以詩為行巻如此等語或本無其人姑為是題以寫殊異之景故皆新怪可觀如送流人寄邊將之類皆是也送從弟戴𤣥徃蘇州楊栁閶門路悠悠水岸斜乗舟向山寺著屐到漁家夜月紅柑樹秋風白藕花江天詩景好迴日莫言賒此蘇州風景乗舟着屐一聫膾炙人口紅柑白藕一聨太綺故尾句放寛不然冗矣送人入蜀李逺蜀客本多愁今君是勝遊碧藏雲外樹紅露驛邊樓杜宇呼名語巴江學字流不知烟雨外何處夢刀州呼名學字一聨精切送僧游南海李洞春徃海南邊秋聞半夜蟬鯨呑洗鉢水犀觸點燈船島嶼分諸國星河共一天長安却回日松偃舊房前洞學賈島為詩五言佳睦州四韻杜牧州在釣臺邊溪山實可憐有家皆掩映無處不潺湲好樹鳴幽鳥晴樓入野烟殘春杜陵客中酒落花前輕快俊逸旅次錢塘方干此處似鄉國堪為朝夕吟雲藏吴相廟樹引越山禽潮落海人散鐘遲秋寺深我來無舊識誰見寂寥心此吾家桐廬處士方干詩中四句不書題目一吟即知其為錢塘也南中王建天南多鳥聲州縣半無城野市依蠻姓山村逐水名瘴烟沙上起隂火雨中生獨有求珠客年年入海行與張籍相上下中四句佳好蠻家馬戴領得賣珠錢還家銅柱邊看兒調小象打鼓戱新船醉後眠神樹耕時語瘴煙又逢衰蹇老相問莫知年中四句雖粗極其新譎巫山峽皇甫冉巫峽見巴東迢迢出半空雲藏神女館雨到楚王宫朝暮泉聲異寒暄樹色同清猿不可聴偏在九秋中此詩與杜審言陳子昂詩法相似寄永嘉崔道融司空圗旅寓雖難定乗閒是勝游碧雲蕭寺霽紅樹謝村秋戍鼓和潮暗船燈照島幽詩家多滯此風景似相留送史澤之長沙司空曙謝眺懐西府單車觸火雲野蕉依戍客廟竹映湘君夢渚巴山斷長沙楚路分一盃從别後風月不相聞兩司空所言永嘉長沙風土各極新麗所取二聫又皆下句勝凡詩以下句勝上句為作家先一句好而後一句弱或不稱則敗興矣送龍州樊使君許棠曾見卭人說龍州地未深碧溪飛白鳥紅斾映青林土產唯宜藥王租只貢金政成開宴日誰伴使君吟五六佳送人尉黔中周繇盤山行㡬驛水路復通巴峽漲三川雪園開四季花公庭飛白鳥官俸請丹砂知尉黔人後髙吟採物華四六新而俊逸送董卿知台州張蠙九陌除書出尋僧問海城家從中路挈吏隔數州迎夜蚌侵燈影春禽雜櫓聲開圗知異迹思想石橋行第五句極新送人尉蜀中故友漢中尉請為西蜀吟人家多種橘風土愛彈琴水向昆眀濶山通大夏深理閒無别事時寄一登臨風土愛彈琴暗用相如琴心事善言形勢五六佳宣州二首梅堯臣北客多懐北庖羊舉玉巵吾鄉雖處逺佳味頗相宜沙水馬蹄鱉雪天牛尾貍寄言京國下能有㡬人知宋詩與唐不異者梅都官堯臣為㝡此鱉貍一聫宣州風土歙州亦然髙廟嘗問歙味汪龍溪彥章舉此句以對今人能傳誦之而不知其為聖俞詩也斫漆髙崕畔千筒不一盈野糧收橡子山屋照松眀只見樹堪種曾無田可耕兒孫何所樂向此是平生此宣州山中民俗唯歙亦然予生於歙故尤知此詩之味梅詩似唐而不装不繪自然風韻又當細咀此二十詩中選其二送任適尉烏程俛作程鄉尉折腰還自甘卞峰晴照黛霅水曉澄藍葑上春田闢蘆中走吏叅到時蘋葉長栁惲在江南聖俞詩一掃崑體與盛唐杜審言王維岑參諸人合今學者學四靈詩曷不學聖俞乎能言風土者聖俞所尤長也栁惲詩汀洲采白蘋日落江南春餘姚陳寺丞試邑來勾越風煙復上游江潮自迎客山月亦随舟海貨通閭市魚歌入縣樓絃琴無外事坐見浦帆收聖俞此詩全不似宋人詩張籍劉長卿不能及也送晁質夫太丞知深州蕪蔞問古亭春入饒陽城豆粥君王逺壺漿刺史迎地凉宜牧馬塞近慣調兵為寄井泉石老來思目眀起句爽三四工井泉石事新送劉攽秘校赴婺源雲木葱蘢處雞鳴古縣城山髙地多險源近水偏清斫漆資商貸栽茶雜賦征案頭龍尾硯切莫苦求精盡婺源之俗末句規之勿求硯以擾民也送洪秘丞知大寜監三峽蠻溪上千山楚俗兼婦人樵入市官井貨専鹽魑魅或為患獮猴常可嫌君能厚風俗男子使腰鎌送鮮于秘丞通判黔州壺頭山下俗巴婦曲中聴汲井熬鹽白燒田種榖青巗風來虎嘯江雨過龍腥事簡能談者揚雄所草經魯山山行適與野情惬千山髙復低好峰隨處改幽徑獨行迷霜落熊升樹林空鹿飲溪人家在何許雲外一聲雞王介甫㝡工唐體苦於對偶太精而不脫洒聖俞此詩尾句自然熊鹿一聫人皆稱其工然前聫尤幽而有味送畨禺杜杅主簿行識桄榔樹初窺翡翠巢地蒸蠻雨接山闊海雲交訟少通華語蟲多入膳庖不須思朔望梅吐臘前梢送李閤使知冀州騕褭黄金絡春風北渡河將軍守漢法壯士發燕歌綠水塘蒲短晴天塞雁多家聲復年少矍鑠笑㢘頗此北邊風土徃徃燕冀之間瀦水為塘以限馬足故有綠水蒲塘之句聖俞因送行言風土佳句甚多姑選此數篇學者當舉一隅也公安縣陶㢸門沿大堤入路趁淺沙行樹短天根起山窮地勢傾孤舟難泊㟁逺水欲沉城半夜求津濟煙中荻火眀攷四朝國史陶㢸字商翁永州人軍功補官兩知邕州善為詩山谷誌其墓許可之其詩尤善言風土蠟茶詩至五十韻送舅氏野夫萃之宣州二首黄庭堅籍甚宣城郡風流數貢毛霜林收鴨脚春網薦琴髙共理須良守今年輟省曹平生割雞手聊試發硎刀三四言土俗未見其竒却是五六有斡旋尾句稍健彼學晚唐者有前聨工夫無後四句力量試說宣城郡停盃且細聴晚樓眀宛水春騎簇昭亭𥝧稏豐圩户桁楊卧訟庭謝公歌舞地時對換鵞經此詩中四句佳言風土之美而眀蔟豐卧詩眼也后山謂句中有眼黄别駕是也尾句尤有味年豐矣訟少矣彼謝公歌舞之地以親筆墨為事可乎起句乃昌黎前詩體也寄潭州張芸叟陳師道湖嶺一都㑹西南更上游秋盤堆鴨脚春味薦猫頭宣室思來暮蒸池得借留熟知為郡樂莫作越鄉憂后山學山谷為詩者也猫頭鴨脚工矣張芸叟舜民后山姊夫五六謂宣室興來暮之想蒸池之地其得乆留之乎得借留謂不能得留也用賈誼長沙事而傍入來暮借留二事句法矯健非晚唐能嚅嚌也二首取一送周都官通判湖州王安石綠水烏程地青山顧渚濵酒醪猶美好茶荈正芳新聚泛樽前月分班焙上春仁風巳及俗樂事始闗身橘柚供南貢槐楓望北辰知君白羽扇歸日未生塵烏程酒顧渚茶湖州風景也酒與古不殊茶於今適春猶字正字巳佳可以聚而泛可以分而班亦樂事也然必仁風先及物而後身可樂故已字始字尤妙南貢北辰又勉之以心在王室歸而致吾君可也詩律精宻如此他人太工則近弱惟荆公獨能工而不萎云風土詩與送餞詩當互看海陵雜興吕本中萬事不如意自然生白鬚極知少餘韻何敢厭窮途土俗尊魚婢生涯欠木奴東行見李白誰為致區區居仁本中世稱為大東萊先生其詩宗江西而主於自然號彈丸法此詩在泰州為小官時作為仕宦送迎無味非其所樂故首句有不如意生白鬚之語自是名言然應接塵俗已無餘韵又不敢以窮途為厭也意極婉曲魚婢木奴一聨工而尊字尤好頃嵗從戎南鄭屢徃來興鳳間暇日追憶舊游有賦陸游昔戍蠶叢北頻行鳳集南烽傳戎壘宻驛送客程貪春盡花猶拆雲低雨半含種畬多菽粟藝木雜松楠婦汲惟陶器民居半草庵風煙迷棧閣雷霆去聲起湫潭城郭秦風近邨墟蜀語參快心逢曠野刮目望浮嵐考古興時感無詩每自慚嘉陵㝡堪憶迎馬栁毿毿放翁詩出於曾茶山而不専用江西格間出一二耳有晚唐有中唐亦有盛唐此篇雖陳杜沈宋亦不過如此流麗綿宻所圈五字以全篇太縟到此合放淡故也作此詩年八十三矣南渡後詩至萬篇佳句無數有越中詩言鑑湖風物尤精七言三十首葢少府新除江南尉問風俗郎士元聞君作尉向江潭吳越風煙到自諳客路尋常隨竹影人家大抵傍山嵐緣溪花木偏宜逺避地衣冠盡向南唯有夜猿啼海樹思鄉望國意難堪嶺南道中李徳裕嶺水爭分路轉迷桄榔椰葉暗蠻溪愁衝霧毒逢蛇草畏落沙蟲避燕泥五月畬田收火米三更津吏報朝雞不堪腸斷思鄉處紅槿花中越鳥啼李衞公不讀文𨕖而詩竒健謫海外時所作詩尤酸楚張志和漁父詞五首在其集中此詩於嶺南風土甚切詞又工自江陵沿流道中劉禹錫三千三百西江水自古如今要路津月夜歌謡有漁父風天氣色屬商人沙村好處多逢寺山葉紅時覺勝春行到南朝爭戰地古來名將盡為神元註陸遜甘寜皆有祠宇赴蘇州酧别樂天吳郡魚書下紫宸長安廐吏送朱輪二南風化承遺愛八詠聲名躡後塵梁氏夫妻為寄客陸家兄弟是州民江城春日追游處共憶東都舊主人樂天嘗守蘇今夢得亦徃守此故有承遺愛躡後塵之語梁鴻孟光嘗客於吳機雲二陸昔為吳人今到蘇之後凡寄寓之客及在郡之士人與太守相追游當共憶樂天為舊太守即舊主人也善用事筆端有口未易可及登栁州城樓寄漳汀封連四州栁宗元城上髙樓接大荒海天愁思正茫茫驚風亂颭芙蓉水宻雨斜侵薜荔墻嶺樹重遮千里目江流曲似九回腸共來百越文身地猶自音書滯一鄉韓泰為撫州韓曅為池州陳諫為封州劉禹錫為連州栁州寄丈人周韶州越絶孤城千萬峰空齋不語坐髙舂印文生綠經旬合硯匣留塵盡日封梅嶺蠻煙藏翡翠桂江秋水露鰅鱅丈人本自忘機事為想年來憔悴容得盧衡州書因以詩寄臨蒸且莫歎炎方為報秋來雁㡬行林邑東回山似㦸䍧牱南下水如湯蒹葭淅瀝含秋露橘柚玲瓏透夕陽非是白蘋洲畔客還將逺意問瀟湘嶺南江行瘴江南去入雲煙望盡黄茅是海邊山腹雨晴添象跡潭心日暖長蛟涎射工巧伺遊人影颶母偏驚旅客船從此憂來非一事豈容華髪待流年栁州峒氓郡城南下接通津異服殊音不可親青箬裹鹽歸洞客綠荷包飯趂墟人鵞毛禦臈縫山罽雞骨占年拜水神愁向公庭問重譯欲投章甫作文身栁栁州詩精絶工緻古體尤髙世言韋栁韋詩淡而緩栁詩峭而勁此五律詩比老杜則尤工矣杜詩哀而壯烈栁詩哀而酸楚亦同而異也又南省牒令具註國圗風俗有云華夷圗上應初識風土記中殊未傳非孔子不陋九夷之義也年四十七卒於栁州殆哀傷之過歟然其詩實可法杭州白居易餘杭形勝世間無州傍青山縣枕湖遶郭荷花三十里拂城松樹一千株夢兒亭古傳名謝教伎樓新道姓蘇獨有使君年老大風光不稱白髭鬚守蘇答客問杭州為我踟躕停酒盞與君約畧說杭州山名天竺堆青黛湖號錢塘瀉綠油大屋簷多裝雁齒小航船亦畫螭頭所嗟水路無三百官繫何因得再游杭州春望望海樓眀照曉霞䕶江堤白踏晴沙濤聲夜入伍員廟栁色春藏蘇小家紅袖織綾誇柿蔕青旗沽酒趂梨花誰開湖寺西南路草綠裙腰一道斜樂天守杭州以和適之趣處繁華子厚守栁州以愁苦之懐處荒寂情景異歡戚殊以樂天之二詩視子厚之五詩相去逺矣然子厚亦隘者也東坡謫黄謫惠謫儋耳無一言及於怨尤夷鄙是亦可以觀人焉以州宅誇於樂天元稹州城迴遶拂雲堆鏡水稽山滿目來四面常時對屏幛一家終日在樓臺星河似向簷前落鼓角驚從地底回我是玉皇香案吏謫居猶得住蓬萊重誇州宅旦暮景色仙都難畵亦難書暫合登臨不合居繞郭煙嵐新雨後滿山樓閣上燈初人聲曉動千門闢湖色宵涵萬象虛為問西州羅刹㟁濤頭衝突近何如長慶中樂天知杭州微之知越州以筒寄詩自此始微之誇州宅蓬萊閣所以名亦自此始二公前貶九江忠州江陵通州徃來詩不勝其酸楚至此乃不勝其誇耀亦一時風俗之弊只知作詩不知其有失也郡中有懐寄上睦州員外十三兄邢羣城枕溪流淺更斜麗譙連帶邑人家經冬野菜青青色未臘山梅樹樹花雖免瘴雲生嶺上永無京信到天涯如今嵗晏從羇滯心喜彈冠事不賒此詩附見樊川集唐歙州刺史邢羣寄睦州刺史杜牧之三四言歙州風土佳句也五以江左猶逺嶺南乃無瘴之地六言唐都長安歙州自當難得京書耳正初奉酧杜牧翠巗千尺倚溪斜曾得嚴光作釣家越瘴逺分丁字水臘梅遲見二年花眀時刀尺君須用幽處田園我有涯一壑風煙陽羡里觧龜休去路非賒此牧之用韻酧歙州刺史邢羣也臘中得詩正初奉酧二詩皆是前四句言各州之景後四句言情皆佳句也長安雜題洪河清渭天池濬太白終南地軸横祥雲輝映漢宫紫春光繡畵秦川眀草妬佳人鈿朶色風回公子玊銜聲六飛南幸芙蓉苑十里飄香入夾城詩人於四方風土皆能言之至於長安洛陽鄴都金陵帝王建都之地則多見於懐古之作而述今者少牧之長安六詩於五詩之末各寓閑中自靜之意獨此詩前誇形勢後敘侈麗亦足以形容天府之盛故取之五詩内如韓嫣金丸莎覆綠許公韉汗杏妝紅投釣謝家池正雨醉吟隋寺日沉鐘白鹿源頭回獵騎紫雲樓下醉江花又街西長句云遊騎偶同人鬭酒名園相倚杏交花皆艶冶而不流當其時郊島元白下世之後張祜趙嘏諸人皆不及牧之盖頗能用老杜句律自為翹楚不卑卑於晚唐之酸楚凑砌也洛陽長句草色人心相與閒是非名利有無間橋横落照虹堪畫樹鎻千門鳥自還芝盖不來雲杳杳僊舟何處水潺潺君王謙譲泥金事蒼翠空髙萬嵗山唐自天寶以後不復駕車東都此詩有望幸之意樹鎻千門一句極佳芝盖僊舟乃指緱氏山王喬事及李郭事亦切題宣州開元寺小閣六朝文物草連空天澹雲閒今古同鳥去鳥來山色裏人歌人哭水聲中深秋簾幙千家雨落日樓臺一笛風惆悵無因見范蠡參差煙樹五湖東唐以昇州屬浙西而莭度使在潤州江東則宣歙觀察府在宣州是為大鎮故其詩特繁盛宋析置太平州移本路監司於江寜建康而宣州寂如矣杭州呈勝之王安國游觀須知此地佳紛紛人物敵京華林巒臘雪千家水城郭春風二月花彩舫笙歌吹落日畵樓燈燭映殘霞如君援筆宜摹寫付與塵埃北客誇此王安國詩今王校理集行於世誤入其兄荆公集中送張仲容赴杭州孫公辟王安石萬屋相誇漆與丹笑歌長在綺紈間綵船春戱城邊水畫燭秋尋寺外山憶我屢隨游客入喜君今趂辟書還遥知曼倩威行乆赤筆應從到日閒李叅政注孫公沔也杭州之盛自五代至宋繁華乆矣百五十年行都詩愈多而佳者愈不少未能盡得之也夷陵歳暮書事呈元珍表臣歐陽修蕭條雞犬亂山中時節崢嶸歳已窮游女髻鬟風俗古野巫歌舞嵗年豐平時都邑今為陋敵國江山昔㝡雄荆楚先賢多勝迹不辭攜酒問隣翁元注夷陵風俗朴陋惟嵗暮祭鬼則男女數百相從而樂飲婦女競為野服以相游嬉寄梅聖俞青山四顧亂無涯雞犬蕭條數百家楚俗嵗時多雜鬼蠻鄉言語不通華繞城江急舟難泊當縣山髙日易斜擊鼔踏歌成夜市邀龜卜雨趂燒畬叢林白晝飛妖鳥庭砌非時見異花惟有山川為絶勝寄人堪作畵圗誇公夷陵書事寄謝三舍人有云道途處險人多負邑屋臨江俗善泅臘市魚鹽朝暫合淫祠簫鼔嵗無休風鳴燒入空城響雨惡江崩斷㟁流訟庭畫地通人語邑政觀風間俚謳皆於風土如畵讀歐公詩當以三法觀五言律初學晚唐與梅聖俞相出入其後乃自為散誕七言律力變崑體不肯一毫涉組織自成一家髙於劉白多矣如五七言古體則多近昌黎太白或有全類昌黎者其人亦宋之昌黎也出其門者皆宋文人巨擘焉戱答元珍春風疑不到天涯二月山城未見花殘雪壓枝猶有橘凍雷驚笋欲抽芽夜聞歸雁生鄉思病入新年感物華曾是洛陽花下客野芳雖晚不須嗟此夷陵作歐公自謂得意盖春風疑不到天涯一句未見其妙若可驚異第二句云二月山城未見花即先問後答眀言其所謂也以後句句有味戱詠江南風土黄庭堅十月江南未得霜髙林殘水下寒塘飯香獵户分熊白酒熟漁家擘蟹黄橘摘金包隨驛使米舂玉粒送官倉踏歌夜結田神社游女多隨陌上郎此詩見山谷外集亦非他人所能及也入秭歸界范成大山根繫馬貨漿家深入窮鄉事可嗟蚯蚓祟人能作瘴茱萸隨俗强煎茶幽禽不見但聞語野草無名却着花窈窕﨑嶇殊未艾去程方始問三巴淳熙二年乙未石湖自桂林移帥四川年五十矣入峽諸詩多佳者惟選此篇及人鮓甕詩如擬劉夢得竹枝歌亦不減劉也人鮓甕懐沙祠下鐵色磯中流束湍張禍機與齊去聲俱入彼可弔乗流而行吾亦危江河難犯一至此天地好生安取斯朝歌勝母古尚諱我其舞醢航秭歸元註在歸州郭下長石截然据江三之二水盛時濆淖極大號峽㟁中至嶮處自此登舟至巫山王者之法如江河易避難犯以天地好生為對亦竒矣此吳體杭州喜江南梅度支至二詩陳堯佐淡薄交情老更濃為君彈瑟送金鍾苧羅香徑無時到姑射僊姿在處逢鸞鶴品流慚晚逹煙霞門户憶先容公餘莫放西湖景歩歩蒼苔翠翠松陳公秋風斜日鱸魚鄉之句膾炙人口謂錢塘風物第四句切題公望當年㝡得君畫圗城郭喜同羣門前碧浪家家海樓上青山寺寺雲松下玉琴邀鶴聴溪邊臺石共僧分情多景好知難盡且倒金樽任半醺守嚴述懐陸游桐君故隠兩經秋小院孤燈夜夜愁名酒過於求趙璧異書渾似借荆州溪山勝處身難到風月佳時事不休安得連雲車載醸金鞭重作浣花游放翁淳熙丙午丁未戊申在嚴州二考滿其去年六十四矣求酒借書之聨可發一笑大扺太守自不當借書於寓公趙守汝愚借滕元秀詩集三千首竟奄有不還遂致其家不傳以一入太守宅難取故也予為此郡初自造至清堂酒却絶妙但亦未嘗借人書看七年宿留八年而歸為一窶人云瀛奎律髓巻四

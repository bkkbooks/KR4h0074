body:
  text: 瀛奎律髓卷五元方回編升平類詩家有善言富貴者所謂笙歌歸院落燈火下樓臺梨花院落溶溶月栁絮池塘淡淡風鴛鴦占水能嗔客鸚鵡嫌籠解罵人是也然亦必世道升平而後可李太白謂唐明皇盛時奉詔作宫中行樂詞雖漁陽之亂未萌也而其言已近乎誇矣今取凡言富貴者不曰富貴而曰升平必有升平而後有富貴羽檄繹騷瘡痍憔悴而曰君臣上下朋友之間可以逸樂昌太豫未之信也五言六首宫中行樂詞八首取五李白小小生金屋盈盈在紫微山花插寶髻石竹繡羅衣每出深宫裏常隨步輦歸只愁歌舞散化作彩雲飛栁色黃金嫩梨花白雪香玉樓巢翡翠金殿鎖鴛鴦選妓隨雕輦徵歌出洞房宫中誰第一飛燕在昭陽玉樹春歸日金宫樂事多後庭朝未入輕輦夜相過笑出花間語嬌來竹下歌莫教眀月去留著醉嫦娥寒雪梅中盡春風栁上歸宫鶯嬌欲醉簷燕語還飛遲日眀歌席新花艷舞衣晚來移彩仗行樂泥光輝水緑南薰殿花紅北闕樓鶯歌開太液鳳吹繞瀛洲素女鳴珠佩天人弄綵毬今朝風日好宜入未央遊今按太白集有清平調詞三首宫中行樂詞八首皆應詔之作杜子美所謂天子呼來不上船自稱臣是酒中仙又曰龍舟移棹晚獸錦奪袍新皆指此也髙力士懷脫鞾之恥以飛燕在昭陽之句摘語楊妃終不得官者亦坐此也太白之卒年六十二在代宗初年其召也在天寶初年必長於子美味子美憐君如兄弟之句則亦忘年交也子美天寶十三載方進三賦召試則太白去國久焉兩賢一時俱不遇而詩名俱千古不朽彼暫遇而速朽者又何足多云駕幸河東王昌齡晉水千廬合汾橋萬國從開唐天業盛入沛聖恩濃下輦回三象題碑任六龍睿眀懸日月千載此時逢昌齡唐眀皇時人開元二十年十一月如汾隂祠后土詩當是時作用事造句皆典實然昌齡律詩甚少惟三四篇寒食詩有云雨減龍蛇火春生鴻雁天甚佳而缺第五句七言四十五首寄太原李相公白居易聞道北都今一變政和軍樂萬人安綺羅二八圍賔榻組練三千夾將壇蟬鬢應誇丞相少貂裘不覺太原寒世間大有虛榮貴百嵗無君一日歡第五句頗於戲語中存規戒第六句對得妙送裴相公赴鎮太原張籍盛德雄名逺近知功髙先乞守藩維銜恩暫遣分龍節署勑還同在鳳池天子親臨樓上送朝官齊出道傍辭眀年塞北清蕃落應起生祠請立碑送君貺宣徽太尉歸洛元章簡萬釘還帶照龜緺冠蓋郊西送使華去國正逢梁苑雪探春先得洛城花樓臺紫府神君館松石平泉太尉家四紀交遊驚晚暮白頭分袂一咨嗟沖之相公拜相天聖年中桂籍人而今二十五回春親逢舜燭圗鄰弼首見堯龍秉化鈞百辟望公承約束四方多士仰經綸為儒富貴皆隆極惟祝功名日日新禁林春直李昉疏簾搖曳日輝輝直閣深嚴半掩扉一院有花春晝永八方無事詔書稀樹頭百囀鶯鶯語梁上新來燕燕飛豈合此身居此地妨賢尸祿自知非李昉此詩合是宋朝善言太平第一人故不以入朝省類而置之升平選中上吕相公劉禹謨重名清望遍華夷恐是神仙不可知一舉首登龍虎榜十年身到鳳凰池廟堂只似無言者門館長如未貴時除却洛京居守外聖朝賢相復書誰此必為吕蒙正作劉昌言泉州人仕至同知樞密中二聫世所共稱上李相公王操弱冠登龍入粉闈少年清貴古來稀袖中詔草朝天去頭上宫花侍宴歸卓筆玉堂寒漏迥捲簾池館水禽飛三台位近猶謙遜間聽秋霖憶翠微詩話或以詔草為病為無攜草以朝天子者豫謂不然凡詔雖寫真本豈不以草本袖而同行乎又或有以草本密進者此無害也洛陽春帝里山河異莫裁就中春色似先來暖融殘雪當時盡花得東風一夜開艷日綺羅香上苑沸天簫鼓動瑶臺芳心只恐煙花暮間立髙樓望幾回此乃宋有天下始盛將泰之日也兄長莒公赴鎮道出西苑作詩有長楊獵近寒熊吼太液歌餘瑞鵠飛語驚邁豫輒擬作一篇宋祁寶樓斜倚闕西天北轉樓隂壓素漣白雪久殘梁復道黃頭間守漢樓船塵輕未損朝來霧樹暖才容臘外煙弭節不妨饒悵戀待歌魚藻記他年黃頭間守漢樓船間作空詩話謂經改定寄題相臺太尉韓公晝錦堂瑞節前驅晝錦身堂成署榜示州民遷鶯賀燕翩翻集嘉樹甘棠次第春漳岸夕波通沼溜魏臺暾日弄梁塵君看千古青編上得意如公有幾人左昭二年云云敢不封殖此樹以無忘角弓遂賦甘棠富貴將相惟韓魏公無愧此堂此詩非誇非諛寒食假中作九門煙樹蔽春㕓小雨初晴撥火前草色引開盤馬地簫聲催暖賣餳天縈絲早絮輕無著弄袖和風細可憐鼇署侍臣貪出沐珉糜珠餡愧頒宣景文宋公嘗知夀州再入翰苑又詔知杭州才出國門迫還本職此所謂鼇署侍臣貪出沐者殆慶厯五年乙酉六年丙戌間事詩三四風味特甚足見升平五六尤潤末句宣賜事候考送致政太師文潞公羅適曽將故老較量看五福如公信是難潞國封來多有嵗太師以上更無官應留妙算安神器必得人才薦將壇他日宋家青史上始終臣節雪霜寒羅適天台人五首取一尚有貝州隂德即仙資一句佳駕幸西太一宫道傍耕桑者皆以茶絹賜之韓琦杪春時澤未全滂西禱真祠徯福祥蠶女捨籠驚法從耕夫投耒目天光勤勞率有優恩及拜賜皆知佚道長海內承風誰不勸何須躬藉與躬桑此甲辰治平元年英宗出郊時詩升平之象可掬魏公為太平宰相無愧矣時耕者叱牛聲甚厲駕前衛士咸以為笑公亦以詩紀之也駕幸金眀池西池風景出塵寰春豫方乘禁坐間庶俗一令趨夀域從官齊許燕蓬山樓臺金碧交輝外舟楫笙歌浩渺間與衆盡歡宫漏促萬花香裏屬車還此太平宰相之言英宗時初會晝錦堂重向髙堂舉宴杯四年牽強北門回故園風物都如舊多病襟懷逐一開白髮恥誇金絡騎緑隂欣滿鐵梁臺因思前彥歸榮者未有三曽晝錦來再題為郡偏榮晝錦歸再容鄉任古來稀邸人祗駭新章貴仙表誰瞻舊鶴飛浹境士民增慰恱一軒風物起光輝鑱詩又志君恩重鼎鑊捐軀報亦微公初有古詩不以快恩讐矜名譽為然見諸歐陽公記中此熙寧初元自長安再領鄉郡時後改鎮北門得請歸判相州凡三衣錦云初登休逸臺休逸臺髙復憑闌依然風月喜生顔城頭仰視新栽栁天外微分舊見山草色且無歸後怨禽飛同到倦時還欲知恩許三年喜錦爛裘輕白晝間癸丑燈夕爭放紅蕖燎紫沉勝遊誰肯惜千金人和更有笙歌助酒美應無巷陌深化國光隂方甚永洞天風物不難尋如何可致吾民樂長似熙熙此夜心熙寧六年相州作賞花釣魚御製宋仁宗晴旭輝輝苑籞開氤氲花氣好風來遊絲罥絮縈行仗墮蘂飄香入酒杯魚躍文波時撥刺鶯留深樹久徘徊青春朝野方無事故許遊觀近侍陪和御製賞花釣魚韓琦花蔟香亭萬朵開雕輿髙自九關來輕隂閣雨留天仗寒色凝春送夀杯仙吹徹雲終縹渺恩魚逢餌久徘徊曽參二十年前會今備台司得再陪和前韻鄭獬輦路鮮雲五色開一聲清蹕下天來水光翠繞九重殿花氣濃薰萬夀杯繡幕煙深紅會合文竿風引緑徘徊蓬山絶頂無人到詔許羣仙盡日陪和前韻禁籞平眀帳殿開華芝初下未央來人間彩鳳儀韶曲天上流霞滿御杯花近赭袍偏照爛魚窺仙仗亦徘徊蓬萊絶景何曽到自愧塵蹤此一陪奉詔赴瓊林苑燕餞太尉潞國文公出鎮西都都門秋色滿旌旗祖帳容陪醉御巵功業迥髙嘉祐末公至和中首陳建儲之䇿精神如破貝州時白居易獻裴晉公詩云間説風情筋力在只如初破蔡州時匣中寶劍騰霜鍔海上仙桃壓露枝公之子近有登瀛之命昨日更聞褒詔下别看名姓入蒸彞送公闢給事自青州致政歸吳中青鎖仙人解玉符秋風一夜滿江湖曽歌郢水非凡曲未掃旄頭負壯圗公昔北使憤然屢抑北人終日望君天欲盡平生知我世應無扁舟應約元宫保瀟灑蓮涇二丈夫採蓮涇在蘇州南園後送程公闢給事出守會稽兼集賢殿修撰越州太守何瀟灑應為能吟住集仙雪急紫濛催玉勒公奉使方歸紫濛北中館名也日長青瑣聽薰絃一時冠蓋傾離席半醉珠璣落彩箋自恨君恩渾未報五湖終負釣魚船紫濛二字甚新人所未用亦所未知寄程公闢念昔都門手一攜春禽幾向苧蘿啼夢回金殿風光别吟到銀河月影低舞急錦腰迎十八酒酣金盞照東西何時得遂扁舟去雪棹同君泛剡溪迎十八照東西全是迎字照字有工恭和御製上元觀燈王安禮鑾輿清曉出瑶臺羽衛瞻迎扇影開鳳闕張燈天上坐雞林獻曲海邊來修文可笑秦無䇿能賦休誇楚有才星漢未斜鈞樂闋君王宣示萬年杯此即王禹玉雙鳳六鰲之韻足見太平盛世瓊林苑賜宴餞留守太尉輒繼髙韻呈名德曽來重四夷朝廷今日見官儀陪祠自冠三公位分陜猶為百辟師金谷望塵多眷舊瓊林賜飢盡巫疑都人喜見斾旌美寧識勳名在鼎彞上巳遊金眀池王直方遊絲墮絮惹行人酒肆歌樓駐畫輪鳳管遏回雲冉冉龍舟衝破浪粼粼日斜黃繖歸馳道風約青簾認别津朝野歡娛真有象壺中要看四時春選此詩以為汴京升平之盛可夢不可見恐亦不可夢也嗚呼痛哉金明池王安國霓旌逺逺拂樓船滿地春風錦繡筵三島路深浮閬苑九霞觴滿奏鈞天仗歸金闕浮雲外人望池臺落日邊最引平生江海趣波瀾一段草如煙上元從駕至集禧觀次沖卿韻王安石昭陵持槖從遊人更見熙寧第四春寶扇初開移玉座華燈錯出映朱塵樓前時看新歌舞仗外還如舊徼巡投老逢時追往事却含愁思度天津次韻陪駕觀燈繡節含風下玉除宫商挾奏斐然殊福祥周室流為火恩澤堯樽散在衢伏枕但能知廣樂揮毫何以報眀珠但留巾篋歸田日追詠公歡每自娛謁曽魯公翊戴三朝冕有蟬歸榮今作地行仙且開京洛蕭何第未泛江湖范蠡船老景已憐周吕尚慶門方似漢韋賢一觴豈足為公夀願賦長鯨吸百川上元喜呈貢父車馬紛紛白晝同萬家燈火暖春風别開閶闔壺天外特起蓬萊陸海中盡取繁華供俠少祗分牢落與衰翁不知太一遊何處定把青藜獨照公和賞花釣魚蔭幄晴雲拂曉開傳呼仙仗九天來披香殿上留朱輦太液池邊送玉杯宿蘂暖含風浩蕩戲鱗清映日徘徊宸章獨與春爭麗恩許賡歌豈易陪車駕幸玉津園晚歸進詩洪邁五更猶自雨如麻無限都人仰翠華翻手作雲方悵望舉頭見日共驚嗟天公的有施生妙帝力堪同造化誇上苑春光無盡藏何須羯鼓更催花淳熙中阜陵宿戒車幸玉津園夜大雨曉而晴景盧進此詩後兩日宇文價內引上舉似此詩曰洪待制用雨如麻偶思得桑麻可答其末句用羯鼓事故以華清車騎爛如花答之世人以為榮遇此亦一時之太平也然三四用麗語熟套蓋四六者乃三洪之所長秋日臨幸祕書省因成近體詩一首賜丞相史浩以下宋孝宗玉軸牙籖煥寶章簪紳侍列映秋光宴開藝閣儒風盛坐對蓬山逸興長稽古右文慚菲德禮賢下士法前王欲臻至治觀熙洽更罄嘉謀為贊襄淳熙五年戊戌九月十二日駕幸祕書省翌日賜丞相史浩以下此詩自建炎丁未至庚戌閲四年無非冦賦充斥之日自紹興辛亥至壬午三十二年梗以姦相秦檜者十七年天下學士大夫切齒於忘讐議和之事貶逐相望辛巳完顏亮背盟臨江東南震動幸而再安天也中間錢塘一隅謂之小康則可矣至阜陵立歷隆興乾道以至淳熙始可謂之升平故取孝宗此詩以見當時稽古右文禮賢下士之盛宋之極治前言仁祖後言孝宗漢唐英主有不逮也朝廷治而天下富樂謂之升平天下之尚富樂而朝廷不治則有亂之萌不足以言升平也選詩之意又在乎此寓意晏殊油壁香車不再逢峽雲無迹任西東梨花院落溶溶月栁絮池塘淡淡風幾日寂寥中酒後一畨蕭索禁煙中魚書欲寄何由逹水逺山長處處同恭和御製秋日幸祕書省近體詩吕祖謙麟閣龍旗日月章中興再見赭袍光仰觀焜耀人文盛始識扶持德意長功利從今卑管晏浮華自昔陋盧王願將實學酬天造敢效眀河織女襄東萊時為著佐兼權禮郎國史編修十月十七日除大著十二月十四夜感末疾給假眀年三月二十四日遂歸婺州不復再起淳熙八年辛丑七月二十九日卒年四十五集中詩僅一卷率多挽章今以類選公詩僅得五首祕書省三挽汪聖錫二如福州城樓五言詩亦佳有云棊聲傳下界雁影沒長空島嶼秋江裏樓臺海氣中蓋少作也賀車駕幸祕書省二首麟臺髙栁識雕輿共記中興幸省初黃道再傳天子蹕青編重入史臣書需雲下際君恩盛晨露髙張樂節舒若寫鴻猷參大雅定非周鼓頌畋漁畋漁善用韻紫清丹極與天鄰闔闢乾坤係笑顰獨為斯文回一顧坐令吾道重千鈞先王舊物參差見列聖眀謨次第陳墨客區區感榮遇豈知深意在彞倫淳熙五年戊戌九月十二日阜陵車駕幸祕書省公時為著作佐郎兼權禮部郎官上有詩見前公和外又有此二詩穩重端整過於無益空言者萬萬矣入城至郡圃及諸家園亭遊人甚盛陸遊老子何曽慣市塵今朝也復入城闉太平有象人人醉造物無私處處春九陌鶯花娛望眼一竿風月屬間身不緣興盡回橈早要就湖波照角巾三四好乍晴出遊八十山翁病不支出門也喜賦晴詩小樓酒斾闌街處深巷人家晒練時本借微風欹帽影却乘新暖弄鞭絲歸來幸有流香在剩伴兒童一笑嬉流香所賜酒名武林皇輿久駐武林宫汴洛當時未易同廣陌有風塵不起長河無凍水常通樓臺飛舞祥煙外鼓吹喧呼眀月中六十年間幾來往都人誰解記衰翁此嘉泰六年壬戌詩頗能道錢塘風物元注紹興癸亥子年十九以試南省來臨安今六十年矣西村暮歸天氣清和修褉後土風淳古結繩前村村陂足分秧水户戶門通入郭船亭障盜消常息鼓坊場酒賤不論錢行人爭看山翁醉頭枕槐根卧道邊此景未易得也故取之瀛奎律髓卷五
